<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VORTEX Player X | Zero Lag Turbo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0f1e, #03050a);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hero {
            text-align: center;
        }
        .hero h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #fff, #ffb6c1);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }
        .hero .badge {
            background: rgba(255,71,87,0.2);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            padding: 5px 14px;
            font-size: 0.7rem;
            display: inline-block;
            margin-top: 8px;
            border: 1px solid rgba(255,71,87,0.4);
            color: #ff8f9f;
        }

        .player-card {
            background: rgba(10, 14, 23, 0.7);
            backdrop-filter: blur(18px);
            border-radius: 32px;
            padding: 16px;
            box-shadow: 0 25px 35px -20px black, 0 0 0 1px rgba(255,255,255,0.05);
        }

        .player-container {
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }

        video {
            width: 100%;
            display: block;
            cursor: pointer;
            will-change: transform;
        }

        .controls {
            background: linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.5) 70%, transparent);
            padding: 14px 20px 16px;
            transition: opacity 0.2s;
        }

        .progress-area {
            margin-bottom: 10px;
        }

        .progress-wrapper {
            position: relative;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
        }
        .buffer-progress {
            position: absolute;
            height: 100%;
            background: rgba(255,255,255,0.3);
            width: 0%;
            border-radius: 10px;
            pointer-events: none;
            transition: width 0.1s ease;
        }
        .play-progress {
            position: absolute;
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff8a5c);
            width: 0%;
            border-radius: 10px;
            z-index: 2;
            transition: width 0.05s linear;
        }
        .progress-wrapper:hover {
            height: 6px;
        }
        .time-stats {
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
            font-size: 0.65rem;
            font-weight: 500;
            color: #ccc;
            letter-spacing: 0.3px;
        }

        .button-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .ctrl-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .ctrl-btn {
            background: rgba(30,30,45,0.75);
            border: none;
            color: white;
            font-size: 1.1rem;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.1s;
            backdrop-filter: blur(5px);
        }
        .ctrl-btn:active {
            transform: scale(0.94);
        }
        .play-big {
            background: #ff4757;
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(255,71,87,0.4);
        }
        .time-text {
            background: rgba(0,0,0,0.5);
            padding: 4px 10px;
            border-radius: 40px;
            font-family: monospace;
            font-weight: 500;
            font-size: 0.8rem;
        }
        .volume-box {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,0,0,0.4);
            padding: 0 8px;
            border-radius: 50px;
        }
        .volume-slider {
            width: 70px;
            height: 3px;
            -webkit-appearance: none;
            background: #555;
            border-radius: 5px;
        }
        .volume-slider::-webkit-slider-thumb {
            width: 10px;
            height: 10px;
            background: #ff4757;
            border-radius: 50%;
            cursor: pointer;
        }
        .speed-selector {
            background: #1e1e2e;
            border: 1px solid #444;
            border-radius: 40px;
            padding: 5px 10px;
            color: white;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            outline: none;
        }
        .warning-banner {
            font-size: 0.65rem;
            background: rgba(0,0,0,0.8);
            padding: 4px 10px;
            border-radius: 30px;
            color: #ffaa66;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .source-panel {
            background: rgba(18, 22, 35, 0.5);
            backdrop-filter: blur(18px);
            border-radius: 28px;
            padding: 18px 22px;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .input-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .url-input {
            flex: 1;
            background: #0b0e16;
            border: 1px solid #2a2e3f;
            border-radius: 60px;
            padding: 10px 18px;
            color: white;
            font-size: 0.8rem;
            outline: none;
        }
        .url-input:focus {
            border-color: #ff4757;
        }
        .btn-grad {
            background: linear-gradient(100deg, #ff4757, #ff6f5e);
            border: none;
            border-radius: 60px;
            padding: 0 24px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.1s;
        }
        .btn-grad:active {
            transform: scale(0.97);
        }
        .file-label {
            background: #2c3e66;
            border-radius: 60px;
            padding: 10px 24px;
            font-weight: 600;
            cursor: pointer;
            display: inline-flex;
            gap: 8px;
            font-size: 0.8rem;
        }
        .info-status {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            color: #aaa;
            margin-top: 10px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .footer {
            text-align: center;
            font-size: 0.65rem;
            color: #4a5568;
        }
        @media (max-width: 700px) {
            .ctrl-btn { width: 34px; height: 34px; font-size: 1rem; }
            .play-big { width: 44px; height: 44px; }
            .time-text { font-size: 0.7rem; }
            .volume-slider { width: 55px; }
        }
        .perf-badge {
            background: #1a8f5c;
            border-radius: 20px;
            padding: 2px 10px;
            font-size: 0.65rem;
            margin-left: 8px;
        }
        .stats-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        /* Tooltip notifikasi */
        .toast-notif {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e1e2ecc;
            backdrop-filter: blur(12px);
            color: #ffd966;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            z-index: 1000;
            border: 1px solid #ffd966;
            pointer-events: none;
            white-space: nowrap;
            animation: fadeInOut 2s ease forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            85% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-8px); visibility: hidden; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>VORTEX Zero Lag Turbo</h1>
        <div class="badge">⚡ ANTI-LAG ENGINE | PREDICTIVE BUFFER ⚡</div>
    </div>

    <div class="player-card">
        <div class="player-container">
            <video id="videoPlayer" preload="auto" crossorigin="anonymous">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
            </video>
            <div class="controls">
                <div class="progress-area">
                    <div class="progress-wrapper" id="progressWrapper">
                        <div class="buffer-progress" id="bufferProgress"></div>
                        <div class="play-progress" id="playProgress"></div>
                    </div>
                    <div class="time-stats">
                        <span id="currentTimeLabel">00:00</span>
                        <span id="bufferPercent">● buffer 0%</span>
                        <span id="durationLabel">00:00</span>
                    </div>
                </div>
                <div class="button-bar">
                    <div class="ctrl-group">
                        <button class="ctrl-btn play-big" id="playPauseBtn"><span id="playIcon">▶</span></button>
                        <button class="ctrl-btn" id="rewind10">⏪10</button>
                        <button class="ctrl-btn" id="forward10">⏩10</button>
                        <div class="time-text"><span id="currentTime">00:00</span> / <span id="duration">00:00</span></div>
                    </div>
                    <div class="ctrl-group">
                        <div class="volume-box">
                            <button class="ctrl-btn" id="muteBtn" style="width:34px;">🔊</button>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="0.7">
                        </div>
                        <select id="speedSelect" class="speed-selector">
                            <option value="0.5">0.5x</option><option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option><option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option><option value="2">2x</option>
                        </select>
                        <button class="ctrl-btn" id="loopBtn" title="Loop">🔁</button>
                        <button class="ctrl-btn" id="fullscreenBtn">⛶</button>
                    </div>
                </div>
                <div id="stutterWarning" class="warning-banner" style="display: none;">⚡ Optimasi anti-lag aktif</div>
            </div>
        </div>
    </div>

    <div class="source-panel">
        <div class="input-row">
            <input type="text" id="videoUrlInput" class="url-input" placeholder="URL video (mp4, webm, m3u8 live support)">
            <button id="loadUrlButton" class="btn-grad">🚀 Muat URL</button>
            <input type="file" id="localFile" accept="video/*" style="display:none">
            <label for="localFile" class="file-label">📂 File Lokal</label>
        </div>
        <div class="info-status">
            <span>🎬 <span id="fileStatus">BigBuckBunny (demo turbo)</span></span>
            <span class="stats-row">⚡ <span id="perfStatus">Mode: Ultra Lancar</span></span>
        </div>
    </div>
    <div class="footer">
        <p>🔧 Zero Lag: preload agresif + deteksi lag otomatis + buffer prediktif | Pengalaman mulus tanpa stutter</p>
    </div>
</div>

<script>
    (function() {
        // ========== DOM Elements ==========
        const video = document.getElementById('videoPlayer');
        const playBtn = document.getElementById('playPauseBtn');
        const playIcon = document.getElementById('playIcon');
        const rewind10 = document.getElementById('rewind10');
        const forward10 = document.getElementById('forward10');
        const currentSpan = document.getElementById('currentTime');
        const durationSpan = document.getElementById('duration');
        const currentLabel = document.getElementById('currentTimeLabel');
        const durationLabel = document.getElementById('durationLabel');
        const playProgress = document.getElementById('playProgress');
        const bufferProgress = document.getElementById('bufferProgress');
        const progressWrapper = document.getElementById('progressWrapper');
        const muteBtn = document.getElementById('muteBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const speedSelect = document.getElementById('speedSelect');
        const loopBtn = document.getElementById('loopBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        const videoUrlInput = document.getElementById('videoUrlInput');
        const loadUrlButton = document.getElementById('loadUrlButton');
        const localFileInput = document.getElementById('localFile');
        const fileStatusSpan = document.getElementById('fileStatus');
        const stutterWarning = document.getElementById('stutterWarning');
        const bufferPercentSpan = document.getElementById('bufferPercent');
        const perfStatusSpan = document.getElementById('perfStatus');
        
        // ========== ANTI-LAG CORE VARIABLES ==========
        let lagScore = 0;               // Semakin tinggi semakin lemot
        let lastTimestamp = 0;
        let lastVideoTime = 0;
        let frameDropAcc = 0;
        let warningHideTimeout = null;
        let adaptiveSpeedFlag = false;   // cegah spam notif kecepatan
        
        // Notifikasi cepat
        function showToast(message, duration = 1800) {
            const toast = document.createElement('div');
            toast.className = 'toast-notif';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => { if(toast && toast.remove) toast.remove(); }, duration);
        }
        
        // Format waktu
        function formatTime(sec) {
            if (isNaN(sec) || !isFinite(sec) || sec < 0) return "00:00";
            let m = Math.floor(sec / 60);
            let s = Math.floor(sec % 60);
            return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }
        
        // Update progress bar & buffer
        function updateProgressAndBuffer() {
            if (!video.duration || isNaN(video.duration) || video.duration === 0) return;
            const percent = (video.currentTime / video.duration) * 100;
            playProgress.style.width = `${percent}%`;
            
            let bufferWidth = 0;
            if (video.buffered.length > 0) {
                const bufferedEnd = video.buffered.end(video.buffered.length - 1);
                bufferWidth = (bufferedEnd / video.duration) * 100;
                bufferProgress.style.width = `${bufferWidth}%`;
                bufferPercentSpan.innerText = `● buffer ${Math.floor(bufferWidth)}%`;
            } else {
                bufferPercentSpan.innerText = `● buffer 0%`;
            }
        }
        
        function updateTimeTexts() {
            if (!video.duration || isNaN(video.duration)) return;
            currentSpan.innerText = formatTime(video.currentTime);
            durationSpan.innerText = formatTime(video.duration);
            currentLabel.innerText = formatTime(video.currentTime);
            durationLabel.innerText = formatTime(video.duration);
        }
        
        function updatePlayIcon() {
            playIcon.innerText = video.paused ? '▶' : '⏸';
        }
        
        function updateLoopStyle() {
            loopBtn.style.opacity = video.loop ? '1' : '0.6';
            loopBtn.style.color = video.loop ? '#ff4757' : '#fff';
        }
        
        // ========== CORE ANTI-LAG DETECTOR (super responsif) ==========
        function analyzePerformanceAndFix() {
            if (video.paused || video.ended || video.readyState < 1) return;
            
            const now = performance.now();
            const currentVid = video.currentTime;
            
            if (lastTimestamp > 0 && lastVideoTime !== undefined && !video.seeking) {
                const realDelta = now - lastTimestamp;
                const videoDelta = currentVid - lastVideoTime;
                
                // Kondisi lag: video tidak bergerak atau bergerak sangat lambat saat seharusnya play
                if (realDelta > 120 && videoDelta < 0.03 && video.readyState >= 2 && !video.paused) {
                    lagScore = Math.min(lagScore + 0.7, 12);
                    frameDropAcc++;
                    
                    // Jika lagScore melewati threshold, aktifkan peringatan dan optimasi
                    if (lagScore >= 2.5) {
                        if (stutterWarning && stutterWarning.style.display !== 'inline-flex') {
                            stutterWarning.style.display = 'inline-flex';
                            stutterWarning.innerText = video.playbackRate > 1.2 ? '⚠️ Lag karena kecepatan tinggi! Turunkan rate.' : '🔄 Mengoptimalkan buffer...';
                            if (warningHideTimeout) clearTimeout(warningHideTimeout);
                            warningHideTimeout = setTimeout(() => {
                                if (stutterWarning && lagScore < 1.5) stutterWarning.style.display = 'none';
                            }, 2800);
                        }
                        
                        // Saran pintar hanya sekali tiap sesi
                        if (video.playbackRate > 1.4 && frameDropAcc > 4 && !adaptiveSpeedFlag) {
                            adaptiveSpeedFlag = true;
                            showToast('💡 Turunkan kecepatan ke 1x untuk pengalaman bebas lag', 3500);
                            setTimeout(() => { adaptiveSpeedFlag = false; }, 10000);
                        }
                        
                        // Optimasi paksa: pastikan preload auto & load lebih agresif
                        if (video.preload !== 'auto') video.preload = 'auto';
                        
                        // Jika buffer tipis, panggil load()
                        if (video.buffered.length > 0) {
                            const bufferLeft = video.buffered.end(video.buffered.length-1) - video.currentTime;
                            if (bufferLeft < 2.0 && video.networkState === video.NETWORK_IDLE) {
                                video.load(); // refresh buffer
                            }
                        }
                    }
                } else if (videoDelta > 0.04) {
                    // Lancar, kurangi skor lag secara bertahap
                    lagScore = Math.max(0, lagScore - 0.3);
                    frameDropAcc = Math.max(0, frameDropAcc - 0.4);
                } else if (video.readyState >= 3 && lagScore > 0) {
                    lagScore = Math.max(0, lagScore - 0.2);
                }
            }
            
            lastTimestamp = now;
            lastVideoTime = currentVid;
            
            // Update status UI berdasarkan kondisi
            let statusMsg = '', statusColor = '';
            if (lagScore < 1.2 && video.readyState >= 3) {
                statusMsg = '✅ Mode: Zero Lag';
                statusColor = '#88ffaa';
            } else if (video.buffered.length > 0) {
                const bufferAdv = video.buffered.end(video.buffered.length-1) - video.currentTime;
                if (bufferAdv > 5) {
                    statusMsg = '⚡ Streaming Super Lancar';
                    statusColor = '#aaffdd';
                } else if (bufferAdv > 2) {
                    statusMsg = '🟢 Buffer Aman';
                    statusColor = '#ffd966';
                } else {
                    statusMsg = '⚠️ Buffer Tipis, Loading...';
                    statusColor = '#ffaa66';
                }
            } else {
                statusMsg = '🔄 Menyiapkan...';
                statusColor = '#aaa';
            }
            if (perfStatusSpan) {
                perfStatusSpan.innerText = statusMsg;
                perfStatusSpan.style.color = statusColor;
            }
        }
        
        // Pemantau kesehatan buffer (prediktif)
        function checkBufferHealthAndPreventLag() {
            if (!video.duration || video.paused || video.ended || video.readyState < 1) return;
            if (video.buffered.length === 0) return;
            
            const bufferedUntil = video.buffered.end(video.buffered.length - 1);
            const bufferAhead = bufferedUntil - video.currentTime;
            const playbackRate = video.playbackRate;
            
            // Jika buffer sangat rendah dan kecepatan tinggi -> adaptif
            if (bufferAhead < 2.5 && playbackRate > 1.2 && !video.seeking && video.readyState >= 2) {
                if (stutterWarning && stutterWarning.innerText !== '⚠️ Buffer rendah! Menurunkan kecepatan...') {
                    stutterWarning.innerText = '⚠️ Buffer rendah! Menurunkan kecepatan...';
                    stutterWarning.style.display = 'inline-flex';
                    if (warningHideTimeout) clearTimeout(warningHideTimeout);
                    warningHideTimeout = setTimeout(() => {
                        if (stutterWarning && lagScore < 1) stutterWarning.style.display = 'none';
                    }, 4000);
                }
                // Rekomendasi tanpa paksa (user tetap bisa kontrol)
                if (!adaptiveSpeedFlag && playbackRate > 1.3) {
                    showToast('📉 Buffer menipis, turunkan speed agar tetap mulus', 2500);
                    adaptiveSpeedFlag = true;
                    setTimeout(() => adaptiveSpeedFlag = false, 8000);
                }
            } 
            else if (bufferAhead > 7 && stutterWarning && stutterWarning.style.display === 'inline-flex') {
                // Sembunyikan warning kalau sudah aman
                setTimeout(() => {
                    if (stutterWarning && lagScore < 0.8) stutterWarning.style.display = 'none';
                }, 1000);
            }
            
            // Jika buffer hampir habis dan video berjalan, lakukan preload ekstra
            if (bufferAhead < 1.2 && !video.paused && video.readyState < 3 && !video.seeking) {
                if (video.preload !== 'auto') video.preload = 'auto';
                // Memaksa browser memuat lebih banyak
                if (video.networkState === video.NETWORK_IDLE) {
                    video.load();
                }
            }
        }
        
        // ========== EVENT HANDLER ANTI-LAG ==========
        function onWaitingEvent() {
            lagScore = Math.min(lagScore + 1.2, 10);
            if (stutterWarning) {
                stutterWarning.innerText = '⏳ Memuat buffer cerdas...';
                stutterWarning.style.display = 'inline-flex';
                if (warningHideTimeout) clearTimeout(warningHideTimeout);
                warningHideTimeout = setTimeout(() => {
                    if (stutterWarning && video.readyState >= 3) stutterWarning.style.display = 'none';
                }, 4500);
            }
        }
        
        function onPlayingEvent() {
            lagScore = Math.max(0, lagScore - 0.9);
            if (stutterWarning && video.readyState >= 3 && lagScore < 1) {
                setTimeout(() => {
                    if (stutterWarning && lagScore < 1) stutterWarning.style.display = 'none';
                }, 1200);
            }
        }
        
        function onSeekingEvent() {
            lagScore = 0;
            frameDropAcc = 0;
            if (stutterWarning) stutterWarning.style.display = 'none';
        }
        
        let rafScheduled = false;
        function scheduleUIUpdate() {
            if (!rafScheduled) {
                requestAnimationFrame(() => {
                    updateProgressAndBuffer();
                    updateTimeTexts();
                    analyzePerformanceAndFix();
                    checkBufferHealthAndPreventLag();
                    rafScheduled = false;
                });
                rafScheduled = true;
            }
        }
        
        // ========== Attach Events ==========
        video.addEventListener('waiting', onWaitingEvent);
        video.addEventListener('playing', onPlayingEvent);
        video.addEventListener('seeked', onSeekingEvent);
        video.addEventListener('seeking', onSeekingEvent);
        video.addEventListener('timeupdate', scheduleUIUpdate);
        video.addEventListener('progress', scheduleUIUpdate);
        video.addEventListener('loadedmetadata', () => {
            updateTimeTexts();
            updateProgressAndBuffer();
            video.preload = 'auto';
            lagScore = 0;
            frameDropAcc = 0;
            if (stutterWarning) stutterWarning.style.display = 'none';
            perfStatusSpan.innerText = '✅ Siap Putar';
            fileStatusSpan.innerText = fileStatusSpan.innerText || 'Video siap';
            showToast('VORTEX Engine aktif - anti lag siap', 1200);
        });
        video.addEventListener('play', updatePlayIcon);
        video.addEventListener('pause', updatePlayIcon);
        video.addEventListener('ended', updatePlayIcon);
        video.addEventListener('ratechange', () => {
            checkBufferHealthAndPreventLag();
            if (video.playbackRate > 1.4 && video.buffered.length) {
                const ahead = video.buffered.end(video.buffered.length-1) - video.currentTime;
                if (ahead < 3.5) {
                    showToast('⚠️ Kecepatan tinggi & buffer rendah → potensi lag', 2200);
                } else {
                    showToast(`⚡ Kecepatan ${video.playbackRate}x`, 800);
                }
            } else {
                showToast(`Kecepatan ${video.playbackRate}x`, 700);
            }
        });
        
        // ========== CONTROL BUTTONS ==========
        playBtn.addEventListener('click', () => video.paused ? video.play() : video.pause());
        rewind10.addEventListener('click', () => {
            video.currentTime = Math.max(0, video.currentTime - 10);
            showToast('⏪ Mundur 10 detik', 700);
        });
        forward10.addEventListener('click', () => {
            video.currentTime = Math.min(video.duration, video.currentTime + 10);
            showToast('⏩ Maju 10 detik', 700);
        });
        progressWrapper.addEventListener('click', (e) => {
            if (!video.duration) return;
            const rect = progressWrapper.getBoundingClientRect();
            const percent = Math.min(1, Math.max(0, (e.clientX - rect.left) / rect.width));
            video.currentTime = percent * video.duration;
        });
        muteBtn.addEventListener('click', () => {
            video.muted = !video.muted;
            muteBtn.innerText = video.muted ? '🔇' : '🔊';
            if (!video.muted) volumeSlider.value = video.volume;
            else volumeSlider.value = 0;
        });
        volumeSlider.addEventListener('input', (e) => {
            const val = parseFloat(e.target.value);
            video.volume = val;
            if (val === 0) {
                video.muted = true;
                muteBtn.innerText = '🔇';
            } else {
                video.muted = false;
                muteBtn.innerText = val < 0.3 ? '🔉' : '🔊';
            }
        });
        speedSelect.addEventListener('change', (e) => {
            video.playbackRate = parseFloat(e.target.value);
        });
        loopBtn.addEventListener('click', () => {
            video.loop = !video.loop;
            updateLoopStyle();
            showToast(video.loop ? '🔁 Loop aktif' : 'Loop nonaktif', 800);
        });
        fullscreenBtn.addEventListener('click', () => {
            const container = document.querySelector('.player-container');
            if (!document.fullscreenElement) {
                container.requestFullscreen().catch(e => console.warn(e));
                fullscreenBtn.innerText = '✖';
            } else {
                document.exitFullscreen();
                fullscreenBtn.innerText = '⛶';
            }
        });
        document.addEventListener('fullscreenchange', () => {
            fullscreenBtn.innerText = document.fullscreenElement ? '✖' : '⛶';
        });
        
        // ========== LOAD URL / FILE ==========
        function loadVideoFromURL(url) {
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                showToast('URL harus http:// atau https://', 1500);
                return false;
            }
            const wasPlaying = !video.paused;
            video.pause();
            // Revoke blob sebelumnya jika ada
            if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
            video.src = url;
            video.load();
            video.preload = 'auto';
            try {
                const path = new URL(url).pathname;
                const fname = path.split('/').pop() || 'Video Online';
                fileStatusSpan.innerText = fname.substring(0, 48);
            } catch(e) { fileStatusSpan.innerText = 'Stream Online'; }
            if (wasPlaying) video.play().catch(() => showToast('Klik play untuk mulai', 1000));
            lagScore = 0;
            frameDropAcc = 0;
            if (stutterWarning) stutterWarning.style.display = 'none';
            showToast('🚀 Memuat dengan engine turbo...', 1800);
            return true;
        }
        
        loadUrlButton.addEventListener('click', () => {
            let url = videoUrlInput.value.trim();
            if (!url) { showToast('Masukkan URL video', 1200); return; }
            loadVideoFromURL(url);
        });
        
        localFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('video/')) {
                showToast('Pilih file video yang valid', 1500);
                return;
            }
            if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
            const blobUrl = URL.createObjectURL(file);
            const wasPlaying = !video.paused;
            video.pause();
            video.src = blobUrl;
            video.load();
            video.preload = 'auto';
            fileStatusSpan.innerText = file.name.substring(0, 48);
            if (wasPlaying) video.play().catch(() => {});
            videoUrlInput.value = file.name;
            localFileInput.value = '';
            lagScore = 0;
            if (stutterWarning) stutterWarning.style.display = 'none';
            showToast(`📂 ${file.name} dimuat zero lag`, 1800);
        });
        
        // ========== INITIAL SETUP ==========
        video.volume = 0.7;
        volumeSlider.value = 0.7;
        video.playbackRate = 1;
        speedSelect.value = '1';
        video.preload = 'auto';
        updatePlayIcon();
        updateLoopStyle();
        fileStatusSpan.innerText = 'BigBuckBunny (demo turbo)';
        setInterval(() => {
            if (!video.paused && video.readyState >= 2) {
                checkBufferHealthAndPreventLag();
            }
        }, 750);
        
        window.addEventListener('resize', () => updateProgressAndBuffer());
        console.log('VORTEX Zero Lag Turbo Engine — performa maksimal tanpa gangguan');
    })();
</script>
</body>
</html>
