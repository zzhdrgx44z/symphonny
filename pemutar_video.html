<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VORTEX Player | Pemutar Video Premium</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0a0c15 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        /* efek glassmorphism background */
        body::before {
            content: '';
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 71, 87, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            animation: fadeInUp 0.6s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        }

        /* header premium */
        .hero {
            text-align: center;
            padding: 16px 0 8px;
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #FFB8C5 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            text-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .hero .badge {
            display: inline-block;
            background: rgba(255, 71, 87, 0.2);
            backdrop-filter: blur(4px);
            border-radius: 100px;
            padding: 6px 16px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #ff8a9a;
            margin-top: 12px;
            border: 1px solid rgba(255,71,87,0.3);
        }

        /* player card premium */
        .player-card {
            background: rgba(12, 15, 25, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 20px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }

        .player-container {
            position: relative;
            width: 100%;
            border-radius: 24px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        video {
            width: 100%;
            display: block;
            cursor: pointer;
            transition: all 0.2s;
        }

        /* kontrol premium */
        .controls {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.6) 80%, transparent);
            padding: 20px 24px 18px;
            transition: opacity 0.3s ease;
        }

        .progress-section {
            margin-bottom: 16px;
        }

        .progress-container {
            width: 100%;
            height: 5px;
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: height 0.1s ease;
            position: relative;
        }

        .progress-container:hover {
            height: 8px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #ff4757, #ff7e5e);
            width: 0%;
            border-radius: 10px;
            position: relative;
            transition: width 0.05s linear;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            right: -4px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 6px #ff4757;
        }

        .progress-container:hover .progress-bar::after {
            opacity: 1;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #ddd;
            letter-spacing: 0.3px;
        }

        .button-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .left-group, .right-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .ctrl-btn {
            background: rgba(255, 255, 255, 0.08);
            border: none;
            color: white;
            font-size: 1.2rem;
            width: 42px;
            height: 42px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            backdrop-filter: blur(4px);
        }

        .ctrl-btn:hover {
            background: rgba(255, 71, 87, 0.85);
            transform: scale(1.05);
        }

        .play-btn {
            background: #ff4757;
            width: 52px;
            height: 52px;
            font-size: 1.6rem;
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }

        .play-btn:hover {
            background: #ff6b81;
            transform: scale(1.05);
        }

        .time-display {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        /* volume & speed */
        .vol-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.4);
            padding: 0 8px;
            border-radius: 40px;
        }

        .volume-slider {
            width: 80px;
            height: 4px;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.3);
            border-radius: 5px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: #ff4757;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 4px #ff4757;
        }

        .speed-select {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            padding: 6px 12px;
            font-size: 0.8rem;
            font-weight: 600;
            color: white;
            cursor: pointer;
            outline: none;
            font-family: inherit;
            backdrop-filter: blur(4px);
            transition: 0.2s;
        }

        .speed-select:hover {
            background: #ff4757;
            border-color: #ff4757;
        }

        /* area pemilihan video premium */
        .source-panel {
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 24px 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: all 0.2s;
        }

        .source-panel h3 {
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #f0f0f0;
        }

        .input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .video-url-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            font-size: 0.9rem;
            outline: none;
            transition: all 0.2s;
        }

        .video-url-input:focus {
            border-color: #ff4757;
            box-shadow: 0 0 0 2px rgba(255,71,87,0.3);
        }

        .btn-primary {
            background: linear-gradient(95deg, #ff4757, #ff6a4b);
            border: none;
            border-radius: 60px;
            padding: 0 28px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255,71,87,0.3);
        }

        .file-label {
            background: rgba(30, 144, 255, 0.9);
            border-radius: 60px;
            padding: 14px 28px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .file-label:hover {
            background: #1e90ff;
            transform: translateY(-2px);
        }

        .info-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            font-size: 0.8rem;
            color: #aaa;
            gap: 12px;
        }

        .loop-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(0,0,0,0.4);
            padding: 6px 14px;
            border-radius: 40px;
        }

        .loop-btn {
            background: none;
            border: none;
            font-size: 1.2rem;
            cursor: pointer;
            color: #ccc;
            transition: 0.1s;
        }

        .loop-btn.active {
            color: #ff4757;
            text-shadow: 0 0 4px #ff4757;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #5a6275;
            margin-top: 12px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 780px) {
            body {
                padding: 16px;
            }
            .ctrl-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
            .play-btn {
                width: 48px;
                height: 48px;
            }
            .button-bar {
                gap: 10px;
            }
            .source-panel {
                padding: 18px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>VORTEX PLAYER</h1>
        <div class="badge">✦ Immersive Experience ✦</div>
    </div>

    <div class="player-card">
        <div class="player-container">
            <video id="videoPlayer" preload="metadata">
                <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" type="video/mp4">
                Browser tidak mendukung video modern.
            </video>

            <div class="controls">
                <div class="progress-section">
                    <div class="progress-container" id="progressContainer">
                        <div class="progress-bar" id="progressBar"></div>
                    </div>
                    <div class="time-info">
                        <span id="currentTimeLabel">00:00</span>
                        <span id="durationLabel">00:00</span>
                    </div>
                </div>

                <div class="button-bar">
                    <div class="left-group">
                        <button class="ctrl-btn play-btn" id="playPauseBtn">
                            <span id="playIcon">▶</span>
                        </button>
                        <button class="ctrl-btn" id="rewindBtn" title="Mundur 10 detik">⏪</button>
                        <button class="ctrl-btn" id="forwardBtn" title="Maju 10 detik">⏩</button>
                        <div class="time-display">
                            <span id="currentTime">00:00</span> / <span id="duration">00:00</span>
                        </div>
                    </div>

                    <div class="right-group">
                        <div class="vol-control">
                            <button class="ctrl-btn" id="muteBtn" style="width: 38px;">🔊</button>
                            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.01" value="1">
                        </div>
                        
                        <select id="speedControl" class="speed-select">
                            <option value="0.5">0.5x</option>
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.25">1.25x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>

                        <div class="loop-badge">
                            <button class="loop-btn" id="loopBtn" title="Ulangi video">🔁</button>
                        </div>

                        <button class="ctrl-btn" id="fullscreenBtn" title="Layar penuh">⛶</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="source-panel">
        <h3>🎬 Sumber Video Premium</h3>
        <div class="input-group">
            <input type="text" class="video-url-input" id="videoUrl" 
                   placeholder="https:// atau file online .mp4 / .webm ...">
            <button class="btn-primary" id="loadUrlBtn">✨ Muat URL</button>
            <input type="file" id="videoFile" accept="video/*" style="display: none;">
            <label for="videoFile" class="file-label">📁 Pilih File Lokal</label>
        </div>
        <div class="info-row">
            <span>🎥 Format: MP4, WebM, MOV, AVI, MKV (didukung browser)</span>
            <span id="videoNameStatus" style="color:#ff8a9a;">✨ BigBuckBunny (demo)</span>
        </div>
    </div>
    <div class="footer">
        <p>Kontrol premium • Kecepatan putar • Loop • Kualitas tinggi</p>
    </div>
</div>

<script>
    // ----- ELEMEN DOM -----
    const video = document.getElementById('videoPlayer');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const playIconSpan = document.getElementById('playIcon');
    const rewindBtn = document.getElementById('rewindBtn');
    const forwardBtn = document.getElementById('forwardBtn');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('duration');
    const progressBar = document.getElementById('progressBar');
    const progressContainer = document.getElementById('progressContainer');
    const muteBtn = document.getElementById('muteBtn');
    const volumeSlider = document.getElementById('volumeSlider');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const videoUrlInput = document.getElementById('videoUrl');
    const loadUrlBtn = document.getElementById('loadUrlBtn');
    const videoFileInput = document.getElementById('videoFile');
    const speedControl = document.getElementById('speedControl');
    const loopBtn = document.getElementById('loopBtn');
    const videoNameStatus = document.getElementById('videoNameStatus');
    const currentTimeLabel = document.getElementById('currentTimeLabel');
    const durationLabel = document.getElementById('durationLabel');

    // ----- Helper format waktu (mm:ss) -----
    function formatTime(seconds) {
        if (isNaN(seconds) || !isFinite(seconds)) return "00:00";
        const mins = Math.floor(seconds / 60);
        const secs = Math.floor(seconds % 60);
        return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
    }

    // update semua tampilan waktu dan progress
    function updateTimeAndProgress() {
        if (!video.duration || isNaN(video.duration)) {
            durationSpan.textContent = "00:00";
            durationLabel.textContent = "00:00";
            return;
        }
        const current = video.currentTime;
        const dur = video.duration;
        currentTimeSpan.textContent = formatTime(current);
        durationSpan.textContent = formatTime(dur);
        currentTimeLabel.textContent = formatTime(current);
        durationLabel.textContent = formatTime(dur);
        
        const percent = (current / dur) * 100;
        progressBar.style.width = `${percent}%`;
    }

    // sinkronisasi ikon play/pause
    function updatePlayPauseIcon() {
        if (video.paused) {
            playIconSpan.textContent = '▶';
        } else {
            playIconSpan.textContent = '⏸';
        }
    }

    // perbaharui status loop button
    function updateLoopUI() {
        if (video.loop) {
            loopBtn.classList.add('active');
        } else {
            loopBtn.classList.remove('active');
        }
    }

    // event listener untuk timeupdate
    function onTimeUpdate() {
        updateTimeAndProgress();
    }

    // saat metadata dimuat
    function onLoadedMetadata() {
        updateTimeAndProgress();
        durationSpan.textContent = formatTime(video.duration);
        durationLabel.textContent = formatTime(video.duration);
        // set volume slider sesuai volume video
        volumeSlider.value = video.volume;
        if (video.muted) volumeSlider.value = 0;
    }

    // bersihkan event lama agar tidak double, tapi kita re-attach setelah ganti sumber? lebih aman pakai flag
    // kita akan pasang event listener sekali di awal, karena video element tetap sama.
    // Namun saat ganti src, metadata akan terpicu lagi.

    // handle error video
    function onVideoError() {
        alert("Gagal memuat video. Periksa URL / format file. Pastikan sumber dapat diakses.");
        console.error("Video error:", video.error);
    }

    // fungsi untuk memuat video dari URL dengan reset state
    function loadVideoFromUrl(url) {
        if (!url) return false;
        // cek validasi URL sederhana
        if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('blob:')) {
            alert("URL harus diawali http:// atau https://");
            return false;
        }
        video.pause();
        video.src = url;
        video.load();
        // update nama status
        try {
            let urlObj = new URL(url);
            let fileName = urlObj.pathname.split('/').pop();
            if (fileName && fileName.length > 0) {
                videoNameStatus.textContent = `🎬 ${fileName.substring(0, 40)}`;
            } else {
                videoNameStatus.textContent = `🎬 Video Online`;
            }
        } catch(e) {
            videoNameStatus.textContent = `🎬 Video Eksternal`;
        }
        video.play().then(() => {
            updatePlayPauseIcon();
        }).catch(err => {
            console.log("Autoplay ditolak atau error:", err);
            updatePlayPauseIcon();
        });
        return true;
    }

    // muat file lokal
    function loadLocalFile(file) {
        if (!file) return;
        if (!file.type.startsWith('video/')) {
            alert("Harap pilih file video yang valid (MP4, WebM, dll).");
            return;
        }
        // revoke blob lama jika ada untuk kebersihan
        if (video.src && video.src.startsWith('blob:')) {
            URL.revokeObjectURL(video.src);
        }
        const blobUrl = URL.createObjectURL(file);
        video.pause();
        video.src = blobUrl;
        video.load();
        videoNameStatus.textContent = `📁 ${file.name.substring(0, 48)}`;
        video.play().then(() => {
            updatePlayPauseIcon();
        }).catch(e => updatePlayPauseIcon());
        videoUrlInput.value = file.name;
    }

    // ----- EVENT LISTENER -----
    playPauseBtn.addEventListener('click', () => {
        if (video.paused) {
            video.play();
        } else {
            video.pause();
        }
        updatePlayPauseIcon();
    });

    rewindBtn.addEventListener('click', () => {
        video.currentTime = Math.max(0, video.currentTime - 10);
    });

    forwardBtn.addEventListener('click', () => {
        video.currentTime = Math.min(video.duration, video.currentTime + 10);
    });

    progressContainer.addEventListener('click', (e) => {
        if (!video.duration || isNaN(video.duration)) return;
        const rect = progressContainer.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const width = rect.width;
        const seekTo = (clickX / width) * video.duration;
        video.currentTime = seekTo;
    });

    muteBtn.addEventListener('click', () => {
        video.muted = !video.muted;
        if (video.muted) {
            muteBtn.textContent = '🔇';
            volumeSlider.value = 0;
        } else {
            muteBtn.textContent = '🔊';
            volumeSlider.value = video.volume;
        }
    });

    volumeSlider.addEventListener('input', (e) => {
        const val = parseFloat(e.target.value);
        video.volume = val;
        video.muted = (val === 0);
        if (val === 0) {
            muteBtn.textContent = '🔇';
        } else if (val < 0.3) {
            muteBtn.textContent = '🔉';
        } else {
            muteBtn.textContent = '🔊';
        }
    });

    // kontrol kecepatan putar
    speedControl.addEventListener('change', (e) => {
        video.playbackRate = parseFloat(e.target.value);
    });

    // Loop toggle
    loopBtn.addEventListener('click', () => {
        video.loop = !video.loop;
        updateLoopUI();
    });

    // Fullscreen pada player-container (lebih immersive)
    const playerContainerDiv = document.querySelector('.player-container');
    fullscreenBtn.addEventListener('click', () => {
        if (!document.fullscreenElement) {
            if (playerContainerDiv.requestFullscreen) {
                playerContainerDiv.requestFullscreen();
            } else if (playerContainerDiv.webkitRequestFullscreen) {
                playerContainerDiv.webkitRequestFullscreen();
            } else if (playerContainerDiv.msRequestFullscreen) {
                playerContainerDiv.msRequestFullscreen();
            }
            fullscreenBtn.textContent = '✖';
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
            fullscreenBtn.textContent = '⛶';
        }
    });
    document.addEventListener('fullscreenchange', () => {
        if (!document.fullscreenElement) {
            fullscreenBtn.textContent = '⛶';
        } else {
            fullscreenBtn.textContent = '✖';
        }
    });

    // URL Load
    loadUrlBtn.addEventListener('click', () => {
        let rawUrl = videoUrlInput.value.trim();
        if (rawUrl === "") {
            alert("Masukkan URL video terlebih dahulu.");
            return;
        }
        loadVideoFromUrl(rawUrl);
    });

    // File lokal
    videoFileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            loadLocalFile(e.target.files[0]);
        }
        videoFileInput.value = ''; // reset agar bisa pilih file sama lagi
    });

    // event video bawaan
    video.addEventListener('timeupdate', onTimeUpdate);
    video.addEventListener('loadedmetadata', onLoadedMetadata);
    video.addEventListener('play', () => updatePlayPauseIcon());
    video.addEventListener('pause', () => updatePlayPauseIcon());
    video.addEventListener('ended', () => {
        updatePlayPauseIcon();
        // progress tetap di akhir, tapi biarkan.
        if (!video.loop) {
            progressBar.style.width = '100%';
        }
    });
    video.addEventListener('error', onVideoError);
    video.addEventListener('volumechange', () => {
        if (video.muted) {
            muteBtn.textContent = '🔇';
            volumeSlider.value = 0;
        } else {
            volumeSlider.value = video.volume;
            if (video.volume === 0) muteBtn.textContent = '🔇';
            else if (video.volume < 0.3) muteBtn.textContent = '🔉';
            else muteBtn.textContent = '🔊';
        }
    });

    // inisialisasi tampilan awal (video demo sudah ada)
    window.addEventListener('load', () => {
        onLoadedMetadata();
        updatePlayPauseIcon();
        updateLoopUI();
        video.volume = 1.0;
        volumeSlider.value = 1.0;
        video.playbackRate = 1.0;
        speedControl.value = "1";
        videoNameStatus.textContent = "🎬 BigBuckBunny (Demo)";
        // pastikan progress dan durasi terupdate
        setTimeout(() => {
            if (video.readyState >= 1) updateTimeAndProgress();
        }, 100);
    });

    // tambahan: ketika memuat URL, kita set autoplay
    // double check untuk menghapus blob url setelah ganti sumber
    // kebersihan memory: ketika video src berubah dari blob, revoke sebelumnya
    let currentBlobUrl = null;
    const originalSetSrc = Object.getOwnPropertyDescriptor(HTMLMediaElement.prototype, 'src').set;
    // tidak perlu override, cukup kita handle di loadLocalFile
    // untuk keamanan tambahan, saat loadVideoFromUrl jika sebelumnya blob, revoke.
    window.revokeBlobIfNeeded = () => {
        if (video.src && video.src.startsWith('blob:')) {
            URL.revokeObjectURL(video.src);
        }
    };
    // pasang sebelum ganti src di fungsi
    const originalLoadVideo = loadVideoFromUrl;
    window.loadVideoFromUrl = (url) => {
        if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
        originalLoadVideo(url);
    };
    // perbaiki loadVideoFromUrl agar revoke
    loadVideoFromUrl = function(url) {
        if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
        if (!url) return false;
        if (!url.startsWith('http://') && !url.startsWith('https://') && !url.startsWith('blob:')) {
            alert("URL harus http/https");
            return false;
        }
        video.pause();
        video.src = url;
        video.load();
        try {
            let urlObj = new URL(url);
            let fileName = urlObj.pathname.split('/').pop();
            if (fileName && fileName.length > 0) {
                videoNameStatus.textContent = `🎬 ${fileName.substring(0, 40)}`;
            } else {
                videoNameStatus.textContent = `🎬 Video Online`;
            }
        } catch(e) {
            videoNameStatus.textContent = `🎬 Video Eksternal`;
        }
        video.play().then(() => {
            updatePlayPauseIcon();
        }).catch(() => updatePlayPauseIcon());
        return true;
    };
    // reassign ke tombol
    document.getElementById('loadUrlBtn').onclick = () => {
        let rawUrl = videoUrlInput.value.trim();
        if (rawUrl === "") {
            alert("Masukkan URL video terlebih dahulu.");
            return;
        }
        loadVideoFromUrl(rawUrl);
    };
    // untuk file, juga revoke blob sebelumnya
    const originalFileHandler = loadLocalFile;
    window.loadLocalFile = (file) => {
        if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
        originalFileHandler(file);
    };
    videoFileInput.onchange = (e) => {
        if (e.target.files.length > 0) {
            if (video.src && video.src.startsWith('blob:')) URL.revokeObjectURL(video.src);
            loadLocalFile(e.target.files[0]);
        }
        videoFileInput.value = '';
    };
    
    // fix: perbaharui saat video duration berubah
    video.addEventListener('durationchange', () => {
        durationSpan.textContent = formatTime(video.duration);
        durationLabel.textContent = formatTime(video.duration);
        updateTimeAndProgress();
    });
</script>
</body>
</html>
