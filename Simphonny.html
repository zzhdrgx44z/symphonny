 <!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYMPHONNY // CYBER_OPS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #020408;
            --bg-card: rgba(8, 15, 25, 0.85);
            --neon-cyan: #00f0ff;
            --neon-pink: #ff2d6a;
            --neon-green: #39ff14;
            --neon-orange: #ff6b2d;
            --text-primary: #f0f4f8;
            --text-secondary: #7a8b9a;
            --border-glow: rgba(0, 240, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- LAYERS BACKGROUND --- */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        #bg-canvas {
            opacity: 0.6;
        }

        .grid-overlay {
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 50px 50px; }
        }

        .scanline {
            background: linear-gradient(
                transparent 50%,
                rgba(0, 0, 0, 0.1) 50%
            );
            background-size: 100% 4px;
            animation: scanlines 0.1s linear infinite;
        }

        @keyframes scanlines {
            0% { background-position: 0 0; }
            100% { background-position: 0 4px; }
        }

        .vignette {
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.8) 100%);
        }

        /* --- GLOW ORBS --- */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 15s ease-in-out infinite;
        }

        .orb-1 {
            width: 400px; height: 400px;
            background: var(--neon-cyan);
            top: -100px; right: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px; height: 300px;
            background: var(--neon-pink);
            bottom: -50px; left: -50px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 200px; height: 200px;
            background: var(--neon-orange);
            top: 50%; left: 30%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.1); }
            50% { transform: translate(-20px, 20px) scale(0.9); }
            75% { transform: translate(40px, 10px) scale(1.05); }
        }

        /* --- LOADER --- */
        .loader-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-container.hide {
            opacity: 0;
            visibility: hidden;
        }

        .loader-ring {
            width: 120px; height: 120px;
            position: relative;
        }

        .loader-ring::before,
        .loader-ring::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 3px solid transparent;
        }

        .loader-ring::before {
            inset: 0;
            border-top-color: var(--neon-cyan);
            border-right-color: var(--neon-cyan);
            animation: spinRing 1.2s linear infinite;
        }

        .loader-ring::after {
            inset: 15px;
            border-bottom-color: var(--neon-pink);
            border-left-color: var(--neon-pink);
            animation: spinRing 1s linear infinite reverse;
        }

        .loader-core {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 30px; height: 30px;
            background: var(--neon-green);
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
            box-shadow: 0 0 30px var(--neon-green);
        }

        @keyframes spinRing { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(0.6); } }

        .loader-text {
            margin-top: 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            letter-spacing: 8px;
            color: var(--neon-cyan);
            animation: textGlitch 2s infinite;
        }

        @keyframes textGlitch {
            0%, 90%, 100% { opacity: 1; transform: translateX(0); }
            92% { opacity: 0.8; transform: translateX(-2px); text-shadow: 2px 0 var(--neon-pink); }
            94% { opacity: 0.8; transform: translateX(2px); text-shadow: -2px 0 var(--neon-cyan); }
        }

        /* --- HEADER --- */
        header {
            padding: 100px 20px 60px;
            text-align: center;
            position: relative;
        }

        .header-decoration {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-pink), transparent);
            animation: headerPulse 3s ease-in-out infinite;
        }

        @keyframes headerPulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .title-container {
            position: relative;
            display: inline-block;
        }

        .title-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: var(--text-primary);
            position: relative;
            text-shadow: 
                0 0 10px rgba(0, 240, 255, 0.8),
                0 0 40px rgba(0, 240, 255, 0.4),
                0 0 80px rgba(0, 240, 255, 0.2);
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { 
                text-shadow: 
                    0 0 10px rgba(0, 240, 255, 0.8),
                    0 0 40px rgba(0, 240, 255, 0.4),
                    0 0 80px rgba(0, 240, 255, 0.2);
            }
            50% { 
                text-shadow: 
                    0 0 20px rgba(0, 240, 255, 1),
                    0 0 60px rgba(0, 240, 255, 0.6),
                    0 0 100px rgba(0, 240, 255, 0.3),
                    0 0 120px rgba(255, 45, 106, 0.2);
            }
        }

        .title-glitch {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: 12px;
            color: var(--neon-pink);
            opacity: 0;
            animation: glitchEffect 4s infinite;
            clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
        }

        .title-glitch:nth-child(2) {
            color: var(--neon-cyan);
            clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
            animation-delay: 0.2s;
        }

        @keyframes glitchEffect {
            0%, 85%, 100% { opacity: 0; transform: translate(0); }
            86% { opacity: 0.8; transform: translate(-3px, 0); }
            88% { opacity: 0.8; transform: translate(3px, 0); }
            90% { opacity: 0; transform: translate(0); }
        }

        .title-line {
            position: absolute;
            bottom: -15px; left: 50%;
            transform: translateX(-50%);
            width: 200px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-pink), transparent);
        }

        .title-line::before,
        .title-line::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 8px; height: 8px;
            background: var(--neon-cyan);
            border-radius: 50%;
            transform: translateY(-50%);
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .title-line::before { left: 0; }
        .title-line::after { right: 0; background: var(--neon-pink); box-shadow: 0 0 15px var(--neon-pink); }

        .subtitle {
            margin-top: 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--neon-pink);
            letter-spacing: 10px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* --- SEARCH BAR --- */
        .search-container {
            max-width: 650px;
            margin: 50px auto;
            position: relative;
            z-index: 10;
        }

        .search-wrapper {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 60px;
            padding: 6px;
            display: flex;
            align-items: center;
            transition: all 0.4s ease;
            box-shadow: 
                0 0 30px rgba(0, 0, 0, 0.5),
                inset 0 0 30px rgba(0, 240, 255, 0.03);
            position: relative;
            overflow: hidden;
        }

        .search-wrapper::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .search-wrapper:hover::before {
            left: 100%;
        }

        .search-wrapper:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 
                0 0 40px rgba(0, 240, 255, 0.2),
                inset 0 0 30px rgba(0, 240, 255, 0.05);
        }

        .search-icon {
            padding: 15px 25px;
            color: var(--neon-cyan);
            font-size: 1.3rem;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            padding-right: 25px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-results {
            position: absolute;
            top: 120%; left: 0; right: 0;
            background: rgba(5, 12, 20, 0.98);
            border: 1px solid var(--neon-cyan);
            border-radius: 20px;
            max-height: 350px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(0, 240, 255, 0.1);
        }

        .search-results.show { display: block; animation: slideDown 0.3s ease; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-item {
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .result-item:last-child { border-bottom: none; }

        .result-item:hover {
            background: linear-gradient(90deg, rgba(0, 240, 255, 0.1), transparent);
            padding-left: 35px;
        }

        .result-item i { 
            color: var(--neon-cyan); 
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }
        .result-item span { font-weight: 600; font-size: 1.05rem; }

        /* --- GRID CONTAINER --- */
        .main-container {
            max-width: 1500px;
            margin: 0 auto;
            padding: 20px 40px 120px;
        }

        .section-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .section-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--neon-cyan), transparent);
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--neon-cyan);
            letter-spacing: 5px;
            white-space: nowrap;
        }

        .grid-system {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        /* --- CARD STYLE --- */
        .tech-card {
            background: var(--bg-card);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 20px;
            padding: 28px;
            position: relative;
            overflow: hidden;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(60px) scale(0.95);
        }

        .tech-card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .tech-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .tech-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(0, 240, 255, 0.06) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .tech-card:hover::before,
        .tech-card:hover::after {
            opacity: 1;
        }

        .tech-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: rgba(0, 240, 255, 0.3);
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(0, 240, 255, 0.1);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 22px;
        }

        .card-header-text h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.35rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        .tech-card:hover .card-header-text h3 {
            color: var(--neon-cyan);
        }

        .card-status {
            font-size: 0.65rem;
            padding: 5px 12px;
            border-radius: 20px;
            background: rgba(57, 255, 20, 0.1);
            color: var(--neon-green);
            border: 1px solid rgba(57, 255, 20, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-status::before {
            content: '';
            width: 6px; height: 6px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: blink 1.5s infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .card-icon-box {
            width: 56px; height: 56px;
            background: rgba(0, 240, 255, 0.05);
            border: 1px solid rgba(0, 240, 255, 0.1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            transition: all 0.4s ease;
        }

        .tech-card:hover .card-icon-box {
            background: var(--neon-cyan);
            border-color: var(--neon-cyan);
            color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.5);
            transform: rotate(-5deg) scale(1.1);
        }

        .card-body {
            flex-grow: 1;
            margin-bottom: 25px;
        }

        .card-desc {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.95rem;
        }

        .card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 22px;
            margin-top: auto;
        }

        .btn-connect {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-primary);
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 3px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-connect::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 240, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .btn-connect:hover::before {
            left: 100%;
        }

        .btn-connect:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            background: rgba(0, 240, 255, 0.05);
            box-shadow: 0 0 25px rgba(0, 240, 255, 0.2);
            transform: translateY(-2px);
        }

        .btn-connect i {
            transition: transform 0.3s ease;
        }

        .btn-connect:hover i {
            transform: translateX(5px);
        }

        /* --- FLOATING PARTICLES --- */
        .particles {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--neon-cyan);
            border-radius: 50%;
            opacity: 0;
            animation: particleFloat 8s infinite;
        }

        @keyframes particleFloat {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        /* --- FOOTER --- */
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.9));
            backdrop-filter: blur(20px);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            z-index: 50;
            border-top: 1px solid rgba(0, 240, 255, 0.1);
        }

        .footer-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(57, 255, 20, 0.05);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid rgba(57, 255, 20, 0.1);
        }

        .dot {
            width: 8px; height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--neon-green);
            animation: blink 2s infinite;
        }

        .time-display {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            color: var(--neon-cyan);
            letter-spacing: 3px;
        }

        .footer-right {
            font-size: 0.75rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title-main { font-size: 2.8rem; letter-spacing: 5px; }
            .title-glitch { font-size: 2.8rem; letter-spacing: 5px; }
            .main-container { padding: 20px 15px 120px; }
            .grid-system { grid-template-columns: 1fr; gap: 20px; }
            .footer-bar { 
                flex-direction: column; 
                gap: 15px; 
                padding: 15px 20px;
                text-align: center;
            }
            .footer-left { flex-wrap: wrap; justify-content: center; }
            .glow-orb { display: none; }
        }
    </style>
</head>
<body>

    <!-- Background Layers -->
    <canvas id="bg-canvas" class="bg-layer"></canvas>
    <div class="bg-layer grid-overlay"></div>
    <div class="bg-layer scanline"></div>
    <div class="bg-layer vignette"></div>
    
    <!-- Glow Orbs -->
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="glow-orb orb-3"></div>

    <!-- Floating Particles -->
    <div class="particles" id="particles"></div>

    <!-- Loader -->
    <div class="loader-container" id="loader">
        <div class="loader-ring">
            <div class="loader-core"></div>
        </div>
        <p class="loader-text">INITIALIZING SYSTEM</p>
    </div>

    <!-- Header -->
    <header>
        <div class="header-decoration"></div>
        <div class="title-container">
            <h1 class="title-main">SYMPHONNY</h1>
            <span class="title-glitch">SYMPHONNY</span>
            <span class="title-glitch">SYMPHONNY</span>
            <div class="title-line"></div>
        </div>
        <div class="subtitle">Secure Network Portal</div>
    </header>

    <!-- Search -->
    <div class="search-container">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search database..." autocomplete="off">
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Content -->
    <div class="main-container">
        <div class="section-header">
            <span class="section-title">System Modules</span>
            <div class="section-line"></div>
        </div>
        <div class="grid-system" id="engineGrid"></div>
    </div>

    <!-- Footer -->
    <footer class="footer-bar">
        <div class="footer-left">
            <div class="status-indicator">
                <div class="dot"></div>
                <span>Connection Encrypted</span>
            </div>
            <div class="time-display" id="timeDisplay">--:--:--</div>
        </div>
        <div class="footer-right">Cyber_Ops v2.0</div>
    </footer>

    <script>
        // --- DATA ENGINE ---
        const dataEngine = [
            { id: 1, title: "ALL PK", desc: "Database pusat seluruh PK yang tersedia dengan akses terintegrasi.", url: "https://symphonny.vercel.app/DATABASE.html", icon: "fa-database" },
            { id: 2, title: "Pemutar Video", desc: "Platform streaming dengan kualitas tinggi tanpa buffering.", url: "https://symphonny.vercel.app/pemutar_video.html", icon: "fa-play" },
            { id: 3, title: "Event Scatter", desc: "Pemantauan event scatter secara real-time dengan analisis.", url: "https://symphonny.vercel.app/Scatter_Event.html", icon: "fa-bolt" },

        // --- CREATE FLOATING PARTICLES ---
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 8 + 's';
            particle.style.animationDuration = (6 + Math.random() * 6) + 's';
            particle.style.width = (2 + Math.random() * 4) + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = Math.random() > 0.5 ? 'var(--neon-cyan)' : 'var(--neon-pink)';
            particlesContainer.appendChild(particle);
        }

        // --- RENDER CARDS ---
        const grid = document.getElementById('engineGrid');

        dataEngine.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'tech-card';
            card.style.transitionDelay = `${index * 60}ms`;

            card.innerHTML = `
                <div class="card-top">
                    <div class="card-header-text">
                        <h3>${item.title}</h3>
                        <span class="card-status">Active</span>
                    </div>
                    <div class="card-icon-box">
                        <i class="fas ${item.icon}"></i>
                    </div>
                </div>
                <div class="card-body">
                    <p class="card-desc">${item.desc}</p>
                </div>
                <div class="card-footer">
                    <button class="btn-connect" onclick="window.open('${item.url}', '_blank')">
                        <span>Connect</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);

            // Mouse tracking for card glow effect
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = ((e.clientX - rect.left) / rect.width) * 100;
                const y = ((e.clientY - rect.top) / rect.height) * 100;
                card.style.setProperty('--mouse-x', x + '%');
                card.style.setProperty('--mouse-y', y + '%');
            });
        });

        // --- INTERSECTION OBSERVER ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -50px 0px' });

        document.querySelectorAll('.tech-card').forEach(card => observer.observe(card));

        // --- SEARCH LOGIC ---
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.length < 2) {
                searchResults.classList.remove('show');
                return;
            }

            const found = dataEngine.filter(d => 
                d.title.toLowerCase().includes(val) || 
                d.desc.toLowerCase().includes(val)
            );

            if (found.length > 0) {
                searchResults.innerHTML = found.map(f => `
                    <div class="result-item" onclick="window.open('${f.url}', '_blank')">
                        <i class="fas ${f.icon}"></i>
                        <div>
                            <span>${f.title}</span>
                            <div style="font-size:0.75rem;color:var(--text-secondary);margin-top:3px;">${f.desc.substring(0, 40)}...</div>
                        </div>
                    </div>
                `).join('');
                searchResults.classList.add('show');
            } else {
                searchResults.innerHTML = '<div class="result-item"><i class="fas fa-exclamation-triangle"></i><span>No results found</span></div>';
                searchResults.classList.add('show');
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.remove('show');
            }
        });

        // --- TIME DISPLAY ---
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('timeDisplay').innerText = time;
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- BACKGROUND MATRIX RAIN ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789$#@%&*";
        const fontSize = 13;
        let columns = Math.floor(canvas.width / fontSize);
        let drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(2, 4, 8, 0.04)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const char = chars.charAt(Math.floor(Math.random() * chars.length));
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                // Gradient color effect
                const brightness = Math.random();
                if (brightness > 0.98) {
                    ctx.fillStyle = "#fff";
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = "#00f0ff";
                } else if (brightness > 0.9) {
                    ctx.fillStyle = "#00f0ff";
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = "#00f0ff";
                } else {
                    ctx.fillStyle = `rgba(0, 200, 220, ${0.3 + brightness * 0.4})`;
                    ctx.shadowBlur = 0;
                }

                ctx.fillText(char, x, y);

                if (y > canvas.height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 40);

        // Handle resize for matrix
        window.addEventListener('resize', () => {
            columns = Math.floor(canvas.width / fontSize);
            drops = Array(columns).fill(1);
        });

        // --- LOADER ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hide');
            }, 2000);
        };

        // --- PROTECTION ---
        const shortcut = {
            all_shortcuts: {},
            add: function(combo, callback, options) {
                const defaultOpts = { type: "keydown", propagate: false, disable_in_input: false, target: document, keycode: false };
                const settings = Object.assign({}, defaultOpts, options || {});
                const target = typeof settings.target === "string" ? document.getElementById(settings.target) : settings.target;
                combo = combo.toLowerCase();
                const handler = function(e) {
                    e = e || window.event;
                    if (settings.disable_in_input) {
                        let element = e.target || e.srcElement;
                        if (element.nodeType === 3) element = element.parentNode;
                        if (element.tagName === "INPUT" || element.tagName === "TEXTAREA") return;
                    }
                    const code = e.keyCode || e.which;
                    let key = String.fromCharCode(code).toLowerCase();
                    if (code === 188) key = ","; if (code === 190) key = ".";
                    const keys = combo.split("+"); let matchCount = 0;
                    const specialKeys = { esc:27, escape:27, tab:9, space:32, return:13, enter:13, backspace:8, left:37, up:38, right:39, down:40, f1:112,f2:113,f3:114,f4:115,f5:116,f6:117,f7:118,f8:119,f9:120,f10:121,f11:122,f12:123 };
                    let ctrlReq=false, shiftReq=false, altReq=false, metaReq=false;
                    let ctrl=e.ctrlKey, shift=e.shiftKey, alt=e.altKey, meta=e.metaKey;
                    for (let i=0; i<keys.length; i++) {
                        const k = keys[i];
                        if (k === "ctrl" || k === "control") { ctrlReq = true; matchCount++; }
                        else if (k === "shift") { shiftReq = true; matchCount++; }
                        else if (k === "alt") { altReq = true; matchCount++; }
                        else if (k === "meta") { metaReq = true; matchCount++; }
                        else if (k.length > 1) { if (specialKeys[k] === code) matchCount++; }
                        else if (settings.keycode ? settings.keycode === code : key === k) { matchCount++; }
                    }
                    if (matchCount === keys.length && ctrl === ctrlReq && shift === shiftReq && alt === altReq && meta === metaReq) {
                        callback(e);
                        if (!settings.propagate) { e.cancelBubble = true; e.returnValue = false; if (e.stopPropagation) e.stopPropagation(); if (e.preventDefault) e.preventDefault(); return false; }
                    }
                };
                this.all_shortcuts[combo] = { callback: handler, target, event: settings.type };
                target.addEventListener(settings.type, handler, false);
            }
        };

        let originalContent = null;
        let isShowingImage = false;
        let restoreTimeout = null;

        function replacePageWithImage() {
            if (isShowingImage) return;
            if (!originalContent) originalContent = document.body.innerHTML;
            isShowingImage = true;
            document.body.innerHTML = "";
            const img = document.createElement("img");
            img.src = "https://i.postimg.cc/3xMRNprQ/1765675006.png";
            img.style.width = "100%";
            img.style.height = "100vh";
            img.style.objectFit = "cover";
            document.body.appendChild(img);
            restoreTimeout = setTimeout(() => { restoreOriginalContent(); }, 1000);
        }

        function restoreOriginalContent() {
            if (!isShowingImage || !originalContent) return;
            if (restoreTimeout) { clearTimeout(restoreTimeout); restoreTimeout = null; }
            document.body.innerHTML = originalContent;
            isShowingImage = false;
            setupShortcuts();
        }

        function setupShortcuts() {
            shortcut.add("Ctrl+U", replacePageWithImage);
            shortcut.add("f12", replacePageWithImage);
        }
        setupShortcuts();

        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 67) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
        });
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
    </script>
