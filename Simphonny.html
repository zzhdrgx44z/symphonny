<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYMPHONNY // Midnight Gold</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --bg-elevated: #111111;
            --bg-card: rgba(16, 16, 16, 0.82);
            --gold: #d4a853;
            --gold-light: #f0d48a;
            --gold-dim: rgba(212, 168, 83, 0.08);
            --ember: #e8613a;
            --ember-dim: rgba(232, 97, 58, 0.1);
            --cream: #ede8df;
            --cream-soft: rgba(237, 232, 223, 0.65);
            --muted: #6b6560;
            --border: rgba(212, 168, 83, 0.1);
            --border-hover: rgba(212, 168, 83, 0.3);
            --shadow-card: 0 4px 40px rgba(0,0,0,.5), 0 1px 3px rgba(0,0,0,.3);
            --shadow-hover: 0 8px 60px rgba(0,0,0,.6), 0 0 40px rgba(212,168,83,.06);
            --radius: 16px;
        }
        *{margin:0;padding:0;box-sizing:border-box;user-select:none}
        html{scroll-behavior:smooth}
        body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--cream);min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column}

        /* ===== BACKGROUND LAYERS ===== */
        .bg-layer{position:fixed;inset:0;pointer-events:none;z-index:-1}
        #blobCanvas{opacity:.6}
        .noise-overlay{opacity:.03;mix-blend-mode:overlay;
            background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size:200px 200px}
        .warm-vignette{background:radial-gradient(ellipse at 50% 30%,transparent 20%,rgba(8,8,8,.9) 70%,rgba(8,8,8,1) 100%)}

        #mouseGlow{position:fixed;width:500px;height:500px;border-radius:50%;pointer-events:none;z-index:1;
            background:radial-gradient(circle,rgba(212,168,83,.04) 0%,transparent 60%);
            transform:translate(-50%,-50%);transition:opacity .4s;opacity:0}
        #mouseGlow.show{opacity:1}

        /* ===== LOADER ===== */
        .loader{position:fixed;inset:0;background:var(--bg);display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:9999;transition:opacity .9s cubic-bezier(.4,0,.2,1),visibility .9s;overflow:hidden}
        .loader.off{opacity:0;visibility:hidden}

        .ld-orbs{position:relative;width:140px;height:140px;margin-bottom:36px}
        .ld-orb{position:absolute;border-radius:50%;animation:orbFloat 3s ease-in-out infinite}
        .ld-orb:nth-child(1){width:60px;height:60px;top:50%;left:50%;transform:translate(-50%,-50%);
            background:radial-gradient(circle at 35% 35%,var(--gold-light),var(--gold),#a07830);
            box-shadow:0 0 30px rgba(212,168,83,.3),0 0 60px rgba(212,168,83,.1);animation-delay:0s}
        .ld-orb:nth-child(2){width:20px;height:20px;top:15%;left:65%;
            background:var(--ember);box-shadow:0 0 15px rgba(232,97,58,.3);animation-delay:-.8s;opacity:.7}
        .ld-orb:nth-child(3){width:14px;height:14px;bottom:20%;left:20%;
            background:var(--gold);box-shadow:0 0 12px rgba(212,168,83,.25);animation-delay:-1.6s;opacity:.5}
        .ld-orb:nth-child(4){width:10px;height:10px;top:60%;right:10%;
            background:var(--gold-light);box-shadow:0 0 8px rgba(240,212,138,.2);animation-delay:-2.2s;opacity:.4}
        .ld-orb:nth-child(5){width:8px;height:8px;bottom:10%;right:35%;
            background:var(--ember);box-shadow:0 0 6px rgba(232,97,58,.2);animation-delay:-.4s;opacity:.35}
        @keyframes orbFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.08)}}
        .ld-orb:nth-child(2){animation-name:orbFloat2}
        .ld-orb:nth-child(3){animation-name:orbFloat3}
        .ld-orb:nth-child(4){animation-name:orbFloat2}
        .ld-orb:nth-child(5){animation-name:orbFloat3}
        @keyframes orbFloat2{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-8px) translateX(6px)}}
        @keyframes orbFloat3{0%,100%{transform:translateY(0) translateX(0)}50%{transform:translateY(-10px) translateX(-5px)}}

        .ld-ring{position:absolute;inset:-20px;border-radius:50%;border:1px solid var(--border);animation:ringPulse 3s ease-in-out infinite}
        .ld-ring:nth-child(2){inset:-36px;animation-delay:-1s;border-color:rgba(212,168,83,.05)}
        @keyframes ringPulse{0%,100%{opacity:.4;transform:scale(1)}50%{opacity:.15;transform:scale(1.03)}}

        .ld-info{text-align:center;z-index:10}
        .ld-title{font-family:'Space Grotesk',sans-serif;font-size:clamp(1.2rem,3vw,1.6rem);font-weight:700;letter-spacing:6px;color:var(--gold);opacity:0;transform:translateY(12px);transition:all .6s cubic-bezier(.4,0,.2,1)}
        .ld-title.show{opacity:1;transform:translateY(0)}
        .ld-sub{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:4px;margin-top:6px;opacity:0;transition:opacity .5s .15s}
        .ld-sub.show{opacity:.6}
        .ld-bar-wrap{width:180px;height:2px;background:rgba(212,168,83,.08);border-radius:2px;margin:22px auto 10px;overflow:hidden;opacity:0;transition:opacity .5s}
        .ld-bar-wrap.show{opacity:1}
        .ld-bar-fill{height:100%;width:0;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:2px;transition:width .3s;box-shadow:0 0 8px rgba(212,168,83,.3)}
        .ld-pct{font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--gold);opacity:0;transition:opacity .5s}
        .ld-pct.show{opacity:.8}
        .ld-status{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--muted);letter-spacing:3px;margin-top:8px;opacity:0;transition:opacity .5s}
        .ld-status.show{opacity:.5}

        /* ===== HEADER ===== */
        header{padding:48px 20px 20px;text-align:center;position:relative}
        .hdr-line{position:absolute;top:0;left:50%;transform:translateX(-50%);width:min(80%,600px);height:1px;
            background:linear-gradient(90deg,transparent,var(--gold),var(--ember),var(--gold),transparent);opacity:.4}

        .logo-area{position:relative;display:inline-block;margin-bottom:8px}
        .logo-text{font-family:'Space Grotesk',sans-serif;font-size:clamp(2.2rem,7vw,3.8rem);font-weight:700;letter-spacing:clamp(2px,1.5vw,8px);
            color:transparent;
            background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 30%,#fff 50%,var(--gold) 70%,var(--gold-light) 100%);
            background-size:250% 250%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            animation:shimmerText 5s ease infinite;
            filter:drop-shadow(0 2px 12px rgba(212,168,83,.15))}
        @keyframes shimmerText{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

        .logo-sub{font-family:'JetBrains Mono',monospace;font-size:clamp(.5rem,1vw,.62rem);color:var(--muted);letter-spacing:clamp(4px,2vw,12px);text-transform:uppercase;opacity:.5}
        .logo-divider{display:flex;align-items:center;justify-content:center;gap:12px;margin-top:14px}
        .logo-divider span{width:40px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.3}
        .logo-divider i{font-size:.35rem;color:var(--gold);opacity:.4}

        .cmd-line{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--muted);margin-top:14px;opacity:0;transition:opacity .6s}
        .cmd-line.show{opacity:.5}
        .cmd-line .prompt{color:var(--gold)}
        .cmd-line .cmd{color:var(--cream-soft)}

        /* ===== SEARCH ===== */
        .search-box{max-width:520px;width:90%;margin:0 auto 24px;position:relative;z-index:10}
        .search-wrap{position:relative;border-radius:60px;overflow:hidden}
        .search-wrap::before{content:'';position:absolute;inset:0;border-radius:60px;padding:1px;
            background:linear-gradient(135deg,var(--border),rgba(232,97,58,.15),var(--border));
            -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
            -webkit-mask-composite:xor;mask-composite:exclude;transition:all .4s}
        .search-wrap:focus-within::before{
            background:linear-gradient(135deg,var(--gold),var(--ember),var(--gold));
            box-shadow:0 0 20px rgba(212,168,83,.1)}
        .search-inner{background:rgba(12,12,12,.95);border-radius:60px;padding:12px 20px;display:flex;align-items:center;gap:12px;backdrop-filter:blur(20px)}
        .search-inner i{color:var(--gold);font-size:.9rem;opacity:.6}
        .search-inner input{flex:1;background:0 0;border:none;outline:none;color:var(--cream);font-family:'DM Sans',sans-serif;font-size:.9rem}
        .search-inner input::placeholder{color:var(--muted);opacity:.5}
        .s-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:rgba(14,14,14,.98);border:1px solid var(--border-hover);border-radius:14px;max-height:260px;overflow-y:auto;display:none;z-index:100;backdrop-filter:blur(30px);box-shadow:var(--shadow-card)}
        .s-results.open{display:block;animation:sIn .3s cubic-bezier(.4,0,.2,1)}
        @keyframes sIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
        .s-res-item{padding:11px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .2s;border-bottom:1px solid rgba(255,255,255,.02)}
        .s-res-item:last-child{border-bottom:none}
        .s-res-item:hover{background:var(--gold-dim)}
        .s-res-item i{color:var(--gold);width:18px;text-align:center;font-size:.8rem;opacity:.7}
        .s-res-item .sri-title{font-weight:600;font-size:.85rem}
        .s-res-item .sri-desc{font-size:.6rem;color:var(--muted);margin-top:2px}

        /* ===== TICKER ===== */
        .ticker-bar{max-width:1200px;width:95%;margin:0 auto 32px;background:var(--bg-elevated);border:1px solid var(--border);border-radius:10px;overflow:hidden;display:flex;align-items:center;padding:0 14px}
        .ticker-badge{background:var(--ember);color:#fff;padding:3px 10px;border-radius:4px;font-family:'Space Grotesk',sans-serif;font-size:.55rem;font-weight:700;margin-right:14px;white-space:nowrap;letter-spacing:1px}
        .ticker-scroll{overflow:hidden;flex:1}
        .ticker-move{display:inline-block;white-space:nowrap;padding-left:100%;animation:tickScroll 25s linear infinite;color:var(--muted);font-size:.75rem;letter-spacing:.5px}
        .ticker-move b{color:var(--gold);font-weight:600;margin:0 6px}
        @keyframes tickScroll{to{transform:translateX(-100%)}}

        /* ===== MAIN GRID ===== */
        .main-wrap{max-width:1300px;width:100%;margin:0 auto;padding:0 clamp(14px,4vw,40px) 160px}
        .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:clamp(14px,2vw,20px)}

        /* ===== CARD ===== */
        .t-card{position:relative;border-radius:var(--radius);overflow:hidden;opacity:0;transform:translateY(28px);transition:transform .25s ease-out,box-shadow .4s,opacity .6s;will-change:transform;cursor:default}
        .t-card.vis{opacity:1;transform:translateY(0)}

        .t-card .card-glass{position:absolute;inset:0;background:var(--bg-card);backdrop-filter:blur(12px);z-index:0;
            border:1px solid var(--border);border-radius:var(--radius);transition:border-color .4s,box-shadow .4s}
        .t-card:hover .card-glass{border-color:var(--border-hover);box-shadow:var(--shadow-hover)}

        .t-card .card-warm-top{position:absolute;top:0;left:0;right:0;height:50%;border-radius:var(--radius) var(--radius) 0 0;
            background:linear-gradient(180deg,rgba(212,168,83,.03) 0%,transparent 100%);z-index:1;pointer-events:none}

        .t-card .spotlight{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:0;transition:opacity .3s;border-radius:var(--radius)}
        .t-card:hover .spotlight{opacity:1}

        .t-card .gold-line{position:absolute;bottom:0;left:0;width:0;height:2px;background:linear-gradient(90deg,var(--gold),var(--ember));z-index:3;transition:width .5s cubic-bezier(.4,0,.2,1);border-radius:0 2px 0 0}
        .t-card:hover .gold-line{width:100%}

        .t-card .mod-id{position:absolute;top:10px;right:14px;z-index:4;font-family:'JetBrains Mono',monospace;font-size:.45rem;color:rgba(212,168,83,.15);letter-spacing:1px;transition:color .3s}
        .t-card:hover .mod-id{color:rgba(212,168,83,.4)}

        .card-content{position:relative;z-index:5;padding:18px 18px 16px;display:flex;flex-direction:column;min-height:200px}

        .c-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
        .c-info h3{font-family:'Space Grotesk',sans-serif;font-size:clamp(.82rem,1.8vw,.95rem);font-weight:600;letter-spacing:.3px;color:var(--cream);transition:color .3s;line-height:1.3}
        .t-card:hover .c-info h3{color:var(--gold-light)}
        .c-status{font-size:.5rem;padding:3px 8px;border-radius:20px;background:rgba(212,168,83,.06);color:var(--gold);border:1px solid rgba(212,168,83,.12);text-transform:uppercase;letter-spacing:1.5px;font-weight:600;display:inline-flex;align-items:center;gap:5px;margin-top:6px;font-family:'JetBrains Mono',monospace}
        .c-status::before{content:'';width:4px;height:4px;background:var(--gold);border-radius:50%;box-shadow:0 0 6px rgba(212,168,83,.5);animation:pulse 2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px rgba(212,168,83,.5)}50%{opacity:.3;box-shadow:0 0 2px rgba(212,168,83,.2)}}

        .c-icon{width:42px;height:42px;border-radius:12px;background:var(--gold-dim);border:1px solid rgba(212,168,83,.1);display:flex;align-items:center;justify-content:center;font-size:.95rem;color:var(--gold);transition:all .4s cubic-bezier(.4,0,.2,1);flex-shrink:0}
        .t-card:hover .c-icon{background:var(--gold);color:var(--bg);border-color:var(--gold);box-shadow:0 4px 20px rgba(212,168,83,.25);transform:scale(1.05)}

        .c-body{flex:1;margin-bottom:12px}
        .c-desc{color:var(--cream-soft);line-height:1.55;font-size:clamp(.72rem,1.5vw,.82rem);font-weight:300}
        .c-meta{display:flex;gap:12px;margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:.5rem;color:var(--muted);letter-spacing:.3px;opacity:.5}
        .c-meta i{margin-right:3px;font-size:.45rem}

        .c-foot{border-top:1px solid rgba(255,255,255,.03);padding-top:12px;margin-top:auto}
        .btn-go{width:100%;padding:10px;background:0 0;border:1px solid rgba(255,255,255,.06);color:var(--cream-soft);border-radius:10px;font-family:'Space Grotesk',sans-serif;font-size:clamp(.6rem,1.2vw,.7rem);cursor:pointer;transition:all .4s;text-transform:uppercase;letter-spacing:2.5px;display:flex;align-items:center;justify-content:center;gap:8px;position:relative;overflow:hidden;font-weight:500}
        .btn-go::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(212,168,83,.1),rgba(232,97,58,.08));transform:translateY(100%);transition:transform .45s cubic-bezier(.4,0,.2,1)}
        .btn-go:hover::before{transform:translateY(0)}
        .btn-go:hover{border-color:var(--gold);color:var(--gold-light);box-shadow:0 0 16px rgba(212,168,83,.08)}
        .btn-go i{font-size:.6rem;transition:transform .3s}
        .btn-go:hover i{transform:translateX(4px)}

        /* ===== TOAST ===== */
        .toast-wrap{position:fixed;top:20px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:8px}
        .toast{background:rgba(16,16,16,.96);border:1px solid var(--border-hover);border-left:3px solid var(--gold);padding:10px 16px;border-radius:10px;font-family:'JetBrains Mono',monospace;font-size:.7rem;color:var(--cream-soft);box-shadow:var(--shadow-card);animation:tIn .4s cubic-bezier(.4,0,.2,1),tOut .4s ease 4s forwards;backdrop-filter:blur(20px);display:flex;align-items:center;gap:8px}
        .toast.err{border-color:var(--ember);border-left-color:var(--ember)}
        .toast.ok{border-color:var(--gold);border-left-color:var(--gold)}
        .toast i{font-size:.7rem}
        @keyframes tIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes tOut{to{opacity:0;transform:translateX(100%)}}

        /* ===== FOOTER ===== */
        .foot{position:fixed;bottom:0;width:100%;z-index:50;border-top:1px solid var(--border);background:linear-gradient(180deg,transparent 0%,rgba(8,8,8,.97) 30%);backdrop-filter:blur(20px)}
        .foot-wave{height:22px;overflow:hidden;opacity:.5}
        .foot-wave canvas{width:100%;height:100%;display:block}
        .foot-inner{padding:6px 20px 10px;display:flex;justify-content:space-between;align-items:center;font-size:.75rem;color:var(--muted)}
        .foot-l{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
        .foot-dot{display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;border:1px solid rgba(212,168,83,.1);font-size:.55rem;font-family:'JetBrains Mono',monospace;letter-spacing:1px;color:var(--gold);opacity:.6}
        .foot-dot .d{width:5px;height:5px;background:var(--gold);border-radius:50%;box-shadow:0 0 8px rgba(212,168,83,.4);position:relative}
        .foot-dot .d::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid rgba(212,168,83,.2);animation:dRing 2s ease-out infinite}
        @keyframes dRing{to{transform:scale(2.2);opacity:0}}
        .foot-time{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--gold);letter-spacing:2px;opacity:.7}
        .foot-r{display:flex;align-items:center;gap:10px;font-size:.5rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);opacity:.4}
        .foot-ver{padding:2px 8px;border:1px solid var(--border);border-radius:4px;font-family:'Space Grotesk',sans-serif;color:var(--gold);font-size:.48rem;opacity:.7}

        /* ===== SCROLLBAR ===== */
        ::-webkit-scrollbar{width:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(212,168,83,.15);border-radius:10px}
        ::-webkit-scrollbar-thumb:hover{background:rgba(212,168,83,.3)}

        @media(max-width:768px){
            .foot-inner{flex-direction:column;gap:6px}.foot-l{justify-content:center}.foot-r{display:none}
            .grid{grid-template-columns:1fr}.hdr-line{width:90%}
        }
        @media(max-width:480px){
            header{padding-top:36px}
            .card-content{padding:14px 14px 12px;min-height:180px}
        }
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

<canvas id="blobCanvas" class="bg-layer"></canvas>
<div class="bg-layer noise-overlay"></div>
<div class="bg-layer warm-vignette"></div>
<div id="mouseGlow"></div>

<div class="toast-wrap" id="toastWrap"></div>

<!-- ===== LOADER ===== -->
<div class="loader" id="loader">
    <div class="ld-orbs">
        <div class="ld-ring"></div><div class="ld-ring"></div>
        <div class="ld-orb"></div><div class="ld-orb"></div><div class="ld-orb"></div><div class="ld-orb"></div><div class="ld-orb"></div>
    </div>
    <div class="ld-info">
        <div class="ld-title" id="ldTitle">SYMPHONNY</div>
        <div class="ld-sub" id="ldSub">ESTABLISHING SECURE LINK</div>
        <div class="ld-bar-wrap" id="ldBarW"><div class="ld-bar-fill" id="ldBar"></div></div>
        <div class="ld-pct" id="ldPct">0%</div>
        <div class="ld-status" id="ldStatus">STANDBY</div>
    </div>
</div>

<header>
    <div class="hdr-line"></div>
    <div class="logo-area">
        <div class="logo-text">SYMPHONNY</div>
    </div>
    <div class="logo-sub">Premium Interface</div>
    <div class="logo-divider"><span></span><i class="fas fa-diamond"></i><span></span></div>
    <div class="cmd-line" id="cmdLine"><span class="prompt">symphonny@init:</span> <span class="cmd" id="cmdText"></span><span style="animation:pulse .8s step-end infinite;color:var(--gold)">_</span></div>
</header>

<div class="search-box">
    <div class="search-wrap">
        <div class="search-inner">
            <i class="fas fa-search"></i>
            <input type="text" id="searchIn" placeholder="Cari modul..." autocomplete="off">
        </div>
    </div>
    <div class="s-results" id="sRes"></div>
</div>

<div class="ticker-bar">
    <div class="ticker-badge">LIVE</div>
    <div class="ticker-scroll">
        <div class="ticker-move">SYSTEM UPDATE V2.5 <b>///</b> NEW MODULE: HITUNGAN PARLAY <b>///</b> MAINTENANCE: SUNDAY 02:00 UTC <b>///</b> ALL NODES NOMINAL <b>///</b> SHIELD PROTOCOL v3 ACTIVE <b>///</b> WELCOME TO SYMPHONNY</div>
    </div>
</div>

<div class="main-wrap">
    <div class="grid" id="grid"></div>
</div>

<footer class="foot">
    <div class="foot-wave"><canvas id="waveC"></canvas></div>
    <div class="foot-inner">
        <div class="foot-l"><div class="foot-dot"><div class="d"></div><span>Secured</span></div><div class="foot-time" id="fTime">--:--:--</div></div>

/* ===== LOADER ===== */
!function(){
    const tt=document.getElementById('ldTitle'),ts=document.getElementById('ldSub'),
          bw=document.getElementById('ldBarW'),bar=document.getElementById('ldBar'),
          pc=document.getElementById('ldPct'),st=document.getElementById('ldStatus'),
          ld=document.getElementById('loader'),dur=2800,t0=Date.now();
    const ph=[{a:200,f:()=>tt.classList.add('show')},{a:500,f:()=>ts.classList.add('show')},{a:800,f:()=>{bw.classList.add('show');pc.classList.add('show');st.classList.add('show')}}];
    const steps=[{a:0,t:'STANDBY'},{a:400,t:'CONNECTING'},{a:1000,t:'LOADING MODULES'},{a:1800,t:'VERIFYING'},{a:2400,t:'READY'}];
    !function tick(){
        const el=Date.now()-t0,p=Math.min(1,el/dur),pct=Math.round(p*100);
        ph.forEach(x=>{if(el>=x.a&&!x.d){x.f();x.d=1}});
        let s=steps[0].t;steps.forEach(x=>{if(el>=x.a)s=x.t});st.textContent=s;
        bar.style.width=pct+'%';pc.textContent=pct+'%';
        p<1?requestAnimationFrame(tick):setTimeout(()=>ld.classList.add('off'),400)
    }()
}();

/* ===== BLOB CANVAS ===== */
!function(){
    const c=document.getElementById('blobCanvas'),x=c.getContext('2d');
    let w,h;function rs(){w=c.width=innerWidth;h=c.height=innerHeight}addEventListener('resize',rs);rs();
    const blobs=[
        {x:.2,y:.3,r:300,color:[212,168,83],speed:.0004,phase:0},
        {x:.7,y:.2,r:250,color:[232,97,58],speed:.0005,phase:2},
        {x:.5,y:.7,r:350,color:[180,140,60],speed:.0003,phase:4},
        {x:.8,y:.8,r:200,color:[200,120,40],speed:.0006,phase:1}
    ];
    let t=0;
    !function draw(){
        x.clearRect(0,0,w,h);
        blobs.forEach(b=>{
            const bx=w*b.x+Math.sin(t*b.speed+b.phase)*100;
            const by=h*b.y+Math.cos(t*b.speed*1.3+b.phase)*80;
            const r=Math.max(10,b.r+Math.sin(t*b.speed*2+b.phase)*40);
            const grd=x.createRadialGradient(bx,by,0,bx,by,r);
            grd.addColorStop(0,`rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.06)`);
            grd.addColorStop(.5,`rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.02)`);
            grd.addColorStop(1,'rgba(0,0,0,0)');
            x.fillStyle=grd;x.fillRect(0,0,w,h);
        });
        t+=16;requestAnimationFrame(draw);
    }();
}();

/* ===== FOOTER WAVE ===== */
!function(){
    const c=document.getElementById('waveC'),x=c.getContext('2d');let wo=0;
    function rs(){c.width=c.parentElement.clientWidth*2;c.height=44}addEventListener('resize',rs);rs();
    !function draw(){
        x.clearRect(0,0,c.width,c.height);const w=c.width,h=c.height;
        [[.006,4,'rgba(212,168,83,.1)',0],[.009,3,'rgba(232,97,58,.07)',.5],[.004,5,'rgba(180,140,60,.05)',1]].forEach(([freq,amp,col,off])=>{
            x.beginPath();
            for(let px=0;px<=w;px+=2){const py=h/2+Math.sin(px*freq+wo+off)*amp+Math.sin(px*freq*1.8+wo*.7+off)*amp*.4;px===0?x.moveTo(px,py):x.lineTo(px,py)}
            x.strokeStyle=col;x.lineWidth=1.2;x.stroke()});
        wo+=.02;requestAnimationFrame(draw);
    }();
}();
