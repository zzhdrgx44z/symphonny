<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYMPHONNY // CYBER_OPS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #03050a;
            --glass: rgba(10, 20, 30, 0.6);
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --neon-green: #0aff10;
            --text-primary: #e0e6ed;
            --text-secondary: #6d7d8a;
            --border-light: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            perspective: 1000px;
        }

        /* --- ANIMATED BACKGROUND --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        /* --- LOADER --- */
        .loader-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loader-container.hide { opacity: 0; pointer-events: none; }

        .spinner {
            width: 100px; height: 100px;
            position: relative;
        }
        .spinner::before, .spinner::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            animation: spin 2s linear infinite;
        }
        .spinner::before {
            width: 100%; height: 100%;
            border: 4px solid transparent;
            border-top-color: var(--neon-cyan);
            border-bottom-color: var(--neon-pink);
        }
        .spinner::after {
            width: 70%; height: 70%;
            top: 15%; left: 15%;
            border: 4px solid transparent;
            border-left-color: var(--neon-green);
            border-right-color: var(--neon-cyan);
            animation-direction: reverse;
            animation-duration: 1.5s;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- HEADER --- */
        header {
            padding: 80px 20px 40px;
            text-align: center;
            position: relative;
        }

        .title-main {
            font-family: 'Orbitron', sans-serif;
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 5px;
            color: transparent;
            background: linear-gradient(90deg, #fff, var(--neon-cyan));
            -webkit-background-clip: text;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.4);
            position: relative;
            display: inline-block;
        }
        
        /* Efek Garis Dekoratif */
        .title-main::after {
            content: '';
            position: absolute;
            bottom: -10px; left: 50%;
            transform: translateX(-50%);
            width: 60%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
        }

        .subtitle {
            margin-top: 20px;
            font-size: 1rem;
            color: var(--neon-pink);
            letter-spacing: 8px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* --- SEARCH BAR --- */
        .search-container {
            max-width: 600px;
            margin: 40px auto;
            position: relative;
            z-index: 10;
        }

        .search-wrapper {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-light);
            border-radius: 50px;
            padding: 5px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }

        .search-wrapper:focus-within {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        .search-icon {
            padding: 15px 20px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1.1rem;
            font-weight: 500;
            padding-right: 20px;
        }

        .search-results {
            position: absolute;
            top: 120%; left: 0; right: 0;
            background: rgba(5, 10, 15, 0.95);
            border: 1px solid var(--neon-cyan);
            border-radius: 15px;
            max-height: 300px;
            overflow-y: auto;
            display: none;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        .search-results.show { display: block; animation: fadeIn 0.2s; }

        .result-item {
            padding: 15px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .result-item:hover {
            background: rgba(0, 243, 255, 0.1);
            padding-left: 30px;
        }
        .result-item i { color: var(--neon-cyan); }
        .result-item span { font-weight: 600; }

        /* --- GRID CONTAINER --- */
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px 100px;
        }

        .grid-system {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        /* --- CARD STYLE --- */
        .tech-card {
            background: linear-gradient(145deg, rgba(10, 15, 25, 0.6), rgba(5, 5, 10, 0.9));
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            opacity: 0;
            transform: translateY(50px);
        }
        
        .tech-card.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Garis Sudut Kartu */
        .tech-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(45deg, transparent 40%, rgba(0, 243, 255, 0.1) 50%, transparent 60%);
            background-size: 200% 200%;
            transition: all 0.5s;
            opacity: 0;
        }

        .tech-card:hover::before {
            animation: shine 1.5s infinite;
            opacity: 1;
        }

        .tech-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.1);
        }

        @keyframes shine {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .card-icon-box {
            width: 50px; height: 50px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: var(--neon-cyan);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.1);
            transition: 0.3s;
        }

        .tech-card:hover .card-icon-box {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .card-header-text h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            margin-bottom: 5px;
        }

        .card-status {
            font-size: 0.7rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(10, 255, 16, 0.1);
            color: var(--neon-green);
            border: 1px solid rgba(10, 255, 16, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-body {
            flex-grow: 1;
            margin-bottom: 20px;
        }
        
        .card-desc {
            color: var(--text-secondary);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .card-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 20px;
            margin-top: auto;
        }

        .btn-connect {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--text-secondary);
            color: var(--text-primary);
            border-radius: 8px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-connect:hover {
            border-color: var(--neon-cyan);
            color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.05);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        /* --- FOOTER --- */
        .footer-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            z-index: 50;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .dot {
            width: 8px; height: 8px;
            background: var(--neon-green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--neon-green);
            animation: blink 2s infinite;
        }

        @keyframes blink { 50% { opacity: 0.3; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 768px) {
            .title-main { font-size: 2.5rem; letter-spacing: 2px; }
            .main-container { padding: 20px; }
            .footer-bar { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Loader -->
    <div class="loader-container" id="loader">
        <div class="spinner"></div>
        <p style="margin-top: 20px; letter-spacing: 5px; color: #fff;">INITIALIZING SYSTEM</p>
    </div>

    <!-- Background Animation Canvas -->
    <canvas id="bg-canvas"></canvas>

    <!-- Header -->
    <header>
        <h1 class="title-main">SYMPHONNY</h1>
        <div class="subtitle">Secure Network Portal</div>
    </header>

    <!-- Search -->
    <div class="search-container">
        <div class="search-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" class="search-input" id="searchInput" placeholder="Search database..." autocomplete="off">
        </div>
        <div class="search-results" id="searchResults"></div>
    </div>

    <!-- Content -->
    <div class="main-container">
        <div class="grid-system" id="engineGrid"></div>
    </div>

    <!-- Footer -->
    <footer class="footer-bar">
        <div class="status-indicator"><div class="dot"></div> Connection Encrypted</div>
        <div id="timeDisplay">--:--:--</div>
    </footer>

    <script>
        // --- DATA ENGINE ---
        const dataEngine = [
            { id: 1, title: "ALL PK", desc: "Database pusat seluruh PK yang tersedia.", url: "https://symphonny.vercel.app/DATABASE.html", icon: "fa-database" },
            { id: 2, title: "Pemutar Video", desc: "Platform streaming dengan kualitas tinggi.", url: "https://symphonny.vercel.app/pemutar_video.html", icon: "fa-play" },
            { id: 3, title: "Event Scatter", desc: "Pemantauan event scatter secara real-time.", url: "https://symphonny.vercel.app/Scatter_Event.html", icon: "fa-bolt" },
            { id: 4, title: "Jadwal Togel", desc: "Jadwal lengkap undian 24/7 non-stop.", url: "https://symphonny.vercel.app/JADWAL_TOGEL_LINETOGEL.html", icon: "fa-calendar-alt" },
            { id: 5, title: "Live Games", desc: "Streaming dealer langsung dari studio.", url: "https://symphonny.vercel.app/LIVEGAMES_GAMEPLAY.html", icon: "fa-video" },
            { id: 6, title: "Togel Engine", desc: "Mesin analisis probabilitas angka.", url: "https://symphonny.vercel.app/Gameplay_Togel.html", icon: "fa-cogs" },
            { id: 7, title: "Kalkulator AI", desc: "Prediksi cerdas berbasis kecerdasan buatan.", url: "https://symphonny.vercel.app/Perhitungan_togel.html", icon: "fa-brain" },
            { id: 8, title: "QRIS Payment", desc: "Ger pembayaran cepat QRIS.", url: "https://symphonny.vercel.app/Bukti-qris.html", icon: "fa-qrcode" },
            { id: 9, title: "Live Casino", desc: "Akses VIP ruang casino premium.", url: "https://symphonny.vercel.app/Live_games.html", icon: "fa-dice" },
            { id: 10, title: "Link Alternatif", desc: "Cadangan akses anti-blokir.", url: "https://symphonny.vercel.app/all_dashboard.html", icon: "fa-link" },
            { id: 11, title: "Bonus Line", desc: "Informasi bonus dan promosi terbaru.", url: "https://symphonny.vercel.app/bonuslinetogel.html", icon: "fa-gift" },
            { id: 12, title: "Hadiah Togel", desc: "Daftar hadiah maximal 4D/3D/2D.", url: "https://symphonny.vercel.app/hadiah_togel.html", icon: "fa-trophy" },
            { id: 13, title: "IDN Poker", desc: "Arena player vs player terpercaya.", url: "https://symphonny.vercel.app/IDN_POKER.html", icon: "fa-club" },
            { id: 14, title: "Gaple Online", desc: "Permainan domino klasik modern.", url: "https://symphonny.vercel.app/IDN_GAPLE.html", icon: "fa-table" },
            { id: 15, title: "Screen Rec", desc: "Alat perekam layar private.", url: "https://symphonny.vercel.app/SCREEN_RECORDER_PRIVATE.html", icon: "fa-record-vinyl" },
            { id: 16, title: "Galeri Slot", desc: "Katalog game slot terlengkap.", url: "https://symphonny.vercel.app/games_slot.html", icon: "fa-th-large" },
            { id: 17, title: "Gameplay Slot", desc: "Putar reel dan raih kemenangan.", url: "https://symphonny.vercel.app/Gameplay_Slot.html", icon: "fa-coins" },
            { id: 18, title: "Text Gen", desc: "Generator kata kunci otomatis.", url: "https://symphonny.vercel.app/generate_kata.html", icon: "fa-font" }
        ];

        // --- RENDER CARDS ---
        const grid = document.getElementById('engineGrid');

        dataEngine.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'tech-card';
            card.style.transitionDelay = `${index * 50}ms`;

            card.innerHTML = `
                <div class="card-top">
                    <div class="card-header-text">
                        <h3>${item.title}</h3>
                        <span class="card-status">System Active</span>
                    </div>
                    <div class="card-icon-box">
                        <i class="fas ${item.icon}"></i>
                    </div>
                </div>
                <div class="card-body">
                    <p class="card-desc">${item.desc}</p>
                </div>
                <div class="card-footer">
                    <button class="btn-connect" onclick="window.open('${item.url}', '_blank')">
                        Connect <i class="fas fa-arrow-right" style="margin-left:10px;"></i>
                    </button>
                </div>
            `;
            grid.appendChild(card);
        });

        // --- ANIMATIONS & OBSERVER ---
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.tech-card').forEach(card => observer.observe(card));

        // --- SEARCH LOGIC ---
        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');

        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            if (val.length < 2) {
                searchResults.classList.remove('show');
                return;
            }

            const found = dataEngine.filter(d => d.title.toLowerCase().includes(val));
            
            if (found.length > 0) {
                searchResults.innerHTML = found.map(f => `
                    <div class="result-item" onclick="window.open('${f.url}', '_blank')">
                        <i class="fas ${f.icon}"></i>
                        <span>${f.title}</span>
                    </div>
                `).join('');
                searchResults.classList.add('show');
            } else {
                searchResults.innerHTML = '<div class="result-item"><span>No results found</span></div>';
                searchResults.classList.add('show');
            }
        });

        // Close search on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                searchResults.classList.remove('show');
            }
        });

        // --- TIME DISPLAY ---
        setInterval(() => {
            const time = new Date().toLocaleTimeString('en-US', { hour12: false });
            document.getElementById('timeDisplay').innerText = time;
        }, 1000);

        // --- BACKGROUND MATRIX RAIN ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const letters = "010101010101 SYMPHONNY SYSTEM DATA";
        const fontSize = 14;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(3, 5, 10, 0.05)"; // Trail effect
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "#00f3ff"; // Text color
            ctx.font = fontSize + "px arial";

            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        setInterval(drawMatrix, 33);

        // --- LOADER ---
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').classList.add('hide');
            }, 1500);
        };

        // --- PROTECTION (Preserved) ---
        const shortcut = {
            all_shortcuts: {},
            add: function(combo, callback, options) {
                const defaultOpts = { type: "keydown", propagate: false, disable_in_input: false, target: document, keycode: false };
                const settings = Object.assign({}, defaultOpts, options || {});
                const target = typeof settings.target === "string" ? document.getElementById(settings.target) : settings.target;
                combo = combo.toLowerCase();
                const handler = function(e) {
                    e = e || window.event;
                    if (settings.disable_in_input) {
                        let element = e.target || e.srcElement;
                        if (element.nodeType === 3) element = element.parentNode;
                        if (element.tagName === "INPUT" || element.tagName === "TEXTAREA") return;
                    }
                    const code = e.keyCode || e.which;
                    let key = String.fromCharCode(code).toLowerCase();
                    if (code === 188) key = ","; if (code === 190) key = ".";
                    const keys = combo.split("+"); let matchCount = 0;
                    const specialKeys = { esc:27, escape:27, tab:9, space:32, return:13, enter:13, backspace:8, left:37, up:38, right:39, down:40, f1:112,f2:113,f3:114,f4:115,f5:116,f6:117,f7:118,f8:119,f9:120,f10:121,f11:122,f12:123 };
                    let ctrlReq=false, shiftReq=false, altReq=false, metaReq=false;
                    let ctrl=e.ctrlKey, shift=e.shiftKey, alt=e.altKey, meta=e.metaKey;
                    for (let i=0; i<keys.length; i++) {
                        const k = keys[i];
                        if (k === "ctrl" || k === "control") { ctrlReq = true; matchCount++; }
                        else if (k === "shift") { shiftReq = true; matchCount++; }
                        else if (k === "alt") { altReq = true; matchCount++; }
                        else if (k === "meta") { metaReq = true; matchCount++; }
                        else if (k.length > 1) { if (specialKeys[k] === code) matchCount++; }
                        else if (settings.keycode ? settings.keycode === code : key === k) { matchCount++; }
                    }
                    if (matchCount === keys.length && ctrl === ctrlReq && shift === shiftReq && alt === altReq && meta === metaReq) {
                        callback(e);
                        if (!settings.propagate) { e.cancelBubble = true; e.returnValue = false; if (e.stopPropagation) e.stopPropagation(); if (e.preventDefault) e.preventDefault(); return false; }
                    }
                };
                this.all_shortcuts[combo] = { callback: handler, target, event: settings.type };
                target.addEventListener(settings.type, handler, false);
            }
        };

        let originalContent = null;
        let isShowingImage = false;
        let restoreTimeout = null;

        function replacePageWithImage() {
            if (isShowingImage) return;
            if (!originalContent) originalContent = document.body.innerHTML;
            isShowingImage = true;
            document.body.innerHTML = "";
            const img = document.createElement("img");
            img.src = "https://i.postimg.cc/3xMRNprQ/1765675006.png";
            img.style.width = "100%";
            img.style.height = "100vh";
            img.style.objectFit = "cover";
            document.body.appendChild(img);
            restoreTimeout = setTimeout(() => { restoreOriginalContent(); }, 1000);
        }

        function restoreOriginalContent() {
            if (!isShowingImage || !originalContent) return;
            if (restoreTimeout) { clearTimeout(restoreTimeout); restoreTimeout = null; }
            document.body.innerHTML = originalContent;
            isShowingImage = false;
            setupShortcuts();
        }

        function setupShortcuts() {
            shortcut.add("Ctrl+U", replacePageWithImage);
            shortcut.add("f12", replacePageWithImage);
        }
        setupShortcuts();

        document.addEventListener('keydown', function(e) {
            if (e.keyCode === 123) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 73) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 74) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.shiftKey && e.keyCode === 67) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 85) { e.preventDefault(); return false; }
            if (e.ctrlKey && e.keyCode === 83) { e.preventDefault(); return false; }
        });
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
        document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
    </script>
</body>
</html>
