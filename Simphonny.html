<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYMPHONNY // Ultra HD</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;700&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020205;
            --bg-card: rgba(8, 8, 16, 0.45);
            --gold: #d4a853;
            --gold-light: #f0d48a;
            --gold-pale: #fff8e6;
            --gold-dim: rgba(212, 168, 83, 0.04);
            --ember: #e8613a;
            --cream: #f2ede4;
            --cream-soft: rgba(242, 237, 228, 0.6);
            --muted: #55504a;
            --border: rgba(212, 168, 83, 0.07);
            --border-hover: rgba(212, 168, 83, 0.35);
            --radius: 20px;
            --glass-blur: 30px;
        }
        * { margin:0; padding:0; box-sizing:border-box; user-select:none; }
        html { scroll-behavior:smooth; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
        body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--cream); min-height:100vh; overflow-x:hidden; display:flex; flex-direction:column; }

        /* ===== HD BACKGROUND LAYERS ===== */
        .bg-layer { position:fixed; inset:0; pointer-events:none; z-index:-1; }
        #particleCanvas { z-index:-2; }
        .mesh-bg { background: radial-gradient(ellipse 90% 60% at 20% 20%, rgba(212,168,83,.03) 0%, transparent 60%), radial-gradient(ellipse 70% 70% at 80% 80%, rgba(232,97,58,.02) 0%, transparent 50%); }
        .noise-overlay { opacity:.035; mix-blend-mode:overlay; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); background-size:256px; }
        .grid-bg { background-image: linear-gradient(rgba(212,168,83,.012) 1px, transparent 1px), linear-gradient(90deg, rgba(212,168,83,.012) 1px, transparent 1px); background-size:120px 120px; mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,black,transparent 70%); }
        .vignette { background:radial-gradient(ellipse at 50% 40%, transparent 10%, rgba(2,2,5,.7) 60%, rgba(2,2,5,1) 100%); }

        #mouseGlow { position:fixed; width:800px; height:800px; border-radius:50%; pointer-events:none; z-index:1; background:radial-gradient(circle, rgba(212,168,83,.025) 0%, rgba(232,97,58,.008) 40%, transparent 65%); transform:translate(-50%,-50%); transition:opacity .6s; opacity:0; filter:blur(40px); }
        #mouseGlow.show { opacity:1; }

        /* ===== LOADER ===== */
        .loader { position:fixed; inset:0; background:var(--bg); display:flex; justify-content:center; align-items:center; z-index:9999; transition:opacity 1.2s, visibility 1.2s; }
        .loader.off { opacity:0; visibility:hidden; pointer-events:none; }
        .loader-canvas { position:absolute; inset:0; width:100%; height:100%; }
        .ld-center { position:relative; z-index:10; display:flex; flex-direction:column; align-items:center; }
        .ld-ring-wrap { position:relative; width:180px; height:180px; margin-bottom:40px; }
        .ld-ring-svg { width:100%; height:100%; animation:ldRotate 4s linear infinite; filter:drop-shadow(0 0 10px rgba(212,168,83,.2)); }
        .ld-ring-svg circle { fill:none; stroke-width:1; stroke-linecap:round; }
        .ring-1 { stroke:var(--gold); stroke-dasharray:120 380; opacity:.7; }
        .ring-2 { stroke:var(--ember); stroke-dasharray:80 420; opacity:.3; animation:ldRingDash 3s ease-in-out infinite alternate; }
        @keyframes ldRotate { to { transform:rotate(360deg); } }
        @keyframes ldRingDash { 0%{stroke-dasharray:80 420} 100%{stroke-dasharray:160 340} }
        .ld-core { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:50px; height:50px; border-radius:50%; background:radial-gradient(circle at 30% 30%, #fff, var(--gold-light), var(--gold), #7a5510); box-shadow:0 0 50px rgba(212,168,83,.5), 0 0 100px rgba(212,168,83,.15); animation:corePulse 2s ease-in-out infinite; }
        @keyframes corePulse { 0%,100%{box-shadow:0 0 50px rgba(212,168,83,.5),0 0 100px rgba(212,168,83,.15)} 50%{box-shadow:0 0 70px rgba(212,168,83,.7),0 0 140px rgba(212,168,83,.25)} }
        .ld-orbit { position:absolute; top:50%; left:50%; border-radius:50%; transform-origin:0 0; }
        .ld-orbit:nth-child(3) { width:8px; height:8px; background:var(--ember); box-shadow:0 0 12px rgba(232,97,58,.6); animation:orbit1 3s linear infinite; }
        .ld-orbit:nth-child(4) { width:6px; height:6px; background:var(--gold-light); box-shadow:0 0 10px rgba(240,212,138,.5); animation:orbit2 4s linear infinite; }
        .ld-orbit:nth-child(5) { width:5px; height:5px; background:var(--gold); box-shadow:0 0 8px rgba(212,168,83,.4); animation:orbit3 5s linear infinite; }
        @keyframes orbit1 { 0%{transform:rotate(0deg) translateX(60px)} 100%{transform:rotate(360deg) translateX(60px)} }
        @keyframes orbit2 { 0%{transform:rotate(120deg) translateX(50px)} 100%{transform:rotate(480deg) translateX(50px)} }
        @keyframes orbit3 { 0%{transform:rotate(240deg) translateX(70px)} 100%{transform:rotate(600deg) translateX(70px)} }
        .ld-title { font-family:'Space Grotesk',sans-serif; font-size:2.2rem; font-weight:800; letter-spacing:10px; color:var(--gold); opacity:0; transform:translateY(20px) scale(.9); transition:all 1s cubic-bezier(.4,0,.2,1); text-shadow:0 0 30px rgba(212,168,83,.3); }
        .ld-title.show { opacity:1; transform:translateY(0) scale(1); }
        .ld-sub { font-family:'JetBrains Mono',monospace; font-size:.55rem; color:var(--muted); letter-spacing:6px; margin-top:10px; opacity:0; transition:opacity .6s .2s; text-transform:uppercase; }
        .ld-sub.show { opacity:.5; }
        .ld-bar-wrap { width:200px; height:2px; background:rgba(212,168,83,.06); border-radius:2px; margin:28px auto 12px; overflow:hidden; opacity:0; transition:opacity .6s; }
        .ld-bar-wrap.show { opacity:1; }
        .ld-bar-fill { height:100%; width:0; background:linear-gradient(90deg, var(--gold), var(--ember), var(--gold-light)); border-radius:2px; transition:width .2s; box-shadow:0 0 15px rgba(212,168,83,.5); }
        .ld-pct { font-family:'JetBrains Mono',monospace; font-size:.75rem; color:var(--gold); opacity:0; transition:opacity .6s; letter-spacing:4px; }
        .ld-pct.show { opacity:.7; }
        .ld-status { font-family:'JetBrains Mono',monospace; font-size:.5rem; color:var(--muted); letter-spacing:5px; margin-top:10px; opacity:0; transition:opacity .6s; text-transform:uppercase; }
        .ld-status.show { opacity:.4; }

        /* ===== HEADER ===== */
        header { padding:50px 20px 24px; text-align:center; position:relative; }
        .hdr-line { position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg, transparent 10%, rgba(212,168,83,.15) 50%, transparent 90%); }
        .hdr-cross { position:absolute; top:12px; left:50%; transform:translateX(-50%); }
        .hdr-cross::before,.hdr-cross::after { content:''; position:absolute; background:var(--gold); opacity:.2; }
        .hdr-cross::before { width:8px; height:1px; top:3px; left:0; }
        .hdr-cross::after { width:1px; height:8px; top:0; left:3px; }

        #logoCanvas { max-width:90vw; height:clamp(50px, 8vw, 80px); display:block; margin:0 auto 6px; }

        .logo-sub { font-family:'JetBrains Mono',monospace; font-size:clamp(.4rem,.9vw,.52rem); color:var(--muted); letter-spacing:clamp(6px,3vw,18px); text-transform:uppercase; opacity:.3; }
        .logo-divider { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:16px; }
        .logo-divider .ld-line { width:70px; height:1px; background:linear-gradient(90deg, transparent, var(--gold), transparent); opacity:.15; }
        .logo-divider .ld-diamond { width:5px; height:5px; background:var(--gold); transform:rotate(45deg); opacity:.25; box-shadow:0 0 10px rgba(212,168,83,.3); }

        .cmd-line { font-family:'JetBrains Mono',monospace; font-size:.58rem; color:var(--muted); margin-top:16px; opacity:0; transition:opacity .6s; display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border:1px solid rgba(212,168,83,.04); border-radius:6px; background:rgba(212,168,83,.01); }
        .cmd-line.show { opacity:.4; }
        .cmd-line .prompt { color:var(--gold); }
        .cmd-line .cmd { color:var(--cream-soft); }
        .cmd-cursor { display:inline-block; width:6px; height:12px; background:var(--gold); opacity:.6; animation:cursorBlink .8s step-end infinite; vertical-align:middle; margin-left:2px; }
        @keyframes cursorBlink { 0%,100%{opacity:.6} 50%{opacity:0} }

        /* ===== SEARCH ===== */
        .search-box { max-width:560px; width:92%; margin:0 auto 28px; position:relative; z-index:10; }
        .search-wrap { position:relative; border-radius:16px; }
        .search-wrap::before { content:''; position:absolute; inset:-1px; border-radius:16px; padding:1px; background:linear-gradient(135deg, rgba(212,168,83,.12), rgba(232,97,58,.06), rgba(212,168,83,.12)); -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite:xor; mask-composite:exclude; transition:all .5s; }
        .search-wrap:focus-within::before { background:linear-gradient(135deg, var(--gold), var(--ember), var(--gold)); box-shadow:0 0 40px rgba(212,168,83,.1); }
        .search-inner { background:rgba(4,4,10,.8); border-radius:16px; padding:14px 20px; display:flex; align-items:center; gap:14px; backdrop-filter:blur(var(--glass-blur)) saturate(180%); }
        .search-inner i { color:var(--gold); font-size:.85rem; opacity:.4; transition:all .3s; }
        .search-wrap:focus-within .search-inner i { opacity:.9; text-shadow:0 0 8px rgba(212,168,83,.3); }
        .search-inner input { flex:1; background:0 0; border:none; outline:none; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:.88rem; letter-spacing:.3px; font-weight:500; }
        .search-inner input::placeholder { color:var(--muted); opacity:.3; }
        .s-results { position:absolute; top:calc(100% + 10px); left:0; right:0; background:rgba(4,4,10,.98); border:1px solid var(--border-hover); border-radius:14px; max-height:280px; overflow-y:auto; display:none; z-index:100; backdrop-filter:blur(40px) saturate(180%); box-shadow:0 20px 60px rgba(0,0,0,.7); }
        .s-results.open { display:block; animation:sIn .35s cubic-bezier(.4,0,.2,1); }
        @keyframes sIn { from{opacity:0;transform:translateY(-8px) scale(.98)} to{opacity:1;transform:translateY(0) scale(1)} }
        .s-res-item { padding:12px 16px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all .2s; border-bottom:1px solid rgba(255,255,255,.02); }
        .s-res-item:last-child { border-bottom:none; }
        .s-res-item:hover { background:var(--gold-dim); padding-left:22px; }
        .s-res-item i { color:var(--gold); width:16px; text-align:center; font-size:.8rem; opacity:.5; transition:all .3s; }
        .s-res-item:hover i { opacity:1; filter:drop-shadow(0 0 5px rgba(212,168,83,.4)); }
        .sri-title { font-weight:600; font-size:.82rem; letter-spacing:.2px; }
        .sri-desc { font-size:.55rem; color:var(--muted); margin-top:2px; }

        /* ===== TICKER ===== */
        .ticker-bar { max-width:1200px; width:95%; margin:0 auto 32px; background:rgba(4,4,10,.4); border:1px solid var(--border); border-radius:12px; overflow:hidden; display:flex; align-items:center; padding:0 16px; backdrop-filter:blur(8px); }
        .ticker-badge { background:linear-gradient(135deg, var(--ember), #b84020); color:#fff; padding:4px 12px; border-radius:5px; font-family:'Space Grotesk',sans-serif; font-size:.45rem; font-weight:800; margin-right:16px; white-space:nowrap; letter-spacing:2.5px; box-shadow:0 0 14px rgba(232,97,58,.2); text-shadow:0 1px 2px rgba(0,0,0,.3); }
        .ticker-scroll { overflow:hidden; flex:1; }
        .ticker-move { display:inline-block; white-space:nowrap; padding-left:100%; animation:tickScroll 35s linear infinite; color:var(--muted); font-size:.65rem; letter-spacing:.5px; }
        .ticker-move b { color:var(--gold); font-weight:600; margin:0 8px; }
        @keyframes tickScroll { to { transform:translateX(-100%); } }

        /* ===== CATEGORY PILLS ===== */
        .cat-bar { max-width:1200px; width:95%; margin:0 auto 28px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
        .cat-pill { font-family:'JetBrains Mono',monospace; font-size:.48rem; letter-spacing:2.5px; text-transform:uppercase; padding:7px 18px; border-radius:24px; border:1px solid rgba(212,168,83,.05); color:var(--muted); cursor:pointer; transition:all .4s; background:transparent; backdrop-filter:blur(4px); }
        .cat-pill:hover,.cat-pill.active { border-color:var(--gold); color:var(--gold); background:rgba(212,168,83,.04); box-shadow:0 0 20px rgba(212,168,83,.05); }

        /* ===== UNIFORM GRID ===== */
        .main-wrap { max-width:1400px; width:100%; margin:0 auto; padding:0 clamp(14px,4vw,48px) 200px; }
        .grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(300px, 1fr)); gap:clamp(14px,2vw,22px); }

        /* ===== UNIFORM HD CARD ===== */
        .t-card { position:relative; border-radius:var(--radius); overflow:hidden; opacity:0; transform:translateY(50px) scale(.95); transition:transform .15s ease-out, box-shadow .6s, opacity .9s cubic-bezier(.4,0,.2,1); will-change:transform; cursor:default; display:flex; flex-direction:column; }
        .t-card.vis { opacity:1; transform:translateY(0) scale(1); }

        .t-card .card-glass { position:absolute; inset:0; background:var(--bg-card); backdrop-filter:blur(var(--glass-blur)) saturate(160%); z-index:0; border:1px solid var(--border); border-radius:var(--radius); transition:all .6s cubic-bezier(.4,0,.2,1); }
        .t-card:hover .card-glass { border-color:var(--border-hover); box-shadow:0 20px 80px rgba(0,0,0,.8), 0 0 50px rgba(212,168,83,.04); }

        .card-reflection { position:absolute; top:0; left:0; right:0; height:1px; z-index:2; background:linear-gradient(90deg, transparent 10%, rgba(255,255,255,.05) 50%, transparent 90%); opacity:.5; transition:opacity .4s; }
        .t-card:hover .card-reflection { opacity:1; }

        .card-warm-top { position:absolute; top:0; left:0; right:0; height:50%; border-radius:var(--radius) var(--radius) 0 0; background:linear-gradient(180deg, rgba(212,168,83,.015) 0%, transparent 100%); z-index:1; pointer-events:none; transition:opacity .4s; }
        .t-card:hover .card-warm-top { background:linear-gradient(180deg, rgba(212,168,83,.04) 0%, transparent 100%); }

        .spotlight { position:absolute; inset:0; pointer-events:none; z-index:1; opacity:0; transition:opacity .4s; border-radius:var(--radius); }
        .t-card:hover .spotlight { opacity:1; }

        .gold-line { position:absolute; bottom:0; left:0; width:0; height:2px; z-index:3; transition:width .6s cubic-bezier(.4,0,.2,1); border-radius:0 2px 0 0; filter:brightness(1.2); }
        .t-card:hover .gold-line { width:100%; }

        .mod-id { position:absolute; top:12px; right:16px; z-index:4; font-family:'JetBrains Mono',monospace; font-size:.38rem; color:rgba(212,168,83,.06); letter-spacing:2px; transition:color .3s; }
        .t-card:hover .mod-id { color:rgba(212,168,83,.2); }

        /* Height & Flex Rules for Uniformity */
        .card-content { position:relative; z-index:5; padding:24px 22px 20px; display:flex; flex-direction:column; height: 100%; min-height: 310px; }
        
        .c-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
        .c-info { flex:1; min-width:0; }
        .c-info h3 { font-family:'Space Grotesk',sans-serif; font-size:clamp(.88rem,1.8vw,1.08rem); font-weight:700; letter-spacing:.4px; color:var(--cream); transition:color .3s; line-height:1.3; }
        .t-card:hover .c-info h3 { color:var(--gold-light); text-shadow:0 0 20px rgba(212,168,83,.1); }
        .c-status { font-size:.38rem; padding:3px 10px; border-radius:20px; background:rgba(212,168,83,.03); color:var(--gold); border:1px solid rgba(212,168,83,.06); text-transform:uppercase; letter-spacing:2.5px; font-weight:700; display:inline-flex; align-items:center; gap:6px; margin-top:8px; font-family:'JetBrains Mono',monospace; }
        .c-status::before { content:''; width:4px; height:4px; background:var(--gold); border-radius:50%; box-shadow:0 0 8px rgba(212,168,83,.6); animation:statusPulse 2s ease-in-out infinite; }
        @keyframes statusPulse { 0%,100%{opacity:1;box-shadow:0 0 8px rgba(212,168,83,.6)} 50%{opacity:.2;box-shadow:0 0 2px rgba(212,168,83,.1)} }

        .c-icon { width:48px; height:48px; border-radius:14px; background:var(--gold-dim); border:1px solid rgba(212,168,83,.05); display:flex; align-items:center; justify-content:center; font-size:1.05rem; color:var(--gold); transition:all .5s cubic-bezier(.4,0,.2,1); flex-shrink:0; position:relative; overflow:hidden; }
        .c-icon::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, var(--gold), var(--ember)); opacity:0; transition:opacity .4s; border-radius:14px; }
        .t-card:hover .c-icon { color:var(--bg); border-color:var(--gold); box-shadow:0 8px 30px rgba(212,168,83,.3); transform:scale(1.1) rotate(-5deg); }
        .t-card:hover .c-icon::before { opacity:1; }
        .c-icon i { position:relative; z-index:2; }

        .c-body { flex:1; margin-bottom:14px; display:flex; flex-direction:column; }
        .c-desc { color:var(--cream-soft); line-height:1.6; font-size:clamp(.66rem,1.3vw,.76rem); font-weight:300; letter-spacing:.1px; }
        .c-tags { display:flex; gap:6px; margin-top:auto; padding-top: 12px; flex-wrap:wrap; }
        .c-tag { font-family:'JetBrains Mono',monospace; font-size:.36rem; letter-spacing:1.5px; text-transform:uppercase; padding:2px 8px; border-radius:4px; border:1px solid rgba(255,255,255,.025); color:var(--muted); background:rgba(255,255,255,.01); }
        .c-meta { display:flex; gap:14px; margin-top:12px; font-family:'JetBrains Mono',monospace; font-size:.42rem; color:var(--muted); letter-spacing:.4px; opacity:.3; }
        .c-meta i { margin-right:3px; font-size:.36rem; }
        .meta-good { color:#5dba72!important; opacity:.7!important; }
        .meta-warn { color:var(--ember)!important; opacity:.6!important; }

        .c-foot { border-top:1px solid rgba(255,255,255,.015); padding-top:14px; margin-top:auto; }
        .btn-go { width:100%; padding:12px; background:0 0; border:1px solid rgba(255,255,255,.025); color:var(--cream-soft); border-radius:12px; font-family:'Space Grotesk',sans-serif; font-size:clamp(.52rem,.9vw,.62rem); cursor:pointer; transition:all .5s cubic-bezier(.4,0,.2,1); text-transform:uppercase; letter-spacing:3.5px; display:flex; align-items:center; justify-content:center; gap:10px; position:relative; overflow:hidden; font-weight:600; }
        .btn-go::before { content:''; position:absolute; inset:0; background:linear-gradient(135deg, rgba(212,168,83,.12), rgba(232,97,58,.04)); transform:translateY(100%); transition:transform .55s cubic-bezier(.4,0,.2,1); }
        .btn-go:hover::before { transform:translateY(0); }
        .btn-go:hover { border-color:var(--gold); color:var(--gold-light); box-shadow:0 0 20px rgba(212,168,83,.06); letter-spacing:5px; }
        .btn-go i { font-size:.5rem; transition:transform .35s; }
        .btn-go:hover i { transform:translateX(5px); }
        .btn-go span,.btn-go i { position:relative; z-index:2; }

        /* ===== TOAST ===== */
        .toast-wrap { position:fixed; top:24px; right:20px; z-index:2000; display:flex; flex-direction:column; gap:10px; }
        .toast { background:rgba(4,4,10,.95); border:1px solid var(--border-hover); border-left:3px solid var(--gold); padding:12px 18px; border-radius:12px; font-family:'JetBrains Mono',monospace; font-size:.62rem; color:var(--cream-soft); box-shadow:0 16px 50px rgba(0,0,0,.7); animation:tIn .5s cubic-bezier(.4,0,.2,1), tOut .5s ease 4.2s forwards; backdrop-filter:blur(30px); display:flex; align-items:center; gap:10px; max-width:300px; }
        .toast.err { border-color:rgba(232,97,58,.4); border-left-color:var(--ember); }
        .toast.ok { border-color:rgba(212,168,83,.4); border-left-color:var(--gold); }
        .toast i { font-size:.7rem; flex-shrink:0; }
        .toast.ok i { color:var(--gold); filter:drop-shadow(0 0 5px rgba(212,168,83,.4)); }
        .toast.err i { color:var(--ember); filter:drop-shadow(0 0 5px rgba(232,97,58,.4)); }
        @keyframes tIn { from{transform:translateX(120%);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes tOut { to{opacity:0;transform:translateX(120%)} }

        /* ===== FOOTER ===== */
        .foot { position:fixed; bottom:0; width:100%; z-index:50; border-top:1px solid var(--border); background:linear-gradient(180deg, transparent 0%, rgba(2,2,5,.98) 40%); backdrop-filter:blur(28px) saturate(150%); }
        .foot-wave { height:24px; overflow:hidden; opacity:.3; }
        .foot-wave canvas { width:100%; height:100%; display:block; }
        .foot-inner { padding:6px 24px 12px; display:flex; justify-content:space-between; align-items:center; font-size:.7rem; color:var(--muted); }
        .foot-l { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
        .foot-dot { display:flex; align-items:center; gap:7px; padding:4px 12px; border-radius:20px; border:1px solid rgba(212,168,83,.05); font-size:.42rem; font-family:'JetBrains Mono',monospace; letter-spacing:2px; color:var(--gold); opacity:.4; background:rgba(212,168,83,.01); }
        .foot-dot .d { width:4px; height:4px; background:var(--gold); border-radius:50%; box-shadow:0 0 10px rgba(212,168,83,.5); position:relative; }

/* ===== HD CANVAS SETUP ===== */
function setupHDCanvas(canvas, w, h) {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr; canvas.height = h * dpr;
    canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d'); ctx.scale(dpr, dpr); return ctx;
}

    let t=0;
    function draw(){
        ctx.clearRect(0,0,w,h);
        ctx.font='800 '+Math.min(h*.7,60)+'px "Space Grotesk"';
        const grd=ctx.createLinearGradient(0,0,w,0);
        const shift=Math.sin(t*.008)*.5+.5;
        grd.addColorStop(0,'#fff8e6'); grd.addColorStop(0.2+shift*.1,'#f0d48a');
        grd.addColorStop(0.4+shift*.15,'#d4a853'); grd.addColorStop(0.5,'#ffffff');
        grd.addColorStop(0.6+shift*.15,'#d4a853'); grd.addColorStop(0.8+shift*.1,'#f0d48a');
        grd.addColorStop(1,'#fff8e6');
        ctx.fillStyle=grd;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.shadowColor='rgba(212,168,83,0.25)'; ctx.shadowBlur=25;
        ctx.fillText('SYMPHONNY',w/2,h/2);
        ctx.shadowBlur=0;
        t++; requestAnimationFrame(draw);
    } draw();
    addEventListener('resize',()=>{const nw=Math.min(800,c.parentElement.getBoundingClientRect().width);setupHDCanvas(c,nw,h)});
}();
