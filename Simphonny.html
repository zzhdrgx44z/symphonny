<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SYMPHONNY // AMONG US EDITION</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --space-dark: #0a0f1c;
            --space-deep: #03060c;
            --crew-red: #e13b3b;
            --crew-blue: #3b9fe1;
            --crew-purple: #9b59b6;
            --crew-green: #4cd964;
            --crew-yellow: #f4d03f;
            --crew-black: #2c3e50;
            --impostor-red: #c0392b;
            --visor-blue: #5dade2;
            --glass: rgba(255, 255, 255, 0.05);
            --border-glass: rgba(255, 255, 255, 0.08);
            --text-light: #f0f3fa;
            --text-muted: #8e9aaf;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(ellipse at 30% 40%, #111827, #030712);
            color: var(--text-light);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* animasi bintang */
        .stars-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -1;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.6;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        /* loader */
        .loader {
            position: fixed;
            inset: 0;
            background: #03060c;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            transition: opacity 1s, visibility 1s;
        }
        .loader.hide {
            opacity: 0;
            visibility: hidden;
        }
        .loader-content {
            text-align: center;
        }
        .crew-loader {
            width: 80px;
            height: 80px;
            background: #c0392b;
            border-radius: 45% 55% 50% 50% / 45% 50% 50% 55%;
            position: relative;
            margin: 0 auto 20px;
            animation: floatLoader 1.4s ease-in-out infinite;
        }
        .crew-loader:before {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: #5dade2;
            border-radius: 50%;
            top: 20px;
            left: 18px;
            box-shadow: 0 0 8px #5dade2;
        }
        @keyframes floatLoader {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }
        .loader-text {
            font-family: 'JetBrains Mono', monospace;
            color: #e13b3b;
            letter-spacing: 4px;
            font-size: 0.8rem;
        }

        /* header area */
        header {
            text-align: center;
            padding: 30px 20px 20px;
            position: relative;
        }
        .logo-among {
            font-size: clamp(2rem, 8vw, 3.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #e13b3b, #9b59b6, #4cd964);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            filter: drop-shadow(0 0 12px rgba(225, 59, 59, 0.4));
        }
        .logo-sub {
            font-size: 0.65rem;
            letter-spacing: 4px;
            color: #8e9aaf;
            margin-top: 6px;
            font-family: monospace;
        }
        .crew-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 6px 20px;
            margin-top: 16px;
            font-size: 0.7rem;
            border: 1px solid rgba(225, 59, 59, 0.3);
        }
        .crew-badge i {
            color: #e13b3b;
        }

        /* search */
        .search-area {
            max-width: 540px;
            margin: 24px auto 20px;
        }
        .search-box {
            background: rgba(10, 15, 28, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            padding: 12px 22px;
            transition: all 0.2s;
        }
        .search-box:focus-within {
            border-color: #e13b3b;
            box-shadow: 0 0 18px rgba(225, 59, 59, 0.2);
        }
        .search-box i {
            color: #e13b3b;
            margin-right: 12px;
        }
        .search-box input {
            background: transparent;
            border: none;
            flex: 1;
            outline: none;
            color: white;
            font-size: 0.9rem;
        }
        .search-results {
            position: absolute;
            top: 70px;
            left: 0;
            right: 0;
            background: #0f121fdd;
            backdrop-filter: blur(20px);
            border-radius: 24px;
            max-height: 280px;
            overflow-y: auto;
            display: none;
            z-index: 200;
        }

        /* ticker */
        .ticker {
            max-width: 1200px;
            margin: 0 auto 28px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid #e13b3b30;
            overflow: hidden;
            padding: 6px 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .ticker-label {
            background: #c0392b;
            padding: 2px 14px;
            border-radius: 40px;
            font-size: 0.6rem;
            font-weight: bold;
        }
        .ticker-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            animation: scrollText 28s linear infinite;
            font-size: 0.7rem;
            color: #b9c7d9;
        }
        @keyframes scrollText {
            0% { transform: translateX(0%); }
            100% { transform: translateX(-100%); }
        }

        /* category pills */
        .cat-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 0 auto 35px;
            max-width: 1200px;
        }
        .cat-pill {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(225, 59, 59, 0.2);
            padding: 6px 20px;
            border-radius: 60px;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: #b9c7d9;
            cursor: pointer;
            transition: all 0.2s;
            font-family: monospace;
        }
        .cat-pill.active, .cat-pill:hover {
            background: #e13b3b;
            color: white;
            border-color: #e13b3b;
            box-shadow: 0 0 12px #e13b3b;
        }

        /* grid */
        .grid-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px 180px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 24px;
        }

        /* kartu ala Among Us */
        .crew-card {
            background: rgba(15, 20, 35, 0.65);
            backdrop-filter: blur(16px);
            border-radius: 28px;
            border: 1px solid rgba(225, 59, 59, 0.25);
            transition: all 0.3s ease;
            overflow: hidden;
            opacity: 0;
            transform: translateY(30px);
        }
        .crew-card.visible {
            opacity: 1;
            transform: translateY(0);
        }
        .crew-card:hover {
            transform: translateY(-5px);
            border-color: #e13b3b;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5), 0 0 0 1px rgba(225,59,59,0.3);
        }
        .card-inner {
            padding: 22px 20px 20px;
            position: relative;
        }
        .crew-icon {
            width: 52px;
            height: 52px;
            background: #2a2e4a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #e13b3b;
            border: 2px solid #4a2f3a;
            margin-bottom: 12px;
        }
        .crew-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status {
            font-size: 0.55rem;
            background: #2c2f42;
            padding: 3px 10px;
            border-radius: 30px;
            color: #4cd964;
            font-family: monospace;
        }
        .desc {
            font-size: 0.75rem;
            color: #b0bedd;
            margin: 12px 0;
            line-height: 1.4;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 12px 0;
        }
        .tag {
            background: rgba(225, 59, 59, 0.1);
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.55rem;
            font-family: monospace;
            color: #ffb4b4;
        }
        .meta {
            display: flex;
            gap: 18px;
            font-size: 0.6rem;
            color: #6a7390;
            margin-bottom: 18px;
        }
        .btn-crew {
            width: 100%;
            background: rgba(225, 59, 59, 0.1);
            border: 1px solid rgba(225, 59, 59, 0.4);
            padding: 10px;
            border-radius: 40px;
            color: #fff;
            font-weight: 600;
            font-size: 0.7rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
        }
        .btn-crew:hover {
            background: #e13b3b;
            border-color: #e13b3b;
            box-shadow: 0 0 12px #e13b3b;
        }

        /* impostor card khusus dengan canvas */
        .impostor-canvas {
            width: 100%;
            height: 130px;
            background: #0c0f1a;
            border-radius: 20px;
            margin: 10px 0;
            border: 1px solid #c0392b;
            cursor: pointer;
        }

        /* animasi karakter di footer */
        .among-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #03060cee;
            backdrop-filter: blur(20px);
            border-top: 1px solid #e13b3b40;
            padding: 8px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            font-size: 0.7rem;
        }
        .walking-crews {
            display: flex;
            gap: 18px;
            overflow-x: auto;
            max-width: 60%;
        }
        .walk-crew {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #1e1f2e;
            padding: 3px 12px;
            border-radius: 40px;
            font-family: monospace;
            animation: walkAnim 0.8s infinite alternate;
        }
        @keyframes walkAnim {
            0% { transform: translateX(0px); }
            100% { transform: translateX(6px); }
        }
        .crew-dot {
            width: 10px;
            height: 10px;
            background: #e13b3b;
            border-radius: 50%;
            box-shadow: 0 0 5px red;
        }
        .time-stamp {
            font-family: monospace;
            color: #ff9f9f;
        }

        /* toast */
        .toast-area {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
        }
        .toast {
            background: #1a1e2f;
            border-left: 4px solid #e13b3b;
            padding: 8px 16px;
            border-radius: 12px;
            margin-bottom: 8px;
            font-size: 0.7rem;
            backdrop-filter: blur(8px);
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 680px) {
            .grid-container { padding-bottom: 140px; }
            .walking-crews { display: none; }
        }
    </style>
</head>

<script>
    // Data Modul
    const MODULES = [
        {id:1,t:"ALL PK",d:"Database pusat seluruh PK akses terintegrasi",u:"https://symphonny.vercel.app/DATABASE.html",i:"fa-database",cat:"data",tags:["DB","CENTRAL"]},

        {id:8,t:"QRIS Payment",d:"Gateway pembayaran QRIS instan",u:"https://symphonny.vercel.app/Bukti-qris.html",i:"fa-qrcode",cat:"finance",tags:["QRIS","INSTANT"]},

        {id:12,t:"Hadiah Togel",d:"Daftar hadiah max 4D/3D/2D",u:"https://symphonny.vercel.app/hadiah_togel.html",i:"fa-trophy",cat:"data",tags:["4D","PRIZE"]},
        {id:13,t:"IDN Poker",d:"Arena player vs player turnamen",u:"https://symphonny.vercel.app/IDN_POKER.html",i:"fa-club",cat:"game",tags:["PVP","TOURN"]},
        {id:14,t:"Gaple Online",d:"Domino klasik modern",u:"https://symphonny.vercel.app/IDN_GAPLE.html",i:"fa-table",cat:"game",tags:["DOMINO","ONLINE"]},

        {id:20,t:"Hitungan Parlay",d:"Perhitungan parlay presisi",u:"https://symphonny.vercel.app/hitungan_parlay.html",i:"fa-chart-line",cat:"tool",tags:["PARLAY","CALC"]},
        {id:21,t:"Storange Video",d:"Penyimpanan video pribadi enkripsi",u:"https://symphonny.vercel.app/STORANGE_VIDEO.html",i:"fa-hard-drive",cat:"media",tags:["STORE","ENCRYPT"]},
        {id:22,t:"Generator Password",d:"Buat kata sandi super kuat",u:"https://symphonny.vercel.app/GENERATOR_PASSWORD.html",i:"fa-key",cat:"tool",tags:["SECURE","GEN"]},
        {id:23,t:"IMP0STOR MODE",d:"Animasi impostor interaktif — KLIK UNTUK MEMBUNUH!",u:"#",i:"fa-mask",cat:"game",tags:["ANIMATION","SABOTAGE","KILL"]}
    ];

    // Helper bintang background
    function generateStars() {
        const starsDiv = document.getElementById('stars');
        for (let i = 0; i < 180; i++) {
            let s = document.createElement('div');
            s.classList.add('star');
            let size = Math.random() * 2 + 0.5;
            s.style.width = size + 'px';
            s.style.height = size + 'px';
            s.style.left = Math.random() * 100 + '%';
            s.style.top = Math.random() * 100 + '%';
            s.style.animationDelay = Math.random() * 3 + 's';
            starsDiv.appendChild(s);
        }
    }
    generateStars();

    // Loader
    setTimeout(() => {
        document.getElementById('loader').classList.add('hide');
    }, 2800);

    // Toast
    function showToast(msg, type='info') {
        const toastDiv = document.createElement('div');
        toastDiv.className = 'toast';
        toastDiv.innerHTML = `<i class="fas ${type==='kill' ? 'fa-skull' : 'fa-bell'}"></i> ${msg}`;
        document.getElementById('toastArea').appendChild(toastDiv);
        setTimeout(() => toastDiv.remove(), 3800);
    }

    // Render Grid
    const gridContainer = document.getElementById('grid');
    let allCards = [];

    MODULES.forEach(mod => {
        const card = document.createElement('div');
        card.className = 'crew-card';
        card.dataset.cat = mod.cat;
        
        if(mod.id === 23) {
            // Impostor special card with canvas anim
            card.innerHTML = `
                <div class="card-inner">
                    <div class="crew-icon"><i class="fas ${mod.i}"></i></div>
                    <div class="crew-title"><span>${mod.t}</span><span class="status">SUSPECT</span></div>
                    <div class="desc">${mod.d}</div>
                    <canvas id="impostorCanvas_${mod.id}" class="impostor-canvas" width="400" height="130" style="width:100%; height:auto; aspect-ratio:400/130"></canvas>
                    <div class="tags">${mod.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
                    <div class="meta"><span><i class="fas fa-fire"></i> 99% DANGER</span><span><i class="fas fa-mask"></i> IMPOSTOR</span></div>
                    <button class="btn-crew" id="killBtn_${mod.id}">💀 SABOTAGE 💀</button>
                </div>
            `;
            gridContainer.appendChild(card);
            allCards.push(card);
            
            const canvas = card.querySelector(`#impostorCanvas_${mod.id}`);
            const ctx = canvas.getContext('2d');
            canvas.width = 400; canvas.height = 130;
            
            // Animasi impostor
            let killActive = false, killProgress = 0, killDir = 1;
            let bloods = [];
            let timeAnim = 0;
            
            function addBlood(x,y,intensity){
                let c = Math.floor(6 * intensity);
                for(let i=0;i<c;i++) bloods.push({x:x+(Math.random()-0.5)*35, y:y+(Math.random()-0.5)*25, vx:(Math.random()-0.5)*2, vy:(Math.random()-0.5)*1.5, life:0.8});
            }
            function updateBlood(){
                for(let i=0;i<bloods.length;i++){
                    bloods[i].x += bloods[i].vx;
                    bloods[i].y += bloods[i].vy;
                    bloods[i].life -= 0.02;
                    if(bloods[i].life<=0) bloods.splice(i,1), i--;
                }
            }
            function drawImpostor(ctx, x, y, leg, isKill, factor){
                ctx.clearRect(0,0,canvas.width,canvas.height);
                ctx.fillStyle = "#0b0f17";
                ctx.fillRect(0,0,canvas.width,canvas.height);
                ctx.save();
                ctx.beginPath();
                ctx.ellipse(x, y, 28, 36, 0, 0, Math.PI*2);
                ctx.fillStyle = "#c0392b";
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x-16, y-4, 12, 20, -0.2, 0, Math.PI*2);
                ctx.fillStyle = "#a93226";
                ctx.fill();
                // kaki
                ctx.beginPath();
                ctx.moveTo(x-10, y+28); ctx.lineTo(x-18+Math.sin(leg)*7, y+40); ctx.lineWidth=6; ctx.strokeStyle="#9a2a1f"; ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(x+10, y+28); ctx.lineTo(x+18-Math.sin(leg)*7, y+40); ctx.stroke();
                // visor
                ctx.beginPath();
                ctx.ellipse(x-6, y-6, 12, 14, -0.1, 0, Math.PI*2);
                ctx.fillStyle = isKill ? "#ff4d4d" : "#5dade2";
                ctx.fill();
                ctx.beginPath();
                ctx.ellipse(x-10, y-9, 3, 4, -0.1, 0, Math.PI*2);
                ctx.fillStyle = "#fff";
                ctx.fill();
                if(isKill && factor>0.3){
                    ctx.font = "bold 18px monospace";
                    ctx.fillStyle = `rgba(255,0,0,${factor*0.9})`;
                    ctx.fillText("🔪", x-28, y-12);
                    ctx.beginPath();
                    ctx.moveTo(x-2, y+6);
                    ctx.quadraticCurveTo(x-10+factor*16, y+14+factor*14, x-20, y+28+factor*20);
                    ctx.lineWidth=6; ctx.strokeStyle="#da627d"; ctx.stroke();
                }
                for(let b of bloods){
                    ctx.beginPath(); ctx.arc(b.x, b.y, 3*b.life, 0, Math.PI*2);
                    ctx.fillStyle = `rgba(200,30,30,${b.life*0.8})`;
                    ctx.fill();
                }
                ctx.restore();
            }
            function animate(){
                if(!canvas.isConnected) return;
                timeAnim += 0.07;
                if(killActive){
                    killProgress += 0.035 * killDir;
                    if(killProgress>=1){ killDir=-1; addBlood(95,70,1.0); showToast("⚠️ IMPOSTOR MEMBUNUH! DARAH BERCECERAN ⚠️", "kill"); }
                    if(killProgress<=0){ killActive=false; killProgress=0; killDir=1; }
                }
                let factor = killActive ? (killDir===1 ? killProgress : 1-killProgress) : 0;
                let legSwing = Math.sin(timeAnim*7)*0.7;
                drawImpostor(ctx, 85, 65, legSwing, killActive, factor);
                updateBlood();
                requestAnimationFrame(animate);
            }
            animate();
            const killBtn = card.querySelector(`#killBtn_${mod.id}`);
            const triggerKill = () => { if(!killActive){ killActive=true; killProgress=0; killDir=1; bloods=[]; addBlood(85,70,0.5); } };
            killBtn.addEventListener('click', triggerKill);
            canvas.addEventListener('click', triggerKill);
        } else {
            // normal card
            const randUptime = Math.floor(Math.random()*20+80);
            card.innerHTML = `
                <div class="card-inner">
                    <div class="crew-icon"><i class="fas ${mod.i}"></i></div>
                    <div class="crew-title"><span>${mod.t}</span><span class="status">ONLINE</span></div>
                    <div class="desc">${mod.d}</div>
                    <div class="tags">${mod.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>
                    <div class="meta"><span><i class="fas fa-signal"></i> ${randUptime}%</span><span><i class="fas fa-clock"></i> TASK OK</span></div>
                    <button class="btn-crew" data-url="${mod.u}">AKSES TASK <i class="fas fa-arrow-right"></i></button>
                </div>
            `;
            gridContainer.appendChild(card);
            allCards.push(card);
            const btn = card.querySelector('.btn-crew');
            btn.addEventListener('click', () => { window.open(btn.dataset.url, '_blank'); });
        }
        // efek hover
        card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rx = (y / rect.height - 0.5) * -4;
            const ry = (x / rect.width - 0.5) * 4;
            card.style.transform = `perspective(800px) rotateX(${rx}deg) rotateY(${ry}deg) translateY(-3px)`;
        });
        card.addEventListener('mouseleave', () => { card.style.transform = ''; });
    });

    // Intersection Observer
    const observer = new IntersectionObserver(entries => {
        entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    allCards.forEach(c => observer.observe(c));

    // Filter kategori
    const pills = document.querySelectorAll('.cat-pill');
    pills.forEach(p => {
        p.addEventListener('click', () => {
            pills.forEach(pi => pi.classList.remove('active'));
            p.classList.add('active');
            const cat = p.dataset.cat;
            allCards.forEach(card => {
                const match = (cat === 'all' || card.dataset.cat === cat);
                card.style.display = match ? '' : 'none';
                if(match && !card.classList.contains('visible')) setTimeout(() => card.classList.add('visible'), 30);
            });
        });
    });

    // Search
    const searchInp = document.getElementById('searchInput');
    const searchRes = document.getElementById('searchResults');
    searchInp.addEventListener('input', (e) => {
        const val = e.target.value.toLowerCase();
        if(val.length < 2) { searchRes.classList.remove('show'); return; }
        const filtered = MODULES.filter(m => m.t.toLowerCase().includes(val) || m.d.toLowerCase().includes(val) || m.tags.some(t=>t.toLowerCase().includes(val)));
        if(filtered.length === 0) searchRes.innerHTML = '<div class="toast" style="background:#0f0f1a">Tidak ditemukan</div>';
        else {
            searchRes.innerHTML = filtered.map(m => `<div class="toast" style="cursor:pointer" data-url="${m.u}"><i class="fas ${m.i}"></i> ${m.t}</div>`).join('');
            document.querySelectorAll('[data-url]').forEach(el => {
                el.addEventListener('click', () => window.open(el.dataset.url, '_blank'));
            });
        }
        searchRes.classList.add('show');
    });
    document.addEventListener('click', (e) => { if(!e.target.closest('.search-area')) searchRes.classList.remove('show'); });

    // Waktu
    function updateTime() {
        document.getElementById('liveTime').innerText = new Date().toLocaleTimeString('en-GB');
    }
    setInterval(updateTime, 1000);
    updateTime();

    // Tambahan animasi crewmate kecil di footer (pergerakan sederhana)
    setInterval(() => {
        const walkers = document.querySelectorAll('.walk-crew');
        walkers.forEach(w => {
            w.style.transform = `translateX(${Math.random() * 4 - 2}px)`;
            setTimeout(() => w.style.transform = '', 300);
        });
    }, 800);
    
    // Efek random impostor alert
    setInterval(() => {
        if(Math.random() < 0.2) showToast("⚠️ AKTIVITAS IMPOSTOR TERDETEKSI DI REAKTOR ⚠️", "kill");
    }, 12000);

    // Prevent context menu
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => { if(e.keyCode===123) e.preventDefault(); });
</script>
</body>
</html>
