<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Video Vault - Simple Login</title>
    <script src="https://apis.google.com/js/api.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f1a; color: #eee; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #1e1e2f; padding: 2rem; border-radius: 16px; text-align: center; max-width: 400px; }
        button { background: #6c5ce7; border: none; padding: 12px 24px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; margin-top: 20px; }
        #status { margin-top: 20px; color: #00cec9; }
    </style>
</head>
<body>
<div class="card">
    <h2>☁️ Cloud Video Vault</h2>
    <p>Login dengan Google Drive</p>
    <button id="loginBtn">🔑 Login</button>
    <div id="status"></div>
</div>

<script>
    // GANTI DENGAN CLIENT ID ANDA
    const CLIENT_ID = 'YOUR_CLIENT_ID.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/drive.file';
    let tokenClient;

    function showStatus(msg, isError = false) {
        const div = document.getElementById('status');
        div.textContent = msg;
        div.style.color = isError ? '#e74c3c' : '#00cec9';
    }

    window.onGoogleApiLoad = () => {
        showStatus('API siap. Klik login.');
    };

    document.getElementById('loginBtn').addEventListener('click', () => {
        if (tokenClient) {
            tokenClient.requestAccessToken({ prompt: 'consent' });
            return;
        }
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (response) => {
                if (response.error) {
                    showStatus('Login gagal: ' + response.error_description, true);
                    return;
                }
                showStatus('✅ Login berhasil! Token: ' + response.access_token.slice(0, 20) + '...');
                // Di sini Anda bisa lanjut ke fungsi upload, dll.
            },
        });
        tokenClient.requestAccessToken();
    });
</script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
</body>
</html>
