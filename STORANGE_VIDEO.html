<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINK LINE — Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Orbitron','sans-serif'],body:['Rajdhani','sans-serif'],mono:['Share Tech Mono','monospace']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:#06060e;color:#e0e8f0;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,240,255,0.02)}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.15);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,0.3)}

.view-section{display:none;animation:glitchIn .6s cubic-bezier(.16,1,.3,1)}
.view-section.active{display:block}
@keyframes glitchIn{0%{opacity:0;transform:translateY(20px) skewX(-2deg);filter:blur(8px)}60%{opacity:1;transform:translateY(-2px) skewX(1deg);filter:blur(0)}100%{transform:translateY(0) skewX(0)}}

.font-display{font-family:'Orbitron',sans-serif}
.font-mono{font-family:'Share Tech Mono',monospace}

/* === ANIMATIONS === */
@keyframes slideInDown{from{opacity:0;transform:translateY(-30px);filter:blur(4px)}to{opacity:1;transform:translateY(0);filter:blur(0)}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeInRow{from{opacity:0;transform:translateX(-15px)}to{opacity:1;transform:translateX(0)}}
@keyframes titleGlow{0%,100%{filter:drop-shadow(0 0 15px rgba(0,240,255,0.15))}50%{filter:drop-shadow(0 0 25px rgba(0,240,255,0.35))}}
@keyframes borderGlow{0%,100%{border-color:rgba(0,240,255,0.1)}50%{border-color:rgba(0,240,255,0.25)}}
@keyframes copyFlash{0%{box-shadow:0 0 0 0 rgba(34,211,238,0.5)}100%{box-shadow:0 0 0 12px rgba(34,211,238,0)}}
@keyframes pulseNeon{0%,100%{box-shadow:0 0 3px rgba(0,240,255,0.3)}50%{box-shadow:0 0 10px rgba(0,240,255,0.6),0 0 20px rgba(0,240,255,0.2)}}
@keyframes statusSweep{0%{left:-60px}100%{left:100%}}
@keyframes scanTable{0%{top:-5%}100%{top:105%}}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes crtFlicker{0%{opacity:0.05}5%{opacity:0.02}10%{opacity:0.05}15%{opacity:0.02}20%{opacity:0.05}100%{opacity:0.05}}

.header-anim{animation: slideInDown 0.6s ease-out}
.stat-anim{opacity:0; animation: fadeInUp 0.5s ease forwards}
.stagger-1{animation-delay: 0.2s}
.stagger-2{animation-delay: 0.3s}
.stagger-3{animation-delay: 0.4s}
.stagger-4{animation-delay: 0.5s}
.title-glow{animation: titleGlow 3s ease-in-out infinite}

.card-neon{background:rgba(8,12,28,0.85);backdrop-filter:blur(24px);border:1px solid rgba(0,240,255,0.1);border-radius:16px;box-shadow:0 0 40px rgba(0,240,255,0.03),inset 0 1px 0 rgba(0,240,255,0.06);position:relative;overflow:hidden;animation: borderGlow 4s ease-in-out infinite}
.card-neon::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 5%,rgba(0,240,255,0.3) 30%,rgba(255,0,170,0.25) 70%,transparent 95%)}
.card-neon::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.05),transparent)}

.nav-pill{padding:7px 18px;border-radius:4px;font-size:.7rem;font-weight:700;color:rgba(0,240,255,0.4);background:0 0;border:1px solid transparent;cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:2px;white-space:nowrap}
.nav-pill:hover{color:rgba(0,240,255,0.8);background:rgba(0,240,255,0.03);border-color:rgba(0,240,255,0.08)}
.nav-pill.active{color:#00f0ff;background:rgba(0,240,255,0.06);border-color:rgba(0,240,255,0.2);box-shadow:0 0 20px rgba(0,240,255,0.08),inset 0 0 20px rgba(0,240,255,0.02);text-shadow:0 0 12px rgba(0,240,255,0.5)}

.btn-neon{background:linear-gradient(135deg,rgba(0,240,255,0.12),rgba(0,240,255,0.03));color:#00f0ff;font-weight:700;font-size:.75rem;padding:10px 26px;border-radius:6px;border:1px solid rgba(0,240,255,0.25);cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1.5px;position:relative;overflow:hidden;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
.btn-neon::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.2),transparent);transition:left .5s}
.btn-neon:hover{box-shadow:0 0 30px rgba(0,240,255,0.2),0 0 60px rgba(0,240,255,0.05);border-color:rgba(0,240,255,0.5);transform:translateY(-2px)}
.btn-neon:hover::after{left:100%}
.btn-neon:active{transform:translateY(0) scale(.95)}

.btn-magenta{background:linear-gradient(135deg,rgba(255,0,170,0.12),rgba(255,0,170,0.03));color:#ff00aa;border-color:rgba(255,0,170,0.25)}
.btn-magenta:hover{box-shadow:0 0 30px rgba(255,0,170,0.2),0 0 60px rgba(255,0,170,0.05);border-color:rgba(255,0,170,0.5)}
.btn-magenta::after{background:linear-gradient(90deg,transparent,rgba(255,0,170,0.2),transparent)}

.input-neon{background:rgba(0,240,255,0.02);border:1px solid rgba(0,240,255,0.08);border-radius:6px;padding:11px 16px;font-family:'Share Tech Mono',monospace;font-size:.85rem;color:#e0e8f0;outline:none;transition:all .3s;width:100%;letter-spacing:1px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px))}
.input-neon:focus{border-color:rgba(0,240,255,0.35);box-shadow:0 0 25px rgba(0,240,255,0.06),inset 0 0 20px rgba(0,240,255,0.02);background:rgba(0,240,255,0.03)}
.input-neon::placeholder{color:rgba(0,240,255,0.15);font-family:'Rajdhani';font-weight:600;letter-spacing:2px;font-size:.75rem;text-transform:uppercase}

.copy-btn{background:rgba(0,240,255,0.04);border:1px solid rgba(0,240,255,0.12);color:rgba(0,240,255,0.6);padding:4px 14px;font-size:.6rem;font-weight:700;border-radius:4px;cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1.5px;position:relative;overflow:hidden}
.copy-btn:hover{background:rgba(0,240,255,0.12);border-color:rgba(0,240,255,0.4);box-shadow:0 0 12px rgba(0,240,255,0.1);color:#00f0ff;text-shadow:0 0 6px rgba(0,240,255,0.4)}
.copy-btn.copied{color:#22d3ee;border-color:rgba(34,211,238,0.4);background:rgba(34,211,238,0.06);text-shadow:0 0 8px rgba(34,211,238,0.4);animation: copyFlash 0.5s ease}

.table-row{transition:all .3s;position:relative}
.table-row:hover{background:rgba(0,240,255,0.025)}
.table-row:hover td:first-child{color:#00f0ff;text-shadow:0 0 8px rgba(0,240,255,0.25)}
.table-row::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:linear-gradient(180deg,transparent,#00f0ff,transparent);opacity:0;transition:opacity .3s;box-shadow:0 0 8px rgba(0,240,255,0.5)}
.table-row:hover::before{opacity:1}

.toast-container{position:fixed;top:20px;right:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast-item{background:rgba(8,12,28,0.95);border:1px solid rgba(0,240,255,0.2);border-left:3px solid #00f0ff;padding:14px 20px;border-radius:8px;font-size:.8rem;color:#e0e8f0;box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 20px rgba(0,240,255,0.04);animation:toastSlide .5s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(20px);font-family:'Share Tech Mono',monospace;letter-spacing:.5px}
@keyframes toastSlide{from{opacity:0;transform:translateX(50px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}

#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.pulse-dot{width:6px;height:6px;background:#00f0ff;border-radius:50%;animation:pulseNeon 2s infinite;box-shadow:0 0 6px rgba(0,240,255,0.5)}

.corner-deco{position:absolute;width:14px;height:14px;pointer-events:none;transition:all .4s}
.card-neon:hover .corner-deco{width:20px;height:20px}
.corner-deco.tl{top:-1px;left:-1px;border-top:2px solid rgba(0,240,255,0.4);border-left:2px solid rgba(0,240,255,0.4)}
.corner-deco.tr{top:-1px;right:-1px;border-top:2px solid rgba(0,240,255,0.4);border-right:2px solid rgba(0,240,255,0.4)}
.corner-deco.bl{bottom:-1px;left:-1px;border-bottom:2px solid rgba(0,240,255,0.4);border-left:2px solid rgba(0,240,255,0.4)}
.corner-deco.br{bottom:-1px;right:-1px;border-bottom:2px solid rgba(0,240,255,0.4);border-right:2px solid rgba(0,240,255,0.4)}

.setting-btn{background:rgba(0,240,255,0.02);color:rgba(0,240,255,0.4);font-weight:700;font-size:.65rem;padding:7px 18px;border-radius:4px;border:1px solid rgba(0,240,255,0.08);cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1.5px}
.setting-btn:hover{background:rgba(0,240,255,0.06);color:rgba(0,240,255,0.6);border-color:rgba(0,240,255,0.15)}
.setting-btn.active{color:#00f0ff;background:rgba(0,240,255,0.08);border-color:rgba(0,240,255,0.35);box-shadow:0 0 12px rgba(0,240,255,0.06);text-shadow:0 0 8px rgba(0,240,255,0.4)}

.table-scanline{position:absolute;left:0;right:0;height:40px;background:linear-gradient(180deg,transparent,rgba(0,240,255,0.02),transparent);animation:scanTable 5s linear infinite;pointer-events:none;z-index:2}

.status-line{height:1px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.06) 20%,rgba(0,240,255,0.03) 80%,transparent);position:relative;overflow:hidden}
.status-line::after{content:'';position:absolute;width:60px;height:1px;background:linear-gradient(90deg,rgba(0,240,255,0.3),transparent);animation:statusSweep 3s linear infinite}

.stat-card{background:rgba(0,240,255,0.02);border:1px solid rgba(0,240,255,0.06);border-radius:10px;padding:14px 18px;transition:all .3s;position:relative;overflow:hidden}
.stat-card:hover{border-color:rgba(0,240,255,0.15);background:rgba(0,240,255,0.04);transform:translateY(-2px);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent,#00f0ff),transparent);opacity:0;transition:opacity .3s}
.stat-card:hover::after{opacity:.5}

.float-anim{animation:floatY 3s ease-in-out infinite}

/* CRT Scanline Overlay */
#crt-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.03) 0px,rgba(0,0,0,0.03) 1px,transparent 1px,transparent 2px);animation: crtFlicker 0.15s infinite}

@media(max-width:768px){.desktop-only{display:none!important}}
</style>
</head>
<body>

<div id="crt-overlay"></div>
<canvas id="bgCanvas"></canvas>

<div class="relative z-10 h-screen flex flex-col">

<!-- HEADER -->
<header class="flex-shrink-0 px-5 lg:px-8 py-3 bg-[rgba(6,6,14,0.88)] backdrop-blur-2xl border-b border-[rgba(0,240,255,0.06)] header-anim">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="relative w-9 h-9 flex items-center justify-center">
        <div class="absolute inset-0 rounded-md bg-gradient-to-br from-[rgba(0,240,255,0.12)] to-[rgba(255,0,170,0.1)] border border-[rgba(0,240,255,0.15)]"></div>
        <span class="iconify text-[#00f0ff] text-base float-anim relative z-10" data-icon="lucide:hexagon" style="filter:drop-shadow(0 0 6px rgba(0,240,255,0.5))"></span>
      </div>
      <div>
        <div class="flex items-baseline gap-2">
          <span class="font-display text-sm font-bold tracking-[3px] text-[#e0e8f0]" style="text-shadow:0 0 20px rgba(0,240,255,0.15)">LINK LINE</span>
          <span class="font-display text-[8px] font-bold text-[#ff00aa] tracking-[2px] uppercase" style="text-shadow:0 0 10px rgba(255,0,170,0.4)">Nexus</span>
        </div>
        <div class="text-[8px] font-mono text-[rgba(0,240,255,0.15)] tracking-[2px]">SYS.ACTIVE // V3.1.0</div>
      </div>
    </div>
    <nav class="hidden md:flex items-center gap-1.5 p-1 rounded-md bg-[rgba(0,240,255,0.015)] border border-[rgba(0,240,255,0.04)]">
      <button onclick="showView('dashboard')" class="nav-pill active" data-nav="dashboard"><span class="iconify inline-block mr-1 text-xs align-[-1px]" data-icon="lucide:database"></span>Database</button>
      <button onclick="showView('settings')" class="nav-pill" data-nav="settings"><span class="iconify inline-block mr-1 text-xs align-[-1px]" data-icon="lucide:cpu"></span>Config</button>
    </nav>
    <div class="flex items-center gap-5">
      <div class="flex items-center gap-2"><div class="pulse-dot"></div><span class="text-[9px] font-bold text-[rgba(0,240,255,0.3)] font-display tracking-[2px] uppercase">Live</span></div>
      <span class="text-[10px] font-bold text-[rgba(0,240,255,0.2)] font-mono tracking-[2px]" id="clock">00:00:00</span>
    </div>
  </div>
  <div class="status-line mt-3"></div>
</header>

<!-- MOBILE NAV -->
<div class="md:hidden flex gap-2 p-2 bg-[rgba(6,6,14,0.9)] backdrop-blur-xl border-b border-[rgba(0,240,255,0.04)]">
  <button onclick="showView('dashboard')" class="nav-pill active flex-1 text-[9px]" data-mob="dashboard">Database</button>
  <button onclick="showView('settings')" class="nav-pill flex-1 text-[9px]" data-mob="settings">Config</button>
</div>

<main class="flex-1 overflow-y-auto p-5 lg:p-8">

  <!-- DATABASE VIEW -->
  <div id="dashboardView" class="view-section active">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-6">
      <div>
        <div class="flex items-center gap-3 mb-2">
          <div class="w-1 h-8 bg-gradient-to-b from-[#00f0ff] to-[#ff00aa] rounded-full" style="box-shadow:0 0 10px rgba(0,240,255,0.3)"></div>
          <h1 class="font-display text-2xl lg:text-3xl font-black tracking-[4px] uppercase title-glow" style="background:linear-gradient(135deg,#00f0ff,#e0e8f0 50%,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Database</h1>
        </div>
        <p class="text-[rgba(0,240,255,0.25)] text-sm font-medium ml-5 tracking-wider">Temukan dan kelola link yang tersedia</p>
      </div>
      <div class="flex items-center gap-2 text-[rgba(0,240,255,0.15)]">
        <span class="iconify text-xs" data-icon="lucide:corner-down-right"></span>
        <span class="text-[9px] font-display tracking-[2px] uppercase font-bold">Klik COPY untuk salin</span>
      </div>
    </div>

    <!-- STATS -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6" id="statsRow">
      <div class="stat-card stat-anim stagger-1" style="--accent:#00f0ff">
        <div class="text-[8px] font-display text-[rgba(0,240,255,0.3)] tracking-[2px] uppercase mb-1">Total Links</div>
        <div class="text-xl font-bold text-[#00f0ff] font-mono" id="statTotal">—</div>
      </div>
      <div class="stat-card stat-anim stagger-2" style="--accent:#ff00aa">
        <div class="text-[8px] font-display text-[rgba(0,240,255,0.3)] tracking-[2px] uppercase mb-1">Active Nodes</div>
        <div class="text-xl font-bold text-[#ff00aa] font-mono" id="statNodes">24</div>
      </div>
      <div class="stat-card stat-anim stagger-3" style="--accent:#8b5cf6">
        <div class="text-[8px] font-display text-[rgba(0,240,255,0.3)] tracking-[2px] uppercase mb-1">Data Flow</div>
        <div class="text-xl font-bold text-[#8b5cf6] font-mono" id="statFlow">0 <span class="text-[8px] text-[rgba(0,240,255,0.2)]">p/s</span></div>
      </div>
      <div class="stat-card stat-anim stagger-4" style="--accent:#22d3ee">
        <div class="text-[8px] font-display text-[rgba(0,240,255,0.3)] tracking-[2px] uppercase mb-1">Status</div>
        <div class="text-sm font-bold text-[#22d3ee] font-mono flex items-center gap-1.5"><div class="pulse-dot"></div>Online</div>
      </div>
    </div>

    <div class="flex gap-3 mb-6">
      <div class="relative flex-1">
        <span class="iconify absolute left-4 top-1/2 -translate-y-1/2 text-[rgba(0,240,255,0.2)] text-base" data-icon="lucide:scan-search"></span>
        <input type="text" class="input-neon pl-10" id="searchInput" placeholder="Scan database..." onkeypress="handleEnter(event)">
      </div>
      <button class="btn-neon flex items-center gap-2" onclick="performSearch()"><span class="iconify text-sm" data-icon="lucide:radar"></span>Scan</button>
    </div>

    <div class="card-neon relative" id="tableCard">
      <div class="corner-deco tl"></div>
      <div class="corner-deco tr"></div>
      <div class="corner-deco bl"></div>
      <div class="corner-deco br"></div>
      <div class="table-scanline"></div>
      <table class="w-full" id="tableContainer"></table>
    </div>

    <div class="text-center mt-10 pb-4">
      <div class="inline-flex items-center gap-4 text-[9px] text-[rgba(0,240,255,0.1)] font-display tracking-[4px] uppercase font-bold">
        <span class="w-14 h-px bg-gradient-to-r from-transparent to-[rgba(0,240,255,0.1)]"></span>
        End of Stream
        <span class="w-14 h-px bg-gradient-to-l from-transparent to-[rgba(0,240,255,0.1)]"></span>
      </div>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="settingsView" class="view-section">
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-1 h-8 bg-gradient-to-b from-[#ff00aa] to-[#00f0ff] rounded-full" style="box-shadow:0 0 10px rgba(255,0,170,0.3)"></div>
        <h1 class="font-display text-2xl lg:text-3xl font-black tracking-[4px] uppercase title-glow" style="background:linear-gradient(135deg,#ff00aa,#e0e8f0 50%,#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent">Config</h1>
      </div>
      <p class="text-[rgba(0,240,255,0.25)] text-sm font-medium ml-5 tracking-wider">Konfigurasi sistem dan koneksi</p>
    </div>

    <div class="card-neon p-6 lg:p-8 max-w-2xl relative">
      <div class="corner-deco tl"></div>
      <div class="corner-deco tr"></div>
      <div class="corner-deco bl"></div>
      <div class="corner-deco br"></div>

      <div class="space-y-6">
        <div>
          <label class="block text-[9px] font-bold text-[rgba(0,240,255,0.3)] uppercase tracking-[3px] mb-2 font-display">Spreadsheet ID</label>
          <input type="text" class="input-neon font-mono text-xs" value="19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c">
        </div>
        <div>
          <label class="block text-[9px] font-bold text-[rgba(0,240,255,0.3)] uppercase tracking-[3px] mb-2 font-display">Sheet GID</label>
          <input type="text" class="input-neon font-mono text-xs" value="1202906531">
        </div>
        <div>
          <label class="block text-[9px] font-bold text-[rgba(0,240,255,0.3)] uppercase tracking-[3px] mb-2 font-display">API Endpoint</label>
          <input type="text" class="input-neon font-mono text-xs" value="https://script.google.com/macros/s/.../exec">
        </div>
      </div>

      <div class="border-t border-[rgba(0,240,255,0.04)] mt-8 pt-6">
        <label class="block text-[9px] font-bold text-[rgba(0,240,255,0.3)] uppercase tracking-[3px] mb-3 font-display">Render Mode</label>
        <div class="flex gap-3">
          <button class="setting-btn" onclick="selectMode(this)">Cyber</button>
          <button class="setting-btn active" onclick="selectMode(this)">Neon</button>
          <button class="setting-btn" onclick="selectMode(this)">Stealth</button>
        </div>
      </div>

      <div class="border-t border-[rgba(0,240,255,0.04)] mt-8 pt-6 flex justify-end">
        <button class="btn-magenta flex items-center gap-2" onclick="showToast('Config synced to nexus')">
          <span class="iconify text-sm" data-icon="lucide:save"></span>Save
        </button>
      </div>
    </div>
  </div>

</main>
</div>

<div class="toast-container" id="toastStack"></div>

<script>
let semuaData = { linknawala: [] };
let filteredData = { linknawala: [] };
let flowCount = 0;

setInterval(() => {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

setInterval(() => {

function init3DTilt() {
  const card = document.getElementById('tableCard');
  if(!card) return;
  card.addEventListener('mousemove', (e) => {
    const rect = card.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const rx = (y - rect.height/2) / rect.height * -1.5;
    const ry = (x - rect.width/2) / rect.width * 1.5;
    card.style.transform = `perspective(1200px) rotateX(${rx}deg) rotateY(${ry}deg)`;
  });
  card.addEventListener('mouseleave', () => {
    card.style.transform = 'perspective(1200px) rotateX(0) rotateY(0)';
    card.style.transition = 'transform 0.5s ease';
    setTimeout(() => card.style.transition = '', 500);
  });
}

    if(!dataFetched) {

function updateStats() {

function parseCSV(text) {
  if(!text) return [];
  return text.split('\n').filter(l=>l.trim()).map(row => {
    let cur='',arr=[],inQ=false;
    for(let c of row){ if(c==='"')inQ=!inQ; else if(c===','&&!inQ){arr.push(cur.trim());cur='';}else cur+=c;}
    arr.push(cur.trim()); return arr;
  });
}

function renderTable() {
  const data = filteredData.linknawala;
  const container = document.getElementById('tableContainer');
  if(!data||!data.length){ container.innerHTML='<tr><td colspan="5" class="text-center py-20 text-[rgba(0,240,255,0.15)] text-xs font-display tracking-[4px] uppercase">No Data Found</td></tr>'; return; }
  let html = `<thead><tr>`;
  if(data[0]) {
    data[0].forEach((h, idx) => {
      html += `<th class="text-left text-[8px] font-bold text-[rgba(0,240,255,0.25)] uppercase tracking-[3px] px-5 py-4 border-b border-[rgba(0,240,255,0.04)] bg-[rgba(0,240,255,0.015)] font-display">${h}</th>`;
    });
    html += `<th class="text-right text-[8px] font-bold text-[rgba(0,240,255,0.25)] uppercase tracking-[3px] px-5 py-4 border-b border-[rgba(0,240,255,0.04)] bg-[rgba(0,240,255,0.015)] w-28 font-display">Action</th></tr></thead><tbody>`;
    for(let i=1;i<data.length;i++){
      if(!data[i]) continue;
      // Staggered row animation
      const delay = Math.min(i * 0.04, 1.5); 
      html += `<tr class="table-row" style="opacity:0; animation: fadeInRow 0.4s ease ${delay}s forwards">`;
      let firstText='';
      data[i].forEach((cell,idx)=>{
        if(idx>=4) return;
        const val=cell||'—';
        if(idx===0){ firstText=val; html+=`<td class="px-5 py-3 text-sm border-b border-[rgba(0,240,255,0.02)] font-bold text-[#e0e8f0] tracking-wide font-mono">${val}</td>`; }
        else html+=`<td class="px-5 py-3 text-sm border-b border-[rgba(0,240,255,0.02)] text-[rgba(0,240,255,0.35)] font-mono">${val}</td>`;
      });
      const escapedText = firstText.replace(/'/g, "\\'").replace(/"/g, '&quot;');
      html+=`<td class="px-5 py-3 text-right border-b border-[rgba(0,240,255,0.02)]"><button class="copy-btn" onclick="copyText('${escapedText}', this)">Copy</button></td></tr>`;
    }
  }
  html += `</tbody>`;
  container.innerHTML = html;
}

function performSearch() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();

  updateStats();
}

// ================= CYBER NETWORK BACKGROUND =================
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let bgNodes = [], bgEdges = [], bgSparks = [], bgRipples = [], rainDrops = [];
const BG_NODE_COUNT = 24;
let bgFrame = 0;
let mouseX = -1000, mouseY = -1000;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  initBgData();
  initRain();
}

function initBgData() {
  bgNodes = []; bgEdges = []; bgSparks = []; bgRipples = [];
  const w = bgCanvas.width, h = bgCanvas.height;
  const cx = w/2, cy = h/2;
  const ringR = Math.min(w,h) * 0.33;

  bgNodes.push({ x:cx, y:cy, r:14, type:'hub', label:'NEXUS', charge:0, phase:0 });

  const types = ['server','database','gateway','client','api','firewall','cdn'];
  const labels = ['SRV-A1','SRV-B2','DB-CORE','DB-REPL','GW-EXT','GW-INT','FW-01','CLI-01','CLI-02','CLI-03','API-V1','API-V2','CDN-E1','CDN-W1','LOG-01','MON-01','DNS-01','LB-01','FW-02','CACHE','MQ-01','REG-01','PROXY'];
  for(let i=0; i<BG_NODE_COUNT-1; i++){
    const angle = (i/(BG_NODE_COUNT-1))*Math.PI*2 - Math.PI/2;
    const layer = i % 3;
    const dist = ringR * (0.65 + layer*0.2) + (Math.random()-0.5)*60;
    bgNodes.push({
      x: cx + Math.cos(angle)*dist,
      y: cy + Math.sin(angle)*dist,
      r: 3 + Math.random()*4,
      type: types[i%types.length],
      label: labels[i]||`N-${i}`,
      charge: 0,
      phase: Math.random()*Math.PI*2
    });
  }

  for(let i=1;i<bgNodes.length;i++) bgEdges.push({from:0, to:i, active:true, pulse:Math.random()});
  for(let i=1;i<bgNodes.length;i++){
    const j=((i+Math.floor(Math.random()*8)+2)%(bgNodes.length-1))+1;
    if(i!==j) bgEdges.push({from:i, to:j, active:Math.random()>0.35, pulse:Math.random()});
  }
}

function initRain() {
  rainDrops = [];
  const cols = Math.floor(bgCanvas.width / 22);
  for(let i=0;i<cols;i++){
    rainDrops.push({
      x: i*22 + Math.random()*8,
      y: Math.random() * bgCanvas.height,
      speed: 0.8 + Math.random()*2.5,
      chars: Array.from({length: 6 + Math.floor(Math.random()*10)}, () => String.fromCharCode(0x30A0 + Math.random()*96)),
      opacity: 0.015 + Math.random()*0.025
    });
  }
}

function spawnBgSpark() {
  const active = bgEdges.filter(e=>e.active);
  if(!active.length) return;
  const edge = active[Math.floor(Math.random()*active.length)];
  const dir = Math.random()>0.5?1:-1;
  const colors = ['#00f0ff','#ff00aa','#8b5cf6','#22d3ee','#f472b6','#a855f7'];
  bgSparks.push({
    from: dir>0?edge.from:edge.to,
    to: dir>0?edge.to:edge.from,
    t: 0,
    speed: 0.005 + Math.random()*0.015,
    color: colors[Math.floor(Math.random()*colors.length)],
    size: 1.5 + Math.random()*2
  });
}

function spawnRipple(x, y) {
  bgRipples.push({ x, y, r: 0, maxR: 70 + Math.random()*40, alpha: 0.35, color: Math.random()>0.5 ? '#00f0ff' : '#ff00aa' });
}

function initBgNetwork() {
  resizeBg();
  window.addEventListener('resize', resizeBg);
  animateBg();
}

function animateBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  const time = Date.now() * 0.001;
  bgFrame++;

  bgCtx.clearRect(0, 0, w, h);

  // === DIGITAL RAIN ===
  bgCtx.font = '9px "Share Tech Mono",monospace';
  for(let drop of rainDrops){
    drop.y += drop.speed;
    if(drop.y > h + 80) { drop.y = -80; drop.x = Math.random()*w; }
    for(let i=0;i<drop.chars.length;i++){
      let cy = drop.y - i*12;
      if(cy < -12 || cy > h+12) continue;
      let a = drop.opacity * (1 - i/drop.chars.length);
      if(i===0) bgCtx.fillStyle = `rgba(0,240,255,${a*3})`;
      else bgCtx.fillStyle = `rgba(0,240,255,${a})`;
      if(Math.random() < 0.015) drop.chars[i] = String.fromCharCode(0x30A0 + Math.random()*96);
      bgCtx.fillText(drop.chars[i], drop.x, cy);
    }
  }

  // === HEX GRID ===
  bgCtx.strokeStyle = 'rgba(0,240,255,0.012)';
  bgCtx.lineWidth = 0.5;
  const hexS = 55;
  const hexH = hexS * Math.sqrt(3);
  for(let row=-1;row<h/hexH+1;row++){
    for(let col=-1;col<w/(hexS*1.5)+1;col++){
      let cx=col*hexS*1.5, cy=row*hexH+(col%2?hexH/2:0);
      bgCtx.beginPath();
      for(let i=0;i<6;i++){let a=Math.PI/3*i-Math.PI/6;let px=cx+hexS*0.8*Math.cos(a),py=cy+hexS*0.8*Math.sin(a);i===0?bgCtx.moveTo(px,py):bgCtx.lineTo(px,py);}
      bgCtx.closePath();bgCtx.stroke();
    }
  }

  // === MOUSE GLOW ===
  let mGrad = bgCtx.createRadialGradient(mouseX,mouseY,0,mouseX,mouseY,220);
  mGrad.addColorStop(0, 'rgba(0,240,255,0.025)');
  mGrad.addColorStop(0.5, 'rgba(255,0,170,0.008)');
  mGrad.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = mGrad;
  bgCtx.fillRect(0, 0, w, h);

  // === EDGES ===
  for(let edge of bgEdges){
    const a=bgNodes[edge.from], b=bgNodes[edge.to];
    if(!a||!b) continue;
    edge.pulse = (edge.pulse + 0.004) % 1;
    if(edge.active){
      bgCtx.beginPath(); bgCtx.moveTo(a.x,a.y); bgCtx.lineTo(b.x,b.y);
      bgCtx.strokeStyle = 'rgba(0,240,255,0.04)';
      bgCtx.lineWidth = 0.8;
      bgCtx.stroke();
      let px = a.x + (b.x-a.x)*edge.pulse;
      let py = a.y + (b.y-a.y)*edge.pulse;
      let pGrad = bgCtx.createRadialGradient(px,py,0,px,py,20);
      pGrad.addColorStop(0, 'rgba(0,240,255,0.06)');
      pGrad.addColorStop(1, 'rgba(0,240,255,0)');
      bgCtx.fillStyle = pGrad;
      bgCtx.fillRect(px-20,py-20,40,40);
    } else {
      bgCtx.beginPath(); bgCtx.moveTo(a.x,a.y); bgCtx.lineTo(b.x,b.y);
      bgCtx.strokeStyle = 'rgba(0,240,255,0.01)';
      bgCtx.lineWidth = 0.5;
      bgCtx.setLineDash([3,7]);
      bgCtx.stroke();
      bgCtx.setLineDash([]);
    }
  }

  // === SPARKS (Increased Spawn Rate) ===
  if(bgFrame % 50 === 0) { for(let i=0;i<5;i++) spawnBgSpark(); }
  else if(Math.random() < 0.12) spawnBgSpark(); // Increased from 0.07
  if(bgSparks.length > 25) bgSparks.splice(0, bgSparks.length-25);

  for(let i=bgSparks.length-1;i>=0;i--){
    let p = bgSparks[i];
    p.t += p.speed;
    if(p.t >= 1){
      bgNodes[p.to].charge = Math.min(bgNodes[p.to].charge+1.2, 2);
      flowCount++;
      if(bgNodes[p.to].type==='hub' || Math.random()>0.6) spawnRipple(bgNodes[p.to].x, bgNodes[p.to].y); // Increased ripple chance
      bgSparks.splice(i,1);
      continue;
    }
    const a=bgNodes[p.from], b=bgNodes[p.to];
    let px=a.x+(b.x-a.x)*p.t, py=a.y+(b.y-a.y)*p.t;
    let trailLen=0.14;
    let tx=a.x+(b.x-a.x)*Math.max(0,p.t-trailLen), ty=a.y+(b.y-a.y)*Math.max(0,p.t-trailLen);
    
    let grad = bgCtx.createLinearGradient(tx,ty,px,py);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, p.color);
    bgCtx.beginPath(); bgCtx.moveTo(tx,ty); bgCtx.lineTo(px,py);
    bgCtx.strokeStyle = grad; bgCtx.lineWidth = 2.5; bgCtx.stroke();

    let hGrad = bgCtx.createRadialGradient(px,py,0,px,py,18);
    hGrad.addColorStop(0, p.color + '50');
    hGrad.addColorStop(1, p.color + '00');
    bgCtx.fillStyle = hGrad;
    bgCtx.beginPath(); bgCtx.arc(px,py,18,0,Math.PI*2); bgCtx.fill();

    bgCtx.beginPath(); bgCtx.arc(px,py,p.size,0,Math.PI*2);
    bgCtx.fillStyle = p.color; bgCtx.fill();

    bgCtx.beginPath(); bgCtx.arc(px,py,p.size*0.3,0,Math.PI*2);
    bgCtx.fillStyle = '#ffffff'; bgCtx.fill();
  }

  // === RIPPLES ===
  for(let i=bgRipples.length-1;i>=0;i--){
    let r = bgRipples[i];
    r.r += 1.2;
    r.alpha -= 0.005;
    if(r.alpha <= 0 || r.r >= r.maxR){ bgRipples.splice(i,1); continue; }
    bgCtx.beginPath(); bgCtx.arc(r.x,r.y,r.r,0,Math.PI*2);
    bgCtx.strokeStyle = r.color + Math.floor(r.alpha*255).toString(16).padStart(2,'0');
    bgCtx.lineWidth = 1;
    bgCtx.stroke();
  }

  // === NODES ===
  for(let n of bgNodes){
    n.charge = Math.max(0, n.charge - 0.01);
    n.phase += 0.018;
    let isHub = n.type==='hub';
    let baseColor = isHub ? '#00f0ff' : n.type==='database' ? '#8b5cf6' : n.type==='gateway' ? '#f59e0b' : n.type==='client' ? '#22d3ee' : n.type==='firewall' ? '#ef4444' : n.type==='cdn' ? '#10b981' : n.type==='api' ? '#ff00aa' : '#6366f1';

    if(isHub){
      for(let ring=0;ring<3;ring++){
        bgCtx.beginPath();
        bgCtx.arc(n.x, n.y, n.r + 18 + ring*13 + Math.sin(time*1.5+ring)*3, 0, Math.PI*2);
        bgCtx.strokeStyle = ring===0 ? `rgba(0,240,255,${0.08+Math.sin(time*2)*0.02})` : ring===1 ? `rgba(255,0,170,${0.04+Math.sin(time*1.5)*0.01})` : `rgba(139,92,246,0.025)`;
        bgCtx.lineWidth = ring===0 ? 1.5 : 0.8;
        bgCtx.setLineDash(ring===0 ? [] : [3,5]);
        bgCtx.stroke();
        bgCtx.setLineDash([]);
      }
      for(let d=0;d<4;d++){
        let da = time*1.2 + d*Math.PI/2;
        let dx = n.x + Math.cos(da)*(n.r+18);
        let dy = n.y + Math.sin(da)*(n.r+18);
        bgCtx.beginPath(); bgCtx.arc(dx,dy,2,0,Math.PI*2);
        bgCtx.fillStyle = `rgba(0,240,255,${0.4+Math.sin(time*3+d)*0.2})`;
        bgCtx.fill();
      }
      bgCtx.strokeStyle = 'rgba(0,240,255,0.05)';
      bgCtx.lineWidth = 0.5;
      bgCtx.beginPath(); bgCtx.moveTo(n.x-35,n.y); bgCtx.lineTo(n.x-18,n.y); bgCtx.stroke();
      bgCtx.beginPath(); bgCtx.moveTo(n.x+18,n.y); bgCtx.lineTo(n.x+35,n.y); bgCtx.stroke();
      bgCtx.beginPath(); bgCtx.moveTo(n.x,n.y-35); bgCtx.lineTo(n.x,n.y-18); bgCtx.stroke();
      bgCtx.beginPath(); bgCtx.moveTo(n.x,n.y+18); bgCtx.lineTo(n.x,n.y+35); bgCtx.stroke();
    }

    if(n.charge > 0.05){
      bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r + (2-n.charge)*12,0,Math.PI*2);
      bgCtx.strokeStyle = baseColor + '40';
      bgCtx.lineWidth = 1.5; bgCtx.stroke();
    }

    let glowR = n.r + 10 + n.charge*8 + Math.sin(n.phase)*2;
    let nGrad = bgCtx.createRadialGradient(n.x,n.y,n.r*0.5,n.x,n.y,glowR);
    nGrad.addColorStop(0, baseColor + '18');
    nGrad.addColorStop(1, baseColor + '00');
    bgCtx.fillStyle = nGrad;
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,glowR,0,Math.PI*2); bgCtx.fill();

    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    let bodyGrad = bgCtx.createRadialGradient(n.x-n.r*0.3,n.y-n.r*0.3,0,n.x,n.y,n.r);
    bodyGrad.addColorStop(0, baseColor + (n.charge > 0.1 ? 'dd' : '99'));
    bodyGrad.addColorStop(1, baseColor + (n.charge > 0.1 ? '99' : '55'));
    bgCtx.fillStyle = bodyGrad;
    bgCtx.fill();

    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    bgCtx.strokeStyle = baseColor + '55';
    bgCtx.lineWidth = 1.2; bgCtx.stroke();

    bgCtx.beginPath(); bgCtx.arc(n.x - n.r*0.25, n.y - n.r*0.25, n.r*0.25,0,Math.PI*2);
    bgCtx.fillStyle = 'rgba(255,255,255,0.35)'; bgCtx.fill();
  }

  // === LABELS ===
  bgCtx.textAlign = 'center';
  for(let n of bgNodes){
    let alpha = 0.15 + n.charge*0.6;
    bgCtx.font = `700 ${n.type==='hub'?9:6.5}px "Orbitron",sans-serif`;
    bgCtx.fillStyle = `rgba(0,240,255,${alpha})`;
    bgCtx.fillText(n.label, n.x, n.y+n.r+14);
  }

  // === CORNER HUD ===
  bgCtx.font = '8px "Share Tech Mono",monospace';
  bgCtx.textAlign = 'left';
  bgCtx.fillStyle = 'rgba(0,240,255,0.06)';
  bgCtx.fillText(`LAT:${(mouseY/10).toFixed(1)}`, 14, h-22);
  bgCtx.fillText(`LON:${(mouseX/10).toFixed(1)}`, 14, h-10);
  bgCtx.textAlign = 'right';
  bgCtx.fillText(`NODES:${bgNodes.length}`, w-14, h-22);
  bgCtx.fillText(`LINKS:${bgEdges.filter(e=>e.active).length}`, w-14, h-10);

  // Mouse crosshair
  bgCtx.strokeStyle = 'rgba(0,240,255,0.05)';
  bgCtx.lineWidth = 0.5;
  bgCtx.beginPath(); bgCtx.moveTo(mouseX-12,mouseY); bgCtx.lineTo(mouseX-4,mouseY); bgCtx.stroke();
  bgCtx.beginPath(); bgCtx.moveTo(mouseX+4,mouseY); bgCtx.lineTo(mouseX+12,mouseY); bgCtx.stroke();
  bgCtx.beginPath(); bgCtx.moveTo(mouseX,mouseY-12); bgCtx.lineTo(mouseX,mouseY-4); bgCtx.stroke();
  bgCtx.beginPath(); bgCtx.moveTo(mouseX,mouseY+4); bgCtx.lineTo(mouseX,mouseY+12); bgCtx.stroke();

  requestAnimationFrame(animateBg);
}
</script>
