<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Video Vault - Local DB</title>
    <style>
        :root {
            --bg: #0f0f1a;
            --card: #1a1a2e;
            --card2: #222239;
            --text: #e0e0e0;
            --muted: #a0a0b8;
            --accent: #6c5ce7;
            --accent2: #8b7cf0;
            --danger: #e74c3c;
            --success: #00cec9;
            --radius: 14px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 30% 20%, rgba(108,92,231,0.08) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 80%, rgba(0,206,201,0.06) 0%, transparent 60%);
        }
        .app {
            max-width: 1000px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        .header {
            background: var(--card);
            padding: 18px 24px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.3rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .header span { font-size: 2rem; }
        .section {
            background: var(--card);
            border-radius: var(--radius);
            padding: 22px 26px;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .section h3 { font-size: 1.1rem; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; color: #ccc; }
        .record-area { display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-start; }
        .camera-container {
            position: relative;
            background: #000;
            border-radius: var(--radius);
            overflow: hidden;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 4/3;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .camera-container video { width:100%; height:100%; object-fit:cover; display:block; }
        .recording-dot {
            position:absolute; top:12px; right:14px; width:14px; height:14px;
            background:#e74c3c; border-radius:50%; animation:pulse 1s infinite;
            display:none; z-index:2;
        }
        .camera-container.recording .recording-dot { display:block; }
        @keyframes pulse {
            0%,100%{ box-shadow:0 0 0 0 rgba(231,76,60,0.7); }
            50%{ box-shadow:0 0 0 14px rgba(231,76,60,0); }
        }
        .record-controls { display:flex; flex-direction:column; gap:12px; flex:1; min-width:200px; }
        .timer {
            font-size:2.5rem; font-weight:700; font-family: 'SF Mono','Cascadia Code',monospace;
            letter-spacing:2px; color:#fff;
        }
        .timer.warning { color:#fdcb6e; animation: blink 0.6s infinite; }
        @keyframes blink { 50%{opacity:0.4;} }
        .btn {
            display:inline-flex; align-items:center; gap:8px; padding:12px 28px;
            border-radius:25px; font-weight:600; font-size:0.95rem; cursor:pointer;
            border:none; transition:0.25s; white-space:nowrap;
        }
        .btn-record { background:#e74c3c; color:#fff; font-size:1rem; padding:14px 28px; border-radius:30px; }
        .btn-record:hover { background:#ff4757; box-shadow:0 6px 24px rgba(231,76,60,0.5); }
        .btn-record.stop { background:#fff; color:#e74c3c; }
        .btn-record:disabled { opacity:0.5; cursor:not-allowed; pointer-events:none; }
        .btn-primary { background:var(--accent); color:#fff; }
        .btn-primary:hover { background:var(--accent2); transform:translateY(-2px); box-shadow:0 8px 25px rgba(108,92,231,0.4); }
        .btn-sm { padding:7px 16px; font-size:0.8rem; border-radius:18px; }
        .btn-outline { background:transparent; color:var(--accent2); border:1.5px solid var(--accent); }
        .btn-outline:hover { background:var(--accent); color:#fff; }
        .progress-wrap { margin-top:8px; display:none; }
        .progress-wrap.active { display:block; }
        .progress-bar { width:100%; height:8px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; }
        .progress-fill { height:100%; background:linear-gradient(90deg,var(--accent),var(--success)); border-radius:10px; transition:width 0.3s; width:0%; }
        .progress-text { font-size:0.78rem; color:var(--muted); margin-top:4px; }

        .video-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:18px; }
        .video-card {
            background:var(--card2); border-radius:var(--radius); overflow:hidden;
            transition:0.25s; border:1px solid rgba(255,255,255,0.04); cursor:pointer;
        }
        .video-card:hover { transform:translateY(-4px); box-shadow:0 12px 30px rgba(0,0,0,0.5); border-color:rgba(255,255,255,0.12); }
        .video-card .thumb {
            width:100%; aspect-ratio:16/10; object-fit:cover; background:#111;
            display:flex; align-items:center; justify-content:center; font-size:3rem; color:#333;
        }
        .video-card .thumb img { width:100%; height:100%; object-fit:cover; }
        .video-card .info { padding:14px 16px; }
        .video-card .info .vname { font-weight:600; font-size:0.9rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
        .video-card .info .vmeta { font-size:0.75rem; color:var(--muted); display:flex; justify-content:space-between; }
        .video-card .actions { display:flex; gap:6px; padding:0 16px 14px; }
        .video-card .actions button {
            flex:1; font-size:0.75rem; padding:7px 10px; border-radius:14px;
            cursor:pointer; border:none; font-weight:600; transition:0.25s;
        }
        .btn-play { background:var(--accent); color:#fff; }
        .btn-play:hover { background:var(--accent2); }
        .btn-del { background:transparent; color:var(--danger); border:1px solid transparent; }
        .btn-del:hover { border-color:var(--danger); background:rgba(231,76,60,0.1); }
        .btn-download { background:transparent; color:var(--success); border:1px solid var(--success); }
        .btn-download:hover { background:var(--success); color:#000; }
        .empty-state { text-align:center; padding:40px 20px; color:var(--muted); }
        .empty-state .empty-icon { font-size:5rem; margin-bottom:12px; opacity:0.6; }

        /* Toast */
        #toastContainer { position:fixed; top:20px; right:20px; z-index:9999; display:flex; flex-direction:column; gap:10px; pointer-events:none; }
        .toast {
            padding:14px 20px; border-radius:10px; color:#fff; font-weight:500;
            font-size:0.9rem; pointer-events:auto; animation:slideIn 0.35s, fadeOut 0.4s 2.5s forwards;
            max-width:380px; box-shadow:var(--shadow); backdrop-filter:blur(8px);
        }
        .toast.success { background:#00b894dd; border:1px solid #00cec9; }
        .toast.error { background:#e74c3cdd; border:1px solid #ff6b6b; }
        .toast.info { background:#6c5ce7dd; border:1px solid #8b7cf0; }
        @keyframes slideIn{ from{transform:translateX(120%);opacity:0;} to{transform:translateX(0);opacity:1;} }
        @keyframes fadeOut{ to{opacity:0; transform:translateY(-20px);} }

        @media (max-width:640px) {
            .record-area { flex-direction:column; align-items:center; }
            .camera-container { max-width:100%; }
            .video-grid { grid-template-columns:1fr 1fr; gap:10px; }
        }
        @media (max-width:400px) {
            .video-grid { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
    <div id="toastContainer"></div>
    <div class="app">
        <div class="header"><span>☁️</span> Cloud Video Vault (Local DB)</div>

        <div class="section">
            <h3>🎬 Rekam Video Baru</h3>
            <div class="record-area">
                <div class="camera-container" id="cameraContainer">
                    <video id="cameraPreview" autoplay playsinline muted></video>
                    <div class="recording-dot"></div>
                </div>
                <div class="record-controls">
                    <div class="timer" id="recordTimer">00:00</div>
                    <button class="btn btn-record" id="btnRecord" disabled>⏺ Mulai Rekam</button>
                    <button class="btn btn-outline btn-sm" id="btnRetryCamera" style="display:none;">🔄 Coba Lagi Kamera</button>
                    <p style="font-size:0.75rem;color:var(--muted);" id="recordHint">Izinkan akses kamera untuk mulai merekam</p>
                    <div class="progress-wrap" id="saveProgress">
                        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                        <div class="progress-text" id="progressText">Menyimpan ke database...</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="section">
            <h3>📁 Database Video Tersimpan</h3>
            <div class="video-grid" id="videoGrid"></div>
            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📭</div>
                <p>Belum ada video tersimpan.<br>Rekam video pertama Anda!</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // IndexedDB setup
            const DB_NAME = 'CloudVideoVaultLocal';
            const DB_VERSION = 1;
            const STORE_NAME = 'videos';
            let db;

            const MAX_RECORD_SEC = 300;
            let mediaStream = null, mediaRecorder = null, recordedBlob = null;
            let recordStartTime = null, recordTimerInterval = null, isRecording = false;

            // DOM
            const $cameraContainer = document.getElementById('cameraContainer');
            const $cameraPreview = document.getElementById('cameraPreview');
            const $btnRecord = document.getElementById('btnRecord');
            const $btnRetryCamera = document.getElementById('btnRetryCamera');
            const $recordTimer = document.getElementById('recordTimer');
            const $recordHint = document.getElementById('recordHint');
            const $saveProgress = document.getElementById('saveProgress');
            const $progressFill = document.getElementById('progressFill');
            const $progressText = document.getElementById('progressText');
            const $videoGrid = document.getElementById('videoGrid');
            const $emptyState = document.getElementById('emptyState');
            const $toastContainer = document.getElementById('toastContainer');

            function toast(msg, type='info') {
                const el = document.createElement('div');
                el.className = `toast ${type}`;
                el.textContent = msg;
                $toastContainer.appendChild(el);
                setTimeout(() => el.remove(), 3000);
            }

            // ========== IndexedDB ==========
            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onupgradeneeded = (event) => {
                        const database = event.target.result;
                        if (!database.objectStoreNames.contains(STORE_NAME)) {
                            database.createObjectStore(STORE_NAME, { keyPath: 'id' });
                        }
                    };
                    request.onsuccess = (event) => {
                        db = event.target.result;
                        resolve(db);
                    };
                    request.onerror = (event) => reject(event.target.error);
                });
            }

            function saveVideoToDB(videoData) {
                return new Promise((resolve, reject) => {
                    if (!db) return reject('Database belum siap');
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.add(videoData);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }

            function getAllVideos() {
                return new Promise((resolve, reject) => {
                    if (!db) return reject('Database belum siap');
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result || []);
                    request.onerror = () => reject(request.error);
                });
            }

            function deleteVideoFromDB(id) {
                return new Promise((resolve, reject) => {
                    if (!db) return reject('Database belum siap');
                    const tx = db.transaction(STORE_NAME, 'readwrite');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }

            // ========== Camera ==========
            async function initCamera() {
                try {
                    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
                    mediaStream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'user' },
                        audio: true,
                    });
                    $cameraPreview.srcObject = mediaStream;
                    $cameraContainer.classList.remove('recording');
                    $btnRecord.disabled = false;
                    $btnRecord.textContent = '⏺ Mulai Rekam';
                    $btnRecord.className = 'btn btn-record';
                    $recordHint.textContent = 'Kamera siap. Klik untuk merekam.';
                    $btnRetryCamera.style.display = 'none';
                    isRecording = false; recordedBlob = null;
                    $saveProgress.classList.remove('active');
                    $recordTimer.textContent = '00:00'; $recordTimer.classList.remove('warning');
                    if (recordTimerInterval) clearInterval(recordTimerInterval);
                    recordTimerInterval = null;
                } catch (err) {
                    console.error(err);
                    $btnRecord.disabled = true;
                    $recordHint.textContent = '⚠️ Gagal akses kamera: ' + err.message;
                    $btnRetryCamera.style.display = 'inline-block';
                    toast('Gagal mengakses kamera/mikrofon.', 'error');
                }
            }

            function startRecording() {
                if (!mediaStream || isRecording) return;
                if (!window.MediaRecorder) { toast('Browser tidak mendukung perekaman.', 'error'); return; }
                const mimeType = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
                try { mediaRecorder = new MediaRecorder(mediaStream, { mimeType }); } catch(e) { mediaRecorder = new MediaRecorder(mediaStream); }
                const chunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
                mediaRecorder.onstop = () => {
                    recordedBlob = new Blob(chunks, { type: mediaRecorder.mimeType || 'video/webm' });
                    $cameraPreview.srcObject = null;
                    $cameraPreview.src = URL.createObjectURL(recordedBlob);
                    $cameraPreview.controls = true; $cameraPreview.loop = false; $cameraPreview.muted = false;
                    $btnRecord.textContent = '💾 Simpan ke Database';
                    $btnRecord.className = 'btn btn-primary';
                    $btnRecord.disabled = false;
                    $recordHint.textContent = `Rekaman selesai (${formatSize(recordedBlob.size)}). Klik untuk menyimpan.`;
                    isRecording = false;
                    $cameraContainer.classList.remove('recording');
                    if (recordTimerInterval) clearInterval(recordTimerInterval);
                };
                recordStartTime = Date.now();
                mediaRecorder.start(1000);
                isRecording = true;
                $btnRecord.textContent = '⏹ Stop Rekam';
                $btnRecord.className = 'btn btn-record stop';
                $cameraContainer.classList.add('recording');
                $recordHint.textContent = '🔴 Sedang merekam...';
                recordedBlob = null;
                $cameraPreview.controls = false; $cameraPreview.src = ''; $cameraPreview.srcObject = mediaStream; $cameraPreview.muted = true;
                $recordTimer.textContent = '00:00'; updateTimer();
                recordTimerInterval = setInterval(updateTimer, 200);
                setTimeout(() => {
                    if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
                        stopRecording();
                        toast('Rekaman dihentikan otomatis (batas 5 menit).', 'info');
                    }
                }, MAX_RECORD_SEC * 1000);
            }

            function stopRecording() {
                if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
                mediaRecorder.stop();
                if (recordTimerInterval) clearInterval(recordTimerInterval);
                $btnRecord.disabled = true;
                $btnRecord.textContent = '⏳ Memproses...';
                $cameraContainer.classList.remove('recording');
            }

            function updateTimer() {
                if (!recordStartTime || !isRecording) return;
                const elapsed = Math.floor((Date.now() - recordStartTime) / 1000);
                const mins = Math.floor(elapsed / 60), secs = elapsed % 60;
                $recordTimer.textContent = String(mins).padStart(2,'0')+':'+String(secs).padStart(2,'0');
                if (elapsed >= MAX_RECORD_SEC - 10) $recordTimer.classList.add('warning');
            }

            function formatSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(2) + ' MB';
            }

            function formatDate(ts) {
                const d = new Date(ts);
                return d.toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            }

            // Thumbnail
            function generateThumbnail(blob) {
                return new Promise((resolve) => {
                    const video = document.createElement('video');
                    video.preload = 'metadata'; video.muted = true; video.playsInline = true;
                    const url = URL.createObjectURL(blob);
                    video.src = url;
                    video.onloadeddata = () => { video.currentTime = 1; };
                    video.onseeked = () => {
                        const canvas = document.createElement('canvas');
                        const maxW = 320, ratio = maxW / video.videoWidth;
                        canvas.width = maxW; canvas.height = Math.round(video.videoHeight * ratio);
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video,0,0,canvas.width,canvas.height);
                        const dataUrl = canvas.toDataURL('image/jpeg',0.7);
                        URL.revokeObjectURL(url);
                        resolve(dataUrl);
                    };
                    video.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
                    setTimeout(() => { if (video.readyState < 2) { URL.revokeObjectURL(url); resolve(null); } }, 4000);
                });
            }

            // Render grid
            async function renderVideoGrid() {
                const videos = await getAllVideos().catch(() => []);
                $videoGrid.innerHTML = '';
                if (videos.length === 0) {
                    $emptyState.style.display = 'block';
                    return;
                }
                $emptyState.style.display = 'none';
                // urutkan terbaru di atas
                videos.sort((a,b) => b.date - a.date);
                for (const video of videos) {
                    const card = document.createElement('div');
                    card.className = 'video-card';
                    const thumbContent = video.thumbnail ? `<img src="${video.thumbnail}" alt="thumb" loading="lazy">` : '🎬';
                    card.innerHTML = `
                        <div class="thumb">${thumbContent}</div>
                        <div class="info">
                            <div class="vname">${escapeHtml(video.name)}</div>
                            <div class="vmeta">
                                <span>${formatDate(video.date)}</span>
                                <span>${video.sizeFormatted}</span>
                            </div>
                        </div>
                        <div class="actions">
                            <button class="btn-play" data-id="${video.id}">▶ Play</button>
                            <button class="btn-download" data-id="${video.id}">⬇ Unduh</button>
                            <button class="btn-del" data-id="${video.id}">🗑 Hapus</button>
                        </div>
                    `;
                    card.querySelector('.btn-play').addEventListener('click', (e) => {
                        e.stopPropagation();
                        playVideoFromDB(video.id);
                    });
                    card.querySelector('.btn-download').addEventListener('click', (e) => {
                        e.stopPropagation();
                        downloadVideo(video);
                    });
                    card.querySelector('.btn-del').addEventListener('click', (e) => {
                        e.stopPropagation();
                        deleteVideo(video.id, video.name);
                    });
                    card.addEventListener('click', () => playVideoFromDB(video.id));
                    $videoGrid.appendChild(card);
                }
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            async function getVideoBlob(id) {
                // Ambil blob dari IndexedDB? Kita simpan blob sebagai properti.
                // Di IndexedDB, blob bisa disimpan sebagai File/Blob.
                return new Promise((resolve, reject) => {
                    if (!db) return reject('DB belum siap');
                    const tx = db.transaction(STORE_NAME, 'readonly');
                    const store = tx.objectStore(STORE_NAME);
                    const request = store.get(id);
                    request.onsuccess = () => {
                        const record = request.result;
                        if (record && record.blob) resolve(record.blob);
                        else reject('Video tidak ditemukan');
                    };
                    request.onerror = () => reject(request.error);
                });
            }

            function playVideoFromDB(id) {
                getVideoBlob(id).then(blob => {
                    const url = URL.createObjectURL(blob);
                    // Buka di tab baru atau pemutar sederhana
                    const playerWindow = window.open('', '_blank', 'width=800,height=600');
                    if (playerWindow) {
                        playerWindow.document.write(`
                            <html><head><title>Pemutar Video</title></head>
                            <body style="margin:0;display:flex;justify-content:center;align-items:center;background:#000;height:100vh;">
                                <video controls autoplay style="max-width:100%;max-height:100%;">
                                    <source src="${url}" type="${blob.type || 'video/webm'}">
                                </video>
                            </body></html>
                        `);
                    }
                }).catch(err => toast('Gagal memutar video: '+err, 'error'));
            }

            function downloadVideo(video) {
                if (!video.blob) return toast('Data video tidak tersedia', 'error');
                const url = URL.createObjectURL(video.blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = video.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            async function deleteVideo(id, name) {
                if (!confirm(`Hapus permanen video "${name}"?`)) return;
                try {
                    await deleteVideoFromDB(id);
                    await renderVideoGrid();
                    toast('Video dihapus.', 'success');
                } catch (err) {
                    toast('Gagal menghapus: '+err, 'error');
                }
            }

            // Simpan ke DB
            async function saveToDatabase() {
                if (!recordedBlob) return;
                $btnRecord.disabled = true;
                $saveProgress.classList.add('active');
                $progressFill.style.width = '0%';
                $progressText.textContent = 'Membuat thumbnail...';
                try {
                    const thumbnail = await generateThumbnail(recordedBlob);
                    const videoEntry = {
                        id: Date.now().toString() + Math.random().toString(36).substr(2,6),
                        name: 'Rekaman_' + new Date().toISOString().replace(/[:.]/g,'-') + '.webm',
                        date: Date.now(),
                        size: recordedBlob.size,
                        sizeFormatted: formatSize(recordedBlob.size),
                        thumbnail: thumbnail,
                        blob: recordedBlob,
                    };
                    $progressFill.style.width = '50%';
                    $progressText.textContent = 'Menyimpan video...';
                    await saveVideoToDB(videoEntry);
                    $saveProgress.classList.remove('active');
                    toast('Video tersimpan di database lokal!', 'success');
                    $recordHint.textContent = 'Tersimpan. Rekam lagi atau lihat daftar.';
                    $btnRecord.textContent = '⏺ Rekam Lagi';
                    $btnRecord.className = 'btn btn-record';
                    $btnRecord.disabled = false;
                    recordedBlob = null;
                    if (mediaStream) {
                        $cameraPreview.src = '';
                        $cameraPreview.controls = false;
                        $cameraPreview.srcObject = mediaStream;
                        $cameraPreview.muted = true;
                    }
                    await renderVideoGrid();
                } catch (err) {
                    console.error(err);
                    $saveProgress.classList.remove('active');
                    toast('Gagal menyimpan: '+err, 'error');
                    $btnRecord.textContent = '💾 Coba Simpan Lagi';
                    $btnRecord.disabled = false;
                }
            }

            $btnRecord.addEventListener('click', () => {
                if (isRecording) stopRecording();
                else if (recordedBlob && !isRecording) saveToDatabase();
                else startRecording();
            });

            $btnRetryCamera.addEventListener('click', initCamera);

            // init
            async function initApp() {
                try {
                    await openDB();
                    await renderVideoGrid();
                    await initCamera();
                } catch (err) {
                    console.error(err);
                    toast('Gagal inisialisasi database/kamera: '+err.message, 'error');
                }
            }
            initApp();
        })();
    </script>
</body>
</html>
