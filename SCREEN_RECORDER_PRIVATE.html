<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OBS·SCREEN | Timestamp & Offline DB</title>
    <!-- Font hanya sebagai enhancement; fallback ke system font jika offline -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --obs-bg: #0f0f0f;
            --obs-panel: #1e1e1e;
            --obs-border: #333333;
            --obs-border-glow: #444;
            --obs-accent: #00a3e0;
            --obs-accent-soft: #1a6b8a;
            --obs-red: #e53935;
            --obs-red-glow: #ff5f5f;
            --obs-green: #2e7d32;
            --obs-text: #f0f0f0;
            --obs-text-dim: #aaaaaa;
            --glass-bg: rgba(25, 25, 25, 0.7);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: radial-gradient(circle at 20% 20%, #1a1a1a, #0a0a0a);
            color: var(--obs-text);
            line-height: 1.5;
            padding: 20px;
            min-height: 100vh;
            backdrop-filter: blur(2px);
        }

        /* === Status Koneksi (Offline/Online) === */
        .network-status {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 500;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
        }
        .network-status.online {
            border-left: 4px solid #2ecc71;
        }
        .network-status.offline {
            border-left: 4px solid #e67e22;
        }
        .network-led {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #2ecc71;
            box-shadow: 0 0 8px #2ecc71;
        }
        .network-status.offline .network-led {
            background: #e67e22;
            box-shadow: 0 0 8px #e67e22;
        }

        /* === Layout OBS === */
        .obs-container {
            max-width: 1600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 360px;
            gap: 20px;
            align-items: start;
        }

        .main-area {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* === Panel Preview dengan Glass === */
        .preview-panel {
            background: var(--obs-panel);
            border: 1px solid var(--obs-border);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 18px 30px -8px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(255,255,255,0.02);
            backdrop-filter: blur(4px);
            transition: box-shadow 0.2s;
        }
        .preview-panel:hover {
            box-shadow: 0 20px 35px -8px black, inset 0 0 0 1px rgba(255,255,255,0.05);
        }

        .preview-header {
            background: rgba(20, 20, 20, 0.8);
            padding: 12px 18px;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--obs-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .preview-header span i {
            color: var(--obs-accent);
            margin-right: 8px;
            text-shadow: 0 0 8px rgba(0,163,224,0.5);
        }

        .rec-status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            background: rgba(40,40,40,0.7);
            padding: 5px 14px;
            border-radius: 30px;
            border: 1px solid #3a3a3a;
            backdrop-filter: blur(4px);
        }

        .rec-led {
            width: 12px;
            height: 12px;
            background: var(--obs-red);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--obs-red-glow);
            animation: pulseRed 1.2s infinite;
        }

        .video-stage {
            position: relative;
            background: #000000;
            aspect-ratio: 16/9;
            border-radius: 0;
        }

        .video-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        /* Timestamp overlay dengan efek kaca */
        .timestamp-obs {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(10, 10, 10, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 16px;
            border-radius: 12px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            font-weight: 500;
            border-left: 4px solid var(--obs-accent);
            z-index: 20;
            pointer-events: none;
            text-align: right;
            line-height: 1.4;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .timestamp-time {
            font-size: 1.4rem;
            font-weight: 700;
            color: #ffb86b;
            text-shadow: 0 0 10px rgba(255,184,107,0.5);
        }

        .timestamp-date {
            font-size: 0.75rem;
            color: #ccc;
            letter-spacing: 0.3px;
        }

        .rec-duration-obs {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            background: rgba(229, 57, 53, 0.85);
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .video-stage.recording-active .rec-duration-obs {
            display: flex;
        }

        .preview-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            z-index: 10;
            color: white;
        }

        /* Control Bar dengan sentuhan modern */
        .control-bar {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 12px 25px -5px black;
        }

        .btn-group-obs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-obs {
            background: rgba(50, 50, 50, 0.7);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 10px 22px;
            border-radius: 36px;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--obs-text);
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-family: inherit;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .btn-obs i {
            font-size: 1rem;
        }

        .btn-obs:hover {
            background: rgba(80, 80, 80, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 10px 18px -6px black;
            border-color: rgba(255,255,255,0.15);
        }

        .btn-record {
            background: linear-gradient(145deg, #d32f2f, #b71c1c);
            color: white;
            border: 1px solid #ff8a8a;
            box-shadow: 0 0 15px rgba(229,57,53,0.3);
        }
        .btn-record:hover {
            background: linear-gradient(145deg, #e53935, #c62828);
            box-shadow: 0 0 20px #e53935;
        }
        .btn-stop {
            background: #3a3a3a;
        }
        .btn-success-obs {
            background: linear-gradient(145deg, #2e7d32, #1b5e20);
            border-color: #81c784;
        }
        .btn-warning-obs {
            background: #b85c00;
        }

        .stats-obs {
            display: flex;
            gap: 24px;
            background: rgba(20,20,20,0.5);
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            backdrop-filter: blur(8px);
            border: 1px solid #3a3a3a;
        }

        .stats-obs span {
            color: var(--obs-accent);
            font-weight: 700;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Library Panel - Glassmorphism */
        .library-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            height: calc(100vh - 100px);
            position: sticky;
            top: 20px;
            box-shadow: 0 20px 30px -10px black;
            overflow: hidden;
        }

        .panel-header {
            padding: 18px 20px;
            background: rgba(15,15,15,0.5);
            border-bottom: 1px solid #2a2a2a;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            backdrop-filter: blur(8px);
        }

        .search-obs {
            background: #1a1a1a;
            border: 1px solid #3f3f3f;
            padding: 8px 14px;
            border-radius: 30px;
            color: white;
            width: 150px;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .search-obs:focus {
            border-color: var(--obs-accent);
            outline: none;
            box-shadow: 0 0 0 2px rgba(0,163,224,0.2);
        }

        .video-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .video-item {
            background: rgba(30,30,30,0.6);
            border-radius: 14px;
            padding: 14px;
            border-left: 4px solid transparent;
            transition: all 0.15s;
            cursor: pointer;
            backdrop-filter: blur(4px);
            border: 1px solid #2a2a2a;
        }

        .video-item:hover {
            background: rgba(60,60,60,0.6);
            border-left-color: var(--obs-accent);
            transform: scale(1.01);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .video-title {
            font-weight: 600;
            font-size: 0.9rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .video-meta {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 6px;
            display: flex;
            gap: 16px;
        }

        .video-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .action-icon-obs {
            background: #353535;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.1s;
            border: 1px solid #4a4a4a;
        }
        .action-icon-obs:hover {
            background: #505050;
        }

        /* Modal & Progress */
        .modal-obs {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content-obs {
            background: #1e1e1e;
            border-radius: 24px;
            width: 90%;
            max-width: 850px;
            max-height: 85vh;
            overflow: auto;
            border: 1px solid #4a4a4a;
            box-shadow: 0 30px 50px black;
        }

        .progress-modal-obs {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1200;
        }
        .progress-card-obs {
            background: #202020;
            padding: 30px;
            border-radius: 28px;
            width: 360px;
            text-align: center;
            border: 1px solid #444;
        }

        .toast-stack {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .toast-obs {
            background: rgba(30,30,30,0.9);
            backdrop-filter: blur(16px);
            border-left: 5px solid var(--obs-accent);
            padding: 12px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px black;
            border: 1px solid #3f3f3f;
        }

        /* Scrollbar keren */
        ::-webkit-scrollbar { width: 8px; background: transparent; }
        ::-webkit-scrollbar-thumb { background: #4a4a4a; border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
        ::-webkit-scrollbar-thumb:hover { background: #6a6a6a; }

        @keyframes pulseRed {
            0% { opacity: 0.6; transform: scale(0.9); box-shadow: 0 0 5px red; }
            100% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 20px red; }
        }

        @media (max-width: 900px) {
            .obs-container { grid-template-columns: 1fr; }
            .library-panel { position: static; height: auto; margin-top: 20px; }
        }
    </style>
</head>
<body>

<!-- Indikator Koneksi (Offline/Online) -->
<div class="network-status online" id="networkStatus">
    <span class="network-led"></span>
    <span id="networkText">Online</span>
    <i class="fas fa-wifi" style="opacity:0.8;"></i>
</div>

<div class="obs-container">
    <div class="main-area">
        <div class="preview-panel">
            <div class="preview-header">
                <span><i class="fas fa-tv"></i> PREVIEW · OBS STYLE</span>
                <div class="rec-status-badge" id="obsRecStatus" style="display: none;">
                    <span class="rec-led"></span> RECORDING
                </div>
            </div>
            <div class="video-stage" id="videoStage">
                <video class="video-preview" id="preview" autoplay muted playsinline></video>
                <div class="timestamp-obs" id="timestampOverlay">
                    <div class="timestamp-time" id="liveTime">--:--:--</div>
                    <div class="timestamp-date" id="liveDate">---, -- --- ----</div>
                    <div class="rec-duration-obs" id="recDurationBadge">
                        <i class="fas fa-circle"></i> <span id="onVideoTimer">00:00:00</span>
                    </div>
                </div>
                <div class="preview-overlay" id="videoOverlay">
                    <i class="fas fa-display fa-3x" style="opacity:0.7;"></i>
                    <h3 style="font-weight:400;">Siap merekam</h3>
                    <p style="font-size:13px; opacity:0.9;">Pilih layar/jendela · timestamp otomatis</p>
                </div>
            </div>
        </div>

        <div class="control-bar">
            <div class="btn-group-obs">
                <button class="btn-obs btn-record" id="recordBtn"><i class="fas fa-circle"></i> START RECORD</button>
                <button class="btn-obs btn-stop" id="stopBtn" disabled><i class="fas fa-stop"></i> STOP</button>
                <button class="btn-obs btn-success-obs" id="downloadBtn" disabled><i class="fas fa-download"></i> LAST VIDEO</button>
                <button class="btn-obs btn-warning-obs" id="exportFullBtn"><i class="fas fa-file-export"></i> EXPORT ZIP</button>
            </div>
            <div class="stats-obs">
                <span><i class="fas fa-stopwatch"></i> <span id="durationTimer">00:00:00</span></span>
                <span><i class="fas fa-hdd"></i> <span id="fileSize">0 MB</span></span>
            </div>
        </div>

        <div style="background: rgba(20,20,20,0.5); backdrop-filter: blur(8px); border-radius:30px; padding:12px 20px; border:1px solid #333; font-size:13px;">
            <i class="fas fa-cloud-arrow-up" style="color:#00a3e0;"></i> 
            <strong>Mode Offline Aktif</strong> — Semua video tersimpan lokal. Bekerja tanpa internet.
        </div>
    </div>

    <div class="library-panel">
        <div class="panel-header">
            <span><i class="fas fa-database"></i> LIBRARY · OFFLINE DB</span>
            <input type="text" id="searchInput" class="search-obs" placeholder="Cari...">
        </div>
        <div class="video-list" id="videoListContainer">
            <div style="text-align:center; padding:32px; color:#aaa;">Memuat database...</div>
        </div>
        <div style="padding:16px; border-top:1px solid #2a2a2a; display:flex; gap:8px; flex-wrap:wrap;">
            <button class="action-icon-obs" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh</button>
            <button class="action-icon-obs" id="dbInfoBtn"><i class="fas fa-info-circle"></i> Info</button>
            <button class="action-icon-obs" id="clearAllBtn" style="background:#8b2c2c;"><i class="fas fa-trash"></i> Hapus Semua</button>
            <button class="action-icon-obs" id="backupDbBtn"><i class="fas fa-archive"></i> Backup</button>
            <button class="action-icon-obs" id="restoreDbBtn"><i class="fas fa-upload"></i> Restore</button>
        </div>
    </div>
</div>

<!-- MODAL & PROGRESS -->
<div class="modal-obs" id="videoModal">
    <div class="modal-content-obs">
        <div class="modal-header" style="display:flex; justify-content:space-between; padding:16px 20px;">
            <h3 id="modalTitle">Video Player</h3>
            <button id="closeModalBtn" style="background:none; border:none; color:white; font-size:26px;">&times;</button>
        </div>
        <video id="modalVideoPlayer" controls style="width:100%; background:black;"></video>
        <div style="padding:18px;" id="modalMeta"></div>
        <div style="padding:0 18px 18px; display:flex; gap:10px;">
            <button id="modalDownload" class="btn-obs btn-success-obs" style="flex:1;">Download</button>
            <button id="modalDelete" class="btn-obs" style="background:#b71c1c; flex:1;">Hapus</button>
        </div>
    </div>
</div>

<div class="progress-modal-obs" id="progressModal">
    <div class="progress-card-obs">
        <i class="fas fa-cog fa-spin fa-2x"></i>
        <h3 id="progressTitle">Processing</h3>
        <div class="progress-bar-obs"><div class="progress-fill-obs" id="progressFill"></div></div>
        <p id="progressDetail"></p>
        <button id="cancelProgressBtn" class="action-icon-obs">Batal</button>
    </div>
</div>

<input type="file" id="restoreFileInput" accept=".zip" style="display:none;">
<div class="toast-stack" id="toastStack"></div>

<script>
    (function(){
        "use strict";

        // ---------- STATUS KONEKSI (OFFLINE/ONLINE) ----------
        const networkStatusDiv = document.getElementById('networkStatus');
        const networkText = document.getElementById('networkText');
        function updateNetworkStatus() {
            const isOnline = navigator.onLine;
            if (isOnline) {
                networkStatusDiv.className = 'network-status online';
                networkText.innerText = 'Online';
                showToast('🌐 Koneksi pulih · Online', 2000);
            } else {
                networkStatusDiv.className = 'network-status offline';
                networkText.innerText = 'Offline Mode';
                showToast('📴 Offline Mode · Data tetap tersimpan lokal', 2500);
            }
        }
        window.addEventListener('online', updateNetworkStatus);
        window.addEventListener('offline', updateNetworkStatus);
        updateNetworkStatus();

        // ---------- TIMESTAMP PRESISI (anti macet) ----------
        const liveTimeEl = document.getElementById('liveTime');
        const liveDateEl = document.getElementById('liveDate');
        function updateLiveTimestamp() {
            const now = new Date();
            liveTimeEl.innerText = now.toLocaleTimeString('id-ID', { hour12: false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
            const days = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
            const months = ['Jan','Feb','Mar','Apr','Mei','Jun','Jul','Agu','Sep','Okt','Nov','Des'];
            liveDateEl.innerText = `${days[now.getDay()].slice(0,3)}, ${now.getDate()} ${months[now.getMonth()]} ${now.getFullYear()}`;
            setTimeout(updateLiveTimestamp, 1000 - (Date.now() % 1000));
        }
        setTimeout(updateLiveTimestamp, 1000 - (Date.now() % 1000));

        // ---------- INDEXED DB ----------
        const DB_NAME = 'OBS_ScreenRecorder';
        const STORE = 'videos';
        let db = null;
        let currentRecording = { active: false, mediaRecorder: null, stream: null, chunks: [], startTime: null, timer: null, saveInterval: null, videoId: null, title: null, lastSaved: 0, isSaving: false };
        let isProcessing = false;

        // Elements
        const stageDiv = document.getElementById('videoStage');
        const onVideoTimerSpan = document.getElementById('onVideoTimer');
        const durationTimerSpan = document.getElementById('durationTimer');
        const fileSizeSpan = document.getElementById('fileSize');
        const recordBtn = document.getElementById('recordBtn');
        const stopBtn = document.getElementById('stopBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const previewVideo = document.getElementById('preview');
        const videoOverlay = document.getElementById('videoOverlay');
        const obsRecStatus = document.getElementById('obsRecStatus');

        function formatDuration(sec) { sec = sec || 0; const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = Math.floor(sec%60); return `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`; }
        function formatFileSize(b) { if(b<1024) return b+' B'; if(b<1048576) return (b/1024).toFixed(1)+' KB'; return (b/1048576).toFixed(1)+' MB'; }
        function showToast(msg, duration=3500) { const c = document.getElementById('toastStack'); const t = document.createElement('div'); t.className='toast-obs'; t.innerHTML=`<i class="fas fa-info-circle"></i> ${msg}`; c.appendChild(t); setTimeout(()=>t.remove(), duration); }

        // DB helpers
        async function initDB() { return new Promise((res,rej)=>{ const r=indexedDB.open(DB_NAME,1); r.onerror=()=>rej(r.error); r.onsuccess=(e)=>{ db=e.target.result; loadAllVideos(); res(db); }; r.onupgradeneeded=(e)=>{ if(!e.target.result.objectStoreNames.contains(STORE)) e.target.result.createObjectStore(STORE,{keyPath:'id'}); }; }); }
        async function getAllVideos() { if(!db) return []; return new Promise(r=>{ const tx=db.transaction([STORE],'readonly'); tx.objectStore(STORE).getAll().onsuccess=e=>r(e.target.result||[]); }); }
        async function saveVideoToDB(data, blob) { return new Promise((res,rej)=>{ const tx=db.transaction([STORE],'readwrite'); const store=tx.objectStore(STORE); store.put({...data, blob, savedAt:Date.now()}).onsuccess=()=>res(); store.put({...data, blob}).onerror=()=>rej(); }); }
        async function deleteVideo(id) { return new Promise(r=>{ db.transaction([STORE],'readwrite').objectStore(STORE).delete(id).onsuccess=()=>r(); }); }
        async function clearAll() { return new Promise(r=>{ db.transaction([STORE],'readwrite').objectStore(STORE).clear().onsuccess=()=>r(); }); }
        async function loadAllVideos() { const videos = await getAllVideos(); renderLibrary(videos); downloadBtn.disabled = videos.length===0; return videos; }
        
        function renderLibrary(videos) {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = videos.filter(v=>v.title.toLowerCase().includes(term));
            const cont = document.getElementById('videoListContainer');
            if(!filtered.length) { cont.innerHTML = '<div style="text-align:center;padding:32px;">📭 Tidak ada video</div>'; return; }
            cont.innerHTML = filtered.map(v=>`<div class="video-item" data-id="${v.id}"><div class="video-title"><i class="fas fa-video"></i> ${escapeHtml(v.title)}</div><div class="video-meta">${formatDuration(v.duration)} • ${formatFileSize(v.size)}</div><div class="video-actions"><button class="action-icon-obs play-vid" data-id="${v.id}"><i class="fas fa-play"></i> Play</button><button class="action-icon-obs del-vid" data-id="${v.id}"><i class="fas fa-trash"></i></button></div></div>`).join('');
            document.querySelectorAll('.play-vid').forEach(b=>b.addEventListener('click', e=>{ e.stopPropagation(); openModal(b.dataset.id); }));
            document.querySelectorAll('.del-vid').forEach(b=>b.addEventListener('click', async e=>{ e.stopPropagation(); if(confirm('Hapus?')){ await deleteVideo(b.dataset.id); loadAllVideos(); showToast('Dihapus'); }}));
            document.querySelectorAll('.video-item').forEach(c=>c.addEventListener('click', ()=>openModal(c.dataset.id)));
        }

        async function openModal(id) { /* ... sama seperti sebelumnya ... */ 
            const v = await getVideoById(id); if(!v?.blob) return; const url=URL.createObjectURL(v.blob); const modal=document.getElementById('videoModal'); 
            document.getElementById('modalVideoPlayer').src=url; document.getElementById('modalTitle').innerText=v.title; 
            document.getElementById('modalMeta').innerHTML=`Durasi: ${formatDuration(v.duration)} · ${formatFileSize(v.size)}`; modal.style.display='flex';
            document.getElementById('modalDownload').onclick=()=>{ const a=document.createElement('a'); a.href=url; a.download=`${v.title}.webm`; a.click(); };
            document.getElementById('modalDelete').onclick=async ()=>{ await deleteVideo(v.id); loadAllVideos(); modal.style.display='none'; };
        }
        async function getVideoById(id){ return new Promise(r=>{ db.transaction([STORE],'readonly').objectStore(STORE).get(id).onsuccess=e=>r(e.target.result); }); }
        function escapeHtml(s){ return s.replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        // Recording
        async function startRecording() { /* ... inti sama, tambahkan notifikasi offline tetap berfungsi ... */ 
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video:true, audio:true });
                currentRecording.stream = stream; currentRecording.chunks = []; currentRecording.videoId = 'obs_'+Date.now(); currentRecording.title = `Rec ${new Date().toLocaleString()}`; currentRecording.startTime = Date.now();
                previewVideo.srcObject = stream; previewVideo.style.display='block'; videoOverlay.style.display='none'; stageDiv.classList.add('recording-active'); obsRecStatus.style.display='flex';
                const rec = new MediaRecorder(stream, { mimeType: 'video/webm;codecs=vp8', videoBitsPerSecond:2500000 });
                rec.ondataavailable = e => { if(e.data.size){ currentRecording.chunks.push(e.data); fileSizeSpan.innerText = formatFileSize(currentRecording.chunks.reduce((s,c)=>s+c.size,0)); } };
                rec.onstop = async ()=>{ await saveCurrent(true); cleanup(); loadAllVideos(); };
                rec.start(3000); currentRecording.mediaRecorder = rec; currentRecording.active = true;
                currentRecording.timer = setInterval(()=>{ if(currentRecording.startTime) updateDurationUI(Math.floor((Date.now()-currentRecording.startTime)/1000)); }, 200);
                recordBtn.disabled=true; stopBtn.disabled=false; showToast('🔴 Merekam · Offline mode tetap jalan');
            } catch(e) { showToast('Gagal: '+e.message); }
        }
        async function saveCurrent(final=false) { if(!currentRecording.chunks.length || currentRecording.isSaving) return; currentRecording.isSaving=true; 
            try{ const blob = new Blob(currentRecording.chunks,{type:'video/webm'}); const dur = Math.floor((Date.now()-currentRecording.startTime)/1000);
                await saveVideoToDB({ id:currentRecording.videoId, title:currentRecording.title, duration:dur, date:new Date().toISOString(), size:blob.size }, blob);
            } catch(e){} finally{ currentRecording.isSaving=false; } }
        function stopRecording() { if(currentRecording.mediaRecorder) currentRecording.mediaRecorder.stop(); }
        function cleanup() { currentRecording.active=false; stageDiv.classList.remove('recording-active'); obsRecStatus.style.display='none'; clearInterval(currentRecording.timer); stopBtn.disabled=true; recordBtn.disabled=false; updateDurationUI(0); fileSizeSpan.innerText='0 MB'; if(currentRecording.stream) currentRecording.stream.getTracks().forEach(t=>t.stop()); previewVideo.srcObject=null; previewVideo.style.display='none'; videoOverlay.style.display='flex'; }
        function updateDurationUI(s) { const f=formatDuration(s); durationTimerSpan.innerText=f; if(currentRecording.active) onVideoTimerSpan.innerText=f; else onVideoTimerSpan.innerText='00:00:00'; }
        async function downloadLatest() { const v=await getAllVideos(); if(v.length){ const url=URL.createObjectURL(v[0].blob); const a=document.createElement('a'); a.href=url; a.download=`${v[0].title}.webm`; a.click(); } }

        // Init & Listeners
        window.addEventListener('load', async ()=>{
            await initDB();
            recordBtn.onclick=startRecording; stopBtn.onclick=stopRecording; downloadBtn.onclick=downloadLatest;
            document.getElementById('exportFullBtn').onclick=backupZip; document.getElementById('refreshBtn').onclick=loadAllVideos;
            document.getElementById('dbInfoBtn').onclick=async ()=>{ const v=await getAllVideos(); alert(`${v.length} video · ${formatFileSize(v.reduce((s,x)=>s+x.size,0))}`); };
            document.getElementById('clearAllBtn').onclick=async ()=>{ if(confirm('Hapus semua?')){ await clearAll(); loadAllVideos(); }};
            document.getElementById('backupDbBtn').onclick=backupZip; document.getElementById('restoreDbBtn').onclick=()=>document.getElementById('restoreFileInput').click();
            document.getElementById('restoreFileInput').onchange= e=>{ if(e.target.files[0]) restoreZip(e.target.files[0]); e.target.value=''; };
            document.getElementById('closeModalBtn').onclick=()=>{ document.getElementById('videoModal').style.display='none'; };
            document.getElementById('searchInput').addEventListener('input', ()=>loadAllVideos());
        });

        async function backupZip() { /* ...fungsi backup... */ if(isProcessing) return; const videos=await getAllVideos(); if(!videos.length){ showToast('Kosong'); return; } isProcessing=true; showProgress(true,'Backup ZIP'); try{ const zip=new JSZip(); const f=zip.folder('videos'); let meta=[]; for(let i=0;i<videos.length;i++){ const v=videos[i]; progressFill.style.width=(i/videos.length*100)+'%'; if(v.blob){ const fn=v.id+'.webm'; f.file(fn,v.blob); meta.push({...v, filename:fn}); } } zip.file('meta.json', JSON.stringify({exportDate:new Date(), videos:meta})); const blob=await zip.generateAsync({type:'blob'}); saveAs(blob, `obs_backup_${Date.now()}.zip`); showToast('✅ Backup sukses'); } catch(e){ showToast('Gagal'); } finally{ isProcessing=false; showProgress(false); } }
        async function restoreZip(file) { if(isProcessing) return; isProcessing=true; showProgress(true,'Restore'); try{ const zip=await JSZip.loadAsync(file); const metaFile=zip.file('meta.json'); if(!metaFile) throw new Error('Invalid'); const meta=JSON.parse(await metaFile.async('string')); for(let i=0;i<meta.videos.length;i++){ const item=meta.videos[i]; const blobFile=zip.file(`videos/${item.filename}`); if(blobFile){ const blob=await blobFile.async('blob'); await saveVideoToDB({ id:item.id, title:item.title, duration:item.duration, date:item.date, size:blob.size }, blob); } progressFill.style.width=(i/meta.videos.length*100)+'%'; } await loadAllVideos(); showToast(`✅ ${meta.videos.length} video direstore`); } catch(e){ showToast('Gagal restore'); } finally{ isProcessing=false; showProgress(false); } }
        function showProgress(show, title='') { const m=document.getElementById('progressModal'); if(show){ document.getElementById('progressTitle').innerText=title; m.style.display='flex'; } else m.style.display='none'; }
        window.showProgress = showProgress;
    })();
</script>
</body>
