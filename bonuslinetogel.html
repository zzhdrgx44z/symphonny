<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LINETOGEL - Cyber Bonus Dashboard (Responsive)</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
:root {
    --neon-cyan: #00ffff;
    --neon-pink: #ff00ff;
    --neon-yellow: #ffff00;
    --neon-green: #00ff00;
    --neon-blue: #0080ff;
    --neon-purple: #8000ff;
    --neon-red: #ff0040;
    --dark-bg: #0a0a0f;
    --darker-bg: #050508;
    --card-bg: rgba(10, 10, 20, 0.9);
    --glass: rgba(0, 255, 255, 0.05);
    --glass-border: rgba(0, 255, 255, 0.2);
    --text-primary: #ffffff;
    --text-secondary: #b0b0c0;
    --text-muted: #606070;
}

/* RESET & RESPONSIVE BASE */
html, body { width: 100%; overflow-x: hidden; box-sizing: border-box; }
*, *:before, *:after { box-sizing: inherit; }

body {
    font-family: 'Rajdhani', sans-serif;
    background: var(--dark-bg);
    color: var(--text-primary);
    min-height: 100vh;
    position: relative;
    font-size: 16px;
    line-height: 1.5;
}

/* --- Background Effects --- */
.cyber-grid {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: 
        linear-gradient(rgba(0, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.05) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: -5;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
}
@keyframes gridMove { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }

.matrix-rain {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: -4; overflow: hidden;
}
.matrix-column {
    position: absolute; top: -100%; font-family: 'Share Tech Mono', monospace;
    font-size: 12px; color: var(--neon-green); text-shadow: 0 0 5px var(--neon-green);
    animation: matrixFall linear infinite; opacity: 0.5;
}
@keyframes matrixFall {
    0% { transform: translateY(-100%); opacity: 0; }
    10% { opacity: 0.5; } 90% { opacity: 0.5; }
    100% { transform: translateY(100vh); opacity: 0; }
}

.holo-orb { position: fixed; border-radius: 50%; filter: blur(60px); z-index: -3; pointer-events: none; mix-blend-mode: screen; }
.orb-1 { width: 350px; height: 350px; background: radial-gradient(circle, var(--neon-cyan) 0%, transparent 70%); top: -120px; left: -120px; opacity: 0.4; animation: orbFloat1 15s ease-in-out infinite; }
.orb-2 { width: 320px; height: 320px; background: radial-gradient(circle, var(--neon-pink) 0%, transparent 70%); bottom: -120px; right: -120px; opacity: 0.4; animation: orbFloat2 20s ease-in-out infinite reverse; }
.orb-3 { width: 280px; height: 280px; background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0.3; animation: orbPulse 10s ease-in-out infinite; }

@keyframes orbFloat1 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(70px, -40px) scale(1.1); } 66% { transform: translate(-40px, 70px) scale(0.8); } }
@keyframes orbFloat2 { 0%, 100% { transform: translate(0, 0) scale(1); } 33% { transform: translate(-60px, 50px) scale(1.2); } 66% { transform: translate(50px, -60px) scale(0.85); } }
@keyframes orbPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 0.5; } }

/* --- Header & Search --- */
.cyber-header {
    position: relative; padding: 40px 15px 30px; text-align: center;
    background: linear-gradient(180deg, rgba(0, 255, 255, 0.08) 0%, transparent 100%);
    border-bottom: 1px solid var(--neon-cyan); overflow: hidden;
    z-index: 5; width: 100%;
}
.cyber-header::before {
    content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
    animation: cyberScan 3s linear infinite; opacity: 0.3; pointer-events: none;
}
@keyframes cyberScan { 0% { left: -100%; } 100% { left: 100%; } }

.cyber-header h1 {
    font-family: 'Orbitron', sans-serif; font-size: clamp(1.4rem, 6vw, 2.2rem);
    font-weight: 700; color: var(--text-primary); margin-bottom: 10px;
    letter-spacing: 2px; text-transform: uppercase;
    text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan);
    pointer-events: auto;
    line-height: 1.2;
}
.cyber-header h1 i { margin-right: 10px; color: var(--neon-cyan); animation: iconSpin 4s linear infinite; font-size: 0.9em; display: none; } /* Hidden on very small screens */
@keyframes iconSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

@media (min-width: 400px) { .cyber-header h1 i { display: inline-block; } }

.cyber-header p { font-size: 0.9rem; color: var(--text-secondary); letter-spacing: 1px; text-transform: uppercase; }

.cyber-search-container { max-width: 600px; margin: -25px auto 30px; position: relative; z-index: 20; width: 90%; }
.cyber-search-wrapper {
    position: relative; background: var(--card-bg);
    border: 1px solid var(--glass-border); padding: 5px;
    box-shadow: 0 0 20px rgba(0, 255, 255, 0.2); backdrop-filter: blur(8px);
    border-radius: 5px;
}
.cyber-search-box {
    width: 100%; padding: 12px 45px 12px 15px; background: transparent; border: none; outline: none;
    color: var(--neon-cyan); font-family: 'Share Tech Mono', monospace;
    font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
}
.cyber-search-box::placeholder { color: var(--text-muted); font-size: 0.85rem; }
.cyber-search-box:focus { text-shadow: 0 0 10px var(--neon-cyan); }

.cyber-search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--neon-cyan); font-size: 1rem; animation: pulse 2s infinite; pointer-events: none; }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

.cyber-clear-search {
    position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
    color: var(--text-muted); cursor: pointer; opacity: 0; transition: all 0.3s ease;
    z-index: 2;
}
.cyber-clear-search.visible { opacity: 1; }

.search-results { text-align: center; margin-top: 10px; color: var(--neon-cyan); font-family: 'Share Tech Mono', monospace; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

/* --- Main Layout --- */
.cyber-main { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 260px 1fr; gap: 20px; padding: 0 20px 40px; position: relative; z-index: 10; width: 100%; }

/* --- Sidebar --- */
.cyber-sidebar { position: sticky; top: 15px; height: fit-content; z-index: 20; }
.cyber-sidebar-content {
    background: var(--card-bg); border: 1px solid var(--glass-border);
    padding: 20px; box-shadow: 0 0 25px rgba(0, 255, 255, 0.15);
    backdrop-filter: blur(8px); position: relative; overflow: hidden; border-radius: 5px;
}
.cyber-sidebar-content::before {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
    animation: sidebarGlow 3s linear infinite; pointer-events: none;
}
@keyframes sidebarGlow { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

.cyber-sidebar h2 {
    font-family: 'Orbitron', sans-serif; font-size: 1rem; text-align: center;
    margin-bottom: 15px; color: var(--neon-cyan); text-transform: uppercase;
    letter-spacing: 2px; text-shadow: 0 0 15px var(--neon-cyan);
}
.cyber-category-list { list-style: none; display: flex; flex-direction: column; gap: 5px; }
.cyber-category-list li { position: relative; width: 100%; }

.cyber-category-list a {
    display: flex; align-items: center; padding: 12px 15px; color: var(--text-secondary);
    text-decoration: none; border: 1px solid transparent; transition: all 0.3s ease;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
    font-size: 0.85rem; position: relative; overflow: hidden; cursor: pointer; width: 100%; border-radius: 4px;
}
.cyber-category-list a::before {
    content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
    transition: left 0.4s ease; pointer-events: none;
}
.cyber-category-list a:hover::before { left: 100%; }
.cyber-category-list a:hover, .cyber-category-list a.active {
    background: rgba(0, 255, 255, 0.1); border-color: var(--neon-cyan);
    color: var(--neon-cyan); box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
    text-shadow: 0 0 8px var(--neon-cyan); transform: translateX(5px);
}
.cyber-category-list i { margin-right: 10px; font-size: 0.9rem; width: 20px; text-align: center; transition: all 0.3s ease; pointer-events: none; }

/* --- Content Area --- */
.cyber-content { min-width: 0; width: 100%; }
.cyber-card {
    background: var(--card-bg); border: 1px solid var(--glass-border);
    padding: 20px; margin-bottom: 20px; transition: all 0.3s ease;
    position: relative; overflow: hidden; backdrop-filter: blur(8px); border-radius: 5px;
}
.cyber-card::before {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-purple));
    opacity: 0; transition: opacity 0.3s ease; pointer-events: none;
}
.cyber-card:hover { border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0, 255, 255, 0.2); transform: translateY(-2px); }
.cyber-card:hover::before { opacity: 1; }

/* COPY BUTTON */
.cyber-copy-all {
    position: absolute; top: 15px; right: 15px; width: 35px; height: 35px;
    background: rgba(0,0,0,0.8); border: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: center;
    color: var(--neon-cyan); cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    font-size: 0.9rem; z-index: 10; border-radius: 5px;
}
.cyber-copy-all:hover {
    background: var(--neon-cyan); color: var(--dark-bg);
    border-color: var(--neon-cyan); box-shadow: 0 0 25px var(--neon-cyan);
    transform: rotate(15deg) scale(1.1);
}
.cyber-copy-all.copied {
    background: var(--neon-green); color: var(--dark-bg);
    border-color: var(--neon-green); box-shadow: 0 0 30px var(--neon-green);
    transform: rotate(360deg) scale(1.1);
}
.cyber-copy-all.copied i { animation: checkBounce 0.5s ease; }
@keyframes checkBounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.5); } }

.cyber-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; padding-right: 50px; }
.cyber-card-header h3 {
    font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--text-primary);
    flex: 1; min-width: 200px; text-transform: uppercase; letter-spacing: 0.5px;
    line-height: 1.3;
}

.cyber-card-type {
    padding: 6px 12px; font-weight: 700; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 1px; position: relative; overflow: hidden; border: 1px solid;
    white-space: nowrap;
}
.type-cashback { background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); border-color: var(--neon-cyan); color: var(--dark-bg); box-shadow: 0 0 15px var(--neon-cyan); }
.type-turnover { background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple)); border-color: var(--neon-pink); color: var(--dark-bg); box-shadow: 0 0 15px var(--neon-pink); }
.type-extra { background: linear-gradient(135deg, var(--neon-yellow), var(--neon-green)); border-color: var(--neon-yellow); color: var(--dark-bg); box-shadow: 0 0 15px var(--neon-yellow); }
.type-referral { background: linear-gradient(135deg, var(--neon-purple), var(--neon-red)); border-color: var(--neon-purple); color: var(--dark-bg); box-shadow: 0 0 15px var(--neon-purple); }

.cyber-card-details { color: var(--text-secondary); line-height: 1.6; font-size: 0.9rem; }
.cyber-card-details p { margin-bottom: 12px; }
.cyber-card-details ul { margin-left: 15px; margin-bottom: 12px; padding-left: 10px; }
.cyber-card-details li { margin-bottom: 8px; position: relative; }
.cyber-card-details strong { color: var(--neon-cyan); font-weight: 600; text-shadow: 0 0 5px var(--neon-cyan); }

/* Table */
.cyber-table { width: 100%; border-collapse: separate; border-spacing: 0; margin: 15px 0; background: var(--card-bg); border: 1px solid var(--glass-border); overflow: hidden; font-size: 0.8rem; display: block; overflow-x: auto; white-space: nowrap; }
.cyber-table th { background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); color: var(--dark-bg); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 10px 12px; text-align: left; font-family: 'Orbitron', sans-serif; }
.cyber-table td { padding: 10px 12px; border-bottom: 1px solid var(--glass-border); color: var(--text-secondary); }
.cyber-table tr:last-child td { border-bottom: none; }

/* Buttons */
.cyber-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 10px 18px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
    border: 1px solid var(--neon-cyan); color: var(--dark-bg); cursor: pointer;
    font-weight: 700; font-size: 0.85rem; transition: all 0.3s ease;
    margin-top: 10px; text-transform: uppercase; letter-spacing: 1px;
    box-shadow: 0 0 18px var(--neon-cyan); width: auto; border-radius: 4px;
}
.cyber-btn:hover { box-shadow: 0 0 30px var(--neon-cyan); transform: translateY(-2px); }
.cyber-btn.copied { background: linear-gradient(135deg, var(--neon-green), var(--neon-cyan)); border-color: var(--neon-green); box-shadow: 0 0 30px var(--neon-green); }

/* Referral Link */
.cyber-referral-container { display: flex; align-items: center; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
.cyber-referral-link {
    flex: 1; min-width: 0; background: var(--card-bg); border: 1px solid var(--glass-border);
    padding: 10px 12px; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem;
    color: var(--neon-cyan); word-break: break-all; text-transform: uppercase; letter-spacing: 0.5px;
    border-radius: 4px;
}

/* Status Tabs */
.cyber-status-tabs { display: flex; gap: 5px; margin-bottom: 20px; background: var(--card-bg); border: 1px solid var(--glass-border); padding: 5px; border-radius: 5px; }
.cyber-status-tab {
    flex: 1; padding: 12px; cursor: pointer; color: var(--text-secondary);
    transition: all 0.3s ease; font-weight: 700; text-align: center;
    text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
    border: 1px solid transparent; user-select: none; -webkit-tap-highlight-color: transparent; border-radius: 4px;
}
.cyber-status-tab.active {
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
    color: var(--dark-bg); border-color: var(--neon-cyan); box-shadow: 0 0 25px var(--neon-cyan);
}
.cyber-status-tab:hover:not(.active) { color: var(--neon-cyan); border-color: var(--neon-cyan); }

/* Status Indicators */
.cyber-status-indicator {
    display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px;
    font-weight: 700; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;
    margin-top: 10px; border: 1px solid; position: relative; overflow: hidden; border-radius: 4px;
}
.cyber-status-indicator::before {
    content: ""; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
    animation: statusScan 2s linear infinite; pointer-events: none;
}
@keyframes statusScan { 0% { left: -100%; } 100% { left: 100%; } }

.status-pending { background: rgba(255, 255, 0, 0.08); color: var(--neon-yellow); border-color: var(--neon-yellow); box-shadow: 0 0 18px var(--neon-yellow); }
.status-processing { background: rgba(0, 255, 255, 0.08); color: var(--neon-cyan); border-color: var(--neon-cyan); box-shadow: 0 0 18px var(--neon-cyan); }
.status-completed { background: rgba(0, 255, 0, 0.08); color: var(--neon-green); border-color: var(--neon-green); box-shadow: 0 0 18px var(--neon-green); }

.cyber-status-dot { width: 8px; height: 8px; border-radius: 50%; position: relative; }
.status-pending .cyber-status-dot { background: var(--neon-yellow); box-shadow: 0 0 12px var(--neon-yellow); }
.status-processing .cyber-status-dot { background: var(--neon-cyan); box-shadow: 0 0 12px var(--neon-cyan); animation: statusPulse 1s infinite; }
.status-processing .cyber-status-dot::after {
    content: ""; position: absolute; top: 0; left: 0; width: 8px; height: 8px; border-radius: 50%;
    background: var(--neon-cyan); animation: statusRipple 1s infinite;
}
@keyframes statusPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
@keyframes statusRipple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
.status-completed .cyber-status-dot { background: var(--neon-green); box-shadow: 0 0 12px var(--neon-green); }

/* No Results */
.cyber-no-results { text-align: center; padding: 40px 20px; color: var(--text-secondary); }
.cyber-no-results i { font-size: 3rem; margin-bottom: 15px; color: var(--neon-cyan); opacity: 0.7; animation: iconFloat 3s ease-in-out infinite; text-shadow: 0 0 25px var(--neon-cyan); pointer-events: none;}
@keyframes iconFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
.cyber-no-results h3 { font-size: 1.2rem; margin-bottom: 10px; color: var(--text-primary); font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 18px var(--neon-cyan); }
.cyber-no-results button { padding: 12px 20px; background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); border: 1px solid var(--neon-cyan); color: var(--dark-bg); cursor: pointer; font-weight: 700; font-size: 0.9rem; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 25px var(--neon-cyan); border-radius: 4px; }

/* FAB & Toast */
.cyber-fab {
    position: fixed; bottom: 20px; right: 20px; width: 45px; height: 45px;
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue));
    border: 2px solid var(--neon-cyan); border-radius: 50%; display: flex;
    align-items: center; justify-content: center; color: var(--dark-bg);
    font-size: 1rem; cursor: pointer; z-index: 1000; transition: all 0.3s ease;
    box-shadow: 0 0 30px var(--neon-cyan);
}
.cyber-fab:hover { transform: scale(1.1) rotate(180deg); box-shadow: 0 0 40px var(--neon-cyan); }

.cyber-toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: linear-gradient(135deg, var(--neon-cyan), var(--neon-blue)); color: var(--dark-bg);
    padding: 12px 20px; z-index: 10000; opacity: 0; transition: all 0.3s ease;
    font-weight: 700; text-transform: uppercase; letter-spacing: 1px; font-size: 0.8rem;
    box-shadow: 0 0 30px var(--neon-cyan); border-radius: 4px;
    display: flex; align-items: center; gap: 10px; pointer-events: none; white-space: nowrap; max-width: 90%;
}
.cyber-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* Content Header */
.content-header { text-align: center; margin-bottom: 20px; }
.content-header h2 { color: var(--neon-cyan); font-family: 'Orbitron', sans-serif; font-size: 1rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 25px var(--neon-cyan); }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--darker-bg); }
::-webkit-scrollbar-thumb { background: linear-gradient(180deg, var(--neon-cyan), var(--neon-blue)); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: linear-gradient(180deg, var(--neon-pink), var(--neon-purple)); }

/* --- MEDIA QUERIES (RESPONSIVE LOGIC) --- */
/* Tablet & Mobile (< 992px) */
@media (max-width: 992px) {
    .cyber-main { grid-template-columns: 1fr; gap: 20px; padding: 0 15px 40px; }
    .cyber-sidebar { position: relative; top: 0; margin-bottom: 10px; }
    .cyber-category-list { flex-direction: row; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
    .cyber-category-list::-webkit-scrollbar { height: 4px; }
    .cyber-category-list a { padding: 10px 15px; white-space: nowrap; flex-shrink: 0; }
    .cyber-status-tabs { flex-wrap: wrap; }
    .cyber-status-tab { width: 48%; margin-bottom: 5px; }
}

/* Mobile (< 600px) */
@media (max-width: 600px) {
    .cyber-header { padding: 30px 15px 25px; }
    .cyber-header h1 { font-size: 1.3rem; letter-spacing: 1px; margin-bottom: 8px; }
    .cyber-header p { font-size: 0.8rem; }
    .cyber-search-container { margin: -20px auto 25px; width: 95%; }
    
    .cyber-card { padding: 15px; }
    .cyber-card-header { padding-right: 45px; flex-direction: column; align-items: flex-start; }
    .cyber-card-header h3 { font-size: 0.95rem; width: 100%; margin-bottom: 8px; }
    
    .cyber-status-tabs { flex-direction: column; }
    .cyber-status-tab { width: 100%; padding: 10px; }
    
    .cyber-table { font-size: 0.75rem; }
    .cyber-table th, .cyber-table td { padding: 8px 10px; }
    
    .cyber-referral-container { flex-direction: column; align-items: stretch; }
    .cyber-referral-link { font-size: 0.75rem; text-align: center; }
    .cyber-btn { width: 100%; justify-content: center; }
    
    .cyber-card-details ul { padding-left: 5px; margin-left: 10px; }
}

function createMatrixRain() {
    const matrixContainer = document.getElementById('matrixRain');
    const columns = 20;
    const characters = '01アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ';
    for (let i = 0; i < columns; i++) {
        const column = document.createElement('div');
        column.className = 'matrix-column';
        column.style.left = (i * 5) + '%';
        column.style.animationDuration = (5 + Math.random() * 10) + 's';
        column.style.animationDelay = Math.random() * 5 + 's';
        let text = '';
        for (let j = 0; j < 30; j++) text += characters[Math.floor(Math.random() * characters.length)] + '<br>';
        column.innerHTML = text;
        matrixContainer.appendChild(column);
    }
}

function fallbackCopyTextToClipboard(text, callback) {
    const textArea = document.createElement("textarea");
    textArea.value = text;
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    textArea.style.opacity = "0"; 
    document.body.appendChild(textArea);
    textArea.focus();
    textArea.select();
    try {
        const successful = document.execCommand('copy');
        document.body.removeChild(textArea);
        callback(successful);
    } catch (err) {
        document.body.removeChild(textArea);
        callback(false);
    }
}

// FUNGSI COPY YANG SUDAH DIPERBAIKI (LOGIKA KHUSUS STATUS)
function copyCardContent(element) {
    const tempDiv = document.createElement('div');
    tempDiv.innerHTML = element.innerHTML;
    const elementsToRemove = tempDiv.querySelectorAll('button, .cyber-copy-all, .cyber-status-indicator, script, style');
    elementsToRemove.forEach(el => el.remove());

    let finalText = "";

    // CEK APAKAH INI KARTU STATUS (ID dimulai dengan 'status-')
    if (element.id.startsWith('status-')) {
        // MODE STATUS: SALIN HANYA PESAN
        const messageDiv = tempDiv.querySelector('.cyber-card-details');
        if (messageDiv) {
            finalText = messageDiv.innerText.trim();
        }
    } else {
        // MODE BONUS: SALIN JUDUL + KONTEN (LOGIKA LAMA)
        const title = tempDiv.querySelector('.cyber-card-header h3') ? tempDiv.querySelector('.cyber-card-header h3').innerText + "\n\n" : "";
        const contentDiv = tempDiv.querySelector('.cyber-card-details');
        let contentText = "";

        if (contentDiv) {
            const tables = contentDiv.querySelectorAll('table');
            if (tables.length > 0) {
                tables.forEach(table => {
                    contentText += "\n[ TABEL BONUS ]\n";
                    const rows = table.querySelectorAll('tr');
                    rows.forEach(row => {
                        const cells = row.querySelectorAll('th, td');
                        let rowText = [];
                        cells.forEach(cell => rowText.push(cell.innerText.trim()));
                        contentText += rowText.join('  |  ') + '\n';
                    });
                    contentText += '\n';
                });
                const tempWrapper = document.createElement('div');
                tempWrapper.innerHTML = contentDiv.innerHTML;
                tables.forEach(t => t.remove());
                const otherText = tempWrapper.innerText.trim();
                contentText = otherText + "\n" + contentText;
            } else {
                contentText = contentDiv.innerText;
            }
        }
        finalText = (title + contentText).replace(/\n\s*\n\s*\n/g, '\n\n').trim();
    }

    // PROSES COPY (ROBUST FALLBACK)
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(finalText).then(() => {
            onCopySuccess(element);
        }).catch(err => {
            console.warn('Modern copy failed, trying fallback...', err);
            fallbackCopyTextToClipboard(finalText, (success) => {
                if(success) onCopySuccess(element);
                else showToast("Gagal menyalin: Izin ditolak");
            });
        });
    } else {
        fallbackCopyTextToClipboard(finalText, (success) => {
            if(success) onCopySuccess(element);
            else showToast("Browser ini tidak mendukung copy otomatis");
        });
    }
}

function onCopySuccess(element) {
    showToast('Data Matrix Tersalin!');
    const copyBtn = element.querySelector('.cyber-copy-all');
    if (copyBtn) {
        const originalIcon = copyBtn.innerHTML;
        copyBtn.classList.add('copied');
        copyBtn.innerHTML = '<i class="fas fa-check"></i>';
        setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.innerHTML = originalIcon;
        }, 2000);
    }
}

function copyToClipboard(text, button) {
    const copyAction = (success) => {
        if (success) {
            showToast('Data Tersalin!');
            if (button) {
                const originalHTML = button.innerHTML;
                button.innerHTML = '<i class="fas fa-check"></i> Tersalin!';
                button.classList.add('copied');
                setTimeout(() => { button.innerHTML = originalHTML; button.classList.remove('copied'); }, 2000);
            }
        } else {
            showToast('Gagal menyalin data');
        }
    };

    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => copyAction(true)).catch(() => fallbackCopyTextToClipboard(text, copyAction));
    } else {
        fallbackCopyTextToClipboard(text, copyAction);
    }
}

function showToast(message) {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    toastMessage.textContent = message;
    toast.classList.add('show');
    setTimeout(() => { toast.classList.remove('show'); }, 3000);
}

function showCategory(category) {

    document.querySelectorAll('.cyber-category-list a').forEach(link => { link.classList.remove('active'); });
    
    const links = document.querySelectorAll('.cyber-category-list a');
    links.forEach(link => {
        if(link.getAttribute('onclick').includes(`'${category}'`)) {
            link.classList.add('active');
            // Auto scroll horizontal to active item on mobile
            link.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }
    });
}

}

function showStatusTab(statusType) {
    document.querySelectorAll('.cyber-status-tab').forEach(tab => { tab.classList.remove('active'); });
    if(event && event.target) event.target.classList.add('active');
    else {
        const tabs = document.querySelectorAll('.cyber-status-tab');
        tabs.forEach(t => {
            if(t.getAttribute('onclick').includes(`'${statusType}'`)) t.classList.add('active');
        });
    }

    let filteredStatus = statusData.filter(item => item.status === statusType);
    if (searchQuery) {
        filteredStatus = filteredStatus.filter(item =>
            item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
            item.message.toLowerCase().includes(searchQuery.toLowerCase())
        );
    }

    const statusContent = document.getElementById('status-content');
    statusContent.innerHTML = '';

    if (filteredStatus.length === 0) {
        statusContent.innerHTML = `<div class="cyber-no-results"><i class="fas fa-search"></i><h3>Tidak Ada Data</h3><p>Tidak ada status yang sesuai</p><button onclick="clearSearch()">Reset Scanner</button></div>`;
        return;
    }

    filteredStatus.forEach((item, index) => {
        const statusCard = document.createElement('div');
        statusCard.className = 'cyber-card';
        statusCard.id = `status-${item.status}-${index}`;
        statusCard.innerHTML = `
            <button class="cyber-copy-all" onclick="copyCardContent(document.getElementById('status-${item.status}-${index}'))" title="Salin seluruh data"><i class="fas fa-copy"></i></button>
            <div class="cyber-card-header">
                <h3>${item.title}</h3>
                <div class="cyber-status-indicator status-${item.status}"><span class="cyber-status-dot"></span><span>${item.status === 'completed' ? 'COMPLETED' : item.status === 'processing' ? 'PROCESSING' : 'PENDING'}</span></div>
            </div>
            <div class="cyber-card-details"><p>${item.message}</p></div>
        `;
        statusContent.appendChild(statusCard);
    });
}

function filterAndDisplayData() {
    let filteredData = [];
    if (currentCategory === 'all') filteredData = bonusData;
    else if (currentCategory === 'status') { displayStatus(); return; }
    else filteredData = bonusData.filter(item => item.category === currentCategory);

    if (searchQuery) {
        filteredData = filteredData.filter(item =>
            item.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
            item.content.toLowerCase().includes(searchQuery.toLowerCase()) ||
            item.type.toLowerCase().includes(searchQuery.toLowerCase())
        );
    }

    const searchResults = document.getElementById('searchResults');
    searchResults.textContent = searchQuery ? `${filteredData.length} Data Ditemukan: "${searchQuery}"` : '';

    const contentArea = document.getElementById('contentArea');
    contentArea.innerHTML = '';

    if (filteredData.length === 0) {
        contentArea.innerHTML = `<div class="cyber-no-results"><i class="fas fa-search"></i><h3>Tidak Ada Data</h3><p>Tidak ada bonus yang sesuai</p><button onclick="clearSearch()">Reset Scanner</button></div>`;
        return;
    }

    filteredData.forEach((item, index) => {
        const typeClass = `type-${item.type.toLowerCase().replace(' ', '-')}`;
        const bonusCard = document.createElement('div');
        bonusCard.className = 'cyber-card';
        bonusCard.id = `bonus-${item.id}`;
        bonusCard.innerHTML = `
            <button class="cyber-copy-all" onclick="copyCardContent(document.getElementById('bonus-${item.id}'))" title="Salin seluruh data"><i class="fas fa-copy"></i></button>
            <div class="cyber-card-header">
                <h3>${item.title}</h3>
                <span class="cyber-card-type ${typeClass}">${item.type}</span>
            </div>
            <div class="cyber-card-details">${item.content}</div>
        `;
        contentArea.appendChild(bonusCard);
    });
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    filterAndDisplayData();
    document.getElementById('clearSearch').classList.remove('visible');
}
