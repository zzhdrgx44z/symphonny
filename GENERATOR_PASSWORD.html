<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Norton Password Generator | Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0b0b0b;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 550px;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 2px rgba(255, 204, 0, 0.4);
      overflow: hidden;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: #111;
      padding: 25px 20px 15px;
      text-align: center;
      border-bottom: 2px solid #ffcc00;
      position: relative;
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: #ffcc00;
      text-transform: uppercase;
    }

    .subtitle {
      color: #ccc;
      font-size: 0.9rem;
      margin-top: 5px;
      letter-spacing: 1px;
    }

    .shield-icon {
      font-size: 2.5rem;
      margin-bottom: 5px;
    }

    .content {
      padding: 25px 20px;
    }

    .option-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #ddd;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #ffcc00;
      margin: 10px 0;
    }

    .length-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffcc00;
      font-weight: bold;
    }

    .length-value {
      background: #222;
      color: #ffcc00;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 1.2rem;
      border: 1px solid #444;
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 0.95rem;
    }

    .checkbox-item input[type="checkbox"] {
      accent-color: #ffcc00;
      width: 18px;
      height: 18px;
    }

    .generate-btn {
      width: 100%;
      background: #ffcc00;
      color: #000;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      margin: 10px 0 20px;
      box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
      text-transform: uppercase;
    }

    .generate-btn:hover {
      background: #e6b800;
      box-shadow: 0 6px 14px rgba(255, 204, 0, 0.5);
      transform: translateY(-1px);
    }

    .generate-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 5px rgba(255, 204, 0, 0.3);
    }

    .result-box {
      background: #0e0e0e;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0 10px;
      text-align: center;
      transition: 0.2s;
    }

    .password-display {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffcc00;
      word-break: break-all;
      background: #000;
      padding: 12px 15px;
      border-radius: 8px;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border: 1px dashed #555;
    }

    .strength-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .strength-weak { background: #b71c1c; color: white; }
    .strength-medium { background: #f57c00; color: white; }
    .strength-strong { background: #2e7d32; color: white; }
    .strength-very-strong { background: #0d47a1; color: white; }

    .copy-btn {
      background: transparent;
      border: 1px solid #ffcc00;
      color: #ffcc00;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 10px;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.9rem;
    }

    .copy-btn:hover {
      background: #ffcc00;
      color: #000;
    }

    .footer {
      text-align: center;
      padding: 10px;
      color: #666;
      font-size: 0.75rem;
      border-top: 1px solid #222;
    }

    .warning {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 5px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .logo-text { font-size: 1.4rem; }
      .password-display { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="shield-icon">🛡️</div>
      <div class="logo-text">Norton</div>
      <div class="subtitle">PASSWORD GENERATOR</div>
    </div>

    <div class="content">
      <div class="option-group">
        <label for="lengthSlider">Panjang Kata Sandi</label>
        <div class="length-display">
          <span>8</span>
          <span class="length-value" id="lengthValue">20</span>
          <span>50</span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="50" value="20" step="1">
      </div>

      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="includeUpper" checked>
          <label for="includeUpper">Huruf Besar (A-Z)</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeDigits" checked>
          <label for="includeDigits">Angka (0-9)</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeSymbols" checked>
          <label for="includeSymbols">Simbol (!@#$%)</label>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn">🔐 Buat Kata Sandi Kuat</button>

      <div class="result-box" id="resultBox" style="display: none;">
        <div class="password-display" id="passwordDisplay"></div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
          <span class="strength-badge" id="strengthBadge">Kuat</span>
          <button class="copy-btn" id="copyBtn">📋 Salin</button>
        </div>
      </div>

      <div class="warning">
        ⚠️ Simulator ini menggunakan random generator aman (crypto). Gunakan kata sandi unik untuk setiap akun.
      </div>
    </div>
    <div class="footer">
      Norton Password Generator Simulator — Bukan produk asli. Selalu lindungi data Anda.
    </div>
  </div>

  <script>
    (function() {
      // DOM elements
      const lengthSlider = document.getElementById('lengthSlider');
      const lengthValue = document.getElementById('lengthValue');
      const includeUpper = document.getElementById('includeUpper');
      const includeDigits = document.getElementById('includeDigits');
      const includeSymbols = document.getElementById('includeSymbols');
      const generateBtn = document.getElementById('generateBtn');
      const passwordDisplay = document.getElementById('passwordDisplay');
      const strengthBadge = document.getElementById('strengthBadge');
      const resultBox = document.getElementById('resultBox');
      const copyBtn = document.getElementById('copyBtn');

      // Update panjang tampilan
      lengthSlider.addEventListener('input', function(e) {
        lengthValue.textContent = e.target.value;
      });

      // Fungsi untuk menghasilkan password aman menggunakan crypto API
      function generateSecurePassword(length, useUpper, useDigits, useSymbols) {
        const lower = "abcdefghijklmnopqrstuvwxyz";
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const digits = "0123456789";
        const symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?/~`";

        let charPool = lower;
        if (useUpper) charPool += upper;
        if (useDigits) charPool += digits;
        if (useSymbols) charPool += symbols;

        if (charPool.length === 0) {
          // Fallback kalau semua tidak dicentang (tidak disarankan)
          charPool = lower;
        }

        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        
        let password = '';
        for (let i = 0; i < length; i++) {
          password += charPool[array[i] % charPool.length];
        }

        // Pastikan setidaknya ada satu karakter dari setiap jenis yang dipilih (untuk kekuatan)
        // Kita cek dan ganti karakter pertama yang cocok jika tidak ada
        const checks = [];
        if (useUpper) checks.push({ set: upper, type: 'upper' });
        if (useDigits) checks.push({ set: digits, type: 'digit' });
        if (useSymbols) checks.push({ set: symbols, type: 'symbol' });

        // Untuk setiap jenis yang wajib ada, jika belum ada di password, ganti karakter acak dengan salah satu dari set itu
        checks.forEach(check => {
          if (![...password].some(ch => check.set.includes(ch))) {
            // Ambil posisi acak
            const randomIndex = Math.floor(Math.random() * length);
            const randomChar = check.set[Math.floor(Math.random() * check.set.length)];
            password = password.substring(0, randomIndex) + randomChar + password.substring(randomIndex + 1);
          }
        });

        return password;
      }

      // Fungsi mengecek kekuatan (sederhana)
      function evaluateStrength(password) {
        let score = 0;
        if (password.length >= 12) score++;
        if (password.length >= 16) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^a-zA-Z0-9]/.test(password)) score++;

        if (score >= 5) return { text: 'Sangat Kuat', class: 'strength-very-strong' };
        if (score >= 3) return { text: 'Kuat', class: 'strength-strong' };
        if (score >= 2) return { text: 'Sedang', class: 'strength-medium' };
        return { text: 'Lemah', class: 'strength-weak' };
      }

      // Tombol generate
      generateBtn.addEventListener('click', function() {
        const length = parseInt(lengthSlider.value, 10);
        const useUpper = includeUpper.checked;
        const useDigits = includeDigits.checked;
        const useSymbols = includeSymbols.checked;

        // Animasi kecil
        generateBtn.textContent = '🔄 Menghasilkan...';
        generateBtn.disabled = true;

        // Delay kecil biar terasa proses
        setTimeout(() => {
          const password = generateSecurePassword(length, useUpper, useDigits, useSymbols);
          passwordDisplay.textContent = password;
          
          const strength = evaluateStrength(password);
          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;

          resultBox.style.display = 'block';
          
          generateBtn.textContent = '🔐 Buat Kata Sandi Kuat';
          generateBtn.disabled = false;
        }, 300);
      });

      // Tombol salin
      copyBtn.addEventListener('click', function() {
        const password = passwordDisplay.textContent;
        if (!password) return;
        
        navigator.clipboard.writeText(password).then(() => {
          const originalText = copyBtn.textContent;
          copyBtn.textContent = '✅ Tersalin!';
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 1800);
        }).catch(() => {
          // Fallback untuk browser lama
          const textarea = document.createElement('textarea');
          textarea.value = password;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          copyBtn.textContent = '✅ Tersalin!';
          setTimeout(() => {
            copyBtn.textContent = '📋 Salin';
          }, 1800);
        });
      });

      // Tampilkan hasil contoh saat pertama kali dibuka (opsional)
      window.addEventListener('load', function() {
        // Generate default
        const defaultPassword = generateSecurePassword(20, true, true, true);
        passwordDisplay.textContent = defaultPassword;
        const strength = evaluateStrength(defaultPassword);
        strengthBadge.textContent = strength.text;
        strengthBadge.className = 'strength-badge ' + strength.class;
        resultBox.style.display = 'block';
      });
    })();
  </script>
</body>
</html>
