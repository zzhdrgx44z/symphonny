<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Sympony | Password Generator - Hyper Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 16px;
      background: #020208;
      overflow-x: hidden;
      position: relative;
    }

    /* ============ HYPER BACKGROUND ============ */
    .hyper-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(255, 200, 50, 0.12), transparent 60%),
        radial-gradient(ellipse at 85% 70%, rgba(255, 80, 0, 0.1), transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 100, 255, 0.05), transparent 70%),
        linear-gradient(125deg, #03030a 0%, #000000 100%);
      z-index: -3;
    }

    /* Animated Noise Texture */
    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
      background-repeat: repeat;
      opacity: 0.4;
      pointer-events: none;
      z-index: -2;
      animation: noiseShift 8s steps(2) infinite;
    }

    @keyframes noiseShift {
      0% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -5%); }
      20% { transform: translate(5%, 5%); }
      30% { transform: translate(-5%, 5%); }
      40% { transform: translate(5%, -5%); }
      50% { transform: translate(-5%, -5%); }
      60% { transform: translate(5%, 5%); }
      70% { transform: translate(-5%, 5%); }
      80% { transform: translate(5%, -5%); }
      90% { transform: translate(-5%, -5%); }
      100% { transform: translate(0, 0); }
    }

    /* 3D Rotating Grid - more subtle on mobile */
    .grid-3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 204, 0, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 204, 0, 0.05) 1px, transparent 1px);
      background-size: 50px 50px;
      transform-style: preserve-3d;
      animation: gridRotate 25s linear infinite;
      pointer-events: none;
      z-index: -2;
    }

    @keyframes gridRotate {
      0% { transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0); }
      50% { transform: perspective(800px) rotateX(2deg) rotateY(1deg) translateZ(10px); }
      100% { transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0); }
    }

    /* ============ HYPER PARTICLES ============ */
    .hyper-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .hyper-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: radial-gradient(circle, #ffcc00, #ff6600);
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0;
      animation: hyperFloat 6s linear infinite;
      box-shadow: 0 0 8px #ffcc00;
    }

    @keyframes hyperFloat {
      0% {
        transform: translateY(100vh) translateX(0) scale(0);
        opacity: 0;
      }
      15% {
        opacity: 0.9;
        transform: translateY(75vh) translateX(var(--tx1, 30px)) scale(1);
      }
      50% {
        opacity: 0.7;
        transform: translateY(40vh) translateX(var(--tx2, -40px)) scale(1.2);
      }
      85% {
        opacity: 0.5;
        transform: translateY(15vh) translateX(var(--tx3, 20px)) scale(0.8);
      }
      100% {
        transform: translateY(-20vh) translateX(var(--tx4, -50px)) scale(0);
        opacity: 0;
      }
    }

    /* ============ GALAXY KEYS ============ */
    .galaxy-keys {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .galaxy-key {
      position: absolute;
      font-size: 1.6rem;
      opacity: 0;
      filter: drop-shadow(0 0 12px rgba(255, 204, 0, 0.8));
      animation: galaxyFloat 15s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      text-shadow: 0 0 8px gold;
    }

    @keyframes galaxyFloat {
      0% {
        transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.2);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
        transform: translateY(75vh) translateX(var(--gx1, 40px)) rotate(90deg) scale(0.6);
      }
      35% {
        opacity: 0.6;
        transform: translateY(50vh) translateX(var(--gx2, -50px)) rotate(180deg) scale(0.9);
      }
      65% {
        opacity: 0.5;
        transform: translateY(25vh) translateX(var(--gx3, 35px)) rotate(270deg) scale(1);
      }
      85% {
        opacity: 0.4;
        transform: translateY(10vh) translateX(var(--gx4, -30px)) rotate(360deg) scale(0.8);
      }
      100% {
        transform: translateY(-30vh) translateX(var(--gx5, 60px)) rotate(540deg) scale(1.3);
        opacity: 0;
      }
    }

    /* ============ CONTAINER DIAMOND - RESPONSIVE SIZE ============ */
    .container {
      max-width: 560px;
      width: 100%;
      background: rgba(6, 6, 16, 0.5);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 204, 0, 0.4);
      border-radius: 48px;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 204, 0, 0.25), 0 0 60px rgba(255, 204, 0, 0.2);
      overflow: hidden;
      animation: diamondReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1.2);
      position: relative;
      z-index: 1;
      transition: all 0.4s ease;
    }

    .container:hover {
      border-color: rgba(255, 204, 0, 0.7);
      box-shadow: 0 35px 70px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(255, 204, 0, 0.5), 0 0 70px rgba(255, 204, 0, 0.3);
    }

    @keyframes diamondReveal {
      from {
        opacity: 0;
        transform: scale(0.94) translateY(40px);
        backdrop-filter: blur(0px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        backdrop-filter: blur(28px);
      }
    }

    /* Header Cosmic - responsive padding */
    .header {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(25, 25, 55, 0.98) 100%);
      padding: 28px 20px 22px;
      text-align: center;
      border-bottom: 3px solid rgba(255, 204, 0, 0.7);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 204, 0, 0.2), transparent);
      animation: cosmicSpin 20s linear infinite;
    }

    @keyframes cosmicSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .shield-icon {
      font-size: 3.5rem;
      margin-bottom: 12px;
      display: inline-block;
      animation: shieldCosmic 3s ease-in-out infinite;
      filter: drop-shadow(0 0 25px rgba(255, 204, 0, 0.9));
    }

    @keyframes shieldCosmic {
      0%, 100% { transform: scale(1) rotate(0deg) translateY(0); }
      25% { transform: scale(1.1) rotate(5deg) translateY(-3px); }
      75% { transform: scale(1.06) rotate(-5deg) translateY(-2px); }
    }

    .logo-text {
      font-size: 2.5rem;
      font-weight: 900;
      letter-spacing: 6px;
      background: linear-gradient(135deg, #ffe888, #ffaa44, #ffdd88, #ffcc55, #ffe8aa);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: logoHyper 4s ease infinite;
    }

    @keyframes logoHyper {
      0%, 100% { background-position: 0% 50%; letter-spacing: 6px; }
      50% { background-position: 100% 50%; letter-spacing: 8px; }
    }

    .subtitle {
      color: rgba(255, 255, 220, 0.8);
      font-size: 0.7rem;
      margin-top: 10px;
      letter-spacing: 4px;
      font-weight: 400;
      text-transform: uppercase;
      animation: subtitlePulse 2s ease-in-out infinite;
    }

    @keyframes subtitlePulse {
      0%, 100% { opacity: 0.6; text-shadow: 0 0 0px gold; letter-spacing: 4px; }
      50% { opacity: 1; text-shadow: 0 0 10px gold; letter-spacing: 5px; }
    }

    /* Content - responsive */
    .content {
      padding: 28px 24px;
    }

    .option-group {
      margin-bottom: 28px;
    }

    .option-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #ffeedd;
      font-weight: 700;
      margin-bottom: 12px;
      font-size: 0.9rem;
      letter-spacing: 1px;
    }

    /* Slider Premium */
    input[type="range"] {
      width: 100%;
      height: 6px;
      -webkit-appearance: none;
      background: linear-gradient(90deg, #ffcc00, #ff4400, #ffcc00, #ffaa22);
      background-size: 300% 100%;
      animation: sliderNeon 4s ease infinite;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
    }

    @keyframes sliderNeon {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 24px;
      height: 24px;
      background: #ffcc00;
      border-radius: 50%;
      border: 3px solid white;
      box-shadow: 0 0 20px #ffcc00;
      cursor: pointer;
      transition: 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      background: #ffdd66;
      box-shadow: 0 0 30px #ffcc00;
    }

    .length-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      color: #ffdd99;
      font-size: 0.85rem;
    }

    .length-value {
      background: linear-gradient(135deg, #111138, #080820);
      color: #ffdd77;
      padding: 8px 28px;
      border-radius: 60px;
      font-size: 1.8rem;
      font-weight: 800;
      border: 1px solid rgba(255, 204, 0, 0.7);
      box-shadow: 0 0 30px rgba(255, 204, 0, 0.3);
      transition: all 0.2s;
    }

    /* Checkbox - responsive */
    .checkbox-group {
      display: flex;
      gap: 24px;
      margin: 30px 0 28px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #f5f5f5;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 60px;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 204, 0, 0.3);
    }

    .checkbox-item:hover {
      background: rgba(255, 204, 0, 0.25);
      transform: translateX(6px) scale(1.01);
      border-color: rgba(255, 204, 0, 0.7);
      box-shadow: 0 0 20px rgba(255, 204, 0, 0.3);
    }

    .checkbox-item input[type="checkbox"] {
      appearance: none;
      width: 22px;
      height: 22px;
      background: rgba(0, 0, 0, 0.7);
      border: 2px solid #ffcc00;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .checkbox-item input[type="checkbox"]:checked {
      background: #ffcc00;
      box-shadow: 0 0 25px #ffcc00;
      animation: checkboxHyper 0.3s ease;
    }

    @keyframes checkboxHyper {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.3); }
    }

    .checkbox-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      color: #000;
      font-size: 14px;
      font-weight: bold;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Tombol Generate - responsive */
    .generate-btn {
      width: 100%;
      background: linear-gradient(135deg, #ffcc00, #ff6600, #ffcc00, #ff9900);
      background-size: 400% 400%;
      animation: btnHyper 3s ease infinite;
      color: #0a0a0a;
      font-weight: 900;
      font-size: 1.1rem;
      padding: 16px;
      border: none;
      border-radius: 60px;
      cursor: pointer;
      letter-spacing: 4px;
      transition: all 0.3s ease;
      margin: 20px 0 25px;
      box-shadow: 0 15px 35px rgba(255, 204, 0, 0.4);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    @keyframes btnHyper {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .generate-btn:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 20px 45px rgba(255, 204, 0, 0.6);
      letter-spacing: 5px;
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    /* Ripple Effect */
    .ripple-hyper {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.8);
      transform: scale(0);
      animation: rippleHyper 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleHyper {
      to {
        transform: scale(5);
        opacity: 0;
      }
    }

    /* Result Box - responsive */
    .result-box {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.75), rgba(20, 20, 50, 0.9));
      border: 1px solid rgba(255, 204, 0, 0.5);
      border-radius: 40px;
      padding: 24px 20px;
      margin: 20px 0 15px;
      text-align: center;
      backdrop-filter: blur(18px);
      transition: all 0.4s ease;
    }

    .result-box.glow {
      animation: hyperGlow 1s ease-out;
    }

    @keyframes hyperGlow {
      0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); border-color: rgba(255, 204, 0, 0.4); }
      35% { box-shadow: 0 0 0 20px rgba(255, 204, 0, 0.25); border-color: rgba(255, 204, 0, 1); }
      100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); border-color: rgba(255, 204, 0, 0.5); }
    }

    .password-display {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffeeaa;
      word-break: break-all;
      background: rgba(0, 0, 0, 0.7);
      padding: 18px 16px;
      border-radius: 32px;
      letter-spacing: 1.5px;
      margin-bottom: 22px;
      border: 1px solid rgba(255, 204, 0, 0.4);
      transition: 0.2s;
      position: relative;
    }

    .action-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .strength-badge {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: 800;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      backdrop-filter: blur(4px);
      transition: all 0.3s;
      animation: badgeHyper 2s ease infinite;
    }

    @keyframes badgeHyper {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.15); }
    }

    .strength-weak { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; box-shadow: 0 0 20px rgba(255, 68, 68, 0.5);}
    .strength-medium { background: linear-gradient(135deg, #ffaa44, #cc7700); color: white; box-shadow: 0 0 20px rgba(255, 170, 68, 0.5);}
    .strength-strong { background: linear-gradient(135deg, #44ff44, #00aa00); color: white; box-shadow: 0 0 20px rgba(68, 255, 68, 0.5);}
    .strength-very-strong { background: linear-gradient(135deg, #4488ff, #0044cc); color: white; box-shadow: 0 0 20px rgba(68, 136, 255, 0.5);}

    .copy-btn {
      background: rgba(255, 204, 0, 0.15);
      border: 1.5px solid #ffcc00;
      color: #ffee88;
      padding: 10px 28px;
      border-radius: 60px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      backdrop-filter: blur(4px);
    }

    .copy-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 0 35px rgba(255, 204, 0, 0.8);
      animation: copyHyper 0.3s ease;
    }

    @keyframes copyHyper {
      0%, 100% { transform: scale(1.05); }
      25% { transform: scale(1.08) rotate(1deg); }
      75% { transform: scale(1.07) rotate(-1deg); }
    }

    .footer {
      text-align: center;
      padding: 16px;
      color: rgba(255, 255, 200, 0.35);
      font-size: 0.65rem;
      border-top: 1px solid rgba(255, 204, 0, 0.15);
    }

    .warning {
      color: rgba(255, 220, 100, 0.55);
      font-size: 0.65rem;
      margin-top: 15px;
      text-align: center;
      background: rgba(0, 0, 0, 0.4);
      padding: 10px;
      border-radius: 60px;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(0, 0, 0, 0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.8s linear infinite;
      visibility: hidden;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #ffcc00;
      margin-left: 3px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Tablet & Desktop adjustments */
    @media (min-width: 768px) {
      body {
        padding: 24px;
      }
      .container {
        max-width: 580px;
      }
      .logo-text {
        font-size: 2.8rem;
        letter-spacing: 8px;
      }
      .password-display {
        font-size: 1.25rem;
        padding: 20px;
      }
      .content {
        padding: 32px 28px;
      }
      .length-value {
        font-size: 2rem;
        padding: 10px 36px;
      }
      .shield-icon {
        font-size: 4rem;
      }
    }

    /* Small mobile */
    @media (max-width: 480px) {
      body {
        padding: 12px;
      }
      .container {
        border-radius: 36px;
      }
      .logo-text {
        font-size: 1.8rem;
        letter-spacing: 4px;
      }
      .shield-icon {
        font-size: 2.8rem;
      }
      .content {
        padding: 20px 18px;
      }
      .length-value {
        font-size: 1.4rem;
        padding: 6px 20px;
      }
      .password-display {
        font-size: 0.95rem;
        padding: 14px 12px;
      }
      .checkbox-item {
        padding: 6px 14px;
        gap: 8px;
        font-size: 0.8rem;
      }
      .checkbox-item input[type="checkbox"] {
        width: 18px;
        height: 18px;
      }
      .generate-btn {
        padding: 14px;
        font-size: 1rem;
        letter-spacing: 3px;
      }
      .strength-badge, .copy-btn {
        padding: 8px 20px;
        font-size: 0.75rem;
      }
      .subtitle {
        font-size: 0.6rem;
        letter-spacing: 3px;
      }
      .galaxy-key {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>
  <div class="hyper-bg"></div>
  <div class="noise"></div>
  <div class="grid-3d"></div>
  <div class="hyper-particles" id="hyperParticles"></div>
  <div class="galaxy-keys" id="galaxyKeys"></div>

  <div class="container">
    <div class="header">
      <div class="shield-icon">✨🔮⚡🛡️</div>
      <div class="logo-text">SYMPONY</div>
      <div class="subtitle">HYPERSPACE SECURITY MATRIX</div>
    </div>

    <div class="content">
      <div class="option-group">
        <label>🔑 QUANTUM LENGTH</label>
        <div class="length-display">
          <span>8</span>
          <span class="length-value" id="lengthValue">20</span>
          <span>50</span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="50" value="20" step="1">
      </div>

      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="includeUpper" checked>
          <label>🔠 UPPERCASE</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeDigits" checked>
          <label>🔢 NUMBERS</label>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">⚡ GENERATE</span>
      </button>

      <div class="result-box" id="resultBox" style="display: none;">
        <div class="password-display" id="passwordDisplay"></div>
        <div class="action-group">
          <span class="strength-badge" id="strengthBadge">POWERFUL</span>
          <button class="copy-btn" id="copyBtn">📋 COPY</button>
        </div>
      </div>

      <div class="warning">
        🔐 Quantum Entropy Crypto | Military-Grade Protection | Every Password is Unique
      </div>
    </div>
    <div class="footer">
      SYMPONY HYPERSPACE — The Ultimate Password Fortress
    </div>
  </div>

  <script>
    (function() {
      // ========== HYPER PARTICLES ==========
      function createHyperParticles() {
        const container = document.getElementById('hyperParticles');

      // ========== PASSWORD GENERATOR ==========
      function generateSecurePassword(length, useUpper, useDigits) {
        const lower = "abcdefghijklmnopqrstuvwxyz";
        let charPool = lower;
        if (useUpper) charPool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (useDigits) charPool += "0123456789";
        if (charPool.length === 0) charPool = lower;

        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        let password = '';
        for (let i = 0; i < length; i++) {
          password += charPool[array[i] % charPool.length];
        }

        const checks = [];
        if (useUpper) checks.push({ set: "ABCDEFGHIJKLMNOPQRSTUVWXYZ" });
        if (useDigits) checks.push({ set: "0123456789" });

        checks.forEach(check => {
          if (![...password].some(ch => check.set.includes(ch))) {
            const randomIndex = Math.floor(Math.random() * length);
            const randomChar = check.set[Math.floor(Math.random() * check.set.length)];
            password = password.substring(0, randomIndex) + randomChar + password.substring(randomIndex + 1);
          }
        });
        return password;
      }
