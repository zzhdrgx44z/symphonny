<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sympony Password Generator | Tanpa Simbol</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 50%, #0d0d0d 100%);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ============ PARTIKEL BINTANG ============ */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      font-size: 0.8rem;
      color: #ffcc00;
      opacity: 0.2;
      animation: floatParticle linear infinite;
      user-select: none;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% { opacity: 0.35; }
      90% { opacity: 0.35; }
      100% {
        transform: translateY(-100vh) translateX(100px) rotate(360deg);
        opacity: 0;
      }
    }

    /* ============ KUNCI MELAYANG ============ */
    .floating-keys {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .key {
      position: absolute;
      font-size: 2rem;
      opacity: 0.12;
      animation: floatKey linear infinite;
      user-select: none;
      color: #ffcc00;
      filter: drop-shadow(0 0 5px rgba(255,204,0,0.3));
    }

    .key.size-sm { font-size: 1.5rem; opacity: 0.08; }
    .key.size-md { font-size: 2.5rem; opacity: 0.14; }
    .key.size-lg { font-size: 3.5rem; opacity: 0.1; }

    @keyframes floatKey {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      10% { opacity: 0.2; }
      90% { opacity: 0.2; }
      100% {
        transform: translateY(-120vh) rotate(360deg) scale(1.2);
        opacity: 0;
      }
    }

    /* ============ ANIMASI CAHAYA ORB ============ */
    .orb-glow {
      position: fixed;
      width: 250px;
      height: 250px;
      background: radial-gradient(circle, rgba(255,204,0,0.15) 0%, rgba(255,204,0,0) 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: orbMove 20s ease-in-out infinite alternate;
    }

    @keyframes orbMove {
      0% { transform: translate(0%, 0%) scale(1); opacity: 0.4; }
      50% { transform: translate(40%, 30%) scale(1.3); opacity: 0.7; }
      100% { transform: translate(-20%, 60%) scale(0.9); opacity: 0.3; }
    }

    /* ============ ANIMASI GARIS BERJALAN (Neon Border) ============ */
    .neon-border {
      position: fixed;
      top: 20px;
      left: 20px;
      right: 20px;
      bottom: 20px;
      border: 2px solid transparent;
      border-radius: 30px;
      pointer-events: none;
      z-index: 0;
      animation: neonSlide 4s linear infinite;
      box-shadow: 0 0 10px rgba(255,204,0,0.3);
    }

    @keyframes neonSlide {
      0% { border-color: rgba(255,204,0,0.1); box-shadow: 0 0 5px rgba(255,204,0,0.2); }
      25% { border-color: rgba(255,204,0,0.6); box-shadow: 0 0 20px rgba(255,204,0,0.6); }
      50% { border-color: rgba(255,204,0,0.1); box-shadow: 0 0 5px rgba(255,204,0,0.2); }
      75% { border-color: rgba(255,204,0,0.6); box-shadow: 0 0 20px rgba(255,204,0,0.6); }
      100% { border-color: rgba(255,204,0,0.1); box-shadow: 0 0 5px rgba(255,204,0,0.2); }
    }

    /* ============ CONTAINER UTAMA ============ */
    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(26, 26, 26, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid #333;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 204, 0, 0.5);
      overflow: hidden;
      animation: fadeInUp 0.8s ease, borderPulse 3s infinite alternate;
      position: relative;
      z-index: 1;
      transition: all 0.5s;
    }

    @keyframes borderPulse {
      0% { box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 204, 0, 0.3); }
      100% { box-shadow: 0 20px 50px rgba(0, 0, 0, 0.9), 0 0 0 4px rgba(255, 204, 0, 0.8); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header dengan animasi partikel emas */
    .header {
      background: #111;
      padding: 25px 20px 15px;
      text-align: center;
      border-bottom: 2px solid #ffcc00;
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255,204,0,0.1), transparent);
      transform: rotate(30deg);
      animation: shineHeader 6s linear infinite;
    }

    @keyframes shineHeader {
      0% { transform: translateX(-100%) rotate(30deg); }
      100% { transform: translateX(100%) rotate(30deg); }
    }

    /* Animasi floating icon perisai */
    .shield-icon {
      font-size: 2.8rem;
      margin-bottom: 5px;
      display: inline-block;
      animation: pulseShield 1.8s ease-in-out infinite, rotateShield 8s infinite linear, floatIcon 3s ease-in-out infinite;
    }

    @keyframes floatIcon {
      0%, 100% { transform: translateY(0px) rotateY(0deg); }
      50% { transform: translateY(-8px) rotateY(180deg); }
    }

    @keyframes rotateShield {
      0% { transform: rotateY(0deg); }
      50% { transform: rotateY(180deg); }
      100% { transform: rotateY(360deg); }
    }

    @keyframes pulseShield {
      0% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,204,0,0)); }
      50% { transform: scale(1.15); filter: drop-shadow(0 0 12px rgba(255,204,0,0.8)); }
      100% { transform: scale(1); filter: drop-shadow(0 0 0 rgba(255,204,0,0)); }
    }

    .logo-text {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #ffcc00;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,204,0,0.5);
      animation: logoGlow 2s ease-in-out infinite alternate, textWave 3s ease-in-out infinite, textGlitch 5s infinite;
      display: inline-block;
    }

    @keyframes textGlitch {
      0%, 100% { transform: skew(0deg); text-shadow: 0 0 10px gold; }
      95% { transform: skew(0deg); }
      96% { transform: skew(2deg); text-shadow: -2px 0 red, 2px 0 blue; }
      97% { transform: skew(-2deg); }
      98% { transform: skew(0deg); }
    }

    @keyframes textWave {
      0%, 100% { transform: translateY(0px); letter-spacing: 3px; }
      50% { transform: translateY(-3px); letter-spacing: 6px; }
    }

    @keyframes logoGlow {
      from { text-shadow: 0 0 8px rgba(255,204,0,0.4); }
      to { text-shadow: 0 0 18px rgba(255,204,0,0.9), 0 0 30px rgba(255,204,0,0.5); }
    }

    .subtitle {
      color: #ccc;
      font-size: 0.9rem;
      margin-top: 5px;
      letter-spacing: 2px;
      animation: slideIn 0.8s ease, fadePulse 2s infinite, typingBlink 3s infinite;
    }

    @keyframes typingBlink {
      0%, 100% { border-right: 2px solid transparent; }
      50% { border-right: 2px solid #ffcc00; }
    }

    @keyframes fadePulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; text-shadow: 0 0 5px #ffcc00; }
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .content {
      padding: 25px 20px;
      position: relative;
    }

    .option-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #ddd;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    /* SLIDER dengan animasi */
    input[type="range"] {
      width: 100%;
      accent-color: #ffcc00;
      margin: 10px 0;
      transition: all 0.2s;
    }

    input[type="range"]:hover {
      transform: scaleY(1.4);
      box-shadow: 0 0 15px #ffcc00;
    }

    .length-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffcc00;
      font-weight: bold;
    }

    .length-value {
      background: #222;
      color: #ffcc00;
      padding: 5px 18px;
      border-radius: 20px;
      font-size: 1.3rem;
      border: 1px solid #444;
      transition: all 0.3s;
      animation: pulseValue 2s ease-in-out infinite, glitchText 3s infinite, numberPop 0.5s ease;
    }

    @keyframes numberPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); background: #333; }
      100% { transform: scale(1); }
    }

    @keyframes glitchText {
      0%, 100% { text-shadow: 0 0 2px #ffcc00; }
      25% { text-shadow: -1px 0 red, 1px 0 blue; transform: skewX(1deg);}
      50% { text-shadow: 1px 0 red, -1px 0 blue; transform: skewX(-1deg);}
      75% { text-shadow: 0 0 5px #ffcc00; }
    }

    @keyframes pulseValue {
      0% { box-shadow: 0 0 5px rgba(255,204,0,0.2); }
      50% { box-shadow: 0 0 15px rgba(255,204,0,0.6); }
      100% { box-shadow: 0 0 5px rgba(255,204,0,0.2); }
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 0.95rem;
      transition: all 0.3s;
      animation: fadeSlide 0.5s ease;
    }

    @keyframes fadeSlide {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .checkbox-item:hover {
      transform: scale(1.05) rotate(2deg);
      text-shadow: 0 0 6px #ffcc00;
    }

    .checkbox-item input[type="checkbox"] {
      accent-color: #ffcc00;
      width: 18px;
      height: 18px;
      transition: all 0.2s;
    }

    .checkbox-item input[type="checkbox"]:hover {
      transform: scale(1.3);
      box-shadow: 0 0 12px #ffcc00;
    }

    .checkbox-item input[type="checkbox"]:checked {
      animation: checkPop 0.3s ease;
    }

    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); filter: drop-shadow(0 0 5px gold); }
      100% { transform: scale(1); }
    }

    /* Tombol Generate dengan efek 3D dan ripple */
    .generate-btn {
      width: 100%;
      background: linear-gradient(45deg, #ffcc00, #ffb700);
      color: #000;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin: 10px 0 20px;
      box-shadow: 0 6px 0 #b38f00;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      animation: btnPulse 2s infinite, btnGlow 1.5s infinite alternate;
    }

    @keyframes btnPulse {
      0% { box-shadow: 0 6px 0 #b38f00, 0 4px 10px rgba(255, 204, 0, 0.3); }
      50% { box-shadow: 0 6px 0 #b38f00, 0 0 20px rgba(255, 204, 0, 0.9); }
      100% { box-shadow: 0 6px 0 #b38f00, 0 4px 10px rgba(255, 204, 0, 0.3); }
    }

    @keyframes btnGlow {
      from { background: linear-gradient(45deg, #ffcc00, #ffb700); }
      to { background: linear-gradient(45deg, #ffdd33, #ffcc00); }
    }

    .generate-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0 #b38f00, 0 8px 25px rgba(255, 204, 0, 0.8);
    }

    .generate-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #b38f00;
    }

    .generate-btn:disabled {
      opacity: 0.7;
      transform: translateY(0);
      animation: none;
    }

    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      transform: scale(0);
      animation: rippleEffect 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to { transform: scale(4); opacity: 0; }
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
      visibility: hidden;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-box {
      background: #0e0e0e;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0 10px;
      text-align: center;
      transition: all 0.4s ease;
      transform-origin: top;
      animation: scaleIn 0.4s ease;
      position: relative;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scaleY(0.8); }
      to { opacity: 1; transform: scaleY(1); }
    }

    .result-box.glow {
      animation: scaleIn 0.4s ease, resultGlow 1.5s ease-out, shakeNGlow 0.5s ease-in-out, particleBurst 0.6s ease-out;
    }

    @keyframes resultGlow {
      0% { box-shadow: 0 0 5px rgba(255,204,0,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,204,0,0.9); }
      100% { box-shadow: 0 0 5px rgba(255,204,0,0.3); }
    }

    @keyframes shakeNGlow {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    @keyframes particleBurst {
      0% { background: radial-gradient(circle, rgba(255,204,0,0) 0%, rgba(0,0,0,0) 100%); }
      50% { background: radial-gradient(circle, rgba(255,204,0,0.3) 0%, rgba(255,204,0,0) 70%); }
      100% { background: radial-gradient(circle, rgba(255,204,0,0) 0%, rgba(0,0,0,0) 100%); }
    }

    .password-display {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffcc00;
      word-break: break-all;
      background: #000;
      padding: 12px 15px;
      border-radius: 8px;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border: 1px dashed #555;
      min-height: 60px;
      transition: 0.2s;
      position: relative;
      animation: textFlicker 2s infinite alternate, matrixRain 0.5s ease-out;
    }

    @keyframes textFlicker {
      0% { text-shadow: 0 0 2px #ffcc00; }
      100% { text-shadow: 0 0 10px #ffcc00, 0 0 5px gold; }
    }

    @keyframes matrixRain {
      0% { letter-spacing: 5px; opacity: 0.5; }
      100% { letter-spacing: 1px; opacity: 1; }
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #ffcc00;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .strength-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .strength-badge::after {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
      animation: badgeShine 3s infinite;
    }

    @keyframes badgeShine {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    .strength-badge.pulse-update {
      animation: pulseBadge 0.4s ease, spinBadge 0.6s ease;
    }

    @keyframes spinBadge {
      0% { transform: rotateY(0deg); }
      100% { transform: rotateY(360deg); }
    }

    @keyframes pulseBadge {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); filter: brightness(1.3); }
      100% { transform: scale(1); }
    }

    .strength-weak { background: #b71c1c; color: white; box-shadow: 0 0 8px #b71c1c; }
    .strength-medium { background: #f57c00; color: white; box-shadow: 0 0 8px #f57c00; }
    .strength-strong { background: #2e7d32; color: white; box-shadow: 0 0 8px #2e7d32; }
    .strength-very-strong { background: #0d47a1; color: white; box-shadow: 0 0 8px #0d47a1; }

    .copy-btn {
      background: transparent;
      border: 1px solid #ffcc00;
      color: #ffcc00;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
      position: relative;
      overflow: hidden;
    }

    .copy-btn:hover {
      background: #ffcc00;
      color: #000;
      animation: wiggle 0.3s ease, buttonGlow 1s infinite, bounce 0.5s ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-3px); }
    }

    @keyframes buttonGlow {
      0% { box-shadow: 0 0 5px #ffcc00; }
      100% { box-shadow: 0 0 20px #ffcc00; }
    }

    @keyframes wiggle {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      50% { transform: rotate(-3deg); }
      75% { transform: rotate(2deg); }
      100% { transform: rotate(0deg); }
    }

    .footer {
      text-align: center;
      padding: 10px;
      color: #666;
      font-size: 0.75rem;
      border-top: 1px solid #222;
      animation: fadeInUp 1s ease;
    }

    .warning {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 5px;
      text-align: center;
      animation: pulseWarning 3s infinite, rainbowText 8s infinite;
    }

    @keyframes rainbowText {
      0% { color: #aaa; }
      25% { color: #ffcc00; text-shadow: 0 0 3px gold; }
      50% { color: #aaa; }
      75% { color: #ffaa00; }
      100% { color: #aaa; }
    }

    @keyframes pulseWarning {
      0% { opacity: 0.5; }
      50% { opacity: 1; text-shadow: 0 0 3px #ffcc00; }
      100% { opacity: 0.5; }
    }

    @media (max-width: 480px) {
      .logo-text { font-size: 1.6rem; }
      .password-display { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="floating-keys" id="floatingKeys"></div>
  <div class="orb-glow" style="top: 10%; left: -5%;"></div>
  <div class="orb-glow" style="bottom: 5%; right: -10%; width: 300px; height: 300px; animation-duration: 25s;"></div>
  <div class="neon-border"></div>

  <div class="container">
    <div class="header">
      <div class="shield-icon">🛡️</div>
      <div class="logo-text">Sympony</div>
      <div class="subtitle">PASSWORD GENERATOR</div>
    </div>

    <div class="content">
      <div class="option-group">
        <label for="lengthSlider">Panjang Kata Sandi</label>
        <div class="length-display">
          <span>8</span>
          <span class="length-value" id="lengthValue">20</span>
          <span>50</span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="50" value="20" step="1">
      </div>

      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="includeUpper" checked>
          <label for="includeUpper">Huruf Besar (A-Z)</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeDigits" checked>
          <label for="includeDigits">Angka (0-9)</label>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">🔐 Buat Kata Sandi Kuat</span>
      </button>

      <div class="result-box" id="resultBox" style="display: none;">
        <div class="password-display" id="passwordDisplay"></div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap;">
          <span class="strength-badge" id="strengthBadge">Kuat</span>
          <button class="copy-btn" id="copyBtn">📋 Salin</button>
        </div>
      </div>

      <div class="warning">
        ⚠️ Simulator ini menggunakan random generator aman (crypto). Gunakan kata sandi unik untuk setiap akun.
      </div>
    </div>
    <div class="footer">
      Sympony Password Generator Simulator — Bukan produk asli. Selalu lindungi data Anda.
    </div>
  </div>

  <script>
    (function() {
      function createParticles() {
        const container = document.getElementById('particles');
        const emojis = ['✨', '⭐', '⚡', '💫', '🌟', '🔷'];
        for (let i = 0; i < 40; i++) {
          const p = document.createElement('span');
          p.className = 'particle';
          p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          p.style.animationDelay = Math.random() * 12 + 's';
          p.style.animationDuration = (Math.random() * 18 + 8) + 's';
          p.style.fontSize = (Math.random() * 1.4 + 0.5) + 'rem';
          container.appendChild(p);
        }
      }
      createParticles();

      function createFloatingKeys() {
        const container = document.getElementById('floatingKeys');
        const keyEmojis = ['🔑', '🗝️', '🔐', '🔒', '⚜️', '🔏'];
        const count = 30;
        for (let i = 0; i < count; i++) {
          const key = document.createElement('span');
          key.className = 'key';
          const sizeClass = ['size-sm', 'size-md', 'size-lg'][Math.floor(Math.random() * 3)];
          key.classList.add(sizeClass);
          key.textContent = keyEmojis[Math.floor(Math.random() * keyEmojis.length)];
          key.style.left = Math.random() * 100 + '%';
          key.style.animationDelay = Math.random() * 18 + 's';
          key.style.animationDuration = (Math.random() * 20 + 10) + 's';
          container.appendChild(key);
        }
      }
      createFloatingKeys();

      function addRippleEffect(button) {
        button.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          ripple.className = 'ripple';
          const rect = button.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = e.clientX - rect.left - size/2 + 'px';
          ripple.style.top = e.clientY - rect.top - size/2 + 'px';
          button.appendChild(ripple);
          ripple.addEventListener('animationend', () => ripple.remove());
        });
      }

      const lengthSlider = document.getElementById('lengthSlider');
      const lengthValue = document.getElementById('lengthValue');
      const includeUpper = document.getElementById('includeUpper');
      const includeDigits = document.getElementById('includeDigits');
      const generateBtn = document.getElementById('generateBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const passwordDisplay = document.getElementById('passwordDisplay');
      const strengthBadge = document.getElementById('strengthBadge');
      const resultBox = document.getElementById('resultBox');
      const copyBtn = document.getElementById('copyBtn');

      addRippleEffect(generateBtn);
      addRippleEffect(copyBtn);

      lengthSlider.addEventListener('input', function(e) {
        const val = e.target.value;
        lengthValue.textContent = val;
        lengthValue.style.animation = 'none';
        setTimeout(() => lengthValue.style.animation = 'pulseValue 2s ease-in-out infinite, glitchText 3s infinite, numberPop 0.5s ease', 10);
      });

      function generateSecurePassword(length, useUpper, useDigits) {
        const lower = "abcdefghijklmnopqrstuvwxyz";
        let charPool = lower;
        if (useUpper) charPool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (useDigits) charPool += "0123456789";
        if (charPool.length === 0) charPool = lower;

        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        let password = '';
        for (let i = 0; i < length; i++) {
          password += charPool[array[i] % charPool.length];
        }

        const checks = [];
        if (useUpper) checks.push({ set: "ABCDEFGHIJKLMNOPQRSTUVWXYZ", type: 'upper' });
        if (useDigits) checks.push({ set: "0123456789", type: 'digit' });

        checks.forEach(check => {
          if (![...password].some(ch => check.set.includes(ch))) {
            const randomIndex = Math.floor(Math.random() * length);
            const randomChar = check.set[Math.floor(Math.random() * check.set.length)];
            password = password.substring(0, randomIndex) + randomChar + password.substring(randomIndex + 1);
          }
        });
        return password;
      }

      function evaluateStrength(password) {
        let score = 0;
        if (password.length >= 12) score++;
        if (password.length >= 16) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (score >= 5) return { text: 'Sangat Kuat', class: 'strength-very-strong' };
        if (score >= 3) return { text: 'Kuat', class: 'strength-strong' };
        if (score >= 2) return { text: 'Sedang', class: 'strength-medium' };
        return { text: 'Lemah', class: 'strength-weak' };
      }

      function typeWriter(element, text, speed = 30, callback) {
        let i = 0;
        element.innerHTML = '<span class="cursor"></span>';
        const cursorSpan = element.querySelector('.cursor');
        function type() {
          if (i < text.length) {
            cursorSpan.insertAdjacentText('beforebegin', text.charAt(i));
            i++;
            setTimeout(type, speed);
          } else {
            if (cursorSpan) cursorSpan.remove();
            if (callback) callback();
          }
        }
        type();
      }

      function animateBadge() {
        strengthBadge.classList.add('pulse-update');
        setTimeout(() => strengthBadge.classList.remove('pulse-update'), 500);
      }

      generateBtn.addEventListener('click', function() {
        const length = parseInt(lengthSlider.value, 10);
        const useUpper = includeUpper.checked;
        const useDigits = includeDigits.checked;

        spinner.style.visibility = 'visible';
        btnText.textContent = 'Menghasilkan...';
        generateBtn.disabled = true;
        resultBox.style.display = 'none';

        setTimeout(() => {
          const password = generateSecurePassword(length, useUpper, useDigits);
          const strength = evaluateStrength(password);

          resultBox.style.display = 'block';
          resultBox.classList.add('glow');
          setTimeout(() => resultBox.classList.remove('glow'), 1500);

          passwordDisplay.textContent = '';
          
          typeWriter(passwordDisplay, password, 28, () => {
            strengthBadge.textContent = strength.text;
            strengthBadge.className = 'strength-badge ' + strength.class;
            animateBadge();
            spinner.style.visibility = 'hidden';
            btnText.textContent = '🔐 Buat Kata Sandi Kuat';
            generateBtn.disabled = false;
          });

          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;
          animateBadge();
        }, 700);
      });

      copyBtn.addEventListener('click', function() {
        const password = passwordDisplay.textContent.replace(/[\n\r]/g, '');
        if (!password) return;
        navigator.clipboard.writeText(password).then(() => {
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ Tersalin!';
          copyBtn.style.background = '#ffcc00';
          copyBtn.style.color = '#000';
          setTimeout(() => {
            copyBtn.innerHTML = originalText;
            copyBtn.style.background = 'transparent';
            copyBtn.style.color = '#ffcc00';
          }, 2000);
        }).catch(() => {
          const textarea = document.createElement('textarea');
          textarea.value = password;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ Tersalin!';
          setTimeout(() => {
            copyBtn.innerHTML = originalText;
          }, 2000);
        });
      });

      window.addEventListener('load', function() {
        const defaultPassword = generateSecurePassword(20, true, true);
        const strength = evaluateStrength(defaultPassword);
        resultBox.style.display = 'block';
        passwordDisplay.textContent = '';
        typeWriter(passwordDisplay, defaultPassword, 35, () => {
          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;
          animateBadge();
        });
        strengthBadge.textContent = strength.text;
        strengthBadge.className = 'strength-badge ' + strength.class;
      });
    })();
  </script>
</body>
</html>
