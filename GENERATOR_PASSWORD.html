<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sympony Password Generator | Banyak Animasi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: linear-gradient(135deg, #0b0b0b 0%, #1a1a1a 50%, #0d0d0d 100%);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
      overflow-x: hidden;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ============ PARTIKEL BINTANG KECIL ============ */
    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      font-size: 0.8rem;
      color: #ffcc00;
      opacity: 0.2;
      animation: floatParticle linear infinite;
      user-select: none;
    }

    @keyframes floatParticle {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 0.25;
      }
      90% {
        opacity: 0.25;
      }
      100% {
        transform: translateY(-100vh) translateX(100px) rotate(360deg);
        opacity: 0;
      }
    }

    /* ============ KUNCI MELAYANG ============ */
    .floating-keys {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .key {
      position: absolute;
      font-size: 2rem;
      opacity: 0.12;
      animation: floatKey linear infinite;
      user-select: none;
      color: #ffcc00;
      filter: drop-shadow(0 0 5px rgba(255,204,0,0.3));
    }

    .key.size-sm { font-size: 1.5rem; opacity: 0.08; }
    .key.size-md { font-size: 2.5rem; opacity: 0.14; }
    .key.size-lg { font-size: 3.5rem; opacity: 0.1; }

    @keyframes floatKey {
      0% {
        transform: translateY(100vh) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 0.15;
      }
      90% {
        opacity: 0.15;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg) scale(1.2);
        opacity: 0;
      }
    }

    /* ============ CONTAINER UTAMA ============ */
    .container {
      max-width: 550px;
      width: 100%;
      background: rgba(26, 26, 26, 0.85);
      backdrop-filter: blur(10px);
      border: 1px solid #333;
      border-radius: 20px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7), 0 0 0 2px rgba(255, 204, 0, 0.5);
      overflow: hidden;
      animation: fadeInUp 0.8s ease;
      position: relative;
      z-index: 1;
      transition: box-shadow 0.5s;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: #111;
      padding: 25px 20px 15px;
      text-align: center;
      border-bottom: 2px solid #ffcc00;
      position: relative;
    }

    .shield-icon {
      font-size: 2.8rem;
      margin-bottom: 5px;
      display: inline-block;
      animation: pulseShield 1.8s ease-in-out infinite;
    }

    @keyframes pulseShield {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .logo-text {
      font-size: 2.2rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #ffcc00;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,204,0,0.5);
      animation: logoGlow 2s ease-in-out infinite alternate;
    }

    @keyframes logoGlow {
      from { text-shadow: 0 0 8px rgba(255,204,0,0.4); }
      to { text-shadow: 0 0 18px rgba(255,204,0,0.9), 0 0 30px rgba(255,204,0,0.5); }
    }

    .subtitle {
      color: #ccc;
      font-size: 0.9rem;
      margin-top: 5px;
      letter-spacing: 2px;
      animation: slideIn 0.8s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-20px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .content {
      padding: 25px 20px;
      position: relative;
    }

    .option-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      color: #ddd;
      font-weight: 500;
      margin-bottom: 8px;
      font-size: 0.95rem;
    }

    input[type="range"] {
      width: 100%;
      accent-color: #ffcc00;
      margin: 10px 0;
      transition: transform 0.15s;
    }

    input[type="range"]:hover {
      transform: scaleY(1.4);
    }

    .length-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #ffcc00;
      font-weight: bold;
    }

    .length-value {
      background: #222;
      color: #ffcc00;
      padding: 5px 18px;
      border-radius: 20px;
      font-size: 1.3rem;
      border: 1px solid #444;
      transition: all 0.3s;
      animation: pulseValue 2s ease-in-out infinite;
    }

    @keyframes pulseValue {
      0% { box-shadow: 0 0 5px rgba(255,204,0,0.2); }
      50% { box-shadow: 0 0 15px rgba(255,204,0,0.6); }
      100% { box-shadow: 0 0 5px rgba(255,204,0,0.2); }
    }

    .checkbox-group {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin: 20px 0 10px;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #ccc;
      font-size: 0.95rem;
    }

    .checkbox-item input[type="checkbox"] {
      accent-color: #ffcc00;
      width: 18px;
      height: 18px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .checkbox-item input[type="checkbox"]:hover {
      transform: scale(1.2);
      box-shadow: 0 0 8px #ffcc00;
    }

    .checkbox-item input[type="checkbox"]:checked {
      animation: checkPop 0.3s ease;
    }

    @keyframes checkPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* Tombol Generate dengan efek ripple */
    .generate-btn {
      width: 100%;
      background: #ffcc00;
      color: #000;
      font-weight: 700;
      font-size: 1.2rem;
      padding: 14px;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      margin: 10px 0 20px;
      box-shadow: 0 4px 10px rgba(255, 204, 0, 0.3);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
    }

    .generate-btn:hover {
      background: #e6b800;
      box-shadow: 0 6px 20px rgba(255, 204, 0, 0.6);
      transform: translateY(-2px);
    }

    .generate-btn:active {
      transform: translateY(1px);
      box-shadow: 0 2px 8px rgba(255, 204, 0, 0.4);
    }

    .generate-btn:disabled {
      opacity: 0.7;
      cursor: wait;
      transform: none;
    }

    /* Efek Ripple */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.6);
      transform: scale(0);
      animation: rippleEffect 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleEffect {
      to {
        transform: scale(4);
        opacity: 0;
      }
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(0,0,0,0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
      visibility: hidden;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .result-box {
      background: #0e0e0e;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0 10px;
      text-align: center;
      transition: all 0.4s ease;
      transform-origin: top;
      animation: scaleIn 0.4s ease;
    }

    @keyframes scaleIn {
      from { opacity: 0; transform: scaleY(0.8); }
      to { opacity: 1; transform: scaleY(1); }
    }

    /* Glow saat password baru muncul */
    .result-box.glow {
      animation: scaleIn 0.4s ease, resultGlow 1.5s ease-out;
    }

    @keyframes resultGlow {
      0% { box-shadow: 0 0 5px rgba(255,204,0,0.3); }
      50% { box-shadow: 0 0 30px rgba(255,204,0,0.8); }
      100% { box-shadow: 0 0 5px rgba(255,204,0,0.3); }
    }

    .password-display {
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 1.6rem;
      font-weight: 600;
      color: #ffcc00;
      word-break: break-all;
      background: #000;
      padding: 12px 15px;
      border-radius: 8px;
      letter-spacing: 1px;
      margin-bottom: 12px;
      border: 1px dashed #555;
      min-height: 60px;
      transition: 0.2s;
      position: relative;
    }

    .cursor {
      display: inline-block;
      width: 2px;
      height: 1.2em;
      background: #ffcc00;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    .strength-badge {
      display: inline-block;
      padding: 6px 18px;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .strength-badge.pulse-update {
      animation: pulseBadge 0.4s ease;
    }

    @keyframes pulseBadge {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .strength-weak { background: #b71c1c; color: white; }
    .strength-medium { background: #f57c00; color: white; }
    .strength-strong { background: #2e7d32; color: white; }
    .strength-very-strong { background: #0d47a1; color: white; }

    .copy-btn {
      background: transparent;
      border: 1px solid #ffcc00;
      color: #ffcc00;
      padding: 8px 18px;
      border-radius: 20px;
      font-weight: 600;
      margin-left: 10px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 0.9rem;
    }

    .copy-btn:hover {
      background: #ffcc00;
      color: #000;
      animation: wiggle 0.3s ease;
    }

    @keyframes wiggle {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(3deg); }
      50% { transform: rotate(-3deg); }
      75% { transform: rotate(2deg); }
      100% { transform: rotate(0deg); }
    }

    .footer {
      text-align: center;
      padding: 10px;
      color: #666;
      font-size: 0.75rem;
      border-top: 1px solid #222;
    }

    .warning {
      color: #aaa;
      font-size: 0.8rem;
      margin-top: 5px;
      text-align: center;
    }

    @media (max-width: 480px) {
      .logo-text { font-size: 1.6rem; }
      .password-display { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <!-- PARTIKEL BINTANG -->
  <div class="particles" id="particles"></div>

  <!-- KUNCI MELAYANG -->
  <div class="floating-keys" id="floatingKeys"></div>

  <div class="container">
    <div class="header">
      <div class="shield-icon">🛡️</div>
      <div class="logo-text">Sympony</div>
      <div class="subtitle">PASSWORD GENERATOR</div>
    </div>

    <div class="content">
      <div class="option-group">
        <label for="lengthSlider">Panjang Kata Sandi</label>
        <div class="length-display">
          <span>8</span>
          <span class="length-value" id="lengthValue">20</span>
          <span>50</span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="50" value="20" step="1">
      </div>

      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="includeUpper" checked>
          <label for="includeUpper">Huruf Besar (A-Z)</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeDigits" checked>
          <label for="includeDigits">Angka (0-9)</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeSymbols" checked>
          <label for="includeSymbols">Simbol (!@#$%)</label>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">🔐 Buat Kata Sandi Kuat</span>
      </button>

      <div class="result-box" id="resultBox" style="display: none;">
        <div class="password-display" id="passwordDisplay"></div>
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px;">
          <span class="strength-badge" id="strengthBadge">Kuat</span>
          <button class="copy-btn" id="copyBtn">📋 Salin</button>
        </div>
      </div>

      <div class="warning">
        ⚠️ Simulator ini menggunakan random generator aman (crypto). Gunakan kata sandi unik untuk setiap akun.
      </div>
    </div>
    <div class="footer">
      Sympony Password Generator Simulator — Bukan produk asli. Selalu lindungi data Anda.
    </div>
  </div>

  <script>
    (function() {
      // ---------- BINTANG PARTIKEL ----------
      function createParticles() {
        const container = document.getElementById('particles');
        const emojis = ['✨', '⭐', '⚡', '💫'];
        for (let i = 0; i < 20; i++) {
          const p = document.createElement('span');
          p.className = 'particle';
          p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          p.style.left = Math.random() * 100 + '%';
          p.style.top = Math.random() * 100 + '%';
          p.style.animationDelay = Math.random() * 10 + 's';
          p.style.animationDuration = (Math.random() * 15 + 10) + 's';
          p.style.fontSize = (Math.random() * 1.2 + 0.6) + 'rem';
          container.appendChild(p);
        }
      }
      createParticles();

      // ---------- KUNCI MELAYANG ----------
      function createFloatingKeys() {
        const container = document.getElementById('floatingKeys');
        const keyEmojis = ['🔑', '🗝️', '🔐', '🔒'];
        const count = 18;
        for (let i = 0; i < count; i++) {
          const key = document.createElement('span');
          key.className = 'key';
          const sizeClass = ['size-sm', 'size-md', 'size-lg'][Math.floor(Math.random() * 3)];
          key.classList.add(sizeClass);
          key.textContent = keyEmojis[Math.floor(Math.random() * keyEmojis.length)];
          key.style.left = Math.random() * 100 + '%';
          key.style.animationDelay = Math.random() * 15 + 's';
          key.style.animationDuration = (Math.random() * 15 + 10) + 's';
          container.appendChild(key);
        }
      }
      createFloatingKeys();

      // ---------- EFEK RIPPLE PADA TOMBOL ----------
      function addRippleEffect(button) {
        button.addEventListener('click', function(e) {
          const ripple = document.createElement('span');
          ripple.className = 'ripple';
          const rect = button.getBoundingClientRect();
          const size = Math.max(rect.width, rect.height);
          ripple.style.width = ripple.style.height = size + 'px';
          ripple.style.left = e.clientX - rect.left - size/2 + 'px';
          ripple.style.top = e.clientY - rect.top - size/2 + 'px';
          button.appendChild(ripple);
          ripple.addEventListener('animationend', () => {
            ripple.remove();
          });
        });
      }

      // ---------- PASSWORD GENERATOR LOGIC ----------
      const lengthSlider = document.getElementById('lengthSlider');
      const lengthValue = document.getElementById('lengthValue');
      const includeUpper = document.getElementById('includeUpper');
      const includeDigits = document.getElementById('includeDigits');
      const includeSymbols = document.getElementById('includeSymbols');
      const generateBtn = document.getElementById('generateBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const passwordDisplay = document.getElementById('passwordDisplay');
      const strengthBadge = document.getElementById('strengthBadge');
      const resultBox = document.getElementById('resultBox');
      const copyBtn = document.getElementById('copyBtn');

      // Ripple ke tombol generate
      addRippleEffect(generateBtn);

      lengthSlider.addEventListener('input', function(e) {
        lengthValue.textContent = e.target.value;
      });

      function generateSecurePassword(length, useUpper, useDigits, useSymbols) {
        const lower = "abcdefghijklmnopqrstuvwxyz";
        const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const digits = "0123456789";
        const symbols = "!@#$%^&*()_+-=[]{}|;:,.<>?/~`";

        let charPool = lower;
        if (useUpper) charPool += upper;
        if (useDigits) charPool += digits;
        if (useSymbols) charPool += symbols;

        if (charPool.length === 0) {
          charPool = lower;
        }

        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        
        let password = '';
        for (let i = 0; i < length; i++) {
          password += charPool[array[i] % charPool.length];
        }

        const checks = [];
        if (useUpper) checks.push({ set: upper, type: 'upper' });
        if (useDigits) checks.push({ set: digits, type: 'digit' });
        if (useSymbols) checks.push({ set: symbols, type: 'symbol' });

        checks.forEach(check => {
          if (![...password].some(ch => check.set.includes(ch))) {
            const randomIndex = Math.floor(Math.random() * length);
            const randomChar = check.set[Math.floor(Math.random() * check.set.length)];
            password = password.substring(0, randomIndex) + randomChar + password.substring(randomIndex + 1);
          }
        });

        return password;
      }

      function evaluateStrength(password) {
        let score = 0;
        if (password.length >= 12) score++;
        if (password.length >= 16) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        if (/[^a-zA-Z0-9]/.test(password)) score++;

        if (score >= 5) return { text: 'Sangat Kuat', class: 'strength-very-strong' };
        if (score >= 3) return { text: 'Kuat', class: 'strength-strong' };
        if (score >= 2) return { text: 'Sedang', class: 'strength-medium' };
        return { text: 'Lemah', class: 'strength-weak' };
      }

      function typeWriter(element, text, speed = 40, callback) {
        let i = 0;
        element.innerHTML = '<span class="cursor"></span>';
        const cursorSpan = element.querySelector('.cursor');
        function type() {
          if (i < text.length) {
            cursorSpan.insertAdjacentText('beforebegin', text.charAt(i));
            i++;
            setTimeout(type, speed);
          } else {
            if (cursorSpan) cursorSpan.remove();
            if (callback) callback();
          }
        }
        type();
      }

      function animateBadge() {
        strengthBadge.classList.add('pulse-update');
        setTimeout(() => {
          strengthBadge.classList.remove('pulse-update');
        }, 400);
      }

      generateBtn.addEventListener('click', function() {
        const length = parseInt(lengthSlider.value, 10);
        const useUpper = includeUpper.checked;
        const useDigits = includeDigits.checked;
        const useSymbols = includeSymbols.checked;

        spinner.style.visibility = 'visible';
        btnText.textContent = 'Menghasilkan...';
        generateBtn.disabled = true;
        resultBox.style.display = 'none';

        setTimeout(() => {
          const password = generateSecurePassword(length, useUpper, useDigits, useSymbols);
          const strength = evaluateStrength(password);

          resultBox.style.display = 'block';
          // Tambahkan class glow
          resultBox.classList.add('glow');
          setTimeout(() => resultBox.classList.remove('glow'), 1500);

          passwordDisplay.textContent = '';
          
          typeWriter(passwordDisplay, password, 35, () => {
            strengthBadge.textContent = strength.text;
            strengthBadge.className = 'strength-badge ' + strength.class;
            animateBadge();
            
            spinner.style.visibility = 'hidden';
            btnText.textContent = '🔐 Buat Kata Sandi Kuat';
            generateBtn.disabled = false;
          });

          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;
          animateBadge();
        }, 600);
      });

      copyBtn.addEventListener('click', function() {
        const password = passwordDisplay.textContent.replace(/[\n\r]/g, '');
        if (!password) return;
        
        navigator.clipboard.writeText(password).then(() => {
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ Tersalin!';
          copyBtn.style.background = '#ffcc00';
          copyBtn.style.color = '#000';
          setTimeout(() => {
            copyBtn.innerHTML = originalText;
            copyBtn.style.background = 'transparent';
            copyBtn.style.color = '#ffcc00';
          }, 2000);
        }).catch(() => {
          const textarea = document.createElement('textarea');
          textarea.value = password;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          const originalText = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ Tersalin!';
          setTimeout(() => {
            copyBtn.innerHTML = originalText;
          }, 2000);
        });
      });

      // Tampilkan contoh password saat halaman dimuat
      window.addEventListener('load', function() {
        const defaultPassword = generateSecurePassword(20, true, true, true);
        const strength = evaluateStrength(defaultPassword);
        resultBox.style.display = 'block';
        passwordDisplay.textContent = '';
        typeWriter(passwordDisplay, defaultPassword, 35, () => {
          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;
          animateBadge();
        });
        strengthBadge.textContent = strength.text;
        strengthBadge.className = 'strength-badge ' + strength.class;
      });
    })();
  </script>
</body>
</html>
