<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Sympony | Password Generator - Hyper Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', 'Poppins', 'Segoe UI', system-ui, -apple-system, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      background: #020208;
      overflow-x: hidden;
      position: relative;
    }

    /* ============ HYPER BACKGROUND ============ */
    .hyper-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 30%, rgba(255, 200, 50, 0.12), transparent 60%),
        radial-gradient(ellipse at 85% 70%, rgba(255, 80, 0, 0.1), transparent 55%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 100, 255, 0.05), transparent 70%),
        linear-gradient(125deg, #03030a 0%, #000000 100%);
      z-index: -3;
    }

    /* Animated Noise Texture */
    .noise {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
      background-repeat: repeat;
      opacity: 0.4;
      pointer-events: none;
      z-index: -2;
      animation: noiseShift 8s steps(2) infinite;
    }

    @keyframes noiseShift {
      0% { transform: translate(0, 0); }
      10% { transform: translate(-5%, -5%); }
      20% { transform: translate(5%, 5%); }
      30% { transform: translate(-5%, 5%); }
      40% { transform: translate(5%, -5%); }
      50% { transform: translate(-5%, -5%); }
      60% { transform: translate(5%, 5%); }
      70% { transform: translate(-5%, 5%); }
      80% { transform: translate(5%, -5%); }
      90% { transform: translate(-5%, -5%); }
      100% { transform: translate(0, 0); }
    }

    /* 3D Rotating Grid */
    .grid-3d {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255, 204, 0, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 204, 0, 0.06) 1px, transparent 1px);
      background-size: 60px 60px;
      transform-style: preserve-3d;
      animation: gridRotate 25s linear infinite;
      pointer-events: none;
      z-index: -2;
    }

    @keyframes gridRotate {
      0% { transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0); }
      50% { transform: perspective(800px) rotateX(3deg) rotateY(2deg) translateZ(20px); }
      100% { transform: perspective(800px) rotateX(0deg) rotateY(0deg) translateZ(0); }
    }

    /* ============ HYPER PARTICLES ============ */
    .hyper-particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .hyper-particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: radial-gradient(circle, #ffcc00, #ff6600);
      border-radius: 50%;
      filter: blur(1px);
      opacity: 0;
      animation: hyperFloat 6s linear infinite;
      box-shadow: 0 0 8px #ffcc00;
    }

    @keyframes hyperFloat {
      0% {
        transform: translateY(100vh) translateX(0) scale(0);
        opacity: 0;
      }
      15% {
        opacity: 0.9;
        transform: translateY(75vh) translateX(var(--tx1, 30px)) scale(1);
      }
      50% {
        opacity: 0.7;
        transform: translateY(40vh) translateX(var(--tx2, -40px)) scale(1.2);
      }
      85% {
        opacity: 0.5;
        transform: translateY(15vh) translateX(var(--tx3, 20px)) scale(0.8);
      }
      100% {
        transform: translateY(-20vh) translateX(var(--tx4, -50px)) scale(0);
        opacity: 0;
      }
    }

    /* ============ GALAXY KEYS ============ */
    .galaxy-keys {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .galaxy-key {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      filter: drop-shadow(0 0 12px rgba(255, 204, 0, 0.8));
      animation: galaxyFloat 15s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      text-shadow: 0 0 8px gold;
      transition: filter 0.3s;
    }

    @keyframes galaxyFloat {
      0% {
        transform: translateY(100vh) translateX(0) rotate(0deg) scale(0.2);
        opacity: 0;
      }
      10% {
        opacity: 0.7;
        transform: translateY(75vh) translateX(var(--gx1, 40px)) rotate(90deg) scale(0.6);
      }
      35% {
        opacity: 0.6;
        transform: translateY(50vh) translateX(var(--gx2, -50px)) rotate(180deg) scale(0.9);
      }
      65% {
        opacity: 0.5;
        transform: translateY(25vh) translateX(var(--gx3, 35px)) rotate(270deg) scale(1);
      }
      85% {
        opacity: 0.4;
        transform: translateY(10vh) translateX(var(--gx4, -30px)) rotate(360deg) scale(0.8);
      }
      100% {
        transform: translateY(-30vh) translateX(var(--gx5, 60px)) rotate(540deg) scale(1.3);
        opacity: 0;
      }
    }

    /* ============ CONTAINER DIAMOND ============ */
    .container {
      max-width: 680px;
      width: 100%;
      background: rgba(6, 6, 16, 0.5);
      backdrop-filter: blur(28px);
      border: 1px solid rgba(255, 204, 0, 0.4);
      border-radius: 72px;
      box-shadow: 0 50px 100px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 204, 0, 0.25), 0 0 80px rgba(255, 204, 0, 0.2);
      overflow: hidden;
      animation: diamondReveal 0.9s cubic-bezier(0.16, 1, 0.3, 1.2);
      position: relative;
      z-index: 1;
      transition: all 0.5s ease;
    }

    .container:hover {
      border-color: rgba(255, 204, 0, 0.8);
      box-shadow: 0 55px 110px rgba(0, 0, 0, 0.8), 0 0 0 2px rgba(255, 204, 0, 0.6), 0 0 100px rgba(255, 204, 0, 0.4);
    }

    @keyframes diamondReveal {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(60px) rotateX(-10deg);
        backdrop-filter: blur(0px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0) rotateX(0deg);
        backdrop-filter: blur(28px);
      }
    }

    /* Header Cosmic */
    .header {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.95) 0%, rgba(25, 25, 55, 0.98) 100%);
      padding: 42px 24px 30px;
      text-align: center;
      border-bottom: 3px solid rgba(255, 204, 0, 0.7);
      position: relative;
      overflow: hidden;
    }

    .header::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 204, 0, 0.2), transparent);
      animation: cosmicSpin 20s linear infinite;
    }

    @keyframes cosmicSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .shield-icon {
      font-size: 4.8rem;
      margin-bottom: 18px;
      display: inline-block;
      animation: shieldCosmic 3s ease-in-out infinite;
      filter: drop-shadow(0 0 30px rgba(255, 204, 0, 0.9));
    }

    @keyframes shieldCosmic {
      0%, 100% { transform: scale(1) rotate(0deg) translateY(0); }
      25% { transform: scale(1.12) rotate(6deg) translateY(-5px); }
      75% { transform: scale(1.08) rotate(-6deg) translateY(-3px); }
    }

    .logo-text {
      font-size: 3.5rem;
      font-weight: 900;
      letter-spacing: 10px;
      background: linear-gradient(135deg, #ffe888, #ffaa44, #ffdd88, #ffcc55, #ffe8aa);
      background-size: 400% 400%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: logoHyper 4s ease infinite;
    }

    @keyframes logoHyper {
      0%, 100% { background-position: 0% 50%; letter-spacing: 10px; }
      50% { background-position: 100% 50%; letter-spacing: 14px; }
    }

    .subtitle {
      color: rgba(255, 255, 220, 0.8);
      font-size: 0.9rem;
      margin-top: 15px;
      letter-spacing: 7px;
      font-weight: 400;
      text-transform: uppercase;
      animation: subtitlePulse 2s ease-in-out infinite;
    }

    @keyframes subtitlePulse {
      0%, 100% { opacity: 0.6; text-shadow: 0 0 0px gold; letter-spacing: 7px; }
      50% { opacity: 1; text-shadow: 0 0 15px gold; letter-spacing: 9px; }
    }

    /* Content */
    .content {
      padding: 42px 35px;
    }

    .option-group {
      margin-bottom: 35px;
    }

    .option-group label {
      display: flex;
      align-items: center;
      gap: 14px;
      color: #ffeedd;
      font-weight: 700;
      margin-bottom: 16px;
      font-size: 1.05rem;
      letter-spacing: 1.5px;
    }

    /* Slider Premium */
    .slider-hyper {
      position: relative;
    }

    input[type="range"] {
      width: 100%;
      height: 8px;
      -webkit-appearance: none;
      background: linear-gradient(90deg, #ffcc00, #ff4400, #ffcc00, #ffaa22);
      background-size: 300% 100%;
      animation: sliderNeon 4s ease infinite;
      border-radius: 10px;
      outline: none;
      cursor: pointer;
    }

    @keyframes sliderNeon {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 30px;
      height: 30px;
      background: #ffcc00;
      border-radius: 50%;
      border: 4px solid white;
      box-shadow: 0 0 30px #ffcc00;
      cursor: pointer;
      transition: 0.2s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.4);
      background: #ffdd66;
      box-shadow: 0 0 45px #ffcc00;
    }

    .length-display {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      color: #ffdd99;
    }

    .length-value {
      background: linear-gradient(135deg, #111138, #080820);
      color: #ffdd77;
      padding: 14px 42px;
      border-radius: 100px;
      font-size: 2.2rem;
      font-weight: 800;
      border: 1px solid rgba(255, 204, 0, 0.8);
      box-shadow: 0 0 45px rgba(255, 204, 0, 0.4);
      transition: all 0.2s;
    }

    /* Checkbox Hyper */
    .checkbox-group {
      display: flex;
      gap: 50px;
      margin: 45px 0 40px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 16px;
      color: #f5f5f5;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 28px;
      background: rgba(255, 255, 255, 0.04);
      border-radius: 80px;
      transition: all 0.3s;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 204, 0, 0.3);
    }

    .checkbox-item:hover {
      background: rgba(255, 204, 0, 0.25);
      transform: translateX(10px) scale(1.02);
      border-color: rgba(255, 204, 0, 0.8);
      box-shadow: 0 0 30px rgba(255, 204, 0, 0.4);
    }

    .checkbox-item input[type="checkbox"] {
      appearance: none;
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.7);
      border: 2.5px solid #ffcc00;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .checkbox-item input[type="checkbox"]:checked {
      background: #ffcc00;
      box-shadow: 0 0 35px #ffcc00;
      animation: checkboxHyper 0.3s ease;
    }

    @keyframes checkboxHyper {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.4); }
    }

    .checkbox-item input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      color: #000;
      font-size: 18px;
      font-weight: bold;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    /* Tombol Generate Hyper */
    .generate-btn {
      width: 100%;
      background: linear-gradient(135deg, #ffcc00, #ff6600, #ffcc00, #ff9900);
      background-size: 400% 400%;
      animation: btnHyper 3s ease infinite;
      color: #0a0a0a;
      font-weight: 900;
      font-size: 1.35rem;
      padding: 22px;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      letter-spacing: 6px;
      transition: all 0.4s ease;
      margin: 30px 0 35px;
      box-shadow: 0 20px 45px rgba(255, 204, 0, 0.5);
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
    }

    @keyframes btnHyper {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    .generate-btn:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: 0 30px 60px rgba(255, 204, 0, 0.8);
      letter-spacing: 8px;
    }

    .generate-btn:active {
      transform: translateY(0);
    }

    /* Ripple Effect */
    .ripple-hyper {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.9);
      transform: scale(0);
      animation: rippleHyper 0.6s linear;
      pointer-events: none;
    }

    @keyframes rippleHyper {
      to {
        transform: scale(6);
        opacity: 0;
      }
    }

    /* Result Box Crystal Premium */
    .result-box {
      background: linear-gradient(135deg, rgba(0, 0, 0, 0.75), rgba(20, 20, 50, 0.9));
      border: 1px solid rgba(255, 204, 0, 0.6);
      border-radius: 60px;
      padding: 35px;
      margin: 30px 0 20px;
      text-align: center;
      backdrop-filter: blur(18px);
      transition: all 0.5s ease;
    }

    .result-box.glow {
      animation: hyperGlow 1s ease-out;
    }

    @keyframes hyperGlow {
      0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); border-color: rgba(255, 204, 0, 0.4); }
      35% { box-shadow: 0 0 0 35px rgba(255, 204, 0, 0.3); border-color: rgba(255, 204, 0, 1); }
      100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); border-color: rgba(255, 204, 0, 0.6); }
    }

    .password-display {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 1.65rem;
      font-weight: 700;
      color: #ffeeaa;
      word-break: break-all;
      background: rgba(0, 0, 0, 0.7);
      padding: 28px;
      border-radius: 48px;
      letter-spacing: 3px;
      margin-bottom: 32px;
      border: 1px solid rgba(255, 204, 0, 0.5);
      transition: 0.2s;
      position: relative;
    }

    .action-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 25px;
      flex-wrap: wrap;
    }

    .strength-badge {
      display: inline-block;
      padding: 14px 42px;
      border-radius: 100px;
      font-weight: 800;
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 3px;
      backdrop-filter: blur(4px);
      transition: all 0.3s;
      animation: badgeHyper 2s ease infinite;
    }

    @keyframes badgeHyper {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }

    .strength-weak { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; box-shadow: 0 0 30px rgba(255, 68, 68, 0.7);}
    .strength-medium { background: linear-gradient(135deg, #ffaa44, #cc7700); color: white; box-shadow: 0 0 30px rgba(255, 170, 68, 0.7);}
    .strength-strong { background: linear-gradient(135deg, #44ff44, #00aa00); color: white; box-shadow: 0 0 30px rgba(68, 255, 68, 0.7);}
    .strength-very-strong { background: linear-gradient(135deg, #4488ff, #0044cc); color: white; box-shadow: 0 0 30px rgba(68, 136, 255, 0.7);}

    .copy-btn {
      background: rgba(255, 204, 0, 0.15);
      border: 2px solid #ffcc00;
      color: #ffee88;
      padding: 14px 42px;
      border-radius: 100px;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 1rem;
      backdrop-filter: blur(4px);
    }

    .copy-btn:hover {
      background: #ffcc00;
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 50px rgba(255, 204, 0, 0.9);
      animation: copyHyper 0.4s ease;
    }

    @keyframes copyHyper {
      0%, 100% { transform: scale(1.1); }
      25% { transform: scale(1.15) rotate(2deg); }
      75% { transform: scale(1.12) rotate(-2deg); }
    }

    .footer {
      text-align: center;
      padding: 22px;
      color: rgba(255, 255, 200, 0.35);
      font-size: 0.7rem;
      border-top: 1px solid rgba(255, 204, 0, 0.2);
    }

    .warning {
      color: rgba(255, 220, 100, 0.6);
      font-size: 0.7rem;
      margin-top: 20px;
      text-align: center;
      background: rgba(0, 0, 0, 0.45);
      padding: 14px;
      border-radius: 80px;
    }

    .spinner {
      display: inline-block;
      width: 26px;
      height: 26px;
      border: 3px solid rgba(0, 0, 0, 0.3);
      border-radius: 50%;
      border-top-color: #000;
      animation: spin 0.8s linear infinite;
      visibility: hidden;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .cursor {
      display: inline-block;
      width: 3px;
      height: 1.4em;
      background: #ffcc00;
      margin-left: 4px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @media (max-width: 550px) {
      .container { margin: 10px; }
      .logo-text { font-size: 2rem; letter-spacing: 4px; }
      .password-display { font-size: 1rem; }
      .content { padding: 28px 20px; }
      .length-value { font-size: 1.5rem; padding: 10px 28px; }
      .checkbox-item { padding: 8px 18px; }
    }
  </style>
</head>
<body>
  <div class="hyper-bg"></div>
  <div class="noise"></div>
  <div class="grid-3d"></div>
  <div class="hyper-particles" id="hyperParticles"></div>
  <div class="galaxy-keys" id="galaxyKeys"></div>

  <div class="container">
    <div class="header">
      <div class="shield-icon">✨🔮⚡🛡️</div>
      <div class="logo-text">SYMPONY</div>
      <div class="subtitle">HYPERSPACE SECURITY MATRIX</div>
    </div>

    <div class="content">
      <div class="option-group">
        <label>🔑 QUANTUM LENGTH</label>
        <div class="length-display">
          <span>8</span>
          <span class="length-value" id="lengthValue">20</span>
          <span>50</span>
        </div>
        <input type="range" id="lengthSlider" min="8" max="50" value="20" step="1">
      </div>

      <div class="checkbox-group">
        <div class="checkbox-item">
          <input type="checkbox" id="includeUpper" checked>
          <label>🔠 UPPERCASE</label>
        </div>
        <div class="checkbox-item">
          <input type="checkbox" id="includeDigits" checked>
          <label>🔢 NUMBERS</label>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn">
        <span class="spinner" id="spinner"></span>
        <span id="btnText">⚡ GENERATE</span>
      </button>

      <div class="result-box" id="resultBox" style="display: none;">
        <div class="password-display" id="passwordDisplay"></div>
        <div class="action-group">
          <span class="strength-badge" id="strengthBadge">POWERFUL</span>
          <button class="copy-btn" id="copyBtn">📋 COPY</button>
        </div>
      </div>

      <div class="warning">
        🔐 Quantum Entropy Crypto | Military-Grade Protection | Every Password is Unique
      </div>
    </div>
    <div class="footer">
      SYMPONY HYPERSPACE — The Ultimate Password Fortress
    </div>
  </div>

  <script>
    (function() {
      // ========== HYPER PARTICLES ==========
      function createHyperParticles() {
        const container = document.getElementById('hyperParticles');
        for (let i = 0; i < 180; i++) {
          const particle = document.createElement('div');
          particle.className = 'hyper-particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.setProperty('--tx1', (Math.random() - 0.5) * 200 + 'px');
          particle.style.setProperty('--tx2', (Math.random() - 0.5) * 200 + 'px');
          particle.style.setProperty('--tx3', (Math.random() - 0.5) * 200 + 'px');
          particle.style.setProperty('--tx4', (Math.random() - 0.5) * 200 + 'px');
          particle.style.animationDelay = Math.random() * 12 + 's';
          particle.style.animationDuration = (Math.random() * 8 + 5) + 's';
          particle.style.width = (Math.random() * 5 + 2) + 'px';
          particle.style.height = particle.style.width;
          container.appendChild(particle);
        }
      }
      createHyperParticles();

      // ========== GALAXY KEYS ==========
      function createGalaxyKeys() {
        const container = document.getElementById('galaxyKeys');
        const keyIcons = ['🔑', '🗝️', '🔐', '🔒', '⚜️', '🔓', '🛡️', '✨', '💎', '⭐', '🌟', '🔮', '⚡', '🔥', '💫'];
        
        for (let i = 0; i < 100; i++) {
          const key = document.createElement('div');
          key.className = 'galaxy-key';
          key.textContent = keyIcons[Math.floor(Math.random() * keyIcons.length)];
          key.style.left = Math.random() * 100 + '%';
          
          // Random galaxy path variables
          key.style.setProperty('--gx1', (Math.random() - 0.5) * 180 + 'px');
          key.style.setProperty('--gx2', (Math.random() - 0.5) * 180 + 'px');
          key.style.setProperty('--gx3', (Math.random() - 0.5) * 180 + 'px');
          key.style.setProperty('--gx4', (Math.random() - 0.5) * 180 + 'px');
          key.style.setProperty('--gx5', (Math.random() - 0.5) * 180 + 'px');
          
          const duration = Math.random() * 14 + 12;
          key.style.animationDuration = duration + 's';
          key.style.animationDelay = Math.random() * 20 + 's';
          key.style.fontSize = (Math.random() * 2.4 + 1.2) + 'rem';
          
          container.appendChild(key);
        }
      }
      createGalaxyKeys();

      // ========== DOM ELEMENTS ==========
      const lengthSlider = document.getElementById('lengthSlider');
      const lengthValue = document.getElementById('lengthValue');
      const includeUpper = document.getElementById('includeUpper');
      const includeDigits = document.getElementById('includeDigits');
      const generateBtn = document.getElementById('generateBtn');
      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const passwordDisplay = document.getElementById('passwordDisplay');
      const strengthBadge = document.getElementById('strengthBadge');
      const resultBox = document.getElementById('resultBox');
      const copyBtn = document.getElementById('copyBtn');

      lengthSlider.addEventListener('input', (e) => {
        lengthValue.textContent = e.target.value;
        lengthValue.style.transform = 'scale(1.2)';
        setTimeout(() => lengthValue.style.transform = '', 150);
      });

      // ========== PASSWORD GENERATOR ==========
      function generateSecurePassword(length, useUpper, useDigits) {
        const lower = "abcdefghijklmnopqrstuvwxyz";
        let charPool = lower;
        if (useUpper) charPool += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        if (useDigits) charPool += "0123456789";
        if (charPool.length === 0) charPool = lower;

        const array = new Uint32Array(length);
        window.crypto.getRandomValues(array);
        let password = '';
        for (let i = 0; i < length; i++) {
          password += charPool[array[i] % charPool.length];
        }

        const checks = [];
        if (useUpper) checks.push({ set: "ABCDEFGHIJKLMNOPQRSTUVWXYZ" });
        if (useDigits) checks.push({ set: "0123456789" });

        checks.forEach(check => {
          if (![...password].some(ch => check.set.includes(ch))) {
            const randomIndex = Math.floor(Math.random() * length);
            const randomChar = check.set[Math.floor(Math.random() * check.set.length)];
            password = password.substring(0, randomIndex) + randomChar + password.substring(randomIndex + 1);
          }
        });
        return password;
      }

      function evaluateStrength(password) {
        let score = 0;
        if (password.length >= 12) score++;
        if (password.length >= 16) score++;
        if (/[a-z]/.test(password)) score++;
        if (/[A-Z]/.test(password)) score++;
        if (/[0-9]/.test(password)) score++;
        
        if (score >= 5) return { text: 'SUPREME', class: 'strength-very-strong' };
        if (score >= 3) return { text: 'POWERFUL', class: 'strength-strong' };
        if (score >= 2) return { text: 'MEDIUM', class: 'strength-medium' };
        return { text: 'WEAK', class: 'strength-weak' };
      }

      function typeWriter(element, text, speed = 20, callback) {
        let i = 0;
        element.innerHTML = '<span class="cursor"></span>';
        const cursorSpan = element.querySelector('.cursor');
        function type() {
          if (i < text.length) {
            cursorSpan.insertAdjacentText('beforebegin', text.charAt(i));
            i++;
            setTimeout(type, speed);
          } else {
            if (cursorSpan) cursorSpan.remove();
            if (callback) callback();
          }
        }
        type();
      }

      function animateBadge() {
        strengthBadge.style.transform = 'scale(1.2)';
        setTimeout(() => strengthBadge.style.transform = '', 300);
      }

      // Ripple effect
      function createRipple(btn, e) {
        const ripple = document.createElement('span');
        ripple.className = 'ripple-hyper';
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height);
        ripple.style.width = ripple.style.height = size + 'px';
        ripple.style.left = e.clientX - rect.left - size/2 + 'px';
        ripple.style.top = e.clientY - rect.top - size/2 + 'px';
        btn.appendChild(ripple);
        setTimeout(() => ripple.remove(), 600);
      }

      generateBtn.addEventListener('click', function(e) {
        createRipple(generateBtn, e);
        
        const length = parseInt(lengthSlider.value, 10);
        const useUpper = includeUpper.checked;
        const useDigits = includeDigits.checked;

        spinner.style.visibility = 'visible';
        btnText.innerHTML = '⌛ GENERATING';
        generateBtn.disabled = true;
        resultBox.style.display = 'none';

        setTimeout(() => {
          const password = generateSecurePassword(length, useUpper, useDigits);
          const strength = evaluateStrength(password);

          resultBox.style.display = 'block';
          resultBox.classList.add('glow');
          setTimeout(() => resultBox.classList.remove('glow'), 1300);

          passwordDisplay.textContent = '';
          typeWriter(passwordDisplay, password, 18, () => {
            strengthBadge.textContent = strength.text;
            strengthBadge.className = 'strength-badge ' + strength.class;
            animateBadge();
            spinner.style.visibility = 'hidden';
            btnText.innerHTML = '⚡ GENERATE';
            generateBtn.disabled = false;
          });
          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;
          animateBadge();
        }, 550);
      });

      copyBtn.addEventListener('click', async () => {
        const rawPassword = passwordDisplay.textContent;
        const password = rawPassword.replace(/[\n\r]/g, '');
        if (!password) return;
        
        try {
          await navigator.clipboard.writeText(password);
          const original = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ COPIED!';
          copyBtn.style.background = '#ffcc00';
          copyBtn.style.color = '#000';
          setTimeout(() => {
            copyBtn.innerHTML = original;
            copyBtn.style.background = 'rgba(255,204,0,0.15)';
            copyBtn.style.color = '#ffee88';
          }, 1800);
        } catch {
          const textarea = document.createElement('textarea');
          textarea.value = password;
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          const original = copyBtn.innerHTML;
          copyBtn.innerHTML = '✅ COPIED!';
          setTimeout(() => copyBtn.innerHTML = original, 1800);
        }
      });

      // Initial Load
      window.addEventListener('load', () => {
        const defaultPassword = generateSecurePassword(20, true, true);
        const strength = evaluateStrength(defaultPassword);
        resultBox.style.display = 'block';
        passwordDisplay.textContent = '';
        typeWriter(passwordDisplay, defaultPassword, 25, () => {
          strengthBadge.textContent = strength.text;
          strengthBadge.className = 'strength-badge ' + strength.class;
          animateBadge();
        });
        strengthBadge.textContent = strength.text;
        strengthBadge.className = 'strength-badge ' + strength.class;
      });
    })();
  </script>
</body>
</html>
