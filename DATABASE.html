<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>沈 · LINE TOGEL HUB // NEO-DRIVE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-core: #010101;
      --bg-panel: rgba(5, 8, 18, 0.85);
      --accent-primary: #FF3366;
      --accent-secondary: #FFD600;
      --accent-tertiary: #00F2FF;
      --accent-hot: #FF0066;
      --text-main: #ffffff;
      --text-muted: #b0c4de;
      --glow-primary: rgba(255, 51, 102, 0.7);
      --glow-cyan: rgba(0, 242, 255, 0.6);
      --border-glow: rgba(255, 51, 102, 0.4);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-core);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      font-size: 16px;
      line-height: 1.5;
    }

    /* Particle & Effects */
    #particle-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.35;
    }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none; z-index: 1;
    }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 4px);
      opacity: 0.3;
    }

    .hazard-bar {
      position: fixed; top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary), var(--accent-primary));
      background-size: 300% 100%;
      animation: gradientMove 3s linear infinite;
      z-index: 100;
      box-shadow: 0 0 12px var(--glow-primary);
    }

    @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    /* Navigation */
    .top-nav {
      height: 70px;
      background: rgba(2, 4, 12, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-glow);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      position: relative;
      z-index: 20;
    }

    .brand-text h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      background: linear-gradient(135deg, #fff, var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .nav-menu {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-item {
      padding: 8px 18px;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 40px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(10, 15, 25, 0.6);
      border: 1px solid transparent;
    }

    .nav-item:hover {
      color: var(--accent-secondary);
      border-color: rgba(255,214,0,0.5);
      background: rgba(255,214,0,0.08);
      transform: translateY(-2px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-hot));
      color: white;
      border: none;
      box-shadow: 0 4px 12px var(--glow-primary);
    }

    .status-box {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 5px 18px;
      border-radius: 40px;
      font-family: monospace;
      font-size: 0.85rem;
      border: 1px solid var(--border-glow);
    }

    /* Main Content */
    .main {
      padding: 25px 30px;
      position: relative;
      z-index: 10;
      max-width: 1600px;
      margin: 0 auto;
    }

    .content-wrapper {
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--border-glow);
      box-shadow: 0 20px 35px -15px rgba(0,0,0,0.5);
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 28px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-wrap: wrap;
      gap: 15px;
    }

    .title-main h1 {
      font-family: 'Orbitron', monospace;
      font-size: 1.6rem;
      letter-spacing: 2px;
      background: linear-gradient(135deg, #fff, var(--accent-tertiary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-box input {
      background: rgba(0,0,0,0.65);
      border: 1px solid var(--border-glow);
      padding: 10px 18px;
      width: 260px;
      border-radius: 40px;
      color: white;
      font-family: 'IBM Plex Mono', monospace;
      transition: 0.2s;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 12px var(--glow-primary);
    }

    .btn-industrial {
      background: rgba(20,20,40,0.8);
      border: 1px solid var(--border-glow);
      padding: 10px 22px;
      border-radius: 40px;
      color: #ddd;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-industrial:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      transform: translateY(-2px);
    }

    /* Table Styling - Enhanced */
    .qna-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    .qna-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .qna-table th {
      text-align: left;
      padding: 14px 20px;
      color: var(--accent-tertiary);
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: rgba(0, 8, 20, 0.95);
      border-bottom: 2px solid var(--accent-primary);
    }

    .qna-table td {
      padding: 14px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      color: #e2e8f0;
      vertical-align: top;
      word-break: break-word;
    }

    .qna-table tbody tr:hover {
      background: rgba(255, 51, 102, 0.08);
      transition: background 0.15s;
    }

    .col-action {
      width: 60px;
      text-align: center;
    }

    .copy-trigger, .btn-copy-action {
      background: rgba(255,51,102,0.15);
      border: none;
      color: var(--accent-primary);
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .copy-trigger:hover, .btn-copy-action:hover {
      background: var(--accent-primary);
      color: black;
      transform: scale(1.05);
      box-shadow: 0 0 10px var(--glow-primary);
    }

    /* Grid Cards */
    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: 24px;
    }

    .asset-card {
      background: linear-gradient(145deg, rgba(10, 18, 28, 0.9), rgba(2, 5, 12, 0.95));
      border-radius: 20px;
      backdrop-filter: blur(4px);
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      border: 1px solid rgba(255,51,102,0.2);
    }

    .asset-card:hover {
      transform: translateY(-6px);
      border-color: var(--accent-primary);
      box-shadow: 0 15px 30px -10px rgba(255,51,102,0.3);
    }

    .asset-header {
      padding: 16px 20px;
      background: rgba(0,0,0,0.5);
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      justify-content: space-between;
    }

    .asset-display {
      margin: 18px;
      background: rgba(0,0,0,0.5);
      border-radius: 16px;
      padding: 18px;
      text-align: center;
      font-family: monospace;
      font-size: 0.9rem;
      word-break: break-all;
    }

    /* Sidebar Layout */
    .layout-split {
      display: flex;
      gap: 1px;
      background: rgba(0,0,0,0.3);
    }

    .sidebar-col {
      width: 280px;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--border-glow);
    }

    .sidebar-header {
      padding: 16px 20px;
      font-weight: bold;
      color: var(--accent-primary);
      border-bottom: 1px solid var(--border-glow);
    }

    .sidebar-item {
      padding: 12px 20px;
      cursor: pointer;
      color: #ccc;
      border-left: 3px solid transparent;
      transition: 0.15s;
      display: flex;
      gap: 12px;
      align-items: center;
      font-size: 0.9rem;
    }

    .sidebar-item:hover {
      background: rgba(255,51,102,0.1);
      color: white;
    }

    .sidebar-item.active {
      background: rgba(255,51,102,0.2);
      border-left-color: var(--accent-primary);
      color: var(--accent-secondary);
    }

    .detail-col {
      flex: 1;
      padding: 25px;
    }

    .detail-content {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255,51,102,0.2);
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      text-align: center;
    }

    /* Notifications */
    #notif-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast-notification {
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      border-left: 4px solid var(--accent-primary);
      padding: 12px 24px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.85rem;
      animation: slideInRight 0.25s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Loader */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      transition: 0.5s;
    }

    .loader-bar-container {
      width: 280px;
      height: 3px;
      background: #222;
      border-radius: 4px;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-tertiary));
    }

    /* ========= ROAD & MOVING CARS ========= */
    .animation-layer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      pointer-events: none;
      z-index: 50;
      background: linear-gradient(to top, #010101 0%, #010101 70%, transparent 100%);
    }

    .road-container {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 70px;
      background: linear-gradient(180deg, #0a0a0a 0%, #030303 100%);
      border-top: 2px solid rgba(255,51,102,0.6);
      box-shadow: 0 -5px 30px rgba(255,51,102,0.2);
    }

    .road-edge-left, .road-edge-right {
      position: absolute;
      top: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, var(--accent-primary), var(--accent-tertiary));
      box-shadow: 0 0 20px var(--glow-primary);
    }
    .road-edge-left { left: 5%; }
    .road-edge-right { right: 5%; }

    .road-lines {
      position: absolute;
      top: 34px;
      width: 200%;
      height: 3px;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 50px, var(--accent-primary) 50px, var(--accent-primary) 100px);
      animation: slideRoad 0.8s linear infinite;
      filter: drop-shadow(0 0 6px var(--accent-primary));
    }

    @keyframes slideRoad {
      0% { transform: translateX(0); }
      100% { transform: translateX(-100px); }
    }

    .road-reflection {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 30px;
      background: linear-gradient(180deg, transparent, rgba(255,51,102,0.15));
    }

    /* Car Styling */
    .cyber-car {
      position: absolute;
      bottom: 18px;
      width: 180px;
      height: 70px;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.8));
    }
    .car-cruiser {
      right: -200px;
      animation: driveLeft 16s linear infinite;
    }
    .car-interceptor {
      left: -200px;
      animation: driveRight 14s linear infinite;
      transform: scaleX(-1);
    }

    @keyframes driveLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-100vw - 280px)); }
    }
    @keyframes driveRight {
      0% { transform: translateX(0) scaleX(-1); }
      100% { transform: translateX(calc(100vw + 280px)) scaleX(-1); }
    }

    .car-underglow {
      position: absolute;
      bottom: -6px;
      left: 15%;
      width: 70%;
      height: 12px;
      border-radius: 50%;
      animation: underglowPulse 0.6s ease-in-out infinite alternate;
    }
    .underglow-pink { background: radial-gradient(ellipse, rgba(255,51,102,0.8) 0%, transparent 70%); box-shadow: 0 0 25px 8px rgba(255,51,102,0.5); }
    .underglow-cyan { background: radial-gradient(ellipse, rgba(0,242,255,0.8) 0%, transparent 70%); box-shadow: 0 0 25px 8px rgba(0,242,255,0.5); }

    @keyframes underglowPulse {
      0% { opacity: 0.6; transform: scaleX(0.95); }
      100% { opacity: 1; transform: scaleX(1.05); }
    }

    .exhaust-flame {
      position: absolute;
      bottom: 28px;
      width: 28px;
      height: 8px;
      background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary), transparent);
      filter: blur(2px);
      animation: flameFlicker 0.12s infinite alternate;
      border-radius: 0 50% 50% 0;
    }
    .flame-rear-left { left: -22px; }
    .flame-rear-right { left: -22px; bottom: 18px; }

    @keyframes flameFlicker {
      0% { transform: scaleX(0.8); opacity: 0.7; }
      100% { transform: scaleX(1.3); opacity: 1; }
    }

    .wheel {
      position: absolute;
      bottom: -4px;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      animation: wheelSpin 0.2s linear infinite;
    }
    .wheel-hd {
      background: radial-gradient(circle at 30% 30%, #333 0%, #111 70%);
      border: 2px solid #222;
      box-shadow: 0 0 6px rgba(0,0,0,0.8);
    }
    @keyframes wheelSpin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 1024px) {
      .top-nav {
        flex-direction: column;
        height: auto;
        padding: 15px;
        gap: 12px;
      }
      .nav-menu {
        justify-content: center;
      }
      .layout-split {
        flex-direction: column;
      }
      .sidebar-col {
        width: 100%;
      }
      .header-row {
        flex-direction: column;
        align-items: stretch;
      }
      .search-box input {
        width: 100%;
      }
      .animation-layer {
        height: 100px;
      }
    }
  </style>
</head>

        <path d="M55 33 Q60 20 85 17 L85 33 Z" fill="rgba(255,51,102,0.2)"/>
        <path d="M89 17 L89 33 L145 33 Q142 20 125 17 Z" fill="rgba(255,51,102,0.15)"/>
        <path d="M12 40 L20 38 L20 48 L12 46 Z" fill="#00F2FF"><animate attributeName="opacity" values="0.7;1;0.7" dur="0.5s" repeatCount="indefinite"/></path>
        <rect x="185" y="40" width="8" height="12" rx="1" fill="#FF0066"><animate attributeName="opacity" values="0.5;1;0.5" dur="0.25s" repeatCount="indefinite"/></rect>
        <path d="M15 55 L185 55 L185 60 Q180 65 100 65 Q20 65 15 60 Z" fill="#05080c"/>
        <path d="M15 46 L190 46" stroke="#00F2FF" stroke-width="1.5" opacity="0.6"/>
        <circle cx="28" cy="56" r="6" fill="#111" stroke="#222" stroke-width="1.5"/>
        <circle cx="162" cy="56" r="6" fill="#111" stroke="#222" stroke-width="1.5"/>
      </svg>
      <div class="car-underglow underglow-cyan"></div>
      <div class="exhaust-flame flame-rear-left" style="background:linear-gradient(90deg,#00F2FF,#FF3366,transparent);"></div>
      <div class="wheel wheel-hd" style="left:20px;"></div>
      <div class="wheel wheel-hd" style="right:20px;"></div>
    </div>
  </div>

  <script>
    // Particle system
    const canvas = document.getElementById('particle-canvas');
    const ctxP = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initParticles() {
      particles = [];
      for (let i = 0; i < 70; i++) {
        particles.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          r: Math.random() * 2 + 1, alpha: Math.random() * 0.3 + 0.1,
          speedX: (Math.random() - 0.5) * 0.2, speedY: (Math.random() - 0.5) * 0.2,
          color: `hsl(${Math.random() * 40 + 320}, 75%, 55%)`
        });
      }
    }
    function drawParticles() {
      if (!ctxP) return;
      ctxP.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        ctxP.beginPath(); ctxP.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctxP.fillStyle = p.color; ctxP.globalAlpha = p.alpha; ctxP.fill();
        p.x += p.speedX; p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      }
      requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    resizeCanvas(); initParticles(); drawParticles();

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
    setInterval(updateClock, 1000); updateClock();
    setInterval(() => { document.getElementById('hud-ping').innerText = Math.floor(Math.random() * 15 + 12) + 'ms'; }, 4000);

    // Spreadsheet logic
    const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
    const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
    const COPY_COL_C_SHEETS = ['PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
    let allData = {};
    let currentSheet = 'bonus';

    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        if (!json.table?.rows) return [];
        const cols = json.table.cols || [];
        const headers = cols.map(col => col.label || `col_${col.id}`);
        return json.table.rows.map(row => {
          const obj = {};
          row.c?.forEach((cell, idx) => { obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null; });
          return obj;
        });
      } catch(e) { console.error(e); return []; }
    }

    async function loadAllSheets() {
      let progress = 0;
      const step = 100 / SHEET_NAMES.length;
      const loaderTitle = document.getElementById('loader-title-text');
      const loaderBar = document.getElementById('loaderBar');
      const loadStatus = document.getElementById('load-status');
      for (const name of SHEET_NAMES) {
        loaderTitle.innerText = name.toUpperCase();
        loadStatus.innerText = `Fetching ${name}...`;
        allData[name] = await fetchSheet(name);
        progress += step;
        loaderBar.style.width = `${Math.min(progress, 100)}%`;
        await new Promise(r => setTimeout(r, 50));
      }
      loaderTitle.innerText = 'READY';
      loadStatus.innerText = 'System Online';
      loaderBar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
        renderSheet(currentSheet);
      }, 400);
    }

    function escapeHTML(str) { if (!str) return ''; return String(str).replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m] || m); }
    function showNotification(msg) {
      const notif = document.createElement('div'); notif.className = 'toast-notification';
      notif.innerHTML = `<i class="fas fa-bolt" style="color:#FF3366; margin-right:10px;"></i>${msg}`;
      document.getElementById('notif-container').appendChild(notif);
      setTimeout(() => notif.remove(), 2200);
    }
    function renderEmptyState() { return `<div class="empty-state"><i class="fas fa-database" style="font-size:3rem; color:#FF3366; opacity:0.5;"></i><div>No data</div></div>`; }
    function renderAssetsGrid(data) {
      if (!data.length) return renderEmptyState();
      let html = '<div class="assets-grid">';
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const title = row[keys[0]] || '-';
        const value = row[keys[1]] || '-';
        const desc = row[keys[2]] || '-';
        html += `<div class="asset-card"><div class="asset-header"><span>${escapeHTML(title)}</span><i class="fas fa-crown" style="color:#FFD600;"></i></div><div class="asset-display">${escapeHTML(value)}</div><div style="padding:0 20px 16px;">${escapeHTML(desc)}</div><div style="padding:0 20px 20px;"><button class="btn-copy-action" data-val="${escapeHTML(value)}" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy</button></div></div>`;
      });
      html += '</div>'; return html;
    }
    function renderQna(data) {
      if (!data.length) return renderEmptyState();
      const keys = Object.keys(data[0]);
      const colA = keys[0], colB = keys[1], colC = keys[2] || null;
      const onlyColC = COPY_COL_C_SHEETS.includes(currentSheet);
      let html = '<table class="qna-table"><thead><tr>';
      html += `<th>${escapeHTML(colA)}</th>${colC ? `<th>${escapeHTML(colB)}</th><th>${escapeHTML(colC)}</th>` : `<th>${escapeHTML(colB)}</th>`}<th>Copy</th></tr></thead><tbody>`;
      data.forEach(row => {
        const v1 = row[keys[0]] || '', v2 = row[keys[1]] || '', v3 = colC ? (row[keys[2]] || '') : '';
        let copyText = onlyColC ? (v3 || v2 || v1) : [v1, v2, v3].filter(Boolean).join(' — ');
        html += `<tr><td>${escapeHTML(v1)}</td>${colC ? `<td>${escapeHTML(v2)}</td><td>${escapeHTML(v3)}</td>` : `<td>${escapeHTML(v2)}</td>`}<td class="col-action"><button class="copy-trigger" data-text="${escapeHTML(copyText)}"><i class="fas fa-copy"></i></button></td></tr>`;
      });
      html += '</tbody></table>'; return html;
    }
    function renderSidebarLayout(data) {
      if (!data.length) return renderEmptyState();
      const keys = Object.keys(data[0]);
      let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list"></i> Index</div><div class="sidebar-list">`;
      data.forEach((row, idx) => { html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-caret-right"></i> ${escapeHTML(row[keys[0]] || `Item ${idx+1}`)}</div>`; });
      html += `</div></div><div class="detail-col" id="detailPanel"><div class="detail-content"><i class="fas fa-info-circle"></i> Pilih item</div></div></div>`;
      return html;
    }
    function renderSheet(sheetName) {
      currentSheet = sheetName;
      document.getElementById('pageTitle').innerHTML = sheetName.toUpperCase().replace(/_/g, ' ');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.sheet === sheetName));
      document.getElementById('searchInput').value = '';
      const data = allData[sheetName] || [];
      const container = document.getElementById('tableContainer');
      if (sheetName === 'bonus') container.innerHTML = renderAssetsGrid(data);
      else if (sheetName === 'PK_anti_audit') {
        container.innerHTML = renderSidebarLayout(data);
        setTimeout(() => {
          const items = document.querySelectorAll('.sidebar-item');
          const panel = document.getElementById('detailPanel');
          if (!items.length) return;
          const update = (idx) => {
            const row = data[idx], keys = Object.keys(row);
            const title = row[keys[0]] || '-', desc = row[keys[2]] || row[keys[1]] || '-';
            panel.innerHTML = `<div class="detail-content"><div style="color:#FF3366;">📌 ${escapeHTML(title)}</div><div style="margin-top:12px; background:#00000040; padding:16px; border-radius:12px;">${escapeHTML(desc)}</div><button class="btn-copy-desc copy-full-desc" data-desc="${escapeHTML(desc)}" style="margin-top:18px; width:100%; padding:10px; background:#FF336610; border:none; border-radius:40px; color:#FF3366;"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;
          };
          items.forEach(item => item.addEventListener('click', () => { items.forEach(i => i.classList.remove('active')); item.classList.add('active'); update(parseInt(item.dataset.index)); }));
          if (items[0]) { items[0].classList.add('active'); update(0); }
        }, 60);
      } else container.innerHTML = renderQna(data);
    }
    function handleSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const data = allData[currentSheet] || [];
      if (!data.length) return;
      if (currentSheet === 'PK_anti_audit') {
        const items = document.querySelectorAll('.sidebar-item');
        let first = -1;
        items.forEach((item, idx) => { const match = Object.values(data[idx]).some(v => v && String(v).toLowerCase().includes(q)); item.style.display = match ? 'flex' : 'none'; if(match && first === -1) first = idx; });
        const active = document.querySelector('.sidebar-item.active');
        if((!active || active.style.display === 'none') && first !== -1) document.querySelector(`.sidebar-item[data-index="${first}"]`)?.click();
      } else if (currentSheet === 'bonus') document.getElementById('tableContainer').innerHTML = renderAssetsGrid(data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))));
      else document.getElementById('tableContainer').innerHTML = renderQna(data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))));
    }
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-copy-action, .copy-trigger, .btn-copy-desc');
      if (!btn) return;
      let text = btn.dataset.val && btn.dataset.desc ? `${btn.dataset.val} — ${btn.dataset.desc}` : (btn.dataset.text || btn.dataset.desc || '');
      if(text) { await navigator.clipboard.writeText(text); showNotification('✅ Copied'); btn.style.transform = 'scale(0.95)'; setTimeout(() => { if(btn) btn.style.transform = ''; }, 150); }
    });
    document.getElementById('refreshBtn').addEventListener('click', () => { loadAllSheets(); showNotification('⟳ Refreshing...'); });
    document.getElementById('searchInput').addEventListener('input', handleSearch);
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => renderSheet(item.dataset.sheet)));
    loadAllSheets();
  </script>
</body>
</html>
