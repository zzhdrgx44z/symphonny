<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg-void:#020408;--bg-deep:#060a12;--bg-surface:#0c1120;
      --border-faint:rgba(255,255,255,0.04);--border-subtle:rgba(255,255,255,0.07);--border-medium:rgba(255,255,255,0.12);
      --accent-pink:#ff1a4b;--accent-pink-soft:#ff4070;--accent-cyan:#00e8ff;--accent-cyan-soft:#40efff;
      --accent-gold:#ffc800;--accent-purple:#a855f7;--accent-green:#00ff88;
      --text-primary:#f4f6ff;--text-secondary:#8b95b8;--text-muted:#5a6384;
      --card-radius:24px;
    }
    html,body{height:100%;width:100%;overflow-x:hidden;}
    body{font-family:'Inter',sans-serif;background:var(--bg-void);color:var(--text-primary);line-height:1.6;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;}

    .atmo-layer{position:fixed;inset:0;pointer-events:none;z-index:0;}
    .atmo-grad{background:radial-gradient(ellipse 80% 50% at 10% 15%,rgba(255,26,75,0.07),transparent),radial-gradient(ellipse 60% 40% at 90% 80%,rgba(0,232,255,0.05),transparent),radial-gradient(ellipse 100% 80% at 50% 110%,rgba(0,0,0,0.8),transparent);}
    .atmo-noise{opacity:0.04;mix-blend-mode:overlay;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='5' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:150px 150px;}
    .atmo-vignette{background:radial-gradient(ellipse 60% 60% at 50% 50%,transparent 30%,rgba(0,0,0,0.7) 100%);}
    /* Cinematic Color Grading Overlay */
    .atmo-grade{background:linear-gradient(180deg,rgba(0,20,40,0.15),transparent 40%,rgba(40,0,20,0.1));mix-blend-mode:screen;}

    canvas{position:fixed;pointer-events:none;z-index:1;}
    #aurora-canvas{top:0;left:0;width:100%;height:45%;opacity:0.2;}
    #particle-canvas{inset:0;opacity:0.5;}
    #data-rain-canvas{inset:0;opacity:0.08;}
    #lightning-canvas{inset:0;z-index:2;opacity:0.8;}

    .holo-shape{position:fixed;pointer-events:none;z-index:2;opacity:0;animation:holoDrift 20s ease-in-out infinite;will-change:transform,opacity;}
    .holo-shape.h1{width:70px;height:70px;border:1px solid rgba(255,26,75,0.15);border-radius:50%;top:10%;left:5%;animation-delay:0s;box-shadow:0 0 30px rgba(255,26,75,0.05),inset 0 0 20px rgba(255,26,75,0.02);}
    .holo-shape.h2{width:40px;height:40px;border:1px solid rgba(0,232,255,0.12);top:20%;right:8%;animation-delay:-6s;}
    .holo-shape.h3{width:0;height:0;border-left:22px solid transparent;border-right:22px solid transparent;border-bottom:40px solid rgba(255,200,0,0.08);top:50%;left:3%;animation-delay:-12s;}
    @keyframes holoDrift{0%,100%{opacity:0;transform:translateY(0) rotate(0deg) scale(0.6);}5%{opacity:0.7;transform:translateY(-10px) rotate(20deg) scale(1);}25%{opacity:0.2;transform:translateY(-40px) rotate(90deg) scale(1.1);}40%{opacity:0;transform:translateY(-60px) rotate(180deg) scale(0.6);}}

    .float-cluster{position:fixed;pointer-events:none;z-index:2;}.float-dot{position:absolute;border-radius:50%;animation:floatPulse 9s ease-in-out infinite;will-change:transform,opacity;}
    .fc1{top:22%;left:2%;}.fc1 .float-dot:nth-child(1){width:3px;height:3px;background:#ff1a4b;animation-delay:0s;}.fc1 .float-dot:nth-child(2){width:2px;height:2px;background:#ff4070;animation-delay:-2s;top:-14px;left:12px;}
    .fc2{top:48%;right:3%;}.fc2 .float-dot:nth-child(1){width:3px;height:3px;background:#00e8ff;animation-delay:-3s;}.fc2 .float-dot:nth-child(2){width:1.5px;height:1.5px;background:#40efff;animation-delay:-5s;top:6px;left:-8px;}
    @keyframes floatPulse{0%,100%{opacity:0;transform:translateY(0) scale(0.3);}10%{opacity:1;transform:translateY(-8px) scale(1);}40%{opacity:0.3;transform:translateY(-30px) scale(0.6);}}

    .hud-corner{position:fixed;width:45px;height:45px;pointer-events:none;z-index:29;opacity:0.15;}.hud-corner::before,.hud-corner::after{content:'';position:absolute;background:var(--accent-cyan);}
    .hud-tl{top:76px;left:16px;}.hud-tl::before{top:0;left:0;width:18px;height:1px;}.hud-tl::after{top:0;left:0;width:1px;height:18px;}
    .hud-tr{top:76px;right:16px;}.hud-tr::before{top:0;right:0;width:18px;height:1px;}.hud-tr::after{top:0;right:0;width:1px;height:18px;}
    .hud-bl{bottom:165px;left:16px;}.hud-bl::before{bottom:0;left:0;width:18px;height:1px;}.hud-bl::after{bottom:0;left:0;width:1px;height:18px;}
    .hud-br{bottom:165px;right:16px;}.hud-br::before{bottom:0;right:0;width:18px;height:1px;}.hud-br::after{bottom:0;right:0;width:1px;height:18px;}

    /* Chromatic Aberration Scan Line */
    .scan-line{position:absolute;left:0;width:100%;height:3px;z-index:15;pointer-events:none;animation:scanDown 14s linear infinite;opacity:0.3;will-change:top,opacity;
      background:linear-gradient(90deg,transparent,rgba(0,232,255,0.4) 12%,rgba(255,26,75,0.5) 50%,rgba(0,232,255,0.4) 88%,transparent);
      box-shadow:0 0 15px rgba(0,232,255,0.3),0 0 40px rgba(255,26,75,0.2);}
    @keyframes scanDown{0%{top:-2%;opacity:0;}2%{opacity:0.3;}8%{opacity:0.3;}10%{top:102%;opacity:0;}100%{top:102%;opacity:0;}}

    .top-nav{position:relative;z-index:30;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:12px 30px;background:rgba(6,9,18,0.88);backdrop-filter:blur(30px) saturate(180%);border-bottom:1px solid var(--border-subtle);flex-shrink:0;}
    .brand-text{display:flex;align-items:center;gap:18px;}
    .brand-logo{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,var(--accent-pink),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;box-shadow:0 8px 30px rgba(255,26,75,0.4),inset 0 1px 0 rgba(255,255,255,0.25);position:relative;overflow:hidden;}
    .brand-logo::after{content:'';position:absolute;inset:-50%;background:linear-gradient(135deg,transparent 30%,rgba(255,255,255,0.25) 50%,transparent 70%);animation:logoShine 4s ease-in-out infinite;}
    @keyframes logoShine{0%,100%{transform:translateX(-120%) rotate(25deg);}50%{transform:translateX(120%) rotate(25deg);}}
    /* Chromatic Aberration Text */
    .brand-info h1{font-size:1.5rem;font-weight:800;letter-spacing:-0.5px;position:relative;display:inline-block;}
    .brand-info h1::before,.brand-info h1::after{content:attr(data-text);position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}
    .brand-info h1::before{color:var(--accent-cyan);animation:chromaL 8s infinite;clip-path:polygon(0 0, 100% 0, 100% 45%, 0 45%);}
    .brand-info h1::after{color:var(--accent-pink);animation:chromaR 8s infinite;clip-path:polygon(0 55%, 100% 55%, 100% 100%, 0 100%);}
    @keyframes chromaL{0%,92%,100%{transform:translate(0);}93%{transform:translate(-2px, 1px);}95%{transform:translate(1px, -1px);}96%{transform:translate(0);}}
    @keyframes chromaR{0%,92%,100%{transform:translate(0);}93%{transform:translate(2px, -1px);}95%{transform:translate(-1px, 1px);}96%{transform:translate(0);}}
    .brand-info span{font-size:0.6rem;color:var(--text-muted);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;}

    .nav-menu{display:flex;flex-wrap:wrap;gap:6px;}
    .nav-item{background:rgba(12,16,32,0.8);border:1px solid var(--border-faint);border-radius:40px;padding:8px 18px;font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--text-secondary);cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;gap:8px;-webkit-tap-highlight-color:transparent;}
    .nav-item:hover{border-color:var(--border-medium);color:var(--text-primary);transform:translateY(-2px);box-shadow:0 10px 30px rgba(0,0,0,0.4);}
    .nav-item.active{background:linear-gradient(135deg,var(--accent-pink),#b50e3a);border-color:transparent;color:white;box-shadow:0 8px 30px rgba(255,26,75,0.5),0 0 0 1px rgba(255,26,75,0.2);text-shadow:0 2px 4px rgba(0,0,0,0.4);}
    .status-box{background:rgba(0,0,0,0.5);backdrop-filter:blur(20px);padding:8px 18px;border-radius:40px;font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:500;border:1px solid var(--border-faint);color:var(--accent-cyan);white-space:nowrap;display:flex;align-items:center;gap:8px;}
    .status-dot{width:7px;height:7px;background:var(--accent-green);border-radius:50%;box-shadow:0 0 10px var(--accent-green);animation:dotPulse 2s ease-in-out infinite;}
    @keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.6);}}

    .main{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;padding:16px 24px 150px 24px;min-height:0;}
    /* Extreme Glassmorphism Card */
    .content-wrapper{background:linear-gradient(135deg,rgba(12,16,30,0.65),rgba(8,12,24,0.55));backdrop-filter:blur(28px) saturate(150%) contrast(110%);border-radius:var(--card-radius);border:1px solid var(--border-subtle);display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;box-shadow:0 40px 70px -15px rgba(0,0,0,0.6),0 0 0 1px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06),inset 0 -1px 0 rgba(0,0,0,0.5);position:relative;}
    .content-wrapper::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,26,75,0.3),rgba(0,232,255,0.3),transparent);z-index:5;}

    .refresh-overlay{position:absolute;inset:0;background:rgba(2,4,8,0.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:20;border-radius:var(--card-radius);}
    .refresh-overlay.active{display:flex;}
    .refresh-spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,0.05);border-top-color:var(--accent-pink);border-right-color:var(--accent-cyan);border-radius:50%;animation:spinFast 0.6s linear infinite;}
    @keyframes spinFast{to{transform:rotate(360deg);}}

    .header-row{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:16px;padding:22px 30px;border-bottom:1px solid var(--border-subtle);flex-shrink:0;background:linear-gradient(180deg,rgba(0,0,0,0.25),transparent);}
    .title-main h1{font-size:1.8rem;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#fff 0%,var(--accent-pink-soft) 100%);-webkit-background-clip:text;background-clip:text;color:transparent;}
    .title-main p{font-size:0.65rem;color:var(--text-muted);margin-top:3px;font-weight:600;letter-spacing:0.8px;text-transform:uppercase;}
    .header-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .search-box{position:relative;}.search-box i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.72rem;pointer-events:none;transition:color 0.2s;}
    .search-box input{background:rgba(0,0,0,0.5);border:1px solid var(--border-faint);border-radius:40px;padding:10px 18px 10px 40px;color:white;font-family:'Inter',sans-serif;font-size:0.78rem;width:260px;outline:none;transition:all 0.3s;}
    .search-box input:focus{border-color:var(--accent-cyan);box-shadow:0 0 0 4px rgba(0,232,255,0.08),0 0 20px rgba(0,232,255,0.1);}
    .search-box input:focus+i{color:var(--accent-cyan);}

    .btn-industrial{background:linear-gradient(135deg,rgba(255,26,75,0.1),rgba(255,26,75,0.03));border:1px solid rgba(255,26,75,0.25);padding:10px 22px;border-radius:40px;color:var(--accent-pink);font-weight:700;font-size:0.7rem;cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);display:inline-flex;align-items:center;gap:8px;white-space:nowrap;letter-spacing:0.5px;text-transform:uppercase;-webkit-tap-highlight-color:transparent;}
    .btn-industrial:hover{background:linear-gradient(135deg,rgba(255,26,75,0.2),rgba(255,26,75,0.06));border-color:rgba(255,26,75,0.5);box-shadow:0 8px 30px rgba(255,26,75,0.2);transform:translateY(-2px);}
    .btn-industrial:active{transform:scale(0.96) translateY(0);}
    .btn-industrial.is-loading{opacity:0.5;pointer-events:none;}
    .btn-industrial .icon-spin{animation:spinFast 0.8s linear infinite;display:inline-block;}

    .table-scroll{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:200px;}.table-scroll::-webkit-scrollbar{width:5px;}.table-scroll::-webkit-scrollbar-track{background:transparent;}.table-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.06);border-radius:3px;}
    .qna-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
    .qna-table th{text-align:left;padding:15px 20px;font-weight:700;color:var(--accent-cyan);border-bottom:1px solid var(--border-medium);font-size:0.62rem;text-transform:uppercase;letter-spacing:1.5px;position:sticky;top:0;background:rgba(6,9,18,0.98);backdrop-filter:blur(12px);z-index:5;}
    .qna-table td{padding:14px 20px;border-bottom:1px solid var(--border-faint);color:var(--text-secondary);transition:all 0.15s;}
    .qna-table tbody tr{transition:background 0.15s;}.qna-table tbody tr:hover{background:linear-gradient(90deg,rgba(255,26,75,0.04),transparent);}.qna-table tbody tr:hover td{color:var(--text-primary);}
    .col-action button{background:rgba(0,232,255,0.05);border:1px solid rgba(0,232,255,0.12);border-radius:30px;padding:7px 16px;cursor:pointer;transition:all 0.25s;color:var(--accent-cyan);font-size:0.68rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
    .col-action button:hover{background:rgba(0,232,255,0.1);border-color:rgba(0,232,255,0.3);box-shadow:0 4px 20px rgba(0,232,255,0.15);transform:translateY(-1px);}

    .layout-split{display:flex;flex-direction:row;height:100%;min-height:400px;}
    .sidebar-col{width:320px;flex-shrink:0;background:rgba(0,0,0,0.2);border-right:1px solid var(--border-subtle);overflow-y:auto;display:flex;flex-direction:column;}.sidebar-col::-webkit-scrollbar{width:3px;}.sidebar-col::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.05);}
    .sidebar-header{padding:18px 24px;font-size:0.62rem;text-transform:uppercase;letter-spacing:1.8px;color:var(--accent-cyan);border-bottom:1px solid var(--border-subtle);font-weight:700;display:flex;align-items:center;gap:10px;flex-shrink:0;background:rgba(0,0,0,0.15);}
    .sidebar-count{background:rgba(0,232,255,0.08);color:var(--accent-cyan);padding:3px 10px;border-radius:10px;font-size:0.58rem;font-family:'JetBrains Mono',monospace;border:1px solid rgba(0,232,255,0.1);}
    .sidebar-item{padding:14px 24px;font-size:0.78rem;cursor:pointer;border-left:3px solid transparent;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);color:var(--text-secondary);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-faint);}
    .sidebar-item:hover{background:rgba(255,255,255,0.02);color:var(--text-primary);padding-left:28px;}.sidebar-item.active{background:linear-gradient(90deg,rgba(255,26,75,0.1),transparent);border-left-color:var(--accent-pink);color:var(--text-primary);}
    .sidebar-item .item-num{font-family:'JetBrains Mono',monospace;font-size:0.58rem;color:var(--text-muted);min-width:22px;opacity:0.5;}
    .detail-col{flex:1;padding:28px 32px;overflow-y:auto;}.detail-content{animation:fadeSlideIn 0.35s cubic-bezier(0.4,0,0.2,1);}
    @keyframes fadeSlideIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .detail-title{font-size:1.15rem;font-weight:700;color:var(--accent-pink);margin-bottom:18px;display:flex;align-items:center;gap:12px;text-shadow:0 0 20px rgba(255,26,75,0.25);}
    .detail-body{background:rgba(0,0,0,0.4);padding:22px;border-radius:18px;font-size:0.82rem;color:var(--text-secondary);line-height:1.85;white-space:pre-wrap;border:1px solid var(--border-faint);box-shadow:inset 0 3px 12px rgba(0,0,0,0.3);}
    .detail-copy-btn{margin-top:20px;width:100%;padding:13px;background:linear-gradient(135deg,rgba(255,26,75,0.06),rgba(255,26,75,0.02));border:1px solid rgba(255,26,75,0.18);border-radius:40px;color:var(--accent-pink);cursor:pointer;font-weight:700;font-size:0.72rem;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;}
    .detail-copy-btn:hover{background:rgba(255,26,75,0.12);border-color:rgba(255,26,75,0.4);box-shadow:0 8px 30px rgba(255,26,75,0.15);transform:translateY(-2px);}
    .empty-state{padding:80px 20px;text-align:center;color:var(--text-muted);font-size:0.9rem;}.empty-state i{font-size:2.8rem;margin-bottom:18px;display:block;opacity:0.2;}

    #notif-container{position:fixed;bottom:165px;right:24px;z-index:10000;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
    .toast-notification{pointer-events:auto;background:rgba(6,9,18,0.95);backdrop-filter:blur(25px) saturate(180%);border-left:4px solid var(--accent-green);padding:15px 24px;border-radius:18px;font-size:0.82rem;font-weight:600;display:flex;align-items:center;gap:12px;box-shadow:0 20px 50px rgba(0,0,0,0.6);animation:toastIn 0.4s cubic-bezier(0.4,0,0.2,1);transition:all 0.3s;}
    .toast-notification.toast-success{border-left-color:var(--accent-green);}.toast-notification.toast-success i{color:var(--accent-green);}
    .toast-notification.toast-info{border-left-color:var(--accent-cyan);}.toast-notification.toast-info i{color:var(--accent-cyan);}
    @keyframes toastIn{from{transform:translateX(120%) scale(0.85);opacity:0;}to{transform:translateX(0) scale(1);opacity:1;}}

    .animation-layer{position:fixed;bottom:0;left:0;width:100%;height:145px;pointer-events:none;z-index:50;background:linear-gradient(to bottom,transparent 0%,rgba(2,4,8,0.5) 4%,rgba(2,4,8,0.92) 10%,var(--bg-void) 22%,var(--bg-void) 100%);}
    
    /* SVG City with Filter Effects */
    .cityscape{position:absolute;bottom:72px;left:0;width:100%;height:95px;z-index:1;opacity:0.8;}.cityscape svg{width:100%;height:100%;}
    .window-light{animation:windowFlicker var(--delay,3s) ease-in-out infinite alternate;}@keyframes windowFlicker{0%,100%{opacity:var(--max-o,0.85);}50%{opacity:var(--min-o,0.1);}}
    .neon-sign{font-family:'JetBrains Mono',monospace;animation:neonFlicker 4s ease-in-out infinite;}@keyframes neonFlicker{0%,100%{opacity:1;}42%{opacity:0.1;}43%{opacity:1;}81%{opacity:0.15;}82%{opacity:1;}}

    /* Wet Road Reflections */
    .city-reflection{position:absolute;bottom:0;left:0;width:100%;height:72px;z-index:1;opacity:0.15;transform:scaleY(-1) translateY(72px);filter:blur(4px) brightness(1.5);mask-image:linear-gradient(to top, rgba(0,0,0,0.6), transparent 80%);-webkit-mask-image:linear-gradient(to top, rgba(0,0,0,0.6), transparent 80%);}

    .street-lights{position:absolute;bottom:68px;left:0;width:100%;height:40px;z-index:3;}
    .street-light{position:absolute;bottom:0;width:2px;height:32px;background:linear-gradient(to top,rgba(255,255,255,0.04),transparent);}
    .street-light::after{content:'';position:absolute;top:-3px;left:-5px;width:12px;height:7px;border-radius:50%;}
    .street-light:nth-child(odd)::after{background:var(--accent-pink);box-shadow:0 0 12px var(--accent-pink);animation:sP 2.5s ease-in-out infinite alternate;}
    .street-light:nth-child(even)::after{background:var(--accent-cyan);box-shadow:0 0 12px var(--accent-cyan);animation:sC 2.5s ease-in-out infinite alternate;}
    @keyframes sP{0%{opacity:0.3;}100%{opacity:1;}}@keyframes sC{0%{opacity:1;}100%{opacity:0.3;}}
    .light-cone{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:80px;height:60px;clip-path:polygon(35% 0%,65% 0%,100% 100%,0% 100%);}
    .street-light:nth-child(odd) .light-cone{background:linear-gradient(to bottom,rgba(255,26,75,0.06),transparent);}.street-light:nth-child(even) .light-cone{background:linear-gradient(to bottom,rgba(0,232,255,0.06),transparent);}

<script>
const aC=document.getElementById('aurora-canvas'),aX=aC.getContext('2d');
const pC=document.getElementById('particle-canvas'),pX=pC.getContext('2d');
const dC=document.getElementById('data-rain-canvas'),dX=dC.getContext('2d');
const sC=document.getElementById('speed-particles'),sX=sC.getContext('2d');
const lC=document.getElementById('lightning-canvas'),lX=lC.getContext('2d');

let aT=0,particles=[],dataDrops=[],speedDots=[];
let lBolts=[],lTimer=0;
const pC_=['#ff1a4b','#ff4070','#00e8ff','#40efff','#ffc800','#a855f7','#00ff88'];
const dC_=['#ff1a4b','#00e8ff','#ffc800','#a855f7'];
const sC_=['#ff1a4b','#00e8ff','#ffc800','#a855f7','#ff6644','#00ff88'];

function resizeAll(){aC.width=innerWidth;aC.height=innerHeight*0.45;pC.width=innerWidth;pC.height=innerHeight;dC.width=innerWidth;dC.height=innerHeight;lC.width=innerWidth;lC.height=innerHeight;const r=document.querySelector('.road-surface');if(r){sC.width=r.offsetWidth;sC.height=r.offsetHeight;}}
function initP(){particles=[];for(let i=0;i<70;i++)particles.push({x:Math.random()*pC.width,y:Math.random()*pC.height,r:Math.random()*2.2+0.2,a:Math.random()*0.12+0.03,vx:(Math.random()-0.5)*0.1,vy:(Math.random()-0.5)*0.1,c:pC_[Math.floor(Math.random()*pC_.length)],ps:Math.random()*0.015+0.003,pt:Math.random()*6.28});}
function initD(){dataDrops=[];for(let i=0;i<40;i++){const depth=Math.random();dataDrops.push({x:Math.random()*dC.width,y:Math.random()*dC.height,s:(Math.random()*1.5+0.5)*(0.5+depth),l:10-depth*6,a:0.03+depth*0.08,c:dC_[Math.floor(Math.random()*dC_.length)],ch:'01アイウエオ'[Math.floor(Math.random()*10)]});}}
function initS(){speedDots=[];if(!sC.width)return;for(let i=0;i<45;i++){const gr=Math.random()>0.5;speedDots.push({x:Math.random()*sC.width,y:gr?(sC.height*0.2+Math.random()*14):(sC.height*0.65+Math.random()*14),s:(Math.random()*4.5+2.5)*(gr?1:-1),l:Math.random()*18+4,a:Math.random()*0.25+0.04,c:sC_[Math.floor(Math.random()*sC_.length)]});}}

// Lightning Logic
function createBolt(){const sx=Math.random()*lC.width;const sy=0;const ex=sx+(Math.random()-0.5)*400;const ey=lC.height*0.6;const pts=[{x:sx,y:sy}];let cx=sx,cy=sy;const seg=12;for(let i=0;i<seg;i++){cx+=(ex-sx)/seg+(Math.random()-0.5)*80;cy+=(ey-sy)/seg;pts.push({x:cx,y:cy});}return{pts,alpha:1.5,color:['rgba(255,26,75,','rgba(0,232,255,','rgba(168,85,247,'][Math.floor(Math.random()*3)]};}

function masterLoop(){
  aX.clearRect(0,0,aC.width,aC.height);aT+=0.002;
  for(let i=0;i<4;i++){const g=aX.createLinearGradient(0,0,aC.width,0);const h=[330,190,270,50][i];g.addColorStop(0,'transparent');g.addColorStop(0.5,`hsla(${h},80%,50%,0.04)`);g.addColorStop(1,'transparent');aX.fillStyle=g;aX.beginPath();const yB=aC.height*0.25+i*18;aX.moveTo(0,yB);for(let x=0;x<=aC.width;x+=6){aX.lineTo(x,yB+Math.sin(x*0.002+aT+i*2.5)*35+Math.sin(x*0.006+aT*1.3)*18);}aX.lineTo(aC.width,aC.height);aX.lineTo(0,aC.height);aX.closePath();aX.fill();}

  pX.clearRect(0,0,pC.width,pC.height);
  for(let p of particles){p.pt+=p.ps;const al=p.a*(0.5+0.5*Math.sin(p.pt));pX.globalAlpha=al;pX.fillStyle=p.c;pX.beginPath();pX.arc(p.x,p.y,p.r,0,6.28);pX.fill();if(p.r>1.2){pX.globalAlpha=al*0.1;pX.beginPath();pX.arc(p.x,p.y,p.r*4,0,6.28);pX.fill();}p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=pC.width;if(p.x>pC.width)p.x=0;if(p.y<0)p.y=pC.height;if(p.y>pC.height)p.y=0;}

  // Depth Rain
  dX.clearRect(0,0,dC.width,dC.height);dX.font='11px "JetBrains Mono",monospace';
  for(let d of dataDrops){dX.globalAlpha=d.a;dX.fillStyle=d.c;dX.fillText(d.ch,d.x,d.y);dX.globalAlpha=d.a*0.2;dX.fillText(d.ch,d.x,d.y-d.l);d.y+=d.s;if(d.y>dC.height+25){d.y=-25;d.x=Math.random()*dC.width;}}

  // Lightning Render
  lX.clearRect(0,0,lC.width,lC.height);
  for(let i=lBolts.length-1;i>=0;i--){const b=lBolts[i];b.alpha-=0.035;if(b.alpha<=0){lBolts.splice(i,1);continue;}lX.globalAlpha=b.alpha;lX.strokeStyle=b.color+b.alpha+')';lX.lineWidth=2+b.alpha;lX.shadowBlur=20*b.alpha;lX.shadowColor=b.color+'1)';lX.beginPath();lX.moveTo(b.pts[0].x,b.pts[0].y);for(let j=1;j<b.pts.length;j++)lX.lineTo(b.pts[j].x,b.pts[j].y);lX.stroke();lX.shadowBlur=0;}
  lTimer++;if(lTimer>300+Math.random()*600){lBolts.push(createBolt());lTimer=0;}

  if(sC.width>0){sX.clearRect(0,0,sC.width,sC.height);for(let d of speedDots){sX.globalAlpha=d.a;sX.strokeStyle=d.c;sX.lineWidth=1.3;sX.beginPath();sX.moveTo(d.x,d.y);sX.lineTo(d.x-d.l*Math.sign(d.s),d.y);sX.stroke();d.x+=d.s;if(d.x>sC.width+25||d.x<-25){d.x=d.s>0?-12:sC.width+12;d.y=(Math.random()>0.5)?(sC.height*0.2+Math.random()*14):(sC.height*0.65+Math.random()*14);}}}

  pX.globalAlpha=1;dX.globalAlpha=1;sX.globalAlpha=1;lX.globalAlpha=1;
  requestAnimationFrame(masterLoop);
}
resizeAll();initP();initD();initS();masterLoop();

let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{resizeAll();initP();initD();initS();},200);});

function updateClock(){document.getElementById('clock').innerText=new Date().toLocaleTimeString('en-GB');}setInterval(updateClock,1000);updateClock();
setInterval(()=>{document.getElementById('hud-ping').innerText=Math.floor(Math.random()*12+10)+'ms';},4000);

function showToast(msg,type){const c=document.getElementById('notif-container'),t=document.createElement('div');t.className='toast-notification toast-'+(type||'success');const ic=type==='info'?'fa-info-circle':'fa-check-circle';const icol=type==='info'?'var(--accent-cyan)':'var(--accent-green)';t.innerHTML=`<i class="fas ${ic}" style="color:${icol};font-size:1rem;"></i> ${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(30px) scale(0.9)';setTimeout(()=>t.remove(),300);},3000);}

const SID='19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
const SHEETS=['bonus','PK_anti_audit','PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
const CCC=['PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
const SIDEBAR_SHEETS=['bonus','PK_anti_audit'];
let allData={},currentSheet='bonus',isRefreshing=false;

async function fetchSheet(sn){try{const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sn)}`);const t=await r.text();const j=JSON.parse(t.substring(47,t.length-2));if(!j.table?.rows)return[];const c=j.table.cols||[],h=c.map(col=>col.label||`col_${col.id}`);return j.table.rows.map(row=>{const o={};row.c?.forEach((cell,idx)=>{o[h[idx]||`col_${idx}`]=cell?cell.v:null;});return o;});}catch(e){return[];}}

async function loadAllSheets(silent){if(!silent){let p=0;const step=100/SHEETS.length;const lb=document.getElementById('loaderBar'),ls=document.getElementById('load-status');for(const n of SHEETS){ls.innerText=`Syncing ${n.toUpperCase()}...`;allData[n]=await fetchSheet(n);p+=step;lb.style.width=`${Math.min(p,100)}%`;await new Promise(r=>setTimeout(r,40));}ls.innerText='System Online';lb.style.width='100%';setTimeout(()=>{const ld=document.getElementById('loader');ld.style.opacity='0';setTimeout(()=>ld.style.display='none',600);renderSheet(currentSheet);},400);}else{for(const n of SHEETS)allData[n]=await fetchSheet(n);renderSheet(currentSheet);}}

async function handleRefresh(){if(isRefreshing)return;isRefreshing=true;const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon'),text=document.getElementById('refreshText'),ov=document.getElementById('refreshOverlay');btn.classList.add('is-loading');icon.classList.add('icon-spin');text.textContent='Loading...';ov.classList.add('active');try{await loadAllSheets(true);showToast('Data berhasil diperbarui!','success');}catch(e){showToast('Gagal memuat data.','info');}ov.classList.remove('active');btn.classList.remove('is-loading');icon.classList.remove('icon-spin');text.textContent='Refresh';isRefreshing=false;}

function escapeHTML(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]||m);}

function renderQna(data){if(!data.length)return'<div class="empty-state"><i class="fas fa-database"></i>Tidak ada data</div>';const k=Object.keys(data[0]),cA=k[0],cB=k[1],cC=k[2]||null,oC=CCC.includes(currentSheet);let h='<table class="qna-table"><thead><tr><th>'+escapeHTML(cA)+'</th>'+(cC?'<th>'+escapeHTML(cB)+'</th><th>'+escapeHTML(cC)+'</th>':'<th>'+escapeHTML(cB)+'</th>')+'<th style="width:90px;">Copy</th></tr></thead><tbody>';data.forEach((r,i)=>{const v1=r[k[0]]||'',v2=r[k[1]]||'',v3=cC?(r[k[2]]||''):'';let ct=oC?(v3||v2||v1):[v1,v2,v3].filter(Boolean).join(' — ');h+=`<tr style="animation:fadeSlideIn 0.25s ease ${i*0.015}s both;"><td>${escapeHTML(v1)}</td>${cC?`<td>${escapeHTML(v2)}</td><td>${escapeHTML(v3)}</td>`:`<td>${escapeHTML(v2)}</td>`}<td class="col-action"><button class="copy-btn" data-text="${escapeHTML(ct)}"><i class="fas fa-copy"></i> Salin</button></td></tr>`;});h+='</tbody></table>';return h;}

function renderSidebarLayout(data){if(!data.length)return'<div class="empty-state"><i class="fas fa-database"></i>Tidak ada data</div>';const k=Object.keys(data[0]);let h=`<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list"></i> Index <span class="sidebar-count">${data.length}</span></div><div class="sidebar-list">`;data.forEach((r,i)=>{h+=`<div class="sidebar-item" data-index="${i}"><span class="item-num">${String(i+1).padStart(2,'0')}</span> ${escapeHTML(r[k[0]]||`Item ${i+1}`)}</div>`;});h+=`</div></div><div class="detail-col" id="detailPanel"><div class="detail-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:250px;color:var(--text-muted);gap:14px;"><i class="fas fa-arrow-left" style="font-size:1.8rem;opacity:0.2;"></i><span style="font-size:0.8rem;">Pilih item dari sidebar</span></div></div></div>`;return h;}

function initSidebarInteraction(data){const items=document.querySelectorAll('.sidebar-item'),panel=document.getElementById('detailPanel');if(!items.length)return;const k=Object.keys(data[0]);const update=i=>{const r=data[i],t=r[k[0]]||'-';const dp=[];for(let j=1;j<k.length;j++){const v=r[k[j]];if(v)dp.push(v);}const d=dp.join('\n\n')||'-';panel.innerHTML=`<div class="detail-content"><div class="detail-title"><i class="fas fa-bookmark"></i> ${escapeHTML(t)}</div><div class="detail-body">${escapeHTML(d)}</div><button class="copy-btn btn-industrial" data-desc="${escapeHTML(d)}" style="margin-top:20px;width:100%;justify-content:center;"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;};items.forEach(item=>{item.addEventListener('click',()=>{items.forEach(i=>i.classList.remove('active'));item.classList.add('active');update(parseInt(item.dataset.index));});});if(items[0]){items[0].classList.add('active');update(0);}}

function renderSheet(sn){currentSheet=sn;const dn={'bonus':'BONUS','PK_anti_audit':'PK ANTI AUDIT','PK_LULUS_SENSOR_AUDIT':'PK LULUS AUDIT','seputar_gantirek':'GANTI REK','seputar_pk':'SEPUTAR PK'};document.getElementById('pageTitle').innerHTML=dn[sn]||sn.toUpperCase().replace(/_/g,' ');document.getElementById('pageSubtitle').innerText='Data Sheet';document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.sheet===sn));document.getElementById('searchInput').value='';const data=allData[sn]||[],c=document.getElementById('tableContainer');if(SIDEBAR_SHEETS.includes(sn)){c.innerHTML=renderSidebarLayout(data);setTimeout(()=>initSidebarInteraction(data),50);}else{c.innerHTML=renderQna(data);}}

function handleSearch(){const q=document.getElementById('searchInput').value.toLowerCase(),data=allData[currentSheet]||[];if(!data.length)return;if(SIDEBAR_SHEETS.includes(currentSheet)){const items=document.querySelectorAll('.sidebar-item');let f=-1;items.forEach((item,i)=>{const m=Object.values(data[i]).some(v=>v&&String(v).toLowerCase().includes(q));item.style.display=m?'flex':'none';if(m&&f===-1)f=i;});const a=document.querySelector('.sidebar-item.active');if((!a||a.style.display==='none')&&f!==-1)document.querySelector(`.sidebar-item[data-index="${f}"]`)?.click();}else{document.getElementById('tableContainer').innerHTML=renderQna(data.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(q))));}}

function addFlash(el){if(!el)return;el.style.boxShadow='0 0 30px rgba(255,26,75,0.6),inset 0 0 15px rgba(255,26,75,0.12)';setTimeout(()=>{el.style.boxShadow='';},300);}

async function copyText(text){try{await navigator.clipboard.writeText(text);return true;}catch{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');return true;}catch{return false;}finally{document.body.removeChild(ta);}}}

document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{addFlash(item);renderSheet(item.dataset.sheet);});});
document.getElementById('refreshBtn').addEventListener('click',()=>{addFlash(document.getElementById('refreshBtn'));handleRefresh();});
document.addEventListener('click',async e=>{const btn=e.target.closest('.copy-btn');if(!btn)return;let t='';if(btn.dataset.text)t=btn.dataset.text;else if(btn.dataset.desc)t=btn.dataset.desc;if(t){e.preventDefault();const ok=await copyText(t);if(ok)showToast('Data berhasil disalin!','success');else showToast('Gagal menyalin','info');btn.style.transform='scale(0.92)';setTimeout(()=>{if(btn)btn.style.transform='';},200);}});
document.getElementById('searchInput').addEventListener('input',handleSearch);

loadAllSheets(false);
</script>
</body>
</html>
