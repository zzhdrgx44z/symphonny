<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沈 · LINE TOGEL HUB</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    :root {
      --bg-core: #050505;
      --bg-panel: rgba(10, 10, 10, 0.85);
      --accent-primary: #FFD600; /* Neon Yellow */
      --accent-secondary: #FFEA00; /* Bright Yellow */
      --accent-tertiary: #FF9100; /* Orange Gold */
      --accent-hot: #FF3366;
      --text-main: #ffffff;
      --text-muted: #888888;
      --border-glass: rgba(255, 214, 0, 0.2);
      --glow-primary: rgba(255, 214, 0, 0.6);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-core);
      color: var(--text-main);
      min-height: 100vh; 
      overflow-x: hidden;
      display: flex; flex-direction: column; font-size: 15px;
      position: relative;
    }

    /* ========== MOUSE GLOW CANVAS ========== */
    #mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle 400px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 214, 0, 0.06), transparent 80%);
      transition: background 0.2s ease;
    }

    /* ========== PERSPECTIVE GRID BACKGROUND ========== */
    .perspective-grid {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 200%;
      height: 50vh;
      background-image: 
        linear-gradient(transparent 95%, rgba(255, 214, 0, 0.2) 95%),
        linear-gradient(90deg, transparent 95%, rgba(255, 214, 0, 0.2) 95%);
      background-size: 60px 60px;
      background-position: center bottom;
      transform: perspective(300px) rotateX(60deg) translateZ(-100px) translateY(100px) translateX(-25%);
      z-index: 0;
      animation: gridMove 20s linear infinite;
      mask-image: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.5) 50%, transparent 100%);
    }

    @keyframes gridMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 60px; }
    }

    /* ========== SCANLINES ========== */
    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9998;
      background: rgba(0,0,0,0.1);
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1));
      background-size: 100% 4px;
    }

    /* ========== GLOBAL SCAN SWEEP ========== */
    .scan-sweep {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 5px;
      background: linear-gradient(to bottom, transparent, var(--accent-primary), transparent);
      opacity: 0.5;
      z-index: 9997;
      animation: sweep 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes sweep {
      0% { top: -5%; opacity: 0; }
      50% { opacity: 0.5; }
      100% { top: 105%; opacity: 0; }
    }

    /* ========== GLITCH TEXT ENHANCEMENT ========== */
    .glitch-wrapper {
      position: relative;
      display: inline-block;
    }

    .glitch-text {
      position: relative;
      z-index: 1;
      text-shadow: 0 0 5px var(--accent-primary);
    }

    .glitch-text::before,
    .glitch-text::after {
      content: attr(data-text);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      opacity: 0.8;
    }

    .glitch-text::before {
      color: var(--accent-secondary);
      animation: glitch-anim-1 2s infinite linear alternate-reverse;
      z-index: -1;
      clip-path: polygon(0 0, 100% 0, 100% 35%, 0 35%);
    }

    .glitch-text::after {
      color: var(--accent-tertiary);
      animation: glitch-anim-2 3s infinite linear alternate-reverse;
      z-index: -2;
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    }

    @keyframes glitch-anim-1 {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(-2px, -2px); }
      60% { transform: translate(2px, 2px); }
      80% { transform: translate(2px, -2px); }
      100% { transform: translate(0); }
    }

    @keyframes glitch-anim-2 {
      0% { transform: translate(0); }
      20% { transform: translate(2px, -2px); }
      40% { transform: translate(2px, 2px); }
      60% { transform: translate(-2px, -2px); }
      80% { transform: translate(-2px, 2px); }
      100% { transform: translate(0); }
    }

    /* ========== TOP BAR ========== */
    .hazard-bar {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-tertiary), var(--accent-primary));
      background-size: 200% 100%;
      z-index: 100;
      box-shadow: 0 0 15px var(--accent-primary);
      animation: hazardGlow 3s linear infinite;
    }

    @keyframes hazardGlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 200% 0%; }
    }

    /* ========== NAVIGATION ========== */
    .top-nav {
      height: 70px;
      background: rgba(5, 5, 5, 0.9);
      border-bottom: 1px solid rgba(255, 214, 0, 0.1);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 25px;
      position: relative; z-index: 10;
      margin-top: 3px;
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex; align-items: center; gap: 14px;
      padding-right: 25px; height: 100%;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    .logo-box {
      width: 44px; height: 44px;
      background: var(--bg-core);
      border: 2px solid var(--accent-primary);
      color: var(--accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; font-weight: 700;
      border-radius: 8px;
      position: relative;
      transition: all 0.3s;
      box-shadow: 0 0 15px var(--glow-primary);
    }

    .brand:hover .logo-box {
      background: var(--accent-primary);
      color: #000;
      box-shadow: 0 0 25px var(--glow-primary);
    }

    .brand-text h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.3rem;
      text-transform: uppercase; letter-spacing: 3px;
      color: var(--accent-primary);
      font-weight: 900;
    }

    .brand-text span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem; color: var(--accent-secondary);
      letter-spacing: 3px; display: block; margin-top: 2px;
    }

    .nav-menu {
      display: flex; height: 100%; align-items: center; gap: 6px;
    }

    .nav-item {
      height: auto;
      padding: 10px 16px;
      color: var(--text-muted);
      font-size: 0.75rem; text-transform: uppercase; font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      display: flex; align-items: center; gap: 8px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      color: var(--accent-primary);
      background: rgba(255, 214, 0, 0.1);
      border-color: var(--accent-primary);
      box-shadow: 0 0 10px rgba(255, 214, 0, 0.2);
    }

    .nav-item.active {
      color: #000;
      background: var(--accent-primary);
      border-color: transparent;
      box-shadow: 0 0 15px var(--glow-primary);
      font-weight: 700;
    }

    .status-box {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.05);
      padding: 8px 16px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .status-indicator {
      width: 8px; height: 8px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-primary);
      animation: statusPulse 1.5s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .time-val { color: var(--text-main); font-weight: 600; }

    /* ========== MAIN CONTENT ========== */
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
      padding: 20px;
      padding-bottom: 130px;
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    .content-wrapper {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid rgba(255, 214, 0, 0.2);
      display: flex; flex-direction: column;
      position: relative;
      border-radius: 0px; /* Sharp corners for sci-fi */
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    /* ========== TECH CORNERS ========== */
    .tech-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid var(--accent-primary);
      z-index: 20;
      transition: all 0.3s;
    }
    .tc-tl { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .tc-tr { top: -1px; right: -1px; border-left: none; border-bottom: none; }
    .tc-bl { bottom: -1px; left: -1px; border-right: none; border-top: none; }
    .tc-br { bottom: -1px; right: -1px; border-left: none; border-top: none; }
    
    .content-wrapper:hover .tech-corner {
      width: 30px; height: 30px;
      filter: drop-shadow(0 0 5px var(--accent-primary));
    }

    .corner-deco {
      position: absolute;
      width: 100px; height: 28px;
      background: var(--accent-primary);
      display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 700; font-size: 0.65rem;
      letter-spacing: 1.5px; text-transform: uppercase;
      z-index: 5; top: 0; right: 0;
      clip-path: polygon(20% 0, 100% 0, 100% 100%, 0 100%);
      box-shadow: 0 0 15px var(--glow-primary);
    }

    /* ========== HEADER ROW ========== */
    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: rgba(0,0,0,0.3);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 15px;
    }

    .title-main { display: flex; align-items: center; gap: 14px; }

    .title-badge {
      background: transparent;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      padding: 5px 12px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px;
      border-radius: 0px;
      box-shadow: 3px 3px 0px rgba(255, 214, 0, 0.2);
    }

    .title-main h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.4rem; text-transform: uppercase;
      line-height: 1; font-weight: 900;
      color: #fff;
      letter-spacing: 2px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-box { position: relative; width: 260px; z-index: 2; }

    .search-box input {
      width: 100%; padding: 10px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      transition: all 0.3s;
      border-radius: 0px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 10px rgba(255, 214, 0, 0.2);
    }

    .search-box input::placeholder { color: var(--text-muted); }
    .search-box i {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%);
      color: var(--accent-primary);
      font-size: 0.85rem;
    }

    .btn-industrial {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      padding: 10px 16px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 0.8rem;
      border-radius: 0px;
      position: relative;
      overflow: hidden;
    }

    .btn-industrial:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
    }

    .btn-industrial.success {
      background: var(--accent-primary);
      color: #000;
      border-color: transparent;
    }

    .btn-industrial.loading i { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== DATA CARD ========== */
    .data-card {
      flex: 1; display: flex; flex-direction: column;
      padding: 16px;
      min-height: 0;
      overflow: hidden;
    }

    .table-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .table-scroll::-webkit-scrollbar { width: 4px; background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: var(--accent-primary); }

    /* ========== ASSETS GRID ========== */
    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      padding: 8px;
    }

    .asset-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255,255,255,0.05);
      display: flex; flex-direction: column;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 4px;
      overflow: hidden;
      position: relative;
      animation: cardSlideIn 0.5s ease-out forwards;
      opacity: 0;
      transform: translateY(20px) scale(0.95);
    }

    /* Holographic Shine */
    .asset-card::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 50%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: skewX(-25deg);
      transition: left 0.7s ease-in-out;
      z-index: 1;
    }

    .asset-card:hover::before {
      left: 150%;
    }

    @keyframes cardSlideIn { to { opacity: 1; transform: translateY(0) scale(1); } }

    .asset-card:hover {
      transform: translateY(-5px);
      border-color: var(--accent-primary);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 15px rgba(255, 214, 0, 0.1);
    }

    .asset-header {
      padding: 14px 16px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .asset-id-badge {
      background: rgba(255, 214, 0, 0.1);
      border-left: 2px solid var(--accent-primary);
      padding: 4px 10px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem; color: var(--accent-primary);
      text-transform: uppercase;
    }

    .asset-status {
      width: 8px; height: 8px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-primary);
    }

    .asset-display {
      margin: 14px 16px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.03);
      padding: 16px;
      border-radius: 4px;
      position: relative;
    }

    .asset-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1rem;
      color: #fff;
      text-shadow: 0 0 5px var(--glow-primary);
      text-transform: uppercase;
      word-break: break-all;
      text-align: center;
      font-weight: 600;
      line-height: 1.5;
    }

    .asset-info {
      padding: 0 16px 16px;
      flex: 1;
      display: flex; flex-direction: column;
    }

    .asset-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
      margin-bottom: 6px;
    }

    .asset-desc {
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.6;
      margin-bottom: 14px;
      flex: 1;
      font-style: italic;
    }

    .asset-actions {
      display: flex;
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 14px;
    }

    .btn-copy-action {
      background: transparent;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      padding: 10px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; font-size: 0.75rem;
      border-radius: 0px;
      position: relative;
      overflow: hidden;
    }

    .btn-copy-action:hover {
      background: var(--accent-primary);
      color: #000;
      box-shadow: 0 0 20px var(--glow-primary);
    }

    .btn-copy-action.success {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    /* ========== LAYOUT SPLIT ========== */
    .layout-split {
      display: flex;
      height: 100%;
      gap: 1px;
      overflow: hidden;
      background: rgba(255,255,255,0.05);
    }

    .sidebar-col {
      width: 260px;
      min-width: 260px;
      background: rgba(0,0,0,0.3);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 14px 18px;
      background: rgba(0,0,0,0.5);
      color: var(--accent-primary);
      text-transform: uppercase;
      font-weight: 700; letter-spacing: 1.5px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-shadow: 0 0 5px rgba(255, 214, 0, 0.4);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-item {
      padding: 12px 18px;
      cursor: pointer;
      transition: all 0.3s;
      color: #888;
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 0.85rem;
      position: relative;
      background: transparent;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    .sidebar-item i {
      color: #555;
      font-size: 0.7rem;
      transition: all 0.3s;
    }

    .sidebar-item:hover {
      background: rgba(255, 214, 0, 0.05);
      color: #fff;
    }

    .sidebar-item:hover i {
      color: var(--accent-primary);
    }

    .sidebar-item.active {
      background: rgba(255, 214, 0, 0.1);
      color: var(--accent-primary);
      border-left: 3px solid var(--accent-primary);
    }

    .sidebar-item.active i {
      color: var(--accent-primary);
    }

    .detail-col {
      flex: 1;
      background: rgba(5, 5, 5, 0.6);
      padding: 24px;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }

    .detail-content {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 214, 0, 0.1);
      padding: 24px;
      flex: 1;
      display: flex; flex-direction: column;
      animation: fadeSlideIn 0.4s ease-out;
      position: relative;
    }

    /* Detail Tech Corners */
    .detail-content::before, .detail-content::after {
      content: '';
      position: absolute;
      width: 10px; height: 10px;
      border: 2px solid var(--accent-primary);
      transition: all 0.3s;
    }
    .detail-content::before { top: -1px; left: -1px; border-right: none; border-bottom: none; }
    .detail-content::after { bottom: -1px; right: -1px; border-left: none; border-top: none; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .detail-label {
      font-size: 0.7rem;
      color: var(--accent-primary);
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .detail-key-title {
      font-size: 1.1rem;
      color: #fff;
      font-weight: 600;
      margin-bottom: 20px;
      border-bottom: 1px dashed rgba(255,255,255,0.1);
      padding-bottom: 10px;
    }

    .detail-desc-box {
      background: rgba(0, 0, 0, 0.5);
      border-left: 3px solid var(--accent-primary);
      padding: 18px;
      margin-bottom: 8px;
      position: relative;
    }

    .detail-desc-text {
      font-size: 1rem;
      color: #ddd;
      line-height: 1.8;
      white-space: pre-wrap;
    }

    .btn-copy-desc {
      background: transparent;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      padding: 14px 24px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer;
      transition: all 0.3s;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      font-size: 0.9rem;
      width: 100%;
      margin-top: 0;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .btn-copy-desc:hover {
      background: var(--accent-primary);
      color: #000;
      box-shadow: 0 0 25px var(--glow-primary);
    }

    .btn-copy-desc.success {
      background: #fff;
      color: #000;
      border-color: #fff;
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 3px;
      font-size: 0.8rem;
    }

    /* ========== ROAD ANIMATION ========== */
    .animation-layer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 120px;
      z-index: 999;
      pointer-events: none;
      overflow: hidden;
      background: linear-gradient(to top, #050505 0%, transparent 100%);
    }

    .road-container {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 45px;
      background: #050505;
      border-top: 1px solid rgba(255,255,255,0.1);
    }

    .road-lines {
      position: absolute;
      top: 22px; left: 0;
      width: 200%; height: 2px;
      background: repeating-linear-gradient(90deg, transparent, transparent 30px, var(--accent-primary) 30px, var(--accent-primary) 60px);
      opacity: 0.5;
      animation: roadFastMove 0.8s linear infinite;
    }

    @keyframes roadFastMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .cyber-car {
      position: absolute;
      bottom: 10px;
      width: 140px; height: 55px;
      filter: drop-shadow(0 0 15px var(--car-glow));
    }

    .car-cruiser {
      right: -180px;
      animation: driveCar1 15s linear infinite;
      --car-glow: var(--glow-primary);
    }

    .car-interceptor {
      left: -180px;
      filter: drop-shadow(0 0 15px rgba(255, 145, 0, 0.7));
      animation: driveCar2 11s linear infinite;
      bottom: 14px;
      transform: scale(0.85);
      --car-glow: rgba(255, 145, 0, 0.7);
    }

    @keyframes driveCar1 { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-100vw - 220px)); } }
    @keyframes driveCar2 { 0% { transform: translateX(0) scaleX(-1); } 100% { transform: translateX(calc(100vw + 220px)) scaleX(-1); } }

    .car-body-anim { animation: suspension 0.25s ease-in-out infinite; }
    @keyframes suspension { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(1px); } }

    .underglow {
      position: absolute;
      bottom: -8px; left: 10px;
      width: 80%; height: 20px;
      background: radial-gradient(ellipse at center, var(--car-glow) 0%, transparent 70%);
      filter: blur(12px);
      opacity: 1;
    }

    .wheel {
      position: absolute;
      bottom: -4px;
      width: 16px; height: 16px;
      background: #000;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      animation: spinWheel 0.18s linear infinite;
    }

    .wheel::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 5px; height: 5px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
    }

    .w-front { right: 14px; }
    .w-back { left: 18px; }

    @keyframes spinWheel { to { transform: rotate(360deg); } }

    .light-beam-container {
      position: absolute;
      top: 50%;
      width: 130px; height: 20px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .beam-right { right: -8px; }

    .light-beam {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.6) 0%, transparent 100%);
      clip-path: polygon(0 0, 100% 100%, 100% 0);
      filter: blur(5px);
    }

    /* ========== NOTIFICATIONS ========== */
    #notif-container {
      position: fixed;
      bottom: 140px; right: 25px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast-notification {
      background: rgba(5, 5, 5, 0.95);
      border: 1px solid var(--accent-primary);
      padding: 14px 20px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 20px rgba(255, 214, 0, 0.2);
      animation: toastSlideIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 300px;
      backdrop-filter: blur(10px);
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }

    .toast-notification i { color: var(--accent-primary); font-size: 1rem; }

    .toast-exit { animation: toastSlideOut 0.3s ease-in forwards; }

    @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastSlideOut { to { transform: translateX(100%); opacity: 0; } }

    /* ========== LOADER ========== */
    #loader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #050505;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 25px;
      transition: opacity 0.5s, visibility 0.5s;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.8rem; font-weight: 900; letter-spacing: 5px;
      color: var(--accent-primary);
      animation: textScramble 0.5s infinite alternate;
    }

    @keyframes textScramble {
      0% { opacity: 1; }
      50% { opacity: 0.8; text-shadow: 2px 0 #fff, -2px 0 var(--accent-tertiary); }
      100% { opacity: 1; }
    }

    .loader-bar-container {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
    }

    .loader-bar {
      height: 100%;
      width: 0;
      background: var(--accent-primary);
      box-shadow: 0 0 20px var(--glow-primary);
      transition: width 0.4s;
    }

    .loader-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1024px) {
      .top-nav { height: auto; flex-direction: column; padding: 16px; gap: 16px; }
      .brand { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.1); width: 100%; justify-content: center; padding-bottom: 16px; padding-right: 0; }
      .nav-menu { width: 100%; justify-content: center; flex-wrap: wrap; gap: 6px; }
      .nav-item { padding: 8px 12px; font-size: 0.7rem; }
      .status-box { display: none; }
      .header-row { flex-direction: column; align-items: flex-start; }
      .search-box { width: 100%; }
      .main { padding: 12px; padding-bottom: 140px; }
      .layout-split { flex-direction: column; }
      .sidebar-col { width: 100%; height: 32%; border-bottom: 1px solid rgba(255,255,255,0.05); }
      .detail-col { height: 68%; padding: 16px; }
      .assets-grid { grid-template-columns: 1fr; }
      .car-interceptor { display: none; }
      .perspective-grid { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <div id="mouse-glow"></div>
  <div class="perspective-grid"></div>
  <div class="scanlines"></div>
  <div class="scan-sweep"></div>
  <div class="hazard-bar"></div>

  <div id="notif-container"></div>

  <div id="loader">
    <div class="loader-title">SYSTEM BOOT</div>
    <div class="loader-bar-container">
      <div class="loader-bar" id="loaderBar"></div>
    </div>
    <div class="loader-text" id="load-status">Initializing Core Systems...</div>
  </div>

  <nav class="top-nav">
    <div class="brand">
      <div class="logo-box"><i class="fas fa-database"></i></div>
      <div class="brand-text">
        <h1 class="glitch-wrapper"><span class="glitch-text" data-text="TOMMY">TOMMY</span></h1>
        <span>LINE TOGEL HUB</span>
      </div>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-sheet="bonus"><i class="fas fa-cube"></i><span>BONUS</span></div>
      <div class="nav-item" data-sheet="PK_anti_audit"><i class="fas fa-toolbox"></i><span>PK TANPA KENA AUDIT NEW</span></div>
      <div class="nav-item" data-sheet="PK_LULUS_SENSOR_AUDIT"><i class="fas fa-book"></i><span>PK TERBARU LULUS SENSOR AUDIT</span></div>
    </div>
    <div class="status-box">
      <div class="status-indicator"></div>
      <div class="time-val" id="clock">00:00:00</div>
    </div>
  </nav>

  <main class="main">
    <div class="content-wrapper">
      <!-- Tech Corners -->
      <div class="tech-corner tc-tl"></div>
      <div class="tech-corner tc-tr"></div>
      <div class="tech-corner tc-bl"></div>
      <div class="tech-corner tc-br"></div>

      <div class="corner-deco">SECURE</div>
      <div class="header-row">
        <div class="title-main">
          <div class="title-badge">Module</div>
          <h1 id="pageTitle">BONUS</h1>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Database...">
            <i class="fas fa-search"></i>
          </div>
          <button class="btn-industrial" id="refreshBtn">
            <i class="fas fa-sync-alt"></i>
            <span>Refresh</span>
          </button>
        </div>
      </div>
      <div class="data-card">
        <div class="table-scroll" id="tableContainer"></div>
      </div>
    </div>
  </main>

  <!-- Road Animation Layer -->
  <div class="animation-layer">
    <div class="road-container">
      <div class="road-lines"></div>
    </div>
    
    <!-- Cruiser Car -->
    <div class="cyber-car car-cruiser">
      <svg class="car-body-anim" width="100%" height="100%" viewBox="0 0 200 80">
        <path d="M20,50 Q30,10 80,10 L160,10 Q190,10 190,40 L190,55 Q190,65 180,65 L20,65 Q10,65 10,55 L10,50 Z" fill="#181410" stroke="var(--accent-primary)" stroke-width="2"/>
        <path d="M40,15 Q45,5 70,5 L95,5 Q105,5 105,15 L40,15 Z" fill="#050505"/>
        <path d="M115,10 L150,10 Q160,10 160,25 L115,25 Z" fill="#050505"/>
        <rect x="12" y="48" width="4" height="8" fill="var(--accent-hot)"/>
        <rect x="184" y="30" width="6" height="12" fill="var(--accent-primary)"/>
      </svg>
      <div class="underglow"></div>
      <div class="wheel w-front"></div>
      <div class="wheel w-back"></div>
      <div class="light-beam-container beam-right"><div class="light-beam"></div></div>
    </div>
    
    <!-- Interceptor Car -->
    <div class="cyber-car car-interceptor">
      <svg class="car-body-anim" width="100%" height="100%" viewBox="0 0 200 80">
        <path d="M10,40 Q10,10 40,10 L120,10 Q170,10 180,50 L180,55 Q180,65 170,65 L20,65 Q10,65 10,55 Z" fill="#181410" stroke="var(--accent-tertiary)" stroke-width="2"/>
        <path d="M30,15 L30,25 Q30,10 45,10 L80,10 Q90,10 90,15 Z" fill="#050505"/>
        <path d="M100,5 L140,5 Q150,5 155,15 L100,15 Z" fill="#050505"/>
        <rect x="174" y="48" width="4" height="8" fill="var(--accent-primary)"/>
        <rect x="10" y="30" width="6" height="12" fill="var(--accent-tertiary)"/>
      </svg>
      <div class="underglow"></div>
      <div class="wheel w-front" style="right:18px; left:auto;"></div>
      <div class="wheel w-back" style="left:22px; right:auto;"></div>
    </div>
  </div>

  <script>
    // ========== MOUSE GLOW EFFECT ==========
    const mouseGlow = document.getElementById('mouse-glow');
    window.addEventListener('mousemove', e => {
      mouseGlow.style.setProperty('--mouse-x', e.clientX + 'px');
      mouseGlow.style.setProperty('--mouse-y', e.clientY + 'px');
    });

    // ========== CONFIGURATION ==========
    const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
    const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT'];

    // ========== STATE ==========
    let allData = {};
    let currentSheet = 'bonus';

    // ========== DOM ELEMENTS ==========
    const loader = document.getElementById('loader');
    const loaderBar = document.getElementById('loaderBar');
    const loadStatus = document.getElementById('load-status');
    const pageTitle = document.getElementById('pageTitle');
    const tableContainer = document.getElementById('tableContainer');
    const searchInput = document.getElementById('searchInput');
    const clockEl = document.getElementById('clock');
    const notifContainer = document.getElementById('notif-container');
    const refreshBtn = document.getElementById('refreshBtn');

    // ========== INITIALIZATION ==========
    function init() {
      startClock();
      setupEventListeners();
      loadAllSheets();
    }

    // ========== CLOCK ==========
    function startClock() {
      setInterval(() => {
        clockEl.textContent = new Date().toLocaleTimeString('en-GB');
      }, 1000);
    }

    // ========== NOTIFICATIONS ==========
    function showNotification(msg) {
      const notif = document.createElement('div');
      notif.className = 'toast-notification';
      notif.innerHTML = `<i class="fas fa-check-circle"></i><span>${msg}</span>`;
      notifContainer.appendChild(notif);
      
      setTimeout(() => {
        notif.classList.add('toast-exit');
        setTimeout(() => notif.remove(), 300);
      }, 2500);
    }

    // ========== DATA FETCHING ==========
    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        if (!json.table?.rows) return [];
        
        const cols = json.table.cols || [];
        const headers = cols.map(col => col.label || `col_${col.id}`);
        
        return json.table.rows.map(row => {
          const obj = {};
          row.c?.forEach((cell, idx) => {
            obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null;
          });
          return obj;
        });
      } catch (e) {
        console.error(`Error fetching ${sheetName}:`, e);
        return [];
      }
    }

    async function loadAllSheets() {
      let progress = 0;
      const increment = 100 / SHEET_NAMES.length;
      
      for (const name of SHEET_NAMES) {
        loadStatus.textContent = `LOADING: ${name.toUpperCase().replace(/_/g, ' ')}`;
        allData[name] = await fetchSheet(name);
        progress += increment;
        loaderBar.style.width = `${progress}%`;
      }
      
      loadStatus.textContent = 'SYSTEM ONLINE';
      loaderBar.style.width = '100%';
      
      setTimeout(() => {
        loader.classList.add('hidden');
        renderSheet(currentSheet);
      }, 500);
    }

    // ========== RENDERING ==========
    function renderSheet(sheetName) {
      currentSheet = sheetName;
      
      const displayName = sheetName.toUpperCase().replace(/_/g, ' ');
      pageTitle.textContent = displayName;
      
      searchInput.value = '';
      
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sheet === sheetName);
      });
      
      const data = allData[sheetName] || [];
      
      if (!data.length) {
        tableContainer.innerHTML = '<div style="padding:40px;text-align:center;color:#666;">NO DATA FOUND</div>';
        return;
      }
      
      if (sheetName === 'PK_anti_audit') {
        tableContainer.innerHTML = renderSidebarLayout(data);
        initSidebarInteraction(data);
      } else if (sheetName === 'bonus') {
        tableContainer.innerHTML = renderAssetsGrid(data);
      } else {
        tableContainer.innerHTML = renderQna(data);
      }
    }

    function renderAssetsGrid(data) {
      if (!data.length) return '';
      
      let html = '<div class="assets-grid">';
      
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const id = row[keys[0]] || '-';
        const val = row[keys[1]] || '-';
        const desc = row[keys[2]] || '-';
        const valEsc = String(val).replace(/"/g, '&quot;');
        
        html += `
          <div class="asset-card" style="animation-delay:${idx * 0.08}s">
            <div class="asset-header">
              <span class="asset-id-badge">${escapeHTML(id)}</span>
              <div class="asset-status"></div>
            </div>
            <div class="asset-display">
              <div class="asset-value">${escapeHTML(val)}</div>
            </div>
            <div class="asset-info">
              <div class="asset-label">System Note</div>
              <div class="asset-desc">${escapeHTML(desc)}</div>
              <div class="asset-actions">
                <button class="btn-copy-action" data-val="${valEsc}" data-desc="${escapeHTML(desc).replace(/"/g, '&quot;')}">
                  <i class="fas fa-download"></i>
                  <span>Extract Data</span>
                </button>
              </div>
            </div>
          </div>
        `;
      });
      
      html += '</div>';
      return html;
    }

    function renderQna(data) {
      if (!data.length) return '';
      
      let html = `<table style="width:100%; border-collapse:collapse;"><thead><tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><th style="padding:14px; text-align:left; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase;">QUERY</th><th style="padding:14px;"></th><th style="padding:14px; text-align:left; color:var(--text-muted); font-size:0.75rem; text-transform:uppercase;">RESPONSE</th><th style="padding:14px;"></th></tr></thead><tbody>`;
      
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const q = row[keys[1]] || row[keys[0]] || '-';
        const a = row[keys[2]] || row[keys[1]] || '-';
        const qSafe = escapeHTML(q).replace(/"/g, '&quot;');
        const aSafe = escapeHTML(a).replace(/"/g, '&quot;');
        
        html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.02);"><td style="padding:16px; color:#ccc;">${escapeHTML(q)}</td><td><button class="btn-industrial" data-text="${qSafe}" style="padding:8px 12px;"><i class="fas fa-copy"></i></button></td><td style="padding:16px; color:#ccc;">${escapeHTML(a)}</td><td><button class="btn-industrial" data-text="${aSafe}" style="padding:8px 12px;"><i class="fas fa-copy"></i></button></td></tr>`;
      });
      
      html += '</tbody></table>';
      return html;
    }

    function renderSidebarLayout(data) {
      const keys = data.length ? Object.keys(data[0]) : [];
      
      let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><span>Daftar Item</span><i class="fas fa-list"></i></div><div class="sidebar-list" id="sidebarListContainer">`;
      
      data.forEach((row, idx) => {
        const key = row[keys[0]] || `Item ${idx + 1}`;
        html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-chevron-right"></i>${escapeHTML(key)}</div>`;
      });
      
      html += `</div></div><div class="detail-col" id="detailPanel"><div class="empty-state">Select Item for Details</div></div></div>`;
      return html;
    }

    function initSidebarInteraction(data) {
      const items = document.querySelectorAll('.sidebar-item');
      const detailPanel = document.getElementById('detailPanel');
      
      if (!items.length) return;
      
      function updateDetail(idx) {
        const row = data[idx];
        if (!row) return;
        
        const keys = Object.keys(row);
        const key = row[keys[0]] || '-';
        const desc = row[keys[2]] || '-';
        const descEsc = escapeHTML(String(desc)).replace(/"/g, '&quot;');
        
        detailPanel.innerHTML = `
          <div class="detail-content">
            <div class="detail-label">ID / Key</div>
            <div class="detail-key-title">${escapeHTML(key)}</div>
            
            <div class="detail-label">Keterangan</div>
            <div class="detail-desc-box">
              <div class="detail-desc-text">${escapeHTML(desc)}</div>
            </div>
            
            <button class="btn-copy-desc" data-desc="${descEsc}" id="btnCopyDesc">
              <i class="fas fa-copy"></i>
              <span>Copy Description</span>
            </button>
          </div>
        `;
      }
      
      items.forEach((item) => {
        item.addEventListener('click', () => {
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          updateDetail(parseInt(item.dataset.index));
        });
      });
      
      if (items[0]) {
        items[0].classList.add('active');
        updateDetail(0);
      }
    }

    // ========== SEARCH ==========
    function filterHandler() {
      const query = searchInput.value.toLowerCase().trim();
      const data = allData[currentSheet] || [];
      
      if (!data.length) return;
      
      if (currentSheet === 'PK_anti_audit') {
        const items = document.querySelectorAll('.sidebar-item');
        let firstVisible = -1;
        
        items.forEach((item, idx) => {
          const row = data[idx];
          const match = Object.values(row).some(v => 
            v && String(v).toLowerCase().includes(query)
          );
          item.style.display = match ? 'flex' : 'none';
          if (match && firstVisible === -1) firstVisible = idx;
        });
        
        const active = document.querySelector('.sidebar-item.active');
        if ((!active || active.style.display === 'none') && firstVisible !== -1) {
          document.querySelector(`.sidebar-item[data-index="${firstVisible}"]`)?.click();
        }
      } else {
        const filtered = data.filter(r => 
          Object.values(r).some(v => v && String(v).toLowerCase().includes(query))
        );
        
        if (filtered.length) {
          tableContainer.innerHTML = currentSheet === 'bonus' 
            ? renderAssetsGrid(filtered) 
            : renderQna(filtered);
        } else {
          tableContainer.innerHTML = '<div style="padding:25px;text-align:center;color:#666;">NO MATCHES FOUND</div>';
        }
      }
    }

    // ========== EVENT LISTENERS ==========
    function setupEventListeners() {
      // Navigation
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => renderSheet(item.dataset.sheet));
      });
      
      // Search
      searchInput.addEventListener('input', filterHandler);
      
      // Refresh
      refreshBtn.addEventListener('click', async () => {
        refreshBtn.classList.add('loading');
        await loadAllSheets();
        refreshBtn.classList.remove('loading');
        showNotification('System Updated');
      });
      
      // Copy buttons - delegated
      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.btn-industrial, .btn-copy-action, .btn-copy-desc');
        if (!btn) return;
        
        let text = '';
        
        // For sidebar detail button
        if (btn.id === 'btnCopyDesc') {
          text = btn.dataset.desc || '';
        } else if (btn.dataset.val && btn.dataset.desc) {
          const val = btn.dataset.val;
          const desc = btn.dataset.desc;
          text = desc && desc !== '-' ? `${val} - ${desc}` : val;
        } else if (btn.dataset.text) {
          text = btn.dataset.text;
        }
        
        if (text) {
          try {
            await navigator.clipboard.writeText(text);
            btn.classList.add('success');
            showNotification('Data Copied');
            
            setTimeout(() => btn.classList.remove('success'), 1500);
          } catch (err) {
            console.error('Copy failed:', err);
          }
        }
      });
    }

    // ========== UTILITIES ==========
    function escapeHTML(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ========== START ==========
    init();
  </script>
