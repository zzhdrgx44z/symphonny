<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈 · LINE TOGEL HUB // HYPERDRIVE - Fullscreen</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0c12;
      --bg-surface: #11141e;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --accent-pink: #ff2e63;
      --accent-cyan: #00e5ff;
      --accent-gold: #ffd700;
      --accent-purple: #b450ff;
      --text-primary: #f0f3fa;
      --text-secondary: #a0a8c0;
      --glow-pink: rgba(255, 46, 99, 0.4);
      --card-radius: 20px;
    }

    html, body { height: 100%; width: 100%; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,46,99,0.08), transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(0,229,255,0.06), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
    }

    .top-nav {
      position: relative;
      z-index: 30;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(10, 12, 18, 0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .brand-text span { font-size: 0.7rem; color: var(--text-secondary); }

    .nav-menu { display: flex; flex-wrap: wrap; gap: 8px; }

    .nav-item {
      background: rgba(20, 25, 40, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-item.active {
      background: var(--accent-pink);
      border-color: var(--accent-pink);
      color: white;
      box-shadow: 0 0 12px var(--glow-pink);
    }

    .status-box {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      padding: 6px 14px;
      border-radius: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      border: 1px solid var(--border-subtle);
      color: var(--accent-cyan);
      white-space: nowrap;
    }

    .main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 130px 20px;
      min-height: 0;
    }

    .content-wrapper {
      background: rgba(17, 20, 30, 0.7);
      backdrop-filter: blur(16px);
      border-radius: var(--card-radius);
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .title-main h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-box input {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 8px 16px;
      color: white;
      font-family: 'Inter', monospace;
      font-size: 0.8rem;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent-cyan); }

    .btn-industrial {
      background: rgba(255, 46, 99, 0.15);
      border: 1px solid var(--accent-pink);
      padding: 7px 18px;
      border-radius: 40px;
      color: var(--accent-pink);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-industrial:hover { background: rgba(255,46,99,0.25); }

    .table-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      min-height: 200px;
    }

    .qna-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .qna-table th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 600;
      color: var(--accent-cyan);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.7rem;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: rgba(10, 12, 20, 0.95);
      backdrop-filter: blur(4px);
    }
    .qna-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .col-action button {
      background: none;
      border: 1px solid var(--border-subtle);
      border-radius: 30px;
      padding: 6px 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-secondary);
    }
    .col-action button:hover { border-color: var(--accent-pink); color: var(--accent-pink); }

    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
    }
    .asset-card {
      background: rgba(10, 12, 20, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      border: 1px solid var(--border-subtle);
      transition: all 0.25s ease;
      overflow: hidden;
    }
    .asset-card:hover { transform: translateY(-4px); border-color: var(--accent-pink); box-shadow: 0 8px 30px rgba(255,46,99,0.15); }
    .asset-header {
      padding: 16px 18px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .asset-display {
      margin: 4px 18px 8px;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent-gold);
      text-align: center;
      border: 1px solid rgba(255,215,0,0.15);
    }
    .btn-copy-action {
      background: rgba(255,46,99,0.1);
      border: 1px solid rgba(255,46,99,0.3);
      border-radius: 40px;
      padding: 6px 16px;
      color: var(--accent-pink);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-copy-action:hover { background: rgba(255,46,99,0.2); }

    .layout-split { display: flex; flex-direction: row; height: 100%; min-height: 400px; }
    .sidebar-col {
      width: 260px;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.35);
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 14px 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-cyan);
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-item {
      padding: 12px 20px;
      font-size: 0.8rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: 0.15s;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.03); }
    .sidebar-item.active { background: rgba(255,46,99,0.15); border-left-color: var(--accent-pink); color: white; }
    .detail-col { flex: 1; padding: 20px 24px; overflow-y: auto; }
    .detail-content { animation: fadeSlideIn 0.2s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-secondary); font-size: 0.9rem; }

    #notif-container {
      position: fixed;
      bottom: 140px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }
    .toast-notification {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      border-left: 4px solid var(--accent-pink);
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      animation: slideInRight 0.3s ease;
      transition: opacity 0.2s;
    }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ========================================= */
    /*       CYBERPUNK ROAD SCENE — SOLID        */
    /* ========================================= */

    .animation-layer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 120px;
      pointer-events: none;
      z-index: 50;
      /* Background SOLID gelap agar menutupi tulisan */
      background: linear-gradient(to bottom,
        transparent 0%,
        rgba(7, 9, 14, 0.7) 8%,
        rgba(7, 9, 14, 0.95) 18%,
        #07090e 30%,
        #07090e 100%);
    }

    /* Cityscape silhouette */
    .cityscape {
      position: absolute;
      bottom: 68px;
      left: 0;
      width: 100%;
      height: 80px;
      z-index: 1;
      opacity: 0.6;
    }
    .cityscape svg { width: 100%; height: 100%; }

    .window-light { animation: windowFlicker var(--delay, 3s) ease-in-out infinite alternate; }
    @keyframes windowFlicker { 0%, 100% { opacity: var(--max-o, 0.8); } 50% { opacity: var(--min-o, 0.2); } }

    .neon-sign {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      animation: neonFlicker 4s ease-in-out infinite;
    }
    @keyframes neonFlicker {
      0%, 100% { opacity: 1; }
      41% { opacity: 1; } 42% { opacity: 0.2; } 43% { opacity: 1; }
      44% { opacity: 0.4; } 45% { opacity: 1; }
      80% { opacity: 1; } 81% { opacity: 0.3; } 82% { opacity: 1; }
    }

    /* Street lights */
    .street-lights {
      position: absolute;
      bottom: 65px;
      left: 0;
      width: 100%;
      height: 35px;
      z-index: 3;
    }
    .street-light {
      position: absolute;
      bottom: 0;
      width: 2px;
      height: 28px;
      background: linear-gradient(to top, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
    }
    .street-light::after {
      content: '';
      position: absolute;
      top: -2px;
      left: -3px;
      width: 8px;
      height: 5px;
      border-radius: 50%;
    }
    .street-light:nth-child(odd)::after {
      background: var(--accent-pink);
      box-shadow: 0 0 6px var(--accent-pink), 0 0 14px rgba(255,46,99,0.4);
      animation: sirenPink 2.5s ease-in-out infinite alternate;
    }
    .street-light:nth-child(even)::after {
      background: var(--accent-cyan);
      box-shadow: 0 0 6px var(--accent-cyan), 0 0 14px rgba(0,229,255,0.4);
      animation: sirenCyan 2.5s ease-in-out infinite alternate;
    }
    @keyframes sirenPink { 0% { opacity: 0.4; } 100% { opacity: 1; } }
    @keyframes sirenCyan { 0% { opacity: 1; } 100% { opacity: 0.4; } }

    .light-cone {
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 52px;
      clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%);
      pointer-events: none;
    }
    .street-light:nth-child(odd) .light-cone { background: linear-gradient(to bottom, rgba(255,46,99,0.08), transparent); }
    .street-light:nth-child(even) .light-cone { background: linear-gradient(to bottom, rgba(0,229,255,0.08), transparent); }

    .street-light:nth-child(1) { left: 6%; }
    .street-light:nth-child(2) { left: 24%; }
    .street-light:nth-child(3) { left: 44%; }
    .street-light:nth-child(4) { left: 64%; }
    .street-light:nth-child(5) { left: 82%; }
    .street-light:nth-child(6) { left: 96%; }

    /* ===== ROAD — SOLID OPAGUE ===== */
    .road-surface {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 68px;
      z-index: 2;
      /* Background SOLID, bukan transparan */
      background: linear-gradient(180deg, #0e1119 0%, #0a0d15 40%, #070910 100%);
    }

    .road-edge-top {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,46,99,0.7) 10%, rgba(255,46,99,1) 50%, rgba(255,46,99,0.7) 90%, transparent 100%);
      box-shadow: 0 0 10px rgba(255,46,99,0.6), 0 0 30px rgba(255,46,99,0.25), 0 3px 15px rgba(255,46,99,0.2);
    }

    .lane-upper {
      position: absolute;
      top: 14px; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.12) 15%, rgba(0,229,255,0.12) 85%, transparent);
    }
    .lane-lower {
      position: absolute;
      top: 52px; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.1) 15%, rgba(0,229,255,0.1) 85%, transparent);
    }

    .lane-center {
      position: absolute;
      top: 32px;
      left: 0;
      width: 200%;
      height: 2px;
      background: repeating-linear-gradient(90deg,
        transparent 0px, transparent 25px,
        rgba(255, 215, 0, 0.8) 25px, rgba(255, 215, 0, 0.8) 55px,
        transparent 55px, transparent 80px);
      animation: laneScroll 0.7s linear infinite;
      box-shadow: 0 0 6px rgba(255,215,0,0.5);
    }
    @keyframes laneScroll { 0% { transform: translateX(0); } 100% { transform: translateX(-80px); } }

    .road-shimmer {
      position: absolute;
      top: 0; left: 0;
      width: 200%; height: 100%;
      background: linear-gradient(110deg, transparent 0%, rgba(255,46,99,0.015) 30%, rgba(0,229,255,0.02) 50%, rgba(255,215,0,0.015) 70%, transparent 100%);
      animation: shimmerMove 4s linear infinite;
    }
    @keyframes shimmerMove { 0% { transform: translateX(-50%); } 100% { transform: translateX(0); } }

    #speed-particles {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 68px;
      z-index: 8;
      pointer-events: none;
    }

    /* ============ MOBIL ============ */
    .car-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 68px;
      z-index: 6;
      overflow: visible;
    }

    .cyber-car {
      position: absolute;
      width: 180px;
      height: 50px;
    }

    .cyber-car svg {
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7));
    }

    .car-hover-anim { animation: carFloat 1.6s ease-in-out infinite alternate; }
    @keyframes carFloat { 0% { transform: translateY(0); } 100% { transform: translateY(-2px); } }

    /* Headlight beam */
    .headlight-beam {
      position: absolute;
      top: 12px;
      width: 90px;
      height: 24px;
      opacity: 0.25;
    }
    .headlight-beam.beam-left {
      right: 100%;
      margin-right: -3px;
      background: linear-gradient(to left, rgba(255,255,200,0.9), rgba(255,255,200,0.1), transparent);
      clip-path: polygon(100% 25%, 100% 75%, 0% 100%, 0% 0%);
    }
    .headlight-beam.beam-right {
      left: 100%;
      margin-left: -3px;
      background: linear-gradient(to right, rgba(255,255,200,0.9), rgba(255,255,200,0.1), transparent);
      clip-path: polygon(0% 25%, 0% 75%, 100% 100%, 100% 0%);
    }

    .lens-flare {
      position: absolute;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #ffffee;
    }
    .lens-flare.flare-left { right: 2px; top: 15px; box-shadow: 0 0 8px 3px rgba(255,255,200,0.7), 0 0 20px 6px rgba(255,255,200,0.25); }
    .lens-flare.flare-right { left: 2px; top: 15px; box-shadow: 0 0 8px 3px rgba(255,255,200,0.7), 0 0 20px 6px rgba(255,255,200,0.25); }

    /* Taillight */
    .taillight-bar {
      position: absolute;
      height: 3px;
      border-radius: 1.5px;
      background: #ff2222;
    }
    .taillight-bar.tl-left { left: 3px; top: 18px; width: 16px; box-shadow: 0 0 6px #ff2222, 0 0 14px rgba(255,34,34,0.5), -8px 0 16px rgba(255,34,34,0.25); }
    .taillight-bar.tl-right { right: 3px; top: 18px; width: 16px; box-shadow: 0 0 6px #ff2222, 0 0 14px rgba(255,34,34,0.5), 8px 0 16px rgba(255,34,34,0.25); }

    /* Thruster */
    .thruster {
      position: absolute;
      height: 5px;
      border-radius: 0 2px 2px 0;
      animation: thrusterPulse 0.12s ease-in-out infinite alternate;
    }
    .thruster.thruster-left {
      left: -18px; top: 20px; width: 20px;
      background: linear-gradient(to left, rgba(0,229,255,0.9), rgba(0,229,255,0.3), transparent);
      box-shadow: 0 0 5px rgba(0,229,255,0.6);
    }
    .thruster.thruster-right {
      right: -18px; top: 20px; width: 20px;
      border-radius: 2px 0 0 2px;
      background: linear-gradient(to right, rgba(0,229,255,0.9), rgba(0,229,255,0.3), transparent);
      box-shadow: 0 0 5px rgba(0,229,255,0.6);
    }
    .thruster.thruster-pink { background: linear-gradient(to left, rgba(255,46,99,0.9), rgba(255,46,99,0.3), transparent); box-shadow: 0 0 5px rgba(255,46,99,0.6); }
    .thruster.thruster-gold { background: linear-gradient(to left, rgba(255,215,0,0.9), rgba(255,215,0,0.3), transparent); box-shadow: 0 0 5px rgba(255,215,0,0.6); }
    .thruster.thruster-purple { background: linear-gradient(to right, rgba(180,80,255,0.9), rgba(180,80,255,0.3), transparent); box-shadow: 0 0 5px rgba(180,80,255,0.6); }
    @keyframes thrusterPulse { 0% { opacity: 0.6; width: 16px; } 100% { opacity: 1; width: 24px; } }

    .thruster-core {
      position: absolute;
      height: 2px;
      border-radius: 2px;
      background: white;
    }
    .thruster-core.core-left { left: -10px; top: 21px; width: 8px; animation: thrusterPulse 0.08s ease-in-out infinite alternate; }
    .thruster-core.core-right { right: -10px; top: 21px; width: 8px; animation: thrusterPulse 0.08s ease-in-out infinite alternate; }

    /* Underglow multi layer */
    .underglow-layer {
      position: absolute;
      bottom: -3px;
      border-radius: 50%;
      pointer-events: none;
    }
    .underglow-outer { left: 8%; width: 84%; height: 14px; filter: blur(5px); animation: uOuter 1s ease-in-out infinite alternate; }
    .underglow-inner { left: 18%; width: 64%; height: 8px; filter: blur(2px); animation: uInner 0.5s ease-in-out infinite alternate; }
    .underglow-core { left: 28%; width: 44%; height: 4px; filter: blur(1px); background: white; opacity: 0.3; animation: uCore 0.25s ease-in-out infinite alternate; }
    @keyframes uOuter { 0% { opacity: 0.25; } 100% { opacity: 0.55; } }
    @keyframes uInner { 0% { opacity: 0.4; } 100% { opacity: 0.85; } }
    @keyframes uCore { 0% { opacity: 0.2; } 100% { opacity: 0.55; } }

    .glow-pink .underglow-outer { background: radial-gradient(ellipse, rgba(255,46,99,0.6), transparent 70%); }
    .glow-pink .underglow-inner { background: radial-gradient(ellipse, rgba(255,46,99,0.8), transparent 70%); }
    .glow-cyan .underglow-outer { background: radial-gradient(ellipse, rgba(0,229,255,0.6), transparent 70%); }
    .glow-cyan .underglow-inner { background: radial-gradient(ellipse, rgba(0,229,255,0.8), transparent 70%); }
    .glow-gold .underglow-outer { background: radial-gradient(ellipse, rgba(255,215,0,0.5), transparent 70%); }
    .glow-gold .underglow-inner { background: radial-gradient(ellipse, rgba(255,215,0,0.7), transparent 70%); }
    .glow-purple .underglow-outer { background: radial-gradient(ellipse, rgba(180,80,255,0.5), transparent 70%); }
    .glow-purple .underglow-inner { background: radial-gradient(ellipse, rgba(180,80,255,0.7), transparent 70%); }

    .road-reflection {
      position: absolute;
      bottom: -10px;
      left: 8%;

        <path d="M14 34 Q9 34 7 31 L7 26 Q7 22 12 20 L34 17 Q44 5 64 3 L124 3 Q142 5 149 18 L158 21 Q162 23 162 28 L162 31 Q160 34 155 34 Z" fill="url(#b4)" stroke="rgba(180,80,255,0.4)" stroke-width="0.9"/>
        <path d="M64 3 L60 9 L42 14 L34 17 Q44 5 64 3Z" fill="rgba(180,80,255,0.04)"/>
        <path d="M64 3 L124 3 L132 9 L60 9Z" fill="rgba(180,80,255,0.02)"/>
        <line x1="14" y1="26" x2="155" y2="26" stroke="rgba(180,80,255,0.18)" stroke-width="0.5"/>
        <rect x="135" y="18" width="16" height="4" rx="2" fill="rgba(0,0,0,0.4)" stroke="rgba(180,80,255,0.25)" stroke-width="0.4"/>
        <rect x="158" y="24" width="3" height="5" rx="1" fill="#ffffdd" opacity="0.5"/>
        <rect x="5" y="25" width="3" height="4" rx="1" fill="#ff3333" opacity="0.5"/>
        <ellipse cx="42" cy="34" rx="10" ry="2.5" fill="rgba(0,0,0,0.4)"/>
        <ellipse cx="137" cy="34" rx="10" ry="2.5" fill="rgba(0,0,0,0.4)"/>
      </svg>
    </div>

    <!-- CAR 5: Gold Speeder — BOOST cepat -->
    <div class="cyber-car car-5 car-hover-anim">
      <div class="headlight-beam beam-left" style="opacity:0.18;width:110px;"></div>
      <div class="lens-flare flare-left"></div>
      <div class="taillight-bar tl-left"></div>
      <div class="thruster thruster-gold thruster-left" style="width:30px;left:-26px;"></div>
      <div class="thruster-core core-left" style="left:-14px;width:12px;"></div>
      <div class="boost-streak"></div>
      <div class="boost-streak" style="top:38%;"></div>
      <div class="underglow-layer glow-gold underglow-outer"></div>
      <div class="underglow-layer glow-gold underglow-inner"></div>
      <div class="underglow-layer underglow-core"></div>
      <div class="road-reflection" style="background:radial-gradient(ellipse,rgba(255,215,0,0.6),transparent 70%);"></div>
      <svg width="180" height="50" viewBox="0 0 180 50" fill="none">
        <defs><linearGradient id="b5" x1="0" y1="0" x2="0" y2="50"><stop offset="0%" stop-color="#22201a"/><stop offset="100%" stop-color="#12100a"/></linearGradient></defs>
        <ellipse cx="90" cy="44" rx="72" ry="3" fill="rgba(0,0,0,0.6)"/>
        <path d="M6 25 L26 17 Q44 6 72 4 L140 4 Q158 8 166 20 L172 25 L166 30 Q158 42 140 46 L72 46 Q44 43 26 33 Z" fill="url(#b5)" stroke="rgba(255,215,0,0.55)" stroke-width="1.1"/>
        <path d="M72 4 L140 4 L148 10 L68 10Z" fill="rgba(255,215,0,0.05)" stroke="rgba(255,215,0,0.18)" stroke-width="0.5"/>
        <ellipse cx="100" cy="7" rx="18" ry="3" fill="rgba(255,215,0,0.07)" stroke="rgba(255,215,0,0.12)" stroke-width="0.4"/>
        <line x1="26" y1="25" x2="172" y2="25" stroke="rgba(255,215,0,0.3)" stroke-width="0.7"/>
        <path d="M26 17 L13 12 L18 17Z" fill="#1a1810" stroke="rgba(255,215,0,0.35)" stroke-width="0.5"/>
        <path d="M26 33 L13 38 L18 33Z" fill="#1a1810" stroke="rgba(255,215,0,0.35)" stroke-width="0.5"/>
        <ellipse cx="170" cy="25" rx="2.5" ry="4" fill="#ffffee" opacity="0.95"/>
        <ellipse cx="170" cy="25" rx="4" ry="6" fill="rgba(255,255,200,0.12)"/>
        <rect x="4" y="21" width="4" height="7" rx="2" fill="#ff2222" opacity="0.9"/>
        <ellipse cx="9" cy="25" rx="3" ry="5" fill="rgba(255,215,0,0.12)"/>
      </svg>
    </div>

  </div>
</div>

<script>
  const canvas = document.getElementById('particle-canvas');
  let ctxP = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

  function initParticles() {
    particles = [];
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvas.width, y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.5, alpha: Math.random() * 0.2 + 0.1,
        speedX: (Math.random() - 0.5) * 0.1, speedY: (Math.random() - 0.5) * 0.1,
        color: `hsl(${Math.random() * 30 + 320}, 70%, 60%)`
      });
    }
  }

  function drawParticles() {
    if (!ctxP) return;
    ctxP.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctxP.beginPath(); ctxP.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctxP.fillStyle = p.color; ctxP.globalAlpha = p.alpha; ctxP.fill();
      p.x += p.speedX; p.y += p.speedY;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => { resizeCanvas(); initParticles(); resizeSpeedCanvas(); });
  resizeCanvas(); initParticles(); drawParticles();

  const spCanvas = document.getElementById('speed-particles');
  let ctxS = spCanvas.getContext('2d');
  let speedDots = [];

  function resizeSpeedCanvas() {
    const roadEl = document.querySelector('.road-surface');
    if (roadEl) { spCanvas.width = roadEl.offsetWidth; spCanvas.height = roadEl.offsetHeight; }
  }

  function createSpeedDot() {
    const goRight = Math.random() > 0.5;
    const lane = Math.random() > 0.5 ? 'top' : 'bottom';
    const colors = ['#ff2e63', '#00e5ff', '#ffd700', '#b450ff', '#ff6644'];
    return {
      x: Math.random() * spCanvas.width,
      y: lane === 'top' ? (spCanvas.height * 0.2 + Math.random() * 12) : (spCanvas.height * 0.6 + Math.random() * 12),
      speed: (Math.random() * 4 + 2.5) * (goRight ? 1 : -1),
      length: Math.random() * 16 + 5,
      alpha: Math.random() * 0.3 + 0.06,
      color: colors[Math.floor(Math.random() * colors.length)]
    };
  }

  function initSpeedDots() { speedDots = []; for (let i = 0; i < 40; i++) speedDots.push(createSpeedDot()); }

  function drawSpeedDots() {
    if (!ctxS || !spCanvas.width) { requestAnimationFrame(drawSpeedDots); return; }
    ctxS.clearRect(0, 0, spCanvas.width, spCanvas.height);
    for (let d of speedDots) {
      ctxS.beginPath();
      ctxS.moveTo(d.x, d.y);
      ctxS.lineTo(d.x - d.length * Math.sign(d.speed), d.y);
      ctxS.strokeStyle = d.color;
      ctxS.globalAlpha = d.alpha;
      ctxS.lineWidth = 1.1;
      ctxS.stroke();
      if (Math.abs(d.speed) > 4) {
        ctxS.beginPath(); ctxS.arc(d.x, d.y, 1.5, 0, Math.PI * 2);
        ctxS.fillStyle = d.color; ctxS.globalAlpha = d.alpha * 0.5; ctxS.fill();
      }
      d.x += d.speed;
      if (d.x > spCanvas.width + 25 || d.x < -25) {
        Object.assign(d, createSpeedDot());
        d.x = d.speed > 0 ? -12 : spCanvas.width + 12;
      }
    }
    ctxS.globalAlpha = 1;
    requestAnimationFrame(drawSpeedDots);
  }

  setTimeout(() => { resizeSpeedCanvas(); initSpeedDots(); drawSpeedDots(); }, 100);

  function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
  setInterval(updateClock, 1000); updateClock();
  setInterval(() => { document.getElementById('hud-ping').innerText = Math.floor(Math.random() * 12 + 10) + 'ms'; }, 4000);

  const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
  const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
  const COPY_COL_C_SHEETS = ['PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
  let allData = {};
  let currentSheet = 'bonus';

  async function fetchSheet(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      if (!json.table?.rows) return [];
      const cols = json.table.cols || [];
      const headers = cols.map(col => col.label || `col_${col.id}`);
      return json.table.rows.map(row => {
        const obj = {};
        row.c?.forEach((cell, idx) => { obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null; });
        return obj;
      });
    } catch (e) { console.error(e); return []; }
  }

  async function loadAllSheets() {
    let progress = 0;
    const step = 100 / SHEET_NAMES.length;
    const loaderTitle = document.getElementById('loader-title-text');
    const loaderBar = document.getElementById('loaderBar');
    const loadStatus = document.getElementById('load-status');
    for (const name of SHEET_NAMES) {
      loaderTitle.innerText = name.toUpperCase();
      loadStatus.innerText = `Fetching ${name}...`;
      allData[name] = await fetchSheet(name);
      progress += step;
      loaderBar.style.width = `${Math.min(progress, 100)}%`;
      await new Promise(r => setTimeout(r, 30));
    }
    loaderTitle.innerText = 'READY';
    loadStatus.innerText = 'System Online';
    loaderBar.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => document.getElementById('loader').style.display = 'none', 400);
      renderSheet(currentSheet);
    }, 300);
  }

  function escapeHTML(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m] || m);
  }

  function showCopyNotification() {
    const container = document.getElementById('notif-container');
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `<i class="fas fa-check-circle" style="color:#0f0;"></i> Data berhasil disalin!`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 200); }, 2000);
  }

  function renderAssetsGrid(data) {
    if (!data.length) return '<div class="empty-state">Tidak ada data</div>';
    let html = '<div class="assets-grid">';
    data.forEach(row => {
      const keys = Object.keys(row);
      const title = row[keys[0]] || '-', value = row[keys[1]] || '-', desc = row[keys[2]] || '-';
      html += `<div class="asset-card"><div class="asset-header"><span>${escapeHTML(title)}</span><i class="fas fa-crown" style="color:#ffd700;"></i></div><div class="asset-display">${escapeHTML(value)}</div><div style="padding:0 18px 10px; font-size:0.75rem; color:#8892b0;">${escapeHTML(desc)}</div><div style="padding:0 18px 18px;"><button class="btn-copy-action copy-btn" data-val="${escapeHTML(value)}" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy</button></div></div>`;
    });
    html += '</div>'; return html;
  }

  function renderQna(data) {
    if (!data.length) return '<div class="empty-state">Tidak ada data</div>';
    const keys = Object.keys(data[0]);
    const colA = keys[0], colB = keys[1], colC = keys[2] || null;
    const onlyColC = COPY_COL_C_SHEETS.includes(currentSheet);
    let html = '<table class="qna-table"><thead><tr>';
    html += `<th>${escapeHTML(colA)}</th>`;
    if (colC) html += `<th>${escapeHTML(colB)}</th><th>${escapeHTML(colC)}</th>`;
    else html += `<th>${escapeHTML(colB)}</th>`;
    html += '<th>Copy</th></tr></thead><tbody>';
    data.forEach(row => {
      const v1 = row[keys[0]] || '', v2 = row[keys[1]] || '', v3 = colC ? (row[keys[2]] || '') : '';
      let copyText = onlyColC ? (v3 || v2 || v1) : [v1, v2, v3].filter(Boolean).join(' — ');
      html += `<tr><td>${escapeHTML(v1)}</td>`;
      if (colC) html += `<td>${escapeHTML(v2)}</td><td>${escapeHTML(v3)}</td>`;
      else html += `<td>${escapeHTML(v2)}</td>`;
      html += `<td class="col-action"><button class="copy-trigger copy-btn" data-text="${escapeHTML(copyText)}"><i class="fas fa-copy"></i> Salin</button></td></tr>`;
    });
    html += '</tbody></table>'; return html;
  }

  function renderSidebarLayout(data) {
    if (!data.length) return '<div class="empty-state">Tidak ada data</div>';
    const keys = Object.keys(data[0]);
    let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list"></i> Index</div><div class="sidebar-list">`;
    data.forEach((row, idx) => { html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-caret-right"></i> ${escapeHTML(row[keys[0]] || `Item ${idx + 1}`)}</div>`; });
    html += `</div></div><div class="detail-col" id="detailPanel"><div class="detail-content"><i class="fas fa-info-circle"></i> Pilih item di sidebar</div></div></div>`;
    return html;
  }

  function renderSheet(sheetName) {
    currentSheet = sheetName;
    document.getElementById('pageTitle').innerHTML = sheetName.toUpperCase().replace(/_/g, ' ');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.sheet === sheetName));
    document.getElementById('searchInput').value = '';
    const data = allData[sheetName] || [];
    const container = document.getElementById('tableContainer');
    if (sheetName === 'bonus') {
      container.innerHTML = renderAssetsGrid(data);
    } else if (sheetName === 'PK_anti_audit') {
      container.innerHTML = renderSidebarLayout(data);
      setTimeout(() => {
        const items = document.querySelectorAll('.sidebar-item');
        const panel = document.getElementById('detailPanel');
        if (!items.length) return;
        const update = (idx) => {
          const row = data[idx], keys = Object.keys(row);
          const title = row[keys[0]] || '-', desc = row[keys[2]] || row[keys[1]] || '-';
          panel.innerHTML = `<div class="detail-content"><div style="color:#ff2e63; font-weight:600; font-size:0.95rem;">📌 ${escapeHTML(title)}</div><div style="margin-top:12px; background:rgba(0,0,0,0.3); padding:14px; border-radius:16px; font-size:0.82rem; color:var(--text-secondary); line-height:1.7;">${escapeHTML(desc)}</div><button class="copy-btn" data-desc="${escapeHTML(desc)}" style="margin-top:16px; width:100%; padding:10px; background:rgba(255,46,99,0.1); border:1px solid rgba(255,46,99,0.3); border-radius:40px; color:#ff2e63; cursor:pointer; font-weight:600; font-size:0.8rem; transition:0.2s;"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;
        };
        items.forEach(item => { item.addEventListener('click', () => { items.forEach(i => i.classList.remove('active')); item.classList.add('active'); update(parseInt(item.dataset.index)); }); });
        if (items[0]) { items[0].classList.add('active'); update(0); }
      }, 60);
    } else {
      container.innerHTML = renderQna(data);
    }
  }

  function handleSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const data = allData[currentSheet] || [];
    if (!data.length) return;
    if (currentSheet === 'PK_anti_audit') {
      const items = document.querySelectorAll('.sidebar-item');
      let first = -1;
      items.forEach((item, idx) => { const match = Object.values(data[idx]).some(v => v && String(v).toLowerCase().includes(q)); item.style.display = match ? 'flex' : 'none'; if (match && first === -1) first = idx; });
      const active = document.querySelector('.sidebar-item.active');
      if ((!active || active.style.display === 'none') && first !== -1) document.querySelector(`.sidebar-item[data-index="${first}"]`)?.click();
    } else if (currentSheet === 'bonus') {
      document.getElementById('tableContainer').innerHTML = renderAssetsGrid(data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))));
    } else {
      document.getElementById('tableContainer').innerHTML = renderQna(data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))));
    }
  }

  function addLightningFlash(element) {
    if (!element) return;
    element.style.transition = 'box-shadow 0.1s';
    element.style.boxShadow = '0 0 20px rgba(255,46,99,0.6), inset 0 0 10px rgba(255,46,99,0.2)';
    setTimeout(() => { element.style.boxShadow = ''; }, 250);
  }

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => { addLightningFlash(item); renderSheet(item.dataset.sheet); });
  });
  document.getElementById('refreshBtn').addEventListener('click', () => { addLightningFlash(document.getElementById('refreshBtn')); loadAllSheets(); });
  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    let text = '';
    if (btn.dataset.val && btn.dataset.desc) text = `${btn.dataset.val} — ${btn.dataset.desc}`;
    else if (btn.dataset.text) text = btn.dataset.text;
    else if (btn.dataset.desc) text = btn.dataset.desc;
    if (text) {
      e.preventDefault();
      try { await navigator.clipboard.writeText(text); } catch {}
      showCopyNotification();
      btn.style.transform = 'scale(0.95)';
      setTimeout(() => { if (btn) btn.style.transform = ''; }, 150);
    }
  });
  document.getElementById('searchInput').addEventListener('input', handleSearch);
  loadAllSheets();
</script>
</body>
