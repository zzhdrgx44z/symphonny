<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈 Golden Luxury Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
      }
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #050300; --bg-soft: #0d0a05;
      --surface: rgba(15, 12, 5, 0.65); --surface-solid: #100b06; --surface-hover: rgba(40, 32, 15, 0.8);
      --text: #fef3c7; --text-secondary: #e0c4a0; --text-muted: #7a6244;
      --accent: #f59e0b; --accent-hover: #fbbf24; --accent-soft: rgba(245, 158, 11, 0.08); --accent-light: rgba(245, 158, 11, 0.2);
      --gold: #fbbf24; --gold-soft: rgba(251, 191, 36, 0.1);
      --green: #10b981; --red: #ef4444;
      --border: rgba(245, 158, 11, 0.12); --border-medium: rgba(245, 158, 11, 0.3);
      --radius: 14px; --radius-lg: 24px; --radius-pill: 999px;
      --shadow-card: 0 30px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(245,158,11,0.05) inset;
      --car-amber:#D97706; --car-gold:#F59E0B;
    }
    html, body { height: 100%; width: 100%; overflow-x: hidden; }
    body { 
      font-family: 'Outfit', sans-serif; 
      background: var(--bg); color: var(--text); 
      line-height: 1.6; -webkit-font-smoothing: antialiased; 
      -moz-osx-font-smoothing: grayscale; display: flex; flex-direction:column;
    }

    /* ── WebGL 3D Background ── */
    #bg-canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
    .bg-overlay { 
      position: fixed; inset: 0; z-index: 1; pointer-events: none; 
      background: 
        radial-gradient(ellipse 80% 50% at 50% 0%, rgba(245,158,11,0.1) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 50% 100%, rgba(180,83,9,0.15) 0%, transparent 60%),
        linear-gradient(180deg, rgba(5,3,0,0.2) 0%, rgba(5,3,0,0.6) 100%);
    }
    .vignette { position: fixed; inset: 0; pointer-events: none; z-index: 2; background: radial-gradient(ellipse 70% 60% at 50% 50%, transparent 20%, rgba(0,0,0,0.85) 100%); }

    /* Loader */
    #loader { position: fixed; inset: 0; background: var(--bg); z-index: 99999; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; transition: opacity 0.8s ease, visibility 0.8s ease; }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-brand { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 6rem; color: var(--accent); line-height: 1; text-shadow: 0 0 80px rgba(245,158,11,0.6); animation: loaderPulse 2s ease-in-out infinite; }
    @keyframes loaderPulse { 0%, 100% { opacity: 0.8; transform: scale(1); } 50% { opacity: 1; transform: scale(1.05); } }
    .loader-sub { color: var(--text-muted); font-size: 0.75rem; letter-spacing: 4px; text-transform: uppercase; font-weight: 600; }
    .loader-track { width: 280px; height: 1px; background: var(--border); position: relative; overflow: hidden; }
    .loader-fill { width: 0%; height: 100%; background: linear-gradient(90deg, transparent, var(--gold), transparent); transition: width 0.3s ease; position: absolute; left: 0; box-shadow: 0 0 15px var(--gold); }
    .loader-status { color: var(--text-muted); font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; min-height: 1em; opacity: 0.7; }

    /* Navigation */
    .top-nav { position: relative; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 24px; padding: 16px 36px; background: rgba(5, 3, 0, 0.4); backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%); border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .nav-brand { display: flex; align-items: center; gap: 16px; flex-shrink: 0; }
    .nav-logo { width: 46px; height: 46px; border-radius: 12px; background: linear-gradient(135deg, rgba(245,158,11,0.15), rgba(5,3,0,0.5)); border: 1px solid var(--border-medium); display: flex; align-items: center; justify-content: center; font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 1.8rem; color: var(--accent); font-weight: 600; box-shadow: 0 8px 20px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1); }
    .nav-desc { font-size: 0.8rem; color: var(--text); letter-spacing: 1px; font-weight: 700; line-height: 1.2; text-transform: uppercase; }
    .nav-desc span { display: block; font-size: 0.6rem; color: var(--text-muted); font-weight: 500; letter-spacing: 2px; text-transform: uppercase; }
    .nav-tabs { display: flex; gap: 2px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 4px; overflow-x: auto; max-width: 100%; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab { padding: 10px 20px; border-radius: var(--radius-pill); font-size: 0.75rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); display: flex; align-items: center; gap: 8px; white-space: nowrap; border: none; background: none; font-family: 'Outfit', sans-serif; }
    .nav-tab:hover { color: var(--text); }
    .nav-tab.active { background: linear-gradient(135deg, var(--accent), #b45309); color: #fff; box-shadow: 0 4px 15px rgba(245,158,11,0.3), inset 0 1px 0 rgba(255,255,255,0.2); }
    .nav-right { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .status-pill { display: flex; align-items: center; gap: 10px; padding: 9px 20px; border-radius: var(--radius-pill); background: rgba(16,185,129,0.05); border: 1px solid rgba(16,185,129,0.2); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600; color: var(--green); box-shadow: 0 0 15px rgba(16,185,129,0.1); }
    .status-dot { width: 6px; height: 6px; background: var(--green); border-radius: 50%; animation: dotPulse 2.5s ease-in-out infinite; box-shadow: 0 0 10px var(--green); }
    @keyframes dotPulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.7); } }

    /* Main Content */
    .main { position: relative; z-index: 10; flex: 1; display: flex; flex-direction: column; padding: 28px 40px 180px 40px; min-height: 0; }
    .content-card { background: var(--surface); backdrop-filter: blur(40px) saturate(150%); -webkit-backdrop-filter: blur(40px) saturate(150%); border-radius: var(--radius-lg); border: 1px solid var(--border); display: flex; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; box-shadow: var(--shadow-card); position: relative; }
    .content-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); z-index: 5; opacity: 0.6; }
    .content-card::after { content: ''; position: absolute; inset: -1px; border-radius: var(--radius-lg); background: linear-gradient(135deg, rgba(245,158,11,0.3), transparent 40%, transparent 60%, rgba(245,158,11,0.1)); z-index: -1; filter: blur(8px); opacity: 0.4; transition: opacity 0.3s; }

    .refresh-overlay { position: absolute; inset: 0; background: rgba(5,3,0,0.85); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 20; border-radius: var(--radius-lg); }
    .refresh-overlay.active { display: flex; }
    .refresh-spinner { width: 40px; height: 40px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; box-shadow: 0 0 20px rgba(245,158,11,0.2); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 20px; padding: 28px 36px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: linear-gradient(180deg, rgba(245,158,11,0.02), transparent); }
    .header-title h1 { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2.2rem; color: var(--text); line-height: 1.1; text-shadow: 0 0 30px rgba(245,158,11,0.2); font-weight: 600; }
    .header-title p { font-size: 0.7rem; color: var(--text-muted); margin-top: 4px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; }
    .header-actions { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
    .search-wrap { position: relative; }
    .search-wrap i { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.85rem; pointer-events: none; transition: color 0.2s; }
    .search-wrap input { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: var(--radius-pill); padding: 12px 20px 12px 44px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 0.85rem; width: 280px; outline: none; transition: all 0.3s; font-weight: 500; }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-light), 0 0 20px rgba(245,158,11,0.1); background: rgba(0,0,0,0.6); }

    .btn-refresh { background: linear-gradient(135deg, rgba(245,158,11,0.1), rgba(245,158,11,0.02)); border: 1px solid var(--border-medium); padding: 12px 24px; border-radius: var(--radius-pill); color: var(--accent); font-weight: 600; font-size: 0.75rem; cursor: pointer; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; white-space: nowrap; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 1px; }
    .btn-refresh:hover { background: var(--accent); color: #050300; border-color: transparent; box-shadow: 0 0 25px rgba(245,158,11,0.4); transform: translateY(-1px); }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh.is-loading { opacity: 0.5; pointer-events: none; }
    .btn-refresh .icon-spin { animation: spin 0.8s linear infinite; }

    .table-scroll { flex: 1; overflow-y: auto; overflow-x: auto; -webkit-overflow-scrolling: touch; min-height: 200px; }
    .table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
    .table-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent); }
    .qna-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .qna-table th { text-align: left; padding: 18px 36px; font-weight: 700; color: var(--accent); border-bottom: 1px solid var(--border-medium); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; position: sticky; top: 0; background: var(--surface-solid); backdrop-filter: blur(10px); z-index: 5; }
    .qna-table td { padding: 18px 36px; border-bottom: 1px solid var(--border); color: var(--text-secondary); transition: all 0.2s; font-weight: 400; }
    .qna-table tbody tr { transition: all 0.2s; position: relative; }
    .qna-table tbody tr:hover { background: var(--accent-soft); }
    .qna-table tbody tr:hover td { color: var(--text); }
    .qna-table tbody tr:hover td:first-child { box-shadow: inset 3px 0 0 var(--accent); }
    .col-action button { background: transparent; border: 1px solid var(--border-medium); border-radius: var(--radius-pill); padding: 8px 16px; cursor: pointer; transition: all 0.2s; color: var(--accent); font-size: 0.7rem; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; font-family: 'Outfit', sans-serif; text-transform: uppercase; letter-spacing: 0.5px; }
    .col-action button:hover { background: var(--accent); color: #050300; border-color: transparent; box-shadow: 0 0 15px rgba(245,158,11,0.4); }

    .layout-split { display: flex; flex-direction: row; height: 100%; min-height: 400px; }
    .sidebar-col { width: 320px; flex-shrink: 0; background: rgba(0,0,0,0.2); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }
    .sidebar-col::-webkit-scrollbar { width: 4px; }
    .sidebar-col::-webkit-scrollbar-thumb { background: var(--border-medium); }
    .sidebar-header { padding: 20px 28px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); border-bottom: 1px solid var(--border); font-weight: 700; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.2); }
    .sidebar-count { background: var(--gold-soft); color: var(--gold); padding: 3px 10px; border-radius: var(--radius-pill); font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; border: 1px solid var(--border-medium); }
    .sidebar-item { padding: 18px 28px; font-size: 0.9rem; cursor: pointer; border-left: 3px solid transparent; transition: all 0.3s cubic-bezier(0.4,0,0.2,1); color: var(--text-secondary); display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); font-weight: 500; }
    .sidebar-item:hover { background: var(--surface-hover); color: var(--text); padding-left: 34px; }
    .sidebar-item.active { background: linear-gradient(90deg, var(--accent-soft), transparent); border-left-color: var(--accent); color: var(--accent); font-weight: 600; }
    .sidebar-item .item-num { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-muted); min-width: 20px; }

    .detail-col { flex: 1; padding: 48px 52px; overflow-y: auto; display: flex; flex-direction: column; }
    .detail-content { animation:slideUp 0.5s cubic-bezier(0.4,0,0.2,1); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .detail-title { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 2rem; color: var(--gold); margin-bottom: 32px; display: flex; align-items: center; gap: 14px; line-height: 1.3; text-shadow: 0 0 30px rgba(251,191,36,0.2); font-weight: 600; }
    .detail-title i { font-size: 1rem; opacity: 0.6; }
    .detail-body { background: rgba(0,0,0,0.3); padding: 36px; border-radius: var(--radius); font-size: 1rem; color: var(--text-secondary); line-height: 2.1; white-space: pre-wrap; border: 1px solid var(--border); box-shadow: inset 0 1px 0 rgba(255,255,255,0.03); }
    .detail-copy-btn { margin-top: 32px; width: 100%; padding: 18px; background: linear-gradient(135deg, rgba(245,158,11,0.05), rgba(245,158,11,0.01)); border: 1px solid var(--border-medium); border-radius: var(--radius); color: var(--accent); cursor: pointer; font-weight: 700; font-size: 0.85rem; transition: all 0.3s; display: flex; align-items: center; justify-content: center; gap: 12px; text-transform: uppercase; letter-spacing: 2px; font-family: 'Outfit', sans-serif; }
    .detail-copy-btn:hover { background: linear-gradient(135deg, var(--accent), #b45309); color: #050300; border-color: transparent; box-shadow: 0 10px 30px rgba(245,158,11,0.3); transform: translateY(-2px); }

    .empty-state { padding: 100px 20px; text-align: center; color: var(--text-muted); font-size: 1rem; }
    .empty-state i { font-size: 3rem; margin-bottom: 20px; display: block; opacity: 0.15; }

    #notif-container { position: fixed; bottom: 170px; right: 32px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast { pointer-events: auto; background: var(--surface-solid); border: 1px solid var(--border-medium); border-left: 4px solid var(--green); padding: 18px 24px; border-radius: var(--radius); font-size: 0.9rem; font-weight: 500; display: flex; align-items: center; gap: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.6); animation: toastIn 0.4s cubic-bezier(0.4,0,0.2,1); transition: all 0.3s; backdrop-filter: blur(20px); }
    .toast.toast-success { border-left-color: var(--green); box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(16,185,129,0.1); }
    .toast.toast-success i { color: var(--green); }
    .toast.toast-info { border-left-color: var(--accent); box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px rgba(245,158,11,0.1); }
    .toast.toast-info i { color: var(--accent); }
    @keyframes toastIn { from { transform: translateX(120%) scale(0.9); opacity: 0; } to { transform: translateX(0) scale(1); opacity: 1; } }

    .row-anim { animation:slideUp 0.4s ease both; }

    /* ── Cinematic Car Animation Layer (Carbon-Gold Luxury) ── */
    .animation-layer{position:fixed;bottom:0;left:0;width:100%;height:160px;pointer-events:none;z-index:40;}
    .road-surface{position:absolute;bottom:0;left:0;width:100%;height:85px;z-index:2;background:linear-gradient(180deg,rgba(245,158,11,0.05),#100b06 10%,#070503 40%,#000);overflow:hidden;border-top:1px solid rgba(245,158,11,0.15);}
    .road-edge-top{position:absolute;top:-1px;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(217,119,6,0.4) 10%,rgba(251,191,36,0.9) 50%,rgba(217,119,6,0.4) 90%,transparent);box-shadow:0 0 20px rgba(217,119,6,0.4),0 0 40px rgba(217,119,6,0.15);}
    .lane-center{position:absolute;top:45px;left:0;width:200%;height:3px;background:repeating-linear-gradient(90deg,transparent 0px,transparent 35px,rgba(251,191,36,0.7) 35px,rgba(251,191,36,0.7) 75px,transparent 75px,transparent 110px);animation:laneScroll 0.6s linear infinite;will-change:transform;box-shadow:0 0 12px rgba(251,191,36,0.4);filter:blur(0.5px);}
    @keyframes laneScroll{0%{transform:translateX(0);}100%{transform:translateX(-110px);}}
    .road-light-streak{position:absolute;top:0;left:0;width:100%;height:85px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.03) 20%,rgba(245,158,11,0.06) 50%,rgba(245,158,11,0.03) 80%,transparent);animation:streakPulse 4s ease-in-out infinite alternate;}
    @keyframes streakPulse{0%{opacity:0.5;}100%{opacity:1;}}

    .street-lights{position:absolute;bottom:84px;left:0;width:100%;height:45px;z-index:3;}
    .street-light{position:absolute;bottom:0;width:2px;height:38px;background:linear-gradient(to top,rgba(255,255,255,0.08),transparent);}
    .street-light::after{content:'';position:absolute;top:-4px;left:-6px;width:14px;height:8px;border-radius:50%;}
    .street-light:nth-child(odd)::after{background:var(--car-amber);box-shadow:0 0 15px var(--car-amber);animation:sA 2.5s ease-in-out infinite alternate;}
    .street-light:nth-child(even)::after{background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.9);animation:sW 2.5s ease-in-out infinite alternate;}
    @keyframes sA{0%{opacity:0.3;}100%{opacity:1;}}@keyframes sW{0%{opacity:1;}100%{opacity:0.3;}}
    .light-cone{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:100px;height:75px;clip-path:polygon(35% 0%,65% 0%,100% 100%,0% 100%);background:linear-gradient(to bottom,rgba(217,119,6,0.08),transparent);}
    .street-light:nth-child(1){left:4%;}.street-light:nth-child(2){left:20%;}.street-light:nth-child(3){left:38%;}.street-light:nth-child(4){left:56%;}.street-light:nth-child(5){left:74%;}.street-light:nth-child(6){left:92%;}

    .car-layer{position:absolute;bottom:0;left:0;width:100%;height:85px;z-index:6;overflow:visible;}
    .cyber-car{position:absolute;width:200px;height:65px;will-change:transform;}
    .cyber-car svg{filter:drop-shadow(0 10px 25px rgba(0,0,0,0.9)) drop-shadow(0 0 10px rgba(217,119,6,0.25));}
    .car-hover-anim{animation:carFloat 1.8s ease-in-out infinite alternate;}
    @keyframes carFloat{0%{transform:translateY(0);}100%{transform:translateY(-3px);}}

    .headlight-beam{position:absolute;top:18px;width:140px;height:36px;opacity:0.35;filter:blur(2px);}
    .headlight-beam.beam-left{right:100%;margin-right:-5px;background:linear-gradient(to left,rgba(255,255,215,0.9),transparent);clip-path:polygon(100% 16%,100% 84%,0% 100%,0% 0%);}
    .lens-flare{position:absolute;width:12px;height:12px;border-radius:50%;background:#ffffcc;}
    .lens-flare.flare-left{right:2px;top:18px;box-shadow:0 0 20px 8px rgba(255,255,200,0.7);}
    .taillight-bar{position:absolute;height:5px;border-radius:2px;background:#ef4444;box-shadow:0 0 15px #ef4444, 0 0 5px #fff;}
    .taillight-bar.tl-left{left:4px;top:22px;width:20px;}

    .thruster{position:absolute;height:7px;border-radius:0 4px 4px 0;animation:thrusterPulse 0.12s ease-in-out infinite alternate;will-change:transform;filter:blur(1px);}
    .thruster.thruster-left{left:-28px;top:24px;width:30px;transform-origin:right center;background:linear-gradient(to left,rgba(217,119,6,1),transparent);box-shadow:0 0 15px rgba(217,119,6,0.6);}
    .thruster.thruster-gold{left:-28px;top:24px;width:30px;transform-origin:right center;background:linear-gradient(to left,rgba(251,191,36,1),transparent);box-shadow:0 0 15px rgba(251,191,36,0.6);}
    @keyframes thrusterPulse{0%{transform:scaleX(0.6);opacity:0.5;}100%{transform:scaleX(1.4);opacity:1;}}

    .underglow-layer{position:absolute;bottom:0;border-radius:50%;pointer-events:none;}
    .underglow-outer{left:5%;width:90%;height:22px;filter:blur(12px);animation:uOuter 1s ease-in-out infinite alternate;}
    .underglow-inner{left:15%;width:70%;height:14px;filter:blur(5px);animation:uInner 0.5s ease-in-out infinite alternate;}
    .underglow-core{left:25%;width:50%;height:6px;filter:blur(1px);background:white;opacity:0.4;animation:uCore 0.25s ease-in-out infinite alternate;}
    @keyframes uOuter{0%{opacity:0.3;}100%{opacity:0.7;}}@keyframes uInner{0%{opacity:0.4;}100%{opacity:0.9;}}@keyframes uCore{0%{opacity:0.2;}100%{opacity:0.6;}}

  <script type="module">
    import * as THREE from 'three';

    const canvas = document.getElementById('bg-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 5;

    // Golden Stardust Particles
    const particleCount = 2000;
    const positions = new Float32Array(particleCount * 3);
    const colors = new Float32Array(particleCount * 3);

    const goldColor = new THREE.Color(0xf59e0b);
    const yellowColor = new THREE.Color(0xfef3c7);

    for (let i = 0; i < particleCount; i++) {
      positions[i * 3] = (Math.random() - 0.5) * 20;
      positions[i * 3 + 1] = (Math.random() - 0.5) * 20;
      positions[i * 3 + 2] = (Math.random() - 0.5) * 10;

      const mixedColor = goldColor.clone().lerp(yellowColor, Math.random());
      colors[i * 3] = mixedColor.r;
      colors[i * 3 + 1] = mixedColor.g;
      colors[i * 3 + 2] = mixedColor.b;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

    const material = new THREE.PointsMaterial({
      size: 0.04,
      vertexColors: true,
      transparent: true,
      opacity: 0.7,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    let mouseX = 0, mouseY = 0;
    document.addEventListener('mousemove', (e) => {
      mouseX = (e.clientX / window.innerWidth - 0.5) * 0.5;
      mouseY = (e.clientY / window.innerHeight - 0.5) * 0.5;
    });

    function animate() {
      requestAnimationFrame(animate);
      particles.rotation.y += 0.0005;
      particles.rotation.x += 0.0002;
      
      camera.position.x += (mouseX - camera.position.x) * 0.05;
      camera.position.y += (-mouseY - camera.position.y) * 0.05;
      camera.lookAt(scene.position);

      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>

  <!-- Speed Particles & Data Logic Script -->
  <script>
    /* ── Speed Particles Canvas ── */
    const sC=document.getElementById('speed-particles'),sX=sC.getContext('2d');
    let speedDots=[];const sColors=['#D97706','#F59E0B','#B45309','#92400E','#fbbf24','#fef3c7'];
    function setupSpeedCanvas(){const r=document.querySelector('.road-surface');if(!r)return;sC.style.width=r.offsetWidth+'px';sC.style.height=r.offsetHeight+'px';const dpr=window.devicePixelRatio||1;sC.width=r.offsetWidth*dpr;sC.height=r.offsetHeight*dpr;sX.scale(dpr,dpr);initSpeedDots();}
    function initSpeedDots(){speedDots=[];const rect=sC.getBoundingClientRect();if(!rect.width)return;for(let i=0;i<60;i++){const gr=Math.random()>0.5;speedDots.push({x:Math.random()*rect.width,y:gr?(rect.height*0.2+Math.random()*16):(rect.height*0.65+Math.random()*16),s:(Math.random()*7+4)*(gr?1:-1),l:Math.random()*30+8,a:Math.random()*0.4+0.1,c:sColors[Math.floor(Math.random()*sColors.length)]});}}
    function animSpeed(){const sW=sC.getBoundingClientRect().width,sH=sC.getBoundingClientRect().height;if(!sW)return requestAnimationFrame(animSpeed);sX.clearRect(0,0,sW,sH);sX.globalCompositeOperation='lighter';for(let d of speedDots){sX.globalAlpha=d.a;sX.strokeStyle=d.c;sX.lineWidth=1.5;sX.beginPath();sX.moveTo(d.x,d.y);sX.lineTo(d.x-d.l*Math.sign(d.s),d.y);sX.stroke();d.x+=d.s;if(d.x>sW+30||d.x<-30){d.x=d.s>0?-15:sW+15;d.y=(Math.random()>0.5)?(sH*0.2+Math.random()*16):(sH*0.65+Math.random()*16);}}sX.globalCompositeOperation='source-over';sX.globalAlpha=1;requestAnimationFrame(animSpeed);}
    setupSpeedCanvas();animSpeed();
    let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(setupSpeedCanvas,200);});

    /* ── Data Logic ── */
    const SID='19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
    const SHEETS=['bonus','PK_anti_audit','PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
    const COPY_COL3=['PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
    const SIDEBAR_SHEETS=['bonus','PK_anti_audit'];
    let allData={},currentSheet='bonus',isRefreshing=false;

    async function fetchSheet(sn){try{const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sn)}`);const t=await r.text();const j=JSON.parse(t.substring(47,t.length-2));if(!j.table?.rows)return[];const c=j.table.cols||[],h=c.map(col=>col.label||`col_${col.id}`);return j.table.rows.map(row=>{const o={};row.c?.forEach((cell,idx)=>{o[h[idx]||`col_${idx}`]=cell?cell.v:null;});return o;});}catch(e){return[];}}

    async function loadAllSheets(silent){if(!silent){let p=0;const step=100/SHEETS.length;const lb=document.getElementById('loaderBar'),ls=document.getElementById('load-status');for(const n of SHEETS){ls.innerText=`Syncing ${n.replace(/_/g,' ')}...`;allData[n]=await fetchSheet(n);p+=step;lb.style.width=`${Math.min(p,100)}%`;await new Promise(r=>setTimeout(r,50));}ls.innerText='System Ready';lb.style.width='100%';setTimeout(()=>{document.getElementById('loader').classList.add('hidden');renderSheet(currentSheet);},600);}else{for(const n of SHEETS)allData[n]=await fetchSheet(n);renderSheet(currentSheet);}}

    async function handleRefresh(){if(isRefreshing)return;isRefreshing=true;const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon'),text=document.getElementById('refreshText'),ov=document.getElementById('refreshOverlay');btn.classList.add('is-loading');icon.classList.add('icon-spin');text.textContent='Syncing...';ov.classList.add('active');try{await loadAllSheets(true);showToast('Data berhasil disinkronisasi!','success');}catch(e){showToast('Gagal memuat data.','info');}ov.classList.remove('active');btn.classList.remove('is-loading');icon.classList.remove('icon-spin');text.textContent='Sinkron';isRefreshing=false;}

    function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]||m);}

    function renderQna(data){if(!data.length)return'<div class="empty-state"><i class="fas fa-inbox"></i>Tidak ada data</div>';const k=Object.keys(data[0]),cA=k[0],cB=k[1],cC=k[2]||null,oC=COPY_COL3.includes(currentSheet);let h=`<table class="qna-table"><thead><tr><th>${esc(cA)}</th>${cC?`<th>${esc(cB)}</th><th>${esc(cC)}</th>`:`<th>${esc(cB)}</th>`}<th style="width:100px;">Aksi</th></tr></thead><tbody>`;data.forEach((r,i)=>{const v1=r[k[0]]||'',v2=r[k[1]]||'',v3=cC?(r[k[2]]||''):'';let ct=oC?(v3||v2||v1):[v1,v2,v3].filter(Boolean).join(' — ');h+=`<tr class="row-anim" style="animation-delay:${i*0.02}s"><td>${esc(v1)}</td>${cC?`<td>${esc(v2)}</td><td>${esc(v3)}</td>`:`<td>${esc(v2)}</td>`}<td class="col-action"><button class="copy-btn" data-text="${esc(ct)}"><i class="fas fa-copy"></i> Salin</button></td></tr>`;});h+='</tbody></table>';return h;}

    function renderSidebarLayout(data){if(!data.length)return'<div class="empty-state"><i class="fas fa-inbox"></i>Tidak ada data</div>';const k=Object.keys(data[0]);let h=`<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list" style="font-size:0.6rem;"></i> Index <span class="sidebar-count">${data.length}</span></div><div class="sidebar-list">`;data.forEach((r,i)=>{h+=`<div class="sidebar-item" data-index="${i}"><span class="item-num">${String(i+1).padStart(2,'0')}</span> ${esc(r[k[0]]||`Item ${i+1}`)}</div>`;});h+=`</div></div><div class="detail-col" id="detailPanel"><div class="detail-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-muted);gap:20px;"><i class="fas fa-arrow-left" style="font-size:2rem;opacity:0.15;"></i><span style="font-size:0.9rem;letter-spacing:1px;">Pilih item dari daftar</span></div></div></div>`;return h;}

    function initSidebarInteraction(data){const items=document.querySelectorAll('.sidebar-item'),panel=document.getElementById('detailPanel');if(!items.length)return;const k=Object.keys(data[0]);const update=i=>{const r=data[i],t=r[k[0]]||'-';const dp=[];for(let j=1;j<k.length;j++){const v=r[k[j]];if(v)dp.push(v);}const d=dp.join('\n\n')||'-';panel.innerHTML=`<div class="detail-content"><div class="detail-title"><i class="fas fa-bookmark"></i> ${esc(t)}</div><div class="detail-body">${esc(d)}</div><button class="copy-btn detail-copy-btn" data-desc="${esc(d)}"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;};items.forEach(item=>{item.addEventListener('click',()=>{items.forEach(i=>i.classList.remove('active'));item.classList.add('active');update(parseInt(item.dataset.index));});});if(items[0]){items[0].classList.add('active');update(0);}}

    function renderSheet(sn){currentSheet=sn;const dn={'bonus':'BONUS','PK_anti_audit':'PK ANTI AUDIT','PK_LULUS_SENSOR_AUDIT':'PK LULUS AUDIT','seputar_gantirek':'GANTI REK','seputar_pk':'SEPUTAR PK'};document.getElementById('pageTitle').textContent=dn[sn]||sn.replace(/_/g,' ').toUpperCase();document.getElementById('pageSubtitle').textContent='Database Inspeksi';document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.sheet===sn));document.getElementById('searchInput').value='';const data=allData[sn]||[],c=document.getElementById('tableContainer');if(SIDEBAR_SHEETS.includes(sn)){c.innerHTML=renderSidebarLayout(data);setTimeout(()=>initSidebarInteraction(data),50);}else{c.innerHTML=renderQna(data);}}

    function handleSearch(){const q=document.getElementById('searchInput').value.toLowerCase(),data=allData[currentSheet]||[];if(!data.length)return;if(SIDEBAR_SHEETS.includes(currentSheet)){const items=document.querySelectorAll('.sidebar-item');let f=-1;items.forEach((item,i)=>{const m=Object.values(data[i]).some(v=>v&&String(v).toLowerCase().includes(q));item.style.display=m?'flex':'none';if(m&&f===-1)f=i;});const a=document.querySelector('.sidebar-item.active');if((!a||a.style.display==='none')&&f!==-1)document.querySelector(`.sidebar-item[data-index="${f}"]`)?.click();}else{document.getElementById('tableContainer').innerHTML=renderQna(data.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(q))));}}

    async function copyText(text){try{await navigator.clipboard.writeText(text);return true;}catch{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');return true;}catch{return false;}finally{document.body.removeChild(ta);}}}

    function showToast(msg,type){const c=document.getElementById('notif-container'),t=document.createElement('div');t.className='toast toast-'+(type||'success');const ic=type==='info'?'fa-circle-info':'fa-circle-check';t.innerHTML=`<i class="fas ${ic}"></i> ${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px) scale(0.95)';setTimeout(()=>t.remove(),300);},3000);}

    function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB');}
    setInterval(updateClock,1000);updateClock();

    document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',()=>renderSheet(tab.dataset.sheet));});
    document.getElementById('refreshBtn').addEventListener('click',handleRefresh);
    document.getElementById('searchInput').addEventListener('input',handleSearch);
    document.addEventListener('click',async e=>{const btn=e.target.closest('.copy-btn');if(!btn)return;let t=btn.dataset.text||btn.dataset.desc||'';if(t){e.preventDefault();const ok=await copyText(t);if(ok)showToast('Berhasil disalin!','success');else showToast('Gagal menyalin.','info');btn.style.transform='scale(0.92)';setTimeout(()=>{if(btn)btn.style.transform='';},180);}});

    loadAllSheets(false);
  </script>
</body>
</html>
