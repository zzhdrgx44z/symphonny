<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>沈 · LINE TOGEL HUB // HD TERMINAL v2.1</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    /* ===== ROOT VARIABLES & GLOBAL RESET ===== */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    :root {
      --bg-core: #02040a;
      --bg-panel: rgba(10, 15, 25, 0.68);
      --accent-primary: #FFD600;
      --accent-secondary: #FFEA00;
      --accent-tertiary: #FF9100;
      --accent-hot: #FF3366;
      --text-main: #ffffff;
      --text-muted: #5a6a7a;
      --border-glass: rgba(255, 214, 0, 0.25);
      --glow-primary: rgba(255, 214, 0, 0.55);
      --glass-blur: 22px;
      --noise-opacity: 0.04;
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-core);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex; flex-direction: column;
      font-size: 15px;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    /* HD NOISE TEXTURE */
    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: var(--noise-opacity);
      pointer-events: none;
      z-index: 9999;
    }

    /* MOUSE GLOW */
    #mouse-glow {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(circle 600px at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 214, 0, 0.05), transparent 80%);
      transition: background 0.2s ease-out;
    }

    /* PERSPECTIVE GRID */
    .perspective-grid {
      position: fixed;
      bottom: 0; left: 0;
      width: 200%; height: 50vh;
      background-image: linear-gradient(transparent 98%, rgba(255, 214, 0, 0.12) 98%), linear-gradient(90deg, transparent 98%, rgba(255, 214, 0, 0.12) 98%);
      background-size: 100px 100px;
      transform: perspective(500px) rotateX(65deg) translateZ(-200px) translateY(100px) translateX(-25%);
      z-index: 0;
      animation: gridMove 20s linear infinite;
      mask-image: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 100%);
    }
    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 100px; } }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.8) 100%);
      pointer-events: none; z-index: 0;
    }
    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.15) 50%, rgba(0,0,0,0.15));
      background-size: 100% 4px; opacity: 0.3;
    }
    .scan-sweep {
      position: fixed; top: 0; left: 0; width: 100%; height: 6px;
      background: linear-gradient(to bottom, transparent, var(--accent-primary), transparent);
      opacity: 0.8; z-index: 9997; animation: sweep 6s ease-in-out infinite; pointer-events: none; filter: blur(1px);
    }
    @keyframes sweep { 0% { top: -10%; opacity: 0; } 20% { opacity: 0.8; } 100% { top: 110%; opacity: 0; } }

    /* HUD STATS */
    .hud-stats {
      position: fixed;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent-primary);
      z-index: 20;
      pointer-events: none;
      text-shadow: 0 0 8px var(--glow-primary);
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 214, 0, 0.15);
      border-radius: 4px;
      padding: 10px;
    }
    .hs-tl { top: 90px; left: 20px; }
    .hs-br { bottom: 140px; right: 20px; text-align: right; }
    .hud-val { color: #fff; font-weight: 600; }
    .hud-line { margin-bottom: 5px; display: flex; gap: 6px; align-items: center; }

    /* TOP BAR */
    .hazard-bar {
      position: fixed; top: 0; left: 0; width: 100%; height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-tertiary), var(--accent-primary));
      z-index: 100; box-shadow: 0 2px 10px var(--glow-primary);
    }

    /* GLASS NAVIGATION */
    .top-nav {
      height: 75px;
      background: linear-gradient(180deg, rgba(20, 25, 35, 0.92) 0%, rgba(10, 15, 25, 0.96) 100%);
      border-bottom: 1px solid rgba(255, 214, 0, 0.15);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 30px;
      position: relative; z-index: 10;
      margin-top: 3px;
      backdrop-filter: blur(var(--glass-blur));
    }
    .brand { display: flex; align-items: center; gap: 16px; border-right: 1px solid rgba(255,255,255,0.05); padding-right: 30px; }
    .logo-box {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, rgba(255,214,0,0.1) 0%, rgba(0,0,0,0) 100%);
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 700;
      border-radius: 8px;
      transition: all 0.3s;
      box-shadow: 0 0 15px rgba(255, 214, 0, 0.2);
    }
    .brand:hover .logo-box { background: var(--accent-primary); color: #000; box-shadow: 0 0 30px var(--glow-primary); }
    .brand-text h1 {
      font-family: 'Orbitron', sans-serif; font-size: 1.4rem;
      text-transform: uppercase; letter-spacing: 4px;
      color: var(--accent-primary); font-weight: 900;
      text-shadow: 0 0 15px rgba(255, 214, 0, 0.5);
    }
    .brand-text span { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; color: #aaa; letter-spacing: 3px; }

    .nav-menu { display: flex; height: 100%; align-items: center; gap: 8px; flex-wrap: wrap; }
    .nav-item {
      padding: 10px 18px;
      color: var(--text-muted);
      font-size: 0.75rem; text-transform: uppercase; font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; gap: 8px;
      border-radius: 4px;
      background: transparent;
      border: 1px solid transparent;
    }
    .nav-item:hover { color: var(--accent-primary); background: rgba(255, 214, 0, 0.05); border-color: rgba(255, 214, 0, 0.2); }
    .nav-item.active {
      color: #000;
      background: linear-gradient(180deg, var(--accent-secondary) 0%, var(--accent-primary) 100%);
      border-color: transparent;
      box-shadow: 0 0 20px var(--glow-primary);
      font-weight: 700;
    }
    .status-box {
      font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem;
      background: rgba(255,255,255,0.03); padding: 8px 16px;
      border-radius: 4px; border: 1px solid rgba(255,255,255,0.05);
    }
    .status-indicator { width: 6px; height: 6px; background: #0f0; border-radius: 50%; box-shadow: 0 0 8px #0f0; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* MAIN PANEL */
    .main { flex: 1; padding: 25px; padding-bottom: 130px; position: relative; z-index: 2; }
    .content-wrapper {
      background: var(--bg-panel);
      border: 1px solid rgba(255, 214, 0, 0.2);
      backdrop-filter: blur(25px);
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.03) inset;
    }
    .tech-corner { position: absolute; width: 20px; height: 20px; z-index: 20; transition: 0.2s; }
    .tc-tl { top: -1px; left: -1px; border-top: 2px solid var(--accent-primary); border-left: 2px solid var(--accent-primary); }
    .tc-tr { top: -1px; right: -1px; border-top: 2px solid var(--accent-primary); border-right: 2px solid var(--accent-primary); }
    .tc-bl { bottom: -1px; left: -1px; border-bottom: 2px solid var(--accent-primary); border-left: 2px solid var(--accent-primary); }
    .tc-br { bottom: -1px; right: -1px; border-bottom: 2px solid var(--accent-primary); border-right: 2px solid var(--accent-primary); }
    .corner-deco {
      position: absolute; width: 130px; height: 32px;
      background: linear-gradient(90deg, var(--accent-primary) 0%, var(--accent-tertiary) 100%);
      display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 700; font-size: 0.7rem;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 5; top: 0; right: 0;
      clip-path: polygon(20px 0, 100% 0, 100% 100%, 0 100%);
    }
    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 18px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, transparent 100%);
    }
    .title-badge {
      border: 1px solid var(--accent-primary); color: var(--accent-primary);
      padding: 5px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem;
    }
    .title-main h1 { font-family: 'Orbitron', sans-serif; font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; }
    .search-box input {
      width: 280px; padding: 12px 18px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      color: #fff; font-family: 'Rajdhani', sans-serif; border-radius: 4px;
    }
    .search-box input:focus { border-color: var(--accent-primary); outline: none; box-shadow: 0 0 15px rgba(255,214,0,0.1); }
    .btn-industrial {
      background: linear-gradient(180deg, rgba(40,45,55,0.6) 0%, rgba(20,25,30,0.9) 100%);
      border: 1px solid rgba(255,255,255,0.08); color: #ccc;
      padding: 12px 18px; font-weight: 700; text-transform: uppercase;
      cursor: pointer; border-radius: 4px; transition: all 0.2s;
      display: inline-flex; gap: 10px;
    }
    .btn-industrial:hover { border-color: var(--accent-primary); color: var(--accent-primary); transform: translateY(-1px); }
    .data-card { padding: 20px; min-height: 500px; }
    .table-scroll { max-height: 65vh; overflow-y: auto; }
    .table-scroll::-webkit-scrollbar { width: 4px; background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: rgba(255, 214, 0, 0.3); }

    /* ASSETS GRID */
    .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .asset-card {
      background: linear-gradient(135deg, rgba(30, 35, 45, 0.5) 0%, rgba(15, 20, 30, 0.7) 100%);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 6px;
      transition: 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      overflow: hidden;
    }
    .asset-card:hover { transform: translateY(-4px); border-color: var(--accent-primary); box-shadow: 0 10px 30px rgba(0,0,0,0.4), 0 0 0 1px var(--accent-primary); }
    .asset-header { padding: 16px 18px; display: flex; justify-content: space-between; background: rgba(0,0,0,0.3); border-bottom: 1px solid rgba(255,255,255,0.04); }
    .asset-id-badge { border-left: 3px solid var(--accent-primary); padding: 4px 10px; font-family: monospace; color: var(--accent-primary); }
    .asset-display { margin: 16px 18px; background: rgba(0,0,0,0.5); padding: 18px; border-radius: 4px; text-align: center; }
    .asset-value { font-family: monospace; font-size: 1rem; color: #fff; word-break: break-all; }
    .asset-actions { padding: 0 18px 18px; }
    
    /* COPY BUTTON EFFECT */
    .btn-copy-action, .btn-copy-desc {
      width: 100%; background: transparent; border: 1px solid var(--accent-primary);
      color: var(--accent-primary); padding: 12px; text-transform: uppercase;
      font-weight: 700; cursor: pointer; border-radius: 4px;
      transition: all 0.2s;
      position: relative; overflow: hidden;
    }
    .btn-copy-action:hover, .btn-copy-desc:hover { background: rgba(255, 214, 0, 0.1); box-shadow: 0 0 15px rgba(255, 214, 0, 0.2); }
    
    /* Class for the flash effect */
    .copy-flash-active {
      background: var(--accent-primary) !important;
      color: #000 !important;
      box-shadow: 0 0 30px var(--accent-primary), 0 0 60px var(--accent-secondary) !important;
      border-color: #fff !important;
      transform: scale(1.05);
    }

    /* LIGHT BURST VISUAL EFFECT (Appended to body) */
    .light-burst-ring {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      border: 2px solid var(--accent-primary);
      box-shadow: 0 0 20px var(--accent-primary), inset 0 0 20px var(--accent-primary);
      animation: burstExpand 0.6s ease-out forwards;
      transform: translate(-50%, -50%);
    }
    @keyframes burstExpand {
      0% { width: 0; height: 0; opacity: 1; }
      100% { width: 200px; height: 200px; opacity: 0; }
    }

    /* SIDEBAR LAYOUT */
    .layout-split { display: flex; height: 100%; gap: 1px; background: rgba(255,255,255,0.05); }
    .sidebar-col { width: 280px; background: rgba(0,0,0,0.4); display: flex; flex-direction: column; }
    .sidebar-header { padding: 16px 20px; background: rgba(0,0,0,0.5); color: var(--accent-primary); font-weight: 700; display: flex; justify-content: space-between; }
    .sidebar-item { padding: 14px 20px; cursor: pointer; color: #aaa; display: flex; align-items: center; gap: 12px; border-left: 2px solid transparent; border-bottom: 1px solid rgba(255,255,255,0.02); }
    .sidebar-item:hover { background: rgba(255,214,0,0.05); color: #fff; }
    .sidebar-item.active { background: rgba(255,214,0,0.1); color: var(--accent-primary); border-left-color: var(--accent-primary); }
    .detail-col { flex: 1; padding: 25px; overflow-y: auto; }
    .detail-content { background: rgba(10,15,25,0.6); border: 1px solid rgba(255,214,0,0.1); padding: 25px; border-radius: 4px; }
    .detail-key-title { font-size: 1.2rem; color: #fff; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; }
    .detail-desc-box { background: rgba(0,0,0,0.5); border-left: 3px solid var(--accent-primary); padding: 20px; margin: 16px 0; }
    .btn-copy-desc { background: transparent; border: 1px solid var(--accent-primary); color: var(--accent-primary); padding: 14px; width: 100%; text-transform: uppercase; font-weight: 700; cursor: pointer; }

    /* TABLE QNA */
    .qna-table { width: 100%; border-collapse: collapse; }
    .qna-table th { text-align: left; padding: 14px; color: var(--text-muted); font-size: 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .qna-table td { padding: 16px; color: #ccc; border-bottom: 1px solid rgba(255,255,255,0.02); vertical-align: middle; }

    /* EMPTY STATE 3D HOLOGRAM */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; }
    .holo-cube-wrapper { width: 120px; height: 120px; perspective: 800px; margin-bottom: 30px; }
    .holo-cube { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: cubeRotate 12s linear infinite; }
    .holo-face { position: absolute; width: 120px; height: 120px; border: 1px solid rgba(255,214,0,0.5); background: radial-gradient(circle at center, rgba(255,214,0,0.05) 0%, transparent 70%); }
    .face-front { transform: translateZ(60px); }
    .face-back { transform: rotateY(180deg) translateZ(60px); }
    .face-right { transform: rotateY(90deg) translateZ(60px); }
    .face-left { transform: rotateY(-90deg) translateZ(60px); }
    .face-top { transform: rotateX(90deg) translateZ(60px); }
    .face-bottom { transform: rotateX(-90deg) translateZ(60px); }
    @keyframes cubeRotate { 0% { transform: rotateX(-20deg) rotateY(0deg); } 100% { transform: rotateX(-20deg) rotateY(360deg); } }
    .holo-ring { position: absolute; border-radius: 50%; border: 1px solid rgba(255,214,0,0.3); animation: ringPulse 3s infinite; }
    .ring-1 { width: 160px; height: 160px; } .ring-2 { width: 180px; height: 180px; animation-delay: 1s; }
    @keyframes ringPulse { 0%,100%{ transform: scale(1); opacity:0.3; } 50%{ transform: scale(1.1); opacity:0.6; } }

    /* ROAD ANIMATION */
    .animation-layer { position: fixed; bottom: 0; left: 0; width: 100%; height: 130px; pointer-events: none; z-index: 999; background: linear-gradient(to top, #030303, transparent); }
    .road-container { position: absolute; bottom: 0; width: 100%; height: 50px; background: #020202; border-top: 1px solid rgba(255,214,0,0.2); }
    .road-lines { position: absolute; top: 25px; width: 200%; height: 2px; background: repeating-linear-gradient(90deg, transparent, transparent 30px, var(--accent-primary) 30px, var(--accent-primary) 60px); animation: roadMove 0.8s linear infinite; }
    @keyframes roadMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
    .cyber-car { position: absolute; bottom: 10px; width: 150px; height: 60px; filter: drop-shadow(0 0 12px gold); }
    .car-cruiser { right: -180px; animation: driveLeft 18s linear infinite; }
    .car-interceptor { left: -180px; animation: driveRight 14s linear infinite; transform: scaleX(-1); }
    @keyframes driveLeft { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-100vw - 220px)); } }
    @keyframes driveRight { 0% { transform: translateX(0) scaleX(-1); } 100% { transform: translateX(calc(100vw + 220px)) scaleX(-1); } }
    .wheel { position: absolute; bottom: -4px; width: 16px; height: 16px; background: #000; border: 2px solid #aaa; border-radius: 50%; animation: spinWheel 0.2s linear infinite; }
    .w-front { right: 14px; } .w-back { left: 18px; }
    @keyframes spinWheel { to { transform: rotate(360deg); } }

    /* NOTIFICATION */
    #notif-container { position: fixed; bottom: 150px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 10px; }
    .toast-notification { background: #0a0f1a; border: 1px solid var(--accent-primary); padding: 14px 22px; color: #fff; backdrop-filter: blur(12px); animation: slideIn 0.3s ease; box-shadow: 0 0 20px rgba(255, 214, 0, 0.4); }
    @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* LOADER */
    #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #050505, #000); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.6s; }
    .loader-bar-container { width: 200px; height: 2px; background: #222; margin-top: 20px; overflow: hidden; }
    .loader-bar { height: 100%; width: 0%; background: var(--accent-primary); box-shadow: 0 0 12px gold; }
    .loader-text { color: #777; font-family: monospace; margin-top: 12px; }

    @media (max-width: 1024px) { .top-nav { flex-direction: column; height: auto; gap: 12px; } .nav-menu { justify-content: center; } .sidebar-col { width: 100%; } .layout-split { flex-direction: column; } .hud-stats { display: none; } }
  </style>
</head>
<body>

<div id="mouse-glow"></div>
<div class="perspective-grid"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="scan-sweep"></div>
<div class="hazard-bar"></div>

<div class="hud-stats hs-tl"><div class="hud-line">SYS://<span class="hud-val" id="hud-sys">NODE_042</span></div><div class="hud-line">PING:<span class="hud-val" id="hud-ping">21ms</span></div></div>
<div class="hud-stats hs-br"><div class="hud-line">LAT:<span class="hud-val">-6.2</span></div><div class="hud-line">TEMP:<span class="hud-val" id="hud-temp">32C</span></div></div>
<div id="notif-container"></div>
<div id="loader"><div class="loader-title" id="loader-title-text">BOOTING</div><div class="loader-bar-container"><div class="loader-bar" id="loaderBar"></div></div><div class="loader-text" id="load-status">Initializing Core Systems...</div></div>

<nav class="top-nav">
  <div class="brand"><div class="logo-box"><i class="fas fa-database"></i></div><div class="brand-text"><h1>TOMMY</h1><span>LINE TOGEL HUB</span></div></div>
  <div class="nav-menu">
    <div class="nav-item active" data-sheet="bonus"><i class="fas fa-cube"></i><span>BONUS</span></div>
    <div class="nav-item" data-sheet="PK_anti_audit"><i class="fas fa-toolbox"></i><span>PK ANTI AUDIT</span></div>
    <div class="nav-item" data-sheet="PK_LULUS_SENSOR_AUDIT"><i class="fas fa-shield-alt"></i><span>PK LULUS AUDIT</span></div>
    <div class="nav-item" data-sheet="seputar_gantirek"><i class="fas fa-exchange-alt"></i><span>SEPUTAR GANTI REK</span></div>
    <div class="nav-item" data-sheet="seputar_pk"><i class="fas fa-file-alt"></i><span>SEPUTAR PK</span></div>
  </div>
  <div class="status-box"><div class="status-indicator"></div><div class="time-val" id="clock">00:00:00</div></div>
</nav>

<main class="main">
  <div class="content-wrapper">
    <div class="tech-corner tc-tl"></div><div class="tech-corner tc-tr"></div><div class="tech-corner tc-bl"></div><div class="tech-corner tc-br"></div>
    <div class="corner-deco">SECURE</div>
    <div class="header-row">
      <div class="title-main"><div class="title-badge">Module</div><h1 id="pageTitle">BONUS</h1></div>
      <div class="header-actions"><div class="search-box"><input type="text" id="searchInput" placeholder="Search Database..."><i class="fas fa-search"></i></div><button class="btn-industrial" id="refreshBtn"><i class="fas fa-sync-alt"></i><span>Refresh</span></button></div>
    </div>
    <div class="data-card"><div class="table-scroll" id="tableContainer"></div></div>
  </div>
</main>

<div class="animation-layer"><div class="road-container"><div class="road-lines"></div></div>
  <div class="cyber-car car-cruiser"><svg width="100%" height="100%" viewBox="0 0 200 80"><path d="M20,50 Q30,10 80,10 L160,10 Q190,10 190,40 L190,55 Q190,65 180,65 L20,65 Q10,65 10,55 L10,50 Z" fill="#181410" stroke="#FFD600" stroke-width="2"/><rect x="12" y="48" width="4" height="8" fill="#FF3366"/><rect x="184" y="30" width="6" height="12" fill="#FFD600"/></svg><div class="wheel w-front"></div><div class="wheel w-back"></div></div>
  <div class="cyber-car car-interceptor"><svg width="100%" height="100%" viewBox="0 0 200 80"><path d="M10,40 Q10,10 40,10 L120,10 Q170,10 180,50 L180,55 Q180,65 170,65 L20,65 Q10,65 10,55 Z" fill="#181410" stroke="#FF9100" stroke-width="2"/><rect x="174" y="48" width="4" height="8" fill="#FFD600"/><rect x="10" y="30" width="6" height="12" fill="#FF9100"/></svg><div class="wheel w-front" style="right:18px;"></div><div class="wheel w-back" style="left:22px;"></div></div>
</div>

<script>
  // ========== CONFIGURATION ==========
  const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
  const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
  
  let allData = {};
  let currentSheet = 'bonus';
  let titleScramble;

  // DOM elements
  const loaderDiv = document.getElementById('loader');
  const loaderBar = document.getElementById('loaderBar');
  const loadStatus = document.getElementById('load-status');
  const loaderTitle = document.getElementById('loader-title-text');
  const pageTitleEl = document.getElementById('pageTitle');
  const tableContainer = document.getElementById('tableContainer');
  const searchInput = document.getElementById('searchInput');
  const notifContainer = document.getElementById('notif-container');
  const refreshBtn = document.getElementById('refreshBtn');

  // Helper: escape HTML
  function escapeHTML(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, function(m){ if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c){ return c; }); }
  
  // Notification
  function showNotification(msg) {
    const n = document.createElement('div'); n.className = 'toast-notification'; n.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
    notifContainer.appendChild(n);
    setTimeout(() => { n.remove(); }, 2500);
  }

  // Fetch sheet data
  async function fetchSheet(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      if (!json.table?.rows) return [];
      const cols = json.table.cols || [];
      const headers = cols.map(col => col.label || `col_${col.id}`);
      return json.table.rows.map(row => {
        const obj = {};
        row.c?.forEach((cell, idx) => { obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null; });
        return obj;
      });
    } catch(e) { console.error(e); return []; }
  }

  // Load all sheets
  async function loadAllSheets() {
    let progress = 0;
    const step = 100 / SHEET_NAMES.length;
    const scrambleTitle = new TextScramble(loaderTitle);
    for (const name of SHEET_NAMES) {
      await scrambleTitle.setText(name.toUpperCase());
      loadStatus.innerText = `FETCHING ${name.toUpperCase()} ...`;
      allData[name] = await fetchSheet(name);
      progress += step;
      loaderBar.style.width = `${progress}%`;
    }
    await scrambleTitle.setText('READY');
    loadStatus.innerText = 'SYSTEM ONLINE';
    loaderBar.style.width = '100%';
    setTimeout(() => { loaderDiv.classList.add('hidden'); loaderDiv.style.opacity = '0'; loaderDiv.style.visibility = 'hidden'; renderSheet(currentSheet); }, 500);
  }

  // Layout type detection
  function getLayoutType(sheetName) {
    if (sheetName === 'bonus' || sheetName === 'seputar_gantirek') return 'grid';
    if (sheetName === 'PK_anti_audit') return 'sidebar';
    return 'qna';
  }

  // RENDER GRID (Asset Cards)
  function renderAssetsGrid(data) {
    if (!data.length) return renderEmptyState('NO DATA');
    let html = `<div class="assets-grid">`;
    data.forEach((row, idx) => {
      const keys = Object.keys(row);
      const id = row[keys[0]] || '-';
      const val = row[keys[1]] || '-';
      const desc = row[keys[2]] || '-';
      html += `<div class="asset-card" style="animation: cardSlideIn 0.4s ease forwards; animation-delay:${idx*0.05}s">
        <div class="asset-header"><span class="asset-id-badge">${escapeHTML(id)}</span><div class="asset-status"></div></div>
        <div class="asset-display"><div class="asset-value">${escapeHTML(val)}</div></div>
        <div class="asset-info"><div class="asset-label">INFO</div><div class="asset-desc" style="margin-bottom:16px;color:#bbb;">${escapeHTML(desc)}</div></div>
        <div class="asset-actions"><button class="btn-copy-action" data-val="${escapeHTML(val)}" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy Data</button></div>
      </div>`;
    });
    html += `</div>`;
    return html;
  }

  // RENDER QNA Table
  function renderQna(data) {
    if (!data.length) return renderEmptyState('NO RECORDS');
    let html = `<table class="qna-table"><thead><tr><th>PERTANYAAN / KEY</th><th style="width:60px"></th><th>JAWABAN / DETAIL</th><th style="width:60px"></th></tr></thead><tbody>`;
    data.forEach(row => {
      const keys = Object.keys(row);
      const q = row[keys[1]] || row[keys[0]] || '-';
      const a = row[keys[2]] || row[keys[1]] || '-';
      html += `<tr><td>${escapeHTML(q)}</td><td><button class="btn-industrial copy-trigger" data-text="${escapeHTML(q)}" style="padding:6px 12px;"><i class="fas fa-copy"></i></button></td>
               <td>${escapeHTML(a)}</td><td><button class="btn-industrial copy-trigger" data-text="${escapeHTML(a)}" style="padding:6px 12px;"><i class="fas fa-copy"></i></button></td></tr>`;
    });
    html += `</tbody></table>`;
    return html;
  }

  // RENDER SIDEBAR (PK_anti_audit style)
  function renderSidebarLayout(data) {
    if (!data.length) return renderEmptyState('EMPTY DATABASE');
    const keys = Object.keys(data[0]);
    let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><span>Daftar Item</span><i class="fas fa-list-ul"></i></div><div class="sidebar-list" id="sidebarListContainer">`;
    data.forEach((row, idx) => {
      const label = row[keys[0]] || `Item ${idx+1}`;
      html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-chevron-right"></i>${escapeHTML(label)}</div>`;
    });
    html += `</div></div><div class="detail-col" id="detailPanel">${renderEmptyState('PILIH ITEM')}</div></div>`;
    return html;
  }

  // EMPTY STATE HOLOGRAM
  function renderEmptyState(msg) {
    return `<div class="empty-state"><div class="holo-cube-wrapper"><div class="holo-cube"><div class="holo-face face-front"></div><div class="holo-face face-back"></div><div class="holo-face face-right"></div><div class="holo-face face-left"></div><div class="holo-face face-top"></div><div class="holo-face face-bottom"></div></div></div><div class="holo-ring ring-1"></div><div class="holo-ring ring-2"></div><div class="empty-text" style="margin-top:20px;color:var(--accent-primary);">${msg}</div></div>`;
  }

  // MAIN RENDER DISPATCH
  function renderDataForSheet(sheetName, dataArray, container) {
    const layout = getLayoutType(sheetName);
    if (layout === 'grid') container.innerHTML = renderAssetsGrid(dataArray);
    else if (layout === 'sidebar') container.innerHTML = renderSidebarLayout(dataArray);
    else container.innerHTML = renderQna(dataArray);
  }

  // Sidebar interaction init (for PK_anti_audit only)
  function initSidebarIfNeeded(sheetName, data) {
    if (getLayoutType(sheetName) !== 'sidebar') return;
    const items = document.querySelectorAll('.sidebar-item');
    const detailPanel = document.getElementById('detailPanel');
    if (!items.length || !detailPanel) return;
    function updateDetail(idx) {
      const row = data[idx];
      if (!row) return;
      const keys = Object.keys(row);
      const keyTitle = row[keys[0]] || '-';
      const desc = row[keys[2]] || row[keys[1]] || '-';
      detailPanel.innerHTML = `<div class="detail-content"><div class="detail-label">IDENTIFIER</div><div class="detail-key-title">${escapeHTML(keyTitle)}</div><div class="detail-label">DESKRIPSI</div><div class="detail-desc-box">${escapeHTML(desc)}</div><button class="btn-copy-desc copy-full-desc" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;
    }
    items.forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        updateDetail(parseInt(item.dataset.index));
      });
    });
    if(items[0]) { items[0].classList.add('active'); updateDetail(0); }
  }

  // RenderSheet with title & data
  function renderSheet(sheetName) {
    currentSheet = sheetName;
    const displayName = sheetName.toUpperCase().replace(/_/g, ' ');
    if(titleScramble) titleScramble.setText(displayName);
    else pageTitleEl.innerText = displayName;
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.sheet === sheetName));
    searchInput.value = '';
    const data = allData[sheetName] || [];
    renderDataForSheet(sheetName, data, tableContainer);
    if (getLayoutType(sheetName) === 'sidebar') initSidebarIfNeeded(sheetName, data);
  }

  // SEARCH LOGIC
  function handleSearch() {
    const query = searchInput.value.toLowerCase().trim();
    const data = allData[currentSheet] || [];
    if (!data.length) return;
    const layout = getLayoutType(currentSheet);
    if (layout === 'sidebar') {
      const items = document.querySelectorAll('.sidebar-item');
      let firstVisible = -1;
      items.forEach((item, idx) => {
        const row = data[idx];
        const match = Object.values(row).some(v => v && String(v).toLowerCase().includes(query));
        item.style.display = match ? 'flex' : 'none';
        if(match && firstVisible === -1) firstVisible = idx;
      });
      const activeItem = document.querySelector('.sidebar-item.active');
      if((!activeItem || activeItem.style.display === 'none') && firstVisible !== -1) {
        document.querySelector(`.sidebar-item[data-index="${firstVisible}"]`)?.click();
      }
    } else {
      const filtered = data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(query)));
      if(filtered.length) renderDataForSheet(currentSheet, filtered, tableContainer);
      else tableContainer.innerHTML = renderEmptyState('TIDAK DITEMUKAN');
    }
  }

  // Clipboard global handler WITH LIGHT EFFECT
  async function handleCopy(e) {
    const btn = e.target.closest('.btn-copy-action, .btn-industrial, .btn-copy-desc');
    if(!btn) return;
    let text = '';
    if(btn.classList.contains('btn-copy-action')) {
      const val = btn.dataset.val || '';
      const desc = btn.dataset.desc || '';
      text = desc && desc !== '-' ? `${val} - ${desc}` : val;
    } else if(btn.dataset.text) {
      text = btn.dataset.text;
    } else if(btn.classList.contains('btn-copy-desc') && btn.dataset.desc) {
      text = btn.dataset.desc;
    }

    if(text) {
      try {
        await navigator.clipboard.writeText(text);
        
        // 1. Button Visual Flash
        btn.classList.add('copy-flash-active');
        setTimeout(() => btn.classList.remove('copy-flash-active'), 400);

        // 2. Create Light Burst Ring
        const rect = btn.getBoundingClientRect();
        const ring = document.createElement('div');
        ring.className = 'light-burst-ring';
        // Position center of button
        ring.style.left = (rect.left + rect.width / 2) + 'px';
        ring.style.top = (rect.top + rect.height / 2) + 'px';
        document.body.appendChild(ring);
        
        // Remove after animation
        setTimeout(() => ring.remove(), 600);

        showNotification('Data copied to clipboard'); 
      } catch(err) {
        console.error('Copy failed', err);
      }
    }
  }

  // Clock & HUD simulation
  function startClock() { setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000); }
  setInterval(() => { if(document.getElementById('hud-temp')) document.getElementById('hud-temp').innerText = (Math.floor(Math.random() * 5) + 30) + 'C'; }, 3000);

  // TextScramble Class
  class TextScramble {
    constructor(el) { this.el = el; this.chars = '!<>-_\\/[]{}—=+*^?#_'; this.update = this.update.bind(this); }
    setText(newText) {
      const oldText = this.el.innerText;
      const length = Math.max(oldText.length, newText.length);
      this.queue = [];
      for(let i=0; i<length; i++) {
        const from = oldText[i] || '';
        const to = newText[i] || '';
        const start = Math.floor(Math.random() * 40);
        const end = start + Math.floor(Math.random() * 40);
        this.queue.push({ from, to, start, end });
      }
      cancelAnimationFrame(this.frameRequest);
      this.frame = 0;
      this.update();
      return new Promise(resolve => this.resolve = resolve);
    }
    update() {
      let output = '', complete = 0;
      for(let i=0; i<this.queue.length; i++) {
        let { from, to, start, end, char } = this.queue[i];
        if(this.frame >= end) { complete++; output += to; }
        else if(this.frame >= start) {
          if(!char || Math.random()<0.28) char = this.chars[Math.floor(Math.random() * this.chars.length)];
          this.queue[i].char = char;
          output += `<span style="color:var(--accent-primary);opacity:0.6">${char}</span>`;
        } else output += from;
      }
      this.el.innerHTML = output;
      if(complete === this.queue.length) this.resolve();
      else { this.frameRequest = requestAnimationFrame(this.update); this.frame++; }
    }
  }

  // EVENT LISTENERS
  function setupEvents() {
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => renderSheet(item.dataset.sheet)));
    searchInput.addEventListener('input', handleSearch);
    refreshBtn.addEventListener('click', async () => { refreshBtn.classList.add('loading'); await loadAllSheets(); refreshBtn.classList.remove('loading'); showNotification('System updated'); });
    document.addEventListener('click', handleCopy);
  }

  // MOUSE GLOW
  window.addEventListener('mousemove', e => { document.getElementById('mouse-glow').style.setProperty('--mouse-x', e.clientX + 'px'); document.getElementById('mouse-glow').style.setProperty('--mouse-y', e.clientY + 'px'); });

  // INIT
  titleScramble = new TextScramble(pageTitleEl);
  startClock();
  setupEvents();
  loadAllSheets();
</script>
</body>
</html>
