<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0c12;
      --bg-surface: #11141e;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --accent-pink: #ff2e63;
      --accent-cyan: #00e5ff;
      --accent-gold: #ffd700;
      --accent-purple: #b450ff;
      --text-primary: #f0f3fa;
      --text-secondary: #a0a8c0;
      --glow-pink: rgba(255, 46, 99, 0.4);
      --card-radius: 20px;
    }

    html, body { height: 100%; width: 100%; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,46,99,0.08), transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(0,229,255,0.06), transparent 60%);
      pointer-events: none; z-index: 0;
    }

    #particle-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.25;
    }

    /* ====== LIGHTNING FLASH OVERLAY ====== */
    .lightning-overlay {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
      opacity: 0;
      transition: opacity 0.05s;
    }
    .lightning-overlay.flash-pink {
      background: radial-gradient(ellipse at 30% 20%, rgba(255,46,99,0.12), transparent 50%);
      opacity: 1;
    }
    .lightning-overlay.flash-cyan {
      background: radial-gradient(ellipse at 70% 80%, rgba(0,229,255,0.1), transparent 50%);
      opacity: 1;
    }

    /* ====== SCAN LINE di konten ====== */
    .scan-line {
      position: absolute; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, transparent 0%, rgba(0,229,255,0.4) 20%, rgba(0,229,255,0.6) 50%, rgba(0,229,255,0.4) 80%, transparent 100%);
      box-shadow: 0 0 12px rgba(0,229,255,0.3), 0 0 30px rgba(0,229,255,0.1);
      z-index: 15; pointer-events: none;
      animation: scanDown 8s linear infinite;
      opacity: 0.5;
    }
    @keyframes scanDown {
      0% { top: 0; opacity: 0; }
      2% { opacity: 0.5; }
      8% { opacity: 0.5; }
      10% { top: 100%; opacity: 0; }
      100% { top: 100%; opacity: 0; }
    }

    /* ====== DATA RAIN ====== */
    #data-rain-canvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
      opacity: 0.08;
    }

    /* ====== HOLOGRAM ELEMENTS ====== */
    .hologram-layer {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 2;
      overflow: hidden;
    }
    .holo-shape {
      position: absolute;
      border: 1px solid;
      opacity: 0;
      animation: holoFloat 12s ease-in-out infinite;
    }
    .holo-shape.h1 {
      width: 40px; height: 40px;
      border-color: rgba(255,46,99,0.3);
      border-radius: 50%;
      top: 15%; left: 8%;
      animation-delay: 0s;
      box-shadow: 0 0 15px rgba(255,46,99,0.15), inset 0 0 10px rgba(255,46,99,0.08);
    }
    .holo-shape.h2 {
      width: 25px; height: 25px;
      border-color: rgba(0,229,255,0.25);
      transform: rotate(45deg);
      top: 25%; right: 12%;
      animation-delay: -4s;
      box-shadow: 0 0 12px rgba(0,229,255,0.12);
    }
    .holo-shape.h3 {
      width: 0; height: 0;
      border-left: 15px solid transparent;
      border-right: 15px solid transparent;
      border-bottom: 26px solid rgba(255,215,0,0.15);
      border-top: none;
      background: none;
      top: 60%; left: 5%;
      animation-delay: -8s;
      filter: drop-shadow(0 0 8px rgba(255,215,0,0.2));
    }
    .holo-shape.h4 {
      width: 35px; height: 35px;
      border-color: rgba(180,80,255,0.2);
      border-radius: 4px;
      top: 45%; right: 6%;
      animation-delay: -2s;
      box-shadow: 0 0 12px rgba(180,80,255,0.1);
    }
    .holo-shape.h5 {
      width: 20px; height: 20px;
      border-color: rgba(0,229,255,0.2);
      border-radius: 50%;
      top: 70%; left: 15%;
      animation-delay: -6s;
    }
    @keyframes holoFloat {
      0%, 100% { opacity: 0; transform: translateY(0) rotate(0deg); }
      10% { opacity: 1; }
      20% { opacity: 1; }
      30% { opacity: 0; transform: translateY(-30px) rotate(90deg); }
      100% { opacity: 0; transform: translateY(-30px) rotate(90deg); }
    }

    /* ====== PULSE RINGS di gedung ====== */
    .pulse-rings {
      position: absolute;
      bottom: 68px;
      pointer-events: none;
      z-index: 2;
    }
    .pulse-ring {
      position: absolute;
      width: 4px; height: 4px;
      border: 1px solid;
      border-radius: 50%;
      opacity: 0;
    }
    .pulse-ring.pr1 { left: 22%; bottom: 60px; border-color: rgba(255,46,99,0.6); animation: pulseExpand 6s ease-out infinite; }
    .pulse-ring.pr2 { left: 50%; bottom: 80px; border-color: rgba(0,229,255,0.5); animation: pulseExpand 8s ease-out infinite; animation-delay: -3s; }
    .pulse-ring.pr3 { left: 78%; bottom: 55px; border-color: rgba(255,215,0,0.4); animation: pulseExpand 7s ease-out infinite; animation-delay: -5s; }
    @keyframes pulseExpand {
      0% { width: 4px; height: 4px; opacity: 0.8; margin-left: -2px; margin-bottom: -2px; }
      100% { width: 60px; height: 60px; opacity: 0; margin-left: -30px; margin-bottom: -30px; }
    }

    /* ====== CORNER HUD BRACKETS ====== */
    .hud-corner {
      position: fixed;
      width: 30px; height: 30px;
      pointer-events: none;
      z-index: 29;
      opacity: 0.3;
    }
    .hud-corner::before, .hud-corner::after {
      content: ''; position: absolute;
      background: var(--accent-cyan);
    }
    .hud-tl { top: 70px; left: 10px; }
    .hud-tl::before { top: 0; left: 0; width: 12px; height: 1px; }
    .hud-tl::after { top: 0; left: 0; width: 1px; height: 12px; }
    .hud-tr { top: 70px; right: 10px; }
    .hud-tr::before { top: 0; right: 0; width: 12px; height: 1px; }
    .hud-tr::after { top: 0; right: 0; width: 1px; height: 12px; }
    .hud-bl { bottom: 145px; left: 10px; }
    .hud-bl::before { bottom: 0; left: 0; width: 12px; height: 1px; }
    .hud-bl::after { bottom: 0; left: 0; width: 1px; height: 12px; }
    .hud-br { bottom: 145px; right: 10px; }
    .hud-br::before { bottom: 0; right: 0; width: 12px; height: 1px; }
    .hud-br::after { bottom: 0; right: 0; width: 1px; height: 12px; }

    /* ====== ROAD CRACK GLOW ====== */
    .road-crack {
      position: absolute;
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      animation: crackGlow 10s ease-in-out infinite;
    }
    .road-crack.rc1 {
      bottom: 25px; left: 20%;
      width: 40px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,46,99,0.6), transparent);
      box-shadow: 0 0 6px rgba(255,46,99,0.3);
      animation-delay: 0s;
    }
    .road-crack.rc2 {
      bottom: 45px; left: 55%;
      width: 30px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.5), transparent);
      box-shadow: 0 0 6px rgba(0,229,255,0.3);
      animation-delay: -4s;
    }
    .road-crack.rc3 {
      bottom: 15px; left: 75%;
      width: 35px; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.5), transparent);
      box-shadow: 0 0 6px rgba(255,215,0,0.3);
      animation-delay: -7s;
    }
    @keyframes crackGlow {
      0%, 100% { opacity: 0; }
      5% { opacity: 0.8; }
      10% { opacity: 0; }
      100% { opacity: 0; }
    }

    /* ====== FLOATING PARTICLE CLUSTERS ====== */
    .float-cluster {
      position: fixed;
      pointer-events: none;
      z-index: 2;
    }
    .float-dot {
      position: absolute;
      width: 2px; height: 2px;
      border-radius: 50%;
      animation: floatDot 6s ease-in-out infinite;
    }
    .fc1 { top: 30%; left: 3%; }
    .fc1 .float-dot:nth-child(1) { background: #ff2e63; animation-delay: 0s; top: 0; left: 0; }
    .fc1 .float-dot:nth-child(2) { background: #ff2e63; animation-delay: -1s; top: -8px; left: 6px; width: 1.5px; height: 1.5px; }
    .fc1 .float-dot:nth-child(3) { background: #ff2e63; animation-delay: -2s; top: 4px; left: -5px; width: 1px; height: 1px; }
    .fc2 { top: 55%; right: 4%; }
    .fc2 .float-dot:nth-child(1) { background: #00e5ff; animation-delay: -3s; top: 0; left: 0; }
    .fc2 .float-dot:nth-child(2) { background: #00e5ff; animation-delay: -4s; top: -6px; left: 5px; width: 1.5px; height: 1.5px; }
    .fc2 .float-dot:nth-child(3) { background: #00e5ff; animation-delay: -5s; top: 3px; left: -4px; width: 1px; height: 1px; }
    @keyframes floatDot {
      0%, 100% { opacity: 0; transform: translateY(0); }
      20% { opacity: 0.8; }
      50% { opacity: 0.6; transform: translateY(-15px); }
      80% { opacity: 0.3; }
    }

    /* ====== GLITCH TEXT pada brand ====== */
    .brand-text h1 {
      font-size: 1.4rem; font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-cyan));
      -webkit-background-clip: text; background-clip: text; color: transparent;
      letter-spacing: -0.3px;
      position: relative;
      animation: glitchText 15s ease-in-out infinite;
    }
    @keyframes glitchText {
      0%, 100% { text-shadow: none; }
      92% { text-shadow: none; }
      92.5% { text-shadow: -2px 0 #ff2e63, 2px 0 #00e5ff; opacity: 0.9; }
      93% { text-shadow: none; opacity: 1; }
      93.3% { text-shadow: 1px 0 #ff2e63, -1px 0 #00e5ff; }
      93.6% { text-shadow: none; }
    }
    .brand-text span { font-size: 0.7rem; color: var(--text-secondary); }

    .top-nav {
      position: relative; z-index: 30;
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: space-between;
      gap: 16px; padding: 12px 24px;
      background: rgba(10, 12, 18, 0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }
    .nav-menu { display: flex; flex-wrap: wrap; gap: 8px; }
    .nav-item {
      background: rgba(20, 25, 40, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 40px; padding: 6px 16px;
      font-size: 0.75rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--text-secondary); cursor: pointer;
      transition: all 0.2s ease;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-item.active {
      background: var(--accent-pink); border-color: var(--accent-pink);
      color: white; box-shadow: 0 0 12px var(--glow-pink);
    }
    .status-box {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      padding: 6px 14px; border-radius: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; border: 1px solid var(--border-subtle);
      color: var(--accent-cyan); white-space: nowrap;
    }

    .main {
      position: relative; z-index: 10;
      flex: 1; display: flex; flex-direction: column;
      padding: 16px 20px 135px 20px; min-height: 0;
    }
    .content-wrapper {
      background: rgba(17, 20, 30, 0.7);
      backdrop-filter: blur(16px);
      border-radius: var(--card-radius);
      border: 1px solid var(--border-subtle);
      display: flex; flex-direction: column;
      flex: 1; min-height: 0; overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
      position: relative;
    }
    .refresh-overlay {
      position: absolute; inset: 0;
      background: rgba(7, 9, 14, 0.6);
      backdrop-filter: blur(2px);
      display: none; align-items: center; justify-content: center;
      z-index: 20; border-radius: var(--card-radius);
    }
    .refresh-overlay.active { display: flex; }
    .refresh-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: var(--accent-pink);
      border-right-color: var(--accent-cyan);
      border-radius: 50%;
      animation: spinFast 0.6s linear infinite;
    }
    @keyframes spinFast { to { transform: rotate(360deg); } }
    .header-row {
      display: flex; flex-wrap: wrap;
      justify-content: space-between; align-items: center;
      gap: 16px; padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle); flex-shrink: 0;
    }
    .title-main h1 {
      font-size: 1.5rem; font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-pink));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .search-box input {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-subtle);
      border-radius: 40px; padding: 8px 16px;
      color: white; font-family: 'Inter', monospace;
      font-size: 0.8rem; width: 220px; outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent-cyan); }
    .btn-industrial {
      background: rgba(255, 46, 99, 0.15);
      border: 1px solid var(--accent-pink);
      padding: 7px 18px; border-radius: 40px;
      color: var(--accent-pink); font-weight: 600;
      font-size: 0.75rem; cursor: pointer;
      transition: all 0.2s; display: inline-flex;
      align-items: center; gap: 8px; white-space: nowrap;
    }
    .btn-industrial:hover { background: rgba(255,46,99,0.25); }
    .btn-industrial:active { transform: scale(0.96); }
    .btn-industrial.is-loading { opacity: 0.7; pointer-events: none; }
    .btn-industrial .icon-spin { animation: spinFast 0.8s linear infinite; display: inline-block; }

    .table-scroll {
      flex: 1; overflow-y: auto; overflow-x: auto;
      -webkit-overflow-scrolling: touch; min-height: 200px;
    }
    .qna-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .qna-table th {
      text-align: left; padding: 14px 16px; font-weight: 600;
      color: var(--accent-cyan); border-bottom: 1px solid var(--border-subtle);
      font-size: 0.7rem; text-transform: uppercase;
      position: sticky; top: 0;
      background: rgba(10, 12, 20, 0.95); backdrop-filter: blur(4px);
    }
    .qna-table td { padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); color: var(--text-secondary); }
    .col-action button {
      background: none; border: 1px solid var(--border-subtle);
      border-radius: 30px; padding: 6px 12px;
      cursor: pointer; transition: 0.2s; color: var(--text-secondary);
    }
    .col-action button:hover { border-color: var(--accent-pink); color: var(--accent-pink); }

    .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 24px; }
    .asset-card {
      background: rgba(10, 12, 20, 0.8); backdrop-filter: blur(8px);
      border-radius: 24px; border: 1px solid var(--border-subtle);
      transition: all 0.25s ease; overflow: hidden;
    }
    .asset-card:hover { transform: translateY(-4px); border-color: var(--accent-pink); box-shadow: 0 8px 30px rgba(255,46,99,0.15); }
    .asset-header { padding: 16px 18px 8px; display: flex; justify-content: space-between; align-items: center; font-weight: 600; font-size: 0.85rem; }
    .asset-display {
      margin: 4px 18px 8px; padding: 12px;
      background: rgba(0,0,0,0.4); border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem; font-weight: 600;
      color: var(--accent-gold); text-align: center;
      border: 1px solid rgba(255,215,0,0.15);
    }
    .btn-copy-action {
      background: rgba(255,46,99,0.1); border: 1px solid rgba(255,46,99,0.3);
      border-radius: 40px; padding: 6px 16px;
      color: var(--accent-pink); font-size: 0.75rem;
      font-weight: 600; cursor: pointer; transition: 0.2s;
    }
    .btn-copy-action:hover { background: rgba(255,46,99,0.2); }

    .layout-split { display: flex; flex-direction: row; height: 100%; min-height: 400px; }
    .sidebar-col { width: 260px; flex-shrink: 0; background: rgba(0, 0, 0, 0.35); border-right: 1px solid var(--border-subtle); overflow-y: auto; }
    .sidebar-header { padding: 14px 20px; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-cyan); border-bottom: 1px solid var(--border-subtle); }
    .sidebar-item { padding: 12px 20px; font-size: 0.8rem; cursor: pointer; border-left: 3px solid transparent; transition: 0.15s; color: var(--text-secondary); display: flex; align-items: center; gap: 10px; }
    .sidebar-item:hover { background: rgba(255,255,255,0.03); }
    .sidebar-item.active { background: rgba(255,46,99,0.15); border-left-color: var(--accent-pink); color: white; }
    .detail-col { flex: 1; padding: 20px 24px; overflow-y: auto; }
    .detail-content { animation: fadeSlideIn 0.2s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-secondary); font-size: 0.9rem; }

    #notif-container { position: fixed; bottom: 145px; right: 24px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; pointer-events: none; }
    .toast-notification {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
      border-left: 4px solid var(--accent-pink);
      padding: 12px 20px; border-radius: 14px;
      font-size: 0.85rem; font-weight: 500;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      animation: slideInRight 0.3s ease; transition: opacity 0.2s;
    }
    .toast-notification.toast-success { border-left-color: #0f0; }
    .toast-notification.toast-info { border-left-color: var(--accent-cyan); }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ====== ROAD SCENE ====== */
    .animation-layer {
      position: fixed; bottom: 0; left: 0;
      width: 100%; height: 130px;
      pointer-events: none; z-index: 50;
      background: linear-gradient(to bottom, transparent 0%, rgba(7,9,14,0.7) 6%, rgba(7,9,14,0.95) 15%, #07090e 25%, #07090e 100%);
    }
    .cityscape { position: absolute; bottom: 72px; left: 0; width: 100%; height: 80px; z-index: 1; opacity: 0.6; }
    .cityscape svg { width: 100%; height: 100%; }
    .window-light { animation: windowFlicker var(--delay, 3s) ease-in-out infinite alternate; }
    @keyframes windowFlicker { 0%, 100% { opacity: var(--max-o, 0.8); } 50% { opacity: var(--min-o, 0.2); } }
    .neon-sign { position: absolute; font-family: 'JetBrains Mono', monospace; animation: neonFlicker 4s ease-in-out infinite; }
    @keyframes neonFlicker { 0%,100%{opacity:1;}41%{opacity:1;}42%{opacity:0.2;}43%{opacity:1;}44%{opacity:0.4;}45%{opacity:1;}80%{opacity:1;}81%{opacity:0.3;}82%{opacity:1;} }

    .street-lights { position: absolute; bottom: 68px; left: 0; width: 100%; height: 35px; z-index: 3; }
    .street-light { position: absolute; bottom: 0; width: 2px; height: 28px; background: linear-gradient(to top, rgba(255,255,255,0.06), rgba(255,255,255,0.01)); }
    .street-light::after { content: ''; position: absolute; top: -2px; left: -3px; width: 8px; height: 5px; border-radius: 50%; }
    .street-light:nth-child(odd)::after { background: var(--accent-pink); box-shadow: 0 0 6px var(--accent-pink), 0 0 14px rgba(255,46,99,0.4); animation: sP 2.5s ease-in-out infinite alternate; }
    .street-light:nth-child(even)::after { background: var(--accent-cyan); box-shadow: 0 0 6px var(--accent-cyan), 0 0 14px rgba(0,229,255,0.4); animation: sC 2.5s ease-in-out infinite alternate; }
    @keyframes sP { 0%{opacity:0.4;}100%{opacity:1;} } @keyframes sC { 0%{opacity:1;}100%{opacity:0.4;} }
    .light-cone { position: absolute; top: 6px; left: 50%; transform: translateX(-50%); width: 60px; height: 52px; clip-path: polygon(35% 0%, 65% 0%, 100% 100%, 0% 100%); }
    .street-light:nth-child(odd) .light-cone { background: linear-gradient(to bottom, rgba(255,46,99,0.08), transparent); }
    .street-light:nth-child(even) .light-cone { background: linear-gradient(to bottom, rgba(0,229,255,0.08), transparent); }
    .street-light:nth-child(1){left:6%;}.street-light:nth-child(2){left:24%;}.street-light:nth-child(3){left:44%;}.street-light:nth-child(4){left:64%;}.street-light:nth-child(5){left:82%;}.street-light:nth-child(6){left:96%;}

    .road-surface { position: absolute; bottom: 0; left: 0; width: 100%; height: 72px; z-index: 2; background: linear-gradient(180deg, #0e1119 0%, #0a0d15 40%, #070910 100%); }

<script>
  /* ====== PARTICLE BACKGROUND ====== */
  const canvas = document.getElementById('particle-canvas');
  let ctxP = canvas.getContext('2d');
  let particles = [];
  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initParticles() {
    particles = [];
    for (let i = 0; i < 40; i++) particles.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.8+0.5, alpha: Math.random()*0.2+0.1, speedX: (Math.random()-0.5)*0.1, speedY: (Math.random()-0.5)*0.1, color: `hsl(${Math.random()*30+320},70%,60%)` });
  }
  function drawParticles() {
    if (!ctxP) return;
    ctxP.clearRect(0,0,canvas.width,canvas.height);
    for (let p of particles) { ctxP.beginPath(); ctxP.arc(p.x,p.y,p.r,0,Math.PI*2); ctxP.fillStyle=p.color; ctxP.globalAlpha=p.alpha; ctxP.fill(); p.x+=p.speedX; p.y+=p.speedY; if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0; if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0; }
    requestAnimationFrame(drawParticles);
  }
  window.addEventListener('resize', () => { resizeCanvas(); initParticles(); resizeSpeedCanvas(); resizeDataRain(); });
  resizeCanvas(); initParticles(); drawParticles();

  /* ====== DATA RAIN (binary hujan) ====== */
  const drCanvas = document.getElementById('data-rain-canvas');
  let ctxDR = drCanvas.getContext('2d');
  let dataDrops = [];
  function resizeDataRain() { drCanvas.width = window.innerWidth; drCanvas.height = window.innerHeight; }
  function initDataRain() {
    dataDrops = [];
    const chars = '01';
    for (let i = 0; i < 25; i++) {
      dataDrops.push({
        x: Math.random() * drCanvas.width,
        y: Math.random() * drCanvas.height,
        speed: Math.random() * 1.5 + 0.5,
        char: chars[Math.floor(Math.random()*2)],
        alpha: Math.random() * 0.5 + 0.1,
        color: ['#ff2e63','#00e5ff','#ffd700','#b450ff'][Math.floor(Math.random()*4)]
      });
    }
  }
  function drawDataRain() {
    if (!ctxDR || !drCanvas.width) { requestAnimationFrame(drawDataRain); return; }
    ctxDR.clearRect(0,0,drCanvas.width,drCanvas.height);
    ctxDR.font = '10px "JetBrains Mono", monospace';
    for (let d of dataDrops) {
      ctxDR.fillStyle = d.color;
      ctxDR.globalAlpha = d.alpha;
      ctxDR.fillText(d.char, d.x, d.y);
      /* Sedikit trail di atasnya */
      ctxDR.globalAlpha = d.alpha * 0.3;
      ctxDR.fillText(d.char === '0' ? '1' : '0', d.x, d.y - 12);
      d.y += d.speed;
      d.char = d.char === '0' ? '1' : '0';
      if (d.y > drCanvas.height + 20) { d.y = -20; d.x = Math.random() * drCanvas.width; }
    }
    ctxDR.globalAlpha = 1;
    requestAnimationFrame(drawDataRain);
  }
  function resizeDataRain() { resizeDataRain(); initDataRain(); }
  setTimeout(() => { resizeDataRain(); drawDataRain(); }, 200);

  /* ====== LIGHTNING FLASH acak ====== */
  const lightningEl = document.getElementById('lightningOverlay');
  function triggerLightning() {
    const types = ['flash-pink', 'flash-cyan'];
    const type = types[Math.floor(Math.random()*types.length)];
    lightningEl.className = 'lightning-overlay ' + type;
    setTimeout(() => { lightningEl.className = 'lightning-overlay'; }, 80);
    setTimeout(() => { lightningEl.className = 'lightning-overlay ' + type; }, 120);
    setTimeout(() => { lightningEl.className = 'lightning-overlay'; }, 160);
    /* Jadwalkan berikutnya secara random */
    const next = Math.floor(Math.random() * 12000) + 5000;
    setTimeout(triggerLightning, next);
  }
  setTimeout(triggerLightning, 3000);

  /* ====== SPEED PARTICLES ====== */
  const spCanvas = document.getElementById('speed-particles');
  let ctxS = spCanvas.getContext('2d');
  let speedDots = [];
  function resizeSpeedCanvas() { const r = document.querySelector('.road-surface'); if(r){spCanvas.width=r.offsetWidth;spCanvas.height=r.offsetHeight;} }
  function createSpeedDot() { const gr=Math.random()>0.5,ln=Math.random()>0.5?'top':'bottom',cs=['#ff2e63','#00e5ff','#ffd700','#b450ff','#ff6644']; return {x:Math.random()*spCanvas.width,y:ln==='top'?(spCanvas.height*0.2+Math.random()*14):(spCanvas.height*0.65+Math.random()*14),speed:(Math.random()*4+2.5)*(gr?1:-1),length:Math.random()*16+5,alpha:Math.random()*0.3+0.06,color:cs[Math.floor(Math.random()*cs.length)]}; }
  function initSpeedDots() { speedDots=[]; for(let i=0;i<40;i++) speedDots.push(createSpeedDot()); }
  function drawSpeedDots() {
    if(!ctxS||!spCanvas.width){requestAnimationFrame(drawSpeedDots);return;}
    ctxS.clearRect(0,0,spCanvas.width,spCanvas.height);
    for(let d of speedDots){ctxS.beginPath();ctxS.moveTo(d.x,d.y);ctxS.lineTo(d.x-d.length*Math.sign(d.speed),d.y);ctxS.strokeStyle=d.color;ctxS.globalAlpha=d.alpha;ctxS.lineWidth=1.1;ctxS.stroke();if(Math.abs(d.speed)>4){ctxS.beginPath();ctxS.arc(d.x,d.y,1.5,0,Math.PI*2);ctxS.fillStyle=d.color;ctxS.globalAlpha=d.alpha*0.5;ctxS.fill();}d.x+=d.speed;if(d.x>spCanvas.width+25||d.x<-25){Object.assign(d,createSpeedDot());d.x=d.speed>0?-12:spCanvas.width+12;}}
    ctxS.globalAlpha=1;requestAnimationFrame(drawSpeedDots);
  }
  setTimeout(()=>{resizeSpeedCanvas();initSpeedDots();drawSpeedDots();},100);

  /* ====== CLOCK & PING ====== */
  function updateClock(){document.getElementById('clock').innerText=new Date().toLocaleTimeString('en-GB');}
  setInterval(updateClock,1000);updateClock();
  setInterval(()=>{document.getElementById('hud-ping').innerText=Math.floor(Math.random()*12+10)+'ms';},4000);

  /* ====== TOAST ====== */
  function showToast(msg,type){const c=document.getElementById('notif-container'),t=document.createElement('div');t.className='toast-notification toast-'+(type||'success');const ic=type==='info'?'fa-info-circle':'fa-check-circle',icol=type==='info'?'var(--accent-cyan)':'#0f0';t.innerHTML=`<i class="fas ${ic}" style="color:${icol};"></i> ${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),200);},2500);}

  /* ====== SPREADSHEET ====== */
  const SID='19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
  const SHEETS=['bonus','PK_anti_audit','PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
  const CCC=['PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
  let allData={},currentSheet='bonus',isRefreshing=false;
  async function fetchSheet(sn){try{const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sn)}`),t=await r.text(),j=JSON.parse(t.substring(47,t.length-2));if(!j.table?.rows)return[];const c=j.table.cols||[],h=c.map(col=>col.label||`col_${col.id}`);return j.table.rows.map(row=>{const o={};row.c?.forEach((cell,idx)=>{o[h[idx]||`col_${idx}`]=cell?cell.v:null;});return o;});}catch(e){return[];}}
  async function loadAllSheets(silent){
    if(!silent){let p=0;const step=100/SHEETS.length,lt=document.getElementById('loader-title-text'),lb=document.getElementById('loaderBar'),ls=document.getElementById('load-status');for(const n of SHEETS){lt.innerText=n.toUpperCase();ls.innerText=`Fetching ${n}...`;allData[n]=await fetchSheet(n);p+=step;lb.style.width=`${Math.min(p,100)}%`;await new Promise(r=>setTimeout(r,30));}lt.innerText='READY';ls.innerText='System Online';lb.style.width='100%';setTimeout(()=>{document.getElementById('loader').style.opacity='0';setTimeout(()=>document.getElementById('loader').style.display='none',400);renderSheet(currentSheet);},300);}else{for(const n of SHEETS)allData[n]=await fetchSheet(n);renderSheet(currentSheet);}
  }
  async function handleRefresh(){if(isRefreshing)return;isRefreshing=true;const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon'),text=document.getElementById('refreshText'),ov=document.getElementById('refreshOverlay');btn.classList.add('is-loading');icon.classList.add('icon-spin');text.textContent='Loading...';ov.classList.add('active');try{await loadAllSheets(true);showToast('Data berhasil diperbarui!','success');}catch(e){showToast('Gagal memuat data.','info');}ov.classList.remove('active');btn.classList.remove('is-loading');icon.classList.remove('icon-spin');text.textContent='Refresh';isRefreshing=false;}
  function escapeHTML(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]||m);}
  function renderAssetsGrid(data){if(!data.length)return'<div class="empty-state">Tidak ada data</div>';let h='<div class="assets-grid">';data.forEach(r=>{const k=Object.keys(r),t=r[k[0]]||'-',v=r[k[1]]||'-',d=r[k[2]]||'-';h+=`<div class="asset-card"><div class="asset-header"><span>${escapeHTML(t)}</span><i class="fas fa-crown" style="color:#ffd700;"></i></div><div class="asset-display">${escapeHTML(v)}</div><div style="padding:0 18px 10px;font-size:0.75rem;color:#8892b0;">${escapeHTML(d)}</div><div style="padding:0 18px 18px;"><button class="btn-copy-action copy-btn" data-val="${escapeHTML(v)}" data-desc="${escapeHTML(d)}"><i class="fas fa-copy"></i> Copy</button></div></div>`;});h+='</div>';return h;}
  function renderQna(data){if(!data.length)return'<div class="empty-state">Tidak ada data</div>';const k=Object.keys(data[0]),cA=k[0],cB=k[1],cC=k[2]||null,oC=CCC.includes(currentSheet);let h='<table class="qna-table"><thead><tr><th>'+escapeHTML(cA)+'</th>'+(cC?'<th>'+escapeHTML(cB)+'</th><th>'+escapeHTML(cC)+'</th>':'<th>'+escapeHTML(cB)+'</th>')+'<th>Copy</th></tr></thead><tbody>';data.forEach(r=>{const v1=r[k[0]]||'',v2=r[k[1]]||'',v3=cC?(r[k[2]]||''):'';let ct=oC?(v3||v2||v1):[v1,v2,v3].filter(Boolean).join(' — ');h+='<tr><td>'+escapeHTML(v1)+'</td>'+(cC?'<td>'+escapeHTML(v2)+'</td><td>'+escapeHTML(v3)+'</td>':'<td>'+escapeHTML(v2)+'</td>')+'<td class="col-action"><button class="copy-trigger copy-btn" data-text="'+escapeHTML(ct)+'"><i class="fas fa-copy"></i> Salin</button></td></tr>';});h+='</tbody></table>';return h;}
  function renderSidebarLayout(data){if(!data.length)return'<div class="empty-state">Tidak ada data</div>';const k=Object.keys(data[0]);let h=`<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list"></i> Index</div><div class="sidebar-list">`;data.forEach((r,i)=>{h+=`<div class="sidebar-item" data-index="${i}"><i class="fas fa-caret-right"></i> ${escapeHTML(r[k[0]]||`Item ${i+1}`)}</div>`;});h+=`</div></div><div class="detail-col" id="detailPanel"><div class="detail-content"><i class="fas fa-info-circle"></i> Pilih item</div></div></div>`;return h;}
  function renderSheet(sn){currentSheet=sn;document.getElementById('pageTitle').innerHTML=sn.toUpperCase().replace(/_/g,' ');document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.sheet===sn));document.getElementById('searchInput').value='';const data=allData[sn]||[],c=document.getElementById('tableContainer');if(sn==='bonus')c.innerHTML=renderAssetsGrid(data);else if(sn==='PK_anti_audit'){c.innerHTML=renderSidebarLayout(data);setTimeout(()=>{const items=document.querySelectorAll('.sidebar-item'),panel=document.getElementById('detailPanel');if(!items.length)return;const update=i=>{const r=data[i],k=Object.keys(r),t=r[k[0]]||'-',d=r[k[2]]||r[k[1]]||'-';panel.innerHTML=`<div class="detail-content"><div style="color:#ff2e63;font-weight:600;font-size:0.95rem;">📌 ${escapeHTML(t)}</div><div style="margin-top:12px;background:rgba(0,0,0,0.3);padding:14px;border-radius:16px;font-size:0.82rem;color:var(--text-secondary);line-height:1.7;">${escapeHTML(d)}</div><button class="copy-btn" data-desc="${escapeHTML(d)}" style="margin-top:16px;width:100%;padding:10px;background:rgba(255,46,99,0.1);border:1px solid rgba(255,46,99,0.3);border-radius:40px;color:#ff2e63;cursor:pointer;font-weight:600;font-size:0.8rem;"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;};items.forEach(item=>{item.addEventListener('click',()=>{items.forEach(i=>i.classList.remove('active'));item.classList.add('active');update(parseInt(item.dataset.index));});});if(items[0]){items[0].classList.add('active');update(0);}},60);}else c.innerHTML=renderQna(data);}
  function handleSearch(){const q=document.getElementById('searchInput').value.toLowerCase(),data=allData[currentSheet]||[];if(!data.length)return;if(currentSheet==='PK_anti_audit'){const items=document.querySelectorAll('.sidebar-item');let f=-1;items.forEach((item,i)=>{const m=Object.values(data[i]).some(v=>v&&String(v).toLowerCase().includes(q));item.style.display=m?'flex':'none';if(m&&f===-1)f=i;});const a=document.querySelector('.sidebar-item.active');if((!a||a.style.display==='none')&&f!==-1)document.querySelector(`.sidebar-item[data-index="${f}"]`)?.click();}else if(currentSheet==='bonus')document.getElementById('tableContainer').innerHTML=renderAssetsGrid(data.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(q))));else document.getElementById('tableContainer').innerHTML=renderQna(data.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(q))));}
  function addLightningFlash(el){if(!el)return;el.style.transition='box-shadow 0.1s';el.style.boxShadow='0 0 20px rgba(255,46,99,0.6),inset 0 0 10px rgba(255,46,99,0.2)';setTimeout(()=>{el.style.boxShadow='';},250);}
  document.querySelectorAll('.nav-item').forEach(item=>{item.addEventListener('click',()=>{addLightningFlash(item);renderSheet(item.dataset.sheet);});});
  document.getElementById('refreshBtn').addEventListener('click',()=>{addLightningFlash(document.getElementById('refreshBtn'));handleRefresh();});
  document.addEventListener('click',async e=>{const btn=e.target.closest('.copy-btn');if(!btn)return;let t='';if(btn.dataset.val&&btn.dataset.desc)t=`${btn.dataset.val} — ${btn.dataset.desc}`;else if(btn.dataset.text)t=btn.dataset.text;else if(btn.dataset.desc)t=btn.dataset.desc;if(t){e.preventDefault();try{await navigator.clipboard.writeText(t);}catch{}showToast('Data berhasil disalin!','success');btn.style.transform='scale(0.95)';setTimeout(()=>{if(btn)btn.style.transform='';},150);}});
  document.getElementById('searchInput').addEventListener('input',handleSearch);
  loadAllSheets(false);
</script>
</body>
