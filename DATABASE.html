<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#1a1008;--bg-subtle:#2a1a10;
      --surface:rgba(40,28,16,0.85);--surface-solid:#2a1e14;--surface-hover:rgba(50,38,22,0.9);
      --text:#fef3c7;--text-secondary:#d4a574;--text-muted:#8b6c4a;
      --accent:#f59e0b;--accent-hover:#d97706;--accent-soft:rgba(245,158,11,0.1);--accent-light:rgba(245,158,11,0.08);
      --gold:#fbbf24;--gold-soft:rgba(251,191,36,0.12);
      --green:#34d399;--green-soft:rgba(52,211,153,0.1);
      --red:#ef4444;
      --border:rgba(245,158,11,0.08);--border-medium:rgba(245,158,11,0.15);
      --radius:12px;--radius-lg:18px;--radius-pill:999px;
      --shadow-card:0 8px 40px rgba(0,0,0,0.5);--shadow-hover:0 4px 20px rgba(245,158,11,0.1);
      --shadow-sm:0 2px 8px rgba(0,0,0,0.3);
      --car-amber:#D97706;--car-gold:#F59E0B;
    }
    html,body{height:100%;width:100%;overflow-x:hidden;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;display:flex;flex-direction:column;}

    /* ── Golden Hour Background ── */
    .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .sunset-grad{position:absolute;inset:0;background:linear-gradient(180deg,#1a0a04 0%,#2d1408 20%,#5c2a0e 40%,#8b4513 55%,#c67626 70%,#e8a545 82%,#fcd34d 92%,#fef9c3 100%);background-size:100% 250%;animation:sunsetMove 25s ease-in-out infinite alternate;}
    @keyframes sunsetMove{0%{background-position:50% 100%;}100%{background-position:50% 0%;}}
    .sunset-sun{position:absolute;width:600px;height:600px;border-radius:50%;left:50%;bottom:10%;transform:translateX(-50%);background:radial-gradient(circle,#fff 0%,#fef3c7 15%,#f59e0b 40%,rgba(217,119,6,0) 65%);filter:blur(50px);animation:sunBreath 10s ease-in-out infinite alternate;opacity:0.7;}
    @keyframes sunBreath{0%{opacity:0.6;transform:translateX(-50%) scale(1);}100%{opacity:0.85;transform:translateX(-50%) scale(1.1);}}
    .sunset-cloud{position:absolute;background:rgba(255,255,255,0.08);border-radius:100px;filter:blur(40px);will-change:transform;}
    .sunset-cloud.c1{width:500px;height:80px;top:25%;left:-500px;animation:drift 45s linear infinite;}
    .sunset-cloud.c2{width:700px;height:100px;top:40%;left:-700px;animation:drift 60s linear infinite;animation-delay:-20s;opacity:0.5;}
    @keyframes drift{0%{transform:translateX(0);}100%{transform:translateX(calc(100vw + 800px));}}

    /* ── NEW: God Rays ── */
    .god-rays{position:absolute;inset:0;overflow:hidden;opacity:0.35;mix-blend-mode:screen;}
    .god-ray{position:absolute;bottom:15%;left:50%;width:3px;transform-origin:bottom center;background:linear-gradient(to top,rgba(251,191,36,0.4),rgba(245,158,11,0.05),transparent);filter:blur(2px);}
    .god-ray:nth-child(1){height:70vh;transform:rotate(-35deg);animation:rayPulse 6s ease-in-out infinite alternate;}
    .god-ray:nth-child(2){height:80vh;transform:rotate(-20deg);animation:rayPulse 8s ease-in-out infinite alternate;animation-delay:-2s;opacity:0.7;}
    .god-ray:nth-child(3){height:60vh;transform:rotate(-5deg);animation:rayPulse 7s ease-in-out infinite alternate;animation-delay:-4s;}
    .god-ray:nth-child(4){height:75vh;transform:rotate(10deg);animation:rayPulse 9s ease-in-out infinite alternate;animation-delay:-1s;opacity:0.6;}
    .god-ray:nth-child(5){height:65vh;transform:rotate(25deg);animation:rayPulse 7.5s ease-in-out infinite alternate;animation-delay:-3s;}
    .god-ray:nth-child(6){height:55vh;transform:rotate(40deg);animation:rayPulse 6.5s ease-in-out infinite alternate;animation-delay:-5s;opacity:0.5;}
    .god-ray:nth-child(7){height:50vh;transform:rotate(-50deg);animation:rayPulse 8.5s ease-in-out infinite alternate;animation-delay:-2.5s;opacity:0.4;}
    .god-ray:nth-child(8){height:45vh;transform:rotate(55deg);animation:rayPulse 9.5s ease-in-out infinite alternate;animation-delay:-4.5s;opacity:0.3;}
    @keyframes rayPulse{0%{opacity:0.15;filter:blur(2px);}100%{opacity:0.6;filter:blur(4px);}}

    /* ── NEW: Floating Bokeh Orbs ── */
    .bokeh-layer{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
    .bokeh-orb{position:absolute;border-radius:50%;will-change:transform,opacity;mix-blend-mode:screen;}
    .bokeh-orb.b1{width:120px;height:120px;left:8%;top:20%;background:radial-gradient(circle,rgba(245,158,11,0.08),transparent 70%);animation:bokehFloat 18s ease-in-out infinite alternate;}
    .bokeh-orb.b2{width:200px;height:200px;right:5%;top:35%;background:radial-gradient(circle,rgba(251,191,36,0.06),transparent 70%);animation:bokehFloat 22s ease-in-out infinite alternate-reverse;}
    .bokeh-orb.b3{width:80px;height:80px;left:40%;top:10%;background:radial-gradient(circle,rgba(217,119,6,0.1),transparent 70%);animation:bokehFloat 15s ease-in-out infinite alternate;animation-delay:-5s;}
    .bokeh-orb.b4{width:150px;height:150px;left:65%;top:55%;background:radial-gradient(circle,rgba(252,211,77,0.05),transparent 70%);animation:bokehFloat 20s ease-in-out infinite alternate-reverse;animation-delay:-8s;}
    .bokeh-orb.b5{width:60px;height:60px;left:25%;top:60%;background:radial-gradient(circle,rgba(245,158,11,0.12),transparent 70%);animation:bokehFloat 14s ease-in-out infinite alternate;animation-delay:-3s;}
    .bokeh-orb.b6{width:180px;height:180px;right:20%;top:15%;background:radial-gradient(circle,rgba(251,191,36,0.04),transparent 70%);animation:bokehFloat 25s ease-in-out infinite alternate-reverse;animation-delay:-10s;}
    @keyframes bokehFloat{0%{transform:translate(0,0) scale(1);opacity:0.4;}25%{transform:translate(30px,-20px) scale(1.1);opacity:0.7;}50%{transform:translate(-15px,25px) scale(0.9);opacity:0.5;}75%{transform:translate(20px,10px) scale(1.05);opacity:0.8;}100%{transform:translate(-10px,-15px) scale(1);opacity:0.6;}}

    /* Particle Canvases */
    .dust-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
    .vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse 65% 55% at 50% 50%,transparent 20%,rgba(26,16,8,0.8) 100%);}

    /* ── NEW: Stars Canvas ── */
    #starsCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}

    /* Loader */
    #loader{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity 0.5s ease,visibility 0.5s ease;}
    #loader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
    .loader-brand{font-family:'Instrument Serif',serif;font-style:italic;font-size:3.2rem;color:var(--accent);line-height:1;text-shadow:0 0 40px rgba(245,158,11,0.4);animation:loaderGlow 2s ease-in-out infinite alternate;}
    @keyframes loaderGlow{0%{text-shadow:0 0 40px rgba(245,158,11,0.3);filter:brightness(1);}100%{text-shadow:0 0 60px rgba(245,158,11,0.6),0 0 100px rgba(251,191,36,0.2);filter:brightness(1.15);}}
    .loader-sub{color:var(--text-muted);font-size:0.65rem;letter-spacing:2.5px;text-transform:uppercase;font-weight:600;}
    .loader-track{width:240px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;position:relative;}
    .loader-fill{width:0%;height:100%;background:linear-gradient(90deg,var(--gold),var(--accent));transition:width 0.3s cubic-bezier(0.4,0,0.2,1);border-radius:2px;box-shadow:0 0 10px var(--accent);}
    .loader-track::after{content:'';position:absolute;top:-2px;width:30px;height:6px;background:radial-gradient(ellipse,var(--gold),transparent);border-radius:50%;animation:trackGlow 1.5s ease-in-out infinite;right:0;opacity:0;}
    @keyframes trackGlow{0%{opacity:0;right:0;}50%{opacity:1;}100%{opacity:0;right:100%;}}
    .loader-status{color:var(--text-muted);font-size:0.6rem;font-family:'JetBrains Mono',monospace;min-height:1em;}
    .loader-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
    .loader-particle{position:absolute;width:2px;height:2px;background:var(--accent);border-radius:50%;opacity:0;animation:lPart 3s ease-in-out infinite;}
    @keyframes lPart{0%{opacity:0;transform:translateY(0);}20%{opacity:0.8;}100%{opacity:0;transform:translateY(-120px);}}

    /* Navigation */
    .top-nav{position:relative;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 32px;background:rgba(26,16,8,0.85);backdrop-filter:blur(24px) saturate(150%);-webkit-backdrop-filter:blur(24px) saturate(150%);border-bottom:1px solid var(--border);flex-shrink:0;}
    .top-nav::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.3;}
    .nav-brand{display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .nav-logo{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#b45309);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:1.3rem;color:#fff;font-weight:400;box-shadow:0 2px 12px rgba(245,158,11,0.35);position:relative;overflow:hidden;animation:logoGlow 3s ease-in-out infinite alternate;}
    @keyframes logoGlow{0%{box-shadow:0 2px 12px rgba(245,158,11,0.35);}100%{box-shadow:0 2px 20px rgba(245,158,11,0.55),0 0 40px rgba(251,191,36,0.15);}}
    .nav-logo::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,0.15) 50%,transparent 60%);animation:logoShine 4s ease-in-out infinite;}
    @keyframes logoShine{0%,80%,100%{transform:translateX(-100%) rotate(45deg);}40%{transform:translateX(100%) rotate(45deg);}}
    .nav-desc{font-size:0.58rem;color:var(--text-muted);letter-spacing:1.2px;text-transform:uppercase;font-weight:600;line-height:1.3;}
    .nav-tabs{display:flex;gap:4px;background:rgba(26,16,8,0.6);border:1px solid var(--border);border-radius:var(--radius-pill);padding:4px;box-shadow:var(--shadow-sm);overflow-x:auto;max-width:100%;}
    .nav-tab{padding:8px 18px;border-radius:var(--radius-pill);font-size:0.7rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;gap:7px;white-space:nowrap;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden;}
    .nav-tab:hover{color:var(--text);background:var(--accent-light);}
    .nav-tab.active{background:linear-gradient(135deg,var(--accent),#b45309);color:#fff;box-shadow:0 2px 12px rgba(245,158,11,0.4);}
    .nav-tab i{font-size:0.65rem;}
    .nav-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
    .status-pill{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:var(--radius-pill);background:var(--green-soft);border:1px solid rgba(52,211,153,0.15);font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:500;color:var(--green);font-variant-numeric:tabular-nums;}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:dotPulse 2.5s ease-in-out infinite;box-shadow:0 0 8px var(--green);}
    @keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.4;transform:scale(0.7);}}

    /* ── NEW: Stats Bar ── */
    .stats-bar{position:relative;z-index:10;display:flex;align-items:center;gap:8px;padding:10px 28px;flex-shrink:0;overflow-x:auto;}
    .stat-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--radius-pill);background:var(--surface);border:1px solid var(--border);font-size:0.62rem;font-family:'JetBrains Mono',monospace;color:var(--text-muted);white-space:nowrap;backdrop-filter:blur(10px);transition:all 0.2s;}
    .stat-chip i{font-size:0.55rem;opacity:0.6;}
    .stat-chip .stat-val{color:var(--text-secondary);font-weight:600;}
    .stat-chip.stat-highlight{border-color:var(--border-medium);background:var(--accent-light);}
    .stat-chip.stat-highlight .stat-val{color:var(--accent);}

    /* Main Content */
    .main{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;padding:0 28px 150px 28px;min-height:0;}
    .content-card{background:var(--surface);backdrop-filter:blur(40px) saturate(120%);-webkit-backdrop-filter:blur(40px) saturate(120%);border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;box-shadow:var(--shadow-card);position:relative;}

    /* ── NEW: Animated Gradient Border ── */
    .content-card::before{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:calc(var(--radius-lg) + 1px);background:conic-gradient(from var(--border-angle,0deg),transparent 40%,var(--accent) 45%,var(--gold) 50%,var(--accent) 55%,transparent 60%);z-index:-1;opacity:0.5;animation:rotateBorder 8s linear infinite;}
    @property --border-angle{syntax:'<angle>';initial-value:0deg;inherits:false;}
    @keyframes rotateBorder{to{--border-angle:360deg;}}
    .content-card::after{content:'';position:absolute;top:-1px;left:-1px;right:-1px;bottom:-1px;border-radius:calc(var(--radius-lg) + 1px);background:var(--surface);z-index:-1;}

    /* ── Top gold accent bar ── */
    .card-top-bar{height:3px;background:linear-gradient(90deg,var(--gold),var(--accent),var(--gold));z-index:5;box-shadow:0 0 20px rgba(245,158,11,0.3);flex-shrink:0;position:relative;overflow:hidden;}
    .card-top-bar::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);animation:topBarShine 5s ease-in-out infinite;}
    @keyframes topBarShine{0%,100%{left:-100%;}50%{left:150%;}}

    /* ── NEW: Gold Shine Sweep ── */
    .gold-sweep{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:5;overflow:hidden;border-radius:var(--radius-lg);}
    .gold-sweep::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(245,158,11,0.02) 50%,transparent 60%);animation:goldShine 8s linear infinite;}
    @keyframes goldShine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

    .refresh-overlay{position:absolute;inset:0;background:rgba(26,16,8,0.8);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center;z-index:20;border-radius:var(--radius-lg);}
    .refresh-overlay.active{display:flex;}
    .refresh-spinner{width:36px;height:36px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .card-header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:14px;padding:22px 28px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .header-title h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.5rem;color:var(--text);line-height:1.2;text-shadow:0 0 20px rgba(245,158,11,0.15);position:relative;}
    .header-title h1::after{content:'';position:absolute;bottom:-4px;left:0;width:40px;height:2px;background:var(--accent);border-radius:2px;transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}
    .header-title:hover h1::after{width:100%;}
    .header-title p{font-size:0.6rem;color:var(--text-muted);margin-top:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;}
    .header-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
    .search-wrap{position:relative;}
    .search-wrap i{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.72rem;pointer-events:none;transition:color 0.2s;}
    .search-wrap input{background:rgba(26,16,8,0.6);border:1px solid var(--border);border-radius:var(--radius-pill);padding:9px 16px 9px 38px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.78rem;width:240px;outline:none;transition:all 0.25s;}
    .search-wrap input::placeholder{color:var(--text-muted);}
    .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light);width:280px;}
    .search-wrap:focus-within i{color:var(--accent);}

    .btn-refresh{background:var(--surface);border:1px solid var(--border);padding:9px 20px;border-radius:var(--radius-pill);color:var(--text-secondary);font-weight:600;font-size:0.7rem;cursor:pointer;transition:all 0.25s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden;}
    .btn-refresh:hover{border-color:var(--border-medium);color:var(--accent);box-shadow:var(--shadow-hover);transform:translateY(-1px);}
    .btn-refresh:active{transform:scale(0.97) translateY(0);}
    .btn-refresh.is-loading{opacity:0.5;pointer-events:none;}
    .btn-refresh .icon-spin{animation:spin 0.8s linear infinite;display:inline-block;}

    /* ── NEW: Ripple Effect ── */
    .ripple{position:absolute;border-radius:50%;background:rgba(245,158,11,0.25);transform:scale(0);animation:rippleAnim 0.6s ease-out forwards;pointer-events:none;}
    @keyframes rippleAnim{to{transform:scale(4);opacity:0;}}

    /* ── NEW: Tab Content Transition ── */
    .tab-content-enter{animation:tabEnter 0.4s cubic-bezier(0.4,0,0.2,1) forwards;}
    @keyframes tabEnter{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    .table-scroll{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:200px;position:relative;}
    .table-scroll::-webkit-scrollbar{width:5px;}
    .table-scroll::-webkit-scrollbar-track{background:transparent;}
    .table-scroll::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px;}
    .table-scroll::-webkit-scrollbar-thumb:hover{background:var(--accent);}

    /* ── NEW: Skeleton Loading ── */
    .skeleton-row{display:flex;gap:16px;padding:14px 22px;border-bottom:1px solid var(--border);}
    .skeleton-cell{height:14px;border-radius:6px;background:linear-gradient(90deg,var(--border) 25%,var(--border-medium) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;}
    @keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}
    .skeleton-cell.sk-wide{width:60%;}
    .skeleton-cell.sk-med{width:35%;}
    .skeleton-cell.sk-narrow{width:20%;}
    .skeleton-cell.sk-action{width:60px;height:28px;border-radius:var(--radius-pill);}

    .qna-table{width:100%;border-collapse:collapse;font-size:0.78rem;}
    .qna-table th{text-align:left;padding:13px 22px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border-medium);font-size:0.6rem;text-transform:uppercase;letter-spacing:1.2px;position:sticky;top:0;background:var(--surface-solid);backdrop-filter:blur(10px);z-index:5;}
    .qna-table th::after{content:'';position:absolute;bottom:0;left:22px;right:22px;height:1px;background:linear-gradient(90deg,var(--accent),transparent);opacity:0.3;}
    .qna-table td{padding:12px 22px;border-bottom:1px solid var(--border);color:var(--text-secondary);transition:all 0.15s;}
    .qna-table tbody tr{transition:all 0.2s;}
    .qna-table tbody tr:hover{background:var(--accent-soft);}
    .qna-table tbody tr:hover td{color:var(--text);}
    .qna-table tbody tr:active{background:rgba(245,158,11,0.15);}
    .col-action button{background:none;border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px 14px;cursor:pointer;transition:all 0.2s;color:var(--accent);font-size:0.66rem;font-weight:600;display:inline-flex;align-items:center;gap:5px;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden;}
    .col-action button:hover{background:var(--accent-soft);border-color:var(--accent);box-shadow:0 2px 8px rgba(245,158,11,0.15);transform:translateY(-1px);}
    .col-action button:active{transform:scale(0.95);}

    .layout-split{display:flex;flex-direction:row;height:100%;min-height:400px;}
    .sidebar-col{width:280px;flex-shrink:0;background:rgba(26,16,8,0.5);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
    .sidebar-col::-webkit-scrollbar{width:3px;}
    .sidebar-col::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px;}
    .sidebar-header{padding:16px 22px;font-size:0.58rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;gap:10px;flex-shrink:0;}
    .sidebar-count{background:var(--gold-soft);color:var(--gold);padding:2px 9px;border-radius:var(--radius-pill);font-size:0.56rem;font-family:'JetBrains Mono',monospace;border:1px solid rgba(251,191,36,0.1);}
    .sidebar-item{padding:13px 22px;font-size:0.78rem;cursor:pointer;border-left:3px solid transparent;transition:all 0.2s cubic-bezier(0.4,0,0.2,1);color:var(--text-secondary);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent;position:relative;}
    .sidebar-item:hover{background:var(--surface-hover);color:var(--text);padding-left:26px;}
    .sidebar-item.active{background:var(--accent-soft);border-left-color:var(--accent);color:var(--accent);font-weight:600;}
    .sidebar-item.active::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:60%;background:var(--accent);border-radius:3px;box-shadow:0 0 8px var(--accent);}
    .sidebar-item .item-num{font-family:'JetBrains Mono',monospace;font-size:0.56rem;color:var(--text-muted);min-width:20px;transition:color 0.2s;}
    .sidebar-item.active .item-num{color:var(--accent);}

    .detail-col{flex:1;padding:28px 32px;overflow-y:auto;}
    .detail-content{animation:slideUp 0.3s cubic-bezier(0.4,0,0.2,1);}
    @keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
    .detail-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.2rem;color:var(--gold);margin-bottom:18px;display:flex;align-items:center;gap:10px;line-height:1.3;text-shadow:0 0 20px rgba(251,191,36,0.15);}
    .detail-title i{font-size:0.8rem;opacity:0.6;}
    .detail-body{background:rgba(26,16,8,0.6);padding:22px;border-radius:var(--radius);font-size:0.82rem;color:var(--text-secondary);line-height:1.85;white-space:pre-wrap;border:1px solid var(--border);position:relative;overflow:hidden;}
    .detail-body::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:linear-gradient(to bottom,var(--accent),transparent);border-radius:0 2px 2px 0;}
    .detail-copy-btn{margin-top:18px;width:100%;padding:12px;background:var(--accent-soft);border:1px solid rgba(245,158,11,0.15);border-radius:var(--radius-pill);color:var(--accent);cursor:pointer;font-weight:600;font-size:0.72rem;transition:all 0.25s;display:flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;letter-spacing:0.5px;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;position:relative;overflow:hidden;}
    .detail-copy-btn:hover{background:linear-gradient(135deg,var(--accent),#b45309);color:#fff;border-color:transparent;box-shadow:0 4px 16px rgba(245,158,11,0.3);transform:translateY(-1px);}
    .detail-copy-btn:active{transform:scale(0.98) translateY(0);}

    .empty-state{padding:80px 20px;text-align:center;color:var(--text-muted);font-size:0.85rem;}
    .empty-state i{font-size:2.2rem;margin-bottom:14px;display:block;opacity:0.2;}
    .empty-icon-wrap{width:80px;height:80px;margin:0 auto 20px;border-radius:50%;background:var(--accent-light);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;animation:emptyPulse 3s ease-in-out infinite alternate;}
    .empty-icon-wrap i{font-size:1.5rem;opacity:0.4;color:var(--accent);margin:0;}
    @keyframes emptyPulse{0%{box-shadow:0 0 0 0 rgba(245,158,11,0.1);}100%{box-shadow:0 0 0 20px rgba(245,158,11,0);}}

    #notif-container{position:fixed;bottom:160px;right:24px;z-index:10000;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
    .toast{pointer-events:auto;background:var(--surface-solid);border:1px solid var(--border);border-left:4px solid var(--green);padding:14px 20px;border-radius:var(--radius);font-size:0.8rem;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow-card);animation:toastIn 0.35s cubic-bezier(0.4,0,0.2,1);transition:all 0.3s;backdrop-filter:blur(20px);}
    .toast.toast-success{border-left-color:var(--green);}
    .toast.toast-success i{color:var(--green);}
    .toast.toast-info{border-left-color:var(--accent);}
    .toast.toast-info i{color:var(--accent);}
    .toast.toast-warn{border-left-color:var(--gold);}
    .toast.toast-warn i{color:var(--gold);}
    @keyframes toastIn{from{transform:translateX(100%) scale(0.9);opacity:0;}to{transform:translateX(0) scale(1);opacity:1;}}

    .row-anim{animation:slideUp 0.25s ease both;}

    /* ── NEW: Scroll-to-Top Button ── */
    .scroll-top-btn{position:fixed;bottom:170px;left:28px;z-index:100;width:42px;height:42px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--accent);display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(20px) scale(0.8);transition:all 0.3s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(20px);box-shadow:var(--shadow-sm);pointer-events:none;}
    .scroll-top-btn.visible{opacity:1;transform:translateY(0) scale(1);pointer-events:auto;}
    .scroll-top-btn:hover{background:var(--accent-soft);border-color:var(--accent);box-shadow:0 4px 16px rgba(245,158,11,0.2);transform:translateY(-2px) scale(1.05);}
    .scroll-top-btn:active{transform:scale(0.95);}

    /* ── NEW: Keyboard Shortcut Badge ── */
    .kbd{display:inline-flex;align-items:center;justify-content:center;padding:2px 6px;border-radius:4px;background:rgba(26,16,8,0.6);border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:0.5rem;color:var(--text-muted);line-height:1.4;vertical-align:middle;margin-left:4px;}

    /* ── Cinematic Car Animation Layer ── */
    .animation-layer{position:fixed;bottom:0;left:0;width:100%;height:140px;pointer-events:none;z-index:50;}
    .road-surface{position:absolute;bottom:0;left:0;width:100%;height:72px;z-index:2;background:linear-gradient(180deg,rgba(245,158,11,0.1),#1a1510 12%,#12100c 30%,#0a0908);overflow:hidden;}
    .road-edge-top{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(217,119,6,0.5) 8%,rgba(251,191,36,0.9) 50%,rgba(217,119,6,0.5) 92%,transparent);box-shadow:0 0 15px rgba(217,119,6,0.4),0 0 30px rgba(217,119,6,0.15);}
    .lane-center{position:absolute;top:35px;left:0;width:200%;height:2px;background:repeating-linear-gradient(90deg,transparent 0px,transparent 25px,rgba(251,191,36,0.7) 25px,rgba(251,191,36,0.7) 55px,transparent 55px,transparent 80px);animation:laneScroll 0.7s linear infinite;will-change:transform;box-shadow:0 0 8px rgba(251,191,36,0.3);}
    @keyframes laneScroll{0%{transform:translateX(0);}100%{transform:translateX(-80px);}}
    .road-light-streak{position:absolute;top:10px;left:0;width:100%;height:50px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.03) 20%,rgba(245,158,11,0.05) 50%,rgba(245,158,11,0.03) 80%,transparent);animation:streakPulse 4s ease-in-out infinite alternate;}
    @keyframes streakPulse{0%{opacity:0.5;}100%{opacity:1;}}

    /* ── NEW: Wet Road Reflection ── */
    .road-wet-reflect{position:absolute;top:2px;left:0;width:100%;height:15px;background:linear-gradient(180deg,rgba(251,191,36,0.08),transparent);filter:blur(3px);animation:wetPulse 3s ease-in-out infinite alternate;}
    @keyframes wetPulse{0%{opacity:0.3;}100%{opacity:0.8;}}

    .street-lights{position:absolute;bottom:68px;left:0;width:100%;height:40px;z-index:3;}
    .street-light{position:absolute;bottom:0;width:2px;height:32px;background:linear-gradient(to top,rgba(255,255,255,0.06),transparent);}
    .street-light::after{content:'';position:absolute;top:-3px;left:-5px;width:12px;height:7px;border-radius:50%;}
    .street-light:nth-child(odd)::after{background:var(--car-amber);box-shadow:0 0 12px var(--car-amber);animation:sA 2.5s ease-in-out infinite alternate;}
    .street-light:nth-child(even)::after{background:#fff;box-shadow:0 0 8px rgba(255,255,255,0.8);animation:sW 2.5s ease-in-out infinite alternate;}
    @keyframes sA{0%{opacity:0.3;}100%{opacity:1;}}@keyframes sW{0%{opacity:1;}100%{opacity:0.3;}}
    .light-cone{position:absolute;top:7px;left:50%;transform:translateX(-50%);width:90px;height:65px;clip-path:polygon(35% 0%,65% 0%,100% 100%,0% 100%);background:linear-gradient(to bottom,rgba(217,119,6,0.06),transparent);}
    .street-light:nth-child(1){left:4%;}.street-light:nth-child(2){left:20%;}.street-light:nth-child(3){left:38%;}.street-light:nth-child(4){left:56%;}.street-light:nth-child(5){left:74%;}.street-light:nth-child(6){left:92%;}

    /* ── NEW: Fireflies near road ── */
    .fireflies{position:absolute;bottom:60px;left:0;width:100%;height:60px;z-index:4;overflow:hidden;}
    .firefly{position:absolute;width:3px;height:3px;border-radius:50%;background:#fef3c7;}
    .firefly:nth-child(1){left:10%;top:30%;animation:fireflyDance 6s ease-in-out infinite;box-shadow:0 0 6px 2px rgba(251,191,36,0.4);}
    .firefly:nth-child(2){left:30%;top:50%;animation:fireflyDance 8s ease-in-out infinite;animation-delay:-2s;box-shadow:0 0 6px 2px rgba(251,191,36,0.3);}
    .firefly:nth-child(3){left:55%;top:20%;animation:fireflyDance 7s ease-in-out infinite;animation-delay:-4s;box-shadow:0 0 6px 2px rgba(251,191,36,0.5);}
    .firefly:nth-child(4){left:75%;top:60%;animation:fireflyDance 9s ease-in-out infinite;animation-delay:-1s;box-shadow:0 0 6px 2px rgba(251,191,36,0.35);}
    .firefly:nth-child(5){left:90%;top:40%;animation:fireflyDance 5s ease-in-out infinite;animation-delay:-3s;box-shadow:0 0 6px 2px rgba(251,191,36,0.45);}
    @keyframes fireflyDance{0%{transform:translate(0,0);opacity:0;}15%{opacity:1;}30%{transform:translate(15px,-20px);opacity:0.6;}50%{transform:translate(-10px,10px);opacity:1;}70%{transform:translate(20px,5px);opacity:0.3;}85%{opacity:0.8;}100%{transform:translate(-5px,-10px);opacity:0;}}

    .car-layer{position:absolute;bottom:0;left:0;width:100%;height:72px;z-index:6;overflow:visible;}
    .cyber-car{position:absolute;width:190px;height:62px;will-change:transform;}
    .cyber-car svg{filter:drop-shadow(0 5px 15px rgba(0,0,0,0.9)) drop-shadow(0 0 5px rgba(217,119,6,0.15));}
    .car-hover-anim{animation:carFloat 1.6s ease-in-out infinite alternate;}
    @keyframes carFloat{0%{transform:translateY(0);}100%{transform:translateY(-2px);}}

    .headlight-beam{position:absolute;top:16px;width:120px;height:32px;opacity:0.25;}
    .headlight-beam.beam-left{right:100%;margin-right:-3px;background:linear-gradient(to left,rgba(255,255,215,0.9),transparent);clip-path:polygon(100% 16%,100% 84%,0% 100%,0% 0%);}
    .lens-flare{position:absolute;width:10px;height:10px;border-radius:50%;background:#ffffcc;}
    .lens-flare.flare-left{right:1px;top:17px;box-shadow:0 0 15px 6px rgba(255,255,200,0.6);}
    .taillight-bar{position:absolute;height:4px;border-radius:2px;background:#ef4444;box-shadow:0 0 12px #ef4444;}
    .taillight-bar.tl-left{left:3px;top:20px;width:18px;}

    .thruster{position:absolute;height:6px;border-radius:0 3px 3px 0;animation:thrusterPulse 0.12s ease-in-out infinite alternate;will-change:transform;}
    .thruster.thruster-left{left:-24px;top:22px;width:26px;transform-origin:right center;background:linear-gradient(to left,rgba(217,119,6,0.9),transparent);box-shadow:0 0 10px rgba(217,119,6,0.5);}
    .thruster.thruster-gold{left:-24px;top:22px;width:26px;transform-origin:right center;background:linear-gradient(to left,rgba(251,191,36,0.9),transparent);box-shadow:0 0 10px rgba(251,191,36,0.5);}
    @keyframes thrusterPulse{0%{transform:scaleX(0.7);opacity:0.5;}100%{transform:scaleX(1.3);opacity:1;}}

    .underglow-layer{position:absolute;bottom:2px;border-radius:50%;pointer-events:none;}
    .underglow-outer{left:5%;width:90%;height:16px;filter:blur(8px);animation:uOuter 1s ease-in-out infinite alternate;}
    .underglow-inner{left:15%;width:70%;height:9px;filter:blur(3px);animation:uInner 0.5s ease-in-out infinite alternate;}
    .underglow-core{left:25%;width:50%;height:4px;filter:blur(1px);background:white;opacity:0.3;animation:uCore 0.25s ease-in-out infinite alternate;}
    @keyframes uOuter{0%{opacity:0.2;}100%{opacity:0.5;}}@keyframes uInner{0%{opacity:0.35;}100%{opacity:0.8;}}@keyframes uCore{0%{opacity:0.1;}100%{opacity:0.5;}}
    .glow-amber .underglow-outer{background:radial-gradient(ellipse,rgba(217,119,6,0.6),transparent 70%);}
    .glow-amber .underglow-inner{background:radial-gradient(ellipse,rgba(251,191,36,0.8),transparent 70%);}
    .glow-gold .underglow-outer{background:radial-gradient(ellipse,rgba(251,191,36,0.5),transparent 70%);}
    .glow-gold .underglow-inner{background:radial-gradient(ellipse,rgba(251,191,36,0.7),transparent 70%);}

    .road-reflection{position:absolute;bottom:-8px;left:5%;width:90%;height:22px;border-radius:50%;filter:blur(12px);opacity:0.35;animation:reflPulse 1s ease-in-out infinite alternate;}
    @keyframes reflPulse{0%{opacity:0.15;}100%{opacity:0.35;}}

    .wheel-spin{animation:wheelRotate 0.3s linear infinite;transform-origin:center;}
    @keyframes wheelRotate{to{transform:rotate(360deg);}}

    .car-1{bottom:38px;right:-250px;animation:driveLeft 9s linear infinite;}
    .car-2{bottom:6px;left:-250px;animation:driveRight 7s linear infinite;}
    .car-3{bottom:38px;right:-250px;animation:driveLeft 14s linear infinite;animation-delay:-5s;opacity:0.4;}
    .car-4{bottom:6px;left:-250px;animation:driveRight 11s linear infinite;animation-delay:-3s;opacity:0.35;}
    .car-5{bottom:22px;right:-250px;animation:driveLeftFast 5.5s linear infinite;animation-delay:-1.5s;opacity:0.75;}
    @keyframes driveLeft{0%{transform:translateX(0);}100%{transform:translateX(calc(-100vw - 460px));}}
    @keyframes driveRight{0%{transform:translateX(0) scaleX(-1);}100%{transform:translateX(calc(100vw + 460px)) scaleX(-1);}}
    @keyframes driveLeftFast{0%{transform:translateX(0);}100%{transform:translateX(calc(-100vw - 460px));}}

    .boost-streak{position:absolute;right:100%;top:50%;transform:translateY(-50%);width:50px;height:2px;background:linear-gradient(to left,rgba(251,191,36,0.9),transparent);transform-origin:right center;animation:boostPulse 0.15s ease-in-out infinite alternate;will-change:transform;}
    @keyframes boostPulse{0%{transform:translateY(-50%) scaleX(0.6);opacity:0.3;}100%{transform:translateY(-50%) scaleX(1.5);opacity:1;}}

    .pulse-rings{position:absolute;bottom:72px;pointer-events:none;z-index:2;width:100%;}
    .pulse-ring{position:absolute;width:4px;height:4px;border:1px solid;border-radius:50%;opacity:0;will-change:transform,opacity;}
    .pulse-ring.pr1{left:22%;bottom:60px;border-color:rgba(217,119,6,0.4);animation:pulseExpand 6s ease-out infinite;}
    .pulse-ring.pr2{left:50%;bottom:80px;border-color:rgba(251,191,36,0.3);animation:pulseExpand 8s ease-out infinite;animation-delay:-3s;}
    .pulse-ring.pr3{left:78%;bottom:55px;border-color:rgba(245,158,11,0.3);animation:pulseExpand 7s ease-out infinite;animation-delay:-5s;}
    @keyframes pulseExpand{0%{transform:scale(1);opacity:0.6;}100%{transform:scale(18);opacity:0;}}

    #speed-particles{position:absolute;bottom:0;left:0;width:100%;height:72px;z-index:8;pointer-events:none;}

    /* ── NEW: Ambient Sound Toggle ── */
    .ambient-toggle{position:fixed;top:80px;right:24px;z-index:100;width:36px;height:36px;border-radius:50%;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.25s;backdrop-filter:blur(20px);font-size:0.7rem;}
    .ambient-toggle:hover{border-color:var(--accent);color:var(--accent);box-shadow:0 0 12px rgba(245,158,11,0.15);}
    .ambient-toggle.active{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}

    /* ── NEW: Quick Shortcut Hint ── */
    .shortcut-hint{position:fixed;bottom:170px;right:24px;z-index:99;display:flex;flex-direction:column;gap:4px;align-items:flex-end;}
    .shortcut-row{display:flex;align-items:center;gap:6px;font-size:0.55rem;color:var(--text-muted);opacity:0.5;transition:opacity 0.2s;}
    .shortcut-row:hover{opacity:1;}

    @media(max-width:768px){
      .top-nav{flex-wrap:wrap;padding:10px 16px;gap:8px;}
      .nav-tabs{order:3;width:100%;justify-content:flex-start;padding:3px;}
      .nav-tab{padding:7px 14px;font-size:0.65rem;}
      .nav-tab span{display:none;}
      .card-header{flex-direction:column;align-items:stretch;padding:16px 18px;}
      .search-wrap input{width:100%;}
      .search-wrap input:focus{width:100%;}
      .layout-split{flex-direction:column;}
      .sidebar-col{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:180px;}
      .main{padding:0 12px 115px 12px;}
      .stats-bar{padding:8px 12px;}
      .detail-col{padding:18px;}
      #notif-container{bottom:120px;right:12px;}
      .animation-layer{height:95px;}
      .road-surface{height:50px;} .car-layer{height:50px;} #speed-particles{height:50px;}
      .street-lights{bottom:47px;}
      .lane-center{top:24px;}
      .cyber-car{width:140px;height:46px;}
      .cyber-car svg{width:140px;height:46px;}
      .car-1{bottom:26px;}.car-2{bottom:2px;}.car-3{bottom:26px;}.car-4{bottom:2px;}.car-5{bottom:14px;}
      .sunset-sun{width:300px;height:300px;}
      .scroll-top-btn{bottom:120px;left:12px;width:38px;height:38px;}
      .ambient-toggle{top:70px;right:12px;width:32px;height:32px;font-size:0.6rem;}
      .shortcut-hint{display:none;}
      .god-ray{display:none;}
      .bokeh-orb.b2,.bokeh-orb.b4,.bokeh-orb.b6{display:none;}
      .fireflies{bottom:40px;height:40px;}
    }
  </style>
</head>
<body>

  <div class="bg-layer">

      <div class="god-ray"></div><div class="god-ray"></div>

  <!-- NEW: Stars Canvas -->

  <nav class="top-nav">
    <div class="nav-brand"><div class="nav-logo">沈</div><div class="nav-desc">Seputar kata kata indah</div></div>

      <button class="nav-tab active" data-sheet="bonus"><i class="fas fa-gem"></i><span>BONUS</span></button>
      <button class="nav-tab" data-sheet="PK_anti_audit"><i class="fas fa-shield-halved"></i><span>PK ANTI AUDIT</span></button>

    <div class="stat-chip"><i class="fas fa-clock"></i> Sync: <span class="stat-val" id="statSync">-</span></div>

  <main class="main">
    <div class="content-card">
      <div class="card-top-bar"></div>
      <div class="gold-sweep"></div>

<script>
/* ── NEW: Starfield ── */
const stC=document.getElementById('starsCanvas'),stX=stC.getContext('2d');
let stars=[];
function setupStars(){stC.width=window.innerWidth;stC.height=window.innerHeight;stars=[];for(let i=0;i<80;i++){stars.push({x:Math.random()*stC.width,y:Math.random()*stC.height*0.4,r:Math.random()*1.2+0.2,a:Math.random(),twinkleSpeed:Math.random()*0.02+0.005,twinklePhase:Math.random()*Math.PI*2});}}
function animStars(){stX.clearRect(0,0,stC.width,stC.height);for(let s of stars){s.twinklePhase+=s.twinkleSpeed;const alpha=s.a*(0.3+0.7*Math.abs(Math.sin(s.twinklePhase)));stX.globalAlpha=alpha;const g=stX.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*2);g.addColorStop(0,'rgba(255,255,255,0.9)');g.addColorStop(0.5,'rgba(251,191,36,0.3)');g.addColorStop(1,'transparent');stX.fillStyle=g;stX.beginPath();stX.arc(s.x,s.y,s.r*2,0,6.28);stX.fill();}stX.globalAlpha=1;requestAnimationFrame(animStars);}
setupStars();animStars();

/* ── NEW: Loader Particles ── */
(function(){const c=document.getElementById('loaderParticles');for(let i=0;i<12;i++){const p=document.createElement('div');p.className='loader-particle';p.style.left=Math.random()*100+'%';p.style.bottom=Math.random()*30+'%';p.style.animationDelay=Math.random()*3+'s';p.style.animationDuration=(2+Math.random()*2)+'s';c.appendChild(p);}})();

/* ── Golden Dust Particles ── */
const dC=document.getElementById('dustCanvas'),dX=dC.getContext('2d');
let dustParticles=[];
function setupDust(){dC.width=window.innerWidth;dC.height=window.innerHeight;dustParticles=[];for(let i=0;i<60;i++){dustParticles.push({x:Math.random()*dC.width,y:Math.random()*dC.height,r:Math.random()*1.8+0.3,a:Math.random()*0.15+0.02,vx:(Math.random()-0.5)*0.2,vy:Math.random()*0.3+0.1,w:Math.random()*Math.PI*2,ws:Math.random()*0.01+0.003,c:['#f59e0b','#fbbf24','#d97706','#fef3c7','#fcd34d'][Math.floor(Math.random()*5)]});}}
function animDust(){dX.clearRect(0,0,dC.width,dC.height);dX.globalCompositeOperation='lighter';for(let p of dustParticles){p.w+=p.ws;p.x+=p.vx+Math.sin(p.w)*0.2;p.y+=p.vy;if(p.y>dC.height+10){p.y=-10;p.x=Math.random()*dC.width;}if(p.x>dC.width)p.x=0;if(p.x<0)p.x=dC.width;dX.globalAlpha=p.a;const g=dX.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3);g.addColorStop(0,'rgba(255,255,255,0.6)');g.addColorStop(0.3,p.c);g.addColorStop(1,'transparent');dX.fillStyle=g;dX.beginPath();dX.arc(p.x,p.y,p.r*3,0,6.28);dX.fill();}dX.globalCompositeOperation='source-over';dX.globalAlpha=1;requestAnimationFrame(animDust);}
setupDust();animDust();

/* ── Speed Particles ── */
const sC=document.getElementById('speed-particles'),sX=sC.getContext('2d');
let speedDots=[];const sColors=['#D97706','#F59E0B','#B45309','#92400E','#fbbf24','#fef3c7'];
function setupSpeedCanvas(){const r=document.querySelector('.road-surface');if(!r)return;sC.style.width=r.offsetWidth+'px';sC.style.height=r.offsetHeight+'px';const dpr=window.devicePixelRatio||1;sC.width=r.offsetWidth*dpr;sC.height=r.offsetHeight*dpr;sX.scale(dpr,dpr);initSpeedDots();}
function initSpeedDots(){speedDots=[];const rect=sC.getBoundingClientRect();if(!rect.width)return;for(let i=0;i<50;i++){const gr=Math.random()>0.5;speedDots.push({x:Math.random()*rect.width,y:gr?(rect.height*0.2+Math.random()*14):(rect.height*0.65+Math.random()*14),s:(Math.random()*5+3)*(gr?1:-1),l:Math.random()*22+5,a:Math.random()*0.3+0.05,c:sColors[Math.floor(Math.random()*sColors.length)]});}}
function animSpeed(){const sW=sC.getBoundingClientRect().width,sH=sC.getBoundingClientRect().height;if(!sW)return requestAnimationFrame(animSpeed);sX.clearRect(0,0,sW,sH);sX.globalCompositeOperation='lighter';for(let d of speedDots){sX.globalAlpha=d.a;sX.strokeStyle=d.c;sX.lineWidth=1.3;sX.beginPath();sX.moveTo(d.x,d.y);sX.lineTo(d.x-d.l*Math.sign(d.s),d.y);sX.stroke();d.x+=d.s;if(d.x>sW+25||d.x<-25){d.x=d.s>0?-12:sW+12;d.y=(Math.random()>0.5)?(sH*0.2+Math.random()*14):(sH*0.65+Math.random()*14);}}sX.globalCompositeOperation='source-over';sX.globalAlpha=1;requestAnimationFrame(animSpeed);}
setupSpeedCanvas();animSpeed();
let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(()=>{setupSpeedCanvas();setupStars();setupDust();},200);});

/* ── Data Logic ── */
const SID='19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
const SHEETS=['bonus','PK_anti_audit','PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
const COPY_COL3=['PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
const SIDEBAR_SHEETS=['bonus','PK_anti_audit'];
let allData={},currentSheet='bonus',isRefreshing=false,lastSyncTime='';

async function fetchSheet(sn){try{const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sn)}`);const t=await r.text();const j=JSON.parse(t.substring(47,t.length-2));if(!j.table?.rows)return[];const c=j.table.cols||[],h=c.map(col=>col.label||`col_${col.id}`);return j.table.rows.map(row=>{const o={};row.c?.forEach((cell,idx)=>{o[h[idx]||`col_${idx}`]=cell?cell.v:null;});return o;});}catch(e){return[];}}

function updateStats(data,filtered){
  const total=data.length;
  const shown=filtered!==undefined?filtered:total;
  document.getElementById('statTotal').textContent=total;
  document.getElementById('statSheet').textContent=currentSheet.replace(/_/g,' ').toUpperCase();
  document.getElementById('statSync').textContent=lastSyncTime;
  document.getElementById('statFilter').textContent=shown===total?'All':`${shown}/${total}`;
  /* Animate the number */
  animateCounter('statTotal',total);
}

function animateCounter(id,target){
  const el=document.getElementById(id);
  const current=parseInt(el.textContent)||0;
  if(current===target)return;
  const diff=target-current;
  const steps=Math.min(Math.abs(diff),20);
  const stepVal=diff/steps;
  let i=0;
  const iv=setInterval(()=>{i++;el.textContent=Math.round(current+stepVal*i);if(i>=steps){el.textContent=target;clearInterval(iv);}},30);
}

async function loadAllSheets(silent){if(!silent){let p=0;const step=100/SHEETS.length;const lb=document.getElementById('loaderBar'),ls=document.getElementById('load-status');for(const n of SHEETS){ls.innerText=`Sinkronisasi ${n.replace(/_/g,' ')}...`;allData[n]=await fetchSheet(n);p+=step;lb.style.width=`${Math.min(p,100)}%`;await new Promise(r=>setTimeout(r,30));}ls.innerText='Selesai';lb.style.width='100%';lastSyncTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});setTimeout(()=>{document.getElementById('loader').classList.add('hidden');renderSheet(currentSheet);},350);}else{for(const n of SHEETS)allData[n]=await fetchSheet(n);lastSyncTime=new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});renderSheet(currentSheet);}}

async function handleRefresh(){if(isRefreshing)return;isRefreshing=true;const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon'),text=document.getElementById('refreshText'),ov=document.getElementById('refreshOverlay');btn.classList.add('is-loading');icon.classList.add('icon-spin');text.textContent='Loading...';ov.classList.add('active');try{await loadAllSheets(true);showToast('Data berhasil diperbarui!','success');}catch(e){showToast('Gagal memuat data.','info');}ov.classList.remove('active');btn.classList.remove('is-loading');icon.classList.remove('icon-spin');text.textContent='Refresh';isRefreshing=false;}

function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]||m);}

/* ── NEW: Skeleton Loading ── */
function showSkeleton(){let h='';for(let i=0;i<5;i++){h+=`<div class="skeleton-row"><div class="skeleton-cell sk-narrow"></div><div class="skeleton-cell sk-wide"></div><div class="skeleton-cell sk-med"></div><div class="skeleton-cell sk-action"></div></div>`;}return h;}

function renderQna(data){if(!data.length)return'<div class="empty-state"><div class="empty-icon-wrap"><i class="fas fa-inbox"></i></div>Tidak ada data</div>';const k=Object.keys(data[0]),cA=k[0],cB=k[1],cC=k[2]||null,oC=COPY_COL3.includes(currentSheet);let h=`<table class="qna-table"><thead><tr><th>${esc(cA)}</th>${cC?`<th>${esc(cB)}</th><th>${esc(cC)}</th>`:`<th>${esc(cB)}</th>`}<th style="width:90px;">Aksi</th></tr></thead><tbody>`;data.forEach((r,i)=>{const v1=r[k[0]]||'',v2=r[k[1]]||'',v3=cC?(r[k[2]]||''):'';let ct=oC?(v3||v2||v1):[v1,v2,v3].filter(Boolean).join(' — ');h+=`<tr class="row-anim" style="animation-delay:${i*0.012}s"><td>${esc(v1)}</td>${cC?`<td>${esc(v2)}</td><td>${esc(v3)}</td>`:`<td>${esc(v2)}</td>`}<td class="col-action"><button class="copy-btn" data-text="${esc(ct)}"><i class="fas fa-copy"></i> Salin</button></td></tr>`;});h+='</tbody></table>';return h;}

function renderSidebarLayout(data){if(!data.length)return'<div class="empty-state"><div class="empty-icon-wrap"><i class="fas fa-inbox"></i></div>Tidak ada data</div>';const k=Object.keys(data[0]);let h=`<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list" style="font-size:0.55rem;"></i> Index <span class="sidebar-count">${data.length}</span></div><div class="sidebar-list">`;data.forEach((r,i)=>{h+=`<div class="sidebar-item" data-index="${i}"><span class="item-num">${String(i+1).padStart(2,'0')}</span> ${esc(r[k[0]]||`Item ${i+1}`)}</div>`;});h+=`</div></div><div class="detail-col" id="detailPanel"><div class="detail-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:250px;color:var(--text-muted);gap:12px;"><i class="fas fa-arrow-left" style="font-size:1.5rem;opacity:0.15;"></i><span style="font-size:0.78rem;">Pilih item dari daftar</span></div></div></div>`;return h;}

function initSidebarInteraction(data){const items=document.querySelectorAll('.sidebar-item'),panel=document.getElementById('detailPanel');if(!items.length)return;const k=Object.keys(data[0]);const update=i=>{const r=data[i],t=r[k[0]]||'-';const dp=[];for(let j=1;j<k.length;j++){const v=r[k[j]];if(v)dp.push(v);}const d=dp.join('\n\n')||'-';panel.innerHTML=`<div class="detail-content"><div class="detail-title"><i class="fas fa-bookmark"></i> ${esc(t)}</div><div class="detail-body">${esc(d)}</div><button class="copy-btn detail-copy-btn" data-desc="${esc(d)}"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;};items.forEach(item=>{item.addEventListener('click',()=>{items.forEach(i=>i.classList.remove('active'));item.classList.add('active');update(parseInt(item.dataset.index));});});if(items[0]){items[0].classList.add('active');update(0);}}

function renderSheet(sn){currentSheet=sn;const dn={'bonus':'BONUS','PK_anti_audit':'PK ANTI AUDIT','PK_LULUS_SENSOR_AUDIT':'PK LULUS AUDIT','seputar_gantirek':'GANTI REK','seputar_pk':'SEPUTAR PK'};document.getElementById('pageTitle').textContent=dn[sn]||sn.replace(/_/g,' ').toUpperCase();document.getElementById('pageSubtitle').textContent='Data Sheet';document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.sheet===sn));document.getElementById('searchInput').value='';const data=allData[sn]||[],c=document.getElementById('tableContainer');

/* Show skeleton first, then render */
c.innerHTML=showSkeleton();
updateStats(data);

setTimeout(()=>{
  if(SIDEBAR_SHEETS.includes(sn)){c.innerHTML=renderSidebarLayout(data);setTimeout(()=>initSidebarInteraction(data),30);}else{c.innerHTML=`<div class="tab-content-enter">${renderQna(data)}</div>`;}
  updateStats(data);
},200);
}

function handleSearch(){const q=document.getElementById('searchInput').value.toLowerCase(),data=allData[currentSheet]||[];if(!data.length)return;if(SIDEBAR_SHEETS.includes(currentSheet)){const items=document.querySelectorAll('.sidebar-item');let f=-1,visibleCount=0;items.forEach((item,i)=>{const m=Object.values(data[i]).some(v=>v&&String(v).toLowerCase().includes(q));item.style.display=m?'flex':'none';if(m){visibleCount++;if(f===-1)f=i;}});const a=document.querySelector('.sidebar-item.active');if((!a||a.style.display==='none')&&f!==-1)document.querySelector(`.sidebar-item[data-index="${f}"]`)?.click();updateStats(data,visibleCount);}else{const filtered=data.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(q)));document.getElementById('tableContainer').innerHTML=`<div class="tab-content-enter">${renderQna(filtered)}</div>`;updateStats(data,filtered.length);}}

async function copyText(text){try{await navigator.clipboard.writeText(text);return true;}catch{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');return true;}catch{return false;}finally{document.body.removeChild(ta);}}}

function showToast(msg,type){const c=document.getElementById('notif-container'),t=document.createElement('div');t.className='toast toast-'+(type||'success');const ic=type==='info'?'fa-circle-info':type==='warn'?'fa-triangle-exclamation':'fa-circle-check';t.innerHTML=`<i class="fas ${ic}"></i> ${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px) scale(0.95)';setTimeout(()=>t.remove(),300);},3000);}

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB');}
setInterval(updateClock,1000);updateClock();

/* ── NEW: Ripple Effect ── */
function addRipple(e){const el=e.currentTarget;const rect=el.getBoundingClientRect();const size=Math.max(rect.width,rect.height);const x=e.clientX-rect.left-size/2;const y=e.clientY-rect.top-size/2;const ripple=document.createElement('span');ripple.className='ripple';ripple.style.width=ripple.style.height=size+'px';ripple.style.left=x+'px';ripple.style.top=y+'px';el.appendChild(ripple);setTimeout(()=>ripple.remove(),600);}

document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',(e)=>{addRipple(e);renderSheet(tab.dataset.sheet);});});
document.getElementById('refreshBtn').addEventListener('click',(e)=>{addRipple(e);handleRefresh();});
document.getElementById('searchInput').addEventListener('input',handleSearch);
document.addEventListener('click',async e=>{const btn=e.target.closest('.copy-btn');if(!btn)return;let t=btn.dataset.text||btn.dataset.desc||'';if(t){e.preventDefault();const ok=await copyText(t);if(ok)showToast('Berhasil disalin!','success');else showToast('Gagal menyalin.','info');btn.style.transform='scale(0.92)';setTimeout(()=>{if(btn)btn.style.transform='';},180);}});

/* ── NEW: Scroll-to-Top ── */
const scrollBtn=document.getElementById('scrollTopBtn');
const tableContainer=document.getElementById('tableContainer');
tableContainer.addEventListener('scroll',()=>{scrollBtn.classList.toggle('visible',tableContainer.scrollTop>300);});
scrollBtn.addEventListener('click',()=>{tableContainer.scrollTo({top:0,behavior:'smooth'});});

/* ── NEW: Keyboard Shortcuts ── */
document.addEventListener('keydown',(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();document.getElementById('searchInput').focus();}if((e.metaKey||e.ctrlKey)&&e.key==='r'){e.preventDefault();handleRefresh();}});

loadAllSheets(false);
</script>
</body>
</html>
