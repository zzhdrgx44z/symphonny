<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈 · Golden Interface</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    :root{
      --bg:#0f0a06;--bg-subtle:#1f140e;
      --surface:rgba(30,20,12,0.88);--surface-solid:#1e1610;--surface-hover:rgba(50,35,22,0.92);
      --text:#fef3c7;--text-secondary:#d4a574;--text-muted:#8b6c4a;
      --accent:#f59e0b;--accent-hover:#d97706;--accent-soft:rgba(245,158,11,0.08);--accent-light:rgba(245,158,11,0.05);
      --gold:#fbbf24;--gold-soft:rgba(251,191,36,0.1);
      --green:#34d399;--green-soft:rgba(52,211,153,0.08);
      --red:#ef4444;
      --border:rgba(245,158,11,0.06);--border-medium:rgba(245,158,11,0.12);
      --radius:14px;--radius-lg:20px;--radius-pill:999px;
      --shadow-card:0 8px 48px rgba(0,0,0,0.7);--shadow-hover:0 4px 24px rgba(245,158,11,0.08);
      --shadow-sm:0 2px 12px rgba(0,0,0,0.4);
      --car-amber:#D97706;--car-gold:#F59E0B;
    }
    html,body{height:100%;width:100%;overflow-x:hidden;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;display:flex;flex-direction:column;}

    /* ── Background ── */
    .bg-layer{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .sunset-grad{position:absolute;inset:0;background:linear-gradient(180deg,#0f0a06 0%,#1a0e08 20%,#3a1a0c 40%,#6a3010 55%,#a85218 70%,#d4882e 82%,#f0b84d 92%,#fef3c7 100%);background-size:100% 300%;animation:sunsetMove 30s ease-in-out infinite alternate;}
    @keyframes sunsetMove{0%{background-position:50% 100%;}100%{background-position:50% 0%;}}
    .sunset-sun{position:absolute;width:800px;height:800px;border-radius:50%;left:50%;bottom:5%;transform:translateX(-50%);background:radial-gradient(circle,#fff 0%,#fef3c7 12%,#f59e0b 35%,rgba(217,119,6,0) 60%);filter:blur(60px);animation:sunBreath 12s ease-in-out infinite alternate;opacity:0.6;}
    @keyframes sunBreath{0%{opacity:0.5;transform:translateX(-50%) scale(1);}100%{opacity:0.8;transform:translateX(-50%) scale(1.05);}}
    .sunset-cloud{position:absolute;background:rgba(255,255,255,0.05);border-radius:100px;filter:blur(50px);will-change:transform;}
    .sunset-cloud.c1{width:600px;height:100px;top:20%;left:-600px;animation:drift 50s linear infinite;}
    .sunset-cloud.c2{width:800px;height:120px;top:35%;left:-800px;animation:drift 70s linear infinite;animation-delay:-25s;opacity:0.4;}
    @keyframes drift{0%{transform:translateX(0);}100%{transform:translateX(calc(100vw + 900px));}}

    .dust-canvas{position:fixed;inset:0;z-index:1;pointer-events:none;}
    .vignette{position:fixed;inset:0;pointer-events:none;z-index:2;background:radial-gradient(ellipse 60% 50% at 50% 50%,transparent 15%,rgba(15,10,6,0.85) 100%);}

    /* ── Loader ── */
    #loader{position:fixed;inset:0;background:var(--bg);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;transition:opacity 0.6s ease,visibility 0.6s ease;}
    #loader.hidden{opacity:0;visibility:hidden;pointer-events:none;}
    .loader-brand{font-family:'Instrument Serif',serif;font-style:italic;font-size:4rem;color:var(--accent);line-height:1;text-shadow:0 0 60px rgba(245,158,11,0.5);letter-spacing:2px;}
    .loader-sub{color:var(--text-muted);font-size:0.7rem;letter-spacing:3px;text-transform:uppercase;font-weight:600;}
    .loader-track{width:280px;height:2px;background:var(--border);border-radius:2px;overflow:hidden;}
    .loader-fill{width:0%;height:100%;background:linear-gradient(90deg,var(--gold),var(--accent),var(--gold));transition:width 0.4s cubic-bezier(0.4,0,0.2,1);border-radius:2px;box-shadow:0 0 20px var(--accent);}
    .loader-status{color:var(--text-muted);font-size:0.65rem;font-family:'JetBrains Mono',monospace;min-height:1em;letter-spacing:0.5px;}

    /* ── Navigation ── */
    .top-nav{position:relative;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 36px;background:rgba(15,10,6,0.88);backdrop-filter:blur(30px) saturate(180%);-webkit-backdrop-filter:blur(30px) saturate(180%);border-bottom:1px solid var(--border);flex-shrink:0;}
    .nav-brand{display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .nav-logo{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#b45309);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-style:italic;font-size:1.4rem;color:#fff;font-weight:400;box-shadow:0 2px 16px rgba(245,158,11,0.4);transition:transform 0.3s;}
    .nav-logo:hover{transform:scale(1.05) rotate(-3deg);}
    .nav-desc{font-size:0.6rem;color:var(--text-muted);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;line-height:1.2;}
    .nav-desc span{color:var(--accent);}
    .nav-tabs{display:flex;gap:4px;background:rgba(15,10,6,0.6);border:1px solid var(--border);border-radius:var(--radius-pill);padding:4px;box-shadow:var(--shadow-sm);overflow-x:auto;max-width:100%;}
    .nav-tab{padding:8px 20px;border-radius:var(--radius-pill);font-size:0.72rem;font-weight:600;color:var(--text-secondary);cursor:pointer;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;align-items:center;gap:8px;white-space:nowrap;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:'DM Sans',sans-serif;}
    .nav-tab:hover{color:var(--text);background:var(--accent-light);}
    .nav-tab.active{background:linear-gradient(135deg,var(--accent),#b45309);color:#fff;box-shadow:0 2px 16px rgba(245,158,11,0.45);transform:scale(1.02);}
    .nav-tab i{font-size:0.7rem;}
    .nav-right{display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .status-pill{display:flex;align-items:center;gap:8px;padding:7px 18px;border-radius:var(--radius-pill);background:var(--green-soft);border:1px solid rgba(52,211,153,0.12);font-family:'JetBrains Mono',monospace;font-size:0.65rem;font-weight:500;color:var(--green);font-variant-numeric:tabular-nums;}
    .status-dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:dotPulse 2.5s ease-in-out infinite;box-shadow:0 0 12px var(--green);}
    @keyframes dotPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.3;transform:scale(0.7);}}

    /* ── Main ── */
    .main{position:relative;z-index:10;flex:1;display:flex;flex-direction:column;padding:24px 32px 160px 32px;min-height:0;}
    .content-card{background:var(--surface);backdrop-filter:blur(50px) saturate(130%);-webkit-backdrop-filter:blur(50px) saturate(130%);border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;flex-direction:column;flex:1;min-height:0;overflow:hidden;box-shadow:var(--shadow-card);position:relative;}
    .content-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,var(--gold),var(--accent),var(--gold),transparent);z-index:5;border-radius:var(--radius-lg) var(--radius-lg) 0 0;box-shadow:0 0 30px rgba(245,158,11,0.2);}
    .content-card::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(245,158,11,0.015) 50%,transparent 60%);animation:goldShine 10s linear infinite;pointer-events:none;z-index:5;}
    @keyframes goldShine{0%{transform:translateX(-100%);}100%{transform:translateX(100%);}}

    .refresh-overlay{position:absolute;inset:0;background:rgba(15,10,6,0.85);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;z-index:20;border-radius:var(--radius-lg);}
    .refresh-overlay.active{display:flex;}
    .refresh-spinner{width:40px;height:40px;border:2.5px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    .card-header{display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:14px;padding:24px 32px;border-bottom:1px solid var(--border);flex-shrink:0;}
    .header-title h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.7rem;color:var(--text);line-height:1.2;text-shadow:0 0 30px rgba(245,158,11,0.1);}
    .header-title p{font-size:0.6rem;color:var(--text-muted);margin-top:4px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;}
    .header-actions{display:flex;gap:12px;flex-wrap:wrap;align-items:center;}
    .search-wrap{position:relative;}
    .search-wrap i{position:absolute;left:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:0.8rem;pointer-events:none;transition:color 0.2s;}
    .search-wrap input{background:rgba(15,10,6,0.7);border:1px solid var(--border);border-radius:var(--radius-pill);padding:10px 18px 10px 42px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:0.8rem;width:260px;outline:none;transition:all 0.3s;}
    .search-wrap input::placeholder{color:var(--text-muted);}
    .search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-light);}

    .btn-refresh{background:var(--surface);border:1px solid var(--border);padding:10px 22px;border-radius:var(--radius-pill);color:var(--text-secondary);font-weight:600;font-size:0.72rem;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;white-space:nowrap;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;}
    .btn-refresh:hover{border-color:var(--border-medium);color:var(--accent);box-shadow:var(--shadow-hover);transform:translateY(-2px);}
    .btn-refresh:active{transform:scale(0.97) translateY(0);}
    .btn-refresh.is-loading{opacity:0.5;pointer-events:none;}
    .btn-refresh .icon-spin{animation:spin 0.8s linear infinite;display:inline-block;}

    .table-scroll{flex:1;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;min-height:200px;}
    .table-scroll::-webkit-scrollbar{width:5px;height:5px;}
    .table-scroll::-webkit-scrollbar-track{background:transparent;}
    .table-scroll::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:4px;}

    .qna-table{width:100%;border-collapse:collapse;font-size:0.8rem;}
    .qna-table th{text-align:left;padding:14px 24px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border-medium);font-size:0.6rem;text-transform:uppercase;letter-spacing:1.5px;position:sticky;top:0;background:var(--surface-solid);backdrop-filter:blur(12px);z-index:5;}
    .qna-table td{padding:13px 24px;border-bottom:1px solid var(--border);color:var(--text-secondary);transition:all 0.2s;}
    .qna-table tbody tr{transition:background 0.2s;}
    .qna-table tbody tr:hover{background:var(--accent-soft);}
    .qna-table tbody tr:hover td{color:var(--text);}
    .col-action button{background:var(--accent-soft);border:1px solid var(--border);border-radius:var(--radius-pill);padding:7px 16px;cursor:pointer;transition:all 0.3s;color:var(--accent);font-size:0.68rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;}
    .col-action button:hover{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 4px 16px rgba(245,158,11,0.3);transform:translateY(-1px);}

    /* ── Split Layout ── */
    .layout-split{display:flex;flex-direction:row;height:100%;min-height:400px;}
    .sidebar-col{width:300px;flex-shrink:0;background:rgba(15,10,6,0.6);border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;}
    .sidebar-col::-webkit-scrollbar{width:3px;}
    .sidebar-col::-webkit-scrollbar-thumb{background:var(--border-medium);border-radius:3px;}
    .sidebar-header{padding:18px 24px;font-size:0.6rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);border-bottom:1px solid var(--border);font-weight:700;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
    .sidebar-count{background:var(--gold-soft);color:var(--gold);padding:2px 12px;border-radius:var(--radius-pill);font-size:0.6rem;font-family:'JetBrains Mono',monospace;border:1px solid rgba(251,191,36,0.08);}
    .sidebar-item{padding:14px 24px;font-size:0.8rem;cursor:pointer;border-left:3px solid transparent;transition:all 0.25s cubic-bezier(0.4,0,0.2,1);color:var(--text-secondary);display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);-webkit-tap-highlight-color:transparent;}
    .sidebar-item:hover{background:var(--surface-hover);color:var(--text);padding-left:30px;}
    .sidebar-item.active{background:var(--accent-soft);border-left-color:var(--accent);color:var(--accent);font-weight:600;}
    .sidebar-item .item-num{font-family:'JetBrains Mono',monospace;font-size:0.55rem;color:var(--text-muted);min-width:24px;opacity:0.6;}

    .detail-col{flex:1;padding:32px 36px;overflow-y:auto;}
    .detail-content{animation:slideUp 0.35s cubic-bezier(0.4,0,0.2,1);}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
    .detail-title{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.3rem;color:var(--gold);margin-bottom:20px;display:flex;align-items:center;gap:12px;line-height:1.3;text-shadow:0 0 30px rgba(251,191,36,0.1);}
    .detail-title i{font-size:0.8rem;opacity:0.5;}
    .detail-body{background:rgba(15,10,6,0.7);padding:24px;border-radius:var(--radius);font-size:0.85rem;color:var(--text-secondary);line-height:1.9;white-space:pre-wrap;border:1px solid var(--border);font-weight:400;}
    .detail-copy-btn{margin-top:20px;width:100%;padding:14px;background:var(--accent-soft);border:1px solid rgba(245,158,11,0.15);border-radius:var(--radius-pill);color:var(--accent);cursor:pointer;font-weight:600;font-size:0.75rem;transition:all 0.3s;display:flex;align-items:center;justify-content:center;gap:10px;text-transform:uppercase;letter-spacing:0.8px;-webkit-tap-highlight-color:transparent;font-family:'DM Sans',sans-serif;}
    .detail-copy-btn:hover{background:linear-gradient(135deg,var(--accent),#b45309);color:#fff;border-color:transparent;box-shadow:0 4px 20px rgba(245,158,11,0.35);transform:translateY(-2px);}

    .empty-state{padding:80px 20px;text-align:center;color:var(--text-muted);font-size:0.9rem;}
    .empty-state i{font-size:2.5rem;margin-bottom:16px;display:block;opacity:0.15;}

    /* ── Notifications ── */
    #notif-container{position:fixed;bottom:180px;right:28px;z-index:10000;display:flex;flex-direction:column;gap:12px;pointer-events:none;}
    .toast{pointer-events:auto;background:var(--surface-solid);border:1px solid var(--border);border-left:4px solid var(--green);padding:16px 24px;border-radius:var(--radius);font-size:0.85rem;font-weight:500;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-card);animation:toastIn 0.4s cubic-bezier(0.4,0,0.2,1);transition:all 0.3s;}
    .toast.toast-success{border-left-color:var(--green);}
    .toast.toast-success i{color:var(--green);}
    .toast.toast-info{border-left-color:var(--accent);}
    .toast.toast-info i{color:var(--accent);}
    @keyframes toastIn{from{transform:translateX(120%) scale(0.9);opacity:0;}to{transform:translateX(0) scale(1);opacity:1;}}

    .row-anim{animation:slideUp 0.25s ease both;}

    /* ── Car Animation ── */
    .animation-layer{position:fixed;bottom:0;left:0;width:100%;height:150px;pointer-events:none;z-index:50;}
    .road-surface{position:absolute;bottom:0;left:0;width:100%;height:78px;z-index:2;background:linear-gradient(180deg,rgba(245,158,11,0.08),#1a1510 10%,#12100c 28%,#0a0908);overflow:hidden;}
    .road-edge-top{position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,transparent,rgba(217,119,6,0.4) 8%,rgba(251,191,36,0.8) 50%,rgba(217,119,6,0.4) 92%,transparent);box-shadow:0 0 20px rgba(217,119,6,0.3),0 0 40px rgba(217,119,6,0.1);}
    .lane-center{position:absolute;top:38px;left:0;width:200%;height:2px;background:repeating-linear-gradient(90deg,transparent 0px,transparent 30px,rgba(251,191,36,0.6) 30px,rgba(251,191,36,0.6) 60px,transparent 60px,transparent 90px);animation:laneScroll 0.6s linear infinite;will-change:transform;box-shadow:0 0 12px rgba(251,191,36,0.2);}
    @keyframes laneScroll{0%{transform:translateX(0);}100%{transform:translateX(-90px);}}
    .road-light-streak{position:absolute;top:10px;left:0;width:100%;height:55px;background:linear-gradient(90deg,transparent,rgba(245,158,11,0.02) 20%,rgba(245,158,11,0.04) 50%,rgba(245,158,11,0.02) 80%,transparent);animation:streakPulse 5s ease-in-out infinite alternate;}
    @keyframes streakPulse{0%{opacity:0.4;}100%{opacity:1;}}

    .street-lights{position:absolute;bottom:74px;left:0;width:100%;height:45px;z-index:3;}
    .street-light{position:absolute;bottom:0;width:2px;height:36px;background:linear-gradient(to top,rgba(255,255,255,0.04),transparent);}
    .street-light::after{content:'';position:absolute;top:-3px;left:-5px;width:14px;height:8px;border-radius:50%;}
    .street-light:nth-child(odd)::after{background:var(--car-amber);box-shadow:0 0 16px var(--car-amber);animation:sA 2.5s ease-in-out infinite alternate;}
    .street-light:nth-child(even)::after{background:#fff;box-shadow:0 0 10px rgba(255,255,255,0.9);animation:sW 2.5s ease-in-out infinite alternate;}
    @keyframes sA{0%{opacity:0.2;}100%{opacity:1;}}@keyframes sW{0%{opacity:1;}100%{opacity:0.2;}}
    .light-cone{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:100px;height:70px;clip-path:polygon(35% 0%,65% 0%,100% 100%,0% 100%);background:linear-gradient(to bottom,rgba(217,119,6,0.05),transparent);}
    .street-light:nth-child(1){left:4%;}.street-light:nth-child(2){left:20%;}.street-light:nth-child(3){left:38%;}.street-light:nth-child(4){left:56%;}.street-light:nth-child(5){left:74%;}.street-light:nth-child(6){left:92%;}

    .car-layer{position:absolute;bottom:0;left:0;width:100%;height:78px;z-index:6;overflow:visible;}
    .cyber-car{position:absolute;width:200px;height:66px;will-change:transform;}
    .cyber-car svg{filter:drop-shadow(0 8px 24px rgba(0,0,0,0.9)) drop-shadow(0 0 8px rgba(217,119,6,0.1));}
    .car-hover-anim{animation:carFloat 1.8s ease-in-out infinite alternate;}
    @keyframes carFloat{0%{transform:translateY(0);}100%{transform:translateY(-3px);}}

    .headlight-beam{position:absolute;top:18px;width:130px;height:34px;opacity:0.2;}
    .headlight-beam.beam-left{right:100%;margin-right:-3px;background:linear-gradient(to left,rgba(255,255,215,0.85),transparent);clip-path:polygon(100% 16%,100% 84%,0% 100%,0% 0%);}
    .lens-flare{position:absolute;width:12px;height:12px;border-radius:50%;background:#ffffcc;}
    .lens-flare.flare-left{right:0px;top:18px;box-shadow:0 0 20px 8px rgba(255,255,200,0.5);}
    .taillight-bar{position:absolute;height:4px;border-radius:2px;background:#ef4444;box-shadow:0 0 14px #ef4444;}
    .taillight-bar.tl-left{left:2px;top:22px;width:20px;}

    .thruster{position:absolute;height:7px;border-radius:0 3px 3px 0;animation:thrusterPulse 0.1s ease-in-out infinite alternate;will-change:transform;}
    .thruster.thruster-left{left:-26px;top:24px;width:28px;transform-origin:right center;background:linear-gradient(to left,rgba(217,119,6,0.85),transparent);box-shadow:0 0 14px rgba(217,119,6,0.4);}
    .thruster.thruster-gold{left:-26px;top:24px;width:28px;transform-origin:right center;background:linear-gradient(to left,rgba(251,191,36,0.85),transparent);box-shadow:0 0 14px rgba(251,191,36,0.4);}
    @keyframes thrusterPulse{0%{transform:scaleX(0.6);opacity:0.4;}100%{transform:scaleX(1.4);opacity:1;}}

    .underglow-layer{position:absolute;bottom:2px;border-radius:50%;pointer-events:none;}
    .underglow-outer{left:5%;width:90%;height:18px;filter:blur(10px);animation:uOuter 1.2s ease-in-out infinite alternate;}
    .underglow-inner{left:15%;width:70%;height:10px;filter:blur(4px);animation:uInner 0.6s ease-in-out infinite alternate;}
    .underglow-core{left:25%;width:50%;height:4px;filter:blur(1px);background:white;opacity:0.25;animation:uCore 0.3s ease-in-out infinite alternate;}
    @keyframes uOuter{0%{opacity:0.15;}100%{opacity:0.45;}}@keyframes uInner{0%{opacity:0.3;}100%{opacity:0.7;}}@keyframes uCore{0%{opacity:0.05;}100%{opacity:0.4;}}
    .glow-amber .underglow-outer{background:radial-gradient(ellipse,rgba(217,119,6,0.5),transparent 70%);}

let dustParticles=[];
function setupDust(){dC.width=window.innerWidth;dC.height=window.innerHeight;dustParticles=[];for(let i=0;i<70;i++){dustParticles.push({x:Math.random()*dC.width,y:Math.random()*dC.height,r:Math.random()*2+0.4,a:Math.random()*0.12+0.02,vx:(Math.random()-0.5)*0.15,vy:Math.random()*0.25+0.08,w:Math.random()*Math.PI*2,ws:Math.random()*0.012+0.004,c:['#f59e0b','#fbbf24','#d97706','#fef3c7','#fcd34d','#fff'][Math.floor(Math.random()*6)]});}}
function animDust(){dX.clearRect(0,0,dC.width,dC.height);dX.globalCompositeOperation='lighter';for(let p of dustParticles){p.w+=p.ws;p.x+=p.vx+Math.sin(p.w)*0.15;p.y+=p.vy;if(p.y>dC.height+10){p.y=-10;p.x=Math.random()*dC.width;}if(p.x>dC.width)p.x=0;if(p.x<0)p.x=dC.width;dX.globalAlpha=p.a;const g=dX.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*3.5);g.addColorStop(0,'rgba(255,255,255,0.5)');g.addColorStop(0.3,p.c);g.addColorStop(1,'transparent');dX.fillStyle=g;dX.beginPath();dX.arc(p.x,p.y,p.r*3.5,0,6.28);dX.fill();}dX.globalCompositeOperation='source-over';dX.globalAlpha=1;requestAnimationFrame(animDust);}
setupDust();animDust();
window.addEventListener('resize',setupDust);

/* ── Speed Particles ── */
const sC=document.getElementById('speed-particles'),sX=sC.getContext('2d');
let speedDots=[];const sColors=['#D97706','#F59E0B','#B45309','#92400E','#fbbf24','#fef3c7'];
function setupSpeedCanvas(){const r=document.querySelector('.road-surface');if(!r)return;sC.style.width=r.offsetWidth+'px';sC.style.height=r.offsetHeight+'px';const dpr=window.devicePixelRatio||1;sC.width=r.offsetWidth*dpr;sC.height=r.offsetHeight*dpr;sX.scale(dpr,dpr);initSpeedDots();}
function initSpeedDots(){speedDots=[];const rect=sC.getBoundingClientRect();if(!rect.width)return;for(let i=0;i<60;i++){const gr=Math.random()>0.5;speedDots.push({x:Math.random()*rect.width,y:gr?(rect.height*0.2+Math.random()*16):(rect.height*0.65+Math.random()*16),s:(Math.random()*6+3)*(gr?1:-1),l:Math.random()*25+6,a:Math.random()*0.3+0.04,c:sColors[Math.floor(Math.random()*sColors.length)]});}}
function animSpeed(){const sW=sC.getBoundingClientRect().width,sH=sC.getBoundingClientRect().height;if(!sW)return requestAnimationFrame(animSpeed);sX.clearRect(0,0,sW,sH);sX.globalCompositeOperation='lighter';for(let d of speedDots){sX.globalAlpha=d.a;sX.strokeStyle=d.c;sX.lineWidth=1.5;sX.beginPath();sX.moveTo(d.x,d.y);sX.lineTo(d.x-d.l*Math.sign(d.s),d.y);sX.stroke();d.x+=d.s;if(d.x>sW+25||d.x<-25){d.x=d.s>0?-12:sW+12;d.y=(Math.random()>0.5)?(sH*0.2+Math.random()*16):(sH*0.65+Math.random()*16);}}sX.globalCompositeOperation='source-over';sX.globalAlpha=1;requestAnimationFrame(animSpeed);}
setupSpeedCanvas();animSpeed();
let rT;window.addEventListener('resize',()=>{clearTimeout(rT);rT=setTimeout(setupSpeedCanvas,200);});

/* ── Data Logic ── */
const SID='19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
const SHEETS=['bonus','PK_anti_audit','PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
const COPY_COL3=['PK_LULUS_SENSOR_AUDIT','seputar_gantirek','seputar_pk'];
const SIDEBAR_SHEETS=['bonus','PK_anti_audit'];
let allData={},currentSheet='bonus',isRefreshing=false;

async function fetchSheet(sn){try{const r=await fetch(`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sn)}`);const t=await r.text();const j=JSON.parse(t.substring(47,t.length-2));if(!j.table?.rows)return[];const c=j.table.cols||[],h=c.map(col=>col.label||`col_${col.id}`);return j.table.rows.map(row=>{const o={};row.c?.forEach((cell,idx)=>{o[h[idx]||`col_${idx}`]=cell?cell.v:null;});return o;});}catch(e){return[];}}

async function loadAllSheets(silent){if(!silent){let p=0;const step=100/SHEETS.length;const lb=document.getElementById('loaderBar'),ls=document.getElementById('load-status');for(const n of SHEETS){ls.innerText=`Sinkronisasi ${n.replace(/_/g,' ')}...`;allData[n]=await fetchSheet(n);p+=step;lb.style.width=`${Math.min(p,100)}%`;await new Promise(r=>setTimeout(r,30));}ls.innerText='Selesai';lb.style.width='100%';setTimeout(()=>{document.getElementById('loader').classList.add('hidden');renderSheet(currentSheet);},400);}else{for(const n of SHEETS)allData[n]=await fetchSheet(n);renderSheet(currentSheet);}}

async function handleRefresh(){if(isRefreshing)return;isRefreshing=true;const btn=document.getElementById('refreshBtn'),icon=document.getElementById('refreshIcon'),text=document.getElementById('refreshText'),ov=document.getElementById('refreshOverlay');btn.classList.add('is-loading');icon.classList.add('icon-spin');text.textContent='Loading...';ov.classList.add('active');try{await loadAllSheets(true);showToast('Data berhasil diperbarui!','success');}catch(e){showToast('Gagal memuat data.','info');}ov.classList.remove('active');btn.classList.remove('is-loading');icon.classList.remove('icon-spin');text.textContent='Refresh';isRefreshing=false;}

function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]||m);}

function renderQna(data){if(!data.length)return'<div class="empty-state"><i class="fas fa-inbox"></i>Tidak ada data</div>';const k=Object.keys(data[0]),cA=k[0],cB=k[1],cC=k[2]||null,oC=COPY_COL3.includes(currentSheet);let h=`<table class="qna-table"><thead><tr><th>${esc(cA)}</th>${cC?`<th>${esc(cB)}</th><th>${esc(cC)}</th>`:`<th>${esc(cB)}</th>`}<th style="width:100px;">Aksi</th></tr></thead><tbody>`;data.forEach((r,i)=>{const v1=r[k[0]]||'',v2=r[k[1]]||'',v3=cC?(r[k[2]]||''):'';let ct=oC?(v3||v2||v1):[v1,v2,v3].filter(Boolean).join(' — ');h+=`<tr class="row-anim" style="animation-delay:${i*0.01}s"><td>${esc(v1)}</td>${cC?`<td>${esc(v2)}</td><td>${esc(v3)}</td>`:`<td>${esc(v2)}</td>`}<td class="col-action"><button class="copy-btn" data-text="${esc(ct)}"><i class="fas fa-copy"></i> Salin</button></td></tr>`;});h+='</tbody></table>';return h;}

function renderSidebarLayout(data){if(!data.length)return'<div class="empty-state"><i class="fas fa-inbox"></i>Tidak ada data</div>';const k=Object.keys(data[0]);let h=`<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><span><i class="fas fa-list" style="font-size:0.55rem;margin-right:8px;"></i> Index</span> <span class="sidebar-count">${data.length}</span></div><div class="sidebar-list">`;data.forEach((r,i)=>{h+=`<div class="sidebar-item" data-index="${i}"><span class="item-num">${String(i+1).padStart(2,'0')}</span> ${esc(r[k[0]]||`Item ${i+1}`)}</div>`;});h+=`</div></div><div class="detail-col" id="detailPanel"><div class="detail-content" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:280px;color:var(--text-muted);gap:14px;"><i class="fas fa-arrow-left" style="font-size:1.8rem;opacity:0.1;"></i><span style="font-size:0.85rem;">Pilih item dari daftar</span></div></div></div>`;return h;}

function initSidebarInteraction(data){const items=document.querySelectorAll('.sidebar-item'),panel=document.getElementById('detailPanel');if(!items.length)return;const k=Object.keys(data[0]);const update=i=>{const r=data[i],t=r[k[0]]||'-';const dp=[];for(let j=1;j<k.length;j++){const v=r[k[j]];if(v)dp.push(v);}const d=dp.join('\n\n')||'-';panel.innerHTML=`<div class="detail-content"><div class="detail-title"><i class="fas fa-bookmark"></i> ${esc(t)}</div><div class="detail-body">${esc(d)}</div><button class="copy-btn detail-copy-btn" data-desc="${esc(d)}"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;};items.forEach(item=>{item.addEventListener('click',()=>{items.forEach(i=>i.classList.remove('active'));item.classList.add('active');update(parseInt(item.dataset.index));});});if(items[0]){items[0].classList.add('active');update(0);}}

function renderSheet(sn){currentSheet=sn;const dn={'bonus':'BONUS','PK_anti_audit':'PK ANTI AUDIT','PK_LULUS_SENSOR_AUDIT':'PK LULUS AUDIT','seputar_gantirek':'GANTI REK','seputar_pk':'SEPUTAR PK'};document.getElementById('pageTitle').textContent=dn[sn]||sn.replace(/_/g,' ').toUpperCase();document.getElementById('pageSubtitle').textContent='Data Sheet';document.querySelectorAll('.nav-tab').forEach(el=>el.classList.toggle('active',el.dataset.sheet===sn));document.getElementById('searchInput').value='';const data=allData[sn]||[],c=document.getElementById('tableContainer');if(SIDEBAR_SHEETS.includes(sn)){c.innerHTML=renderSidebarLayout(data);setTimeout(()=>initSidebarInteraction(data),30);}else{c.innerHTML=renderQna(data);}}

function handleSearch(){const q=document.getElementById('searchInput').value.toLowerCase(),data=allData[currentSheet]||[];if(!data.length)return;if(SIDEBAR_SHEETS.includes(currentSheet)){const items=document.querySelectorAll('.sidebar-item');let f=-1;items.forEach((item,i)=>{const m=Object.values(data[i]).some(v=>v&&String(v).toLowerCase().includes(q));item.style.display=m?'flex':'none';if(m&&f===-1)f=i;});const a=document.querySelector('.sidebar-item.active');if((!a||a.style.display==='none')&&f!==-1)document.querySelector(`.sidebar-item[data-index="${f}"]`)?.click();}else{document.getElementById('tableContainer').innerHTML=renderQna(data.filter(r=>Object.values(r).some(v=>v&&String(v).toLowerCase().includes(q))));}}

async function copyText(text){try{await navigator.clipboard.writeText(text);return true;}catch{const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.left='-9999px';document.body.appendChild(ta);ta.select();try{document.execCommand('copy');return true;}catch{return false;}finally{document.body.removeChild(ta);}}}

function showToast(msg,type){const c=document.getElementById('notif-container'),t=document.createElement('div');t.className='toast toast-'+(type||'success');const ic=type==='info'?'fa-circle-info':'fa-circle-check';t.innerHTML=`<i class="fas ${ic}"></i> ${msg}`;c.appendChild(t);setTimeout(()=>{t.style.opacity='0';t.style.transform='translateX(20px) scale(0.95)';setTimeout(()=>t.remove(),300);},3500);}

function updateClock(){document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB');}
setInterval(updateClock,1000);updateClock();

document.querySelectorAll('.nav-tab').forEach(tab=>{tab.addEventListener('click',()=>renderSheet(tab.dataset.sheet));});
document.getElementById('refreshBtn').addEventListener('click',handleRefresh);
document.getElementById('searchInput').addEventListener('input',handleSearch);
document.addEventListener('click',async e=>{const btn=e.target.closest('.copy-btn');if(!btn)return;let t=btn.dataset.text||btn.dataset.desc||'';if(t){e.preventDefault();const ok=await copyText(t);if(ok)showToast('Berhasil disalin!','success');else showToast('Gagal menyalin.','info');btn.style.transform='scale(0.92)';setTimeout(()=>{if(btn)btn.style.transform='';},180);}});

loadAllSheets(false);
</script>
</body>
</html>
