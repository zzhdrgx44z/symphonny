<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>沈 · LINE TOGEL HUB // HYPERDRIVE - Fullscreen</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #0a0c12;
      --bg-surface: #11141e;
      --border-subtle: rgba(255, 255, 255, 0.08);
      --accent-pink: #ff2e63;
      --accent-cyan: #00e5ff;
      --accent-gold: #ffd700;
      --text-primary: #f0f3fa;
      --text-secondary: #a0a8c0;
      --glow-pink: rgba(255, 46, 99, 0.4);
      --card-radius: 20px;
    }

    html, body { height: 100%; width: 100%; overflow-x: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-deep);
      color: var(--text-primary);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, rgba(255,46,99,0.08), transparent 60%),
                  radial-gradient(circle at 80% 70%, rgba(0,229,255,0.06), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    #particle-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.25;
    }

    .top-nav {
      position: relative;
      z-index: 30;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 24px;
      background: rgba(10, 12, 18, 0.75);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .brand-text h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.3px;
    }
    .brand-text span { font-size: 0.7rem; color: var(--text-secondary); }

    .nav-menu { display: flex; flex-wrap: wrap; gap: 8px; }

    .nav-item {
      background: rgba(20, 25, 40, 0.6);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 6px 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-item.active {
      background: var(--accent-pink);
      border-color: var(--accent-pink);
      color: white;
      box-shadow: 0 0 12px var(--glow-pink);
    }

    .status-box {
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
      padding: 6px 14px;
      border-radius: 40px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      border: 1px solid var(--border-subtle);
      color: var(--accent-cyan);
      white-space: nowrap;
    }

    .main {
      position: relative;
      z-index: 10;
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px 20px 20px;
      min-height: 0;
    }

    .content-wrapper {
      background: rgba(17, 20, 30, 0.7);
      backdrop-filter: blur(16px);
      border-radius: var(--card-radius);
      border: 1px solid var(--border-subtle);
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.4);
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--border-subtle);
      flex-shrink: 0;
    }

    .title-main h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-box input {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-subtle);
      border-radius: 40px;
      padding: 8px 16px;
      color: white;
      font-family: 'Inter', monospace;
      font-size: 0.8rem;
      width: 220px;
      outline: none;
      transition: border-color 0.2s;
    }
    .search-box input:focus { border-color: var(--accent-cyan); }

    .btn-industrial {
      background: rgba(255, 46, 99, 0.15);
      border: 1px solid var(--accent-pink);
      padding: 7px 18px;
      border-radius: 40px;
      color: var(--accent-pink);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .btn-industrial:hover { background: rgba(255,46,99,0.25); }

    .table-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      min-height: 200px;
    }

    .qna-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .qna-table th {
      text-align: left;
      padding: 14px 16px;
      font-weight: 600;
      color: var(--accent-cyan);
      border-bottom: 1px solid var(--border-subtle);
      font-size: 0.7rem;
      text-transform: uppercase;
      position: sticky;
      top: 0;
      background: rgba(10, 12, 20, 0.95);
      backdrop-filter: blur(4px);
    }
    .qna-table td {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }
    .col-action button {
      background: none;
      border: 1px solid var(--border-subtle);
      border-radius: 30px;
      padding: 6px 12px;
      cursor: pointer;
      transition: 0.2s;
      color: var(--text-secondary);
    }
    .col-action button:hover { border-color: var(--accent-pink); color: var(--accent-pink); }

    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      padding: 24px;
    }
    .asset-card {
      background: rgba(10, 12, 20, 0.8);
      backdrop-filter: blur(8px);
      border-radius: 24px;
      border: 1px solid var(--border-subtle);
      transition: all 0.25s ease;
      overflow: hidden;
    }
    .asset-card:hover { transform: translateY(-4px); border-color: var(--accent-pink); box-shadow: 0 8px 30px rgba(255,46,99,0.15); }
    .asset-header {
      padding: 16px 18px 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .asset-display {
      margin: 4px 18px 8px;
      padding: 12px;
      background: rgba(0,0,0,0.4);
      border-radius: 12px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent-gold);
      text-align: center;
      border: 1px solid rgba(255,215,0,0.15);
    }
    .btn-copy-action {
      background: rgba(255,46,99,0.1);
      border: 1px solid rgba(255,46,99,0.3);
      border-radius: 40px;
      padding: 6px 16px;
      color: var(--accent-pink);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-copy-action:hover { background: rgba(255,46,99,0.2); }

    .layout-split { display: flex; flex-direction: row; height: 100%; min-height: 400px; }
    .sidebar-col {
      width: 260px;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.35);
      border-right: 1px solid var(--border-subtle);
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 14px 20px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--accent-cyan);
      border-bottom: 1px solid var(--border-subtle);
    }
    .sidebar-item {
      padding: 12px 20px;
      font-size: 0.8rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: 0.15s;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-item:hover { background: rgba(255,255,255,0.03); }
    .sidebar-item.active { background: rgba(255,46,99,0.15); border-left-color: var(--accent-pink); color: white; }
    .detail-col { flex: 1; padding: 20px 24px; overflow-y: auto; }
    .detail-content { animation: fadeSlideIn 0.2s ease; }
    @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--text-secondary); font-size: 0.9rem; }

    #notif-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: none;
    }
    .toast-notification {
      pointer-events: auto;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      border-left: 4px solid var(--accent-pink);
      padding: 12px 20px;
      border-radius: 14px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5);
      animation: slideInRight 0.3s ease;
      transition: opacity 0.2s;
    }
    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* ============================== */
    /*    ANIMASI JALAN & MOBIL BARU   */
    /* ============================== */
    .animation-layer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 160px;
      pointer-events: none;
      z-index: 20;
    }

    /* Cityscape silhouette */
    .cityscape {
      position: absolute;
      bottom: 58px;
      left: 0;
      width: 100%;
      height: 90px;
      z-index: 1;
    }
    .cityscape svg { width: 100%; height: 100%; }

    /* Atmospheric glow behind city */
    .city-glow {
      position: absolute;
      bottom: 50px;
      left: 0;
      width: 100%;
      height: 120px;
      background: linear-gradient(to top,
        rgba(255, 46, 99, 0.06) 0%,
        rgba(0, 229, 255, 0.04) 30%,
        transparent 100%);
      z-index: 0;
    }

    /* Road surface */
    .road-surface {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 58px;
      z-index: 2;
    }

    /* Reflective wet road effect */
    .road-wet {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(180deg,
        rgba(20, 24, 40, 0.95) 0%,
        #0c0f18 40%,
        #080a10 100%);
    }

    /* Road edge glow lines */
    .road-edge-top {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg,
        transparent 0%,
        rgba(255, 46, 99, 0.5) 15%,
        rgba(255, 46, 99, 0.8) 50%,
        rgba(255, 46, 99, 0.5) 85%,
        transparent 100%);
      box-shadow: 0 0 8px rgba(255, 46, 99, 0.4), 0 0 20px rgba(255, 46, 99, 0.15);
    }

    /* Lane markings - center dashed */
    .lane-center {
      position: absolute;
      top: 27px;
      left: 0;
      width: 200%;
      height: 2px;
      background: repeating-linear-gradient(90deg,
        transparent 0px,
        transparent 40px,
        rgba(255, 215, 0, 0.6) 40px,
        rgba(255, 215, 0, 0.6) 80px,
        transparent 80px,
        transparent 120px);
      animation: laneScroll 1.2s linear infinite;
      box-shadow: 0 0 4px rgba(255, 215, 0, 0.3);
    }
    @keyframes laneScroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-120px); }
    }

    /* Lane edge solid lines */
    .lane-edge-left {
      position: absolute;
      top: 10px; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.3) 20%, rgba(0,229,255,0.3) 80%, transparent);
    }
    .lane-edge-right {
      position: absolute;
      top: 46px; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,229,255,0.2) 20%, rgba(0,229,255,0.2) 80%, transparent);
    }

    /* Road reflection shimmer */
    .road-shimmer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(110deg,
        transparent 0%,
        rgba(255, 46, 99, 0.03) 45%,
        rgba(0, 229, 255, 0.03) 55%,
        transparent 100%);
      animation: shimmerMove 4s ease-in-out infinite alternate;
    }
    @keyframes shimmerMove {
      0% { transform: translateX(-30%); }
      100% { transform: translateX(30%); }
    }

    /* Street lights */
    .street-lights {
      position: absolute;
      bottom: 55px;
      left: 0;
      width: 100%;
      height: 40px;
      z-index: 3;
    }
    .street-light {
      position: absolute;
      bottom: 0;
      width: 2px;
      height: 30px;
      background: rgba(255,255,255,0.1);
    }
    .street-light::after {
      content: '';
      position: absolute;
      top: -3px;
      left: -4px;
      width: 10px;
      height: 6px;
      background: var(--accent-pink);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-pink), 0 0 25px rgba(255,46,99,0.4), 0 15px 30px rgba(255,46,99,0.15);
      animation: streetPulse 3s ease-in-out infinite alternate;
    }
    .street-light:nth-child(1) { left: 10%; }
    .street-light:nth-child(2) { left: 30%; animation-delay: 0.5s; }
    .street-light:nth-child(2)::after { animation-delay: 0.5s; background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan), 0 0 25px rgba(0,229,255,0.4), 0 15px 30px rgba(0,229,255,0.15); }
    .street-light:nth-child(3) { left: 55%; }
    .street-light:nth-child(4) { left: 78%; animation-delay: 1s; }
    .street-light:nth-child(4)::after { animation-delay: 1s; background: var(--accent-cyan); box-shadow: 0 0 10px var(--accent-cyan), 0 0 25px rgba(0,229,255,0.4), 0 15px 30px rgba(0,229,255,0.15); }
    .street-light:nth-child(5) { left: 95%; }
    @keyframes streetPulse {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }

    /* Street light cone on road */
    .light-cone {
      position: absolute;
      top: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 50px;
      background: radial-gradient(ellipse at top, rgba(255,46,99,0.08) 0%, transparent 70%);
      pointer-events: none;
    }
    .street-light:nth-child(2) .light-cone,
    .street-light:nth-child(4) .light-cone {
      background: radial-gradient(ellipse at top, rgba(0,229,255,0.08) 0%, transparent 70%);
    }

    /* ---- MOBIL ---- */
    .car-layer {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 58px;
      z-index: 4;
      overflow: visible;
    }

    .cyber-car {
      position: absolute;
      bottom: 4px;
      width: 160px;
      height: 48px;
    }

    /* Headlight beam */
    .headlight-beam {
      position: absolute;
      top: 12px;
      width: 80px;
      height: 20px;
      opacity: 0.15;
      filter: blur(4px);
    }
    .headlight-beam.left-beam {
      left: -70px;
      background: linear-gradient(to left, rgba(255,255,220,0.8), transparent);
      clip-path: polygon(100% 20%, 0% 0%, 0% 100%, 100% 80%);
    }
    .headlight-beam.right-beam {
      right: -70px;
      background: linear-gradient(to right, rgba(255,255,220,0.8), transparent);
      clip-path: polygon(0% 20%, 100% 0%, 100% 100%, 0% 80%);
    }

    /* Taillight glow */
    .taillight-glow {
      position: absolute;
      width: 12px;
      height: 8px;
      border-radius: 2px;
      filter: blur(2px);
    }
    .taillight-glow.left-tl {
      left: 4px;
      top: 20px;
      background: #ff1a1a;
      box-shadow: 0 0 8px #ff1a1a, 0 0 16px rgba(255,26,26,0.5);
    }
    .taillight-glow.right-tl {
      right: 4px;
      top: 20px;
      background: #ff1a1a;
      box-shadow: 0 0 8px #ff1a1a, 0 0 16px rgba(255,26,26,0.5);
    }

    /* Underglow */
    .underglow {
      position: absolute;
      bottom: -3px;
      left: 12%;
      width: 76%;
      height: 10px;
      border-radius: 50%;
      animation: underglowPulse 0.7s ease-in-out infinite alternate;
    }
    @keyframes underglowPulse {
      0% { opacity: 0.3; transform: scaleX(0.92) scaleY(0.8); }
      100% { opacity: 0.85; transform: scaleX(1.06) scaleY(1.1); }
    }
    .underglow-pink { background: radial-gradient(ellipse, rgba(255,46,99,0.6) 0%, rgba(255,46,99,0.1) 60%, transparent 100%); }
    .underglow-cyan { background: radial-gradient(ellipse, rgba(0,229,255,0.6) 0%, rgba(0,229,255,0.1) 60%, transparent 100%); }
    .underglow-gold { background: radial-gradient(ellipse, rgba(255,215,0,0.5) 0%, rgba(255,215,0,0.1) 60%, transparent 100%); }
    .underglow-purple { background: radial-gradient(ellipse, rgba(180,80,255,0.5) 0%, rgba(180,80,255,0.1) 60%, transparent 100%); }

    /* Speed trail behind car */
    .speed-trail {
      position: absolute;
      top: 50%;
      height: 2px;
      transform: translateY(-50%);
      opacity: 0;
      animation: trailFade 0.6s ease-out forwards;
    }
    @keyframes trailFade {
      0% { opacity: 0.6; width: 40px; }
      100% { opacity: 0; width: 120px; }
    }

    /* Car animations */
    .car-1 { right: -200px; animation: driveLeft 11s linear infinite; }
    .car-2 { left: -200px; animation: driveRight 9s linear infinite; }
    .car-3 { right: -200px; animation: driveLeft 16s linear infinite; animation-delay: -5s; }
    .car-4 { left: -200px; animation: driveRight 13s linear infinite; animation-delay: -7s; }

    @keyframes driveLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-100vw - 360px)); }
    }
    @keyframes driveRight {
      0% { transform: translateX(0) scaleX(-1); }
      100% { transform: translateX(calc(100vw + 360px)) scaleX(-1); }
    }

    /* Road reflection of underglow */
    .road-reflection {
      position: absolute;
      bottom: -8px;
      left: 8%;
      width: 84%;
      height: 14px;
      border-radius: 50%;
      filter: blur(6px);
      opacity: 0.25;
      animation: reflectionPulse 0.7s ease-in-out infinite alternate;
    }
    @keyframes reflectionPulse {
      0% { opacity: 0.15; }
      100% { opacity: 0.35; }
    }

    /* Speed particles canvas */
    #speed-particles {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 58px;
      z-index: 5;
      pointer-events: none;
    }

    /* Neon sign accents on buildings */
    .neon-sign {
      position: absolute;
      font-family: 'JetBrains Mono', monospace;
      font-size: 5px;
      letter-spacing: 1px;
      text-transform: uppercase;
      animation: neonFlicker 4s ease-in-out infinite;
    }
    @keyframes neonFlicker {
      0%, 100% { opacity: 1; }
      41% { opacity: 1; }
      42% { opacity: 0.3; }
      43% { opacity: 1; }
      44% { opacity: 0.5; }
      45% { opacity: 1; }
      80% { opacity: 1; }
      81% { opacity: 0.4; }
      82% { opacity: 1; }
    }

    /* Building window flicker */
    .window-light {
      animation: windowFlicker var(--delay, 3s) ease-in-out infinite alternate;
    }
    @keyframes windowFlicker {
      0%, 100% { opacity: var(--max-o, 0.8); }
      50% { opacity: var(--min-o, 0.2); }
    }

    /* Loader */
    #loader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #05070c;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 20px;
      transition: opacity 0.4s ease;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .top-nav { flex-direction: column; align-items: stretch; padding: 12px 16px; }
      .nav-menu { justify-content: center; }
      .header-row { flex-direction: column; align-items: stretch; padding: 16px; }
      .search-box input { width: 100%; }
      .layout-split { flex-direction: column; }
      .sidebar-col { width: 100%; border-right: none; border-bottom: 1px solid var(--border-subtle); max-height: 200px; }
      .main { padding: 12px; }
      .animation-layer { height: 120px; }
      .cityscape { height: 60px; bottom: 48px; }
      .road-surface { height: 48px; }
      .car-layer { height: 48px; }
      .cyber-car { width: 120px; height: 38px; }
      .cyber-car svg { width: 120px; height: 38px; }
      .street-lights { bottom: 45px; }
    }
  </style>
</head>
<body>

<canvas id="particle-canvas"></canvas>

<script>
  /* ============ PARTICLE BACKGROUND ============ */
  const canvas = document.getElementById('particle-canvas');
  let ctxP = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < 40; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.8 + 0.5,
        alpha: Math.random() * 0.2 + 0.1,
        speedX: (Math.random() - 0.5) * 0.1,
        speedY: (Math.random() - 0.5) * 0.1,
        color: `hsl(${Math.random() * 30 + 320}, 70%, 60%)`
      });
    }
  }

  function drawParticles() {
    if (!ctxP) return;
    ctxP.clearRect(0, 0, canvas.width, canvas.height);
    for (let p of particles) {
      ctxP.beginPath();
      ctxP.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctxP.fillStyle = p.color;
      ctxP.globalAlpha = p.alpha;
      ctxP.fill();
      p.x += p.speedX;
      p.y += p.speedY;
      if (p.x < 0) p.x = canvas.width;
      if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height;
      if (p.y > canvas.height) p.y = 0;
    }
    requestAnimationFrame(drawParticles);
  }

  window.addEventListener('resize', () => { resizeCanvas(); initParticles(); resizeSpeedCanvas(); });
  resizeCanvas();
  initParticles();
  drawParticles();

  /* ============ SPEED PARTICLES ON ROAD ============ */
  const spCanvas = document.getElementById('speed-particles');
  let ctxS = spCanvas.getContext('2d');
  let speedDots = [];

  function resizeSpeedCanvas() {
    const roadEl = document.querySelector('.road-surface');
    if (roadEl) {
      spCanvas.width = roadEl.offsetWidth;
      spCanvas.height = roadEl.offsetHeight;
    }
  }

  function initSpeedDots() {
    speedDots = [];
    for (let i = 0; i < 30; i++) {
      speedDots.push(createSpeedDot());
    }
  }

  function createSpeedDot() {
    const goRight = Math.random() > 0.5;
    const lane = Math.random() > 0.5 ? 'top' : 'bottom';
    return {
      x: Math.random() * spCanvas.width,
      y: lane === 'top' ? (spCanvas.height * 0.35 + Math.random() * 8) : (spCanvas.height * 0.7 + Math.random() * 8),
      speed: (Math.random() * 3 + 2) * (goRight ? 1 : -1),
      length: Math.random() * 12 + 4,
      alpha: Math.random() * 0.4 + 0.1,
      color: goRight
        ? (lane === 'top' ? '#ff2e63' : '#00e5ff')
        : (lane === 'top' ? '#ffd700' : '#b450ff')
    };
  }

  function drawSpeedDots() {
    if (!ctxS || !spCanvas.width) { requestAnimationFrame(drawSpeedDots); return; }
    ctxS.clearRect(0, 0, spCanvas.width, spCanvas.height);
    for (let d of speedDots) {
      ctxS.beginPath();
      ctxS.moveTo(d.x, d.y);
      ctxS.lineTo(d.x - d.length * Math.sign(d.speed), d.y);
      ctxS.strokeStyle = d.color;
      ctxS.globalAlpha = d.alpha;
      ctxS.lineWidth = 1;
      ctxS.stroke();
      d.x += d.speed;
      if (d.x > spCanvas.width + 20 || d.x < -20) {
        Object.assign(d, createSpeedDot());
        d.x = d.speed > 0 ? -10 : spCanvas.width + 10;
      }
    }
    ctxS.globalAlpha = 1;
    requestAnimationFrame(drawSpeedDots);
  }

  setTimeout(() => { resizeSpeedCanvas(); initSpeedDots(); drawSpeedDots(); }, 100);

  /* ============ CLOCK & PING ============ */
  function updateClock() {
    document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB');
  }
  setInterval(updateClock, 1000);
  updateClock();
  setInterval(() => {
    document.getElementById('hud-ping').innerText = Math.floor(Math.random() * 12 + 10) + 'ms';
  }, 4000);

  /* ============ SPREADSHEET DATA ============ */
  const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
  const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
  const COPY_COL_C_SHEETS = ['PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
  let allData = {};
  let currentSheet = 'bonus';

  async function fetchSheet(sheetName) {
    const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
    try {
      const res = await fetch(url);
      const text = await res.text();
      const json = JSON.parse(text.substring(47, text.length - 2));
      if (!json.table?.rows) return [];
      const cols = json.table.cols || [];
      const headers = cols.map(col => col.label || `col_${col.id}`);
      return json.table.rows.map(row => {
        const obj = {};
        row.c?.forEach((cell, idx) => { obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null; });
        return obj;
      });
    } catch (e) { console.error(e); return []; }
  }

  async function loadAllSheets() {
    let progress = 0;
    const step = 100 / SHEET_NAMES.length;
    const loaderTitle = document.getElementById('loader-title-text');
    const loaderBar = document.getElementById('loaderBar');
    const loadStatus = document.getElementById('load-status');
    for (const name of SHEET_NAMES) {
      loaderTitle.innerText = name.toUpperCase();
      loadStatus.innerText = `Fetching ${name}...`;
      allData[name] = await fetchSheet(name);
      progress += step;
      loaderBar.style.width = `${Math.min(progress, 100)}%`;
      await new Promise(r => setTimeout(r, 30));
    }
    loaderTitle.innerText = 'READY';
    loadStatus.innerText = 'System Online';
    loaderBar.style.width = '100%';
    setTimeout(() => {
      document.getElementById('loader').style.opacity = '0';
      setTimeout(() => document.getElementById('loader').style.display = 'none', 400);
      renderSheet(currentSheet);
    }, 300);
  }

  function escapeHTML(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m] || m);
  }

  function showCopyNotification() {
    const container = document.getElementById('notif-container');
    const toast = document.createElement('div');
    toast.className = 'toast-notification';
    toast.innerHTML = `<i class="fas fa-check-circle" style="color:#0f0;"></i> ✅ Data berhasil disalin!`;
    container.appendChild(toast);
    setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 200); }, 2000);
  }

  function renderAssetsGrid(data) {
    if (!data.length) return '<div class="empty-state">Tidak ada data</div>';
    let html = '<div class="assets-grid">';
    data.forEach(row => {
      const keys = Object.keys(row);
      const title = row[keys[0]] || '-';
      const value = row[keys[1]] || '-';
      const desc = row[keys[2]] || '-';
      html += `<div class="asset-card">
        <div class="asset-header"><span>${escapeHTML(title)}</span><i class="fas fa-crown" style="color:#ffd700;"></i></div>
        <div class="asset-display">${escapeHTML(value)}</div>
        <div style="padding:0 18px 10px; font-size:0.75rem; color:#8892b0;">${escapeHTML(desc)}</div>
        <div style="padding:0 18px 18px;"><button class="btn-copy-action copy-btn" data-val="${escapeHTML(value)}" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy</button></div>
      </div>`;
    });
    html += '</div>';
    return html;
  }

  function renderQna(data) {
    if (!data.length) return '<div class="empty-state">Tidak ada data</div>';
    const keys = Object.keys(data[0]);
    const colA = keys[0], colB = keys[1], colC = keys[2] || null;
    const onlyColC = COPY_COL_C_SHEETS.includes(currentSheet);
    let html = '<table class="qna-table"><thead><tr>';
    html += `<th>${escapeHTML(colA)}</th>`;
    if (colC) html += `<th>${escapeHTML(colB)}</th><th>${escapeHTML(colC)}</th>`;
    else html += `<th>${escapeHTML(colB)}</th>`;
    html += '<th>Copy</th></tr></thead><tbody>';
    data.forEach(row => {
      const v1 = row[keys[0]] || '', v2 = row[keys[1]] || '', v3 = colC ? (row[keys[2]] || '') : '';
      let copyText = onlyColC ? (v3 || v2 || v1) : [v1, v2, v3].filter(Boolean).join(' — ');
      html += `<tr><td>${escapeHTML(v1)}</td>`;
      if (colC) html += `<td>${escapeHTML(v2)}</td><td>${escapeHTML(v3)}</td>`;
      else html += `<td>${escapeHTML(v2)}</td>`;
      html += `<td class="col-action"><button class="copy-trigger copy-btn" data-text="${escapeHTML(copyText)}"><i class="fas fa-copy"></i> Salin</button></td></tr>`;
    });
    html += '</tbody></table>';
    return html;
  }

  function renderSidebarLayout(data) {
    if (!data.length) return '<div class="empty-state">Tidak ada data</div>';
    const keys = Object.keys(data[0]);
    let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list"></i> Index</div><div class="sidebar-list">`;
    data.forEach((row, idx) => {
      html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-caret-right"></i> ${escapeHTML(row[keys[0]] || `Item ${idx + 1}`)}</div>`;
    });
    html += `</div></div><div class="detail-col" id="detailPanel"><div class="detail-content"><i class="fas fa-info-circle"></i> Pilih item di sidebar</div></div></div>`;
    return html;
  }

  function renderSheet(sheetName) {
    currentSheet = sheetName;
    document.getElementById('pageTitle').innerHTML = sheetName.toUpperCase().replace(/_/g, ' ');
    document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.sheet === sheetName));
    document.getElementById('searchInput').value = '';
    const data = allData[sheetName] || [];
    const container = document.getElementById('tableContainer');

    if (sheetName === 'bonus') {
      container.innerHTML = renderAssetsGrid(data);
    } else if (sheetName === 'PK_anti_audit') {
      container.innerHTML = renderSidebarLayout(data);
      setTimeout(() => {
        const items = document.querySelectorAll('.sidebar-item');
        const panel = document.getElementById('detailPanel');
        if (!items.length) return;
        const update = (idx) => {
          const row = data[idx], keys = Object.keys(row);
          const title = row[keys[0]] || '-';
          const desc = row[keys[2]] || row[keys[1]] || '-';
          panel.innerHTML = `<div class="detail-content">
            <div style="color:#ff2e63; font-weight:600; font-size:0.95rem;">📌 ${escapeHTML(title)}</div>
            <div style="margin-top:12px; background:rgba(0,0,0,0.3); padding:14px; border-radius:16px; font-size:0.82rem; color:var(--text-secondary); line-height:1.7;">${escapeHTML(desc)}</div>
            <button class="copy-btn" data-desc="${escapeHTML(desc)}" style="margin-top:16px; width:100%; padding:10px; background:rgba(255,46,99,0.1); border:1px solid rgba(255,46,99,0.3); border-radius:40px; color:#ff2e63; cursor:pointer; font-weight:600; font-size:0.8rem; transition:0.2s;"><i class="fas fa-copy"></i> Copy Deskripsi</button>
          </div>`;
        };
        items.forEach(item => {
          item.addEventListener('click', () => {
            items.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            update(parseInt(item.dataset.index));
          });
        });
        if (items[0]) { items[0].classList.add('active'); update(0); }
      }, 60);
    } else {
      container.innerHTML = renderQna(data);
    }
  }

  function handleSearch() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const data = allData[currentSheet] || [];
    if (!data.length) return;
    if (currentSheet === 'PK_anti_audit') {
      const items = document.querySelectorAll('.sidebar-item');
      let first = -1;
      items.forEach((item, idx) => {
        const match = Object.values(data[idx]).some(v => v && String(v).toLowerCase().includes(q));
        item.style.display = match ? 'flex' : 'none';
        if (match && first === -1) first = idx;
      });
      const active = document.querySelector('.sidebar-item.active');
      if ((!active || active.style.display === 'none') && first !== -1) {
        document.querySelector(`.sidebar-item[data-index="${first}"]`)?.click();
      }
    } else if (currentSheet === 'bonus') {
      document.getElementById('tableContainer').innerHTML = renderAssetsGrid(
        data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q)))
      );
    } else {
      document.getElementById('tableContainer').innerHTML = renderQna(
        data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q)))
      );
    }
  }

  function addLightningFlash(element) {
    if (!element) return;
    element.style.transition = 'box-shadow 0.1s';
    element.style.boxShadow = '0 0 20px rgba(255,46,99,0.6), inset 0 0 10px rgba(255,46,99,0.2)';
    setTimeout(() => { element.style.boxShadow = ''; }, 250);
  }

  document.querySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
      addLightningFlash(item);
      renderSheet(item.dataset.sheet);
    });
  });

  document.getElementById('refreshBtn').addEventListener('click', () => {
    addLightningFlash(document.getElementById('refreshBtn'));
    loadAllSheets();
  });

  document.addEventListener('click', async (e) => {
    const btn = e.target.closest('.copy-btn');
    if (!btn) return;
    let text = '';
    if (btn.dataset.val && btn.dataset.desc) text = `${btn.dataset.val} — ${btn.dataset.desc}`;
    else if (btn.dataset.text) text = btn.dataset.text;
    else if (btn.dataset.desc) text = btn.dataset.desc;
    if (text) {
      e.preventDefault();
      try { await navigator.clipboard.writeText(text); } catch { /* fallback */ }
      showCopyNotification();
      btn.style.transform = 'scale(0.95)';
      setTimeout(() => { if (btn) btn.style.transform = ''; }, 150);
    }
  });

  document.getElementById('searchInput').addEventListener('input', handleSearch);
  loadAllSheets();
</script>
</body>
</html>
