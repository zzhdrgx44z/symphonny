<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>沈 · LINE TOGEL HUB</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    :root {
      --bg-core: #0a0e14;
      --bg-panel: rgba(15, 22, 32, 0.85);
      --accent-primary: #00ffc8;
      --accent-secondary: #00e5ff;
      --accent-warning: #ffd000;
      --accent-hot: #ff3366;
      --accent-gold: #ffaa00;
      --text-main: #ffffff;
      --text-muted: #9aa5b8;
      --border-glass: rgba(255, 255, 255, 0.12);
      --glow-primary: rgba(0, 255, 200, 0.7);
      --glass-blur: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-core);
      color: var(--text-main);
      min-height: 100vh; 
      overflow-x: hidden;
      display: flex; flex-direction: column; font-size: 16px;
      position: relative;
    }

    /* ========== DYNAMIC BACKGROUND ========== */
    .dynamic-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      overflow: hidden;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(0, 255, 200, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 229, 255, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(255, 170, 0, 0.03) 0%, transparent 60%),
        linear-gradient(180deg, #0a0e14 0%, #0d1520 50%, #0a0e14 100%);
    }

    .gradient-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.5;
      animation: orbFloat 25s ease-in-out infinite;
    }

    .orb-1 {
      width: 700px; height: 700px;
      background: radial-gradient(circle, var(--accent-primary) 0%, transparent 70%);
      top: -300px; right: -200px;
      animation-delay: 0s;
    }

    .orb-2 {
      width: 600px; height: 600px;
      background: radial-gradient(circle, var(--accent-secondary) 0%, transparent 70%);
      bottom: -200px; left: -150px;
      animation-delay: -8s;
    }

    .orb-3 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--accent-gold) 0%, transparent 70%);
      top: 50%; left: 50%;
      opacity: 0.25;
      animation-delay: -15s;
    }

    @keyframes orbFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(60px, -40px) scale(1.15); }
      50% { transform: translate(-40px, 60px) scale(0.9); }
      75% { transform: translate(30px, 30px) scale(1.05); }
    }

    .grid-lines {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 200, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 200, 0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: linear-gradient(to bottom, transparent, black 10%, black 90%, transparent);
    }

    /* ========== FLOATING PARTICLES ========== */
    .particles-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 3px; height: 3px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent-primary), 0 0 20px var(--accent-primary);
      animation: particleFloat 15s linear infinite;
      opacity: 0;
    }

    @keyframes particleFloat {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.8; }
      90% { opacity: 0.8; }
      100% { transform: translateY(-100vh) scale(1); opacity: 0; }
    }

    /* ========== SCANLINES ========== */
    .scanlines {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9998;
      background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.05));
      background-size: 100% 3px;
      opacity: 0.1;
    }

    /* ========== TOP HAZARD BAR ========== */
    .hazard-bar {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary), var(--accent-gold), var(--accent-primary), var(--accent-secondary));
      background-size: 300% 100%;
      z-index: 100;
      box-shadow: 0 0 25px var(--accent-primary), 0 0 50px var(--accent-secondary);
      animation: hazardGlow 4s linear infinite;
    }

    @keyframes hazardGlow {
      0% { background-position: 0% 0%; }
      100% { background-position: 300% 0%; }
    }

    /* ========== NAVIGATION ========== */
    .top-nav {
      height: 85px;
      background: rgba(10, 14, 20, 0.9);
      border-bottom: 1px solid var(--border-glass);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 35px;
      position: relative; z-index: 10;
      margin-top: 4px;
      backdrop-filter: blur(var(--glass-blur));
      -webkit-backdrop-filter: blur(var(--glass-blur));
    }

    .brand {
      display: flex; align-items: center; gap: 18px;
      padding-right: 35px; height: 100%;
      border-right: 1px solid var(--border-glass);
    }

    .logo-box {
      width: 55px; height: 55px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: #000;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; font-weight: 700;
      border-radius: 14px;
      position: relative;
      box-shadow: 0 0 30px var(--glow-primary), inset 0 0 20px rgba(255,255,255,0.2);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      animation: logoPulse 3s ease-in-out infinite;
    }

    @keyframes logoPulse {
      0%, 100% { box-shadow: 0 0 30px var(--glow-primary), inset 0 0 20px rgba(255,255,255,0.2); }
      50% { box-shadow: 0 0 50px var(--glow-primary), 0 0 80px rgba(0, 229, 255, 0.3), inset 0 0 20px rgba(255,255,255,0.2); }
    }

    .brand:hover .logo-box {
      transform: rotate(-10deg) scale(1.1);
      box-shadow: 0 0 60px var(--glow-primary);
    }

    .brand-text h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem;
      text-transform: uppercase; letter-spacing: 4px;
      color: #fff; font-weight: 900;
      background: linear-gradient(135deg, #fff 0%, var(--accent-primary) 50%, var(--accent-secondary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: none;
    }

    .brand-text span {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem; color: var(--accent-secondary);
      letter-spacing: 4px; display: block; margin-top: 4px;
      text-transform: uppercase;
    }

    .nav-menu {
      display: flex; height: 100%; align-items: center; gap: 8px;
    }

    .nav-item {
      height: auto;
      padding: 12px 22px;
      color: var(--text-muted);
      font-size: 0.85rem; text-transform: uppercase; font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      display: flex; align-items: center; gap: 12px;
      letter-spacing: 0.5px;
      border-radius: 8px;
      background: transparent;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      color: #fff;
      background: rgba(255, 255, 255, 0.06);
      border-color: var(--border-glass);
      transform: translateY(-2px);
    }

    .nav-item.active {
      color: #000;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border-color: transparent;
      box-shadow: 0 0 25px var(--glow-primary), 0 5px 20px rgba(0, 255, 200, 0.3);
      font-weight: 700;
    }

    .nav-item i { font-size: 0.95rem; }

    .status-box {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      display: flex; align-items: center; gap: 14px;
      background: rgba(255,255,255,0.06);
      padding: 12px 24px;
      border-radius: 50px;
      border: 1px solid var(--border-glass);
    }

    .status-indicator {
      width: 10px; height: 10px;
      background: var(--accent-primary);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--accent-primary);
      animation: statusPulse 1.5s ease-in-out infinite;
    }

    @keyframes statusPulse {
      0%, 100% { opacity: 1; transform: scale(1); box-shadow: 0 0 15px var(--accent-primary); }
      50% { opacity: 0.5; transform: scale(0.8); box-shadow: 0 0 25px var(--accent-primary); }
    }

    .time-val { color: var(--text-main); font-weight: 600; }

    /* ========== MAIN CONTENT ========== */
    .main {
      flex: 1;
      display: flex; flex-direction: column;
      overflow: hidden;
      padding: 25px;
      padding-bottom: 160px;
      min-height: 0;
      position: relative;
      z-index: 2;
    }

    .content-wrapper {
      flex: 1;
      background: var(--bg-panel);
      border: 1px solid var(--border-glass);
      display: flex; flex-direction: column;
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      box-shadow: 
        0 25px 60px rgba(0,0,0,0.4),
        0 0 100px rgba(0, 255, 200, 0.05),
        inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .corner-deco {
      position: absolute;
      width: 120px; height: 35px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      display: flex; align-items: center; justify-content: center;
      color: #000; font-weight: 700; font-size: 0.75rem;
      letter-spacing: 2px; text-transform: uppercase;
      z-index: 5; top: 0; right: 0;
      border-bottom-left-radius: 20px;
      box-shadow: 0 0 30px var(--glow-primary);
      animation: cornerGlow 2s ease-in-out infinite alternate;
    }

    @keyframes cornerGlow {
      0% { box-shadow: 0 0 30px var(--glow-primary); }
      100% { box-shadow: 0 0 50px var(--glow-primary), 0 0 80px rgba(0, 229, 255, 0.4); }
    }

    /* ========== HEADER ROW ========== */
    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 28px 35px;
      border-bottom: 1px solid var(--border-glass);
      background: rgba(0,0,0,0.2);
      flex-shrink: 0;
      flex-wrap: wrap;
      gap: 22px;
    }

    .title-main { display: flex; align-items: center; gap: 18px; }

    .title-badge {
      background: rgba(0, 255, 200, 0.15);
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      padding: 8px 18px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px;
      border-radius: 6px;
      box-shadow: 0 0 20px rgba(0, 255, 200, 0.2);
    }

    .title-main h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 2rem; text-transform: uppercase;
      line-height: 1; font-weight: 900;
      color: #fff;
      letter-spacing: 3px;
      text-shadow: 0 0 30px rgba(255,255,255,0.3);
    }

    .search-box { position: relative; width: 320px; z-index: 2; }

    .search-box input {
      width: 100%; padding: 14px 24px;
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border-glass);
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      text-transform: uppercase; letter-spacing: 1px;
      transition: all 0.3s;
      border-radius: 10px;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-primary);
      background: rgba(255,255,255,0.1);
      box-shadow: 0 0 25px rgba(0, 255, 200, 0.25);
    }

    .search-box input::placeholder { color: var(--text-muted); }
    .search-box i {
      position: absolute; right: 18px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .btn-industrial {
      background: transparent;
      border: 1px solid var(--border-glass);
      color: var(--text-muted);
      padding: 14px 24px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.9rem;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .btn-industrial::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transition: left 0.5s;
    }

    .btn-industrial:hover::before { left: 100%; }

    .btn-industrial:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      box-shadow: 0 0 25px rgba(0, 255, 200, 0.35);
      transform: translateY(-2px);
    }

    .btn-industrial.success {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: #000;
      border-color: transparent;
      box-shadow: 0 0 30px var(--glow-primary);
    }

    .btn-industrial.loading i { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ========== DATA CARD ========== */
    .data-card {
      flex: 1; display: flex; flex-direction: column;
      padding: 22px;
      min-height: 0;
      overflow: hidden;
    }

    .table-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
    }

    .table-scroll::-webkit-scrollbar { width: 10px; background: rgba(255,255,255,0.02); }
    .table-scroll::-webkit-scrollbar-track { background: transparent; }
    .table-scroll::-webkit-scrollbar-thumb { background: rgba(0, 255, 200, 0.3); border-radius: 5px; }
    .table-scroll::-webkit-scrollbar-thumb:hover { background: var(--accent-primary); }

    /* ========== ASSETS GRID ========== */
    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
      padding: 12px;
    }

    .asset-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-glass);
      display: flex; flex-direction: column;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      animation: cardSlideIn 0.6s ease-out forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes cardSlideIn { to { opacity: 1; transform: translateY(0); } }

    .asset-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), var(--accent-secondary), var(--accent-primary), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }

    .asset-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0, 255, 200, 0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }

    .asset-card:hover {
      background: rgba(255, 255, 255, 0.08);
      transform: translateY(-8px) scale(1.01);
      border-color: var(--accent-primary);
      box-shadow: 
        0 20px 40px rgba(0,0,0,0.3), 
        0 0 40px var(--glow-primary),
        inset 0 0 30px rgba(0, 255, 200, 0.05);
    }

    .asset-card:hover::before { opacity: 1; }
    .asset-card:hover::after { opacity: 1; }

    .asset-header {
      padding: 20px 25px;
      display: flex; justify-content: space-between; align-items: center;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid var(--border-glass);
    }

    .asset-id-badge {
      background: rgba(0, 255, 200, 0.12);
      border: 1px solid rgba(0, 255, 200, 0.4);
      padding: 6px 14px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem; color: var(--accent-primary);
      text-transform: uppercase; border-radius: 6px;
      letter-spacing: 1px;
    }

    .asset-status {
      width: 12px; height: 12px;
      background: var(--accent-secondary);
      border-radius: 50%;
      box-shadow: 0 0 15px var(--accent-secondary);
      animation: statusBlink 2s ease-in-out infinite;
    }

    @keyframes statusBlink {
      0%, 100% { opacity: 1; box-shadow: 0 0 15px var(--accent-secondary); }
      50% { opacity: 0.6; box-shadow: 0 0 25px var(--accent-secondary); }
    }

    .asset-display {
      margin: 22px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border-glass);
      padding: 22px;
      border-radius: 10px;
      position: relative;
      overflow: hidden;
    }

    .asset-display::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.1), transparent);
      animation: displayShine 4s ease-in-out infinite;
    }

    @keyframes displayShine {
      0% { left: -100%; }
      50%, 100% { left: 100%; }
    }

    .asset-value {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.2rem;
      color: var(--text-main);
      text-shadow: 0 0 20px var(--glow-primary);
      text-transform: uppercase;
      word-break: break-all;
      text-align: center;
      font-weight: 600;
      line-height: 1.6;
    }

    .asset-info {
      padding: 0 22px 22px;
      flex: 1;
      display: flex; flex-direction: column;
    }

    .asset-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 2px;
      margin-bottom: 10px;
    }

    .asset-desc {
      font-size: 0.95rem;
      color: #bbb;
      line-height: 1.7;
      margin-bottom: 18px;
      flex: 1;
      font-style: italic;
    }

    .asset-actions {
      display: flex;
      margin-top: auto;
      border-top: 1px solid var(--border-glass);
      padding-top: 20px;
    }

    .btn-copy-action {
      background: transparent;
      border: 1px solid var(--border-glass);
      color: var(--text-muted);
      padding: 14px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; font-size: 0.85rem;
      border-radius: 8px;
    }

    .btn-copy-action:hover {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      color: #000;
      border-color: transparent;
      box-shadow: 0 0 30px var(--glow-primary);
      transform: scale(1.02);
    }

    .btn-copy-action.success {
      background: var(--accent-gold);
      color: #000;
      border-color: transparent;
    }

    /* ========== LAYOUT SPLIT ========== */
    .layout-split {
      display: flex;
      height: 100%;
      gap: 1px;
      overflow: hidden;
      background: var(--border-glass);
    }

    .sidebar-col {
      width: 320px;
      min-width: 320px;
      background: rgba(0,0,0,0.25);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .sidebar-header {
      padding: 20px 25px;
      background: rgba(0,0,0,0.35);
      color: var(--accent-primary);
      text-transform: uppercase;
      font-weight: 700; letter-spacing: 2px;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.9rem;
      border-bottom: 1px solid var(--border-glass);
    }

    .sidebar-list {
      flex: 1;
      overflow-y: auto;
    }

    .sidebar-item {
      padding: 16px 25px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      color: #888;
      display: flex; align-items: center; gap: 14px;
      font-weight: 600; font-size: 0.95rem;
      position: relative;
      letter-spacing: 0.5px;
      background: rgba(0,0,0,0.15);
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }

    .sidebar-item i {
      color: var(--text-muted);
      font-size: 0.8rem;
      transition: all 0.3s;
    }

    .sidebar-item:hover {
      background: rgba(0, 255, 200, 0.08);
      color: #fff;
      padding-left: 30px;
    }

    .sidebar-item:hover i {
      color: var(--accent-secondary);
      transform: translateX(5px);
    }

    .sidebar-item.active {
      background: rgba(0, 255, 200, 0.12);
      color: var(--accent-primary);
      border-left: 3px solid var(--accent-primary);
    }

    .sidebar-item.active i {
      color: var(--accent-primary);
    }

    .detail-col {
      flex: 1;
      background: rgba(10, 14, 20, 0.6);
      padding: 35px;
      overflow-y: auto;
      display: flex; flex-direction: column;
    }

    .detail-content {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border-glass);
      padding: 35px;
      flex: 1;
      display: flex; flex-direction: column;
      animation: fadeSlideIn 0.5s ease-out;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    .detail-content::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
      animation: detailLineGlow 2s ease-in-out infinite;
    }

    @keyframes detailLineGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .detail-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 3px;
      margin-bottom: 10px;
    }

    .detail-value {
      font-size: 1.4rem;
      color: var(--text-main);
      font-weight: 600;
      margin-bottom: 28px;
      padding-bottom: 28px;
      border-bottom: 1px dashed var(--border-glass);
      word-break: break-all;
      text-shadow: 0 0 20px rgba(255,255,255,0.2);
      line-height: 1.6;
    }

    .detail-desc-text {
      font-size: 1.05rem;
      color: #ccc;
      line-height: 1.9;
      white-space: pre-wrap;
      margin-bottom: 28px;
    }

    .detail-actions {
      margin-top: auto;
      padding-top: 28px;
      border-top: 1px solid var(--border-glass);
      display: flex;
      justify-content: flex-end;
      gap: 15px;
    }

    .btn-action-primary {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
      border: none;
      color: #000;
      padding: 14px 28px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.9rem;
      border-radius: 10px;
      box-shadow: 0 0 25px var(--glow-primary);
      position: relative;
      overflow: hidden;
    }

    .btn-action-primary::before {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .btn-action-primary:hover::before { left: 100%; }

    .btn-action-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 0 40px var(--glow-primary), 0 10px 30px rgba(0, 255, 200, 0.3);
    }

    .btn-action-secondary {
      background: transparent;
      border: 1px solid var(--border-glass);
      color: var(--text-muted);
      padding: 14px 28px;
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex; align-items: center; gap: 12px;
      font-size: 0.9rem;
      border-radius: 10px;
    }

    .btn-action-secondary:hover {
      border-color: var(--accent-gold);
      color: var(--accent-gold);
      box-shadow: 0 0 25px rgba(255, 170, 0, 0.3);
      transform: translateY(-3px);
    }

    .btn-action-secondary.success {
      background: var(--accent-gold);
      color: #000;
      border-color: var(--accent-gold);
    }

    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 4px;
      font-size: 0.9rem;
    }

    /* ========== ROAD ANIMATION ========== */
    .animation-layer {
      position: fixed;
      bottom: 0; left: 0;
      width: 100%; height: 150px;
      z-index: 999;
      pointer-events: none;
      overflow: hidden;
      background: linear-gradient(to top, rgba(10, 14, 20, 0.98) 0%, transparent 100%);
    }

    .road-container {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 55px;
      background: #080a0e;
      border-top: 1px solid rgba(255,255,255,0.12);
    }

    .road-lines {
      position: absolute;
      top: 27px; left: 0;
      width: 200%; height: 3px;
      background: repeating-linear-gradient(90deg, transparent, transparent 35px, var(--accent-primary) 35px, var(--accent-primary) 70px);
      opacity: 0.6;
      animation: roadFastMove 0.7s linear infinite;
    }

    @keyframes roadFastMove { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

    .cyber-car {
      position: absolute;
      bottom: 12px;
      width: 170px; height: 65px;
      filter: drop-shadow(0 0 20px var(--car-glow));
    }

    .car-cruiser {
      right: -220px;
      animation: driveCar1 14s linear infinite;
      --car-glow: var(--glow-primary);
    }

    .car-interceptor {
      left: -220px;
      filter: drop-shadow(0 0 20px rgba(255, 51, 102, 0.7));
      animation: driveCar2 10s linear infinite;
      bottom: 18px;
      transform: scale(0.9);
      --car-glow: rgba(255, 51, 102, 0.7);
    }

    @keyframes driveCar1 { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-100vw - 270px)); } }
    @keyframes driveCar2 { 0% { transform: translateX(0) scaleX(-1); } 100% { transform: translateX(calc(100vw + 270px)) scaleX(-1); } }

    .car-body-anim { animation: suspension 0.25s ease-in-out infinite; }
    @keyframes suspension { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(2px); } }

    .underglow {
      position: absolute;
      bottom: -10px; left: 12px;
      width: 80%; height: 25px;
      background: radial-gradient(ellipse at center, var(--car-glow) 0%, transparent 70%);
      filter: blur(12px);
      opacity: 1;
    }

    .wheel {
      position: absolute;
      bottom: -6px;
      width: 20px; height: 20px;
      background: #000;
      border: 2px solid rgba(255,255,255,0.35);
      border-radius: 50%;
      animation: spinWheel 0.15s linear infinite;
    }

    .wheel::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 7px; height: 7px;
      background: rgba(255,255,255,0.35);
      border-radius: 50%;
    }

    .w-front { right: 18px; }
    .w-back { left: 22px; }

    @keyframes spinWheel { to { transform: rotate(360deg); } }

    .light-beam-container {
      position: absolute;
      top: 50%;
      width: 160px; height: 25px;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .beam-right { right: -12px; }

    .light-beam {
      width: 100%; height: 100%;
      background: linear-gradient(90deg, rgba(255,255,255,0.5) 0%, transparent 100%);
      clip-path: polygon(0 0, 100% 100%, 100% 0);
      filter: blur(6px);
    }

    .exhaust {
      position: absolute;
      bottom: 12px;
      width: 8px; height: 8px;
      background: var(--accent-secondary);
      border-radius: 50%;
      filter: blur(3px);
      opacity: 0.8;
      animation: smokePuff 0.35s linear infinite;
    }

    .ex-left { left: 0; }

    @keyframes smokePuff { 0% { transform: scale(0.5) translateX(0); opacity: 0.8; } 100% { transform: scale(1.8) translateX(25px); opacity: 0; } }

    /* ========== NOTIFICATIONS ========== */
    #notif-container {
      position: fixed;
      bottom: 170px; right: 35px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .toast-notification {
      background: rgba(10, 14, 20, 0.95);
      border: 1px solid var(--accent-primary);
      padding: 18px 26px;
      color: #fff;
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.5), 0 0 25px var(--glow-primary);
      animation: toastSlideIn 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      max-width: 350px;
      border-radius: 12px;
      backdrop-filter: blur(15px);
    }

    .toast-notification i { color: var(--accent-primary); font-size: 1.2rem; }

    .toast-exit { animation: toastSlideOut 0.35s ease-in forwards; }

    @keyframes toastSlideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toastSlideOut { to { transform: translateX(100%); opacity: 0; } }

    /* ========== LOADER ========== */
    #loader {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0a0e14;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
      transition: opacity 0.6s, visibility 0.6s;
    }

    #loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .loader-title {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.2rem; font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--accent-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: loaderPulse 1.8s ease-in-out infinite;
    }

    @keyframes loaderPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

    .loader-bar-container {
      width: 400px; height: 5px;
      background: rgba(255,255,255,0.1);
      position: relative;
      overflow: hidden;
      border-radius: 3px;
    }

    .loader-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-gold));
      transition: width 0.4s;
      box-shadow: 0 0 30px var(--glow-primary);
      border-radius: 3px;
    }

    .loader-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 3px;
    }

    /* ========== RESPONSIVE ========== */
    @media (max-width: 1024px) {
      .top-nav { height: auto; flex-direction: column; padding: 20px; gap: 20px; }
      .brand { border-right: none; border-bottom: 1px solid var(--border-glass); width: 100%; justify-content: center; padding-bottom: 20px; padding-right: 0; }
      .nav-menu { width: 100%; justify-content: center; flex-wrap: wrap; gap: 8px; }
      .nav-item { padding: 10px 16px; font-size: 0.75rem; }
      .status-box { display: none; }
      .header-row { flex-direction: column; align-items: flex-start; }
      .search-box { width: 100%; }
      .main { padding: 15px; padding-bottom: 170px; }
      .layout-split { flex-direction: column; }
      .sidebar-col { width: 100%; height: 35%; border-bottom: 1px solid var(--border-glass); }
      .detail-col { height: 65%; padding: 20px; }
      .assets-grid { grid-template-columns: 1fr; }
      .car-interceptor { display: none; }
      .gradient-orb { display: none; }
      .detail-actions { flex-direction: column; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>

  <!-- Dynamic Background -->
  <div class="dynamic-bg">
    <div class="grid-lines"></div>
    <div class="gradient-orb orb-1"></div>
    <div class="gradient-orb orb-2"></div>
    <div class="gradient-orb orb-3"></div>
  </div>

  <!-- Particles -->
  <div class="particles-container" id="particlesContainer"></div>

  <div class="scanlines"></div>
  <div class="hazard-bar"></div>

  <div id="notif-container"></div>

  <div id="loader">
    <div class="loader-title">SYSTEM INIT</div>
    <div class="loader-bar-container">
      <div class="loader-bar" id="loaderBar"></div>
    </div>
    <div class="loader-text" id="load-status">Initializing Modules...</div>
  </div>

  <nav class="top-nav">
    <div class="brand">
      <div class="logo-box"><i class="fas fa-database"></i></div>
      <div class="brand-text">
        <h1>TOMMY</h1>
        <span>LINE TOGEL HUB</span>
      </div>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-sheet="bonus"><i class="fas fa-cube"></i><span>BONUS</span></div>
      <div class="nav-item" data-sheet="PK_anti_audit"><i class="fas fa-toolbox"></i><span>PK TANPA KENA AUDIT NEW</span></div>
      <div class="nav-item" data-sheet="PK_LULUS_SENSOR_AUDIT"><i class="fas fa-book"></i><span>PK TERBARU LULUS SENSOR AUDIT</span></div>
    </div>
    <div class="status-box">
      <div class="status-indicator"></div>
      <div class="time-val" id="clock">00:00:00</div>
    </div>
  </nav>

  <main class="main">
    <div class="content-wrapper">
      <div class="corner-deco">SECURE</div>
      <div class="header-row">
        <div class="title-main">
          <div class="title-badge">Module</div>
          <h1 id="pageTitle">BONUS</h1>
        </div>
        <div class="header-actions">
          <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search Database...">
            <i class="fas fa-search"></i>
          </div>
          <button class="btn-industrial" id="refreshBtn">
            <i class="fas fa-sync-alt"></i>
            <span>Refresh</span>
          </button>
        </div>
      </div>
      <div class="data-card">
        <div class="table-scroll" id="tableContainer"></div>
      </div>
    </div>
  </main>

  <!-- Road Animation Layer -->
  <div class="animation-layer">
    <div class="road-container">
      <div class="road-lines"></div>
    </div>
    
    <!-- Cruiser Car -->
    <div class="cyber-car car-cruiser">
      <svg class="car-body-anim" width="100%" height="100%" viewBox="0 0 200 80">
        <path d="M20,50 Q30,10 80,10 L160,10 Q190,10 190,40 L190,55 Q190,65 180,65 L20,65 Q10,65 10,55 L10,50 Z" fill="#15181e" stroke="var(--accent-primary)" stroke-width="2"/>
        <path d="M40,15 Q45,5 70,5 L95,5 Q105,5 105,15 L40,15 Z" fill="#0a0c10"/>
        <path d="M115,10 L150,10 Q160,10 160,25 L115,25 Z" fill="#0a0c10"/>
        <rect x="12" y="48" width="4" height="8" fill="var(--accent-hot)"/>
        <rect x="184" y="30" width="6" height="12" fill="var(--accent-primary)"/>
      </svg>
      <div class="underglow"></div>
      <div class="wheel w-front"></div>
      <div class="wheel w-back"></div>
      <div class="light-beam-container beam-right"><div class="light-beam"></div></div>
      <div class="exhaust ex-left"></div>
    </div>
    
    <!-- Interceptor Car -->
    <div class="cyber-car car-interceptor">
      <svg class="car-body-anim" width="100%" height="100%" viewBox="0 0 200 80">
        <path d="M10,40 Q10,10 40,10 L120,10 Q170,10 180,50 L180,55 Q180,65 170,65 L20,65 Q10,65 10,55 Z" fill="#15181e" stroke="var(--accent-hot)" stroke-width="2"/>
        <path d="M30,15 L30,25 Q30,10 45,10 L80,10 Q90,10 90,15 Z" fill="#0a0c10"/>
        <path d="M100,5 L140,5 Q150,5 155,15 L100,15 Z" fill="#0a0c10"/>
        <rect x="174" y="48" width="4" height="8" fill="var(--accent-primary)"/>
        <rect x="10" y="30" width="6" height="12" fill="var(--accent-hot)"/>
      </svg>
      <div class="underglow"></div>
      <div class="wheel w-front" style="right:20px; left:auto;"></div>
      <div class="wheel w-back" style="left:25px; right:auto;"></div>
    </div>
  </div>

  <script>
    // ========== CONFIGURATION ==========
    const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
    const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT'];

    // ========== STATE ==========
    let allData = {};
    let currentSheet = 'bonus';
    let activeSidebarIndex = 0;

    // ========== DOM ELEMENTS ==========
    const loader = document.getElementById('loader');
    const loaderBar = document.getElementById('loaderBar');
    const loadStatus = document.getElementById('load-status');
    const pageTitle = document.getElementById('pageTitle');
    const tableContainer = document.getElementById('tableContainer');
    const searchInput = document.getElementById('searchInput');
    const clockEl = document.getElementById('clock');
    const notifContainer = document.getElementById('notif-container');
    const refreshBtn = document.getElementById('refreshBtn');
    const particlesContainer = document.getElementById('particlesContainer');

    // ========== PARTICLES ==========
    function createParticles() {
      for (let i = 0; i < 25; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 15 + 's';
        particle.style.animationDuration = (15 + Math.random() * 10) + 's';
        
        const colors = ['#00ffc8', '#00e5ff', '#ffaa00'];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];
        particle.style.boxShadow = `0 0 10px ${particle.style.background}`;
        
        particlesContainer.appendChild(particle);
      }
    }

    // ========== INITIALIZATION ==========
    function init() {
      createParticles();
      startClock();
      setupEventListeners();
      loadAllSheets();
    }

    // ========== CLOCK ==========
    function startClock() {
      setInterval(() => {
        clockEl.textContent = new Date().toLocaleTimeString('en-GB');
      }, 1000);
    }

    // ========== NOTIFICATIONS ==========
    function showNotification(msg) {
      const notif = document.createElement('div');
      notif.className = 'toast-notification';
      notif.innerHTML = `<i class="fas fa-check-circle"></i><span>${msg}</span>`;
      notifContainer.appendChild(notif);
      
      setTimeout(() => {
        notif.classList.add('toast-exit');
        setTimeout(() => notif.remove(), 350);
      }, 2800);
    }

    // ========== DATA FETCHING ==========
    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        if (!json.table?.rows) return [];
        
        const cols = json.table.cols || [];
        const headers = cols.map(col => col.label || `col_${col.id}`);
        
        return json.table.rows.map(row => {
          const obj = {};
          row.c?.forEach((cell, idx) => {
            obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null;
          });
          return obj;
        });
      } catch (e) {
        console.error(`Error fetching ${sheetName}:`, e);
        return [];
      }
    }

    async function loadAllSheets() {
      let progress = 0;
      const increment = 100 / SHEET_NAMES.length;
      
      for (const name of SHEET_NAMES) {
        loadStatus.textContent = `LOADING: ${name.toUpperCase().replace(/_/g, ' ')}`;
        allData[name] = await fetchSheet(name);
        progress += increment;
        loaderBar.style.width = `${progress}%`;
      }
      
      loadStatus.textContent = 'SYSTEM READY';
      loaderBar.style.width = '100%';
      
      setTimeout(() => {
        loader.classList.add('hidden');
        renderSheet(currentSheet);
      }, 600);
    }

    // ========== RENDERING ==========
    function renderSheet(sheetName) {
      currentSheet = sheetName;
      
      const displayName = sheetName.toUpperCase().replace(/_/g, ' ');
      pageTitle.textContent = displayName;
      
      searchInput.value = '';
      
      document.querySelectorAll('.nav-item').forEach(el => {
        el.classList.toggle('active', el.dataset.sheet === sheetName);
      });
      
      const data = allData[sheetName] || [];
      
      if (!data.length) {
        tableContainer.innerHTML = '<div style="padding:50px;text-align:center;color:#666;">NO DATA FOUND</div>';
        return;
      }
      
      if (sheetName === 'PK_anti_audit') {
        activeSidebarIndex = 0;
        tableContainer.innerHTML = renderSidebarLayout(data);
        initSidebarInteraction(data);
      } else if (sheetName === 'bonus') {
        tableContainer.innerHTML = renderAssetsGrid(data);
      } else {
        tableContainer.innerHTML = renderQna(data);
      }
    }

    function renderAssetsGrid(data) {
      if (!data.length) return '';
      
      let html = '<div class="assets-grid">';
      
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const id = row[keys[0]] || '-';
        const val = row[keys[1]] || '-';
        const desc = row[keys[2]] || '-';
        const valEsc = String(val).replace(/"/g, '&quot;');
        
        html += `
          <div class="asset-card" style="animation-delay:${idx * 0.1}s">
            <div class="asset-header">
              <span class="asset-id-badge">${escapeHTML(id)}</span>
              <div class="asset-status"></div>
            </div>
            <div class="asset-display">
              <div class="asset-value">${escapeHTML(val)}</div>
            </div>
            <div class="asset-info">
              <div class="asset-label">System Note</div>
              <div class="asset-desc">${escapeHTML(desc)}</div>
              <div class="asset-actions">
                <button class="btn-copy-action" data-val="${valEsc}" data-desc="${escapeHTML(desc).replace(/"/g, '&quot;')}">
                  <i class="fas fa-download"></i>
                  <span>Extract Data</span>
                </button>
              </div>
            </div>
          </div>
        `;
      });
      
      html += '</div>';
      return html;
    }

    function renderQna(data) {
      if (!data.length) return '';
      
      let html = `<table style="width:100%; border-collapse:collapse;"><thead><tr style="border-bottom:1px solid var(--border-glass);"><th style="padding:18px; text-align:left; color:var(--text-muted); font-size:0.85rem; text-transform:uppercase;">QUERY</th><th style="padding:18px;"></th><th style="padding:18px; text-align:left; color:var(--text-muted); font-size:0.85rem; text-transform:uppercase;">RESPONSE</th><th style="padding:18px;"></th></tr></thead><tbody>`;
      
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const q = row[keys[1]] || row[keys[0]] || '-';
        const a = row[keys[2]] || row[keys[1]] || '-';
        const qSafe = escapeHTML(q).replace(/"/g, '&quot;');
        const aSafe = escapeHTML(a).replace(/"/g, '&quot;');
        
        html += `<tr style="border-bottom:1px solid rgba(255,255,255,0.03);"><td style="padding:20px; color:#ccc;">${escapeHTML(q)}</td><td><button class="btn-industrial" data-text="${qSafe}" style="padding:10px 16px;"><i class="fas fa-copy"></i></button></td><td style="padding:20px; color:#ccc;">${escapeHTML(a)}</td><td><button class="btn-industrial" data-text="${aSafe}"><i class="fas fa-copy"></i></button></td></tr>`;
      });
      
      html += '</tbody></table>';
      return html;
    }

    function renderSidebarLayout(data) {
      const keys = data.length ? Object.keys(data[0]) : [];
      
      let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><span>Daftar Item</span><i class="fas fa-list"></i></div><div class="sidebar-list" id="sidebarListContainer">`;
      
      data.forEach((row, idx) => {
        const key = row[keys[0]] || `Item ${idx + 1}`;
        html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-chevron-right"></i>${escapeHTML(key)}</div>`;
      });
      
      html += `</div></div><div class="detail-col" id="detailPanel"><div class="empty-state">Select Item for Details</div></div></div>`;
      return html;
    }

    function initSidebarInteraction(data) {
      const items = document.querySelectorAll('.sidebar-item');
      const detailPanel = document.getElementById('detailPanel');
      
      if (!items.length) return;
      
      function updateDetail(idx) {
        const row = data[idx];
        if (!row) return;
        
        const keys = Object.keys(row);
        const key = row[keys[0]] || '-';
        const val = row[keys[1]] || '-';
        const desc = row[keys[2]] || '-';
        const valEsc = escapeHTML(String(val)).replace(/"/g, '&quot;');
        const descEsc = escapeHTML(String(desc)).replace(/"/g, '&quot;');
        const keyEsc = escapeHTML(String(key)).replace(/"/g, '&quot;');
        
        detailPanel.innerHTML = `
          <div class="detail-content">
            <div class="detail-label">ID / Key</div>
            <div style="font-size:1.1rem;color:#fff;margin-bottom:20px;font-weight:600;">${escapeHTML(key)}</div>
            <div class="detail-label">Detail Value</div>
            <div class="detail-value">${escapeHTML(val)}</div>
            <div class="detail-desc-text">${escapeHTML(desc)}</div>
            <div class="detail-actions">
              <button class="btn-action-secondary" data-key="${keyEsc}" data-val="${valEsc}" data-desc="${descEsc}" id="btnCopyDesc">
                <i class="fas fa-file-alt"></i>
                <span>Copy Description</span>
              </button>
              <button class="btn-action-primary" data-key="${keyEsc}" data-val="${valEsc}" data-desc="${descEsc}" id="btnCopyAll">
                <i class="fas fa-copy"></i>
                <span>Copy All Data</span>
              </button>
            </div>
          </div>
        `;
      }
      
      items.forEach((item) => {
        item.addEventListener('click', () => {
          items.forEach(i => i.classList.remove('active'));
          item.classList.add('active');
          updateDetail(parseInt(item.dataset.index));
        });
      });
      
      if (items[0]) {
        items[0].classList.add('active');
        updateDetail(0);
      }
    }

    // ========== SEARCH ==========
    function filterHandler() {
      const query = searchInput.value.toLowerCase().trim();
      const data = allData[currentSheet] || [];
      
      if (!data.length) return;
      
      if (currentSheet === 'PK_anti_audit') {
        const items = document.querySelectorAll('.sidebar-item');
        let firstVisible = -1;
        
        items.forEach((item, idx) => {
          const row = data[idx];
          const match = Object.values(row).some(v => 
            v && String(v).toLowerCase().includes(query)
          );
          item.style.display = match ? 'flex' : 'none';
          if (match && firstVisible === -1) firstVisible = idx;
        });
        
        const active = document.querySelector('.sidebar-item.active');
        if ((!active || active.style.display === 'none') && firstVisible !== -1) {
          document.querySelector(`.sidebar-item[data-index="${firstVisible}"]`)?.click();
        }
      } else {
        const filtered = data.filter(r => 
          Object.values(r).some(v => v && String(v).toLowerCase().includes(query))
        );
        
        if (filtered.length) {
          tableContainer.innerHTML = currentSheet === 'bonus' 
            ? renderAssetsGrid(filtered) 
            : renderQna(filtered);
        } else {
          tableContainer.innerHTML = '<div style="padding:30px;text-align:center;color:#666;">NO MATCHES FOUND</div>';
        }
      }
    }

    // ========== EVENT LISTENERS ==========
    function setupEventListeners() {
      // Navigation
      document.querySelectorAll('.nav-item').forEach(item => {
        item.addEventListener('click', () => renderSheet(item.dataset.sheet));
      });
      
      // Search
      searchInput.addEventListener('input', filterHandler);
      
      // Refresh
      refreshBtn.addEventListener('click', async () => {
        refreshBtn.classList.add('loading');
        await loadAllSheets();
        refreshBtn.classList.remove('loading');
        showNotification('Data refreshed successfully');
      });
      
      // Copy buttons - delegated
      document.addEventListener('click', async (e) => {
        const btn = e.target.closest('.btn-industrial, .btn-copy-action, .btn-action-primary, .btn-action-secondary');
        if (!btn) return;
        
        let text = '';
        
        // For sidebar detail buttons
        if (btn.id === 'btnCopyDesc') {
          text = btn.dataset.desc || '';
        } else if (btn.id === 'btnCopyAll') {
          const key = btn.dataset.key || '';
          const val = btn.dataset.val || '';
          const desc = btn.dataset.desc || '';
          text = `${key}\n${val}\n${desc}`;
        } else if (btn.dataset.val && btn.dataset.desc) {
          const val = btn.dataset.val;
          const desc = btn.dataset.desc;
          text = desc && desc !== '-' ? `${val} - ${desc}` : val;
        } else if (btn.dataset.text) {
          text = btn.dataset.text;
        } else if (btn.dataset.descOnly) {
          text = btn.dataset.descOnly;
        }
        
        if (text) {
          try {
            await navigator.clipboard.writeText(text);
            btn.classList.add('success');
            showNotification('Data copied to clipboard');
            
            setTimeout(() => btn.classList.remove('success'), 1800);
          } catch (err) {
            console.error('Copy failed:', err);
          }
        }
      });
    }

    // ========== UTILITIES ==========
    function escapeHTML(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ========== START ==========
    init();
  </script>
</body>
</html>
