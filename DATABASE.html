<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>沈 · LINE TOGEL HUB // HYPERDRIVE</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-core: #010101;
      --bg-panel: rgba(5, 8, 18, 0.85);
      --accent-primary: #FF3366;
      --accent-secondary: #FFD600;
      --accent-tertiary: #00F2FF;
      --accent-hot: #FF0066;
      --text-main: #ffffff;
      --text-muted: #b0c4de;
      --glow-primary: rgba(255, 51, 102, 0.7);
      --glow-cyan: rgba(0, 242, 255, 0.6);
      --border-glow: rgba(255, 51, 102, 0.4);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-core);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      font-size: clamp(14px, 4vw, 16px);
      line-height: 1.5;
    }

    /* Particle & Effects */
    #particle-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.35;
    }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 100%);
      pointer-events: none; z-index: 1;
    }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0px, rgba(0,0,0,0.12) 1px, transparent 1px, transparent 4px);
      opacity: 0.3;
    }

    .hazard-bar {
      position: fixed; top: 0; left: 0; width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary), var(--accent-primary));
      background-size: 300% 100%;
      animation: gradientMove 3s linear infinite;
      z-index: 100;
      box-shadow: 0 0 8px var(--glow-primary);
    }

    @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    /* Navigation - Responsive */
    .top-nav {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(2, 4, 12, 0.95);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-glow);
      position: relative;
      z-index: 20;
    }

    .brand-text h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1rem, 5vw, 1.3rem);
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff, var(--accent-secondary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .brand-text span {
      font-size: clamp(0.5rem, 3vw, 0.65rem);
    }

    .nav-menu {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    /* Efek kilat pada menu */
    .nav-item {
      position: relative;
      overflow: hidden;
      padding: 5px 12px;
      font-weight: 600;
      text-transform: uppercase;
      font-size: clamp(0.6rem, 3vw, 0.7rem);
      letter-spacing: 0.5px;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 40px;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(10, 15, 25, 0.6);
      border: 1px solid transparent;
      white-space: nowrap;
    }

    .nav-item i { font-size: 0.7rem; }

    .nav-item.flash::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,51,102,0.7) 100%);
      animation: lightningFlash 0.25s ease-out forwards;
      pointer-events: none;
      border-radius: 40px;
    }

    @keyframes lightningFlash {
      0% { opacity: 1; transform: scale(0.8); }
      100% { opacity: 0; transform: scale(1.2); }
    }

    body.lightning-overlay::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(255, 255, 255, 0.15);
      pointer-events: none;
      z-index: 9999;
      animation: bodyFlash 0.2s ease-out forwards;
    }

    @keyframes bodyFlash {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    .status-box {
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 4px 12px;
      border-radius: 40px;
      font-family: monospace;
      font-size: clamp(0.65rem, 3vw, 0.75rem);
      border: 1px solid var(--border-glow);
      white-space: nowrap;
    }

    /* Main Content */
    .main {
      padding: 16px 12px 130px 12px;
      position: relative;
      z-index: 10;
      max-width: 1400px;
      margin: 0 auto;
    }

    .content-wrapper {
      background: var(--bg-panel);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border-glow);
      box-shadow: 0 10px 25px -10px rgba(0,0,0,0.5);
    }

    .header-row {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .title-main h1 {
      font-family: 'Orbitron', monospace;
      font-size: clamp(1rem, 5vw, 1.4rem);
      letter-spacing: 1px;
      background: linear-gradient(135deg, #fff, var(--accent-tertiary));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .search-box input {
      background: rgba(0,0,0,0.65);
      border: 1px solid var(--border-glow);
      padding: 6px 12px;
      width: 100%;
      min-width: 160px;
      border-radius: 40px;
      color: white;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.75rem;
    }

    .btn-industrial {
      background: rgba(20,20,40,0.8);
      border: 1px solid var(--border-glow);
      padding: 6px 14px;
      border-radius: 40px;
      color: #ddd;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
      font-size: 0.75rem;
      white-space: nowrap;
    }

    /* Table Container - Horizontal Scroll */
    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      width: 100%;
    }

    .qna-table {
      width: 100%;
      border-collapse: collapse;
      font-size: clamp(0.7rem, 3.5vw, 0.85rem);
      min-width: 480px;
    }

    .qna-table th,
    .qna-table td {
      padding: 10px 12px;
    }

    .qna-table th {
      font-size: clamp(0.6rem, 3vw, 0.7rem);
    }

    /* Grid Cards - Responsive */
    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 16px;
    }

    .asset-card {
      background: linear-gradient(145deg, rgba(10, 18, 28, 0.9), rgba(2, 5, 12, 0.95));
      border-radius: 18px;
      transition: all 0.3s ease;
      border: 1px solid rgba(255,51,102,0.2);
    }

    .asset-header {
      padding: 12px 14px;
      font-size: 0.85rem;
    }

    .asset-display {
      margin: 12px;
      padding: 12px;
      font-size: 0.8rem;
      word-break: break-word;
    }

    /* Sidebar Layout - Responsive */
    .layout-split {
      display: flex;
      flex-direction: row;
      gap: 1px;
      background: rgba(0,0,0,0.3);
    }

    .sidebar-col {
      width: 240px;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(8px);
      border-right: 1px solid var(--border-glow);
    }

    .sidebar-header {
      padding: 12px 16px;
      font-size: 0.85rem;
    }

    .sidebar-item {
      padding: 8px 14px;
      font-size: 0.8rem;
      word-break: break-word;
    }

    .detail-col {
      flex: 1;
      padding: 16px;
    }

    .detail-content {
      padding: 16px;
      word-break: break-word;
      font-size: 0.85rem;
    }

    /* Empty state */
    .empty-state {
      padding: 30px 16px;
      text-align: center;
      font-size: 0.85rem;
    }

    /* Notifications */
    #notif-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 10000;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .toast-notification {
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(16px);
      border-left: 4px solid var(--accent-primary);
      padding: 10px 20px;
      border-radius: 12px;
      font-family: monospace;
      font-size: 0.8rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.4);
      animation: slideInRight 0.25s ease;
    }

    .toast-notification i {
      font-size: 1rem;
      color: var(--accent-primary);
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* Loader */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
      transition: 0.5s;
    }

    .loader-bar-container {
      width: 200px;
      height: 2px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    /* ========= ROAD & MOVING CARS (DIPERBESAR) ========= */
    .animation-layer {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 130px;
      pointer-events: none;
      z-index: 50;
      background: linear-gradient(to top, #010101 0%, #010101 70%, transparent 100%);
    }

    .road-container {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 85px;
      background: linear-gradient(180deg, #0a0a0a 0%, #030303 100%);
      border-top: 2px solid rgba(255,51,102,0.7);
      box-shadow: 0 -5px 20px rgba(255,51,102,0.2);
    }

    .road-edge-left, .road-edge-right {
      width: 5px;
      background: linear-gradient(180deg, var(--accent-primary), var(--accent-tertiary));
      box-shadow: 0 0 15px var(--glow-primary);
    }
    .road-edge-left { left: 3%; }
    .road-edge-right { right: 3%; }

    .road-lines {
      top: 38px;
      height: 4px;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 60px, var(--accent-primary) 60px, var(--accent-primary) 110px);
      animation: slideRoad 0.8s linear infinite;
      filter: drop-shadow(0 0 4px var(--accent-primary));
    }

    @keyframes slideRoad {
      0% { transform: translateX(0); }
      100% { transform: translateX(-110px); }
    }

    .road-reflection {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 20px;
      background: linear-gradient(180deg, transparent, rgba(255,51,102,0.1));
    }

    .cyber-car {
      position: absolute;
      bottom: 20px;
      width: 200px;
      height: 75px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.9));
    }
    .car-cruiser {
      right: -220px;
      animation: driveLeft 14s linear infinite;
    }
    .car-interceptor {
      left: -220px;
      animation: driveRight 12s linear infinite;
      transform: scaleX(-1);
    }

    @keyframes driveLeft {
      0% { transform: translateX(0); }
      100% { transform: translateX(calc(-100vw - 280px)); }
    }
    @keyframes driveRight {
      0% { transform: translateX(0) scaleX(-1); }
      100% { transform: translateX(calc(100vw + 280px)) scaleX(-1); }
    }

    .car-underglow {
      bottom: -8px;
      left: 15%;
      width: 70%;
      height: 14px;
      border-radius: 50%;
      animation: underglowPulse 0.6s ease-in-out infinite alternate;
    }
    .underglow-pink { background: radial-gradient(ellipse, rgba(255,51,102,0.8) 0%, transparent 70%); box-shadow: 0 0 30px 8px rgba(255,51,102,0.5); }
    .underglow-cyan { background: radial-gradient(ellipse, rgba(0,242,255,0.8) 0%, transparent 70%); box-shadow: 0 0 30px 8px rgba(0,242,255,0.5); }

    @keyframes underglowPulse {
      0% { opacity: 0.6; transform: scaleX(0.95); }
      100% { opacity: 1; transform: scaleX(1.05); }
    }

    .exhaust-flame {
      position: absolute;
      bottom: 32px;
      width: 35px;
      height: 10px;
      background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary), transparent);
      filter: blur(3px);
      animation: flameFlicker 0.12s infinite alternate;
      border-radius: 0 50% 50% 0;
    }
    .flame-rear-left { left: -28px; }
    .flame-rear-right { left: -28px; bottom: 22px; }

    @keyframes flameFlicker {
      0% { transform: scaleX(0.8); opacity: 0.7; }
      100% { transform: scaleX(1.3); opacity: 1; }
    }

    .wheel {
      position: absolute;
      bottom: -4px;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      animation: wheelSpin 0.2s linear infinite;
    }
    .wheel-hd {
      background: radial-gradient(circle at 30% 30%, #444 0%, #111 80%);
      border: 2px solid #333;
      box-shadow: 0 0 10px rgba(0,0,0,0.8);
    }
    @keyframes wheelSpin { to { transform: rotate(360deg); } }

    /* Responsive */
    @media (max-width: 768px) {
      .top-nav { flex-direction: column; align-items: stretch; }
      .nav-menu { justify-content: center; }
      .status-box { align-self: flex-end; }
      .header-row { flex-direction: column; align-items: stretch; }
      .assets-grid { grid-template-columns: 1fr; }
      .layout-split { flex-direction: column; }
      .sidebar-col { width: 100%; border-right: none; border-bottom: 1px solid var(--border-glow); }
      .main { padding-bottom: 140px; }
      .animation-layer { height: 110px; }
      .road-container { height: 70px; }
      .road-lines { top: 32px; height: 3px; }
      .cyber-car { width: 160px; height: 60px; bottom: 14px; }
      .wheel { width: 18px; height: 18px; }
      .exhaust-flame { width: 28px; height: 8px; bottom: 26px; }
    }

    @media (max-width: 480px) {
      .nav-item span { display: none; }
      .nav-item { padding: 6px 10px; }
      .brand-text h1 { font-size: 0.9rem; }
      .status-box { font-size: 0.6rem; }
      .main { padding-bottom: 120px; }
      .animation-layer { height: 90px; }
      .road-container { height: 55px; }
      .road-lines { top: 25px; height: 2px; }
      .cyber-car { width: 130px; height: 50px; bottom: 10px; }
      .wheel { width: 14px; height: 14px; }
      .exhaust-flame { width: 22px; height: 6px; bottom: 22px; }
      .car-underglow { height: 10px; }
    }
  </style>
</head>

        <circle cx="162" cy="56" r="6" fill="#111" stroke="#222" stroke-width="1.5"/>
      </svg>
      <div class="car-underglow underglow-cyan"></div>
      <div class="exhaust-flame flame-rear-left" style="background:linear-gradient(90deg,#00F2FF,#FF3366,transparent);"></div>
      <div class="wheel wheel-hd" style="left:24px;"></div>
      <div class="wheel wheel-hd" style="right:24px;"></div>
    </div>
  </div>

  <script>
    // Particle system
    const canvas = document.getElementById('particle-canvas');
    const ctxP = canvas.getContext('2d');
    let particles = [];
    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initParticles() {
      particles = [];
      for (let i = 0; i < 50; i++) {
        particles.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          r: Math.random() * 1.5 + 0.5, alpha: Math.random() * 0.3 + 0.1,
          speedX: (Math.random() - 0.5) * 0.15, speedY: (Math.random() - 0.5) * 0.15,
          color: `hsl(${Math.random() * 40 + 320}, 75%, 55%)`
        });
      }
    }
    function drawParticles() {
      if (!ctxP) return;
      ctxP.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        ctxP.beginPath(); ctxP.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctxP.fillStyle = p.color; ctxP.globalAlpha = p.alpha; ctxP.fill();
        p.x += p.speedX; p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      }
      requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    resizeCanvas(); initParticles(); drawParticles();

    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
    setInterval(updateClock, 1000); updateClock();
    setInterval(() => { document.getElementById('hud-ping').innerText = Math.floor(Math.random() * 15 + 12) + 'ms'; }, 4000);

    // Spreadsheet logic
    const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
    const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
    const COPY_COL_C_SHEETS = ['PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
    let allData = {};
    let currentSheet = 'bonus';

    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        if (!json.table?.rows) return [];
        const cols = json.table.cols || [];
        const headers = cols.map(col => col.label || `col_${col.id}`);
        return json.table.rows.map(row => {
          const obj = {};
          row.c?.forEach((cell, idx) => { obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null; });
          return obj;
        });
      } catch(e) { console.error(e); return []; }
    }

    async function loadAllSheets() {
      let progress = 0;
      const step = 100 / SHEET_NAMES.length;
      const loaderTitle = document.getElementById('loader-title-text');
      const loaderBar = document.getElementById('loaderBar');
      const loadStatus = document.getElementById('load-status');
      for (const name of SHEET_NAMES) {
        loaderTitle.innerText = name.toUpperCase();
        loadStatus.innerText = `Fetching ${name}...`;
        allData[name] = await fetchSheet(name);
        progress += step;
        loaderBar.style.width = `${Math.min(progress, 100)}%`;
        await new Promise(r => setTimeout(r, 40));
      }
      loaderTitle.innerText = 'READY';
      loadStatus.innerText = 'System Online';
      loaderBar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 400);
        renderSheet(currentSheet);
      }, 300);
    }

    function escapeHTML(str) { if (!str) return ''; return String(str).replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' })[m] || m); }
    
    // NOTIFICATION UNTUK COPY
    function showCopyNotification() {
      const container = document.getElementById('notif-container');
      const toast = document.createElement('div');
      toast.className = 'toast-notification';
      toast.innerHTML = `<i class="fas fa-copy"></i> ✅ Data tersalin!`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function showRefreshNotification() {
      const container = document.getElementById('notif-container');
      const toast = document.createElement('div');
      toast.className = 'toast-notification';
      toast.innerHTML = `<i class="fas fa-sync-alt"></i> ⟳ Memuat ulang data...`;
      container.appendChild(toast);
      setTimeout(() => toast.remove(), 2000);
    }

    function renderEmptyState() { return `<div class="empty-state"><i class="fas fa-database" style="font-size:2rem; color:#FF3366; opacity:0.5;"></i><div>No data</div></div>`; }
    function renderAssetsGrid(data) {
      if (!data.length) return renderEmptyState();
      let html = '<div class="assets-grid">';
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const title = row[keys[0]] || '-';
        const value = row[keys[1]] || '-';
        const desc = row[keys[2]] || '-';
        html += `<div class="asset-card"><div class="asset-header"><span>${escapeHTML(title)}</span><i class="fas fa-crown" style="color:#FFD600;"></i></div><div class="asset-display">${escapeHTML(value)}</div><div style="padding:0 12px 10px; font-size:0.75rem;">${escapeHTML(desc)}</div><div style="padding:0 12px 14px;"><button class="btn-copy-action" data-val="${escapeHTML(value)}" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy</button></div></div>`;
      });
      html += '</div>'; return html;
    }
    function renderQna(data) {
      if (!data.length) return renderEmptyState();
      const keys = Object.keys(data[0]);
      const colA = keys[0], colB = keys[1], colC = keys[2] || null;
      const onlyColC = COPY_COL_C_SHEETS.includes(currentSheet);
      let html = '<table class="qna-table"><thead><tr>';
      html += `<th>${escapeHTML(colA)}</th>${colC ? `<th>${escapeHTML(colB)}</th><th>${escapeHTML(colC)}</th>` : `<th>${escapeHTML(colB)}</th>`}<th>Copy</th></tr></thead><tbody>`;
      data.forEach(row => {
        const v1 = row[keys[0]] || '', v2 = row[keys[1]] || '', v3 = colC ? (row[keys[2]] || '') : '';
        let copyText = onlyColC ? (v3 || v2 || v1) : [v1, v2, v3].filter(Boolean).join(' — ');
        html += `<tr><td>${escapeHTML(v1)}</td>${colC ? `<td>${escapeHTML(v2)}</td><td>${escapeHTML(v3)}</td>` : `<td>${escapeHTML(v2)}<td>`}<td class="col-action"><button class="copy-trigger" data-text="${escapeHTML(copyText)}"><i class="fas fa-copy"></i></button></td></tr>`;
      });
      html += '</tbody></table>'; return html;
    }
    function renderSidebarLayout(data) {
      if (!data.length) return renderEmptyState();
      const keys = Object.keys(data[0]);
      let html = `<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-list"></i> Index</div><div class="sidebar-list">`;
      data.forEach((row, idx) => { html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-caret-right"></i> ${escapeHTML(row[keys[0]] || `Item ${idx+1}`)}</div>`; });
      html += `</div></div><div class="detail-col" id="detailPanel"><div class="detail-content"><i class="fas fa-info-circle"></i> Pilih item</div></div></div>`;
      return html;
    }
    function renderSheet(sheetName) {
      currentSheet = sheetName;
      document.getElementById('pageTitle').innerHTML = sheetName.toUpperCase().replace(/_/g, ' ');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.sheet === sheetName));
      document.getElementById('searchInput').value = '';
      const data = allData[sheetName] || [];
      const container = document.getElementById('tableContainer');
      if (sheetName === 'bonus') container.innerHTML = renderAssetsGrid(data);
      else if (sheetName === 'PK_anti_audit') {
        container.innerHTML = renderSidebarLayout(data);
        setTimeout(() => {
          const items = document.querySelectorAll('.sidebar-item');
          const panel = document.getElementById('detailPanel');
          if (!items.length) return;
          const update = (idx) => {
            const row = data[idx], keys = Object.keys(row);
            const title = row[keys[0]] || '-', desc = row[keys[2]] || row[keys[1]] || '-';
            panel.innerHTML = `<div class="detail-content"><div style="color:#FF3366;">📌 ${escapeHTML(title)}</div><div style="margin-top:10px; background:#00000040; padding:12px; border-radius:12px; font-size:0.8rem;">${escapeHTML(desc)}</div><button class="btn-copy-desc copy-full-desc" data-desc="${escapeHTML(desc)}" style="margin-top:14px; width:100%; padding:6px; background:#FF336610; border:none; border-radius:40px; color:#FF3366; font-size:0.75rem;"><i class="fas fa-copy"></i> Copy Deskripsi</button></div>`;
          };
          items.forEach(item => item.addEventListener('click', () => { items.forEach(i => i.classList.remove('active')); item.classList.add('active'); update(parseInt(item.dataset.index)); }));
          if (items[0]) { items[0].classList.add('active'); update(0); }
        }, 60);
      } else container.innerHTML = renderQna(data);
    }
    function handleSearch() {
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const data = allData[currentSheet] || [];
      if (!data.length) return;
      if (currentSheet === 'PK_anti_audit') {
        const items = document.querySelectorAll('.sidebar-item');
        let first = -1;
        items.forEach((item, idx) => { const match = Object.values(data[idx]).some(v => v && String(v).toLowerCase().includes(q)); item.style.display = match ? 'flex' : 'none'; if(match && first === -1) first = idx; });
        const active = document.querySelector('.sidebar-item.active');
        if((!active || active.style.display === 'none') && first !== -1) document.querySelector(`.sidebar-item[data-index="${first}"]`)?.click();
      } else if (currentSheet === 'bonus') document.getElementById('tableContainer').innerHTML = renderAssetsGrid(data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))));
      else document.getElementById('tableContainer').innerHTML = renderQna(data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(q))));
    }

    // Efek kilat menu
    function addLightningFlash(element) {
      if (!element) return;
      element.classList.add('flash');
      document.body.classList.add('lightning-overlay');
      setTimeout(() => {
        element.classList.remove('flash');
        document.body.classList.remove('lightning-overlay');
      }, 250);
    }

    // Event listener untuk menu dengan kilat
    document.querySelectorAll('.nav-item').forEach(item => {
      const handler = () => {
        addLightningFlash(item);
        renderSheet(item.dataset.sheet);
      };
      item.removeEventListener('click', item._flashHandler);
      item._flashHandler = handler;
      item.addEventListener('click', handler);
    });

    // Refresh dengan notifikasi
    const refreshBtn = document.getElementById('refreshBtn');
    refreshBtn.addEventListener('click', () => {
      addLightningFlash(refreshBtn);
      loadAllSheets();
      showRefreshNotification();
    });

    // COPY HANDLER GLOBAL dengan notifikasi
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-copy-action, .copy-trigger, .btn-copy-desc');
      if (!btn) return;
      let text = '';
      if (btn.dataset.val && btn.dataset.desc) {
        text = `${btn.dataset.val} — ${btn.dataset.desc}`;
      } else if (btn.dataset.text) {
        text = btn.dataset.text;
      } else if (btn.dataset.desc) {
        text = btn.dataset.desc;
      }
      if (text) {
        e.preventDefault();
        await navigator.clipboard.writeText(text);
        showCopyNotification();
        btn.style.transform = 'scale(0.95)';
        setTimeout(() => { if (btn) btn.style.transform = ''; }, 150);
      }
    });

    document.getElementById('searchInput').addEventListener('input', handleSearch);
    loadAllSheets();
  </script>
</body>
</html>
