<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>沈 · LINE TOGEL HUB // HYPERDRIVE EDITION</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=IBM+Plex+Mono:wght@400;600&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-core: #010101;
      --bg-panel: rgba(5, 8, 18, 0.75);
      --accent-primary: #FF3366;
      --accent-secondary: #FFD600;
      --accent-tertiary: #00F2FF;
      --accent-hot: #FF0066;
      --text-main: #ffffff;
      --text-muted: #8a9bb0;
      --glow-primary: rgba(255, 51, 102, 0.7);
      --glow-cyan: rgba(0, 242, 255, 0.6);
    }

    body {
      font-family: 'Rajdhani', sans-serif;
      background-color: var(--bg-core);
      color: var(--text-main);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
      font-size: 15px;
    }

    #particle-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0; opacity: 0.5;
    }

    body::before {
      content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      opacity: 0.05; pointer-events: none; z-index: 9999;
    }

    .scanlines {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 2px, transparent 2px, transparent 6px);
      opacity: 0.25;
    }

    .scan-sweep {
      position: fixed; top: 0; left: 0; width: 100%; height: 8px;
      background: linear-gradient(90deg, transparent, var(--accent-primary), var(--accent-tertiary), transparent);
      filter: blur(3px); animation: sweep 8s ease-in-out infinite; z-index: 9997; pointer-events: none;
    }

    @keyframes sweep {
      0% { top: -10%; opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.8; } 100% { top: 110%; opacity: 0; }
    }

    .vignette {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.85) 100%);
      pointer-events: none; z-index: 1;
    }

    #mouse-glow {
      position: fixed; width: 100%; height: 100%; pointer-events: none; z-index: 2;
      background: radial-gradient(circle 500px at var(--x, 50%) var(--y, 50%), rgba(255,51,102,0.08), transparent 70%);
      transition: 0.05s linear;
    }

    .perspective-grid {
      position: fixed; bottom: 0; left: 0; width: 200%; height: 60vh;
      background-image: linear-gradient(transparent 97%, rgba(255,51,102,0.2) 97%), linear-gradient(90deg, transparent 97%, rgba(0,242,255,0.2) 97%);
      background-size: 80px 80px;
      transform: perspective(600px) rotateX(70deg) translateZ(-150px) translateY(80px) translateX(-20%);
      animation: gridMove 25s linear infinite;
      mask-image: linear-gradient(to top, black 0%, transparent 80%); z-index: 0;
    }

    @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 80px; } }

    .hazard-bar {
      position: fixed; top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary), var(--accent-tertiary), var(--accent-primary));
      background-size: 300% 100%; animation: gradientMove 3s linear infinite; z-index: 100;
      box-shadow: 0 0 15px var(--glow-primary);
    }

    @keyframes gradientMove { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }

    .top-nav {
      height: 80px; background: rgba(8,12,22,0.85); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,51,102,0.3);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 35px; position: relative; z-index: 20;
      box-shadow: 0 5px 20px rgba(0,0,0,0.5);
    }

    .brand { display: flex; align-items: center; gap: 20px; }

    .logo-box {
      width: 52px; height: 52px;
      background: linear-gradient(135deg, rgba(255,51,102,0.2), rgba(0,242,255,0.1));
      border: 1px solid var(--accent-primary); border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; color: var(--accent-primary);
      box-shadow: 0 0 15px var(--glow-primary); transition: all 0.3s;
    }

    .brand:hover .logo-box {
      transform: scale(1.05); box-shadow: 0 0 30px var(--glow-primary);
      background: var(--accent-primary); color: black;
    }

    .brand-text h1 {
      font-family: 'Orbitron', sans-serif; font-size: 1.6rem; letter-spacing: 5px;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .brand-text span { font-family: monospace; font-size: 0.65rem; color: var(--accent-tertiary); letter-spacing: 2px; }

    .nav-menu { display: flex; gap: 12px; flex-wrap: wrap; }

    .nav-item {
      padding: 10px 20px; font-weight: 600; text-transform: uppercase;
      font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted);
      cursor: pointer; border-radius: 6px; transition: 0.2s;
      display: flex; align-items: center; gap: 8px; border: 1px solid transparent;
    }

    .nav-item i { font-size: 0.9rem; }

    .nav-item:hover {
      color: var(--accent-secondary); border-color: rgba(255,214,0,0.4);
      background: rgba(255,214,0,0.05); transform: translateY(-2px);
    }

    .nav-item.active {
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-hot));
      color: white; border: none; box-shadow: 0 0 20px var(--glow-primary);
    }

    .status-box {
      background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 8px 20px;
      border-radius: 30px; font-family: monospace; display: flex; align-items: center; gap: 12px;
      border: 1px solid rgba(255,51,102,0.4);
    }

    .status-indicator {
      width: 10px; height: 10px; background: #0f0; border-radius: 50%;
      box-shadow: 0 0 12px #0f0; animation: pulse 1.2s infinite;
    }

    @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(1.2); } }

    .main {
      flex: 1; padding: 30px; padding-bottom: 150px; position: relative; z-index: 10;
    }

    .content-wrapper {
      background: var(--bg-panel); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,51,102,0.3); border-radius: 20px; overflow: hidden;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05) inset;
      transition: box-shadow 0.3s;
    }

    .content-wrapper:hover {
      box-shadow: 0 20px 50px rgba(255,51,102,0.15), 0 0 0 1px rgba(255,51,102,0.5) inset;
    }

    .tech-corner { position: absolute; width: 25px; height: 25px; z-index: 15; }
    .tc-tl { top:0; left:0; border-top:3px solid var(--accent-primary); border-left:3px solid var(--accent-primary); box-shadow:-2px -2px 8px var(--glow-primary); }
    .tc-tr { top:0; right:0; border-top:3px solid var(--accent-primary); border-right:3px solid var(--accent-primary); box-shadow:2px -2px 8px var(--glow-primary); }
    .tc-bl { bottom:0; left:0; border-bottom:3px solid var(--accent-primary); border-left:3px solid var(--accent-primary); box-shadow:-2px 2px 8px var(--glow-primary); }
    .tc-br { bottom:0; right:0; border-bottom:3px solid var(--accent-primary); border-right:3px solid var(--accent-primary); box-shadow:2px 2px 8px var(--glow-primary); }

    .corner-deco {
      position: absolute; top: 0; right: 0;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-tertiary));
      color: black; font-weight: 800; padding: 6px 24px; font-size: 0.7rem; letter-spacing: 2px;
      clip-path: polygon(20px 0%, 100% 0%, 100% 100%, 0% 100%); z-index: 12;
      box-shadow: -5px 5px 15px rgba(0,0,0,0.3);
    }

    .header-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 20px 28px; border-bottom: 1px solid rgba(255,255,255,0.05);
      background: linear-gradient(180deg, rgba(0,0,0,0.4), transparent);
    }

    .title-badge {
      border: 1px solid var(--accent-primary); padding: 5px 15px;
      font-size: 0.7rem; font-family: monospace; color: var(--accent-primary);
      border-radius: 30px; backdrop-filter: blur(4px);
    }

    .title-main h1 {
      font-family: 'Orbitron', sans-serif; font-size: 1.8rem; letter-spacing: 3px;
      background: linear-gradient(135deg, #fff, var(--accent-secondary));
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }

    .search-box input {
      background: rgba(0,0,0,0.6); border: 1px solid rgba(255,51,102,0.4);
      padding: 12px 18px; width: 280px; border-radius: 40px;
      color: white; font-family: monospace; transition: 0.2s;
    }

    .search-box input:focus { outline: none; border-color: var(--accent-primary); box-shadow: 0 0 20px var(--glow-primary); }

    .btn-industrial {
      background: rgba(20,20,40,0.7); border: 1px solid rgba(255,51,102,0.5);
      padding: 12px 22px; border-radius: 40px; color: #ddd; font-weight: bold;
      cursor: pointer; transition: 0.2s; display: inline-flex; gap: 10px; backdrop-filter: blur(5px);
    }

    .btn-industrial:hover {
      border-color: var(--accent-primary); color: var(--accent-primary);
      transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255,51,102,0.2);
    }

    /* Asset Cards */
    .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding: 20px; }

    .asset-card {
      background: linear-gradient(145deg, rgba(15,20,35,0.8), rgba(5,8,18,0.9));
      border: none; border-radius: 20px; backdrop-filter: blur(4px);
      transition: all 0.4s cubic-bezier(0.2,0.9,0.4,1.1); overflow: hidden;
      animation: fadeInUp 0.5s ease forwards; opacity: 0; transform: translateY(20px);
    }

    @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

    .asset-card:hover { transform: translateY(-10px) scale(1.02); box-shadow: 0 20px 35px rgba(255,51,102,0.25); }

    .asset-header {
      position: relative; padding: 18px 20px; background: rgba(0,0,0,0.5);
      border-bottom: none; display: flex; justify-content: space-between; align-items: center;
    }

    .asset-header::after { display: none; }

    .asset-id-badge { font-family: monospace; color: var(--accent-secondary); border-left: none; padding-left: 0; }

    .asset-status {
      width: 8px; height: 8px; background: var(--accent-primary); border-radius: 50%;
      box-shadow: 0 0 12px var(--glow-primary); animation: pulse 1s infinite;
    }

    .asset-display {
      margin: 20px; background: rgba(0,0,0,0.4); border-radius: 16px;
      padding: 20px; text-align: center; border: none;
    }

    .asset-value { font-family: monospace; font-size: 1rem; color: #fff; word-break: break-word; }

    .btn-copy-action {
      width: 100%; background: transparent; border: none; outline: none;
      border-radius: 40px; padding: 12px; color: var(--accent-primary);
      font-weight: bold; cursor: pointer; transition: 0.2s; margin-top: 10px; box-shadow: none;
    }

    .btn-copy-action:hover { background: var(--accent-primary); color: black; box-shadow: 0 0 20px var(--glow-primary); }

    /* Sidebar Layout */
    .layout-split { display: flex; gap: 2px; background: transparent; }

    .sidebar-col {
      width: 280px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,51,102,0.2);
    }

    .sidebar-header {
      padding: 18px; background: rgba(0,0,0,0.6); color: var(--accent-primary);
      font-weight: bold; border-bottom: 1px solid rgba(255,51,102,0.3);
    }

    .sidebar-item {
      padding: 14px 20px; cursor: pointer; color: #aaa;
      border-left: 3px solid transparent; transition: 0.2s;
      display: flex; gap: 12px; align-items: center;
    }

    .sidebar-item:hover { background: rgba(255,51,102,0.1); color: white; }

    .sidebar-item.active {
      background: rgba(255,51,102,0.2); border-left-color: var(--accent-primary); color: var(--accent-secondary);
    }

    .detail-col { flex: 1; padding: 25px; }

    .detail-content {
      background: rgba(0,0,0,0.5); border-radius: 20px; padding: 25px;
      border: 1px solid rgba(255,51,102,0.3);
    }

    .btn-copy-desc {
      width: 100%; background: transparent; border: none; outline: none;
      border-radius: 40px; padding: 12px; color: var(--accent-primary);
      margin-top: 20px; cursor: pointer; box-shadow: none;
    }

    .btn-copy-desc:hover { background: var(--accent-primary); color: black; box-shadow: 0 0 20px var(--glow-primary); }

    /* QNA Table */
    .qna-table { width: 100%; border-collapse: collapse; }

    .qna-table thead { position: sticky; top: 0; z-index: 5; }

    .qna-table th {
      text-align: left; padding: 16px 20px; color: var(--accent-tertiary);
      font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem;
      letter-spacing: 1.5px; text-transform: uppercase;
      background: rgba(0,10,20,0.95); backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,242,255,0.25);
    }

    .qna-table td {
      padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.04);
      color: #ccc; font-size: 0.92rem; line-height: 1.6; vertical-align: top;
    }

    .qna-table tbody tr { transition: background 0.2s; }
    .qna-table tbody tr:hover { background: rgba(255,51,102,0.06); }
    .qna-table tbody tr:hover td { color: #fff; }

    .qna-table .col-no {
      width: 50px; text-align: center; color: rgba(255,51,102,0.5);
      font-family: monospace; font-size: 0.8rem;
    }

    .qna-table .col-action { width: 60px; text-align: center; }

    .qna-table .col-action button {
      background: rgba(255,51,102,0.1); border: none; color: var(--accent-primary);
      width: 34px; height: 34px; border-radius: 8px; cursor: pointer; transition: 0.2s;
      display: inline-flex; align-items: center; justify-content: center;
    }

    .qna-table .col-action button:hover {
      background: var(--accent-primary); color: black; box-shadow: 0 0 12px var(--glow-primary);
    }

    /* Copy flash animation */
    .copy-flash {
      animation: copyFlash 0.4s ease;
    }

    @keyframes copyFlash {
      0% { box-shadow: 0 0 0 0 rgba(255,51,102,0.6); }
      50% { box-shadow: 0 0 20px 4px rgba(255,51,102,0.4); }
      100% { box-shadow: 0 0 0 0 rgba(255,51,102,0); }
    }

    /* Empty State */
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; }

    .holo-cube-wrapper { width: 140px; height: 140px; perspective: 800px; margin-bottom: 30px; }

    .holo-cube {
      width: 100%; height: 100%; position: relative;
      transform-style: preserve-3d; animation: rotateCube 12s infinite linear;
    }

    .holo-face {
      position: absolute; width: 140px; height: 140px;
      border: 1px solid var(--accent-primary); background: rgba(255,51,102,0.05);
      box-shadow: 0 0 15px rgba(255,51,102,0.2);
    }

    .face-front { transform: translateZ(70px); }
    .face-back { transform: rotateY(180deg) translateZ(70px); }
    .face-right { transform: rotateY(90deg) translateZ(70px); }
    .face-left { transform: rotateY(-90deg) translateZ(70px); }
    .face-top { transform: rotateX(90deg) translateZ(70px); }
    .face-bottom { transform: rotateX(-90deg) translateZ(70px); }

    @keyframes rotateCube { 0% { transform: rotateX(-20deg) rotateY(0deg); } 100% { transform: rotateX(-20deg) rotateY(360deg); } }

    /* Road */
    .animation-layer {
      position: fixed; bottom: 0; left: 0; width: 100%; height: 140px;
      pointer-events: none; z-index: 50;
      background: linear-gradient(to top, #010101 0%, #010101 60%, transparent 100%);
    }

    .road-container {
      position: absolute; bottom: 0; width: 100%; height: 70px;
      background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
      border-top: 2px solid rgba(255,51,102,0.6);
      box-shadow: 0 -5px 30px rgba(255,51,102,0.3);
    }

    .road-edge-left, .road-edge-right {
      position: absolute; top: 0; width: 4px; height: 100%;
      background: linear-gradient(180deg, var(--accent-primary), var(--accent-tertiary));
      box-shadow: 0 0 20px var(--glow-primary);
    }
    .road-edge-left { left: 5%; }
    .road-edge-right { right: 5%; }

    .road-lines {
      position: absolute; top: 34px; width: 200%; height: 3px;
      background: repeating-linear-gradient(90deg, transparent 0px, transparent 50px, var(--accent-primary) 50px, var(--accent-primary) 100px);
      animation: slideRoad 0.8s linear infinite; filter: drop-shadow(0 0 8px var(--accent-primary));
    }

    @keyframes slideRoad { 0% { transform: translateX(0); } 100% { transform: translateX(-100px); } }

    .road-reflection {
      position: absolute; bottom: 0; width: 100%; height: 30px;
      background: linear-gradient(180deg, transparent, rgba(255,51,102,0.1)); opacity: 0.5;
    }

    .cyber-car { position: absolute; bottom: 20px; width: 180px; height: 70px; }
    .car-cruiser { right: -200px; animation: driveLeft 18s linear infinite; }
    .car-interceptor { left: -200px; animation: driveRight 15s linear infinite; transform: scaleX(-1); }

    @keyframes driveLeft { 0% { transform: translateX(0); } 100% { transform: translateX(calc(-100vw - 250px)); } }
    @keyframes driveRight { 0% { transform: translateX(0) scaleX(-1); } 100% { transform: translateX(calc(100vw + 250px)) scaleX(-1); } }

    .car-underglow {
      position: absolute; bottom: -8px; left: 10%; width: 80%; height: 15px;
      border-radius: 50%; animation: underglowPulse 0.5s ease-in-out infinite alternate;
    }

    .underglow-pink { background: radial-gradient(ellipse, rgba(255,51,102,0.8) 0%, transparent 70%); box-shadow: 0 0 30px 10px rgba(255,51,102,0.6); }
    .underglow-cyan { background: radial-gradient(ellipse, rgba(0,242,255,0.8) 0%, transparent 70%); box-shadow: 0 0 30px 10px rgba(0,242,255,0.6); }

    @keyframes underglowPulse { 0% { opacity: 0.7; transform: scaleX(0.95); } 100% { opacity: 1; transform: scaleX(1.05); } }

    .headlight-beam { position: absolute; top: 50%; width: 200px; height: 20px; transform: translateY(-50%); opacity: 0.6; filter: blur(8px); }
    .beam-left { left: -180px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4)); clip-path: polygon(100% 30%, 0% 0%, 0% 100%, 100% 70%); }
    .beam-right { right: -180px; left: auto; background: linear-gradient(270deg, transparent, rgba(255,255,255,0.4)); clip-path: polygon(0% 30%, 100% 0%, 100% 100%, 0% 70%); transform: translateY(-50%) scaleX(-1); }

    .exhaust-flame {
      position: absolute; bottom: 25px; width: 25px; height: 8px;
      background: linear-gradient(90deg, var(--accent-secondary), var(--accent-primary), transparent);
      filter: blur(2px); animation: flameFlicker 0.1s infinite alternate; border-radius: 0 50% 50% 0;
    }

    .flame-rear-left { left: -20px; }
    .flame-rear-right { left: -20px; bottom: 20px; }

    @keyframes flameFlicker { 0% { transform: scaleX(0.8); opacity: 0.7; } 100% { transform: scaleX(1.2); opacity: 1; } }

    .speed-lines { position: absolute; top: 50%; transform: translateY(-50%); width: 60px; height: 30px; }
    .speed-lines-left { left: -70px; }

    .speed-line {
      position: absolute; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      animation: speedLineMove 0.3s linear infinite;
    }

    @keyframes speedLineMove { 0% { transform: translateX(-20px); opacity: 0; } 50% { opacity: 1; } 100% { transform: translateX(-60px); opacity: 0; } }

    .wheel { position: absolute; bottom: -4px; width: 18px; height: 18px; border-radius: 50%; animation: wheelSpin 0.15s linear infinite; }
    .wheel-hd { background: radial-gradient(circle at 30% 30%, #333 0%, #111 50%, #000 100%); border: 3px solid #222; box-shadow: 0 0 10px rgba(0,0,0,0.8), inset 0 0 8px rgba(255,255,255,0.1); }
    .wheel-rim { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 10px; height: 10px; border-radius: 50%; background: linear-gradient(135deg, #444, #111); border: 1px solid #333; }
    @keyframes wheelSpin { to { transform: rotate(360deg); } }

    /* Toast */
    #notif-container { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }

    .toast-notification {
      background: rgba(0,0,0,0.85); backdrop-filter: blur(15px);
      border-left: 4px solid var(--accent-primary); padding: 14px 22px;
      color: white; border-radius: 12px; font-family: monospace; animation: slideInRight 0.3s ease;
    }

    @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* Loader */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: black; z-index: 99999; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 20px; transition: 0.6s;
    }

    .loader-title { font-family: 'Orbitron', monospace; font-size: 2rem; color: var(--accent-primary); text-shadow: 0 0 20px var(--glow-primary); }
    .loader-bar-container { width: 300px; height: 3px; background: #222; }

  <script>
    /* ========== PARTICLES ========== */
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    const particleCount = 120;

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

    function createParticles() {
      particles = [];
      for (let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 1, alpha: Math.random() * 0.4 + 0.1,
          speedX: (Math.random() - 0.5) * 0.2, speedY: (Math.random() - 0.5) * 0.2,
          color: `hsl(${Math.random() * 60 + 330}, 80%, 60%)`
        });
      }
    }

    function drawParticles() {
      if (!ctx) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let p of particles) {
        ctx.beginPath(); ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fillStyle = p.color; ctx.globalAlpha = p.alpha; ctx.fill();
        p.x += p.speedX; p.y += p.speedY;
        if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      }
      requestAnimationFrame(drawParticles);
    }

    window.addEventListener('resize', () => { resizeCanvas(); createParticles(); });
    resizeCanvas(); createParticles(); drawParticles();

    /* ========== MOUSE GLOW ========== */
    const mouseGlow = document.getElementById('mouse-glow');
    document.addEventListener('mousemove', (e) => {
      mouseGlow.style.setProperty('--x', e.clientX + 'px');
      mouseGlow.style.setProperty('--y', e.clientY + 'px');
    });

    /* ========== CLOCK & PING ========== */
    function updateClock() { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }
    setInterval(updateClock, 1000); updateClock();
    setInterval(() => { document.getElementById('hud-ping').innerText = Math.floor(Math.random() * 20 + 15) + 'ms'; }, 3000);

    /* ========== SHEETS CONFIG ========== */
    const SPREADSHEET_ID = '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c';
    const SHEET_NAMES = ['bonus', 'PK_anti_audit', 'PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
    // Sheet yang tombol copy-nya hanya ambil kolom C (index ke-2)
    const COPY_COL_C_SHEETS = ['PK_LULUS_SENSOR_AUDIT', 'seputar_gantirek', 'seputar_pk'];
    let allData = {};
    let currentSheet = 'bonus';

    async function fetchSheet(sheetName) {
      const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(sheetName)}`;
      try {
        const res = await fetch(url);
        const text = await res.text();
        const json = JSON.parse(text.substring(47, text.length - 2));
        if (!json.table?.rows) return [];
        const cols = json.table.cols || [];
        const headers = cols.map(col => col.label || `col_${col.id}`);
        return json.table.rows.map(row => {
          const obj = {};
          row.c?.forEach((cell, idx) => { obj[headers[idx] || `col_${idx}`] = cell ? cell.v : null; });
          return obj;
        });
      } catch (e) { console.error(e); return []; }
    }

    async function loadAllSheets() {
      let progress = 0;
      const step = 100 / SHEET_NAMES.length;
      const loaderTitleEl = document.getElementById('loader-title-text');
      const loaderBar = document.getElementById('loaderBar');
      const loadStatus = document.getElementById('load-status');
      for (const name of SHEET_NAMES) {
        loaderTitleEl.innerText = name.toUpperCase();
        loadStatus.innerText = `Fetching ${name}...`;
        allData[name] = await fetchSheet(name);
        progress += step;
        loaderBar.style.width = `${progress}%`;
        await new Promise(r => setTimeout(r, 80));
      }
      loaderTitleEl.innerText = 'READY';
      loadStatus.innerText = 'System Online';
      loaderBar.style.width = '100%';
      setTimeout(() => {
        document.getElementById('loader').style.opacity = '0';
        setTimeout(() => document.getElementById('loader').style.display = 'none', 600);
        renderSheet(currentSheet);
      }, 500);
    }

    function escapeHTML(str) {
      if (!str) return '';
      return String(str).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[m] || m);
    }

    function showNotification(msg) {
      const notif = document.createElement('div');
      notif.className = 'toast-notification';
      notif.innerHTML = `<i class="fas fa-bolt" style="color:#FF3366;margin-right:10px;"></i>${msg}`;
      document.getElementById('notif-container').appendChild(notif);
      setTimeout(() => notif.remove(), 2500);
    }

    /* ========== RENDER: Asset Cards (BONUS) ========== */
    function renderAssetsGrid(data) {
      if (!data.length) return renderEmptyState();
      let html = '<div class="assets-grid">';
      data.forEach((row, idx) => {
        const keys = Object.keys(row);
        const id = row[keys[0]] || '-';
        const val = row[keys[1]] || '-';
        const desc = row[keys[2]] || '-';
        html += `<div class="asset-card" style="animation-delay:${idx * 0.05}s">
          <div class="asset-header"><span class="asset-id-badge">${escapeHTML(id)}</span><div class="asset-status"></div></div>
          <div class="asset-display"><div class="asset-value">${escapeHTML(val)}</div></div>
          <div style="padding:0 20px 20px;"><div style="color:#aaa;">${escapeHTML(desc)}</div></div>
          <div style="padding:0 20px 20px;"><button class="btn-copy-action" data-val="${escapeHTML(val)}" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy Data</button></div>
        </div>`;
      });
      html += '</div>';
      return html;
    }

    /* ========== RENDER: Tabel Kolom ========== */
    function renderQna(data) {
      if (!data.length) return renderEmptyState();
      const keys = Object.keys(data[0]);
      const col1 = keys[0] || 'Key';
      const col2 = keys[1] || 'Value';
      const col3 = keys.length > 2 ? keys[2] : null;

      // Cek apakah sheet ini hanya copy kolom C
      const onlyColC = COPY_COL_C_SHEETS.includes(currentSheet);

      let html = '<table class="qna-table"><thead><tr>';
      html += '<th class="col-no">#</th>';
      html += `<th>${escapeHTML(col1)}</th>`;
      if (col3) {
        html += `<th>${escapeHTML(col2)}</th>`;
        html += `<th>${escapeHTML(col3)}</th>`;
      } else {
        html += `<th>${escapeHTML(col2)}</th>`;
      }
      html += '<th class="col-action"></th>';
      html += '</tr></thead><tbody>';

      data.forEach((row, idx) => {
        const v1 = row[keys[0]] || '';
        const v2 = row[keys[1]] || '';
        const v3 = col3 ? (row[keys[2]] || '') : '';

        // Jika onlyColC: copy hanya kolom terakhir (C), fallback ke kolom sebelumnya jika C kosong
        let copyText;
        if (onlyColC) {
          copyText = v3 || v2 || v1;
        } else {
          copyText = [v1, v2, v3].filter(Boolean).join(' — ');
        }

        html += '<tr>';
        html += `<td class="col-no">${String(idx + 1).padStart(2, '0')}</td>`;
        html += `<td>${escapeHTML(v1)}</td>`;
        if (col3) {
          html += `<td>${escapeHTML(v2)}</td>`;
          html += `<td>${escapeHTML(v3)}</td>`;
        } else {
          html += `<td>${escapeHTML(v2)}</td>`;
        }
        html += `<td class="col-action"><button class="copy-trigger" data-text="${escapeHTML(copyText)}" title="Copy Col C"><i class="fas fa-copy"></i></button></td>`;
        html += '</tr>';
      });

      html += '</tbody></table>';
      return html;
    }

    /* ========== RENDER: Sidebar Layout (PK ANTI AUDIT) ========== */
    function renderSidebarLayout(data) {
      if (!data.length) return renderEmptyState();
      const keys = Object.keys(data[0]);
      let html = '<div class="layout-split"><div class="sidebar-col"><div class="sidebar-header"><i class="fas fa-database"></i> Data Index</div><div class="sidebar-list">';
      data.forEach((row, idx) => {
        const label = row[keys[0]] || `Item ${idx + 1}`;
        html += `<div class="sidebar-item" data-index="${idx}"><i class="fas fa-caret-right"></i> ${escapeHTML(label)}</div>`;
      });
      html += '</div></div><div class="detail-col" id="detailPanel"><div class="detail-content"><i class="fas fa-info-circle"></i> Select an item</div></div></div>';
      return html;
    }

    function renderEmptyState() {
      return '<div class="empty-state"><div class="holo-cube-wrapper"><div class="holo-cube"><div class="holo-face face-front"></div><div class="holo-face face-back"></div><div class="holo-face face-right"></div><div class="holo-face face-left"></div><div class="holo-face face-top"></div><div class="holo-face face-bottom"></div></div></div><div style="color:#FF3366;margin-top:20px;">NO DATA FOUND</div></div>';
    }

    /* ========== ROUTING ========== */
    function renderSheet(sheetName) {
      currentSheet = sheetName;
      document.getElementById('pageTitle').innerText = sheetName.toUpperCase().replace(/_/g, ' ');
      document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.dataset.sheet === sheetName));
      document.getElementById('searchInput').value = '';
      const data = allData[sheetName] || [];
      const container = document.getElementById('tableContainer');

      if (sheetName === 'bonus') {
        container.innerHTML = renderAssetsGrid(data);
      } else if (sheetName === 'PK_anti_audit') {
        container.innerHTML = renderSidebarLayout(data);
      } else {
        // PK_LULUS_SENSOR_AUDIT, seputar_gantirek, seputar_pk → tabel kolom
        container.innerHTML = renderQna(data);
      }

      // Sidebar interaktif
      if (sheetName === 'PK_anti_audit' && data.length) {
        setTimeout(() => {
          const items = document.querySelectorAll('.sidebar-item');
          const detailPanel = document.getElementById('detailPanel');
          if (!items.length) return;
          const updateDetail = (idx) => {
            const row = data[idx];
            const keys = Object.keys(row);
            const title = row[keys[0]] || '-';
            const desc = row[keys[2]] || row[keys[1]] || '-';
            detailPanel.innerHTML = `<div class="detail-content"><div style="color:#FF3366;">IDENTIFIER</div><div>${escapeHTML(title)}</div><div style="margin-top:12px;color:#FF3366;">DESCRIPTION</div><div style="background:#00000040;padding:15px;border-radius:12px;">${escapeHTML(desc)}</div><button class="btn-copy-desc copy-full-desc" data-desc="${escapeHTML(desc)}"><i class="fas fa-copy"></i> Copy Description</button></div>`;
          };
          items.forEach(item => {
            item.addEventListener('click', () => {
              items.forEach(i => i.classList.remove('active'));
              item.classList.add('active');
              updateDetail(parseInt(item.dataset.index));
            });
          });
          if (items[0]) { items[0].classList.add('active'); updateDetail(0); }
        }, 50);
      }
    }

    /* ========== SEARCH ========== */
    function handleSearch() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      const data = allData[currentSheet] || [];
      if (!data.length) return;
      if (currentSheet === 'PK_anti_audit') {
        const items = document.querySelectorAll('.sidebar-item');
        let firstVisible = -1;
        items.forEach((item, idx) => {
          const match = Object.values(data[idx]).some(v => v && String(v).toLowerCase().includes(query));
          item.style.display = match ? 'flex' : 'none';
          if (match && firstVisible === -1) firstVisible = idx;
        });
        const active = document.querySelector('.sidebar-item.active');
        if ((!active || active.style.display === 'none') && firstVisible !== -1) {
          document.querySelector(`.sidebar-item[data-index="${firstVisible}"]`)?.click();
        }
      } else if (currentSheet === 'bonus') {
        const filtered = data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(query)));
        document.getElementById('tableContainer').innerHTML = renderAssetsGrid(filtered);
      } else {
        const filtered = data.filter(r => Object.values(r).some(v => v && String(v).toLowerCase().includes(query)));
        document.getElementById('tableContainer').innerHTML = renderQna(filtered);
      }
    }

    /* ========== COPY HANDLER ========== */
    document.addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-copy-action, .copy-trigger, .btn-copy-desc');
      if (!btn) return;
      let text = '';
      if (btn.dataset.val && btn.dataset.desc) {
        text = `${btn.dataset.val} - ${btn.dataset.desc}`;
      } else if (btn.dataset.text) {
        text = btn.dataset.text;
      } else if (btn.dataset.desc) {
        text = btn.dataset.desc;
      }
      if (text) {
        await navigator.clipboard.writeText(text);
        showNotification('Copied to clipboard');
        // Flash effect pada tombol
        btn.classList.add('copy-flash');
        btn.style.background = '#FF3366';
        btn.style.color = 'black';
        setTimeout(() => {
          btn.style.background = '';
          btn.style.color = '';
          btn.classList.remove('copy-flash');
        }, 500);
      }
    });

    document.getElementById('refreshBtn').addEventListener('click', () => { loadAllSheets(); showNotification('Refreshing data...'); });
    document.getElementById('searchInput').addEventListener('input', handleSearch);
    document.querySelectorAll('.nav-item').forEach(item => item.addEventListener('click', () => renderSheet(item.dataset.sheet)));

    loadAllSheets();
  </script>
</body>
</html>
