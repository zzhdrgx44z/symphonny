<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINK LINE — Nexus</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<script>
tailwind.config={theme:{extend:{fontFamily:{display:['Orbitron','sans-serif'],body:['Rajdhani','sans-serif']}}}}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rajdhani',sans-serif;background:#06060e;color:#e0e8f0;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:rgba(0,240,255,0.03)}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,0.4)}
.view-section{display:none;animation:glitchIn .6s cubic-bezier(.16,1,.3,1)}
.view-section.active{display:block}
@keyframes glitchIn{0%{opacity:0;transform:translateY(20px) skewX(-2deg);filter:blur(8px)}60%{opacity:1;transform:translateY(-2px) skewX(1deg);filter:blur(0)}100%{transform:translateY(0) skewX(0)}}
.font-display{font-family:'Orbitron',sans-serif}
.card-neon{background:rgba(8,12,28,0.85);backdrop-filter:blur(20px);border:1px solid rgba(0,240,255,0.12);border-radius:16px;box-shadow:0 0 30px rgba(0,240,255,0.04),inset 0 1px 0 rgba(0,240,255,0.06);position:relative;overflow:hidden}
.card-neon::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.3),rgba(255,0,170,0.3),transparent)}
.nav-pill{padding:8px 22px;border-radius:6px;font-size:.8rem;font-weight:700;color:rgba(0,240,255,0.5);background:0 0;border:1px solid transparent;cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1.5px;white-space:nowrap}
.nav-pill:hover{color:rgba(0,240,255,0.8);background:rgba(0,240,255,0.04);border-color:rgba(0,240,255,0.1)}
.nav-pill.active{color:#00f0ff;background:rgba(0,240,255,0.08);border-color:rgba(0,240,255,0.25);box-shadow:0 0 20px rgba(0,240,255,0.1),inset 0 0 20px rgba(0,240,255,0.03);text-shadow:0 0 12px rgba(0,240,255,0.5)}
.btn-neon{background:linear-gradient(135deg,rgba(0,240,255,0.15),rgba(0,240,255,0.05));color:#00f0ff;font-weight:700;font-size:.8rem;padding:10px 28px;border-radius:8px;border:1px solid rgba(0,240,255,0.3);cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden}
.btn-neon::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.15),transparent);transition:left .5s}
.btn-neon:hover{box-shadow:0 0 25px rgba(0,240,255,0.2),0 0 50px rgba(0,240,255,0.05);border-color:rgba(0,240,255,0.6);transform:translateY(-1px)}
.btn-neon:hover::after{left:100%}
.btn-neon:active{transform:translateY(0) scale(.97)}
.btn-magenta{background:linear-gradient(135deg,rgba(255,0,170,0.15),rgba(255,0,170,0.05));color:#ff00aa;border-color:rgba(255,0,170,0.3)}
.btn-magenta:hover{box-shadow:0 0 25px rgba(255,0,170,0.2),0 0 50px rgba(255,0,170,0.05);border-color:rgba(255,0,170,0.6)}
.btn-magenta::after{background:linear-gradient(90deg,transparent,rgba(255,0,170,0.15),transparent)}
.input-neon{background:rgba(0,240,255,0.02);border:1px solid rgba(0,240,255,0.1);border-radius:8px;padding:12px 16px;font-family:'Rajdhani';font-size:1rem;font-weight:500;color:#e0e8f0;outline:none;transition:all .3s;width:100%;letter-spacing:.5px}
.input-neon:focus{border-color:rgba(0,240,255,0.4);box-shadow:0 0 20px rgba(0,240,255,0.08),inset 0 0 20px rgba(0,240,255,0.02)}
.input-neon::placeholder{color:rgba(0,240,255,0.2)}
.copy-btn{background:rgba(0,240,255,0.06);border:1px solid rgba(0,240,255,0.2);color:#00f0ff;padding:5px 16px;font-size:.7rem;font-weight:700;border-radius:6px;cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1px;position:relative;overflow:hidden}
.copy-btn:hover{background:rgba(0,240,255,0.15);border-color:rgba(0,240,255,0.5);box-shadow:0 0 15px rgba(0,240,255,0.15);text-shadow:0 0 8px rgba(0,240,255,0.5)}
.copy-btn:active{transform:scale(.95)}
.table-row{transition:all .3s}
.table-row:hover{background:rgba(0,240,255,0.03)}
.table-row:hover td:first-child{color:#00f0ff;text-shadow:0 0 8px rgba(0,240,255,0.3)}
.toast-container{position:fixed;top:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast-item{background:rgba(8,12,28,0.95);border:1px solid rgba(0,240,255,0.25);border-left:3px solid #00f0ff;padding:14px 22px;border-radius:10px;font-size:.85rem;color:#e0e8f0;box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 20px rgba(0,240,255,0.05);animation:toastSlide .5s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(16px)}
@keyframes toastSlide{from{opacity:0;transform:translateX(60px) scale(.9)}to{opacity:1;transform:translateX(0) scale(1)}}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.pulse-dot{width:8px;height:8px;background:#00f0ff;border-radius:50%;animation:pulseNeon 2s infinite;box-shadow:0 0 8px rgba(0,240,255,0.5)}
@keyframes pulseNeon{0%,100%{box-shadow:0 0 4px rgba(0,240,255,0.3),0 0 8px rgba(0,240,255,0.2)}50%{box-shadow:0 0 8px rgba(0,240,255,0.6),0 0 20px rgba(0,240,255,0.3)}}
@keyframes scanline{0%{top:-5%}100%{top:105%}}
.scanline-fx::after{content:'';position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(0,240,255,0.06),transparent);animation:scanline 4s linear infinite;pointer-events:none;z-index:1}
@keyframes borderPulse{0%,100%{border-color:rgba(0,240,255,0.12)}50%{border-color:rgba(0,240,255,0.25)}}
.border-pulse{animation:borderPulse 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.float-anim{animation:float 3s ease-in-out infinite}
.setting-btn{background:rgba(0,240,255,0.03);color:rgba(0,240,255,0.5);font-weight:700;font-size:.7rem;padding:8px 20px;border-radius:6px;border:1px solid rgba(0,240,255,0.1);cursor:pointer;transition:all .3s;font-family:'Orbitron',sans-serif;text-transform:uppercase;letter-spacing:1px}
.setting-btn:hover{background:rgba(0,240,255,0.08);color:rgba(0,240,255,0.7);border-color:rgba(0,240,255,0.2)}
.setting-btn.active{color:#00f0ff;background:rgba(0,240,255,0.1);border-color:rgba(0,240,255,0.4);box-shadow:0 0 15px rgba(0,240,255,0.08);text-shadow:0 0 8px rgba(0,240,255,0.4)}
.corner-deco{position:absolute;width:12px;height:12px;pointer-events:none}
.corner-deco.tl{top:-1px;left:-1px;border-top:2px solid rgba(0,240,255,0.4);border-left:2px solid rgba(0,240,255,0.4)}
.corner-deco.tr{top:-1px;right:-1px;border-top:2px solid rgba(0,240,255,0.4);border-right:2px solid rgba(0,240,255,0.4)}
.corner-deco.bl{bottom:-1px;left:-1px;border-bottom:2px solid rgba(0,240,255,0.4);border-left:2px solid rgba(0,240,255,0.4)}
.corner-deco.br{bottom:-1px;right:-1px;border-bottom:2px solid rgba(0,240,255,0.4);border-right:2px solid rgba(0,240,255,0.4)}
@media(max-width:768px){.desktop-only{display:none!important}.mobile-nav{display:flex!important}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<div class="relative z-10 h-screen flex flex-col">

<!-- HEADER -->
<header class="flex-shrink-0 flex items-center justify-between px-5 lg:px-8 py-3 bg-[rgba(6,6,14,0.85)] backdrop-blur-2xl border-b border-[rgba(0,240,255,0.08)] scanline-fx" style="position:relative">
  <div class="flex items-center gap-3">
    <div class="relative w-10 h-10 flex items-center justify-center">
      <div class="absolute inset-0 rounded-lg bg-gradient-to-br from-[rgba(0,240,255,0.15)] to-[rgba(255,0,170,0.15)] border border-[rgba(0,240,255,0.2)]"></div>
      <span class="iconify text-[#00f0ff] text-lg float-anim relative z-10" data-icon="lucide:hexagon" style="filter:drop-shadow(0 0 6px rgba(0,240,255,0.4))"></span>
    </div>
    <div class="flex items-baseline gap-2">
      <span class="font-display text-base font-bold tracking-[3px] text-[#e0e8f0]" style="text-shadow:0 0 20px rgba(0,240,255,0.2)">LINK LINE</span>
      <span class="font-display text-[9px] font-bold text-[#ff00aa] tracking-[3px] uppercase" style="text-shadow:0 0 10px rgba(255,0,170,0.4)">Nexus</span>
    </div>
  </div>
  <nav class="hidden md:flex items-center gap-2 p-1.5 rounded-lg bg-[rgba(0,240,255,0.02)] border border-[rgba(0,240,255,0.06)]">
    <button onclick="showView('dashboard')" class="nav-pill active" data-nav="dashboard">
      <span class="iconify inline-block mr-1.5 text-xs align-[-1px]" data-icon="lucide:database"></span>Database
    </button>
    <button onclick="showView('settings')" class="nav-pill" data-nav="settings">
      <span class="iconify inline-block mr-1.5 text-xs align-[-1px]" data-icon="lucide:cpu"></span>Settings
    </button>
  </nav>
  <div class="flex items-center gap-5">
    <div class="flex items-center gap-2">
      <div class="pulse-dot"></div>
      <span class="text-[10px] font-bold text-[rgba(0,240,255,0.4)] font-display tracking-widest uppercase">Online</span>
    </div>
    <span class="text-xs font-bold text-[rgba(0,240,255,0.25)] font-display tracking-[2px]" id="clock">00:00</span>
  </div>
</header>

<!-- MOBILE NAV -->
<div class="md:hidden flex gap-2 p-2 bg-[rgba(6,6,14,0.9)] backdrop-blur-xl border-b border-[rgba(0,240,255,0.06)] mobile-nav">
  <button onclick="showView('dashboard')" class="nav-pill active text-[10px] flex-1" data-mob="dashboard">Database</button>
  <button onclick="showView('settings')" class="nav-pill text-[10px] flex-1" data-mob="settings">Settings</button>
</div>

<main class="flex-1 overflow-y-auto p-5 lg:p-8">

  <!-- DATABASE VIEW -->
  <div id="dashboardView" class="view-section active">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
      <div>
        <div class="flex items-center gap-3 mb-2">
          <div class="w-1 h-8 bg-gradient-to-b from-[#00f0ff] to-[#ff00aa] rounded-full" style="box-shadow:0 0 10px rgba(0,240,255,0.3)"></div>
          <h1 class="font-display text-3xl lg:text-4xl font-black tracking-[4px] uppercase" style="background:linear-gradient(135deg,#00f0ff,#e0e8f0,#ff00aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(0,240,255,0.15))">Database</h1>
        </div>
        <p class="text-[rgba(0,240,255,0.3)] text-sm font-medium ml-5 tracking-wide">Temukan dan kelola link yang tersedia</p>
      </div>
      <div class="flex items-center gap-2 text-[rgba(0,240,255,0.2)]">
        <span class="iconify text-sm" data-icon="lucide:corner-down-right"></span>
        <span class="text-[10px] font-display tracking-widest uppercase font-bold">Klik COPY untuk salin</span>
      </div>
    </div>

    <div class="flex gap-3 mb-6">
      <div class="relative flex-1">
        <span class="iconify absolute left-4 top-1/2 -translate-y-1/2 text-[rgba(0,240,255,0.25)] text-lg" data-icon="lucide:scan-search"></span>
        <input type="text" class="input-neon pl-11" id="searchInput" placeholder="Scan database..." onkeypress="handleEnter(event)">
      </div>
      <button class="btn-neon flex items-center gap-2" onclick="performSearch()">
        <span class="iconify text-sm" data-icon="lucide:radar"></span>Scan
      </button>
    </div>

    <div class="card-neon border-pulse relative" id="tableCard">
      <div class="corner-deco tl"></div>
      <div class="corner-deco tr"></div>
      <div class="corner-deco bl"></div>
      <div class="corner-deco br"></div>
      <table class="w-full" id="tableContainer"></table>
    </div>

    <div class="text-center mt-10 pb-4">
      <div class="inline-flex items-center gap-3 text-[10px] text-[rgba(0,240,255,0.15)] font-display tracking-[4px] uppercase font-bold">
        <span class="w-12 h-px bg-gradient-to-r from-transparent to-[rgba(0,240,255,0.15)]"></span>
        End of Database
        <span class="w-12 h-px bg-gradient-to-l from-transparent to-[rgba(0,240,255,0.15)]"></span>
      </div>
    </div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="settingsView" class="view-section">
    <div class="mb-8">
      <div class="flex items-center gap-3 mb-2">
        <div class="w-1 h-8 bg-gradient-to-b from-[#ff00aa] to-[#00f0ff] rounded-full" style="box-shadow:0 0 10px rgba(255,0,170,0.3)"></div>
        <h1 class="font-display text-3xl lg:text-4xl font-black tracking-[4px] uppercase" style="background:linear-gradient(135deg,#ff00aa,#e0e8f0,#00f0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,0,170,0.15))">Settings</h1>
      </div>
      <p class="text-[rgba(0,240,255,0.3)] text-sm font-medium ml-5 tracking-wide">Konfigurasi sistem dan koneksi</p>
    </div>

    <div class="card-neon p-6 lg:p-8 max-w-2xl relative">
      <div class="corner-deco tl"></div>
      <div class="corner-deco tr"></div>
      <div class="corner-deco bl"></div>
      <div class="corner-deco br"></div>

      <div class="space-y-6">
        <div>
          <label class="block text-[10px] font-bold text-[rgba(0,240,255,0.4)] uppercase tracking-[3px] mb-2 font-display">Spreadsheet ID</label>
          <input type="text" class="input-neon font-mono text-xs" value="19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-[rgba(0,240,255,0.4)] uppercase tracking-[3px] mb-2 font-display">Sheet GID</label>
          <input type="text" class="input-neon font-mono text-xs" value="1202906531">
        </div>
        <div>
          <label class="block text-[10px] font-bold text-[rgba(0,240,255,0.4)] uppercase tracking-[3px] mb-2 font-display">API Endpoint</label>
          <input type="text" class="input-neon font-mono text-xs" value="https://script.google.com/macros/s/.../exec">
        </div>
      </div>

      <div class="border-t border-[rgba(0,240,255,0.06)] mt-8 pt-6">
        <label class="block text-[10px] font-bold text-[rgba(0,240,255,0.4)] uppercase tracking-[3px] mb-3 font-display">Display Mode</label>
        <div class="flex gap-3">
          <button class="setting-btn" onclick="selectMode(this)">Cyber</button>
          <button class="setting-btn active" onclick="selectMode(this)">Neon</button>
          <button class="setting-btn" onclick="selectMode(this)">Stealth</button>
        </div>
      </div>

      <div class="border-t border-[rgba(0,240,255,0.06)] mt-8 pt-6 flex justify-end">
        <button class="btn-magenta flex items-center gap-2" onclick="showToast('Configuration saved to nexus')">
          <span class="iconify text-sm" data-icon="lucide:save"></span>Save Config
        </button>
      </div>
    </div>
  </div>

</main>
</div>

<div class="toast-container" id="toastStack"></div>

<script>
// ================= DATA =================
let semuaData = { linknawala: [] };
let filteredData = { linknawala: [] };

setInterval(() => {
  const now = new Date();
  document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

const config = {
  spreadsheetId: '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c',
  sheetGid: '1202906531',
  gasUrl: 'https://script.google.com/macros/s/AKfycbwkHrgiGlxFkJHZwp-bMaRCezwCSPAdV-FyUHkX9cAEWu/exec'
};

window.onload = function() {
  muatSemuaData();
  initBgNetwork();
};

function showView(viewName) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById(viewName + 'View').classList.add('active');
  document.querySelectorAll('.nav-pill[data-nav]').forEach(el => { el.classList.remove('active'); if(el.dataset.nav === viewName) el.classList.add('active'); });
  document.querySelectorAll('.nav-pill[data-mob]').forEach(el => { el.classList.remove('active'); if(el.dataset.mob === viewName) el.classList.add('active'); });
}

function selectMode(btn) {
  btn.parentElement.querySelectorAll('.setting-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function showToast(msg) {
  const c = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast-item';
  t.innerHTML = `<div class="flex items-center gap-3"><span class="iconify text-[#00f0ff]" data-icon="lucide:check-circle-2" style="filter:drop-shadow(0 0 4px rgba(0,240,255,0.4))"></span><span class="font-bold tracking-wide">${msg}</span></div>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity .4s'; setTimeout(()=>t.remove(), 400); }, 3000);
}

function copyText(text) { if(!text) return; navigator.clipboard.writeText(text).then(() => showToast("Link disalin ke clipboard!")); }
function handleEnter(e) { if(e.key==='Enter') performSearch(); }

async function muatSemuaData() {
  const container = document.getElementById('tableContainer');
  container.innerHTML = `<tr><td colspan="5" class="text-center py-20 text-[rgba(0,240,255,0.3)] text-sm font-display tracking-widest uppercase"><span class="iconify animate-spin inline-block mr-2 text-xl align-[-4px] text-[#00f0ff]" data-icon="lucide:loader-2" style="filter:drop-shadow(0 0 6px rgba(0,240,255,0.3))"></span>Scanning Network...</td></tr>`;
  try {
    let dataFetched = false;
    if(config.gasUrl) { try { const res=await fetch(config.gasUrl); if(res.ok){ const json=await res.json(); if(json.success){ semuaData.linknawala=json.linknawala||[]; dataFetched=true; }}}catch(e){} }
    if(!dataFetched) {
      const csvUrl=`https://docs.google.com/spreadsheets/d/${config.spreadsheetId}/export?format=csv&gid=${config.sheetGid}`;
      const res=await fetch(csvUrl); if(!res.ok) throw new Error('Fail');
      semuaData.linknawala = parseCSV(await res.text());
    }
    filteredData.linknawala = JSON.parse(JSON.stringify(semuaData.linknawala));
    renderTable();
    showToast("Nexus online — data loaded");
  } catch(err) {
    container.innerHTML = `<tr><td colspan="5" class="text-center py-20 text-[#ff00aa] text-sm font-display tracking-widest uppercase"><span class="iconify inline-block mr-2 text-xl align-[-4px]" data-icon="lucide:alert-triangle" style="filter:drop-shadow(0 0 6px rgba(255,0,170,0.4))"></span>Connection Failed</td></tr>`;
  }
}

function parseCSV(text) {
  if(!text) return [];
  return text.split('\n').filter(l=>l.trim()).map(row => {
    let cur='',arr=[],inQ=false;
    for(let c of row){ if(c==='"')inQ=!inQ; else if(c===','&&!inQ){arr.push(cur.trim());cur='';}else cur+=c;}
    arr.push(cur.trim()); return arr;
  });
}

function renderTable() {
  const data = filteredData.linknawala;
  const container = document.getElementById('tableContainer');
  if(!data||!data.length){ container.innerHTML='<tr><td colspan="5" class="text-center py-20 text-[rgba(0,240,255,0.2)] text-sm font-display tracking-widest uppercase">No Data Found</td></tr>'; return; }
  let html = `<thead><tr>`;
  if(data[0]) {
    data[0].forEach((h, idx) => {
      const w = idx===0 ? 'w-[35%]' : '';
      html += `<th class="text-left text-[9px] font-bold text-[rgba(0,240,255,0.35)] uppercase tracking-[3px] px-5 py-4 border-b border-[rgba(0,240,255,0.06)] bg-[rgba(0,240,255,0.02)] font-display ${w}">${h}</th>`;
    });
    html += `<th class="text-right text-[9px] font-bold text-[rgba(0,240,255,0.35)] uppercase tracking-[3px] px-5 py-4 border-b border-[rgba(0,240,255,0.06)] bg-[rgba(0,240,255,0.02)] w-28 font-display">Action</th></tr></thead><tbody>`;
    for(let i=1;i<data.length;i++){
      if(!data[i]) continue;
      html += `<tr class="table-row">`;
      let firstText='';
      data[i].forEach((cell,idx)=>{
        if(idx>=4) return;
        const val=cell||'—';
        if(idx===0){ firstText=val; html+=`<td class="px-5 py-3.5 text-sm border-b border-[rgba(0,240,255,0.03)] font-bold text-[#e0e8f0] tracking-wide">${val}</td>`; }
        else html+=`<td class="px-5 py-3.5 text-sm border-b border-[rgba(0,240,255,0.03)] text-[rgba(0,240,255,0.4)] font-medium">${val}</td>`;
      });
      html+=`<td class="px-5 py-3.5 text-right border-b border-[rgba(0,240,255,0.03)]"><button class="copy-btn" onclick="copyText('${firstText.replace(/'/g,"\\'")}')">Copy</button></td></tr>`;
    }
  }
  html += `</tbody>`;
  container.innerHTML = html;
}

function performSearch() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  const original = semuaData.linknawala;
  if(!term){ filteredData.linknawala=JSON.parse(JSON.stringify(original)); }
  else {
    const filtered=[original[0]];
    for(let i=1;i<original.length;i++){ if(original[i].some(cell=>cell&&cell.toString().toLowerCase().includes(term))) filtered.push(original[i]); }
    filteredData.linknawala=filtered;
  }
  renderTable();
}

// ================= CYBER NETWORK BACKGROUND =================
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let bgNodes = [], bgEdges = [], bgSparks = [], bgRipples = [];
const BG_NODE_COUNT = 24;
let bgFrame = 0;
let mouseX = 0, mouseY = 0;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  initBgData();
}

function initBgData() {
  bgNodes = []; bgEdges = []; bgSparks = []; bgRipples = [];
  const w = bgCanvas.width, h = bgCanvas.height;
  const cx = w/2, cy = h/2;
  const ringR = Math.min(w,h) * 0.33;

  bgNodes.push({ x:cx, y:cy, r:12, type:'hub', label:'NEXUS', charge:0, phase:0 });

  const types = ['server','database','gateway','client','api','firewall','cdn'];
  const labels = ['SRV-A1','SRV-B2','DB-CORE','DB-REPL','GW-EXT','GW-INT','FW-01','CLI-01','CLI-02','CLI-03','API-V1','API-V2','CDN-E1','CDN-W1','LOG-01','MON-01','DNS-01','LB-01','FW-02','CACHE-01','MQ-01','REG-01'];
  for(let i=0; i<BG_NODE_COUNT-1; i++){
    const angle = (i/(BG_NODE_COUNT-1))*Math.PI*2 - Math.PI/2;
    const layer = i % 3;
    const dist = ringR * (0.7 + layer*0.2) + (Math.random()-0.5)*60;
    bgNodes.push({
      x: cx + Math.cos(angle)*dist,
      y: cy + Math.sin(angle)*dist,
      r: 3 + Math.random()*4,
      type: types[i%types.length],
      label: labels[i]||`N-${i}`,
      charge: 0,
      phase: Math.random()*Math.PI*2
    });
  }

  for(let i=1;i<bgNodes.length;i++) bgEdges.push({from:0, to:i, active:true, pulse:Math.random()});
  for(let i=1;i<bgNodes.length;i++){
    const j=((i+Math.floor(Math.random()*6)+2)%(bgNodes.length-1))+1;
    if(i!==j) bgEdges.push({from:i, to:j, active:Math.random()>0.4, pulse:Math.random()});
  }
}

function spawnBgSpark() {
  const active = bgEdges.filter(e=>e.active);
  if(!active.length) return;
  const edge = active[Math.floor(Math.random()*active.length)];
  const dir = Math.random()>0.5?1:-1;
  const colors = ['#00f0ff','#ff00aa','#8b5cf6','#22d3ee','#f472b6'];
  bgSparks.push({
    from: dir>0?edge.from:edge.to,
    to: dir>0?edge.to:edge.from,
    t: 0,
    speed: 0.006 + Math.random()*0.014,
    color: colors[Math.floor(Math.random()*colors.length)],
    size: 2 + Math.random()*2
  });
}

function spawnRipple(x, y) {
  bgRipples.push({ x, y, r: 0, maxR: 60 + Math.random()*40, alpha: 0.3, color: Math.random()>0.5 ? '#00f0ff' : '#ff00aa' });
}

function initBgNetwork() {
  resizeBg();
  window.addEventListener('resize', resizeBg);
  animateBg();
}

function animateBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  const time = Date.now() * 0.001;
  bgFrame++;

  bgCtx.clearRect(0, 0, w, h);

  // Deep background gradient
  let bgGrad = bgCtx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.7);
  bgGrad.addColorStop(0, 'rgba(8,4,24,0.3)');
  bgGrad.addColorStop(0.5, 'rgba(4,2,12,0.15)');
  bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  bgCtx.fillStyle = bgGrad;
  bgCtx.fillRect(0, 0, w, h);

  // Hexagonal grid
  bgCtx.strokeStyle = 'rgba(0,240,255,0.015)';
  bgCtx.lineWidth = 0.5;
  const hexSize = 50;
  const hexH = hexSize * Math.sqrt(3);
  for(let row = -1; row < h/hexH + 1; row++){
    for(let col = -1; col < w/(hexSize*1.5) + 1; col++){
      let cx = col * hexSize * 1.5;
      let cy = row * hexH + (col%2 ? hexH/2 : 0);
      bgCtx.beginPath();
      for(let i=0;i<6;i++){
        let a = Math.PI/3*i - Math.PI/6;
        let px = cx + hexSize*0.8*Math.cos(a);
        let py = cy + hexSize*0.8*Math.sin(a);
        i===0 ? bgCtx.moveTo(px,py) : bgCtx.lineTo(px,py);
      }
      bgCtx.closePath();
      bgCtx.stroke();
    }
  }

  // Mouse proximity glow
  let mGrad = bgCtx.createRadialGradient(mouseX, mouseY, 0, mouseX, mouseY, 200);
  mGrad.addColorStop(0, 'rgba(0,240,255,0.03)');
  mGrad.addColorStop(1, 'rgba(0,240,255,0)');
  bgCtx.fillStyle = mGrad;
  bgCtx.fillRect(0, 0, w, h);

  // Edge wires with pulse
  for(let edge of bgEdges){
    const a=bgNodes[edge.from], b=bgNodes[edge.to];
    if(!a||!b) continue;
    
    edge.pulse = (edge.pulse + 0.005) % 1;
    
    if(edge.active){
      // Base wire
      bgCtx.beginPath(); bgCtx.moveTo(a.x,a.y); bgCtx.lineTo(b.x,b.y);
      bgCtx.strokeStyle = 'rgba(0,240,255,0.06)';
      bgCtx.lineWidth = 1;
      bgCtx.stroke();
      
      // Traveling pulse on wire
      let px = a.x + (b.x-a.x)*edge.pulse;
      let py = a.y + (b.y-a.y)*edge.pulse;
      let pGrad = bgCtx.createRadialGradient(px,py,0,px,py,30);
      pGrad.addColorStop(0, 'rgba(0,240,255,0.08)');
      pGrad.addColorStop(1, 'rgba(0,240,255,0)');
      bgCtx.fillStyle = pGrad;
      bgCtx.fillRect(px-30,py-30,60,60);
    } else {
      bgCtx.beginPath(); bgCtx.moveTo(a.x,a.y); bgCtx.lineTo(b.x,b.y);
      bgCtx.strokeStyle = 'rgba(0,240,255,0.015)';
      bgCtx.lineWidth = 0.5;
      bgCtx.setLineDash([4,8]);
      bgCtx.stroke();
      bgCtx.setLineDash([]);
    }
  }

  // Spawn sparks
  if(bgFrame % 70 === 0) { for(let i=0;i<4;i++) spawnBgSpark(); }
  else if(Math.random() < 0.06) spawnBgSpark();
  if(bgSparks.length > 15) bgSparks.splice(0, bgSparks.length-15);

  // Draw sparks
  for(let i=bgSparks.length-1;i>=0;i--){
    let p = bgSparks[i];
    p.t += p.speed;
    if(p.t >= 1){ 
      bgNodes[p.to].charge = Math.min(bgNodes[p.to].charge+1, 2); 
      if(bgNodes[p.to].type==='hub') spawnRipple(bgNodes[p.to].x, bgNodes[p.to].y);
      bgSparks.splice(i,1); 
      continue; 
    }
    const a=bgNodes[p.from], b=bgNodes[p.to];
    let px=a.x+(b.x-a.x)*p.t, py=a.y+(b.y-a.y)*p.t;
    let trailLen=0.12;
    let tx=a.x+(b.x-a.x)*Math.max(0,p.t-trailLen), ty=a.y+(b.y-a.y)*Math.max(0,p.t-trailLen);
    
    // Trail
    let grad = bgCtx.createLinearGradient(tx,ty,px,py);
    grad.addColorStop(0, 'rgba(0,0,0,0)');
    grad.addColorStop(1, p.color);
    bgCtx.beginPath(); bgCtx.moveTo(tx,ty); bgCtx.lineTo(px,py);
    bgCtx.strokeStyle = grad; bgCtx.lineWidth = 2.5; bgCtx.stroke();

    // Head glow
    let hGrad = bgCtx.createRadialGradient(px,py,0,px,py,16);
    hGrad.addColorStop(0, p.color + '40');
    hGrad.addColorStop(1, p.color + '00');
    bgCtx.fillStyle = hGrad;
    bgCtx.beginPath(); bgCtx.arc(px,py,16,0,Math.PI*2); bgCtx.fill();

    // Core
    bgCtx.beginPath(); bgCtx.arc(px,py,p.size,0,Math.PI*2);
    bgCtx.fillStyle = p.color; bgCtx.fill();

    // White center
    bgCtx.beginPath(); bgCtx.arc(px,py,p.size*0.4,0,Math.PI*2);
    bgCtx.fillStyle = '#ffffff'; bgCtx.fill();
  }

  // Ripples
  for(let i=bgRipples.length-1;i>=0;i--){
    let r = bgRipples[i];
    r.r += 1.5;
    r.alpha -= 0.005;
    if(r.alpha <= 0 || r.r >= r.maxR){ bgRipples.splice(i,1); continue; }
    bgCtx.beginPath(); bgCtx.arc(r.x,r.y,r.r,0,Math.PI*2);
    bgCtx.strokeStyle = r.color + Math.floor(r.alpha*255).toString(16).padStart(2,'0');
    bgCtx.lineWidth = 1.5;
    bgCtx.stroke();
  }

  // Nodes
  for(let n of bgNodes){
    n.charge = Math.max(0, n.charge - 0.012);
    n.phase += 0.02;
    let isHub = n.type==='hub';
    
    let baseColor = isHub ? '#00f0ff' : 
                    n.type==='database' ? '#8b5cf6' : 
                    n.type==='gateway' ? '#f59e0b' : 
                    n.type==='client' ? '#22d3ee' : 
                    n.type==='firewall' ? '#ef4444' :
                    n.type==='cdn' ? '#10b981' :
                    n.type==='api' ? '#ff00aa' : '#6366f1';

    // Orbiting ring for hub
    if(isHub){
      bgCtx.beginPath();
      bgCtx.arc(n.x, n.y, n.r + 20 + Math.sin(time*2)*3, 0, Math.PI*2);
      bgCtx.strokeStyle = 'rgba(0,240,255,0.08)';
      bgCtx.lineWidth = 1;
      bgCtx.stroke();
      
      bgCtx.beginPath();
      bgCtx.arc(n.x, n.y, n.r + 30 + Math.sin(time*1.5)*4, 0, Math.PI*2);
      bgCtx.strokeStyle = 'rgba(255,0,170,0.05)';
      bgCtx.stroke();

      // Rotating dots
      for(let d=0;d<3;d++){
        let da = time*1.5 + d*Math.PI*2/3;
        let dx = n.x + Math.cos(da)*(n.r+20);
        let dy = n.y + Math.sin(da)*(n.r+20);
        bgCtx.beginPath(); bgCtx.arc(dx,dy,2,0,Math.PI*2);
        bgCtx.fillStyle = 'rgba(0,240,255,0.5)';
        bgCtx.fill();
      }
    }

    // Charge ring
    if(n.charge > 0.05){
      bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r + (2-n.charge)*12,0,Math.PI*2);
      bgCtx.strokeStyle = baseColor + '40';
      bgCtx.lineWidth = 2; bgCtx.stroke();
    }

    // Outer glow
    let glowR = n.r + 10 + n.charge*8 + Math.sin(n.phase)*2;
    let nGrad = bgCtx.createRadialGradient(n.x,n.y,n.r,n.x,n.y,glowR);
    nGrad.addColorStop(0, baseColor + '15');
    nGrad.addColorStop(1, baseColor + '00');
    bgCtx.fillStyle = nGrad;
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,glowR,0,Math.PI*2); bgCtx.fill();

    // Node body
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    let bodyGrad = bgCtx.createRadialGradient(n.x-n.r*0.3,n.y-n.r*0.3,0,n.x,n.y,n.r);
    bodyGrad.addColorStop(0, baseColor + (n.charge > 0.1 ? 'dd' : '99'));
    bodyGrad.addColorStop(1, baseColor + (n.charge > 0.1 ? '99' : '55'));
    bgCtx.fillStyle = bodyGrad;
    bgCtx.fill();

    // Border glow
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    bgCtx.strokeStyle = baseColor + '60';
    bgCtx.lineWidth = 1.5;
    bgCtx.stroke();

    // Inner highlight
    bgCtx.beginPath(); bgCtx.arc(n.x - n.r*0.25, n.y - n.r*0.25, n.r*0.3,0,Math.PI*2);
    bgCtx.fillStyle = 'rgba(255,255,255,0.35)'; bgCtx.fill();
  }

  // Labels
  bgCtx.textAlign = 'center';
  for(let n of bgNodes){
    let alpha = 0.2 + n.charge*0.6;
    bgCtx.font = `700 ${n.type==='hub'?10:7}px "Orbitron",sans-serif`;
    bgCtx.fillStyle = `rgba(0,240,255,${alpha})`;
    bgCtx.fillText(n.label, n.x, n.y+n.r+16);
  }

  // Floating particles
  for(let i=0;i<3;i++){
    let px = (Math.sin(time*0.3+i*17)*0.5+0.5)*w;
    let py = (Math.cos(time*0.2+i*23)*0.5+0.5)*h;
    let pGrad = bgCtx.createRadialGradient(px,py,0,px,py,2);
    pGrad.addColorStop(0, 'rgba(0,240,255,0.15)');
    pGrad.addColorStop(1, 'rgba(0,240,255,0)');
    bgCtx.fillStyle = pGrad;
    bgCtx.beginPath(); bgCtx.arc(px,py,2,0,Math.PI*2); bgCtx.fill();
  }

  requestAnimationFrame(animateBg);
}
</script>
