<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { serif: ['DM Serif Display','serif'], sans: ['DM Sans','sans-serif'] },
      colors: {
        cream:  { 50:'#fdfcfa',100:'#faf6f0',200:'#f3ece2',300:'#e8ddd0' },
        earth:  { 800:'#3d2c1e',700:'#5c4033',600:'#7a5c47',500:'#9a7b64',400:'#b89b82',300:'#d4bfa6' },
        wine:   { 600:'#7a2240',500:'#9b2d5a',400:'#b84a73',300:'#d47a9e' },
        forest: { 600:'#2d5a3d',500:'#3d7a54',400:'#5a9e72',300:'#8fc4a4' },
        amber:  { 600:'#a36b1e',500:'#c4882a',400:'#dba044',300:'#eabd6e' }

  }
}

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#1a140f;color:#e8ddd0;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#0d0a07}
::-webkit-scrollbar-thumb{background:#3d2c1e;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#5c4033}
.view-section{display:none;animation:fadeUp .5s ease}
.view-section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.font-display{font-family:'DM Serif Display',serif}
.card-glass{background:rgba(26,20,15,0.75);backdrop-filter:blur(16px);border:1px solid rgba(196,136,42,0.15);border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.nav-pill{padding:8px 20px;border-radius:99px;font-size:.875rem;font-weight:600;color:rgba(232,221,208,0.5);background:0 0;border:none;cursor:pointer;transition:all .25s;white-space:nowrap}
.nav-pill:hover{color:#e8ddd0;background:rgba(196,136,42,0.1)}
.nav-pill.active{color:#1a140f;background:#dba044}
.btn-warm{background:linear-gradient(135deg,#c4882a,#a36b1e);color:#faf6f0;font-weight:600;font-size:.875rem;padding:10px 24px;border-radius:12px;border:none;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px rgba(196,136,42,0.3)}
.btn-warm:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(196,136,42,0.4)}
.btn-warm:active{transform:translateY(0) scale(.98)}
.btn-outline{background:0 0;color:#b89b82;font-weight:600;font-size:.875rem;padding:10px 24px;border-radius:12px;border:1.5px solid rgba(196,136,42,0.25);cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#dba044;background:rgba(196,136,42,0.08)}
.input-dark{background:rgba(0,0,0,0.4);border:1.5px solid rgba(196,136,42,0.2);border-radius:12px;padding:12px 16px;font-family:'DM Sans';font-size:.9375rem;color:#e8ddd0;outline:none;transition:all .2s;width:100%}
.input-dark:focus{border-color:rgba(0,255,255,0.4);box-shadow:0 0 0 3px rgba(0,255,255,0.08)}
.input-dark::placeholder{color:rgba(232,221,208,0.25)}
.copy-btn{background:rgba(0,255,255,0.08);border:1.5px solid rgba(0,255,255,0.2);color:#00ffff;padding:5px 14px;font-size:.75rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'DM Sans';text-transform:uppercase;letter-spacing:.5px}
.copy-btn:hover{background:rgba(0,255,255,0.2);border-color:rgba(0,255,255,0.5);box-shadow:0 0 12px rgba(0,255,255,0.2)}
.table-row{transition:background .2s}
.table-row:hover{background:rgba(0,255,255,0.03)}
.toast-container{position:fixed;top:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast-item{background:rgba(26,20,15,0.9);backdrop-filter:blur(12px);border:1px solid rgba(0,255,255,0.15);border-left:4px solid #00ffff;padding:14px 22px;border-radius:12px;font-size:.875rem;color:#e8ddd0;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:toastIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.pulse-dot{width:8px;height:8px;background:#00ffff;border-radius:50%;animation:pulseG 2s infinite}
@keyframes pulseG{0%,100%{box-shadow:0 0 4px rgba(0,255,255,0.4)}50%{box-shadow:0 0 12px rgba(0,255,255,0.8),0 0 30px rgba(0,255,255,0.2)}}
@media(max-width:768px){.desktop-only{display:none!important}}
</style>
</head>
<body>

<!-- Full-screen Electric Network Canvas -->
<canvas id="bgCanvas"></canvas>

<div class="relative z-10 h-screen flex flex-col">

<header class="flex-shrink-0 flex items-center justify-between px-6 lg:px-10 py-4" style="background:rgba(26,20,15,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(196,136,42,0.12)">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-amber-500 to-amber-700 flex items-center justify-center shadow-lg" style="box-shadow:0 0 20px rgba(196,136,42,0.3)">
      <span class="iconify text-cream-50 text-base" data-icon="lucide:zap"></span>
    </div>
    <div>
      <span class="font-display text-lg text-cream-200">Link Line</span>
      <span class="text-[10px] font-semibold text-amber-400 ml-1 uppercase tracking-widest">Electric</span>
    </div>
  </div>
  <nav class="hidden md:flex items-center gap-1 p-1 rounded-full" style="background:rgba(0,0,0,0.3);border:1px solid rgba(196,136,42,0.1)">
    <button onclick="showView('dashboard')" class="nav-pill active" data-nav="dashboard"><span class="iconify inline-block mr-1 text-sm align-[-2px]" data-icon="lucide:database"></span>Database</button>
    <button onclick="showView('settings')" class="nav-pill" data-nav="settings"><span class="iconify inline-block mr-1 text-sm align-[-2px]" data-icon="lucide:settings"></span>Settings</button>
  </nav>
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-2"><div class="pulse-dot"></div><span class="text-xs font-medium text-amber-400">Online</span></div>
    <span class="text-xs font-medium text-earth-400 font-mono" id="clock">00:00</span>
  </div>
</header>

<div class="md:hidden flex gap-1 p-2 overflow-x-auto" style="background:rgba(26,20,15,0.8);backdrop-filter:blur(20px);border-bottom:1px solid rgba(196,136,42,0.12)">
  <button onclick="showView('dashboard')" class="nav-pill active text-xs" data-mob="dashboard">Database</button>
  <button onclick="showView('settings')" class="nav-pill text-xs" data-mob="settings">Settings</button>
</div>

<main class="flex-1 overflow-y-auto p-6 lg:p-10">

  <!-- DATABASE -->
  <div id="dashboardView" class="view-section active">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
      <div>
        <h1 class="font-display text-4xl lg:text-5xl text-cream-200 leading-tight">Database</h1>
        <p class="text-earth-400 mt-2 text-sm">Temukan dan kelola link yang tersedia</p>
      </div>
      <div class="flex items-center gap-2 text-earth-500">
        <span class="iconify text-lg" data-icon="lucide:info"></span>
        <span class="text-xs">Klik COPY untuk menyalin link</span>
      </div>
    </div>
    <div class="flex gap-3 mb-6">
      <div class="relative flex-1">
        <span class="iconify absolute left-4 top-1/2 -translate-y-1/2 text-earth-600 text-lg" data-icon="lucide:search"></span>
        <input type="text" class="input-dark pl-11" id="searchInput" placeholder="Cari link di sini..." onkeypress="handleEnter(event)">
      </div>
      <button class="btn-warm flex items-center gap-2" onclick="performSearch()">
        <span class="iconify text-sm" data-icon="lucide:search"></span>Cari
      </button>
    </div>
    <div class="card-glass overflow-hidden">
      <table class="w-full" id="tableContainer"></table>
    </div>
    <div class="text-center text-xs text-earth-700 mt-8 pb-4 font-medium tracking-wide">— End of Database —</div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsView" class="view-section">
    <div class="mb-8">
      <h1 class="font-display text-4xl lg:text-5xl text-cream-200 leading-tight">Settings</h1>
      <p class="text-earth-400 mt-2 text-sm">Konfigurasi sistem dan koneksi</p>
    </div>
    <div class="card-glass p-6 lg:p-8 max-w-2xl">
      <div class="space-y-6">
        <div><label class="block text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2">Spreadsheet ID</label><input type="text" class="input-dark font-mono text-xs" value="19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c"></div>
        <div><label class="block text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2">Sheet GID</label><input type="text" class="input-dark font-mono text-xs" value="1202906531"></div>
        <div><label class="block text-xs font-semibold text-amber-400 uppercase tracking-wider mb-2">API Endpoint</label><input type="text" class="input-dark font-mono text-xs" value="https://script.google.com/macros/s/.../exec"></div>
      </div>
      <div class="border-t border-amber-900/30 mt-8 pt-6"><label class="block text-xs font-semibold text-amber-400 uppercase tracking-wider mb-3">Display Mode</label><div class="flex gap-3"><button class="btn-outline text-xs">Retro</button><button class="btn-warm text-xs">Modern</button><button class="btn-outline text-xs">Glass</button></div></div>
      <div class="border-t border-amber-900/30 mt-8 pt-6 flex justify-end"><button class="btn-warm flex items-center gap-2" onclick="showToast('Settings saved successfully')"><span class="iconify text-sm" data-icon="lucide:save"></span>Save Changes</button></div>
    </div>
  </div>

</main>
</div>

<div class="toast-container" id="toastStack"></div>

<script>
// ================= DATA LOGIC =================
let semuaData = { linknawala: [] };
let filteredData = { linknawala: [] };

setInterval(() => {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}, 1000);

const config = {
  spreadsheetId: '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c',
  sheetGid: '1202906531',
  gasUrl: 'https://script.google.com/macros/s/AKfycbwkHrgiGlxFkJHZwp-bMaRCezwCSPAdV-FyUHkX9cAEWu/exec'
};

window.onload = function() {
  muatSemuaData();
  initBgNetwork();
};

function showView(viewName) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById(viewName + 'View').classList.add('active');
  document.querySelectorAll('.nav-pill[data-nav]').forEach(el => { el.classList.remove('active'); if(el.dataset.nav === viewName) el.classList.add('active'); });
  document.querySelectorAll('.nav-pill[data-mob]').forEach(el => { el.classList.remove('active'); if(el.dataset.mob === viewName) el.classList.add('active'); });
}

function showToast(msg) {
  const c = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast-item';
  t.innerHTML = `<div class="flex items-center gap-2"><span class="iconify text-cyan-400" data-icon="lucide:check-circle"></span><span class="font-medium">${msg}</span></div>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(), 300); }, 3000);
}

function copyText(text) { if(!text) return; navigator.clipboard.writeText(text).then(() => showToast("Link disalin!")); }
function handleEnter(e) { if(e.key==='Enter') performSearch(); }

async function muatSemuaData() {
  const container = document.getElementById('tableContainer');
  container.innerHTML = `<tr><td colspan="5" class="text-center py-16 text-earth-500 text-sm"><span class="iconify animate-spin inline-block mr-2 text-xl align-[-4px]" data-icon="lucide:loader-2"></span>Memuat data...</td></tr>`;
  try {
    let dataFetched = false;
    if(config.gasUrl) { try { const res=await fetch(config.gasUrl); if(res.ok){ const json=await res.json(); if(json.success){ semuaData.linknawala=json.linknawala||[]; dataFetched=true; }}}catch(e){} }
    if(!dataFetched) {
      const csvUrl=`https://docs.google.com/spreadsheets/d/${config.spreadsheetId}/export?format=csv&gid=${config.sheetGid}`;
      const res=await fetch(csvUrl); if(!res.ok) throw new Error('Fail');
      semuaData.linknawala = parseCSV(await res.text());
    }
    filteredData.linknawala = JSON.parse(JSON.stringify(semuaData.linknawala));
    renderTable();
    showToast("Sistem online — data dimuat");
  } catch(err) {
    container.innerHTML = `<tr><td colspan="5" class="text-center py-16 text-wine-400 text-sm"><span class="iconify inline-block mr-2 text-xl align-[-4px]" data-icon="lucide:alert-triangle"></span>Gagal memuat data</td></tr>`;
  }
}

function parseCSV(text) {
  if(!text) return [];
  return text.split('\n').filter(l=>l.trim()).map(row => {
    let cur='',arr=[],inQ=false;
    for(let c of row){ if(c==='"')inQ=!inQ; else if(c===','&&!inQ){arr.push(cur.trim());cur='';}else cur+=c;}
    arr.push(cur.trim()); return arr;
  });
}

function renderTable() {
  const data = filteredData.linknawala;
  const container = document.getElementById('tableContainer');
  if(!data||!data.length){ container.innerHTML='<tr><td colspan="5" class="text-center py-16 text-earth-500 text-sm">No data</td></tr>'; return; }
  let html = `<thead><tr>`;
  if(data[0]) {
    data[0].forEach(h => html += `<th class="text-left text-[11px] font-bold text-amber-400/60 uppercase tracking-wider px-5 py-4 border-b border-amber-900/20">${h}</th>`);
    html += `<th class="text-right text-[11px] font-bold text-amber-400/60 uppercase tracking-wider px-5 py-4 border-b border-amber-900/20 w-28">Action</th></tr></thead><tbody>`;
    for(let i=1;i<data.length;i++){
      if(!data[i]) continue;
      html += `<tr class="table-row">`;
      let firstText='';
      data[i].forEach((cell,idx)=>{
        if(idx>=4) return;
        const val=cell||'—';
        if(idx===0){ firstText=val; html+=`<td class="px-5 py-3.5 text-sm border-b border-amber-900/10 font-medium text-cream-200">${val}</td>`; }
        else html+=`<td class="px-5 py-3.5 text-sm border-b border-amber-900/10 text-earth-400">${val}</td>`;
      });
      html+=`<td class="px-5 py-3.5 text-right border-b border-amber-900/10"><button class="copy-btn" onclick="copyText('${firstText.replace(/'/g,"\\'")}')">Copy</button></td></tr>`;
    }
  }
  html += `</tbody>`;
  container.innerHTML = html;
}

function performSearch() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  const original = semuaData.linknawala;
  if(!term){ filteredData.linknawala=JSON.parse(JSON.stringify(original)); }
  else {
    const filtered=[original[0]];
    for(let i=1;i<original.length;i++){ if(original[i].some(cell=>cell&&cell.toString().toLowerCase().includes(term))) filtered.push(original[i]); }
    filteredData.linknawala=filtered;
  }
  renderTable();
}

// ================= FULL-SCREEN ELECTRIC NETWORK =================
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let bgNodes = [], bgEdges = [], bgSparks = [];
const BG_NODE_COUNT = 22;
let bgFrame = 0;

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  initBgData();
}

function initBgData() {
  bgNodes = []; bgEdges = []; bgSparks = [];
  const w = bgCanvas.width, h = bgCanvas.height;
  const cx = w/2, cy = h/2;
  const ringR = Math.min(w,h) * 0.32;

  // Hub
  bgNodes.push({ x:cx, y:cy, r:12, type:'hub', label:'HUB', charge:0 });

  // Ring nodes
  const types = ['server','database','gateway','client','api'];
  const labels = ['SRV-01','SRV-02','DB-01','DB-02','GW-01','GW-02','FW-01','CLI-01','CLI-02','CLI-03','API-01','API-02','CDN-01','CDN-02','LOG-01','MON-01','DNS-01','LB-01','FW-02'];
  for(let i=0; i<BG_NODE_COUNT-1; i++){
    const angle = (i/(BG_NODE_COUNT-1))*Math.PI*2 - Math.PI/2;
    const jitter = (Math.random()-0.5)*80;
    bgNodes.push({
      x: cx + Math.cos(angle)*(ringR+jitter),
      y: cy + Math.sin(angle)*(ringR+jitter),
      r: 5 + Math.random()*4,
      type: types[i%types.length],
      label: labels[i]||`N-${i}`,
      charge: 0
    });
  }

  // Edges: hub to all + some cross
  for(let i=1;i<bgNodes.length;i++) bgEdges.push({from:0, to:i, active:true});
  for(let i=1;i<bgNodes.length;i++){
    const j=((i+4)%(bgNodes.length-1))+1;
    if(i!==j) bgEdges.push({from:i, to:j, active:Math.random()>0.5});
  }
}

function spawnBgSpark() {
  const active = bgEdges.filter(e=>e.active);
  if(!active.length) return;
  const edge = active[Math.floor(Math.random()*active.length)];
  const dir = Math.random()>0.5?1:-1;
  bgSparks.push({
    from: dir>0?edge.from:edge.to,
    to: dir>0?edge.to:edge.from,
    t: 0,
    speed: 0.01 + Math.random()*0.015,
    isCyan: Math.random()>0.25
  });
}

function drawBolt(ctx, x1, y1, x2, y2, jitter) {
  let dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  if(len<1) return;
  let nx=-dy/len, ny=dx/len, segs=5;
  ctx.beginPath(); ctx.moveTo(x1,y1);
  for(let i=1;i<segs;i++){
    let t=i/segs;
    ctx.lineTo(x1+dx*t+nx*(Math.random()-0.5)*jitter, y1+dy*t+ny*(Math.random()-0.5)*jitter);
  }
  ctx.lineTo(x2,y2); ctx.stroke();
}

function initBgNetwork() {
  resizeBg();
  window.addEventListener('resize', resizeBg);
  animateBg();
}

function animateBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  const time = Date.now() * 0.001;
  bgFrame++;

  // Clear
  bgCtx.fillStyle = '#1a140f';
  bgCtx.fillRect(0,0,w,h);

  // Subtle grid
  bgCtx.strokeStyle = 'rgba(61,44,30,0.08)';
  bgCtx.lineWidth = 0.5;
  for(let x=0;x<w;x+=60){ bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,h); bgCtx.stroke(); }
  for(let y=0;y<h;y+=60){ bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }

  // Wires
  bgCtx.globalCompositeOperation = 'source-over';
  bgCtx.lineWidth = 1;
  for(let edge of bgEdges){
    const a=bgNodes[edge.from], b=bgNodes[edge.to];
    bgCtx.beginPath(); bgCtx.moveTo(a.x,a.y); bgCtx.lineTo(b.x,b.y);
    bgCtx.strokeStyle = edge.active ? 'rgba(61,44,30,0.35)' : 'rgba(61,44,30,0.08)';
    bgCtx.stroke();
  }

  // Additive layer
  bgCtx.globalCompositeOperation = 'lighter';

  // Spawn sparks
  if(bgFrame % 90 === 0) { for(let i=0;i<3;i++) spawnBgSpark(); }
  else if(Math.random() < 0.04) spawnBgSpark();
  if(bgSparks.length > 10) bgSparks.splice(0, bgSparks.length-10);

  // Sparks
  for(let i=bgSparks.length-1;i>=0;i--){
    let p = bgSparks[i];
    p.t += p.speed;
    if(p.t >= 1){ bgNodes[p.to].charge = Math.min(bgNodes[p.to].charge+1, 2); bgSparks.splice(i,1); continue; }
    const a=bgNodes[p.from], b=bgNodes[p.to];
    let px=a.x+(b.x-a.x)*p.t, py=a.y+(b.y-a.y)*p.t;
    let trail=0.12;
    let tx=a.x+(b.x-a.x)*Math.max(0,p.t-trail), ty=a.y+(b.y-a.y)*Math.max(0,p.t-trail);
    let dist=Math.sqrt((px-tx)**2+(py-ty)**2);
    let jitter=Math.max(10, dist*0.25);
    let hc = p.isCyan ? 'rgba(0,255,255,' : 'rgba(255,170,0,';

    // Glow
    bgCtx.beginPath(); bgCtx.arc(px,py,16,0,Math.PI*2);
    bgCtx.fillStyle = hc+'0.08)'; bgCtx.fill();
    bgCtx.beginPath(); bgCtx.arc(px,py,8,0,Math.PI*2);
    bgCtx.fillStyle = hc+'0.15)'; bgCtx.fill();

    // Bolt
    bgCtx.lineWidth = 1.5;
    bgCtx.strokeStyle = hc+'0.7)';
    drawBolt(bgCtx, tx,ty,px,py,jitter);

    // Core
    bgCtx.lineWidth = 0.8;
    bgCtx.strokeStyle = 'rgba(255,255,255,0.8)';
    bgCtx.beginPath(); bgCtx.moveTo(tx,ty); bgCtx.lineTo(px,py); bgCtx.stroke();

    // Dot
    bgCtx.beginPath(); bgCtx.arc(px,py,2.5,0,Math.PI*2);
    bgCtx.fillStyle = '#fff'; bgCtx.fill();
  }

  // Nodes
  for(let n of bgNodes){
    n.charge = Math.max(0, n.charge - 0.012);
    let isHub = n.type==='hub';
    let cr=isHub?0:(n.type==='database'?0:n.type==='gateway'?255:n.type==='client'?255:170);
    let cg=isHub?255:(n.type==='database'?136:n.type==='gateway'?170:n.type==='client'?68:68);
    let cb=isHub?255:(n.type==='database'?255:n.type==='gateway'?0:n.type==='client'?170:255);
    let col=`${cr},${cg},${cb}`;

    // Shockwave
    if(n.charge > 0.1){
      bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r+(2-n.charge)*20,0,Math.PI*2);
      bgCtx.strokeStyle = `rgba(${col},${n.charge*0.3})`;
      bgCtx.lineWidth = 1; bgCtx.stroke();
      // Discharge
      for(let j=0;j<2;j++){
        let ang=Math.random()*Math.PI*2, len=n.charge*20*Math.random();
        bgCtx.beginPath(); bgCtx.moveTo(n.x,n.y);
        bgCtx.lineTo(n.x+Math.cos(ang)*len, n.y+Math.sin(ang)*len);
        bgCtx.strokeStyle = `rgba(255,255,255,${n.charge*0.2})`;
        bgCtx.lineWidth = 0.8; bgCtx.stroke();
      }
    }

    // Outer glow
    let pulse = Math.sin(time*2+n.x*0.01)*0.3+0.7;
    let ga = (0.04+n.charge*0.1)*pulse;
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r+12+n.charge*8,0,Math.PI*2);
    bgCtx.fillStyle = `rgba(${col},${ga})`; bgCtx.fill();
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r+6,0,Math.PI*2);
    bgCtx.fillStyle = `rgba(${col},${0.08+n.charge*0.15})`; bgCtx.fill();

    // Body
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    bgCtx.fillStyle = `rgba(${col},${0.4+n.charge*0.5})`; bgCtx.fill();

    // Highlight
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r*0.4,0,Math.PI*2);
    bgCtx.fillStyle = `rgba(255,255,255,${0.2+n.charge*0.4})`; bgCtx.fill();
  }

  // Labels
  bgCtx.globalCompositeOperation = 'source-over';
  bgCtx.textAlign = 'center';
  for(let n of bgNodes){
    let alpha = 0.25 + n.charge*0.4;
    bgCtx.font = `bold ${n.type==='hub'||n.type==='server'?11:8}px "DM Sans",sans-serif`;
    bgCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    bgCtx.fillText(n.label, n.x, n.y+n.r+14);
  }

  // Ambient sparks
  if(Math.random() < 0.03){
    let rx=Math.random()*w, ry=Math.random()*h;
    bgCtx.globalCompositeOperation = 'lighter';
    bgCtx.beginPath(); bgCtx.arc(rx,ry,1.5,0,Math.PI*2);
    bgCtx.fillStyle = 'rgba(0,255,255,0.5)'; bgCtx.fill();
  }

  requestAnimationFrame(animateBg);
}
</script>
</body>
</html>
