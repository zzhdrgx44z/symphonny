<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LINK LINE — Studio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { serif: ['DM Serif Display','serif'], sans: ['DM Sans','sans-serif'] },
      colors: {
        slate: { 50: '#f8fafc', 100: '#f1f5f9', 200: '#e2e8f0', 300: '#cbd5e1', 400: '#94a3b8', 500: '#64748b', 600: '#475569', 700: '#334155', 800: '#1e293b', 900: '#0f172a' }
      }
    }
  }
}
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:#f8fafc;color:#1e293b;height:100vh;overflow:hidden}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#f1f5f9}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:#94a3b8}
.view-section{display:none;animation:fadeUp .5s ease}
.view-section.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.font-display{font-family:'DM Serif Display',serif}
.card-glass{background:rgba(255,255,255,0.85);backdrop-filter:blur(16px);border:1px solid rgba(226,232,240,0.8);border-radius:16px;box-shadow:0 4px 24px rgba(148,163,184,0.1)}
.nav-pill{padding:8px 20px;border-radius:99px;font-size:.875rem;font-weight:600;color:#64748b;background:0 0;border:none;cursor:pointer;transition:all .25s;white-space:nowrap}
.nav-pill:hover{color:#1e293b;background:rgba(59,130,246,0.05)}
.nav-pill.active{color:#fff;background:#3b82f6;box-shadow:0 2px 10px rgba(59,130,246,0.3)}
.btn-primary{background:#3b82f6;color:#fff;font-weight:600;font-size:.875rem;padding:10px 24px;border-radius:12px;border:none;cursor:pointer;transition:all .2s;box-shadow:0 2px 12px rgba(59,130,246,0.2)}
.btn-primary:hover{background:#2563eb;transform:translateY(-1px);box-shadow:0 4px 16px rgba(59,130,246,0.3)}
.btn-primary:active{transform:translateY(0) scale(.98)}
.btn-outline{background:#fff;color:#475569;font-weight:600;font-size:.875rem;padding:10px 24px;border-radius:12px;border:1.5px solid #e2e8f0;cursor:pointer;transition:all .2s}
.btn-outline:hover{border-color:#3b82f6;color:#3b82f6;background:rgba(59,130,246,0.03)}
.input-light{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:12px 16px;font-family:'DM Sans';font-size:.9375rem;color:#1e293b;outline:none;transition:all .2s;width:100%}
.input-light:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,0.1)}
.input-light::placeholder{color:#94a3b8}
.copy-btn{background:rgba(59,130,246,0.08);border:1.5px solid rgba(59,130,246,0.2);color:#3b82f6;padding:5px 14px;font-size:.75rem;font-weight:700;border-radius:8px;cursor:pointer;transition:all .2s;font-family:'DM Sans';text-transform:uppercase;letter-spacing:.5px}
.copy-btn:hover{background:#3b82f6;color:#fff;border-color:#3b82f6;box-shadow:0 2px 8px rgba(59,130,246,0.3)}
.table-row{transition:background .2s}
.table-row:hover{background:rgba(59,130,246,0.03)}
.toast-container{position:fixed;top:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast-item{background:#fff;border:1px solid #e2e8f0;border-left:4px solid #3b82f6;padding:14px 22px;border-radius:12px;font-size:.875rem;color:#1e293b;box-shadow:0 8px 24px rgba(148,163,184,0.2);animation:toastIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes toastIn{from{opacity:0;transform:translateX(40px) scale(.95)}to{opacity:1;transform:translateX(0) scale(1)}}
#bgCanvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.pulse-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulseG 2s infinite}
@keyframes pulseG{0%,100%{box-shadow:0 0 4px rgba(34,197,94,0.4)}50%{box-shadow:0 0 10px rgba(34,197,94,0.6)}}
@media(max-width:768px){.desktop-only{display:none!important}}
</style>
</head>
<body>

<!-- Full-screen Light Electric Network Canvas -->
<canvas id="bgCanvas"></canvas>

<div class="relative z-10 h-screen flex flex-col">

<header class="flex-shrink-0 flex items-center justify-between px-6 lg:px-10 py-4 bg-white/80 backdrop-blur-xl border-b border-slate-200/80">
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-md">
      <span class="iconify text-white text-base" data-icon="lucide:zap"></span>
    </div>
    <div>
      <span class="font-display text-lg text-slate-800">Link Line</span>
      <span class="text-[10px] font-semibold text-blue-500 ml-1 uppercase tracking-widest">Cloud</span>
    </div>
  </div>
  <nav class="hidden md:flex items-center gap-1 p-1 rounded-full bg-slate-100/80 border border-slate-200/50">
    <button onclick="showView('dashboard')" class="nav-pill active" data-nav="dashboard"><span class="iconify inline-block mr-1 text-sm align-[-2px]" data-icon="lucide:database"></span>Database</button>
    <button onclick="showView('settings')" class="nav-pill" data-nav="settings"><span class="iconify inline-block mr-1 text-sm align-[-2px]" data-icon="lucide:settings"></span>Settings</button>
  </nav>
  <div class="flex items-center gap-4">
    <div class="flex items-center gap-2"><div class="pulse-dot"></div><span class="text-xs font-medium text-slate-500">Online</span></div>
    <span class="text-xs font-medium text-slate-400 font-mono" id="clock">00:00</span>
  </div>
</header>

<div class="md:hidden flex gap-1 p-2 overflow-x-auto bg-white/80 backdrop-blur-xl border-b border-slate-200/80">
  <button onclick="showView('dashboard')" class="nav-pill active text-xs" data-mob="dashboard">Database</button>
  <button onclick="showView('settings')" class="nav-pill text-xs" data-mob="settings">Settings</button>
</div>

<main class="flex-1 overflow-y-auto p-6 lg:p-10">

  <!-- DATABASE -->
  <div id="dashboardView" class="view-section active">
    <div class="flex flex-col md:flex-row md:items-end justify-between gap-4 mb-8">
      <div>
        <h1 class="font-display text-4xl lg:text-5xl text-slate-800 leading-tight">Database</h1>
        <p class="text-slate-500 mt-2 text-sm">Temukan dan kelola link yang tersedia</p>
      </div>
      <div class="flex items-center gap-2 text-slate-400">
        <span class="iconify text-lg" data-icon="lucide:info"></span>
        <span class="text-xs">Klik COPY untuk menyalin link</span>
      </div>
    </div>
    <div class="flex gap-3 mb-6">
      <div class="relative flex-1">
        <span class="iconify absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 text-lg" data-icon="lucide:search"></span>
        <input type="text" class="input-light pl-11" id="searchInput" placeholder="Cari link di sini..." onkeypress="handleEnter(event)">
      </div>
      <button class="btn-primary flex items-center gap-2" onclick="performSearch()">
        <span class="iconify text-sm" data-icon="lucide:search"></span>Cari
      </button>
    </div>
    <div class="card-glass overflow-hidden">
      <table class="w-full" id="tableContainer"></table>
    </div>
    <div class="text-center text-xs text-slate-300 mt-8 pb-4 font-medium tracking-wide">— End of Database —</div>
  </div>

  <!-- SETTINGS -->
  <div id="settingsView" class="view-section">
    <div class="mb-8">
      <h1 class="font-display text-4xl lg:text-5xl text-slate-800 leading-tight">Settings</h1>
      <p class="text-slate-500 mt-2 text-sm">Konfigurasi sistem dan koneksi</p>
    </div>
    <div class="card-glass p-6 lg:p-8 max-w-2xl">
      <div class="space-y-6">
        <div><label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Spreadsheet ID</label><input type="text" class="input-light font-mono text-xs" value="19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c"></div>
        <div><label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Sheet GID</label><input type="text" class="input-light font-mono text-xs" value="1202906531"></div>
        <div><label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">API Endpoint</label><input type="text" class="input-light font-mono text-xs" value="https://script.google.com/macros/s/.../exec"></div>
      </div>
      <div class="border-t border-slate-100 mt-8 pt-6"><label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">Display Mode</label><div class="flex gap-3"><button class="btn-outline text-xs">Retro</button><button class="btn-primary text-xs">Modern</button><button class="btn-outline text-xs">Glass</button></div></div>
      <div class="border-t border-slate-100 mt-8 pt-6 flex justify-end"><button class="btn-primary flex items-center gap-2" onclick="showToast('Settings saved successfully')"><span class="iconify text-sm" data-icon="lucide:save"></span>Save Changes</button></div>
    </div>
  </div>

</main>
</div>

<div class="toast-container" id="toastStack"></div>

<script>
// ================= DATA LOGIC =================
let semuaData = { linknawala: [] };
let filteredData = { linknawala: [] };

setInterval(() => {
  document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}, 1000);

const config = {
  spreadsheetId: '19AodSFSw4shpSZVZ4I-_sD91eU1HPITMeg4cwLiEV1c',
  sheetGid: '1202906531',
  gasUrl: 'https://script.google.com/macros/s/AKfycbwkHrgiGlxFkJHZwp-bMaRCezwCSPAdV-FyUHkX9cAEWu/exec'
};

window.onload = function() {
  muatSemuaData();
  initBgNetwork();
};

function showView(viewName) {
  document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
  document.getElementById(viewName + 'View').classList.add('active');
  document.querySelectorAll('.nav-pill[data-nav]').forEach(el => { el.classList.remove('active'); if(el.dataset.nav === viewName) el.classList.add('active'); });
  document.querySelectorAll('.nav-pill[data-mob]').forEach(el => { el.classList.remove('active'); if(el.dataset.mob === viewName) el.classList.add('active'); });
}

function showToast(msg) {
  const c = document.getElementById('toastStack');
  const t = document.createElement('div');
  t.className = 'toast-item';
  t.innerHTML = `<div class="flex items-center gap-2"><span class="iconify text-blue-500" data-icon="lucide:check-circle"></span><span class="font-medium">${msg}</span></div>`;
  c.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(), 300); }, 3000);
}

function copyText(text) { if(!text) return; navigator.clipboard.writeText(text).then(() => showToast("Link disalin!")); }
function handleEnter(e) { if(e.key==='Enter') performSearch(); }

async function muatSemuaData() {
  const container = document.getElementById('tableContainer');
  container.innerHTML = `<tr><td colspan="5" class="text-center py-16 text-slate-400 text-sm"><span class="iconify animate-spin inline-block mr-2 text-xl align-[-4px]" data-icon="lucide:loader-2"></span>Memuat data...</td></tr>`;
  try {
    let dataFetched = false;
    if(config.gasUrl) { try { const res=await fetch(config.gasUrl); if(res.ok){ const json=await res.json(); if(json.success){ semuaData.linknawala=json.linknawala||[]; dataFetched=true; }}}catch(e){} }
    if(!dataFetched) {
      const csvUrl=`https://docs.google.com/spreadsheets/d/${config.spreadsheetId}/export?format=csv&gid=${config.sheetGid}`;
      const res=await fetch(csvUrl); if(!res.ok) throw new Error('Fail');
      semuaData.linknawala = parseCSV(await res.text());
    }
    filteredData.linknawala = JSON.parse(JSON.stringify(semuaData.linknawala));
    renderTable();
    showToast("Sistem online — data dimuat");
  } catch(err) {
    container.innerHTML = `<tr><td colspan="5" class="text-center py-16 text-red-400 text-sm"><span class="iconify inline-block mr-2 text-xl align-[-4px]" data-icon="lucide:alert-triangle"></span>Gagal memuat data</td></tr>`;
  }
}

function parseCSV(text) {
  if(!text) return [];
  return text.split('\n').filter(l=>l.trim()).map(row => {
    let cur='',arr=[],inQ=false;
    for(let c of row){ if(c==='"')inQ=!inQ; else if(c===','&&!inQ){arr.push(cur.trim());cur='';}else cur+=c;}
    arr.push(cur.trim()); return arr;
  });
}

function renderTable() {
  const data = filteredData.linknawala;
  const container = document.getElementById('tableContainer');
  if(!data||!data.length){ container.innerHTML='<tr><td colspan="5" class="text-center py-16 text-slate-400 text-sm">No data</td></tr>'; return; }
  let html = `<thead><tr>`;
  if(data[0]) {
    data[0].forEach(h => html += `<th class="text-left text-[11px] font-bold text-slate-400 uppercase tracking-wider px-5 py-4 border-b border-slate-100 bg-slate-50/50">${h}</th>`);
    html += `<th class="text-right text-[11px] font-bold text-slate-400 uppercase tracking-wider px-5 py-4 border-b border-slate-100 bg-slate-50/50 w-28">Action</th></tr></thead><tbody>`;
    for(let i=1;i<data.length;i++){
      if(!data[i]) continue;
      html += `<tr class="table-row">`;
      let firstText='';
      data[i].forEach((cell,idx)=>{
        if(idx>=4) return;
        const val=cell||'—';
        if(idx===0){ firstText=val; html+=`<td class="px-5 py-3.5 text-sm border-b border-slate-50 font-semibold text-slate-700">${val}</td>`; }
        else html+=`<td class="px-5 py-3.5 text-sm border-b border-slate-50 text-slate-500">${val}</td>`;
      });
      html+=`<td class="px-5 py-3.5 text-right border-b border-slate-50"><button class="copy-btn" onclick="copyText('${firstText.replace(/'/g,"\\'")}')">Copy</button></td></tr>`;
    }
  }
  html += `</tbody>`;
  container.innerHTML = html;
}

function performSearch() {
  const term = document.getElementById('searchInput').value.toLowerCase().trim();
  const original = semuaData.linknawala;
  if(!term){ filteredData.linknawala=JSON.parse(JSON.stringify(original)); }
  else {
    const filtered=[original[0]];
    for(let i=1;i<original.length;i++){ if(original[i].some(cell=>cell&&cell.toString().toLowerCase().includes(term))) filtered.push(original[i]); }
    filteredData.linknawala=filtered;
  }
  renderTable();
}

// ================= LIGHT ELECTRIC NETWORK =================
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let bgNodes = [], bgEdges = [], bgSparks = [];
const BG_NODE_COUNT = 20;
let bgFrame = 0;

function resizeBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  initBgData();
}

function initBgData() {
  bgNodes = []; bgEdges = []; bgSparks = [];
  const w = bgCanvas.width, h = bgCanvas.height;
  const cx = w/2, cy = h/2;
  const ringR = Math.min(w,h) * 0.32;

  bgNodes.push({ x:cx, y:cy, r:10, type:'hub', label:'HUB', charge:0 });

  const types = ['server','database','gateway','client','api'];
  const labels = ['SRV-01','SRV-02','DB-01','DB-02','GW-01','GW-02','FW-01','CLI-01','CLI-02','CLI-03','API-01','API-02','CDN-01','CDN-02','LOG-01','MON-01','DNS-01','LB-01','FW-02'];
  for(let i=0; i<BG_NODE_COUNT-1; i++){
    const angle = (i/(BG_NODE_COUNT-1))*Math.PI*2 - Math.PI/2;
    const jitter = (Math.random()-0.5)*80;
    bgNodes.push({
      x: cx + Math.cos(angle)*(ringR+jitter),
      y: cy + Math.sin(angle)*(ringR+jitter),
      r: 4 + Math.random()*3,
      type: types[i%types.length],
      label: labels[i]||`N-${i}`,
      charge: 0
    });
  }

  for(let i=1;i<bgNodes.length;i++) bgEdges.push({from:0, to:i, active:true});
  for(let i=1;i<bgNodes.length;i++){
    const j=((i+4)%(bgNodes.length-1))+1;
    if(i!==j) bgEdges.push({from:i, to:j, active:Math.random()>0.5});
  }
}

function spawnBgSpark() {
  const active = bgEdges.filter(e=>e.active);
  if(!active.length) return;
  const edge = active[Math.floor(Math.random()*active.length)];
  const dir = Math.random()>0.5?1:-1;
  bgSparks.push({
    from: dir>0?edge.from:edge.to,
    to: dir>0?edge.to:edge.from,
    t: 0,
    speed: 0.008 + Math.random()*0.012,
    color: Math.random() > 0.5 ? '#3b82f6' : '#8b5cf6' // Blue or Violet
  });
}

function initBgNetwork() {
  resizeBg();
  window.addEventListener('resize', resizeBg);
  animateBg();
}

function animateBg() {
  const w = bgCanvas.width, h = bgCanvas.height;
  const time = Date.now() * 0.001;
  bgFrame++;

  // Clear canvas (transparent to show CSS background)
  bgCtx.clearRect(0, 0, w, h);

  // Subtle grid
  bgCtx.strokeStyle = 'rgba(148,163,184,0.07)';
  bgCtx.lineWidth = 1;
  for(let x=0;x<w;x+=60){ bgCtx.beginPath(); bgCtx.moveTo(x,0); bgCtx.lineTo(x,h); bgCtx.stroke(); }
  for(let y=0;y<h;y+=60){ bgCtx.beginPath(); bgCtx.moveTo(0,y); bgCtx.lineTo(w,y); bgCtx.stroke(); }

  // Wires
  bgCtx.globalCompositeOperation = 'source-over';
  bgCtx.lineWidth = 1;
  for(let edge of bgEdges){
    const a=bgNodes[edge.from], b=bgNodes[edge.to];
    bgCtx.beginPath(); bgCtx.moveTo(a.x,a.y); bgCtx.lineTo(b.x,b.y);
    bgCtx.strokeStyle = edge.active ? 'rgba(148,163,184,0.15)' : 'rgba(148,163,184,0.05)';
    bgCtx.stroke();
  }

  // Spawn sparks
  if(bgFrame % 90 === 0) { for(let i=0;i<3;i++) spawnBgSpark(); }
  else if(Math.random() < 0.04) spawnBgSpark();
  if(bgSparks.length > 10) bgSparks.splice(0, bgSparks.length-10);

  // Sparks (Clean data pulses)
  for(let i=bgSparks.length-1;i>=0;i--){
    let p = bgSparks[i];
    p.t += p.speed;
    if(p.t >= 1){ bgNodes[p.to].charge = Math.min(bgNodes[p.to].charge+1, 1.5); bgSparks.splice(i,1); continue; }
    const a=bgNodes[p.from], b=bgNodes[p.to];
    let px=a.x+(b.x-a.x)*p.t, py=a.y+(b.y-a.y)*p.t;
    let trail=0.1;
    let tx=a.x+(b.x-a.x)*Math.max(0,p.t-trail), ty=a.y+(b.y-a.y)*Math.max(0,p.t-trail);
    
    // Trail line
    let grad = bgCtx.createLinearGradient(tx,ty,px,py);
    grad.addColorStop(0, 'rgba(148,163,184,0)');
    grad.addColorStop(1, p.color);
    bgCtx.beginPath(); bgCtx.moveTo(tx,ty); bgCtx.lineTo(px,py);
    bgCtx.strokeStyle = grad; bgCtx.lineWidth = 2; bgCtx.stroke();

    // Head glow
    bgCtx.beginPath(); bgCtx.arc(px,py,8,0,Math.PI*2);
    bgCtx.fillStyle = p.color + '15'; bgCtx.fill(); // 15 is hex for ~10% alpha
    
    // Head core
    bgCtx.beginPath(); bgCtx.arc(px,py,3,0,Math.PI*2);
    bgCtx.fillStyle = p.color; bgCtx.fill();
    
    // Bright center
    bgCtx.beginPath(); bgCtx.arc(px,py,1.5,0,Math.PI*2);
    bgCtx.fillStyle = '#ffffff'; bgCtx.fill();
  }

  // Nodes
  for(let n of bgNodes){
    n.charge = Math.max(0, n.charge - 0.015);
    let isHub = n.type==='hub';
    
    // Node colors (Blues, Violets, Teals)
    let baseColor = isHub ? '#3b82f6' : 
                    n.type==='database' ? '#8b5cf6' : 
                    n.type==='gateway' ? '#f59e0b' : 
                    n.type==='client' ? '#10b981' : '#6366f1';

    // Charge ring
    if(n.charge > 0.05){
      bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r + (1.5-n.charge)*15,0,Math.PI*2);
      bgCtx.strokeStyle = baseColor + '30'; // ~19% alpha
      bgCtx.lineWidth = 1.5; bgCtx.stroke();
    }

    // Outer subtle glow
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r + 6 + n.charge*5,0,Math.PI*2);
    bgCtx.fillStyle = baseColor + '08'; // ~3% alpha
    bgCtx.fill();

    // Node body
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    bgCtx.fillStyle = baseColor + (n.charge > 0.1 ? 'cc' : '80'); // 50% or 80% alpha
    bgCtx.fill();

    // White border
    bgCtx.beginPath(); bgCtx.arc(n.x,n.y,n.r,0,Math.PI*2);
    bgCtx.strokeStyle = '#ffffff'; bgCtx.lineWidth = 2; bgCtx.stroke();

    // Inner highlight
    bgCtx.beginPath(); bgCtx.arc(n.x - n.r*0.2, n.y - n.r*0.2, n.r*0.35,0,Math.PI*2);
    bgCtx.fillStyle = 'rgba(255,255,255,0.4)'; bgCtx.fill();
  }

  // Labels
  bgCtx.textAlign = 'center';
  for(let n of bgNodes){
    let alpha = 0.3 + n.charge*0.5;
    bgCtx.font = `600 ${n.type==='hub'?10:7}px "DM Sans",sans-serif`;
    bgCtx.fillStyle = `rgba(71,85,105,${alpha})`;
    bgCtx.fillText(n.label, n.x, n.y+n.r+14);
  }

  requestAnimationFrame(animateBg);
}
</script>
</body>
</html>
